<div class="playground-container">
  <!-- Selection View -->
  <div *ngIf="!selectedConfig()" class="selection-view">
    <header class="playground-header">
      <div class="header-content">
        <h1>Interactive Playground</h1>
        <p>Explore and customize components in real-time.</p>
      </div>
    </header>

    <div class="selection-grid">
      <div
        *ngFor="let item of allNavItems"
        class="component-card"
        (click)="selectComponent(item.id)"
      >
        <div class="card-icon">{{ item.icon || '📦' }}</div>
        <div class="card-info">
          <h3>{{ item.label }}</h3>
          <span class="badge" *ngIf="item.badge">{{ item.badge }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Component View -->
  <div *ngIf="selectedConfig()" class="component-view">
    <header class="view-header">
      <div class="header-left">
        <button class="back-btn" (click)="goBack()">← Back</button>
        <h1>{{ selectedConfig()!.label }}</h1>
      </div>
      <div class="header-right">
        <button class="docs-btn" (click)="goToDocs()">Docs 📖</button>
      </div>
    </header>

    <div style="flex: 1; overflow: hidden; padding: 24px">
      <app-playground-editor [config]="selectedConfig()!"></app-playground-editor>
    </div>
  </div>
</div>
