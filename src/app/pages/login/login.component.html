<div class="login-container">
  <div class="login-card">
    <!-- Logo/Brand -->
    <div class="login-header">
      <div class="logo">🚀</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Demo Credentials Info -->
    <div class="demo-banner">
      <span class="demo-icon">💡</span>
      <div class="demo-content">
        <strong>Demo Login:</strong>
        <span>demo@example.com / demo123</span>
      </div>
      <button type="button" class="btn-demo-fill" (click)="loginWithDemo()">
        Use Demo
      </button>
    </div>

    <!-- Error Message -->
    <div class="alert alert-error" *ngIf="error()">
      <span class="alert-icon">⚠️</span>
      <span>{{ error() }}</span>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <app-input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="credentials.email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <app-input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [title]="showPassword() ? 'Hide password' : 'Show password'"
          >
            {{ showPassword() ? '👁️' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="checkbox-label">
          <app-input
            type="checkbox"
            name="rememberMe"
            [(ngModel)]="credentials.rememberMe"
          />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-primary btn-large"
        [disabled]="loading()"
      >
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()" class="loading-content">
          <span class="spinner"></span>
          <span>Signing in...</span>
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social Login Options -->
    <div class="social-login">
      <button type="button" class="btn-social btn-google">
        <span class="social-icon">🔍</span>
        Google
      </button>
      <button type="button" class="btn-social btn-github">
        <span class="social-icon">🐙</span>
        GitHub
      </button>
      <button type="button" class="btn-social btn-microsoft">
        <span class="social-icon">🪟</span>
        Microsoft
      </button>
    </div>

    <!-- Register Link -->
    <div class="register-prompt">
      Don't have an account?
      <a routerLink="/register" class="register-link">Create one now</a>
    </div>
  </div>

  <!-- Background Decoration -->
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
</div>
