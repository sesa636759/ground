<div class="login-container">
  <div class="login-card">
    <!-- Logo/Brand -->
    <div class="login-header">
      <div class="logo">
        <img [src]="assets.ICONS.BRAND" alt="Schneider Electric" class="login-logo-img" />
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Demo Credentials Info -->
    <div class="demo-banner">
      <ui-icon name="lightbulb" library="lucide" size="18px" class="demo-icon"></ui-icon>
      <div class="demo-content">
        <strong>Demo Login:</strong>
        <span>demo@example.com / demo123</span>
      </div>
      <ui-button
        label="Use Demo"
        variant="filled"
        type="button"
        (click)="loginWithDemo()"
      ></ui-button>
    </div>

    <!-- Error Message -->
    <div class="alert alert-error" *ngIf="error()">
      <ui-icon name="alert-triangle" library="lucide" size="18px" class="alert-icon"></ui-icon>
      <span>{{ error() }}</span>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <ui-icon name="mail" library="lucide" size="18px" class="input-icon"></ui-icon>
          <ui-input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="credentials.email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          ></ui-input>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <ui-input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            (ngModelChange)="onPasswordChange()"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
            <ng-container suffix>
              <ui-button
                type="button"
                class="toggle-password px-6 min-w-0"
                (click)="togglePasswordVisibility()"
                variant="ghost"
                size="sm"
                [title]="showPassword() ? 'Hide password' : 'Show password'"
              >
                <ui-icon
                  [name]="showPassword() ? 'eye-off' : 'eye'"
                  library="lucide"
                  size="18px"
                ></ui-icon>
              </ui-button>
            </ng-container>
          </ui-input>
        </div>

        <!-- Password Strength Indicator -->
        <!-- <div class="password-strength" *ngIf="credentials.password">
          <ui-icon
            name="lock"
            library="lucide"
            size="16px"
            [class]="'strength-icon ' + passwordStrength()"
          ></ui-icon>
          <div class="strength-bar">
            <div
              class="strength-fill"
              [class.weak]="passwordStrength() === 'weak'"
              [class.medium]="passwordStrength() === 'medium'"
              [class.strong]="passwordStrength() === 'strong'"
            ></div>
          </div>
          <span class="strength-label" [class]="passwordStrength()">
            {{
              passwordStrength() === 'weak'
                ? 'Weak'
                : passwordStrength() === 'medium'
                  ? 'Medium'
                  : 'Strong'
            }}
          </span>
        </div> -->
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="checkbox-label">
          <ui-checkbox name="rememberMe" [(ngModel)]="credentials.rememberMe"></ui-checkbox>
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <ui-button
        type="submit"
        [label]="!loading() ? 'Sign In' : 'Signing in...'"
        size="xl"
        variant="primary"
        full-width
        [disabled]="loading()"
      >
      </ui-button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social Login Options -->
    <div class="social-login">
      <ui-button
        size="xxl"
        label="Google"
        icon="logo-google"
        icon-library="ionicons"
        icon-position="top"
        type="button"
        variant="outline"
        class="btn-social btn-google"
      >
      </ui-button>
      <ui-button
        size="xxl"
        label="GitHub"
        icon="logo-github"
        icon-library="ionicons"
        icon-position="top"
        type="button"
        variant="outline"
        class="btn-social btn-github"
      >
      </ui-button>
      <ui-button
        size="xxl"
        label="Microsoft"
        icon="logo-microsoft"
        icon-library="ionicons"
        icon-position="top"
        type="button"
        variant="outline"
        class="btn-social btn-microsoft"
      >
      </ui-button>
    </div>
    <div class="primary-login-container">
      <ui-button
        size="xl"
        label="Schneider Elec."
        icon="assets/images/Schneider-Electric-Logo.jpg"
        icon-position="top"
        type="button"
        variant="outline"
        class="btn-social btn-schneider"
      >
      </ui-button>
    </div>

    <!-- Register Link -->
    <div class="register-prompt">
      Don't have an account?
      <a routerLink="/register" class="register-link">Create one now</a>
    </div>
  </div>
</div>

<!-- Background Decoration -->
<div class="background-decoration">
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
</div>
