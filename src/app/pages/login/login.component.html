<div class="login-container">
  <div class="login-card">
    <!-- Logo/Brand -->
    <div class="login-header">
      <div class="logo">🚀</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Demo Credentials Info -->
    <div class="demo-banner">
      <ui-icon name="lightbulb" library="lucide" size="18px" class="demo-icon"></ui-icon>
      <div class="demo-content">
        <strong>Demo Login:</strong>
        <span>demo@example.com / demo123</span>
      </div>
      <ui-button
        label="Use Demo"
        variant="filled"
        type="button"
        class="btn-demo-fill"
        (click)="loginWithDemo()"
      ></ui-button>
    </div>

    <!-- Error Message -->
    <div class="alert alert-error" *ngIf="error()">
      <ui-icon name="alert-triangle" library="lucide" size="18px" class="alert-icon"></ui-icon>
      <span>{{ error() }}</span>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <ui-icon name="mail" library="lucide" size="18px" class="input-icon"></ui-icon>
          <app-input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="credentials.email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          ></app-input>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <ui-icon name="lock" library="lucide" size="18px" class="input-icon"></ui-icon>
          <app-input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
            <ng-container suffix>
              <ui-button
                type="button"
                class="toggle-password"
                (click)="togglePasswordVisibility()"
                variant="ghost"
                size="sm"
                style="padding:0 6px;min-width:0;"
                [title]="showPassword() ? 'Hide password' : 'Show password'"
              >
                <ui-icon [name]="showPassword() ? 'eye-off' : 'eye'" library="lucide" size="18px"></ui-icon>
              </ui-button>
            </ng-container>
          </app-input>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <label class="checkbox-label">
          <app-checkbox name="rememberMe" [(ngModel)]="credentials.rememberMe"></app-checkbox>
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <ui-button
        type="submit"
        [label]="!loading() ? 'Sign In' : 'Signing in...'"
        icon="spinner"
        class="btn-primary btn-large"
        [disabled]="loading()"
      >
        <!-- @if (!loading()) {
          <span>Sign In</span>
        }
        @if (loading()) {
          <span class="loading-content">
            <span class="spinner"></span>
            <span>Signing in...</span>
          </span>
        } -->
      </ui-button>

      |
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social Login Options -->

      <ui-button label="Google" icon="lucide-google" type="button" class="btn-social btn-google">
      </ui-button>
      <ui-button label="GitHub" icon="github" type="button" class="btn-social btn-github">
      </ui-button>
      <ui-button
        label="Microsoft"
        icon="lucide-microsoft"
        type="button"
        class="btn-social btn-microsoft"
      >

      </ui-button>
    </div>

    <!-- Register Link -->
    <div class="register-prompt">
      Don't have an account?
      <a routerLink="/register" class="register-link">Create one now</a>
    </div>
  </div>

  <!-- Background Decoration -->
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
