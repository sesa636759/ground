<pg-playground
  [items]="[{ id: 'config', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['config']"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.layout"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Standard Tree', value: 'tree' },
            { label: 'Org Chart', value: 'org-chart' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Bordered', value: 'bordered' },
            { label: 'Rounded', value: 'rounded' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Vertical', value: 'vertical' },
            { label: 'Horizontal', value: 'horizontal' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Indent (px)</label>
        <dui-input type="number" [(ngModel)]="pgConfig.indent" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Connector Width</label>
        <dui-input
          type="number"
          [(ngModel)]="pgConfig.connectorWidth"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Connector Color</label>
        <dui-input
          type="color"
          [(ngModel)]="pgConfig.connectorColor"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Connector Opacity</label>
        <dui-input
          type="number"
          step="0.1"
          min="0"
          max="1"
          [(ngModel)]="pgConfig.connectorOpacity"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.showLines" (ngModelChange)="updateConfig()" /> Lines
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.showIcons" (ngModelChange)="updateConfig()" /> Icons
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.expandable" (ngModelChange)="updateConfig()" />
        Expandable
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.selectable" (ngModelChange)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.multiSelect" (ngModelChange)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.checkboxes" (ngModelChange)="updateConfig()" />
        Checkboxes
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.searchable" (ngModelChange)="updateConfig()" /> Search
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.showGlow" (ngModelChange)="updateConfig()" /> Glow
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.enableDrag" (ngModelChange)="updateConfig()" /> Drag &
        Drop
      </label>
    </div>
  </div>

  <div actions class="action-buttons">
    <dui-button
      class="btn-action"
      variant="secondary"
      (click)="expandAll()"
      label="Expand All"
    ></dui-button>
    <dui-button
      class="btn-action"
      variant="secondary"
      (click)="collapseAll()"
      label="Collapse All"
    ></dui-button>
  </div>

  <div
    preview
    class="preview-stage"
    [style.background]="pgConfig.theme === 'dark' ? '#0f172a' : ''"
  >
    <app-tree
      #treeElement
      [nodes]="demoData"
      [attr.layout]="pgConfig.layout"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.theme]="pgConfig.theme"
      [attr.orientation]="pgConfig.orientation"
      [attr.indent]="pgConfig.indent"
      [attr.connector-width]="pgConfig.connectorWidth"
      [attr.connector-color]="pgConfig.connectorColor"
      [attr.connector-opacity]="pgConfig.connectorOpacity"
      [attr.show-lines]="pgConfig.showLines"
      [attr.show-icons]="pgConfig.showIcons"
      [attr.expandable]="pgConfig.expandable"
      [attr.selectable]="pgConfig.selectable"
      [attr.multi-select]="pgConfig.multiSelect"
      [attr.checkboxes]="pgConfig.checkboxes"
      [attr.searchable]="pgConfig.searchable"
      [attr.animated]="pgConfig.animated"
      [attr.show-glow]="pgConfig.showGlow"
      [attr.enable-drag]="pgConfig.enableDrag"
      (nodeToggle)="onNodeToggle($event)"
      (nodeSelect)="onNodeSelect($event)"
      (checkChange)="onCheckChange($event)"
    >
    </app-tree>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>

  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
