<pg-playground
  [items]="pgAccordionItems"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Group Configuration -->
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Group Label</label>
      <ui-input
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Select an option"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size tier</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Theme Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Layout Configuration -->
  <div slot="content-layout" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Display Layout</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="layoutOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.layout === 'grid'">
      <label>Grid Columns</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.columns"
        (ngModelChange)="updateConfig()"
        [min]="1"
        [max]="6"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Label Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="labelPositionOptions"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" class="pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.buttonGroup" (ngModelChange)="updateConfig()"></ui-checkbox>
        Button Group
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.allowEmpty" (ngModelChange)="updateConfig()"></ui-checkbox>
        Allow Empty
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showDot" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Dot
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rippleEffect" (ngModelChange)="updateConfig()"></ui-checkbox>
        Ripple Effect
      </label>
    </div>
  </div>

  <!-- Manage Options -->
  <div slot="content-items" class="pg-panel-container">
    <div *ngFor="let opt of radioOptions; let i = index; trackBy: trackByOption" class="option-editor">
      <div class="option-editor-header">
        <span class="option-title">Option {{ i + 1 }}</span>
        <button class="remove-btn" (click)="removeOption(i)" *ngIf="radioOptions.length > 1">
          <ui-icon name="trash-2" library="lucide" size="16px"></ui-icon>
        </button>
      </div>
      <div class="control-grid">
        <div class="control-group">
          <label>Value</label>
          <ui-input [(ngModel)]="opt.value" (ngModelChange)="updateConfig()"></ui-input>
        </div>
        <div class="control-group">
          <label>Label</label>
          <ui-input [(ngModel)]="opt.label" (ngModelChange)="updateConfig()"></ui-input>
        </div>
        <div class="control-group">
          <label>Description</label>
          <ui-input [(ngModel)]="opt.description" (ngModelChange)="updateConfig()"></ui-input>
        </div>
        <div class="control-group">
          <label>Custom Icon</label>
          <ui-input [(ngModel)]="opt.customIcon" (ngModelChange)="updateConfig()" placeholder="Icon name"></ui-input>
        </div>
        <div class="control-group">
          <label>Badge</label>
          <ui-input [(ngModel)]="opt.badge" (ngModelChange)="updateConfig()"></ui-input>
        </div>
          <div class="control-group">
            <label class="checkbox-item mt-24">
            <ui-checkbox [(ngModel)]="opt.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
            Disabled
          </label>
        </div>
      </div>
    </div>
    <button class="add-btn" (click)="addOption()">
      <ui-icon name="plus" library="lucide" size="16px"></ui-icon> Add Option
    </button>
  </div>

  <!-- Validation & Help -->
  <div slot="content-validation" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Error Message</label>
      <ui-input [(ngModel)]="pgConfig.errorMessage" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label class="checkbox-item mt-24">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></ui-checkbox>
        Force Invalid State
      </label>
    </div>
  </div>

  <!-- Preview -->
  <div
    preview
    class="preview-stage flex-justify-center flex-items-start p-40"
  >
    <div class="w-full max-w-500">
      <ui-radio-group
        #radioGroup
        [attr.label]="pgConfig.label"
        [attr.name]="pgConfig.name"
        [attr.layout]="pgConfig.layout"
        [attr.columns]="pgConfig.columns"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.variant]="pgConfig.variant"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.button-group]="pgConfig.buttonGroup ? '' : null"
        [attr.allow-empty]="pgConfig.allowEmpty ? '' : null"
        [attr.show-dot]="pgConfig.showDot ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
        [attr.ripple-effect]="pgConfig.rippleEffect ? '' : null"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-message]="pgConfig.errorMessage"
        [value]="pgConfig.value"
        (radioGroupChange)="onRadioGroupChange($event)"
      >
        <ui-radio
          *ngFor="let opt of radioOptions"
          [attr.value]="opt.value"
          [attr.label]="opt.label"
          [attr.description]="opt.description || null"
          [attr.badge]="opt.badge || null"
          [attr.tooltip]="opt.tooltip || null"
          [attr.custom-icon]="opt.customIcon || null"
          [attr.disabled]="opt.disabled ? '' : null"
          [attr.color]="opt.color || null"
          [attr.size]="opt.size || null"
        ></ui-radio>
      </ui-radio-group>
      
      <div class="mt-24 text-muted text-center">
        Active Value: <span class="font-semibold text-primary-color">{{ pgConfig.value || 'None' }}</span>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
