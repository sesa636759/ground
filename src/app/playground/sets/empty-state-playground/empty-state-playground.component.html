<pg-playground [items]="pgAccordionItems" [defaultOpen]="defaultOpen">
  <!-- General Section -->
  <div slot="content-general" class="control-grid empty-general-section">
    <div class="control-group">
      <label>Type</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'No Data', value: 'no-data' },
          { label: 'No Results', value: 'no-results' },
          { label: 'No Projects', value: 'no-projects' },
          { label: 'Empty Cart', value: 'empty-cart' },
          { label: 'Error', value: 'error' },
          { label: '404 Not Found', value: '404' },
          { label: 'Empty', value: 'empty' },
          { label: 'Coming Soon', value: 'coming-soon' },
          { label: 'Maintenance', value: 'maintenance' },
          { label: 'Custom', value: 'custom' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Outlined', value: 'outlined' },
          { label: 'Filled', value: 'filled' },
          { label: 'Minimal', value: 'minimal' },
          { label: 'Glass', value: 'glass' },
          { label: 'Minimalistic', value: 'minimalistic' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Small', value: 'small' },
          { label: 'Medium', value: 'medium' },
          { label: 'Large', value: 'large' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Alignment</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.align"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Left', value: 'left' },
          { label: 'Center', value: 'center' },
          { label: 'Right', value: 'right' },
        ]"
      ></dui-dropdown>
    </div>
  </div>

  <!-- Content Section -->
  <div slot="content-content" class="control-grid empty-content-section">
    <div class="control-group full-width">
      <label>Heading</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.heading"
        (ngModelChange)="updateConfig()"
        placeholder="Default"
      />
    </div>

    <div class="control-group full-width">
      <label>Message</label>
      <textarea
        class="custom-textarea"
        [(ngModel)]="pgConfig.message"
        (ngModelChange)="updateConfig()"
        placeholder="Default"
        rows="3"
        class="empty-message-textarea"
      ></textarea>
    </div>

    <div class="control-group full-width">
      <label>Illustration URL</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.illustration"
        (ngModelChange)="updateConfig()"
        placeholder="Optional image URL"
      />
    </div>
  </div>

  <!-- Actions Section -->
  <div slot="content-actions" class="control-grid empty-actions-section">
    <div class="control-group">
      <label>Primary Action</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.primaryAction"
        (ngModelChange)="updateConfig()"
      />
    </div>
    <div class="control-group">
      <label>Primary Icon</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.primaryActionIcon"
        (ngModelChange)="updateConfig()"
      />
    </div>

    <div class="control-group">
      <label>Secondary Action</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.secondaryAction"
        (ngModelChange)="updateConfig()"
      />
    </div>
    <div class="control-group">
      <label>Secondary Icon</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.secondaryActionIcon"
        (ngModelChange)="updateConfig()"
      />
    </div>

    <div class="checkbox-grid full-width mt-8">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.showBackButton" (ngModelChange)="updateConfig()" />
        Show Back Button
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.loadingAction" (ngModelChange)="updateConfig()" />
        Loading State
      </label>
    </div>
  </div>

  <!-- Visuals Section -->
  <div slot="content-visuals" class="control-grid empty-visuals-section">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.rounded" (ngModelChange)="updateConfig()" /> Rounded
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.elevated" (ngModelChange)="updateConfig()" /> Elevated
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.compact" (ngModelChange)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()" /> Animated
      </label>
    </div>
  </div>

  <div preview class="empty-preview">
    <dui-empty-state
      #emptyStateElement
      [attr.type]="pgConfig.type"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.align]="pgConfig.align"
      [attr.heading]="pgConfig.heading || null"
      [attr.message]="pgConfig.message || null"
      [attr.illustration]="pgConfig.illustration || null"
      [attr.rounded]="pgConfig.rounded ? '' : null"
      [attr.elevated]="pgConfig.elevated ? '' : null"
      [attr.compact]="pgConfig.compact ? '' : null"
      [attr.animated]="pgConfig.animated ? '' : null"
      [attr.show-back-button]="pgConfig.showBackButton ? '' : null"
      [attr.primary-action]="pgConfig.primaryAction || null"
      [attr.primary-action-icon]="pgConfig.primaryActionIcon"
      [attr.secondary-action]="pgConfig.secondaryAction || null"
      [attr.secondary-action-icon]="pgConfig.secondaryActionIcon"
      [attr.loading-action]="pgConfig.loadingAction ? 'primary' : null"
      (actionClick)="onActionClick($event)"
      (backClick)="onBackClick($event)"
    ></dui-empty-state>
  </div>

  <div events>
    <pg-playground-event-log
      [logs]="eventLog()"
      (clear)="eventLog.set([])"
    ></pg-playground-event-log>
  </div>

  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      label="Generated Code"
      activeLang="html"
      [expanded]="true"
    ></dui-code-preview>
  }
</pg-playground>

<!-- All possible variants/examples -->
<div class="empty-variants-section">
  <h3>All Variants & Examples</h3>
  <div class="empty-variants-grid">
    <dui-empty-state
      type="no-data"
      variant="default"
      size="medium"
      align="center"
      heading="No Data"
      message="No data available."
      rounded
    ></dui-empty-state>
    <dui-empty-state
      type="no-results"
      variant="outlined"
      size="large"
      align="left"
      heading="No Results"
      message="Try another search."
      elevated
    ></dui-empty-state>
    <dui-empty-state
      type="empty-cart"
      variant="filled"
      size="small"
      align="right"
      heading="Empty Cart"
      message="Your cart is empty."
      compact
    ></dui-empty-state>
    <dui-empty-state
      type="error"
      variant="glass"
      size="medium"
      align="center"
      heading="Error"
      message="Something went wrong."
      animated
    ></dui-empty-state>
    <dui-empty-state
      type="404"
      variant="minimal"
      size="large"
      align="center"
      heading="404 Not Found"
      message="Page not found."
      show-back-button
    ></dui-empty-state>
    <dui-empty-state
      type="coming-soon"
      variant="minimalistic"
      size="medium"
      align="center"
      heading="Coming Soon"
      message="Stay tuned!"
      primary-action="Notify Me"
      primary-action-icon="fas fa-bell"
    ></dui-empty-state>
    <dui-empty-state
      type="maintenance"
      variant="default"
      size="medium"
      align="center"
      heading="Maintenance"
      message="We'll be back soon."
      secondary-action="Learn More"
      secondary-action-icon="fas fa-book"
    ></dui-empty-state>
    <dui-empty-state
      type="custom"
      variant="glass"
      size="large"
      align="right"
      heading="Custom State"
      message="Custom illustration."
      illustration="https://via.placeholder.com/150"
    ></dui-empty-state>
  </div>
</div>
