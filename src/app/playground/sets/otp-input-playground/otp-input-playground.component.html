<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid otp-global-section">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Length</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.length"
        (ngModelChange)="updateConfig()"
        min="1"
        max="10"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Initial Value</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Group Size (0 for none)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.groupSize"
        (ngModelChange)="updateConfig()"
        min="0"
        max="5"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Input Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Appearance & Styles -->
  <div slot="content-appearance" class="control-grid otp-appearance-section">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="colorOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.secure" (ngModelChange)="updateConfig()"></ui-checkbox>
        Secure (Masked)
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton Loader
      </label>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" class="control-grid otp-states-section">
    <div class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></ui-checkbox>
      Invalid State
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.helperText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.invalid">
      <label>Error Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.errorText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonsly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoFocus"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Focus
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoSubmit"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Submit
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage otp-preview">
    <div class="otp-preview-inner">
      <ui-otp-input
        #demoElement
        [attr.length]="pgConfig.length"
        [attr.value]="pgConfig.value"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-text]="pgConfig.invalid ? pgConfig.errorText : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.type]="pgConfig.type"
        [attr.auto-focus]="pgConfig.autoFocus ? '' : null"
        [attr.secure]="pgConfig.secure ? '' : null"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.auto-submit]="pgConfig.autoSubmit ? '' : null"
        [attr.group-size]="pgConfig.groupSize > 0 ? pgConfig.groupSize : null"
        [attr.placeholder]="pgConfig.placeholder"
        (otpChange)="onOtpChange($event)"
        (otpComplete)="onOtpComplete($event)"
      ></ui-otp-input>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
