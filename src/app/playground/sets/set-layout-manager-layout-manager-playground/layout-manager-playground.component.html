<div class="playground-container">
  <div class="sidebar">
    <!-- Header Stats -->
    <div class="stats-panel">
      <div class="stat-item">
        <span class="label">Regions</span>
        <span class="value">{{ regions.length }}</span>
      </div>
      <div class="stat-item">
        <span class="label">Panels</span>
        <span class="value">{{ panelCount() }}</span>
      </div>
    </div>

    <!-- Quick Add -->
    <div class="control-panel">
      <h3>Quick Add Panel</h3>
      <div class="control-group">
        <label>Target Region</label>
        <ui-dropdown [(ngModel)]="quickAddRegionId" [options]="regionSelectOptions"></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Title</label>
        <ui-input [(ngModel)]="quickAddTitle" placeholder="Panel Title" />
      </div>
      <ui-button (click)="quickAddPanel()" class="btn primary" label="Add Panel"></ui-button>
    </div>

    <!-- Manage Regions -->
    <div class="control-panel">
      <h3>Manage Regions</h3>
      <div class="control-group">
        <label>New Region Name</label>
        <ui-input [(ngModel)]="newRegionName" placeholder="Region Name" />
      </div>
      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="newRegionType"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Navigation', value: 'navigation' },
            { label: 'Header Only', value: 'header-only' },
            { label: 'Content Only', value: 'content-only' },
            { label: 'Title Only', value: 'title-only' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="btn-row">
        <ui-button (click)="addRegion('start')" class="btn secondary" label="Add Start"></ui-button>
        <ui-button (click)="addRegion('end')" class="btn secondary" label="Add End"></ui-button>
      </div>
      <div class="control-group" style="margin-top: 10px">
        <label>Remove Region</label>
        <ui-dropdown [(ngModel)]="removeRegionId" [options]="regionSelectOptions"></ui-dropdown>
        <ui-button
          (click)="removeRegion()"
          class="btn danger"
          [disabled]="!removeRegionId"
          label="Remove"
        ></ui-button>
      </div>
    </div>

    <!-- Split & Merge -->
    <div class="control-panel">
      <h3>Split & Merge (Center)</h3>
      <div class="btn-row">
        <ui-button (click)="splitCenter('horizontal')" class="btn" label="Split H"></ui-button>
        <ui-button (click)="splitCenter('vertical')" class="btn" label="Split V"></ui-button>
        <ui-button (click)="mergeCenter()" class="btn" label="Merge"></ui-button>
      </div>
    </div>

    <!-- Panel Actions -->
    <div class="control-panel">
      <h3>Panel Actions</h3>
      <div class="control-group">
        <label>Panel ID</label>
        <ui-input [(ngModel)]="panelIdInput" placeholder="Panel ID" />
      </div>
      <div class="control-group">
        <label>Target Region</label>
        <ui-dropdown
          [(ngModel)]="targetMoveRegion"
          [options]="panelMoveRegionOptions"
        ></ui-dropdown>
      </div>
      <div class="btn-grid">
        <ui-button (click)="performPanelAction('move')" class="btn" label="Move"></ui-button>
        <ui-button (click)="performPanelAction('dock')" class="btn" label="Dock"></ui-button>
        <ui-button (click)="performPanelAction('popout')" class="btn" label="Popout"></ui-button>
        <ui-button
          (click)="performPanelAction('maximize')"
          class="btn"
          label="Maximize"
        ></ui-button>
        <ui-button (click)="performPanelAction('restore')" class="btn" label="Restore"></ui-button>
        <ui-button
          (click)="performPanelAction('remove')"
          class="btn danger"
          label="Remove"
        ></ui-button>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div class="status-bar" [class.ready]="statusClass() === 'ready'">Status: {{ status() }}</div>
    <div class="layout-container">
      <app-layout-manager #lm id="lm" direction="horizontal" regions="[]"></app-layout-manager>
    </div>
  </div>

  <div class="toast-container">
    <div *ngFor="let t of toasts()" class="toast" [class]="t.type">
      {{ t.msg }}
    </div>
  </div>
</div>
