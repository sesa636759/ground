<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global">
    <div class="control-section">
      <h3>Visual Settings</h3>
      <div class="control-grid">
        <div class="control-group">
          <label>Theme</label>
          <dui-dropdown
            [(ngModel)]="pgConfig.theme"
            (ngModelChange)="onConfigChange('theme', $event)"
            [options]="[
              { label: 'Light', value: 'light' },
              { label: 'Dark', value: 'dark' },
            ]"
          ></dui-dropdown>
        </div>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showGrid"
            (ngModelChange)="onConfigChange('showGrid', $event)"
          />
          Show Grid
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.autoSave"
            (ngModelChange)="onConfigChange('autoSave', $event)"
          />
          Auto Save
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.batchActions"
            (ngModelChange)="onConfigChange('batchActions', $event)"
          />
          Batch Actions
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.loadingState"
            (ngModelChange)="onConfigChange('loadingState', $event)"
          />
          Loading State
        </label>
        <label class="checkbox-item">
          <dui-checkbox [(ngModel)]="pgConfig.showAddButton" /> Show Add Button
        </label>
      </div>
    </div>

    <div class="control-section">
      <h3>Grid Settings</h3>
      <div class="control-grid">
        <div class="control-group">
          <label>Columns ({{ pgConfig.columns }})</label>
          <dui-input
            type="range"
            min="2"
            max="24"
            [(ngModel)]="pgConfig.columns"
            (ngModelChange)="onConfigChange('columns', $event)"
          />
        </div>
        <div class="control-group">
          <label>Row Height ({{ pgConfig.rowHeight }}px)</label>
          <dui-input
            type="range"
            min="50"
            max="300"
            [(ngModel)]="pgConfig.rowHeight"
            (ngModelChange)="onConfigChange('rowHeight', $event)"
          />
        </div>
        <div class="control-group">
          <label>Gap ({{ pgConfig.gap }}px)</label>
          <dui-input
            type="range"
            min="0"
            max="50"
            [(ngModel)]="pgConfig.gap"
            (ngModelChange)="onConfigChange('gap', $event)"
          />
        </div>
      </div>
    </div>

    <div class="control-section">
      <h3>Interaction</h3>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.enableDrag"
            (ngModelChange)="onConfigChange('enableDrag', $event)"
            label="Enable Drag"
          ></dui-checkbox>
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.enableResize"
            (ngModelChange)="onConfigChange('enableResize', $event)"
            label="Enable Resize"
          ></dui-checkbox>
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.compact"
            (ngModelChange)="onConfigChange('compact', $event)"
          />
          Compact Mode
        </label>
      </div>
    </div>

    <div class="control-section">
      <h3>Widget Settings</h3>
      <div class="control-grid">
        <div class="control-group">
          <label>Selection Mode</label>
          <dui-dropdown
            [(ngModel)]="pgConfig.widgetSelectionMode"
            (ngModelChange)="onConfigChange('widgetSelectionMode', $event)"
            [options]="[
              { label: 'Single', value: 'single' },
              { label: 'Multi', value: 'multi' },
            ]"
          ></dui-dropdown>
        </div>
      </div>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showWidgetHeader"
            (ngModelChange)="onConfigChange('showWidgetHeader', $event)"
          />
          Header
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showWidgetFooter"
            (ngModelChange)="onConfigChange('showWidgetFooter', $event)"
          />
          Footer
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.widgetDrag"
            (ngModelChange)="onConfigChange('widgetDrag', $event)"
          />
          Widget Drag
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.widgetResize"
            (ngModelChange)="onConfigChange('widgetResize', $event)"
          />
          Widget Resize
        </label>
      </div>
    </div>
  </div>
  <div preview class="dashboard-preview">
    <div class="toolbar">
      <dui-button (click)="triggerAction('undo')" label="Undo"></dui-button>
      <dui-button (click)="triggerAction('redo')" label="Redo"></dui-button>
      <dui-button (click)="triggerAction('save')" label="Save Layout"></dui-button>
      <dui-button (click)="triggerAction('load')" label="Load Layout"></dui-button>
      <dui-button (click)="triggerAction('reset')" class="danger" label="Reset"></dui-button>
    </div>

    <div class="preview-stage" [class.dark-theme]="pgConfig.theme === 'dark'">
      <dui-dashboard
        #dashboard
        id="dashboard"
        enable-search="true"
        enable-multi-select="true"
        enable-keyboard="true"
        enable-fullscreen="true"
        [attr.show-add-button]="pgConfig.showAddButton"
        [attr.breakpoints]="pgConfig.breakpoints"
        [attr.theme]="pgConfig.theme"
      ></dui-dashboard>
    </div>

    <div class="event-log-container" *ngIf="eventLog().length > 0">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>
    <dui-code-preview
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  </div>
</pg-playground>

<!-- All possible variants/examples -->
<div class="dashboard-variants-section">
  <h3>All Variants & Examples</h3>
  <div class="dashboard-variants-grid">
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="light"
      columns="12"
      show-add-button
    ></dui-dashboard>
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="dark"
      columns="6"
      show-add-button
    ></dui-dashboard>
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="glass"
      columns="4"
      show-add-button
    ></dui-dashboard>
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="light"
      columns="8"
      enable-drag
      enable-resize
    ></dui-dashboard>
    <dui-dashboard [widgets]="initialWidgets" theme="dark" columns="12" compact></dui-dashboard>
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="glass"
      columns="6"
      enable-drag
      enable-resize
      compact
    ></dui-dashboard>
    <dui-dashboard
      [widgets]="initialWidgets"
      theme="light"
      columns="12"
      batch-actions
      loading-state
    ></dui-dashboard>
    <dui-dashboard [widgets]="initialWidgets" theme="dark" columns="12" auto-save></dui-dashboard>
  </div>
</div>
