<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid p-16">
    <div class="control-grid">
      <div class="control-group">
        <label>Theme</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Dark (VS Code)', value: 'vs-dark' },
            { label: 'Light (VS Code)', value: 'vs-light' },
            { label: 'High Contrast', value: 'hc-black' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Language</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.language"
          (ngModelChange)="onLanguageChange()"
          [options]="[
            { label: 'JavaScript', value: 'javascript' },
            { label: 'HTML', value: 'html' },
            { label: 'CSS', value: 'css' },
            { label: 'JSON', value: 'json' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Display</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.labelDisplay"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Always', value: 'always' },
            { label: 'Hover', value: 'hover' },
            { label: 'Hidden', value: 'hidden' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Height</label>
        <dui-input
          type="text"
          [(ngModel)]="pgConfig.height"
          (ngModelChange)="updateConfig()"
          placeholder="400px"
        />
      </div>
    </div>

    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.toolbar" (ngModelChange)="updateConfig()" /> Show
        Toolbar
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.lineNumbers" (ngModelChange)="updateConfig()" /> Line
        Numbers
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Read Only
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <div class="editor-container w-full">
      <dui-code-editor
        [attr.theme]="pgConfig.theme"
        [attr.language]="pgConfig.language"
        [attr.height]="pgConfig.height"
        [attr.line-numbers]="pgConfig.lineNumbers ? '' : null"
        [attr.toolbar]="pgConfig.toolbar ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.toolbar-label-display]="pgConfig.labelDisplay"
        [value]="currentCode"
        (valueChange)="onValueChange()"
        (runCode)="onRunCode()"
      ></dui-code-editor>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
