<div class="playground-container">
  <div class="sidebar">
    <!-- Header Stats -->
    <div class="stats-panel">
      <div class="stat-item">
        <span class="label">Regions</span>
        <span class="value">{{ regions.length }}</span>
      </div>
      <div class="stat-item">
        <span class="label">Panels</span>
        <span class="value">{{ panelCount() }}</span>
      </div>
    </div>

    <!-- Quick Add -->
    <div class="control-panel">
      <h3>Quick Add Panel</h3>
      <div class="control-group">
        <label>Target Region</label>
        <dui-dropdown [(ngModel)]="quickAddRegionId" [options]="regionSelectOptions"></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Title</label>
        <dui-input [(ngModel)]="quickAddTitle" placeholder="Panel Title" />
      </div>
      <dui-button (click)="quickAddPanel()" class="btn primary" label="Add Panel"></dui-button>
    </div>

    <!-- Manage Regions -->
    <div class="control-panel">
      <h3>Manage Regions</h3>
      <div class="control-group">
        <label>New Region Name</label>
        <dui-input [(ngModel)]="newRegionName" placeholder="Region Name" />
      </div>
      <div class="control-group">
        <label>Type</label>
        <dui-dropdown
          [(ngModel)]="newRegionType"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Navigation', value: 'navigation' },
            { label: 'Header Only', value: 'header-only' },
            { label: 'Content Only', value: 'content-only' },
            { label: 'Title Only', value: 'title-only' },
          ]"
        ></dui-dropdown>
      </div>
      <div class="btn-row">
        <dui-button
          (click)="addRegion('start')"
          class="btn secondary"
          label="Add Start"
        ></dui-button>
        <dui-button (click)="addRegion('end')" class="btn secondary" label="Add End"></dui-button>
      </div>
      <div class="control-group layout-manager-remove-group">
        <label>Remove Region</label>
        <dui-dropdown [(ngModel)]="removeRegionId" [options]="regionSelectOptions"></dui-dropdown>
        <dui-button
          (click)="removeRegion()"
          class="btn danger"
          [disabled]="!removeRegionId"
          label="Remove"
        ></dui-button>
      </div>
    </div>

    <!-- Split & Merge -->
    <div class="control-panel">
      <h3>Split & Merge (Center)</h3>
      <div class="btn-row">
        <dui-button (click)="splitCenter('horizontal')" class="btn" label="Split H"></dui-button>
        <dui-button (click)="splitCenter('vertical')" class="btn" label="Split V"></dui-button>
        <dui-button (click)="mergeCenter()" class="btn" label="Merge"></dui-button>
      </div>
    </div>

    <!-- Panel Actions -->
    <div class="control-panel">
      <h3>Panel Actions</h3>
      <div class="control-group">
        <label>Panel ID</label>
        <dui-input [(ngModel)]="panelIdInput" placeholder="Panel ID" />
      </div>
      <div class="control-group">
        <label>Target Region</label>
        <dui-dropdown
          [(ngModel)]="targetMoveRegion"
          [options]="panelMoveRegionOptions"
        ></dui-dropdown>
      </div>
      <div class="btn-grid">
        <dui-button (click)="performPanelAction('move')" class="btn" label="Move"></dui-button>
        <dui-button (click)="performPanelAction('dock')" class="btn" label="Dock"></dui-button>
        <dui-button (click)="performPanelAction('popout')" class="btn" label="Popout"></dui-button>
        <dui-button
          (click)="performPanelAction('maximize')"
          class="btn"
          label="Maximize"
        ></dui-button>
        <dui-button
          (click)="performPanelAction('restore')"
          class="btn"
          label="Restore"
        ></dui-button>
        <dui-button
          (click)="performPanelAction('remove')"
          class="btn danger"
          label="Remove"
        ></dui-button>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div class="status-bar" [class.ready]="statusClass() === 'ready'">Status: {{ status() }}</div>
    <div class="layout-container">
      <app-layout-manager #lm id="lm" direction="horizontal" regions="[]"></app-layout-manager>
    </div>
  </div>

  <div class="toast-container">
    <div *ngFor="let t of toasts()" class="toast" [class]="t.type">
      {{ t.msg }}
    </div>
  </div>
</div>
