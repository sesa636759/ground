<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Type</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Line', value: 'line' },
          { label: 'Circle', value: 'circle' },
          { label: 'Dashboard', value: 'dashboard' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Status</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.status"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Normal', value: 'normal' },
          { label: 'Active', value: 'active' },
          { label: 'Success', value: 'success' },
          { label: 'Exception', value: 'exception' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Percent (0-100)</label>
      <dui-input
        type="number"
        min="0"
        max="100"
        [(ngModel)]="pgConfig.percent"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Stroke Width</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.strokeWidth"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Size (Circle/Dash)</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Small', value: 'small' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Width (CSS)</label>
      <dui-input
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 100%, 200px"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Steps</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.steps"
        (ngModelChange)="updateConfig()"
        placeholder="Divide into steps"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Label Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Outside', value: 'outside' },
          { label: 'Top', value: 'top' },
        ]"
      ></dui-dropdown>
    </div>
  </div>

  <!-- Visual Enhancements -->
  <div slot="content-visual" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Stroke Color</label>
      <dui-input
        type="color"
        [(ngModel)]="pgConfig.strokeColor"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Trail Color</label>
      <dui-input
        type="color"
        [(ngModel)]="pgConfig.trailColor"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Percentage Text Color</label>
      <dui-input
        type="color"
        [(ngModel)]="pgConfig.percentageColor"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Decimal Precision</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.decimalPrecision"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showInfo"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Info
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.indeterminate"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Indeterminate
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.liquid" (ngModelChange)="updateConfig()"></dui-checkbox>
        Liquid Effect
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()"></dui-checkbox>
        Glassmorphism
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.glow" (ngModelChange)="updateConfig()"></dui-checkbox>
        Glow Effect
      </label>
    </div>
  </div>

  <!-- Advanced Controls -->
  <div slot="content-advanced" class="control-grid pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showBuffer"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Buffer
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showPauseButton"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Pause
      </label>
      <label class="checkbox-item" *ngIf="pgConfig.showPauseButton">
        <dui-checkbox [(ngModel)]="pgConfig.paused" (ngModelChange)="updateConfig()"></dui-checkbox>
        Paused
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showTimeEstimate"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Time Est.
      </label>
    </div>

    <div class="control-group" *ngIf="pgConfig.showBuffer">
      <label>Buffer Percent</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.buffer"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group" *ngIf="pgConfig.showTimeEstimate">
      <label>Est. Time (Seconds)</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.estimatedTime"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group" *ngIf="pgConfig.type !== 'line'">
      <label>Gap Degree</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.gapDegree"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>

    <div class="control-group" *ngIf="pgConfig.type !== 'line'">
      <label>Gap Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.gapPosition"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Top', value: 'top' },
          { label: 'Bottom', value: 'bottom' },
          { label: 'Left', value: 'left' },
          { label: 'Right', value: 'right' },
        ]"
      ></dui-dropdown>
    </div>
  </div>

  <!-- Preview -->
  <div preview>
    <div class="preview-stage demo-preview-stage">
      <dui-progress
        class="w-full"
        [percent]="pgConfig.percent"
        [attr.type]="pgConfig.type"
        [attr.status]="pgConfig.status"
        [attr.stroke-width]="pgConfig.strokeWidth"
        [attr.size]="pgConfig.size"
        [attr.width]="pgConfig.width"
        [attr.stroke-linecap]="pgConfig.strokeLinecap"
        [attr.show-info]="pgConfig.showInfo ? '' : null"
        [attr.steps]="pgConfig.steps || null"
        [attr.gap-degree]="pgConfig.gapDegree"
        [attr.gap-position]="pgConfig.gapPosition"
        [attr.indeterminate]="pgConfig.indeterminate ? '' : null"
        [attr.liquid]="pgConfig.liquid ? '' : null"
        [attr.glass]="pgConfig.glass ? '' : null"
        [attr.glow]="pgConfig.glow ? '' : null"
        [attr.stroke-color]="pgConfig.strokeColor"
        [attr.trail-color]="pgConfig.trailColor"
        [attr.percent-color]="pgConfig.percentageColor"
        [attr.show-buffer]="pgConfig.showBuffer ? '' : null"
        [attr.buffer]="pgConfig.buffer"
        [attr.show-pause-button]="pgConfig.showPauseButton ? '' : null"
        [attr.paused]="pgConfig.paused ? '' : null"
        [attr.show-time-estimate]="pgConfig.showTimeEstimate ? '' : null"
        [attr.estimated-time]="pgConfig.estimatedTime"
        [attr.decimal-precision]="pgConfig.decimalPrecision"
        [attr.label-position]="pgConfig.labelPosition"
      ></dui-progress>
    </div>
  </div>
</pg-playground>
