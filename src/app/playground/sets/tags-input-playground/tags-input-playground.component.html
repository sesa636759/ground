<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-grid">
      <div class="control-group">
        <label>Label</label>
        <dui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Placeholder</label>
        <dui-input
          type="text"
          [(ngModel)]="pgConfig.placeholder"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Size</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.color"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Tags</label>
        <dui-input
          type="number"
          min="1"
          max="20"
          [(ngModel)]="pgConfig.maxTags"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.enableAutocomplete" (ngModelChange)="updateConfig()" />
        Autocomplete
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.allowDuplicates" (ngModelChange)="updateConfig()" />
        Allow Duplicates
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.caseSensitive" (ngModelChange)="updateConfig()" />
        Case Sensitive
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()" /> Invalid
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <app-tags-input
      [attr.label]="pgConfig.label"
      [attr.placeholder]="pgConfig.placeholder"
      [attr.size]="pgConfig.size"
      [attr.color]="pgConfig.color"
      [attr.variant]="pgConfig.variant"
      [attr.max-tags]="pgConfig.maxTags"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.readonly]="pgConfig.readonly ? '' : null"
      [attr.required]="pgConfig.required ? '' : null"
      [attr.invalid]="pgConfig.invalid ? '' : null"
      [attr.enable-autocomplete]="pgConfig.enableAutocomplete ? '' : null"
      [attr.allow-duplicates]="pgConfig.allowDuplicates ? '' : null"
      [attr.case-sensitive]="pgConfig.caseSensitive ? '' : null"
      [suggestions]="suggestions"
      (tagsChange)="onTagsChange($event)"
    ></app-tags-input>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>

<!-- All possible variants/examples -->
<div class="mt-32">
  <h3>All Variants & Examples</h3>
  <div class="flex-wrap gap-24">
    <app-tags-input
      label="Technologies"
      placeholder="Add a tag..."
      size="small"
      color="primary"
      variant="default"
      max-tags="5"
      suggestions="['JavaScript','TypeScript','Python']"
    ></app-tags-input>
    <app-tags-input
      label="Skills"
      placeholder="Add skill..."
      size="medium"
      color="success"
      variant="outlined"
      max-tags="10"
      enable-autocomplete
    ></app-tags-input>
    <app-tags-input
      label="Categories"
      placeholder="Add category..."
      size="large"
      color="danger"
      variant="filled"
      max-tags="3"
      allow-duplicates
    ></app-tags-input>
    <app-tags-input
      label="Readonly Tags"
      size="medium"
      color="info"
      variant="default"
      readonly
    ></app-tags-input>
    <app-tags-input
      label="Disabled Tags"
      size="small"
      color="warning"
      variant="outlined"
      disabled
    ></app-tags-input>
    <app-tags-input
      label="Required Tags"
      size="large"
      color="secondary"
      variant="filled"
      required
    ></app-tags-input>
    <app-tags-input
      label="Invalid Tags"
      size="medium"
      color="primary"
      variant="default"
      invalid
    ></app-tags-input>
    <app-tags-input
      label="Case Sensitive"
      size="medium"
      color="success"
      variant="outlined"
      case-sensitive
    ></app-tags-input>
  </div>
</div>
