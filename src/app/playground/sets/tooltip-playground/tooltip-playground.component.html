<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Content</label>
      <ui-input type="text" [(ngModel)]="pgConfig.content" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="standardPlacementOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Trigger</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.trigger"
        (ngModelChange)="updateConfig()"
        [options]="customTriggerOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
        [options]="animationOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Max Width (px)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.maxWidth" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Offset (px)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.offset" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Elevation (0-5)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.elevation" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Arrow Size (px)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.arrowSize" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Show Delay (ms)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.showDelay" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Hide Delay (ms)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.hideDelay" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Transition Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.transitionDuration"
        (ngModelChange)="updateConfig()"
      />
    </div>

    <div class="control-group">
      <label>Transition Timing</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.transitionTiming"
        (ngModelChange)="updateConfig()"
        [options]="timingOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Target Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.targetText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Target Icon Class</label>
      <ui-input type="text" [(ngModel)]="pgConfig.targetIcon" (ngModelChange)="updateConfig()" />
    </div>

    @if (pgConfig.useCustomColor) {
      <div class="control-group">
        <label>Custom BG Color</label>
        <ui-input
          type="color"
          [(ngModel)]="pgConfig.customColor"
          (ngModelChange)="updateConfig()"
          class="h-40 w-full cursor-pointer"
        ></ui-input>
      </div>
      <div class="control-group">
        <label>Custom Text Color</label>
        <ui-input
          type="color"
          [(ngModel)]="pgConfig.textColor"
          (ngModelChange)="updateConfig()"
          class="h-40 w-full cursor-pointer"
        ></ui-input>
      </div>
    }
  </div>

  <div slot="content-behavior" class="checkbox-grid pg-panel-container">
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.arrow" (ngModelChange)="updateConfig()" /> Show Arrow
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.interactive" (ngModelChange)="updateConfig()" />
      Interactive
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.followCursor" (ngModelChange)="updateConfig()" />
      Follow Cursor
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.html" (ngModelChange)="updateConfig()" /> HTML Content
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.showGlow" (ngModelChange)="updateConfig()" /> Glow Effect
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.trackMouse" (ngModelChange)="updateConfig()" /> Track Mouse
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.openAtMousePosition" (ngModelChange)="updateConfig()" />
      Open at Mouse
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.visible" (ngModelChange)="updateConfig()" /> Force Show
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.closable" (ngModelChange)="updateConfig()" /> Closable
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.autoShift" (ngModelChange)="updateConfig()" /> Auto Shift
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.portal" (ngModelChange)="updateConfig()" /> Portal
    </label>
    <label class="checkbox-item">
      <ui-checkbox [(ngModel)]="pgConfig.useCustomColor" (ngModelChange)="updateConfig()" /> Use
      Custom Colors
    </label>
  </div>

  <div preview class="preview-stage">
    <div class="playground-actions">
      <ui-button
        variant="ghost"
        size="sm"
        [label]="pgConfig.visible ? 'Hide Tooltip' : 'Show Tooltip'"
        icon="lucide/eye"
        (click)="pgConfig.visible = !pgConfig.visible; updateConfig()"
      ></ui-button>
    </div>

    <div class="tooltip-target-wrapper">
      <ui-tooltip
        [attr.content]="pgConfig.content"
        [attr.position]="pgConfig.position"
        [attr.trigger]="pgConfig.trigger"
        [attr.variant]="pgConfig.variant"
        [attr.shape]="pgConfig.shape"
        [attr.animation]="pgConfig.animation"
        [attr.arrow]="pgConfig.arrow ? '' : null"
        [attr.max-width]="pgConfig.maxWidth"
        [attr.show-delay]="pgConfig.showDelay"
        [attr.hide-delay]="pgConfig.hideDelay"
        [attr.interactive]="pgConfig.interactive ? '' : null"
        [attr.follow-cursor]="pgConfig.followCursor ? '' : null"
        [attr.html]="pgConfig.html ? '' : null"
        [attr.show-glow]="pgConfig.showGlow ? '' : null"
        [attr.custom-color]="pgConfig.useCustomColor ? pgConfig.customColor : null"
        [attr.text-color]="pgConfig.useCustomColor ? pgConfig.textColor : null"
        [attr.elevation]="pgConfig.elevation"
        [attr.offset]="pgConfig.offset"
        [attr.transition-duration]="pgConfig.transitionDuration"
        [attr.transition-timing]="pgConfig.transitionTiming"
        [attr.arrow-size]="pgConfig.arrowSize"
        [attr.track-mouse]="pgConfig.trackMouse ? '' : null"
        [attr.open-at-mouse-position]="pgConfig.openAtMousePosition ? '' : null"
        [attr.auto-shift]="pgConfig.autoShift ? '' : null"
        [attr.portal]="pgConfig.portal ? '' : null"
        [attr.visible]="pgConfig.visible ? '' : null"
        [attr.closable]="pgConfig.closable ? '' : null"
      >
        <ui-button slot="target" class="playground-target-btn" variant="primary">
          <i [class]="pgConfig.targetIcon"></i>
          {{ pgConfig.targetText }}
        </ui-button>
      </ui-tooltip>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
