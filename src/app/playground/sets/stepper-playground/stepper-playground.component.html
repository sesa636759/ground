<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid stepper-global-section">
    <div class="control-section">
      <h3>Layout</h3>
      <div class="control-group">
        <label>Orientation</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (ngModelChange)="updateConfig()"
          [options]="orientationOptions"
        ></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Size</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="sizeOptions"
        ></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Variant</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="variantOptions"
        ></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Color Scheme</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.colorScheme"
          (ngModelChange)="updateConfig()"
          [options]="colorOptions"
        ></dui-dropdown>
      </div>
    </div>

    <div class="control-section">
      <h3>Positioning</h3>
      <div class="control-group">
        <label>Label Position</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.labelPosition"
          (ngModelChange)="updateConfig()"
          [options]="labelPositionOptions"
        ></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Flow Type</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.flow"
          (ngModelChange)="updateConfig()"
          [options]="flowOptions"
        ></dui-dropdown>
      </div>
      <div class="control-group">
        <label>Icon Library</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.iconLibrary"
          (ngModelChange)="updateConfig()"
          [options]="iconLibraryOptions"
        ></dui-dropdown>
      </div>
    </div>

    <div class="control-section">
      <h3>Limits</h3>
      <div class="control-group">
        <label>Active Step (0-based)</label>
        <dui-input
          type="number"
          min="0"
          [max]="steps.length - 1"
          [(ngModel)]="pgConfig.activeStep"
          (ngModelChange)="updateConfig()"
        ></dui-input>
      </div>
      <div class="control-group">
        <label>Steps Per Page (0=all)</label>
        <dui-input
          type="number"
          min="0"
          [(ngModel)]="pgConfig.stepsPerPage"
          (ngModelChange)="updateConfig()"
        ></dui-input>
      </div>
      <div class="control-group">
        <label>Max Visible Steps</label>
        <dui-input
          type="number"
          min="1"
          [(ngModel)]="pgConfig.maxVisibleSteps"
          (ngModelChange)="updateConfig()"
        ></dui-input>
      </div>
    </div>

    <div class="control-section">
      <h3>Toggles</h3>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showNumbers"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Show Numbers
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showDescriptions"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Show Descriptions
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.progressDot"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Progress Dot
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showControls"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Show Controls
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.animated"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Animated
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.showProgress"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Show Progress
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.compact"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Compact
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.scrollable"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Scrollable
        </label>
        <label class="checkbox-item">
          <dui-checkbox
            [(ngModel)]="pgConfig.clickable"
            (ngModelChange)="updateConfig()"
          ></dui-checkbox>
          Clickable
        </label>
      </div>
    </div>
  </div>

  <div preview class="preview-stage stepper-preview">
    <dui-stepper
      [attr.orientation]="pgConfig.orientation"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.color-scheme]="pgConfig.colorScheme"
      [attr.active-step]="pgConfig.activeStep"
      [attr.label-position]="pgConfig.labelPosition"
      [attr.flow]="pgConfig.flow"
      [attr.show-numbers]="pgConfig.showNumbers ? '' : null"
      [attr.show-descriptions]="pgConfig.showDescriptions ? '' : null"
      [attr.show-controls]="pgConfig.showControls ? '' : null"
      [attr.progress-dot]="pgConfig.progressDot ? '' : null"
      [attr.animated]="pgConfig.animated ? '' : null"
      [attr.show-progress]="pgConfig.showProgress ? '' : null"
      [attr.compact]="pgConfig.compact ? '' : null"
      [attr.scrollable]="pgConfig.scrollable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.steps-per-page]="pgConfig.stepsPerPage"
      [attr.max-visible-steps]="pgConfig.maxVisibleSteps"
      [attr.icon-library]="pgConfig.iconLibrary"
      [steps]="stepsJson"
      (stepperChange)="onStepChange($event)"
      (stepperPrevious)="onEvent($event, 'stepperPrevious')"
      (stepperNext)="onEvent($event, 'stepperNext')"
      (stepperFinish)="onEvent($event, 'stepperFinish')"
      (stepperFail)="onEvent($event, 'stepperFail')"
    ></dui-stepper>

    <div class="step-content-preview stepper-content-preview">
      <h3>{{ steps[pgConfig.activeStep]?.label }}</h3>
      <p>{{ steps[pgConfig.activeStep]?.description }}</p>
    </div>
  </div>

  <!-- All possible variants/examples -->
  <div class="stepper-variants-section">
    <h3>All Variants & Examples</h3>
    <div class="stepper-variants-grid">
      <dui-stepper
        [steps]="stepsJson"
        orientation="horizontal"
        variant="default"
        color-scheme="primary"
        show-numbers
        show-descriptions
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="vertical"
        variant="panel"
        color-scheme="success"
        show-controls
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="horizontal"
        variant="navigation"
        color-scheme="warning"
        progress-dot
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="vertical"
        variant="outlined"
        color-scheme="danger"
        animated
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="horizontal"
        variant="minimal"
        color-scheme="primary"
        compact
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="vertical"
        variant="filled"
        color-scheme="success"
        scrollable
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="horizontal"
        variant="snack"
        color-scheme="warning"
        clickable
      ></dui-stepper>
      <dui-stepper
        [steps]="stepsJson"
        orientation="vertical"
        variant="inline"
        color-scheme="danger"
        show-progress
      ></dui-stepper>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
