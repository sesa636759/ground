<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown [options]="directionOptions" [(ngModel)]="pgConfig.direction" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Gutter Size (px)</label>
      <ui-input type="number" [(ngModel)]="pgConfig.gutterSize" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Snap Threshold</label>
      <ui-input type="number" [(ngModel)]="pgConfig.snapThreshold" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showGutterIcon" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Gutter Handle
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></ui-checkbox>
        Right-to-Left
      </label>
    </div>
  </div>

  <div slot="content-style" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown [options]="themeOptions" [(ngModel)]="pgConfig.theme" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Gutter Base Color</label>
      <ui-input type="color" [(ngModel)]="pgConfig.gutterColor" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Gutter Hover Color</label>
      <ui-input type="color" [(ngModel)]="pgConfig.gutterHoverColor" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rounded" (ngModelChange)="updateConfig()"></ui-checkbox>
        Rounded Gutter
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.elevated" (ngModelChange)="updateConfig()"></ui-checkbox>
        Elevated
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()"></ui-checkbox>
        Animated Transitions
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.doubleClickCollapse" (ngModelChange)="updateConfig()"></ui-checkbox>
        Double Click to Collapse
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.keyboardNavigation" (ngModelChange)="updateConfig()"></ui-checkbox>
        Keyboard Navigation
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.persistState" (ngModelChange)="updateConfig()"></ui-checkbox>
        Persist State (Local Storage)
      </label>
    </div>
  </div>

  <div preview>
    <div class="preview-stage splitter-demo-container flex-stretch">
      <ui-splitter
        [attr.direction]="pgConfig.direction"
        [attr.gutter-size]="pgConfig.gutterSize"
        [attr.gutter-color]="pgConfig.gutterColor"
        [attr.gutter-hover-color]="pgConfig.gutterHoverColor"
        [attr.snap-threshold]="pgConfig.snapThreshold"
        [attr.theme]="pgConfig.theme"
        [attr.animated]="pgConfig.animated ? '' : null"
        [attr.rounded]="pgConfig.rounded ? '' : null"
        [attr.elevated]="pgConfig.elevated ? '' : null"
        [attr.show-gutter-icon]="pgConfig.showGutterIcon ? '' : null"
        [attr.double-click-collapse]="pgConfig.doubleClickCollapse ? '' : null"
        [attr.keyboard-navigation]="pgConfig.keyboardNavigation ? '' : null"
        [attr.persist-state]="pgConfig.persistState ? '' : null"
        [attr.rtl]="pgConfig.rtl ? '' : null"
        (sizeChange)="onSizeChange($event)"
        (panelCollapse)="onPanelCollapse($event)"
        class="w-full h-full"
        style="border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; background: white;"
      >
        <div slot="panel-0" class="splitter-panel-content flex-column gap-12">
          <h4 class="m-0">File Explorer</h4>
          <div class="text-muted-sm">
            <p>src/</p>
            <p class="pl-12">app/</p>
            <p class="pl-24">main.ts</p>
            <p class="pl-24">app.component.ts</p>
          </div>
        </div>
        <div slot="panel-1" class="splitter-panel-content flex-column gap-12">
          <h4 class="m-0">Code Editor</h4>
          <pre class="code-block-minimal"><code>export class AppComponent &#123;
  title = 'AngularGround';
&#125;</code></pre>
        </div>
      </ui-splitter>
    </div>
  </div>
</pg-playground>
