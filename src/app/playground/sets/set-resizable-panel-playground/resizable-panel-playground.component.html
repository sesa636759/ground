<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-grid">
      <div class="control-group">
        <label>Direction</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.direction"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Handle Size (px)</label>
        <ui-input
          type="number"
          [(ngModel)]="pgConfig.handleSize"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Snap Threshold (px)</label>
        <ui-input
          type="number"
          [(ngModel)]="pgConfig.snapThreshold"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showHandleIcon" (ngModelChange)="updateConfig()" />
        Show Icon
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.snapToEdge" (ngModelChange)="updateConfig()" /> Snap to
        Edge
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.collapsible1" (ngModelChange)="updateConfig()" /> P1
        Collapsible
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.collapsible3" (ngModelChange)="updateConfig()" /> P3
        Collapsible
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <ui-eesizable-panel
      [attr.direction]="pgConfig.direction"
      [attr.theme]="pgConfig.theme"
      [handleSize]="pgConfig.handleSize"
      [attr.show-handle-icon]="pgConfig.showHandleIcon ? '' : null"
      [attr.snap-to-edge]="pgConfig.snapToEdge ? '' : null"
      [snapThreshold]="pgConfig.snapThreshold"
      [attr.animated]="pgConfig.animated ? '' : null"
      [panels]="panelsData"
      (panelResize)="onPanelResize($event)"
      (panelCollapse)="onPanelCollapse($event)"
      style="height: 100%; width: 100%"
    >
      <div slot="panel-1" class="panel-content highlight">
        <h3 style="margin: 0">Left Panel</h3>
        <p>Drag handle to resize.</p>
      </div>
      <div slot="panel-2" class="panel-content">
        <h3 style="margin: 0">Middle Panel</h3>
        <p>Flexible center area.</p>
      </div>
      <div slot="panel-3" class="panel-content highlight">
        <h3 style="margin: 0">Right Panel</h3>
        <p>Responsive area.</p>
      </div>
    </ui-eesizable-panel>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
