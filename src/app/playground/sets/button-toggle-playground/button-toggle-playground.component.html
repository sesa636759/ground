<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Settings -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.mode"
        (ngModelChange)="updateConfig()"
        [options]="modeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="orientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Group Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Initial Value</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.helperText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Error Message</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.errorMessage"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Appearance & Style -->
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="colorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Icon Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconPosition"
        (ngModelChange)="updateConfig()"
        [options]="iconPositionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Display Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.displayMode"
        (ngModelChange)="updateConfig()"
        [options]="displayModeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Advanced Theme</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.advancedTheme"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. glass-theme"
      ></ui-input>
    </div>
  </div>

  <!-- Behavior & States -->
  <div slot="content-behavior" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.multiSelect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Multi Select
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.fullWidth"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Full Width
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></ui-checkbox>
        Invalid
      </label>
    </div>

    <div class="control-grid mt-16" *ngIf="pgConfig.mode === 'dropdown'">
      <div class="control-group">
        <label>Action Label</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.buttonActionLabel"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
      <div class="control-group">
        <label class="checkbox-item">
          <ui-checkbox
            [(ngModel)]="pgConfig.keepButtonLabel"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          Keep Action Label
        </label>
      </div>
      <div class="control-group">
        <label class="checkbox-item">
          <ui-checkbox
            [(ngModel)]="pgConfig.customContent"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          Custom Dropdown Content
        </label>
      </div>
    </div>
  </div>

  <!-- Advanced Features -->
  <div slot="content-advanced" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.searchEnabled"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Enable Search
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.batchActions"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Batch Actions
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.exportEnabled"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Export Button
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.importEnabled"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Import Button
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.analyticsEnabled"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Analytics Tracking
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview>
    <div
      class="preview-stage h-scrollable p-24 display-flex justify-center items-center min-h-200"
      
    >
      <ui-button-toggle-group
        #demoElement
        [attr.mode]="pgConfig.mode"
        [attr.orientation]="pgConfig.orientation"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.shape]="pgConfig.shape"
        [attr.icon-position]="pgConfig.iconPosition"
        [attr.display-mode]="pgConfig.displayMode"
        [attr.label]="pgConfig.label"
        [attr.name]="pgConfig.name"
        [attr.value]="pgConfig.value"
        [attr.helper-text]="pgConfig.helperText"
        [attr.full-width]="pgConfig.fullWidth ? '' : null"
        [attr.keep-button-label]="pgConfig.keepButtonLabel ? '' : null"
        [attr.custom-content]="pgConfig.customContent ? '' : null"
        [attr.button-action-label]="pgConfig.buttonActionLabel"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.error-message]="pgConfig.errorMessage"
        [options]="jsonOptions(playgroundOptions)"
        [attr.multi-select]="pgConfig.multiSelect ? '' : null"
        [attr.batch-actions]="pgConfig.batchActions ? '' : null"
        [attr.search-enabled]="pgConfig.searchEnabled ? '' : null"
        [attr.export-enabled]="pgConfig.exportEnabled ? '' : null"
        [attr.import-enabled]="pgConfig.importEnabled ? '' : null"
        [attr.analytics-enabled]="pgConfig.analyticsEnabled ? '' : null"
        [attr.advanced-theme]="pgConfig.advancedTheme"
        (buttonToggleGroupChange)="onPlaygroundChange($event)"
        (buttonToggleGroupAction)="onPlaygroundAction($event)"
      >
        <div
          *ngIf="pgConfig.customContent"
          slot="dropdown-content"
          class="custom-slot-content p-12 min-w-200"
          
        >
          <p  class="mb-8-only font-semibold">Custom Filter Content</p>
          <ui-input type="text" placeholder="Filter results..."></ui-input>
          <div  class="display-flex gap-8 mt-12">
            <ui-button label="Apply" size="xs" variant="primary"></ui-button>
            <ui-button label="Clear" size="xs" variant="outline"></ui-button>
          </div>
        </div>
      </ui-button-toggle-group>
    </div>
  </div>

  <!-- Event Log -->
  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
