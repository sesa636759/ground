<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="['brand']"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Accordion Slots -->
  <div slot="content-brand" class="control-grid brand-section">
    <div class="control-group">
      <label>Brand Name</label>
      <dui-input type="text" [(ngModel)]="pgConfig.brandName" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <div slot="content-user" class="control-grid user-section">
    <div class="control-group">
      <label>User Name</label>
      <dui-input type="text" [(ngModel)]="pgConfig.userName" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>User Role</label>
      <dui-input type="text" [(ngModel)]="pgConfig.userRole" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>User Avatar URL</label>
      <dui-input type="text" [(ngModel)]="pgConfig.userAvatar" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <div slot="content-style" class="control-grid style-section">
    <div class="control-group">
      <label>Theme</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Accent Color</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.accentColor"
        (ngModelChange)="updateConfig()"
        [options]="accentColorOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-group style-checkbox-group">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.collapsed"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Collapsed
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div class="sidebar-wrapper" preview>
    <app-modern-sidebar
      #sidebarElement
      [attr.brand-name]="pgConfig.brandName"
      [attr.selected-id]="pgConfig.selectedId"
      [attr.accent-color]="pgConfig.accentColor"
      [attr.user-name]="pgConfig.userName"
      [attr.user-role]="pgConfig.userRole"
      [attr.user-avatar]="pgConfig.userAvatar"
      [attr.collapsed]="pgConfig.collapsed ? 'true' : null"
      [attr.theme]="pgConfig.theme"
      [items]="sidebarItems"
      (itemSelected)="onItemSelected($event)"
      (sidebarToggled)="onSidebarToggled($event)"
      (profileClicked)="onProfileClick()"
      class="sidebar-block"
    ></app-modern-sidebar>
  </div>

  <div class="content-area-preview" preview>
    <div class="content-header-sim">
      <h3>Main Content Area</h3>
      <p>Interact with the sidebar to see events logged in the Events tab.</p>
    </div>
    <div class="content-cards">
      <div class="sim-card"></div>
      <div class="sim-card"></div>
    </div>
  </div>
</pg-playground>
