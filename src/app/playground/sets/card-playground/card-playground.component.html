<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="['global', 'behavior', 'style']"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Title</label>
      <ui-input
        name="title"
        type="text"
        [(ngModel)]="pgConfig.title"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Extra (Header)</label>
      <ui-input
        name="extra"
        type="text"
        [(ngModel)]="pgConfig.extra"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Layout</label>
      <ui-dropdown
        name="layout"
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Vertical', value: 'vertical' },
          { label: 'Horizontal', value: 'horizontal' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        name="size"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Small', value: 'small' },
          { label: 'Large', value: 'large' },
        ]"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-behavior" class="checkbox-grid" style="padding: 16px">
    <label class="checkbox-item">
      <ui-checkbox
        name="hoverable"
        [(ngModel)]="pgConfig.hoverable"
        (ngModelChange)="updateConfig()"
      />
      Hoverable
    </label>
    <label class="checkbox-item">
      <ui-checkbox
        name="bordered"
        [(ngModel)]="pgConfig.bordered"
        (ngModelChange)="updateConfig()"
      />
      Bordered
    </label>
    <label class="checkbox-item">
      <ui-checkbox name="loading" [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" />
      Loading
    </label>
    <label class="checkbox-item">
      <ui-checkbox
        name="flippable"
        [(ngModel)]="pgConfig.flippable"
        (ngModelChange)="updateConfig()"
      />
      Flippable
    </label>
    <label class="checkbox-item">
      <ui-checkbox
        name="closable"
        [(ngModel)]="pgConfig.closable"
        (ngModelChange)="updateConfig()"
      />
      Closable
    </label>
    <label class="checkbox-item">
      <ui-checkbox name="glass" [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()" />
      Glass
    </label>
    <label class="checkbox-item">
      <ui-checkbox
        name="collapsible"
        [(ngModel)]="pgConfig.collapsible"
        (ngModelChange)="updateConfig()"
      />
      Collapsible
    </label>
    <label class="checkbox-item">
      <ui-checkbox
        name="selectable"
        [(ngModel)]="pgConfig.selectable"
        (ngModelChange)="updateConfig()"
      />
      Selectable
    </label>
    <label class="checkbox-item">
        <ui-checkbox
          name="clickable"
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        />
        Clickable
      </label>
  </div>

  <div slot="content-style" class="control-grid" style="padding: 16px">
    <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          name="variant"
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Elevated', value: 'elevated' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Primary', value: 'primary' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Danger', value: 'danger' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
    </div>
    <div class="control-group">
        <label>Importance</label>
        <ui-dropdown
          name="importance"
          [(ngModel)]="pgConfig.importance"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Standard', value: 'standard' },
            { label: 'Emphasized', value: 'emphasized' },
          ]"
        ></ui-dropdown>
    </div>
    <div class="control-group">
        <label>Pattern</label>
        <ui-dropdown
          name="pattern"
          [(ngModel)]="pgConfig.pattern"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Product', value: 'product' },
            { label: 'Shortcut', value: 'shortcut' },
          ]"
        ></ui-dropdown>
    </div>
    <div class="control-group">
        <label>Ribbon Text</label>
        <ui-input
          name="ribbon"
          type="text"
          [(ngModel)]="pgConfig.ribbon"
          (ngModelChange)="updateConfig()"
        ></ui-input>
    </div>
  </div>

  <div preview class="preview-stage" style="padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; background: #f8fafc;">
    <ui-card
      #cardSet
      [attr.card-title]="pgConfig.title"
      [attr.extra]="pgConfig.extra"
      [attr.cover]="pgConfig.cover"
      [attr.actions]="pgConfig.actions"
      [attr.hoverable]="pgConfig.hoverable ? '' : null"
      [attr.size]="pgConfig.size"
      [attr.bordered]="pgConfig.bordered ? 'true' : 'false'"
      [attr.type]="pgConfig.type"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.flippable]="pgConfig.flippable ? '' : null"
      [attr.flip-trigger]="pgConfig.flipTrigger"
      [attr.closable]="pgConfig.closable ? '' : null"
      [attr.menu-actions]="pgConfig.menuActions"
      [attr.layout]="pgConfig.layout"
      [attr.glass]="pgConfig.glass ? '' : null"
      [attr.variant]="pgConfig.variant"
      [attr.importance]="pgConfig.importance"
      [attr.pattern]="pgConfig.pattern"
      [attr.ribbon]="pgConfig.ribbon"
      [attr.ribbon-position]="pgConfig.ribbonPosition"
      [attr.ribbon-color]="pgConfig.ribbonColor"
      [attr.collapsible]="pgConfig.collapsible ? '' : null"
      [attr.collapsed]="pgConfig.collapsed ? '' : null"
      [attr.selectable]="pgConfig.selectable ? '' : null"
      [attr.selected]="pgConfig.selected ? '' : null"
      [attr.avatar]="pgConfig.avatar"
      [attr.avatar-icon]="pgConfig.avatarIcon"
      [attr.description]="pgConfig.description"
      [attr.tag]="pgConfig.tag"
      [attr.button-text]="pgConfig.buttonText"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.href]="pgConfig.href"
      [attr.target]="pgConfig.target"
      (cardAction)="onCardAction($event)"
      (cardClose)="onCardClose()"
      (cardToggle)="onCardCollapse($event)"
      (cardSelect)="onCardSelect($event)"
      (cardFlip)="onCardFlip($event)"
      style="width: 100%; max-width: 400px"
    >
      <p>Dynamic content area for the card set playground.</p>
      <div slot="back">
          <div style="padding: 20px; text-align: center;">
              <h3>Back Side</h3>
              <p>Custom content in the <code>back</code> slot.</p>
          </div>
      </div>
    </ui-card>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
