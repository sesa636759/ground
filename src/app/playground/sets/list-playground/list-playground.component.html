<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid list-global-section">
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        [options]="variantOptions"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.color"
        [options]="colorOptions"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        [options]="sizeOptions"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Subheader</label>
      <dui-input [(ngModel)]="pgConfig.subheader" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.dense" (ngModelChange)="updateConfig()"></dui-checkbox>
        Dense
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.dividers"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Dividers
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.flush" (ngModelChange)="updateConfig()"></dui-checkbox>
        Flush
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.rounded"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Rounded
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.elevated"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Elevated
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.horizontal"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Horizontal
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.numbered"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Numbered
      </label>
    </div>
  </div>

  <!-- Item Template -->
  <div slot="content-item" class="control-grid list-item-section">
    <div class="control-group">
      <label>Item Label</label>
      <dui-input [(ngModel)]="pgConfig.itemLabel" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Item Sublabel</label>
      <dui-input [(ngModel)]="pgConfig.itemSublabel" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Icon Class</label>
      <dui-input [(ngModel)]="pgConfig.itemIcon" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Action Icon</label>
      <dui-input [(ngModel)]="pgConfig.itemActionIcon" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Badge Text</label>
      <dui-input [(ngModel)]="pgConfig.itemBadge" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Counter</label>
      <dui-input [(ngModel)]="pgConfig.itemCounter" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showCheckbox"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Checkbox
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.itemDisabled"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Third Item Disabled
      </label>
    </div>
  </div>

  <!-- Advanced Features -->
  <div slot="content-features" class="control-grid list-features-section">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.multiSelect"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Multi Select
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.checkboxSelection"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Checkbox Selection Mode
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.searchable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Searchable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.loading"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Loading State
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.paginated"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Paginated
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.isDraggable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Draggable
      </label>
    </div>
    <div class="control-group" *ngIf="pgConfig.searchable">
      <label>Search Placeholder</label>
      <dui-input
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.paginated">
      <label>Items Per Page</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.itemsPerPage"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage list-preview">
    <div class="list-preview-inner">
      <dui-list
        [attr.variant]="pgConfig.variant"
        [attr.color]="pgConfig.color"
        [attr.size]="pgConfig.size"
        [attr.dense]="pgConfig.dense ? '' : null"
        [attr.dividers]="pgConfig.dividers ? '' : null"
        [attr.flush]="pgConfig.flush ? '' : null"
        [attr.horizontal]="pgConfig.horizontal ? '' : null"
        [attr.numbered]="pgConfig.numbered ? '' : null"
        [attr.selectable]="pgConfig.selectable ? '' : null"
        [attr.multi-select]="pgConfig.multiSelect ? '' : null"
        [attr.rounded]="pgConfig.rounded ? '' : null"
        [attr.elevated]="pgConfig.elevated ? '' : null"
        [attr.subheader]="pgConfig.subheader"
        [attr.searchable]="pgConfig.searchable ? '' : null"
        [attr.search-placeholder]="pgConfig.searchPlaceholder"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.paginated]="pgConfig.paginated ? '' : null"
        [attr.items-per-page]="pgConfig.itemsPerPage"
        [attr.is-draggable]="pgConfig.isDraggable ? '' : null"
        [attr.checkbox-selection]="pgConfig.checkboxSelection ? '' : null"
      >
        <dui-list-item
          [attr.label]="pgConfig.itemLabel + ' 1'"
          [attr.sublabel]="pgConfig.itemSublabel"
          [attr.icon]="pgConfig.itemIcon"
          [attr.action-icon]="pgConfig.itemActionIcon"
          [attr.badge]="pgConfig.itemBadge"
          [attr.badge-color]="pgConfig.itemBadgeColor"
          [attr.show-checkbox]="pgConfig.showCheckbox ? '' : null"
        ></dui-list-item>
        <dui-list-item
          [attr.label]="pgConfig.itemLabel + ' 2'"
          [attr.sublabel]="pgConfig.itemSublabel"
          [attr.icon]="pgConfig.itemIcon"
          [attr.action-icon]="pgConfig.itemActionIcon"
          [attr.counter]="pgConfig.itemCounter"
          [attr.show-checkbox]="pgConfig.showCheckbox ? '' : null"
        ></dui-list-item>
        <dui-list-item
          [attr.label]="pgConfig.itemLabel + ' 3'"
          [attr.sublabel]="pgConfig.itemSublabel"
          [attr.icon]="pgConfig.itemIcon"
          [attr.action-icon]="pgConfig.itemActionIcon"
          [attr.disabled]="pgConfig.itemDisabled ? '' : null"
          [attr.show-checkbox]="pgConfig.showCheckbox ? '' : null"
        ></dui-list-item>
      </dui-list>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
