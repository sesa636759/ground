<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Layout Section -->
  <div slot="content-layout" class="control-grid carousel-layout-section">
    <div class="control-group">
      <label>Slides To Show</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.slidesToShow"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: '1', value: 1 },
          { label: '2', value: 2 },
          { label: '3', value: 3 },
          { label: '4', value: 4 },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Slides To Scroll</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.slidesToScroll"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: '1', value: 1 },
          { label: '2', value: 2 },
          { label: '3', value: 3 },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.vertical"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Horizontal', value: false },
          { label: 'Vertical', value: true },
        ]"
      ></ui-dropdown>
    </div>

    <div class="checkbox-grid carousel-layout-checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.centerMode" (ngModelChange)="updateConfig()" />
        Center Mode
      </label>
    </div>
  </div>

  <!-- Animation Section -->
  <div slot="content-animation" class="control-grid carousel-animation-section">
    <div class="control-group">
      <label>Animation Effect</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.effect"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Slide', value: 'slide' },
          { label: 'Fade', value: 'fade' },
          { label: 'Cube', value: 'cube' },
          { label: 'Flip', value: 'flip' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.animationDuration"
        (ngModelChange)="updateConfig()"
        step="100"
      />
    </div>

    <div class="control-group">
      <label>Autoplay Interval (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.autoplayInterval"
        (ngModelChange)="updateConfig()"
        step="500"
      />
    </div>

    <div class="checkbox-grid carousel-animation-checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoplay" (ngModelChange)="updateConfig()" />
        Autoplay
      </label>
    </div>
  </div>

  <!-- Controls Section -->
  <div slot="content-controls" class="control-grid control-grid-padded">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.arrows" (ngModelChange)="updateConfig()" />
        Show Arrows
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.indicators" (ngModelChange)="updateConfig()" />
        Show Indicators
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showProgress" (ngModelChange)="updateConfig()" />
        Progress Bar
      </label>
    </div>
  </div>

  <!-- Behavior Section -->
  <div slot="content-behavior" class="control-grid control-grid-padded">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.infinite" (ngModelChange)="updateConfig()" />
        Infinite Loop
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.swipe" (ngModelChange)="updateConfig()" />
        Touch Swipe
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.draggable" (ngModelChange)="updateConfig()" />
        Mouse Draggable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.keyboard" (ngModelChange)="updateConfig()" />
        Keyboard Navigation
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.pauseOnHover" (ngModelChange)="updateConfig()" />
        Pause On Hover
      </label>
    </div>
  </div>

  <div preview class="preview-full">
    <div
      class="carousel-container carousel-preview-container"
      [class.vertical-mode]="pgConfig.vertical"
    >
      <ui-carousel
        #carouselElement
        [attr.slides-to-show]="pgConfig.slidesToShow"
        [attr.slides-to-scroll]="pgConfig.slidesToScroll"
        [attr.vertical]="pgConfig.vertical ? '' : null"
        [attr.animation-duration]="pgConfig.animationDuration"
        [attr.animation-easing]="pgConfig.animationEasing"
        [attr.autoplay-interval]="pgConfig.autoplayInterval"
        [attr.autoplay]="pgConfig.autoplay ? '' : null"
        [attr.arrows]="pgConfig.arrows ? '' : null"
        [attr.indicators]="pgConfig.indicators ? '' : null"
        [attr.infinite]="pgConfig.infinite ? '' : null"
        [attr.swipe]="pgConfig.swipe ? '' : null"
        [attr.keyboard]="pgConfig.keyboard ? '' : null"
        [attr.pause-on-hover]="pgConfig.pauseOnHover ? '' : null"
        [attr.effect]="pgConfig.effect"
        [attr.center-mode]="pgConfig.centerMode ? '' : null"
        [attr.center-padding]="pgConfig.centerMode ? '50px' : null"
        [attr.show-progress]="pgConfig.showProgress ? '' : null"
        [attr.draggable]="pgConfig.draggable ? '' : null"
      >
        <div
          *ngFor="let slide of dummySlides"
          class="slide slide-full"
          [style.background]="slide.color"
        >
          <div class="slide-content slide-content-centered">
            <h3 class="slide-title-large">{{ slide.title }}</h3>
            <p class="slide-desc-faded">{{ slide.desc }}</p>
          </div>
        </div>
      </ui-carousel>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
