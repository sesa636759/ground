<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global & Identity -->
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Value</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Name</label>
      <ui-input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()"></ui-input>
    </div>
  </div>

  <!-- Aesthetics & Style -->
  <div slot="content-appearance" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.fullWidth"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Full Width
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.floatingLabel"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Floating Label
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></ui-checkbox>
        RTL Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.rippleEffect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Ripple Effect
      </label>
    </div>
  </div>

  <!-- Decorators -->
  <div slot="content-decorators" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Prefix Icon (Lucide)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.prefixIcon"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Suffix Icon (Lucide)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.suffixIcon"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Prefix Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.prefixText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Suffix Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.suffixText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showClear"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Clear Button
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showCopy" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Copy Button
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showPasswordToggle"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Password Toggle
      </label>
    </div>
  </div>

  <!-- Behavior -->
  <div slot="content-behavior" class="control-grid pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoSelect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Select
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoTrim" (ngModelChange)="updateConfig()"></ui-checkbox>
        Auto Trim
      </label>
    </div>
    <div class="control-group">
      <label>Debounce (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.debounce"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Suggestions (comma separated)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.suggestions"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Validation -->
  <div slot="content-validation" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Validation State</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.validationState"
        (ngModelChange)="updateConfig()"
        [options]="validationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.helperText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Error Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.errorText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Mask</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.mask"
        (ngModelChange)="updateConfig()"
        [options]="maskOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Length</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxLength"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-item">
      <ui-checkbox
        [(ngModel)]="pgConfig.showCounter"
        (ngModelChange)="updateConfig()"
      ></ui-checkbox>
      Show Counter
    </div>
  </div>

  <!-- Special Types -->
  <div slot="content-special" class="control-grid pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.multiline"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Multiline (Textarea)
      </label>
      <label class="checkbox-item" *ngIf="pgConfig.multiline">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoResize"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Resize
      </label>
      <label class="checkbox-item" *ngIf="pgConfig.type === 'number'">
        <ui-checkbox
          [(ngModel)]="pgConfig.showSteppers"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Steppers
      </label>
    </div>
    <div class="control-group" *ngIf="pgConfig.multiline">
      <label>Rows</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.rows"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.type === 'file'">
      <label>Accept (e.g. .pdf, image/*)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.accept"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-item" *ngIf="pgConfig.type === 'file'">
      <ui-checkbox [(ngModel)]="pgConfig.multiple" (ngModelChange)="updateConfig()"></ui-checkbox>
      Allow Multiple
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage p-40 flex-column flex-items-start">
    <div class="max-w-500 w-full m-0-auto">
      <ui-input
        #demoElement
        [attr.type]="pgConfig.type"
        [attr.label]="pgConfig.label"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.value]="pgConfig.value"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.validation-state]="pgConfig.validationState"
        [attr.full-width]="pgConfig.fullWidth ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.show-clear]="pgConfig.showClear ? '' : null"
        [attr.show-password-toggle]="pgConfig.showPasswordToggle ? '' : null"
        [attr.show-steppers]="pgConfig.showSteppers ? '' : null"
        [attr.auto-select]="pgConfig.autoSelect ? '' : null"
        [attr.auto-trim]="pgConfig.autoTrim ? '' : null"
        [attr.multiline]="pgConfig.multiline ? '' : null"
        [attr.auto-resize]="pgConfig.autoResize ? '' : null"
        [attr.rows]="pgConfig.rows"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.prefix-text]="pgConfig.prefixText"
        [attr.suffix-text]="pgConfig.suffixText"
        [attr.prefix-icon]="pgConfig.prefixIcon"
        [attr.suffix-icon]="pgConfig.suffixIcon"
        [attr.badge]="pgConfig.badge"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-text]="pgConfig.errorText"
        [attr.success-text]="pgConfig.successText"
        [attr.max-length]="pgConfig.maxLength || null"
        [attr.show-counter]="pgConfig.showCounter ? '' : null"
        [attr.floating-label]="pgConfig.floatingLabel ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.debounce]="pgConfig.debounce"
        [attr.accept]="pgConfig.accept"
        [attr.multiple]="pgConfig.multiple ? '' : null"
        [attr.show-copy]="pgConfig.showCopy ? '' : null"
        [attr.mask]="pgConfig.mask !== 'none' ? pgConfig.mask : null"
        [attr.rtl]="pgConfig.rtl ? '' : null"
        [attr.inputmode]="pgConfig.inputmode"
        [attr.enterkeyhint]="pgConfig.enterkeyhint"
        [attr.password-icon]="pgConfig.passwordIcon"
        [attr.password-visible-icon]="pgConfig.passwordVisibleIcon"
        [attr.ripple-effect]="pgConfig.rippleEffect ? '' : null"
        (inputChange)="onInputChange($event)"
        (inputFocus)="onInputFocus()"
        (inputBlur)="onInputBlur()"
        (inputClear)="onInputClear()"
      ></ui-input>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
