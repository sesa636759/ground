<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Core Configuration Slot -->
  <div slot="content-core" class="control-grid context-menu-core-section">
    <div class="control-group">
      <label>Trigger</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.trigger"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Right Click', value: 'rightClick' },
          { label: 'Click', value: 'click' },
          { label: 'Hover', value: 'hover' },
        ]"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Min Width</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.minWidth"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 200px"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Height</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.maxHeight"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 400px"
      ></ui-input>
    </div>
    <div class="checkbox-group context-menu-core-checkbox-group">
      <ui-checkbox
        id="searchable"
        [(ngModel)]="pgConfig.searchable"
        (ngModelChange)="updateConfig()"
        label="Searchable"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="closeOnSelect"
        [(ngModel)]="pgConfig.closeOnSelect"
        (ngModelChange)="updateConfig()"
        label="Close On Select"
      ></ui-checkbox>
    </div>
  </div>

  <!-- Visual & Animation Slot -->
  <div slot="content-visuals" class="control-grid context-menu-visuals-section">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Glass', value: 'glass' },
        ]"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Animation Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animationType"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Slide', value: 'slide' },
          { label: 'Zoom', value: 'zoom' },
          { label: 'Fade', value: 'fade' },
        ]"
      ></ui-dropdown>
    </div>
    <div class="checkbox-group context-menu-visuals-checkbox-group">
      <ui-checkbox
        id="animated"
        [(ngModel)]="pgConfig.animated"
        (ngModelChange)="updateConfig()"
        label="Animated"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="staggered"
        [(ngModel)]="pgConfig.staggered"
        (ngModelChange)="updateConfig()"
        label="Staggered"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="reflection"
        [(ngModel)]="pgConfig.reflection"
        (ngModelChange)="updateConfig()"
        label="Reflection"
      ></ui-checkbox>
    </div>
  </div>

  <!-- Advanced Behavior Slot -->
  <div slot="content-behavior" class="control-grid context-menu-behavior-section">
    <div class="checkbox-group">
      <ui-checkbox
        id="backdrop"
        [(ngModel)]="pgConfig.backdrop"
        (ngModelChange)="updateConfig()"
        label="Enable Backdrop"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="multiSelect"
        [(ngModel)]="pgConfig.multiSelect"
        (ngModelChange)="updateConfig()"
        label="Multi-Select Mode"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="commandPalette"
        [(ngModel)]="pgConfig.commandPalette"
        (ngModelChange)="updateConfig()"
        label="Command Palette Mode"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showGroups"
        [(ngModel)]="pgConfig.showGroups"
        (ngModelChange)="updateConfig()"
        label="Show Item Groups"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="highlightSearch"
        [(ngModel)]="pgConfig.highlightSearch"
        (ngModelChange)="updateConfig()"
        label="Highlight Search Matched"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="keyboardNav"
        [(ngModel)]="pgConfig.keyboardNavigation"
        (ngModelChange)="updateConfig()"
        label="Keyboard Navigation"
      ></ui-checkbox>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--bg-secondary);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    "
    [class.glass-bg]="pgConfig.variant === 'glass'"
  >
    <div
      class="trigger-area"
      #playgroundTrigger
      id="playgroundTrigger"
      style="
        padding: 60px 80px;
        border: 2px dashed var(--border-color);
        border-radius: 16px;
        color: var(--text-secondary);
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: var(--surface-1);
      "
      [style.cursor]="pgConfig.trigger === 'hover' ? 'pointer' : 'default'"
    >
      <ui-button
        class="btn-demo"
        *ngIf="pgConfig.trigger === 'click'"
        label="Open Menu"
        variant="primary"
      ></ui-button>
      <span *ngIf="pgConfig.trigger === 'rightClick'">Right-click anywhere here</span>
      <span *ngIf="pgConfig.trigger === 'hover'">Hover here</span>
    </div>

    <app-context-menu
      #contextMenuElement
      [triggerElement]="playgroundTrigger"
      [trigger]="pgConfig.trigger"
      [searchable]="pgConfig.searchable"
      [animated]="pgConfig.animated"
      [animationType]="pgConfig.animationType"
      [variant]="pgConfig.variant"
      [staggered]="pgConfig.staggered"
      [backdrop]="pgConfig.backdrop"
      [commandPalette]="pgConfig.commandPalette"
      [multiSelect]="pgConfig.multiSelect"
      [closeOnSelect]="pgConfig.closeOnSelect"
      [showGroups]="pgConfig.showGroups"
      [highlightSearch]="pgConfig.highlightSearch"
      [reflection]="pgConfig.reflection"
      [keyboardNavigation]="pgConfig.keyboardNavigation"
      [maxHeight]="pgConfig.maxHeight"
      [minWidth]="pgConfig.minWidth"
      [backdropBlur]="pgConfig.backdropBlur"
      [items]="demoItems"
      (menuSelect)="onMenuSelect($event)"
      (menuOpen)="onMenuOpen()"
      (menuClose)="onMenuClose()"
    >
    </app-context-menu>

    <!-- Event Log -->
    <div
      events
      style="
        position: absolute;
        bottom: 24px;
        left: 24px;
        right: 24px;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 12px;
        font-family: monospace;
        font-size: 0.8rem;
        color: var(--text-secondary);
        border-left: 4px solid var(--primary-color);
      "
    >
      <strong>Last Event:</strong> {{ eventMessage() }}
    </div>
  </div>
</pg-playground>
