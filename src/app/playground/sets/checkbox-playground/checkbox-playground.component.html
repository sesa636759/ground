<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Settings -->
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Label</label>
      <ui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Error Message</label>
      <ui-input type="text" [(ngModel)]="pgConfig.errorMessage" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Value</label>
      <ui-input type="text" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Name</label>
      <ui-input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Visual Styles -->
  <div slot="content-visual" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="colorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Label Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="labelPositionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Custom Class</label>
      <ui-input type="text" [(ngModel)]="pgConfig.customClass" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Behavior & States -->
  <div slot="content-behavior" class="pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.checked" (ngModelChange)="updateConfig()"></ui-checkbox>
        Checked
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.indeterminate"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Indeterminate
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></ui-checkbox>
        Invalid
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></ui-checkbox>
        RTL
      </label>
    </div>

    <div class="checkbox-grid mt-16 border-subtle border-none border-t p-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableAnimation" (ngModelChange)="updateConfig()"></ui-checkbox>
        Animate
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rippleEffect" (ngModelChange)="updateConfig()"></ui-checkbox>
        Ripple
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.labelClickable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Label Clickable
      </label>
    </div>
  </div>

  <!-- Advanced & Icons -->
  <div slot="content-advanced" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Badge Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.badge" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Tooltip</label>
      <ui-input type="text" [(ngModel)]="pgConfig.tooltip" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Tooltip Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.tooltipPosition"
        (ngModelChange)="updateConfig()"
        [options]="tooltipPositionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Custom Check Icon (lucide)</label>
      <ui-input type="text" [(ngModel)]="pgConfig.customCheckIcon" (ngModelChange)="updateConfig()" placeholder="check" />
    </div>
    <div class="control-group">
      <label>Custom Indeterminate Icon (lucide)</label>
      <ui-input type="text" [(ngModel)]="pgConfig.customIndeterminateIcon" (ngModelChange)="updateConfig()" placeholder="minus" />
    </div>
    <div class="control-group">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showCheckIcon" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Check Icon
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview>
    <div class="preview-stage flex-center p-40 min-h-200">
      <ui-checkbox
        #demoElement
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-message]="pgConfig.errorMessage"
        [attr.value]="pgConfig.value"
        [attr.name]="pgConfig.name"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.checked]="pgConfig.checked ? '' : null"
        [attr.indeterminate]="pgConfig.indeterminate ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.show-check-icon]="pgConfig.showCheckIcon ? '' : null"
        [attr.custom-check-icon]="pgConfig.customCheckIcon"
        [attr.custom-indeterminate-icon]="pgConfig.customIndeterminateIcon"
        [attr.badge]="pgConfig.badge"
        [attr.tooltip]="pgConfig.tooltip"
        [attr.tooltip-position]="pgConfig.tooltipPosition"
        [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
        [attr.ripple-effect]="pgConfig.rippleEffect ? '' : null"
        [attr.label-clickable]="pgConfig.labelClickable ? '' : null"
        [attr.rtl]="pgConfig.rtl ? '' : null"
        [attr.custom-class]="pgConfig.customClass"
        (checkboxChange)="onCheckboxChange($event)"
        (checkboxFocus)="onCheckboxFocus()"
        (checkboxBlur)="onCheckboxBlur()"
      ></ui-checkbox>
    </div>
  </div>

  <!-- Events -->
  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
