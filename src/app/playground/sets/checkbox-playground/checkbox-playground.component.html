<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Settings -->
  <div slot="content-global" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Label</label>
      <dui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <dui-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Error Message</label>
      <dui-input type="text" [(ngModel)]="pgConfig.errorMessage" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Value</label>
      <dui-input type="text" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Name</label>
      <dui-input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Visual Styles -->
  <div slot="content-visual" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="colorOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Label Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="labelPositionOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Custom Class</label>
      <dui-input type="text" [(ngModel)]="pgConfig.customClass" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Behavior & States -->
  <div slot="content-behavior" class="pg-panel-container">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.checked"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Checked
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.indeterminate"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Indeterminate
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.readonly"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.required"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.invalid"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Invalid
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.skeleton"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></dui-checkbox>
        RTL
      </label>
    </div>

    <div class="checkbox-grid mt-16 border-subtle border-none border-t p-16">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.enableAnimation"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Animate
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.rippleEffect"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Ripple
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.labelClickable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Label Clickable
      </label>
    </div>
  </div>

  <!-- Advanced & Icons -->
  <div slot="content-advanced" class="control-grid pg-panel-container">
    <div class="control-group">
      <label>Badge Text</label>
      <dui-input type="text" [(ngModel)]="pgConfig.badge" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Tooltip</label>
      <dui-input type="text" [(ngModel)]="pgConfig.tooltip" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Tooltip Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.tooltipPosition"
        (ngModelChange)="updateConfig()"
        [options]="tooltipPositionOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Custom Check Icon (lucide)</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.customCheckIcon"
        (ngModelChange)="updateConfig()"
        placeholder="check"
      />
    </div>
    <div class="control-group">
      <label>Custom Indeterminate Icon (lucide)</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.customIndeterminateIcon"
        (ngModelChange)="updateConfig()"
        placeholder="minus"
      />
    </div>
    <div class="control-group">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showCheckIcon"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Check Icon
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview>
    <div class="preview-stage flex-center p-40 min-h-200">
      <dui-checkbox
        #demoElement
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-message]="pgConfig.errorMessage"
        [attr.value]="pgConfig.value"
        [attr.name]="pgConfig.name"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.checked]="pgConfig.checked ? '' : null"
        [attr.indeterminate]="pgConfig.indeterminate ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.show-check-icon]="pgConfig.showCheckIcon ? '' : null"
        [attr.custom-check-icon]="pgConfig.customCheckIcon"
        [attr.custom-indeterminate-icon]="pgConfig.customIndeterminateIcon"
        [attr.badge]="pgConfig.badge"
        [attr.tooltip]="pgConfig.tooltip"
        [attr.tooltip-position]="pgConfig.tooltipPosition"
        [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
        [attr.ripple-effect]="pgConfig.rippleEffect ? '' : null"
        [attr.label-clickable]="pgConfig.labelClickable ? '' : null"
        [attr.rtl]="pgConfig.rtl ? '' : null"
        [attr.custom-class]="pgConfig.customClass"
        (checkboxChange)="onCheckboxChange($event)"
        (checkboxFocus)="onCheckboxFocus()"
        (checkboxBlur)="onCheckboxBlur()"
      ></dui-checkbox>
    </div>
  </div>

  <!-- Events -->
  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
