<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Name</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.name"
        (ngModelChange)="updateConfig()"
        placeholder="Name"
      />
    </div>

    <div class="control-group">
      <label>Image Source (URL)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.src"
        (ngModelChange)="updateConfig()"
        placeholder="https://..."
      />
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'XS (24px)', value: 'xs' },
          { label: 'Small (32px)', value: 's' },
          { label: 'Medium (40px)', value: 'medium' },
          { label: 'Large (48px)', value: 'l' },
          { label: 'XL (64px)', value: 'xl' },
          { label: 'Custom (80px)', value: '80' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Icon Class</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="fa-solid fa-user"
      />
    </div>

    <div class="control-group">
      <label>Tooltip Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.tooltipText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Background Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.bgColor"
        (ngModelChange)="updateConfig()"
        style="height: 40px; padding: 0"
      />
    </div>

    <div class="control-group">
      <label>Text Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.textColor"
        (ngModelChange)="updateConfig()"
        style="height: 40px; padding: 0"
      />
    </div>
  </div>

  <div slot="content-status" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Status</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.status"
        (ngModelChange)="updateConfig()"
        [options]="statusOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Status Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.statusPosition"
        (ngModelChange)="updateConfig()"
        [options]="standardPlacementOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-visual" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
        [options]="animationOptions"
      ></ui-dropdown>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showStatus" (ngModelChange)="updateConfig()" /> Show
        Status
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.verified" (ngModelChange)="updateConfig()" /> Verified
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.editable" (ngModelChange)="updateConfig()" /> Editable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoColor" (ngModelChange)="updateConfig()" /> Auto Color
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.gradient" (ngModelChange)="updateConfig()" /> Gradient
      </label>
    </div>
  </div>

  <div preview>
    <div class="preview-stage">
      <div class="avatar-container">
        <app-avatar
          [attr.name]="pgConfig.name"
          [attr.src]="pgConfig.src"
          [attr.size]="pgConfig.size === 'medium' ? null : pgConfig.size"
          [attr.shape]="pgConfig.shape === 'circle' ? null : pgConfig.shape"
          [attr.bg-color]="pgConfig.bgColor"
          [attr.color]="pgConfig.textColor"
          [attr.icon]="pgConfig.icon"
          [attr.tooltip-text]="pgConfig.tooltipText"
          [attr.show-status]="pgConfig.showStatus ? '' : null"
          [attr.status]="pgConfig.status"
          [attr.status-position]="pgConfig.statusPosition"
          [attr.verified]="pgConfig.verified ? '' : null"
          [attr.loading]="pgConfig.loading ? '' : null"
          [attr.editable]="pgConfig.editable ? '' : null"
          [attr.auto-color]="pgConfig.autoColor ? '' : null"
          [attr.gradient]="pgConfig.gradient ? '' : null"
          [attr.animation]="pgConfig.animation === 'none' ? null : pgConfig.animation"
          (click)="onAction($event)"
          (upload)="onUpload()"
        ></app-avatar>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
