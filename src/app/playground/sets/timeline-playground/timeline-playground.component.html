<pg-playground
  [items]="[{ id: 'config', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['config']"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Orientation</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Vertical', value: 'vertical' },
            { label: 'Horizontal', value: 'horizontal' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Align</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.align"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
            { label: 'Center', value: 'center' },
            { label: 'Alternate', value: 'alternate' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Icon Position</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.iconPosition"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Center', value: 'center' },
            { label: 'Bottom', value: 'bottom' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Dots Only', value: 'dots-only' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <dui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></dui-dropdown>
      </div>

      <div class="control-group">
        <label>Line Color</label>
        <dui-input type="color" [(ngModel)]="pgConfig.lineColor" (ngModelChange)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.animateOnScroll" (ngModelChange)="updateConfig()" />
        Animate on Scroll
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.compact" (ngModelChange)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.clickable" (ngModelChange)="updateConfig()" />
        Clickable
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.showLine" (ngModelChange)="updateConfig()" /> Show Line
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.wrap" (ngModelChange)="updateConfig()" /> Wrap (Snake
        Layout)
      </label>
    </div>
  </div>

  <div preview class="preview-stage timeline-preview">
    <div class="timeline-container">
      <app-timeline
        [items]="timelineItems"
        [attr.orientation]="pgConfig.orientation"
        [attr.align]="pgConfig.align"
        [attr.icon-position]="pgConfig.iconPosition"
        [attr.variant]="pgConfig.variant"
        [attr.line-color]="pgConfig.lineColor"
        [attr.animate-on-scroll]="pgConfig.animateOnScroll"
        [attr.compact]="pgConfig.compact"
        [attr.clickable]="pgConfig.clickable"
        [attr.show-line]="pgConfig.showLine"
        [attr.wrap]="pgConfig.wrap"
        [attr.theme]="pgConfig.theme"
        (itemClick)="onItemClick($event)"
      ></app-timeline>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>

  <dui-code-preview
    code
    [htmlCode]="generatedCode()"
    [label]="'Generated Code'"
    activeLang="html"
    expanded="true"
  ></dui-code-preview>
</pg-playground>
