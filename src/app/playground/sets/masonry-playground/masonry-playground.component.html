<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Layout & Columns -->
  <div slot="content-layout" class="control-grid masonry-layout-section">
    <div class="control-group">
      <label>Layout Strategy</label>
      <dui-dropdown
        [options]="layoutTypeOptions"
        [(ngModel)]="pgConfig.layoutType"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Base Columns</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.columns"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Gap (px)</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.gap"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Min Item Width</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.itemMinWidth"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Max Item Width</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.itemMaxWidth"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Filtering & Sorting -->
  <div slot="content-data" class="control-grid masonry-data-section">
    <div class="control-group">
      <label>Filter By Category</label>
      <dui-input
        [(ngModel)]="pgConfig.filterBy"
        (ngModelChange)="updateConfig()"
        placeholder="category:nature"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Sort By</label>
      <dui-dropdown
        [options]="sortByOptions"
        [(ngModel)]="pgConfig.sortBy"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Sort Order</label>
      <dui-dropdown
        [options]="sortOrderOptions"
        [(ngModel)]="pgConfig.sortOrder"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showFilters"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Built-in Filters
      </label>
    </div>
  </div>

  <!-- Behavior & Interaction -->
  <div slot="content-behavior" class="control-grid masonry-behavior-section">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.enableAnimation"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Enable Animation
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.multiSelect"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Multi-Select
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showBatchActions"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Batch Actions
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.lightbox"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Lightbox Mode
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.loadingState"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Loading State (Skeleton)
      </label>
    </div>
    <div class="control-group">
      <label>Empty Message</label>
      <dui-input [(ngModel)]="pgConfig.emptyMessage" (ngModelChange)="updateConfig()"></dui-input>
    </div>
  </div>

  <!-- Advanced Optimization -->
  <div slot="content-advanced" class="control-grid masonry-advanced-section">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.lazyLoad"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Lazy Load Images
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.infiniteScroll"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Infinite Scroll
      </label>
    </div>
    <div class="control-group">
      <label>Infinite Scroll Distance</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.infiniteScrollDistance"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Preview -->
  <div preview>
    <div class="preview-stage masonry-preview">
      <dui-masonry
        [attr.items]="playgroundItems | json"
        [attr.columns]="pgConfig.columns"
        [attr.gap]="pgConfig.gap"
        [attr.layout-type]="pgConfig.layoutType"
        [attr.item-min-width]="pgConfig.itemMinWidth"
        [attr.item-max-width]="pgConfig.itemMaxWidth"
        [attr.filter-by]="pgConfig.filterBy"
        [attr.sort-by]="pgConfig.sortBy"
        [attr.sort-order]="pgConfig.sortOrder"
        [attr.animation-duration]="pgConfig.animationDuration"
        [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
        [attr.loading-state]="pgConfig.loadingState ? '' : null"
        [attr.empty-message]="pgConfig.emptyMessage"
        [attr.show-filters]="pgConfig.showFilters ? '' : null"
        [attr.filter-options]="pgConfig.filterOptions"
        [attr.lazy-load]="pgConfig.lazyLoad ? '' : null"
        [attr.infinite-scroll]="pgConfig.infiniteScroll ? '' : null"
        [attr.infinite-scroll-distance]="pgConfig.infiniteScrollDistance"
        [attr.selectable]="pgConfig.selectable ? '' : null"
        [attr.multi-select]="pgConfig.multiSelect ? '' : null"
        [attr.show-batch-actions]="pgConfig.showBatchActions ? '' : null"
        [attr.lightbox]="pgConfig.lightbox ? '' : null"
        (itemClick)="onItemClick($event)"
        (itemSelectionChange)="onSelectionChange($event)"
      ></dui-masonry>
    </div>
  </div>
</pg-playground>
