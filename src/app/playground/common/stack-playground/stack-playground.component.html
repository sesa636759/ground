<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Direction</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.direction"
        (ngModelChange)="updateConfig()"
        [options]="directionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Spacing</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.spacing"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 16px, -10px"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Align</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.align"
        (ngModelChange)="updateConfig()"
        [options]="alignOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Justify</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.justify"
        (ngModelChange)="updateConfig()"
        [options]="justifyOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Max Items (0 = all)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.overlap" (ngModelChange)="updateConfig()"></ui-checkbox>
        Overlap
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showDividers"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Dividers
      </label>
    </div>
  </div>

  <div slot="content-content" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Num Boxes</label>
      <ui-input
        type="number"
        min="1"
        max="10"
        [(ngModel)]="numBoxes"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div preview class="preview-stage">
    <div style="width: 100%; display: flex; justify-content: center; align-items: center">
      <ui-stack
        #stack
        [attr.direction]="pgConfig.direction"
        [attr.spacing]="pgConfig.spacing"
        [attr.align]="pgConfig.align"
        [attr.justify]="pgConfig.justify"
        [attr.max]="pgConfig.max"
        [attr.overlap]="pgConfig.overlap ? '' : null"
        [attr.show-dividers]="pgConfig.showDividers ? '' : null"
        style="width: 100%"
      >
        <div *ngFor="let i of boxes" class="box box-{{ i }}">{{ i }}</div>
      </ui-stack>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
