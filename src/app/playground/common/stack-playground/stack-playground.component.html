<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Direction</label>
      <ui-dropdown [options]="directionOptions" [(ngModel)]="pgConfig.direction" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Wrap</label>
      <ui-dropdown [options]="wrapOptions" [(ngModel)]="pgConfig.wrap" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Alignment (Cross)</label>
      <ui-dropdown [options]="alignOptions" [(ngModel)]="pgConfig.align" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Justify (Main)</label>
      <ui-dropdown [options]="justifyOptions" [(ngModel)]="pgConfig.justify" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Spacing (px/css)</label>
      <ui-input [(ngModel)]="pgConfig.spacing" (ngModelChange)="updateConfig()"></ui-input>
    </div>
  </div>

  <div slot="content-visual" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Divider Style</label>
      <ui-dropdown [options]="dividerOptions" [(ngModel)]="pgConfig.dividerType" (ngModelChange)="updateConfig()"></ui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showDividers" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Dividers
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.overlap" (ngModelChange)="updateConfig()"></ui-checkbox>
        Overlap Mode
      </label>
    </div>
  </div>

  <div slot="content-content" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Max Visible Items</label>
      <ui-input type="number" [(ngModel)]="pgConfig.max" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Total Item Count</label>
      <ui-input type="number" [(ngModel)]="numBoxes" (ngModelChange)="updateConfig()"></ui-input>
    </div>
  </div>

  <div preview>
    <div class="preview-stage" style="padding: 32px; min-height: 200px; background: #fff; width: 100%; border-radius: 8px; border: 1px dashed #cbd5e1;">
      <ui-stack
        [attr.direction]="pgConfig.direction"
        [attr.wrap]="pgConfig.wrap"
        [attr.spacing]="pgConfig.spacing"
        [attr.align]="pgConfig.align"
        [attr.justify]="pgConfig.justify"
        [attr.max]="pgConfig.max"
        [attr.overlap]="pgConfig.overlap ? '' : null"
        [attr.show-dividers]="pgConfig.showDividers ? '' : null"
        [attr.divider-type]="pgConfig.dividerType"
      >
        <div *ngFor="let i of boxes" class="box-item">
          {{ i }}
        </div>
      </ui-stack>
    </div>
  </div>
</pg-playground>

<style>
  .box-item {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    border: 2px solid #3b82f6;
    border-radius: 8px;
    color: #1e293b;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .stack-overlap .box-item {
    background: #3b82f6;
    color: white;
    border-color: white;
  }
</style>
