<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.sticky" (ngModelChange)="updateConfig()"></ui-checkbox>
        Sticky Position
      </label>
    </div>
  </div>

  <div slot="content-layout" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Icons
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div class="nav-wrapper" style="width: 100%">
      <ui-horizontal-nav
        #demoElement
        [attr.theme]="pgConfig.theme"
        [attr.sticky]="pgConfig.sticky ? '' : null"
        [model]="modelJson"
      ></ui-horizontal-nav>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
