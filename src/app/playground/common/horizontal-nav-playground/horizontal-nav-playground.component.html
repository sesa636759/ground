<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Theme</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.sticky" (ngModelChange)="updateConfig()"></dui-checkbox>
        Sticky Position
      </label>
    </div>
  </div>

  <div slot="content-layout" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Icons
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-40">
    <div class="nav-wrapper w-full">
      <dui-horizontal-nav
        #demoElement
        [attr.theme]="pgConfig.theme"
        [attr.sticky]="pgConfig.sticky ? '' : null"
        [model]="modelJson"
      ></dui-horizontal-nav>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
