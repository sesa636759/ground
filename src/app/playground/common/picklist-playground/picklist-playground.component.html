<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Placeholder</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Selection Mode</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.mode"
        (ngModelChange)="updateConfig()"
        [options]="modeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Options to Display</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.maxOptions"
        (ngModelChange)="updateConfig()"
        min="1"
        max="1000"
      ></dui-input>
    </div>
  </div>

  <!-- Appearance & Styles -->
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Icon Library</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></dui-dropdown>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.searchable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Searchable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.clearable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Clearable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.loading"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Loading state
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.grouped"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Enable Grouping
      </label>
    </div>

    <div class="control-group" *ngIf="pgConfig.searchable">
      <label>Search Placeholder</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Data Options (Premium Features) -->
  <div slot="content-data" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.creatable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Allow Creating New (Premium)
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showSelectAll"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Select All (Multi)
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.reorderable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Reorderable Tags (Multi)
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage p-80 min-h-400 justify-start items-center flex-col">
    <div class="w-full max-w-400">
      <dui-picklist
        #demoElement
        [options]="pgConfig.options"
        [value]="pgConfig.value"
        [attr.mode]="pgConfig.mode"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.searchable]="pgConfig.searchable ? '' : null"
        [attr.search-placeholder]="pgConfig.searchPlaceholder"
        [attr.clearable]="pgConfig.clearable ? '' : null"
        [attr.grouped]="pgConfig.grouped ? '' : null"
        [attr.icon-library]="pgConfig.iconLibrary"
        [attr.creatable]="pgConfig.creatable ? '' : null"
        [attr.show-select-all]="pgConfig.showSelectAll ? '' : null"
        [attr.reorderable]="pgConfig.reorderable ? '' : null"
        [attr.max-options]="pgConfig.maxOptions"
        (picklistChange)="onChange($event)"
      ></dui-picklist>
    </div>

    <div class="mt-24 text-muted fs-14">Selected Value: {{ pgConfig.value | json }}</div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
