<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Source Header</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.sourceHeader"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Target Header</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.targetHeader"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Filter Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.filterPlaceholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showSourceControls"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Source Controls
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showTargetControls"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Target Controls
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-picklist
      #demoElement
      [attr.source-header]="pgConfig.sourceHeader"
      [attr.target-header]="pgConfig.targetHeader"
      [attr.show-source-controls]="pgConfig.showSourceControls ? '' : null"
      [attr.show-target-controls]="pgConfig.showTargetControls ? '' : null"
      [attr.filter-placeholder]="pgConfig.filterPlaceholder"
      [source]="sourceJson"
      [target]="targetJson"
    >
      <!-- We can't really pass ng-template to a web component easily in raw HTML, but let's assume it works here. -->
      <ng-template let-item>
        <div style="display: flex; align-items: center; gap: 8px">
          <span>{{ item.icon }}</span>
          <span>{{ item.name }}</span>
        </div>
      </ng-template>
    </ui-picklist>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
