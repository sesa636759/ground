<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Value</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
        [disabled]="pgConfig.dot"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon Name</label>
      <ui-input type="text" [(ngModel)]="pgConfig.icon" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Icon Library</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Gradient</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.gradient"
        (ngModelChange)="updateConfig()"
        [options]="gradientOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Custom Color (hex)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.customColor"
        (ngModelChange)="updateConfig()"
        placeholder="#ff00ff"
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.customColor">
      <label>Custom Text Color (hex)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.customTextColor"
        (ngModelChange)="updateConfig()"
        placeholder="#ffffff"
      ></ui-input>
    </div>
  </div>

  <div slot="content-layout" class="control-grid p-16">
    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Offset X</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.offsetX"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Offset Y</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.offsetY"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
        [options]="animationOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.dot" (ngModelChange)="updateConfig()"></ui-checkbox>
        Dot Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glow Effect
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.interactive"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Interactive
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.closeable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Closeable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showZero" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Zero
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-60">
    <ui-badge
      [attr.value]="pgConfig.value"
      [attr.max]="pgConfig.max"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.shape]="pgConfig.shape"
      [attr.position]="pgConfig.position"
      [attr.animation]="pgConfig.animation"
      [attr.dot]="pgConfig.dot ? '' : null"
      [attr.glow]="pgConfig.glow ? '' : null"
      [attr.interactive]="pgConfig.interactive ? '' : null"
      [attr.closeable]="pgConfig.closeable ? '' : null"
      [attr.show-zero]="pgConfig.showZero ? '' : null"
      [attr.icon]="pgConfig.icon"
      [attr.icon-position]="pgConfig.iconPosition"
      [attr.icon-library]="pgConfig.iconLibrary"
      [attr.gradient]="pgConfig.gradient"
      [attr.custom-color]="pgConfig.customColor || null"
      [attr.custom-text-color]="pgConfig.customColor ? pgConfig.customTextColor : null"
      [attr.offset-x]="pgConfig.offsetX"
      [attr.offset-y]="pgConfig.offsetY"
      (badgeClick)="onBadgeClick()"
      (badgeClose)="onBadgeClose()"
    >
      <div
        class="w-60 h-60 bg-gradient-surface border rounded-12 display-flex items-center justify-center fs-24"
      >
        <ui-icon name="bell" library="lucide"></ui-icon>
      </div>
    </ui-badge>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
