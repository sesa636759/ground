<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Status</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.status"
        (ngModelChange)="updateConfig()"
        [options]="statusOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>OK Button Text</label>
      <dui-input
        [(ngModel)]="pgConfig.okText"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Save"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Cancel Button Text</label>
      <dui-input
        [(ngModel)]="pgConfig.cancelText"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Cancel"
      ></dui-input>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="control-group">
      <label>Backdrop</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.backdrop"
        (ngModelChange)="updateConfig()"
        [options]="backdropOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-12">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.draggable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Draggable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.resizable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Resizable
      </label>
    </div>
  </div>

  <div slot="content-visibility" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showHeader"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Header
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showFooter"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Footer
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showMenu"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Menu
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showMin"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Minimize
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showMax"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Maximize
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showClose"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Close
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div
      class="w-full h-300 display-flex justify-center items-center p-40 bg-surface-2 rounded-lg-token relative"
    >
      <dui-button (click)="openDialog()" label="Test Dialog Display"></dui-button>

      <dui-dialog-box
        #demoElement
        dialog-title="Playground Dialog"
        icon-library="lucide"
        [attr.size]="pgConfig.size"
        [attr.variant]="pgConfig.variant"
        [attr.status]="pgConfig.status"
        [attr.backdrop]="pgConfig.backdrop"
        [attr.position]="pgConfig.position"
        [attr.ok-text]="pgConfig.okText || null"
        [attr.cancel-text]="pgConfig.cancelText || null"
        [attr.is-draggable]="pgConfig.draggable ? '' : null"
        [attr.resizable]="pgConfig.resizable ? '' : null"
        [attr.show-header]="pgConfig.showHeader ? '' : null"
        [attr.show-footer]="pgConfig.showFooter ? '' : null"
        [attr.show-menu]="pgConfig.showMenu ? '' : null"
        [attr.show-minimize]="pgConfig.showMin ? '' : null"
        [attr.show-maximize]="pgConfig.showMax ? '' : null"
        [attr.show-close]="pgConfig.showClose ? '' : null"
        [attr.menu-items]="pgConfig.showMenu ? menuItems : null"
        [attr.open]="visible ? '' : null"
        (dialogClosed)="closeDialog()"
      >
        <div class="p-20">
          <p>
            This is the content of the dialog. Interact with the controls on the left to see changes
            in real-time.
          </p>
        </div>
        <div slot="footer" *ngIf="!pgConfig.okText && !pgConfig.cancelText">
          <dui-button
            label="Close (Slot Fallback)"
            variant="secondary"
            (click)="closeDialog()"
          ></dui-button>
        </div>
      </dui-dialog-box>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
