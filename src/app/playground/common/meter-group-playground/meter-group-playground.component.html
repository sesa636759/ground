<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-settings" class="control-grid p-16">
    <div class="control-group">
      <label>Orientation</label>
      <dui-dropdown
        [options]="orientationOptions"
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <dui-dropdown
        [options]="shapeOptions"
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [options]="sizeOptions"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Min Value</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.min"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Max Value</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.interactive"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Interactive
      </label>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Icon Library</label>
      <dui-dropdown
        [options]="iconLibraryOptions"
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showLabels"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Labels
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showValues"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Values
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showLegend"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Legend
      </label>
    </div>
    <div class="control-group full-width">
      <label>Values (JSON Array)</label>
      <dui-input
        type="textarea"
        [(ngModel)]="pgConfig.values"
        (ngModelChange)="onJsonChange()"
        placeholder='[{"label":"A","value":10}]'
        [rows]="5"
      ></dui-input>
    </div>
  </div>

  <div preview>
    <div
      class="preview-stage p-40 display-flex items-center justify-center min-h-400 bg-white w-full"
    >
      <dui-meter-group
        class="w-full max-w-600"
        [attr.values]="pgConfig.values"
        [attr.orientation]="pgConfig.orientation"
        [attr.size]="pgConfig.size"
        [attr.shape]="pgConfig.shape"
        [attr.show-labels]="pgConfig.showLabels ? '' : null"
        [attr.show-values]="pgConfig.showValues ? '' : null"
        [attr.show-legend]="pgConfig.showLegend ? '' : null"
        [attr.icon-library]="pgConfig.iconLibrary"
        [attr.min]="pgConfig.min"
        [attr.max]="pgConfig.max"
        [attr.interactive]="pgConfig.interactive ? '' : null"
      ></dui-meter-group>
    </div>
  </div>
</pg-playground>
