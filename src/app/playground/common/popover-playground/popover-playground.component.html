<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Heading</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.heading"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Body Content (HTML)</label>
      <textarea
        class="w-full border rounded-8 p-12 bg-surface-1 text-primary-color"
        rows="4"
        [(ngModel)]="pgConfig.content"
        (ngModelChange)="updateConfig()"
      ></textarea>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="control-group">
      <label>Trigger</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.trigger"
        (ngModelChange)="updateConfig()"
        [options]="triggerOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Placement</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.placement"
        (ngModelChange)="updateConfig()"
        [options]="placementOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Width</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showArrow"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Arrow
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showCloseButton"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Close Button
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.backdrop"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Backdrop
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div class="w-full display-flex justify-center items-center">
      <dui-popover
        #popover
        [attr.heading]="pgConfig.heading"
        [attr.content]="pgConfig.content"
        [attr.trigger]="pgConfig.trigger"
        [attr.placement]="pgConfig.placement"
        [attr.variant]="pgConfig.variant"
        [attr.width]="pgConfig.width"
        [attr.show-arrow]="pgConfig.showArrow ? '' : null"
        [attr.show-close-button]="pgConfig.showCloseButton ? '' : null"
        [attr.backdrop]="pgConfig.backdrop ? '' : null"
      >
        <dui-button slot="target" variant="primary" label="Target Element"></dui-button>
      </dui-popover>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
