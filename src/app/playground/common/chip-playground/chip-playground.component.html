<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ⭐"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Avatar URL</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.userAvatar"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Counter</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.counter"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Tooltip</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.tooltip"
        (ngModelChange)="updateConfig()"
        placeholder="Tooltip text"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Image URL</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.image"
        (ngModelChange)="updateConfig()"
        placeholder="https://..."
      ></ui-input>
    </div>
  </div>

  <div slot="content-style" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="orientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
        [options]="animationOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.removable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Removable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Clickable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.selected" (ngModelChange)="updateConfig()"></ui-checkbox>
        Selected
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-32">
    <ui-chip
      #demoElement
      [attr.label]="pgConfig.label"
      [attr.icon]="pgConfig.icon"
      [attr.user-avatar]="pgConfig.userAvatar"
      [attr.counter]="pgConfig.counter"
      [attr.badge]="pgConfig.badge"
      [attr.variant]="pgConfig.variant"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.shape]="pgConfig.shape"
      [attr.removable]="pgConfig.removable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.selected]="pgConfig.selected ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.orientation]="pgConfig.orientation !== 'horizontal' ? pgConfig.orientation : null"
      [attr.animation]="pgConfig.animation !== 'scale' ? pgConfig.animation : null"
      [attr.tooltip]="pgConfig.tooltip || null"
      [attr.image]="pgConfig.image || null"
      (chipClick)="logEvent('Chip Clicked')"
      (chipRemove)="logEvent('Chip Removed')"
    ></ui-chip>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
