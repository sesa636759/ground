<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-visuals" class="control-grid p-16">
    <div class="control-group">
      <label>Theme</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.collapsed"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Collapsed
      </label>
    </div>
  </div>

  <div slot="content-structure" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showFooter"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Footer
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-start items-stretch p-0">
    <div
      class="nav-container h-full border-right"
      [style.width]="pgConfig.collapsed ? '80px' : '280px'"
    >
      <dui-nav-bar
        #demoElement
        [attr.theme]="pgConfig.theme"
        [attr.collapsed]="pgConfig.collapsed ? '' : null"
        [model]="modelJson"
      >
        <div
          slot="header"
          class="p-20 font-extrabold fs-12rem display-flex items-center gap-12 h-60"
        >
          <div class="w-32 h-32 rounded-8 bg-primary-color flex-shrink-0"></div>
          <span *ngIf="!pgConfig.collapsed">APPLOGO</span>
        </div>

        <div
          *ngIf="pgConfig.showFooter"
          slot="footer"
          class="p-20 border-top h-80 display-flex items-center"
        >
          <div class="display-flex items-center gap-12">
            <div class="w-32 h-32 rounded-50 bg-surface-3 flex-shrink-0"></div>
            <div *ngIf="!pgConfig.collapsed" class="font-medium">User Name</div>
          </div>
        </div>
      </dui-nav-bar>
    </div>
    <div class="content-area flex-1 p-40 bg-secondary">
      <h1 class="m-0-0-16 text-color">Page Content</h1>
      <p class="text-muted m-0">The navigation bar is pinned to the side.</p>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
