<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>List Titles (JSON Array)</label>
      <ui-input
        [(ngModel)]="pgConfig.titles"
        (ngModelChange)="updateConfig()"
        placeholder='["Left", "Right"]'
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Search Placeholder</label>
      <ui-input
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>List Height</label>
      <ui-input
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 300px"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Selected Items</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Layout & Mode -->
  <div slot="content-layout" class="control-grid p-16">
    <div class="control-group">
      <label>Display Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.mode"
        (ngModelChange)="updateConfig()"
        [options]="modeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.pagination">
      <label>Page Size</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.pageSize"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-behavior" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.searchable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Searchable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.sortable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Sortable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.allowReorder"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Target Reordering
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showSelectAll"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Select All
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.enableDrag"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Drag & Drop
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.oneWay" (ngModelChange)="updateConfig()"></ui-checkbox>
        One-Way (Copy)
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.pagination"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Pagination
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled State
      </label>
    </div>
  </div>

  <!-- Data Section -->
  <div slot="content-data" class="p-16">
    <p class="fs-13 text-muted mb-8">Table mode uses static columns: Feature | Module</p>
    <div class="control-group">
      <label>Icon Library</label>
      <ui-input
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        placeholder="lucide, ionicons..."
      ></ui-input>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage w-full p-32 h-500">
    <div class="w-full max-w-900 m-0-auto">
      <ui-transfer-list
        #demoElement
        [attr.titles]="pgConfig.titles"
        [attr.search-placeholder]="pgConfig.searchPlaceholder"
        [attr.height]="pgConfig.height"
        [attr.max]="pgConfig.max"
        [attr.mode]="pgConfig.mode"
        [attr.searchable]="pgConfig.searchable ? '' : 'false'"
        [attr.sortable]="pgConfig.sortable ? '' : null"
        [attr.allow-reorder]="pgConfig.allowReorder ? '' : null"
        [attr.show-select-all]="pgConfig.showSelectAll ? '' : 'false'"
        [attr.enable-drag]="pgConfig.enableDrag ? '' : null"
        [attr.one-way]="pgConfig.oneWay ? '' : null"
        [attr.pagination]="pgConfig.pagination ? '' : null"
        [attr.page-size]="pgConfig.pageSize"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.icon-library]="pgConfig.iconLibrary"
        [attr.source-items]="sourceJson"
        [attr.target-items]="targetJson"
        [attr.columns]="pgConfig.mode === 'table' ? columnsJson : null"
        (transferChange)="onTransferChange($event)"
        (selectionChanged)="onSelectionChanged($event)"
      >
      </ui-transfer-list>

      <div class="mt-24 display-grid grid-cols-2 gap-16">
        <div class="p-12 bg-surface-low rounded-8 border-subtle-dashed">
          <label class="fs-11 font-semibold uppercase">Source Source</label>
          <div class="fs-12 mt-4">
            {{ pgConfig.mode === 'tree' ? 'Tree Hierarchy' : sourceItems.length + ' base items' }}
          </div>
        </div>
        <div class="p-12 bg-surface-low rounded-8 border-subtle-dashed">
          <label class="fs-11 font-semibold uppercase">Transfer State</label>
          <div class="fs-12 mt-4">
            {{ pgConfig.oneWay ? 'Copy Mode Active' : 'Move Mode Active' }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
