<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Visible</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.maxVisible"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Stack Mode</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.stackMode"
        (ngModelChange)="updateConfig()"
        [options]="stackModeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Open Mode</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.openMode"
        (ngModelChange)="updateConfig()"
        [options]="openModeOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-12">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.cardStack"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Card Stacking
      </label>
    </div>
  </div>

  <div slot="content-notification" class="control-grid p-16">
    <div class="control-group">
      <label>Type</label>
      <dui-dropdown
        [(ngModel)]="notiConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Title</label>
      <dui-input
        type="text"
        [(ngModel)]="notiConfig.title"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Success!"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Message</label>
      <dui-input
        type="text"
        [(ngModel)]="notiConfig.message"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Action completed."
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Duration (ms)</label>
      <dui-input
        type="number"
        [(ngModel)]="notiConfig.duration"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5000"
      ></dui-input>
    </div>
  </div>

  <div preview class="preview-stage">
    <div
      class="w-full h-300 display-flex gap-16 justify-center items-center p-40 bg-surface-2 rounded-lg-token relative"
    >
      <dui-snackbar
        #snackbarElement
        icon-library="lucide"
        [attr.position]="pgConfig.position"
        [attr.max-visible]="pgConfig.maxVisible"
        [attr.stack-mode]="pgConfig.stackMode"
        [attr.open-mode]="pgConfig.openMode"
        [attr.card-stack]="pgConfig.cardStack ? '' : null"
      ></dui-snackbar>

      <dui-button variant="primary" (click)="showSnackbar()" label="Show Snackbar"></dui-button>
      <dui-button variant="secondary" (click)="clearAll()" label="Clear All"></dui-button>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
