<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-data" class="control-grid p-16">
    <div class="control-group">
      <label>Dataset</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.dataset"
        (ngModelChange)="onDatasetChange()"
        [options]="datasetOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label
        >Stroke Width <span class="range-val">{{ pgConfig.strokeWidth }}px</span></label
      >
      <dui-input
        type="range"
        min="1"
        max="6"
        step="1"
        [(ngModel)]="pgConfig.strokeWidth"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label
        >Chart Width <span class="range-val">{{ pgConfig.width }}px</span></label
      >
      <dui-input
        type="range"
        min="300"
        max="800"
        step="50"
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label
        >Chart Height <span class="range-val">{{ pgConfig.height }}px</span></label
      >
      <dui-input
        type="range"
        min="200"
        max="500"
        step="50"
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-features" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showLegend"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Legend
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showGrid"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Grid
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showMarkers"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Markers
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.enableAnimation"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Enable Animation
      </label>
    </div>
  </div>

  <div preview class="chart-preview-wrapper w-full display-flex justify-center p-40">
    <chart-line
      #demoElement
      [attr.chart-title]="activeTitle"
      [attr.x-axis-label]="activeXLabel"
      [attr.y-axis-label]="activeYLabel"
      [attr.show-legend]="pgConfig.showLegend ? '' : null"
      [attr.show-grid]="pgConfig.showGrid ? '' : null"
      [attr.show-markers]="pgConfig.showMarkers ? '' : null"
      [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
      [attr.stroke-width]="pgConfig.strokeWidth"
      [attr.width]="pgConfig.width"
      [attr.height]="pgConfig.height"
      [data]="chartData"
    ></chart-line>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
