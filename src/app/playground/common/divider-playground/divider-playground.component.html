<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Content & Layout -->
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [options]="[
          { label: 'Horizontal', value: 'horizontal' },
          { label: 'Vertical', value: 'vertical' },
        ]"
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Text Content</label>
      <ui-input [(ngModel)]="pgConfig.text" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Icon (Emoji/Char)</label>
      <ui-input [(ngModel)]="pgConfig.icon" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Badge Text</label>
      <ui-input [(ngModel)]="pgConfig.badge" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Image URL</label>
      <ui-input [(ngModel)]="pgConfig.image" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Text Align</label>
      <ui-dropdown
        [options]="textAlignOptions"
        [(ngModel)]="pgConfig.textAlign"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.orientation === 'vertical'">
      <label>Vertical Align</label>
      <ui-dropdown
        [options]="verticalAlignOptions"
        [(ngModel)]="pgConfig.verticalAlign"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Responsive Switch</label>
      <ui-dropdown
        [options]="responsiveOptions"
        [(ngModel)]="pgConfig.responsive"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Visual Appearance -->
  <div slot="content-style" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [options]="variantOptions"
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size Preset</label>
      <ui-dropdown
        [options]="sizeOptions"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Precise Thickness</label>
      <ui-input
        [(ngModel)]="pgConfig.thickness"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 4px"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Color (Theme/CSS)</label>
      <ui-input
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        placeholder="primary, #f00"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Text Color</label>
      <ui-input [(ngModel)]="pgConfig.textColor" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Text Transform</label>
      <ui-dropdown
        [options]="textTransformOptions"
        [(ngModel)]="pgConfig.textTransform"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Pattern</label>
      <ui-dropdown
        [options]="patternOptions"
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Inset Style</label>
      <ui-dropdown
        [options]="insetOptions"
        [(ngModel)]="pgConfig.inset"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Spacing Preset</label>
      <ui-dropdown
        [options]="spacingOptions"
        [(ngModel)]="pgConfig.spacing"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Visible Lines</label>
      <ui-dropdown
        [options]="linesOptions"
        [(ngModel)]="pgConfig.lines"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Line Cap</label>
      <ui-dropdown
        [options]="linecapOptions"
        [(ngModel)]="pgConfig.linecap"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Opacity (0-1)</label>
      <ui-input
        type="number"
        step="0.1"
        min="0"
        max="1"
        [(ngModel)]="pgConfig.opacity"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Shapes -->
  <div slot="content-shapes" class="control-grid p-16">
    <div class="control-group">
      <label>Shape Type</label>
      <ui-dropdown
        [options]="shapeOptions"
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.shape !== 'none'">
      <label>Shape Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.shapeColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Special Effects -->
  <div slot="content-effects" class="control-grid p-16">
    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [options]="animationOptions"
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.plain" (ngModelChange)="updateConfig()"></ui-checkbox>
        Plain (No Lines)
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading Shimmer
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Clickable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.shadow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Shadow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glow
      </label>
    </div>
  </div>

  <!-- Preview -->
  <div preview>
    <div
      class="preview-stage p-40 display-flex flex-col items-center justify-center min-h-200 bg-white rounded-8 w-full"
      [style.height]="pgConfig.orientation === 'vertical' ? '400px' : 'auto'"
    >
      <div *ngIf="pgConfig.orientation === 'horizontal'" class="w-full">
        <p class="text-slate-400 fs-12 mb-20">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt
          ut labore et dolore magna aliqua.
        </p>
        <ui-divider
          [attr.text]="pgConfig.text"
          [attr.icon]="pgConfig.icon"
          [attr.badge]="pgConfig.badge"
          [attr.image]="pgConfig.image"
          [attr.orientation]="pgConfig.orientation"
          [attr.variant]="pgConfig.variant"
          [attr.size]="pgConfig.size"
          [attr.text-align]="pgConfig.textAlign"
          [attr.vertical-align]="pgConfig.verticalAlign"
          [attr.text-transform]="pgConfig.textTransform"
          [attr.color]="pgConfig.color"
          [attr.text-color]="pgConfig.textColor"
          [attr.gap]="pgConfig.gap"
          [attr.thickness]="pgConfig.thickness"
          [attr.max-width]="pgConfig.maxWidth"
          [attr.height]="pgConfig.height"
          [attr.border-radius]="pgConfig.borderRadius"
          [attr.opacity]="pgConfig.opacity"
          [attr.plain]="pgConfig.plain ? '' : null"
          [attr.loading]="pgConfig.loading ? '' : null"
          [attr.clickable]="pgConfig.clickable ? '' : null"
          [attr.shadow]="pgConfig.shadow ? '' : null"
          [attr.glow]="pgConfig.glow ? '' : null"
          [attr.responsive]="pgConfig.responsive"
          [attr.animation]="pgConfig.animation"
          [attr.pattern]="pgConfig.pattern"
          [attr.inset]="pgConfig.inset"
          [attr.spacing]="pgConfig.spacing"
          [attr.lines]="pgConfig.lines"
          [attr.linecap]="pgConfig.linecap"
          [attr.shape]="pgConfig.shape"
          [attr.shape-color]="pgConfig.shapeColor"
          (dividerClick)="onDividerClick()"
        ></ui-divider>
        <p class="text-slate-400 fs-12 mt-20">
          Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea
          commodo consequat.
        </p>
      </div>

      <div
        *ngIf="pgConfig.orientation === 'vertical'"
        class="display-flex h-full items-center gap-24"
      >
        <span>Left Content</span>
        <ui-divider
          [attr.text]="pgConfig.text"
          [attr.icon]="pgConfig.icon"
          [attr.badge]="pgConfig.badge"
          [attr.image]="pgConfig.image"
          [attr.orientation]="pgConfig.orientation"
          [attr.variant]="pgConfig.variant"
          [attr.size]="pgConfig.size"
          [attr.text-align]="pgConfig.textAlign"
          [attr.vertical-align]="pgConfig.verticalAlign"
          [attr.text-transform]="pgConfig.textTransform"
          [attr.color]="pgConfig.color"
          [attr.text-color]="pgConfig.textColor"
          [attr.gap]="pgConfig.gap"
          [attr.thickness]="pgConfig.thickness"
          [attr.max-width]="pgConfig.maxWidth"
          [attr.height]="pgConfig.height"
          [attr.border-radius]="pgConfig.borderRadius"
          [attr.opacity]="pgConfig.opacity"
          [attr.plain]="pgConfig.plain ? '' : null"
          [attr.loading]="pgConfig.loading ? '' : null"
          [attr.clickable]="pgConfig.clickable ? '' : null"
          [attr.shadow]="pgConfig.shadow ? '' : null"
          [attr.glow]="pgConfig.glow ? '' : null"
          [attr.responsive]="pgConfig.responsive"
          [attr.animation]="pgConfig.animation"
          [attr.pattern]="pgConfig.pattern"
          [attr.inset]="pgConfig.inset"
          [attr.spacing]="pgConfig.spacing"
          [attr.lines]="pgConfig.lines"
          [attr.linecap]="pgConfig.linecap"
          [attr.shape]="pgConfig.shape"
          [attr.shape-color]="pgConfig.shapeColor"
          (dividerClick)="onDividerClick()"
        ></ui-divider>
        <span>Right Content</span>
      </div>
    </div>
  </div>
</pg-playground>
