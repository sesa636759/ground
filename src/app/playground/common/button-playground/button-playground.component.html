<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ⭐, user, rocket"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon Library</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.badge">
      <label>Badge Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.badgePosition"
        (ngModelChange)="updateConfig()"
        [options]="badgePositionOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [ignoreParentPosition]="true"
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [ignoreParentPosition]="true"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Elevation (0-5)</label>
      <ui-input
        type="number"
        min="0"
        max="5"
        [(ngModel)]="pgConfig.elevation"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon Position</label>
      <ui-dropdown
        [ignoreParentPosition]="true"
        [(ngModel)]="pgConfig.iconPosition"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Icon Size</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.iconSize"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 1.2em, 20px"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [ignoreParentPosition]="true"
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.variant === 'soft'">
      <label>Color (soft)</label>
      <ui-dropdown
        [ignoreParentPosition]="true"
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="softColorOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-states" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.iconOnly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Icon Only
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.pill" (ngModelChange)="updateConfig()"></ui-checkbox>
        Pill
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rounded" (ngModelChange)="updateConfig()"></ui-checkbox>
        Rounded
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.fullWidth"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Full Width
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.grow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Grow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.selected" (ngModelChange)="updateConfig()"></ui-checkbox>
        Selected
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.noRipple" (ngModelChange)="updateConfig()"></ui-checkbox>
        No Ripple
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></ui-checkbox>
        RTL
      </label>
    </div>
    <div class="control-grid mt-16">
      <div class="control-group">
        <label>Avatar Src (URL)</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.avatarSrc"
          (ngModelChange)="updateConfig()"
          placeholder="https://i.pravatar.cc/100"
        ></ui-input>
      </div>
      <div class="control-group" *ngIf="pgConfig.avatarSrc">
        <label>Status</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.status"
          (ngModelChange)="updateConfig()"
          [options]="statusOptions"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Width</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.width"
          (ngModelChange)="updateConfig()"
          placeholder="e.g. 100%, 200px"
        ></ui-input>
      </div>
      <div class="control-group">
        <label>Min-Width</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.minWidth"
          (ngModelChange)="updateConfig()"
          placeholder="e.g. 120px"
        ></ui-input>
      </div>
      <div class="control-group" *ngIf="pgConfig.loading">
        <label>Loading Pos</label>
        <ui-dropdown
          [ignoreParentPosition]="true"
          [(ngModel)]="pgConfig.loadingPosition"
          (ngModelChange)="updateConfig()"
          [options]="positionOptions"
        ></ui-dropdown>
      </div>
    </div>
  </div>

  <div slot="content-link" class="control-grid p-16">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Href (renders Link)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.href"
        (ngModelChange)="updateConfig()"
        placeholder="https://..."
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.href">
      <label>Target</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.target"
        (ngModelChange)="updateConfig()"
        placeholder="_blank"
      ></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.href">
      <label>Rel</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.rel"
        (ngModelChange)="updateConfig()"
        placeholder="noopener"
      ></ui-input>
    </div>
  </div>

  <div slot="content-premium" class="control-grid p-16">
    <div class="control-group">
      <label>Copy Value</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.copyValue"
        (ngModelChange)="updateConfig()"
        placeholder="Text to copy on click"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Keyboard Shortcut</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.shortcut"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ctrl+s, /"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Audio Feedback</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.audio"
        (ngModelChange)="updateConfig()"
        [options]="audioOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Hold Time (ms)</label>
      <ui-input
        type="number"
        min="0"
        step="500"
        [(ngModel)]="pgConfig.holdTime"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Timer (sec)</label>
      <ui-input
        type="number"
        min="0"
        [(ngModel)]="pgConfig.timer"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Confirm Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.confirmLabel"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Are you sure?"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Reveal Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.reveal"
        (ngModelChange)="updateConfig()"
        [options]="revealOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.reveal !== 'none'">
      <label>Reveal Delay (ms)</label>
      <ui-input
        type="number"
        min="0"
        step="50"
        [(ngModel)]="pgConfig.revealDelay"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Success Morph (ms)</label>
      <ui-input
        type="number"
        min="0"
        step="500"
        [(ngModel)]="pgConfig.successMorph"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.active" (ngModelChange)="updateConfig()"></ui-checkbox>
        Active / Selected
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.hasDropdown"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Has Dropdown
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.hideLabelOnMobile"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Hide Label on Mobile
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.confirmBubble"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Bubble Confirm
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.tilt" (ngModelChange)="updateConfig()"></ui-checkbox>
        3D Tilt
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.haptic" (ngModelChange)="updateConfig()"></ui-checkbox>
        Mobile Haptic
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glossy" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glossy Shine
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.shake" (ngModelChange)="updateConfig()"></ui-checkbox>
        Error Shake
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.liquid" (ngModelChange)="updateConfig()"></ui-checkbox>
        Liquid Progress
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rainbow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Rainbow Glow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glow" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glow
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.followGlow"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Follow Glow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.isSplit" (ngModelChange)="updateConfig()"></ui-checkbox>
        Split Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.shatter" (ngModelChange)="updateConfig()"></ui-checkbox>
        Shatter
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <ui-button
      #demoElement
      [attr.label]="pgConfig.label"
      [attr.icon]="pgConfig.icon"
      [attr.icon-library]="pgConfig.iconLibrary"
      [attr.icon-position]="pgConfig.iconPosition"
      [attr.icon-size]="pgConfig.iconSize || null"
      [attr.badge]="pgConfig.badge || null"
      [attr.badge-position]="pgConfig.badgePosition"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.shape]="pgConfig.shape || null"
      [attr.color]="pgConfig.color || null"
      [attr.elevation]="pgConfig.elevation"
      [attr.icon-only]="pgConfig.iconOnly ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.loading-position]="pgConfig.loadingPosition"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.rtl]="pgConfig.rtl ? '' : null"
      [attr.pill]="pgConfig.pill ? '' : null"
      [attr.rounded]="pgConfig.rounded ? '' : null"
      [attr.full-width]="pgConfig.fullWidth ? '' : null"
      [attr.width]="pgConfig.width || null"
      [attr.min-width]="pgConfig.minWidth || null"
      [attr.grow]="pgConfig.grow ? '' : null"
      [attr.selected]="pgConfig.selected ? '' : null"
      [attr.no-ripple]="pgConfig.noRipple ? '' : null"
      [attr.type]="pgConfig.type"
      [attr.href]="pgConfig.href || null"
      [attr.target]="pgConfig.target || null"
      [attr.rel]="pgConfig.rel || null"
      [attr.avatar-src]="pgConfig.avatarSrc || null"
      [attr.status]="pgConfig.status || null"
      [attr.active]="pgConfig.active ? '' : null"
      [attr.skeleton]="pgConfig.skeleton ? '' : null"
      [attr.has-dropdown]="pgConfig.hasDropdown ? '' : null"
      [attr.hide-label-on-mobile]="pgConfig.hideLabelOnMobile ? '' : null"
      [attr.copy-value]="pgConfig.copyValue || null"
      [attr.shortcut]="pgConfig.shortcut || null"
      [attr.audio]="pgConfig.audio !== 'none' ? pgConfig.audio : null"
      [attr.hold-time]="pgConfig.holdTime || null"
      [attr.timer]="pgConfig.timer || null"
      [attr.confirm-label]="pgConfig.confirmLabel || null"
      [attr.confirm-bubble]="pgConfig.confirmBubble ? '' : null"
      [attr.tilt]="pgConfig.tilt ? '' : null"
      [attr.haptic]="pgConfig.haptic ? '' : null"
      [attr.glossy]="pgConfig.glossy ? '' : null"
      [attr.shake]="pgConfig.shake ? '' : null"
      [attr.liquid]="pgConfig.liquid ? '' : null"
      [attr.rainbow]="pgConfig.rainbow ? '' : null"
      [attr.glow]="pgConfig.glow ? '' : null"
      [attr.follow-glow]="pgConfig.followGlow ? '' : null"
      [attr.is-split]="pgConfig.isSplit ? '' : null"
      [attr.shatter]="pgConfig.shatter ? '' : null"
      [attr.success-morph]="pgConfig.successMorph || null"
      [attr.reveal]="pgConfig.reveal !== 'none' ? pgConfig.reveal : null"
      [attr.reveal-delay]="pgConfig.revealDelay || null"
      (buttonClick)="onButtonClick($event)"
    ></ui-button>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
