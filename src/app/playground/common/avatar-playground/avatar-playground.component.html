<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-profile" class="control-grid p-16">
    <div class="control-group">
      <label>Name (Initials)</label>
      <ui-input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Image Source</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.src"
        (ngModelChange)="updateConfig()"
        placeholder="URL"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="emoji or icon"
      ></ui-input>
    </div>
  </div>

  <div slot="content-style" class="control-grid p-16">
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size (e.g. 64px)</label>
      <ui-input type="text" [(ngModel)]="pgConfig.size" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Animation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animation"
        (ngModelChange)="updateConfig()"
        [options]="animationOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid col-span-all mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glass
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.gradient" (ngModelChange)="updateConfig()"></ui-checkbox>
        Gradient
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoColor"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Color
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.story" (ngModelChange)="updateConfig()"></ui-checkbox>
        Story Ring
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.storySeen"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Story Seen
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.activeSpeaker"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Active Speaker
      </label>
    </div>
  </div>

  <div slot="content-status" class="control-grid p-16">
    <div class="control-group">
      <label>Status</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.status"
        (ngModelChange)="updateConfig()"
        [options]="statusOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
        placeholder="'dot' or text"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge Color</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badgeColor"
        (ngModelChange)="updateConfig()"
        placeholder="hex or color name"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.badgePosition"
        (ngModelChange)="updateConfig()"
        [options]="badgePositionOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid col-span-all mt-16">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.statusPulse"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Status Pulse
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.verified" (ngModelChange)="updateConfig()"></ui-checkbox>
        Verified
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.editable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Editable
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-40">
    <ui-avatar
      [attr.name]="pgConfig.name"
      [attr.src]="pgConfig.src"
      [attr.icon]="pgConfig.icon"
      [attr.shape]="pgConfig.shape"
      [attr.size]="pgConfig.size"
      [attr.status]="pgConfig.status"
      [attr.badge]="pgConfig.badge"
      [attr.badge-color]="pgConfig.badgeColor"
      [attr.badge-position]="pgConfig.badgePosition"
      [attr.variant]="pgConfig.variant"
      [attr.animation]="pgConfig.animation !== 'none' ? pgConfig.animation : null"
      [attr.status-pulse]="pgConfig.statusPulse ? '' : null"
      [attr.story]="pgConfig.story ? '' : null"
      [attr.story-seen]="pgConfig.storySeen ? '' : null"
      [attr.active-speaker]="pgConfig.activeSpeaker ? '' : null"
      [attr.verified]="pgConfig.verified ? '' : null"
      [attr.editable]="pgConfig.editable ? '' : null"
      [attr.glass]="pgConfig.glass ? '' : null"
      [attr.skeleton]="pgConfig.skeleton ? '' : null"
      [attr.gradient]="pgConfig.gradient ? '' : null"
      [attr.auto-color]="pgConfig.autoColor ? '' : null"
      (avatarClick)="logEvent('Avatar Clicked')"
    ></ui-avatar>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
