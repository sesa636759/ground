<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid p-16">
    <div class="control-group">
      <label>Panel Title</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.panelTitle"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Subtitle</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.panelSubtitle"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-visual" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()" /> Glass Effect
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.noPadding" (ngModelChange)="updateConfig()" /> No Padding
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showClose" (ngModelChange)="updateConfig()" /> Show Close
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showSettings" (ngModelChange)="updateConfig()" /> Show
        Settings
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.toggleable" (ngModelChange)="updateConfig()" />
        Toggleable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.minimizable" (ngModelChange)="updateConfig()" />
        Minimizable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.maximizable" (ngModelChange)="updateConfig()" />
        Maximizable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.isDraggable" (ngModelChange)="updateConfig()" />
        Draggable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.resizable" (ngModelChange)="updateConfig()" /> Resizable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading
        State
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <div  class="w-full max-w-600">
      <ui-panel
        [attr.panel-title]="pgConfig.panelTitle"
        [attr.panel-subtitle]="pgConfig.panelSubtitle"
        [attr.badge]="pgConfig.badge"
        [attr.variant]="pgConfig.variant"
        [attr.theme]="pgConfig.theme"
        [attr.show-close]="pgConfig.showClose"
        [attr.show-settings]="pgConfig.showSettings"
        [attr.toggleable]="pgConfig.toggleable ? '' : null"
        [attr.minimizable]="pgConfig.minimizable ? '' : null"
        [attr.maximizable]="pgConfig.maximizable ? '' : null"
        [attr.is-draggable]="pgConfig.isDraggable ? '' : null"
        [attr.resizable]="pgConfig.resizable ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.no-padding]="pgConfig.noPadding ? '' : null"
        [attr.glass]="pgConfig.glass ? '' : null"
        (panelClose)="onPanelEvent('close')"
        (panelSettings)="onPanelEvent('settings')"
        (panelToggle)="onPanelEvent('toggle')"
        (panelMinimize)="onPanelEvent('minimize')"
        (panelMaximize)="onPanelEvent('maximize')"
      >
        <div slot="content">
          <p>
            This interactive panel demonstrates various layout and behavioral capabilities. You can
            titles, subtitles, badges, and control which actions are available in the header.
          </p>
          <div  class="mt-16 display-flex gap-8">
            <ui-button label="Action 1" variant="solid"></ui-button>
            <ui-button label="Action 2" variant="soft"></ui-button>
          </div>
        </div>
        <div slot="footer">
          <span  class="fs-08rem text-muted">
            Last updated: Today at 10:45 AM
          </span>
        </div>
      </ui-panel>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
