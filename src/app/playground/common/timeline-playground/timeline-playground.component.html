<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid p-16">
    <div class="control-group">
      <label>Orientation</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="standardOrientationOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Alignment</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.align"
        (ngModelChange)="updateConfig()"
        [options]="alignOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-content" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showOpposite"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Opposite Side
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.customMarker"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Custom Markers
      </label>
    </div>
  </div>

  <div preview class="w-full display-flex justify-center items-start p-40">
    <div class="timeline-container w-full max-w-600 bg-surface-1 p-24 rounded-12 border">
      <dui-timeline
        [attr.orientation]="pgConfig.orientation"
        [attr.align]="pgConfig.align"
        [value]="valueJson"
      >
        <ng-template let-item>
          <div class="font-semibold">{{ item.status }}</div>
          <div class="fs-085rem text-muted">{{ item.date }}</div>
          <div *ngIf="pgConfig.showOpposite" slot="opposite">{{ item.description }}</div>
          <div
            *ngIf="pgConfig.customMarker"
            slot="marker"
            [style.background]="item.color"
            class="w-12 h-12 rounded-50"
          ></div>
        </ng-template>
      </dui-timeline>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
