<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="standardOrientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Alignment</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.align"
        (ngModelChange)="updateConfig()"
        [options]="alignOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-content" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showOpposite"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Opposite Side
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.customMarker"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Custom Markers
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    "
  >
    <div
      class="timeline-container"
      style="
        width: 100%;
        max-width: 600px;
        background: var(--surface-1);
        padding: 24px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
      "
    >
      <ui-timeline
        [attr.orientation]="pgConfig.orientation"
        [attr.align]="pgConfig.align"
        [value]="valueJson"
      >
        <ng-template let-item>
          <div style="font-weight: 600">{{ item.status }}</div>
          <div style="font-size: 0.85rem; color: var(--text-secondary)">{{ item.date }}</div>
          <div *ngIf="pgConfig.showOpposite" slot="opposite">{{ item.description }}</div>
          <div
            *ngIf="pgConfig.customMarker"
            slot="marker"
            [style.background]="item.color"
            style="width: 12px; height: 12px; border-radius: 50%"
          ></div>
        </ng-template>
      </ui-timeline>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
