<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Separator</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.separator"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Items (Collapse)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxItems"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showHome" (ngModelChange)="updateConfig()"></ui-checkbox>
        Show Home
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div
      style="
        background: var(--surface-1);
        padding: 16px 24px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      "
    >
      <ui-breadcrumb
        #demoElement
        [attr.separator]="pgConfig.separator"
        [attr.max-items]="pgConfig.maxItems"
        [attr.size]="pgConfig.size"
        [attr.variant]="pgConfig.variant"
        [attr.show-home]="pgConfig.showHome ? '' : null"
        [items]="itemsJson"
        (breadcrumbClick)="onBreadcrumbClick($event)"
      ></ui-breadcrumb>
    </div>
  </div>

  <!-- All possible variants/examples -->
  <div style="margin-top: 32px">
    <h3>All Variants & Examples</h3>
    <div style="display: flex; flex-wrap: wrap; gap: 24px">
      <ui-breadcrumb [items]="itemsJson" separator="/" variant="default" show-home></ui-breadcrumb>
      <ui-breadcrumb [items]="itemsJson" separator=">" variant="pills" show-home></ui-breadcrumb>
      <ui-breadcrumb [items]="itemsJson" separator="•" variant="glass" show-home></ui-breadcrumb>
      <ui-breadcrumb
        [items]="itemsJson"
        separator="/"
        variant="default"
        [attr.max-items]="2"
      ></ui-breadcrumb>
      <ui-breadcrumb
        [items]="itemsJson"
        separator="/"
        variant="pills"
        [attr.max-items]="3"
      ></ui-breadcrumb>
      <ui-breadcrumb
        [items]="itemsJson"
        separator="/"
        variant="glass"
        [attr.max-items]="4"
      ></ui-breadcrumb>
      <ui-breadcrumb [items]="itemsJson" separator="/" variant="default"></ui-breadcrumb>
      <ui-breadcrumb [items]="itemsJson" separator="/" variant="pills"></ui-breadcrumb>
      <ui-breadcrumb [items]="itemsJson" separator="/" variant="glass"></ui-breadcrumb>
      <!-- Edge cases -->
      <!-- Collapsed, custom separator, no home -->
      <ui-breadcrumb
        [items]="itemsJson"
        separator="~"
        variant="default"
        [attr.max-items]="2"
      ></ui-breadcrumb>
      <ui-breadcrumb
        [items]="itemsJson"
        separator="|"
        variant="glass"
        [attr.max-items]="3"
      ></ui-breadcrumb>
      <ui-breadcrumb
        [items]="itemsJson"
        separator="/"
        variant="pills"
        [attr.max-items]="2"
      ></ui-breadcrumb>
      <!-- No home icon -->
      <ui-breadcrumb [items]="itemsJson" separator="/" variant="default"></ui-breadcrumb>
      <!-- Items with icons/badges -->
      <ui-breadcrumb
        [items]="longItemsJson"
        separator="/"
        variant="default"
        show-home
      ></ui-breadcrumb>
      <!-- Very long breadcrumb path -->
      <ui-breadcrumb
        [items]="veryLongItemsJson"
        separator="/"
        variant="default"
        [attr.max-items]="4"
      ></ui-breadcrumb>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
