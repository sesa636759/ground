<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config" class="control-grid p-16">
    <div class="control-group">
      <label>Separator Text</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.separator"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Max Items (Collapse)</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.maxItems"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showHome"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Home
      </label>
    </div>
  </div>

  <div slot="content-icons" class="control-grid p-16">
    <div class="control-group">
      <label>Separator Icon</label>
      <dui-input
        type="text"
        placeholder="e.g., chevron-right"
        [(ngModel)]="pgConfig.separatorIcon"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Home Icon</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.homeIcon"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Icon Library</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-40">
    <div
      class="bg-surface-1 p-16-24 rounded-8 border min-w-300"
      [style.background]="
        pgConfig.variant === 'glass' ? 'linear-gradient(135deg, #3b82f6, #8b5cf6)' : ''
      "
    >
      <dui-breadcrumb
        #demoElement
        [attr.separator]="pgConfig.separator"
        [attr.separator-icon]="pgConfig.separatorIcon"
        [attr.separator-icon-library]="pgConfig.separatorIconLibrary"
        [attr.max-items]="pgConfig.maxItems"
        [attr.size]="pgConfig.size"
        [attr.variant]="pgConfig.variant"
        [attr.show-home]="pgConfig.showHome ? '' : null"
        [attr.home-icon]="pgConfig.homeIcon"
        [attr.home-icon-library]="pgConfig.homeIconLibrary"
        [attr.icon-library]="pgConfig.iconLibrary"
        [items]="itemsJson"
        (breadcrumbClick)="onBreadcrumbClick($event)"
      ></dui-breadcrumb>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
