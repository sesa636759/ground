<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Initial Duration (s)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.duration"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.mode"
        (ngModelChange)="updateConfig()"
        [options]="modeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-visuals" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Format</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.format"
        (ngModelChange)="updateConfig()"
        [options]="formatOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoStart"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Start
      </label>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div
      class="timer-preview-card"
      style="
        text-align: center;
        background: var(--surface-1);
        padding: 32px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 400px;
      "
    >
      <ui-timer
        #timerEl
        [duration]="pgConfig.duration"
        [mode]="pgConfig.mode"
        [format]="pgConfig.format"
        [autoStart]="pgConfig.autoStart"
      ></ui-timer>

      <div
        class="timer-actions"
        style="margin-top: 24px; display: flex; gap: 8px; justify-content: center"
      >
        <ui-button variant="primary" (click)="timerStart(timerEl)" label="Start"></ui-button>
        <ui-button variant="secondary" (click)="timerPause(timerEl)" label="Pause"></ui-button>
        <ui-button variant="ghost" (click)="timerReset(timerEl)" label="Reset"></ui-button>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
