<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Breakpoint</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.breakpoint"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoZIndex"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Z-Index
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.magnify" (ngModelChange)="updateConfig()"></ui-checkbox>
        Magnify
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.blurEffect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Blur Effect
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showLabels"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Labels
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div
      style="
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        height: 400px;
        background: var(--surface-2);
        border-radius: var(--radius-lg);
        overflow: hidden;
      "
    >
      <ui-dock
        #demoElement
        [attr.position]="pgConfig.position"
        [attr.breakpoint]="pgConfig.breakpoint"
        [attr.auto-z-index]="pgConfig.autoZIndex ? '' : null"
        [attr.magnify]="pgConfig.magnify ? true : false"
        [attr.blur-effect]="pgConfig.blurEffect ? true : false"
        [attr.show-labels]="pgConfig.showLabels ? true : false"
        icon-library="lucide"
        [items]="modelJson"
      ></ui-dock>

      <div
        *ngIf="lastAction"
        style="
          position: absolute;
          top: 20px;
          padding: 8px 16px;
          background: var(--surface-1);
          border-radius: 20px;
          font-size: 0.85rem;
          color: var(--primary-color);
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        "
      >
        Last Action: <strong>{{ lastAction }}</strong>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
