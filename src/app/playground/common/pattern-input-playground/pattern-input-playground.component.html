<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Mask Pattern</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Placeholder</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Size tier</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Mask Character</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.maskChar"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. #, 9, *"
      ></dui-input>
    </div>
  </div>

  <!-- Pattern & Logic -->
  <div slot="content-logic" class="control-grid p-16">
    <div class="control-group">
      <label>Input restriction</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.inputType"
        (ngModelChange)="updateConfig()"
        [options]="inputTypeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.inputType === 'custom'">
      <label>Allowed Chars (Regex)</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.allowedChars"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. [A-Z]"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Validation Regex</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.validationRegex"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ^\d{10}$"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Max Characters</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.maxLength"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.required"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showValidation"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Validation icons
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.autoFormat"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Auto Format
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showCounter"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Display Counter
      </label>
    </div>
  </div>

  <!-- Labels & Messages -->
  <div slot="content-labels" class="control-grid p-16">
    <div class="control-group">
      <label>Field Label</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Helper text</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.helperText"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Error text</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.errorMessage"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Success text</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.successMessage"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-40">
    <div class="w-full max-w-400">
      <dui-pattern-input
        #demoElement
        [attr.pattern]="pgConfig.pattern || null"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.label]="pgConfig.label || null"
        [attr.size]="pgConfig.size"
        [attr.mask-char]="pgConfig.maskChar || null"
        [attr.max-length]="pgConfig.maxLength || null"
        [attr.helper-text]="pgConfig.helperText || null"
        [attr.error-message]="pgConfig.errorMessage || null"
        [attr.success-message]="pgConfig.successMessage || null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.show-validation]="pgConfig.showValidation ? '' : null"
        [attr.auto-format]="pgConfig.autoFormat ? '' : null"
        [attr.show-counter]="pgConfig.showCounter ? '' : null"
        [attr.input-type]="pgConfig.inputType"
        [attr.allowed-chars]="pgConfig.allowedChars || null"
        [attr.validation-regex]="pgConfig.validationRegex || null"
        (patternInputChange)="onPatternInputChange($event)"
      ></dui-pattern-input>

      <div class="mt-24 text-muted fs-14 text-center">
        Formatted Value:
        <span class="font-mono-var text-primary-color">{{ pgConfig.value || 'None' }}</span>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
