<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Mask Pattern</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Mask Char</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.maskChar"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 9, #, *"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Length</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxLength"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showValidation"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Validation
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.autoFormat"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Auto Format
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showCounter"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Counter
      </label>
    </div>
  </div>

  <div slot="content-labels" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.helperText"
        (ngModelChange)="updateConfig()"
        placeholder="Hint shown below field"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Error Message</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.errorMessage"
        (ngModelChange)="updateConfig()"
        placeholder="Error hint text"
      ></ui-input>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-pattern-input
      #demoElement
      [attr.mask]="pgConfig.pattern"
      [attr.placeholder]="pgConfig.placeholder"
      [attr.label]="pgConfig.label || null"
      [attr.size]="pgConfig.size"
      [attr.mask-char]="pgConfig.maskChar || null"
      [attr.max-length]="pgConfig.maxLength || null"
      [attr.helper-text]="pgConfig.helperText || null"
      [attr.error-message]="pgConfig.errorMessage || null"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.required]="pgConfig.required ? '' : null"
      [attr.show-validation]="pgConfig.showValidation ? '' : null"
      [attr.auto-format]="pgConfig.autoFormat ? '' : null"
      [attr.show-counter]="pgConfig.showCounter ? '' : null"
      (uiChange)="logEvent('Pattern Input Changed')"
    ></ui-pattern-input>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
