<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Placeholder</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Expand Trigger</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.expandTrigger"
        (ngModelChange)="updateConfig()"
        [options]="triggerOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Separator</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.separator"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-states" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showFullPath"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Full Path
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.changeOnSelect"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Change On Select
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div class="w-full display-flex flex-col items-center">
      <dui-cascade-select
        #demoElement
        [attr.placeholder]="pgConfig.placeholder"
        [attr.size]="pgConfig.size"
        [attr.expand-trigger]="pgConfig.expandTrigger"
        [attr.show-full-path]="pgConfig.showFullPath ? 'true' : 'false'"
        [attr.separator]="pgConfig.separator"
        [attr.change-on-select]="pgConfig.changeOnSelect ? '' : null"
        [options]="options"
        (cascadeChange)="onValueChange($event)"
      ></dui-cascade-select>

      @if (currentValue) {
        <div class="mt-40 p-12 bg-surface-2 border rounded-8 font-mono-var fs-08rem">
          Selection Value: {{ currentValue | json }}
        </div>
      }
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
