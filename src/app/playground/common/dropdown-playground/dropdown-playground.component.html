<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Global Settings -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Full Width</label>
      <ui-checkbox [(ngModel)]="pgConfig.fullWidth" (ngModelChange)="updateConfig()"></ui-checkbox>
    </div>
    <div class="control-group">
      <label>Max Height (px)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxHeight"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Appearance & Style -->
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Appearance</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.appearance"
        (ngModelChange)="updateConfig()"
        [options]="appearanceOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Show Arrow</label>
      <ui-checkbox [(ngModel)]="pgConfig.showArrow" (ngModelChange)="updateConfig()"></ui-checkbox>
    </div>
  </div>

  <!-- Behavior & States -->
  <div slot="content-behavior" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.multiSelect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Multi-Select
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.searchable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Searchable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.clearable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Clearable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.cascading"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Cascading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
    </div>
  </div>

  <!-- Advanced Features -->
  <div slot="content-advanced" class="control-grid p-16">
    <div class="control-group">
      <label>Ignore Parent Offset</label>
      <ui-checkbox
        [(ngModel)]="pgConfig.ignoreParentPosition"
        (ngModelChange)="updateConfig()"
      ></ui-checkbox>
    </div>
    <div class="control-group small">
      <small style="color: var(--text-muted); display: block; margin-top: 4px">
        Fixes orientation issues when nested in transformed/scrollable containers.
      </small>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="
      flex-direction: column;
      align-items: stretch;
      gap: 1rem;
      padding: 40px;
      min-height: 250px;
    "
  >
    <label class="preview-label" style="font-weight: 500; font-size: 0.9rem">
      Pick your favorite tech stack:
    </label>
    <ui-dropdown
      #demoElement
      [attr.placeholder]="pgConfig.placeholder"
      [attr.size]="pgConfig.size !== 'md' ? pgConfig.size : null"
      [attr.appearance]="pgConfig.appearance !== 'dropdown' ? pgConfig.appearance : null"
      [attr.multi-select]="pgConfig.multiSelect ? '' : null"
      [attr.searchable]="pgConfig.searchable ? '' : null"
      [attr.clearable]="pgConfig.clearable ? '' : null"
      [attr.cascading]="pgConfig.cascading ? '' : null"
      [attr.full-width]="pgConfig.fullWidth ? '' : null"
      [attr.max-height]="pgConfig.maxHeight"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.ignore-parent-position]="pgConfig.ignoreParentPosition ? '' : null"
      [showArrow]="pgConfig.showArrow"
      [options]="pgConfig.cascading ? cascadingOptionsJson : optionsJson"
      (valueChange)="onValueChange($event)"
    ></ui-dropdown>

    <div
      *ngIf="currentValue"
      style="
        margin-top: 12px;
        padding: 12px;
        background: var(--surface-2);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        font-size: 0.85rem;
      "
    >
      <strong>Selected Value:</strong> {{ currentValue }}
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
