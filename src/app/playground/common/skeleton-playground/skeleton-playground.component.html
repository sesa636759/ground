<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Shape</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOpts"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Animation Type</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.animationType"
        (ngModelChange)="updateConfig()"
        [options]="animTypeOpts"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Animated</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.animated"
        (ngModelChange)="updateConfig()"
        [options]="boolOpts"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-sizing" class="control-grid p-16">
    <div class="control-group">
      <label>Size (Predefined)</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOpts"
      ></dui-dropdown>
      <span class="control-hint">Overrides width/height for most shapes</span>
    </div>

    <div class="control-group">
      <label>Width</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
        placeholder="100%"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Height</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
        placeholder="20px"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Border Radius</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.borderRadius"
        (ngModelChange)="updateConfig()"
        placeholder="4px"
      ></dui-input>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable p-40 display-flex justify-center items-center">
    <div class="w-full display-flex justify-center">
      @if (recreate) {
        <skeleton-loader
          [attr.shape]="pgConfig.shape"
          [attr.animation-type]="pgConfig.animationType"
          [attr.animated]="pgConfig.animated"
          [attr.size]="pgConfig.size !== 'custom' ? pgConfig.size : null"
          [attr.width]="pgConfig.size === 'custom' ? pgConfig.width : null"
          [attr.height]="pgConfig.size === 'custom' ? pgConfig.height : null"
          [attr.border-radius]="pgConfig.borderRadius || null"
        ></skeleton-loader>
      } @else {
        <skeleton-loader
          [attr.shape]="pgConfig.shape"
          [attr.animation-type]="pgConfig.animationType"
          [attr.animated]="pgConfig.animated"
          [attr.size]="pgConfig.size !== 'custom' ? pgConfig.size : null"
          [attr.width]="pgConfig.size === 'custom' ? pgConfig.width : null"
          [attr.height]="pgConfig.size === 'custom' ? pgConfig.height : null"
          [attr.border-radius]="pgConfig.borderRadius || null"
        ></skeleton-loader>
      }
    </div>
  </div>
</pg-playground>
