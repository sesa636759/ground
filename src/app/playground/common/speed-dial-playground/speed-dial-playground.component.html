<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid p-16">
    <div class="control-group">
      <label>Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Strategy</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.strategy"
        (ngModelChange)="updateConfig()"
        [options]="strategyOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Direction</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.direction"
        (ngModelChange)="updateConfig()"
        [options]="directionOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-visuals" class="control-grid p-16">
    <div class="control-group">
      <label>Main Icon</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Color</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Icon Library</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></dui-dropdown>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="control-group">
      <label>Trigger</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.trigger"
        (ngModelChange)="updateConfig()"
        [options]="triggerOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Tooltip Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.tooltipPosition"
        (ngModelChange)="updateConfig()"
        [options]="tooltipOptions"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showTooltips"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Tooltips
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage w-full h-300 relative display-flex justify-center items-center rounded-12 overflow-hidden"
  >
    <div class="bg-pattern absolute inset-0 opacity-10 pointer-events-none"></div>

    <dui-speed-dial
      [attr.position]="pgConfig.position"
      [attr.strategy]="pgConfig.strategy"
      [attr.icon]="pgConfig.icon"
      [attr.icon-library]="pgConfig.iconLibrary"
      [attr.action-library]="pgConfig.actionLibrary"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.direction]="pgConfig.direction"
      [attr.tooltip-position]="pgConfig.tooltipPosition"
      [attr.show-tooltips]="pgConfig.showTooltips ? '' : null"
      [attr.trigger]="pgConfig.trigger"
      [actions]="actionsJson"
      (actionClick)="onActionClick($event)"
    ></dui-speed-dial>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
