<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Appearance Section -->
  <div slot="content-appearance" class="control-grid appearance-section">
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Layout</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Vertical', value: 'vertical' },
          { label: 'Horizontal', value: 'horizontal' },
        ]"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Importance</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.importance"
        (ngModelChange)="updateConfig()"
        [options]="importanceOptions"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Pattern</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></dui-dropdown>
    </div>

    <div class="control-group">
      <label>Border Radius</label>
      <dui-input
        [(ngModel)]="pgConfig.borderRadius"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 16px"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Width</label>
      <dui-input
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 100%"
      ></dui-input>
    </div>

    <div class="control-group">
      <label>Height</label>
      <dui-input
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. auto"
      ></dui-input>
    </div>
  </div>

  <!-- Features Section -->
  <div slot="content-features" class="checkbox-grid features-section">
    <div class="control-group full-width features-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.hoverable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Hoverable
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()"></dui-checkbox>
        Glass Effect
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.bordered"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Bordered
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.flippable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Flippable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.collapsible"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Collapsible
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.closable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Closable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.loading"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Clickable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.autoScroll"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Auto Scroll
      </label>
    </div>

    <div class="control-group" *ngIf="pgConfig.flippable">
      <label>Flip Trigger</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.flipTrigger"
        (ngModelChange)="updateConfig()"
        [options]="flipTriggerOptions"
      ></dui-dropdown>
    </div>

    <div class="control-group" *ngIf="pgConfig.autoScroll">
      <label>Scroll Behavior</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.scrollBehavior"
        (ngModelChange)="updateConfig()"
        [options]="scrollBehaviorOptions"
      ></dui-dropdown>
    </div>
  </div>

  <!-- Content & Style Section -->
  <div slot="content-content" class="control-grid content-section">
    <div class="control-group">
      <label>Card Title</label>
      <dui-input [(ngModel)]="pgConfig.cardTitle" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Description</label>
      <dui-input [(ngModel)]="pgConfig.description" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Tag Text</label>
      <dui-input [(ngModel)]="pgConfig.tag" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Action Comma List</label>
      <dui-input [(ngModel)]="pgConfig.actions" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>Ribbon Text</label>
      <dui-input [(ngModel)]="pgConfig.ribbon" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.ribbon">
      <label>Ribbon Position</label>
      <dui-dropdown
        [(ngModel)]="pgConfig.ribbonPosition"
        (ngModelChange)="updateConfig()"
        [options]="ribbonPositionOptions"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Extra (Header)</label>
      <dui-input [(ngModel)]="pgConfig.extra" (ngModelChange)="updateConfig()"></dui-input>
    </div>
    <div class="control-group">
      <label>HREF (Clickable)</label>
      <dui-input
        [(ngModel)]="pgConfig.href"
        (ngModelChange)="updateConfig()"
        placeholder="https://..."
      ></dui-input>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview class="preview-stage card-preview">
    <dui-card
      #demoElement
      [attr.card-id]="pgConfig.cardId"
      [attr.card-title]="pgConfig.cardTitle"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.layout]="pgConfig.layout"
      [attr.importance]="pgConfig.importance"
      [attr.pattern]="pgConfig.pattern"
      [attr.type]="pgConfig.type"
      [attr.glass]="pgConfig.glass ? '' : null"
      [attr.bordered]="pgConfig.bordered ? 'true' : 'false'"
      [attr.border-radius]="pgConfig.borderRadius"
      [attr.width]="pgConfig.width"
      [attr.height]="pgConfig.height"
      [attr.aspect-ratio]="pgConfig.aspectRatio"
      [attr.hoverable]="pgConfig.hoverable ? '' : null"
      [attr.flippable]="pgConfig.flippable ? '' : null"
      [attr.flip-trigger]="pgConfig.flipTrigger"
      [attr.collapsible]="pgConfig.collapsible ? '' : null"
      [attr.closable]="pgConfig.closable ? '' : null"
      [attr.selectable]="pgConfig.selectable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.href]="pgConfig.href"
      [attr.target]="pgConfig.target"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.auto-scroll]="pgConfig.autoScroll ? '' : null"
      [attr.scroll-behavior]="pgConfig.scrollBehavior"
      [attr.ribbon]="pgConfig.ribbon"
      [attr.ribbon-position]="pgConfig.ribbonPosition"
      [attr.ribbon-color]="pgConfig.ribbonColor"
      [attr.cover]="pgConfig.cover"
      [attr.cover-alt]="pgConfig.coverAlt"
      [attr.avatar]="pgConfig.avatar"
      [attr.avatar-icon]="pgConfig.avatarIcon"
      [attr.description]="pgConfig.description"
      [attr.tag]="pgConfig.tag"
      [attr.button-text]="pgConfig.buttonText"
      [attr.actions]="pgConfig.actions"
      [attr.show-menu]="pgConfig.showMenu ? '' : null"
      [attr.menu-actions]="pgConfig.menuActions"
      [attr.icon-library]="pgConfig.iconLibrary"
      [menuItems]="menuJson"
      (cardClick)="onCardClick()"
      (cardClose)="onCardClose()"
      (cardToggle)="onCardCollapse($event)"
      (cardSelect)="onCardSelect($event)"
      (cardFlip)="onCardFlip($event)"
    >
      <!-- Mixed content demo -->
      <div slot="tabs" *ngIf="pgConfig.pattern === 'default'">
        <dui-tabs>
          <dui-tab-panel label="Info" icon="info" icon-library="lucide"
            >Information content</dui-tab-panel
          >
          <dui-tab-panel label="Settings" icon="settings" icon-library="lucide"
            >Settings content</dui-tab-panel
          >
        </dui-tabs>
      </div>

      <div slot="back" *ngIf="pgConfig.flippable">
        <div class="card-back-content">
          <dui-icon
            name="shield-check"
            library="lucide"
            size="3em"
            color="var(--ui-success)"
          ></dui-icon>
          <h3 class="card-back-title">Security Verified</h3>
          <p>This side is perfectly secure for sensitive data.</p>
          <dui-button label="Verify" variant="success"></dui-button>
        </div>
      </div>

      <div slot="content" *ngIf="!pgConfig.description">
        <p>This is the main content slot of the card. You can use full HTML here.</p>
      </div>

      <div slot="footer" *ngIf="!pgConfig.buttonText && !pgConfig.actions">
        <div class="card-footer-actions">
          <dui-button label="Cancel" variant="ghost"></dui-button>
          <dui-button label="Submit" variant="primary"></dui-button>
        </div>
      </div>
    </dui-card>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
