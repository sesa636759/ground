<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Design Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>

    <div
      class="control-grid"
      style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0"
    >
      <div class="control-group">
        <label>Width</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.width"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
      <div class="control-group">
        <label>Radius</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.borderRadius"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
    </div>

    <div class="control-group">
      <label>Content Layout</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Vertical stacking', value: 'vertical' },
          { label: 'Horizontal flow', value: 'horizontal' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px">
      <div class="control-group">
        <label>Importance</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.importance"
          (ngModelChange)="updateConfig()"
          [options]="importanceOptions"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Pattern</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.pattern"
          (ngModelChange)="updateConfig()"
          [options]="patternOptions"
        ></ui-dropdown>
      </div>
    </div>

    <div class="control-group" style="margin-top: 16px">
      <label>Ribbon Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.ribbon"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Sale"
      ></ui-input>
    </div>

    <div class="control-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px">
      <div class="control-group">
        <label>Ribbon Color</label>
        <ui-input
          type="color"
          [(ngModel)]="pgConfig.ribbonColor"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
      <div class="control-group">
        <label>Ribbon Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.ribbonPosition"
          (ngModelChange)="updateConfig()"
          [options]="ribbonPositionOptions"
        ></ui-dropdown>
      </div>
    </div>

    <div class="control-group" style="margin-top: 16px">
      <label>Special Effects</label>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <ui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()"></ui-checkbox>
          Glassmorphism
        </label>
        <label class="checkbox-item">
          <ui-checkbox
            [(ngModel)]="pgConfig.hoverable"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          Raise on hover
        </label>
      </div>
    </div>
  </div>

  <div slot="content-features" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.flippable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Flippable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showMenu" (ngModelChange)="updateConfig()"></ui-checkbox>
        Menu
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.closable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Closable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.collapsible"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Collapsible
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-card
      #demoElement
      [attr.variant]="pgConfig.variant"
      [attr.hoverable]="pgConfig.hoverable ? '' : null"
      [attr.flippable]="pgConfig.flippable ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.show-menu]="pgConfig.showMenu ? '' : null"
      [attr.closable]="pgConfig.closable ? '' : null"
      [attr.selectable]="pgConfig.selectable ? '' : null"
      [attr.collapsible]="pgConfig.collapsible ? '' : null"
      [attr.glass]="pgConfig.glass ? '' : null"
      [attr.layout]="pgConfig.layout"
      [attr.size]="pgConfig.size"
      [attr.type]="pgConfig.type"
      [importance]="pgConfig.importance"
      [pattern]="pgConfig.pattern"
      [ribbon]="pgConfig.ribbon || null"
      [ribbon-color]="pgConfig.ribbon ? pgConfig.ribbonColor : null"
      [ribbon-position]="pgConfig.ribbon ? pgConfig.ribbonPosition : null"
      [attr.border-radius]="pgConfig.borderRadius"
      [attr.width]="pgConfig.width"
      [menuItems]="menuJson"
      (cardClick)="logEvent('Card Clicked')"
      (cardClose)="logEvent('Card Closed')"
    >
      <div
        slot="cover"
        class="demo-cover-image"
        style="
          background: #2563eb;
          height: 160px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          border-top-left-radius: inherit;
          border-top-right-radius: inherit;
        "
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m8 3 4 8 5-5 5 15H2L8 3z" />
        </svg>
      </div>
      <div slot="header">
        <h3 style="margin: 0; font-weight: 700">Exploring the Alps</h3>
      </div>
      <div slot="content" class="demo-card-content">
        <p>
          Experience the breathtaking views and serene landscapes of the highest mountain range in
          Europe. Perfect for adventure seekers!
        </p>
      </div>
      <div slot="footer" style="display: flex; gap: 12px; width: 100%">
        <ui-button variant="primary" style="flex: 1" label="Book Now"></ui-button>
        <ui-button variant="secondary" label="Details"></ui-button>
      </div>
      <div slot="back-content" style="padding: 24px">
        <h3 style="color: var(--primary-color); margin-bottom: 16px; margin-top: 0">
          Tour Statistics
        </h3>
        <ul style="padding-left: 20px; color: var(--text-secondary); line-height: 2; margin: 0">
          <li>Elevation: 4,808m</li>
          <li>Length: 1,200km</li>
          <li>Area: 200,000 km²</li>
          <li>Duration: 5-7 Days</li>
        </ul>
      </div>
    </ui-card>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
