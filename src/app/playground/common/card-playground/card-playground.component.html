<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Appearance Section -->
  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Layout</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="[{label: 'Vertical', value: 'vertical'}, {label: 'Horizontal', value: 'horizontal'}]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Importance</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.importance"
        (ngModelChange)="updateConfig()"
        [options]="importanceOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Pattern</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Border Radius</label>
      <ui-input
        [(ngModel)]="pgConfig.borderRadius"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 16px"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Width</label>
      <ui-input
        [(ngModel)]="pgConfig.width"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 100%"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Height</label>
      <ui-input
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. auto"
      ></ui-input>
    </div>
  </div>

  <!-- Features Section -->
  <div slot="content-features" class="checkbox-grid" style="padding: 16px">
    <div class="control-group full-width" style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.hoverable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Hoverable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()"></ui-checkbox>
        Glass Effect
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.bordered" (ngModelChange)="updateConfig()"></ui-checkbox>
        Bordered
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.flippable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Flippable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.collapsible" (ngModelChange)="updateConfig()"></ui-checkbox>
        Collapsible
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.closable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Closable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.selectable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.clickable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Clickable
      </label>
       <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoScroll" (ngModelChange)="updateConfig()"></ui-checkbox>
        Auto Scroll
      </label>
    </div>

    <div class="control-group" *ngIf="pgConfig.flippable">
      <label>Flip Trigger</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.flipTrigger"
        (ngModelChange)="updateConfig()"
        [options]="flipTriggerOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group" *ngIf="pgConfig.autoScroll">
      <label>Scroll Behavior</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.scrollBehavior"
        (ngModelChange)="updateConfig()"
        [options]="scrollBehaviorOptions"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Content & Style Section -->
  <div slot="content-content" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Card Title</label>
      <ui-input [(ngModel)]="pgConfig.cardTitle" (ngModelChange)="updateConfig()"></ui-input>
    </div>
     <div class="control-group">
      <label>Description</label>
      <ui-input [(ngModel)]="pgConfig.description" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Tag Text</label>
      <ui-input [(ngModel)]="pgConfig.tag" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Action Comma List</label>
      <ui-input [(ngModel)]="pgConfig.actions" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Ribbon Text</label>
      <ui-input [(ngModel)]="pgConfig.ribbon" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group" *ngIf="pgConfig.ribbon">
      <label>Ribbon Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.ribbonPosition"
        (ngModelChange)="updateConfig()"
        [options]="ribbonPositionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
        <label>Extra (Header)</label>
        <ui-input [(ngModel)]="pgConfig.extra" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
        <label>HREF (Clickable)</label>
        <ui-input [(ngModel)]="pgConfig.href" (ngModelChange)="updateConfig()" placeholder="https://..."></ui-input>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview style="padding: 40px; display: flex; justify-content: center; min-height: 400px; background: #f8fafc;">
    <ui-card
      #demoElement
      [attr.card-id]="pgConfig.cardId"
      [attr.card-title]="pgConfig.cardTitle"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.layout]="pgConfig.layout"
      [attr.importance]="pgConfig.importance"
      [attr.pattern]="pgConfig.pattern"
      [attr.type]="pgConfig.type"
      [attr.glass]="pgConfig.glass ? '' : null"
      [attr.bordered]="pgConfig.bordered ? 'true' : 'false'"
      [attr.border-radius]="pgConfig.borderRadius"
      [attr.width]="pgConfig.width"
      [attr.height]="pgConfig.height"
      [attr.aspect-ratio]="pgConfig.aspectRatio"
      [attr.hoverable]="pgConfig.hoverable ? '' : null"
      [attr.flippable]="pgConfig.flippable ? '' : null"
      [attr.flip-trigger]="pgConfig.flipTrigger"
      [attr.collapsible]="pgConfig.collapsible ? '' : null"
      [attr.closable]="pgConfig.closable ? '' : null"
      [attr.selectable]="pgConfig.selectable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.href]="pgConfig.href"
      [attr.target]="pgConfig.target"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.auto-scroll]="pgConfig.autoScroll ? '' : null"
      [attr.scroll-behavior]="pgConfig.scrollBehavior"
      [attr.ribbon]="pgConfig.ribbon"
      [attr.ribbon-position]="pgConfig.ribbonPosition"
      [attr.ribbon-color]="pgConfig.ribbonColor"
      [attr.cover]="pgConfig.cover"
      [attr.cover-alt]="pgConfig.coverAlt"
      [attr.avatar]="pgConfig.avatar"
      [attr.avatar-icon]="pgConfig.avatarIcon"
      [attr.description]="pgConfig.description"
      [attr.tag]="pgConfig.tag"
      [attr.button-text]="pgConfig.buttonText"
      [attr.actions]="pgConfig.actions"
      [attr.show-menu]="pgConfig.showMenu ? '' : null"
      [attr.menu-actions]="pgConfig.menuActions"
      [attr.icon-library]="pgConfig.iconLibrary"
      [menuItems]="menuJson"
      (cardClick)="onCardClick()"
      (cardClose)="onCardClose()"
      (cardToggle)="onCardCollapse($event)"
      (cardSelect)="onCardSelect($event)"
      (cardFlip)="onCardFlip($event)"
    >
        <!-- Mixed content demo -->
        <div slot="tabs" *ngIf="pgConfig.pattern === 'default'">
            <ui-tabs>
                <ui-tab-panel label="Info" icon="info" icon-library="lucide">Information content</ui-tab-panel>
                <ui-tab-panel label="Settings" icon="settings" icon-library="lucide">Settings content</ui-tab-panel>
            </ui-tabs>
        </div>

        <div slot="back" *ngIf="pgConfig.flippable">
            <div style="padding: 24px; text-align: center;">
                <ui-icon name="shield-check" library="lucide" size="3em" color="var(--ui-success)"></ui-icon>
                <h3 style="margin-top: 16px;">Security Verified</h3>
                <p>This side is perfectly secure for sensitive data.</p>
                <ui-button label="Verify" variant="success"></ui-button>
            </div>
        </div>

        <div slot="content" *ngIf="!pgConfig.description">
            <p>This is the main content slot of the card. You can use full HTML here.</p>
        </div>

        <div slot="footer" *ngIf="!pgConfig.buttonText && !pgConfig.actions">
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <ui-button label="Cancel" variant="ghost"></ui-button>
                <ui-button label="Submit" variant="primary"></ui-button>
            </div>
        </div>
    </ui-card>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
