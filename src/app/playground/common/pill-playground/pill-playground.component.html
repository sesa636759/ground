<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Counter</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.counter"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.removable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Removable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Clickable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div style="width: 100%; display: flex; justify-content: center; align-items: center">
      <ui-pill
        [attr.label]="pgConfig.label"
        [attr.variant]="pgConfig.variant"
        [attr.color]="pgConfig.color"
        [attr.size]="pgConfig.size"
        [attr.removable]="pgConfig.removable ? '' : null"
        [attr.clickable]="pgConfig.clickable ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.counter]="pgConfig.counter"
        icon="🏷️"
        (pillRemoved)="onPillAction('removed')"
        (pillClicked)="onPillAction('clicked')"
      ></ui-pill>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
