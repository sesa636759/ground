<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Core Settings -->
  <div slot="content-settings" class="control-grid p-16">
    <div class="control-group">
      <label>Current Page</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.currentPage"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Total Items</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.totalItems"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Items Per Page</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.itemsPerPage"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Max Visible Buttons</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.maxVisiblePages"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Styling & Layout -->
  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Display Type</label>
      <dui-dropdown
        [options]="typeOptions"
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <dui-dropdown
        [options]="sizeOptions"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <dui-dropdown
        [options]="variantOptions"
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Theme</label>
      <dui-dropdown
        [options]="themeOptions"
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <dui-dropdown
        [options]="shapeOptions"
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
      ></dui-dropdown>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.iconOnly"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Icons Only
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.compact"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Compact Mode
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></dui-checkbox>
        RTL Support
      </label>
    </div>
  </div>

  <!-- Controls -->
  <div slot="content-controls" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showFirstLast"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        First/Last Buttons
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showPrevNext"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Prev/Next Buttons
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showPageSize"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Page Size Selector
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showTotal"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Total Items
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showJumpTo"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Jump To
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.quickJump"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Enable Quick Jump
      </label>
    </div>
    <div class="control-group" *ngIf="pgConfig.quickJump">
      <label>Quick Jump Step</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.quickJumpStep"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <!-- Advanced -->
  <div slot="content-advanced" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.infinite"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Infinite Scroll Style
      </label>
      <label class="checkbox-item" *ngIf="pgConfig.infinite">
        <dui-checkbox
          [(ngModel)]="pgConfig.loading"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Infinite Loading State
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showProgress"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Progress Bar
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.autoHide"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Auto Hide (Single Page)
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.keyboardNav"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Keyboard Navigation
      </label>
      <label class="checkbox-item">
        <dui-checkbox [(ngModel)]="pgConfig.sticky" (ngModelChange)="updateConfig()"></dui-checkbox>
        Sticky Position
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div
    preview
    class="preview-stage w-full display-flex justify-center items-center flex-col p-60-40 bg-offwhite min-h-400"
  >
    <dui-pagination
      #pagination
      [attr.current-page]="pgConfig.currentPage"
      [attr.total-items]="pgConfig.totalItems"
      [attr.items-per-page]="pgConfig.itemsPerPage"
      [attr.max-visible-pages]="pgConfig.maxVisiblePages"
      [attr.type]="pgConfig.type"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.theme]="pgConfig.theme"
      [attr.shape]="pgConfig.shape"
      [attr.show-first-last]="pgConfig.showFirstLast ? '' : null"
      [attr.show-prev-next]="pgConfig.showPrevNext ? '' : null"
      [attr.icon-only]="pgConfig.iconOnly ? '' : null"
      [attr.show-page-size]="pgConfig.showPageSize ? '' : null"
      [attr.show-total]="pgConfig.showTotal ? '' : null"
      [attr.show-jump-to]="pgConfig.showJumpTo ? '' : null"
      [attr.quick-jump]="pgConfig.quickJump ? '' : null"
      [attr.quick-jump-step]="pgConfig.quickJumpStep"
      [attr.infinite]="pgConfig.infinite ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.auto-hide]="pgConfig.autoHide ? '' : null"
      [attr.show-progress]="pgConfig.showProgress ? '' : null"
      [attr.keyboard-nav]="pgConfig.keyboardNav ? '' : null"
      [attr.sticky]="pgConfig.sticky ? '' : null"
      [attr.sticky-position]="pgConfig.stickyPosition"
      [attr.rtl]="pgConfig.rtl ? '' : null"
      [attr.compact]="pgConfig.compact ? '' : null"
      (pageChange)="onPageChange($event)"
    ></dui-pagination>

    <div class="mt-32 text-center text-slate-500 fs-14 p-12 rounded-8 bg-slate-50">
      <p>Data View Simulator</p>
      <strong
        >Page {{ pgConfig.currentPage }} /
        {{ Math.ceil(pgConfig.totalItems / pgConfig.itemsPerPage) }}</strong
      >
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
