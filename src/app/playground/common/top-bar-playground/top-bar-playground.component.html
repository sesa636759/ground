<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-structure" class="control-grid p-16">
    <div class="control-group">
      <label>Logo Text</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.logoText"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.sticky" (ngModelChange)="updateConfig()"></ui-checkbox>
        Sticky Position
      </label>
    </div>
  </div>

  <div slot="content-visuals" class="control-grid p-16">
    <div class="control-group">
      <label>Height (px)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.height"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      padding: 40px;
    "
  >
    <div
      class="top-bar-container"
      style="
        width: 100%;
        max-width: 600px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface-1);
      "
    >
      <ui-top-bar [attr.sticky]="pgConfig.sticky ? '' : null" [style.height.px]="pgConfig.height">
        <div
          slot="start"
          style="
            padding: 0 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            height: 100%;
          "
        >
          {{ pgConfig.logoText }}
        </div>
        <div
          slot="end"
          style="padding: 0 20px; display: flex; gap: 16px; align-items: center; height: 100%"
        >
          <span>Alerts</span>
          <span>Profile</span>
        </div>
      </ui-top-bar>
    </div>
    <div
      class="content-placeholder"
      style="
        width: 100%;
        max-width: 600px;
        text-align: center;
        color: var(--text-secondary);
        padding: 24px;
      "
    >
      <p>Body content goes here. If sticky is enabled, the bar will stay at the top on scroll.</p>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
