<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-features" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show Icons
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.expandAll"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Expand All
      </label>
    </div>
  </div>

  <div preview class="w-full display-flex justify-center items-start p-40">
    <div class="w-full max-w-400 bg-surface-1 rounded-12 border p-16">
      <dui-tree-list
        #demoElement
        [attr.selectable]="pgConfig.selectable ? '' : null"
        [model]="modelJson"
        (selectionChange)="onTreeSelection($event)"
      >
      </dui-tree-list>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
