<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-features" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Icons
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.expandAll"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Expand All
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    "
  >
    <div
      style="
        width: 100%;
        max-width: 400px;
        background: var(--surface-1);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 16px;
      "
    >
      <ui-tree-list
        #demoElement
        [attr.selectable]="pgConfig.selectable ? '' : null"
        [model]="modelJson"
        (selectionChange)="onTreeSelection($event)"
      >
      </ui-tree-list>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
