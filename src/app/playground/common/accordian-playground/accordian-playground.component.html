<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-visual" class="control-grid p-16">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Icon Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconPosition"
        (ngModelChange)="updateConfig()"
        [options]="iconPositionOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Icon Library</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconLibrary"
        (ngModelChange)="updateConfig()"
        [options]="iconLibraryOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Selected Header Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.selectedHeaderColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Header Level (1-6)</label>
      <ui-input
        type="number"
        min="1"
        max="6"
        [(ngModel)]="pgConfig.headerLevel"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.hideArrow" (ngModelChange)="updateConfig()" /> Hide Arrow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showNumbers" (ngModelChange)="updateConfig()" /> Show
        Numbers
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()" /> RTL
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.dense" (ngModelChange)="updateConfig()" /> Dense
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid p-16">
    <div class="control-group">
      <label>Expansion Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.multiple"
        (ngModelChange)="updateConfig()"
        [options]="expansionModeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group mt-16">
      <label>Default Open (IDs, comma-separated)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.defaultOpen"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. p1, p2"
      ></ui-input>
    </div>

    <div class="control-group mt-16" [class.disabled-group]="!pgConfig.enableSearch">
      <label>Search Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
        placeholder="Search..."
      ></ui-input>
    </div>

    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableSearch" (ngModelChange)="updateConfig()" /> Search
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.enableExpandCollapseAll"
          (ngModelChange)="updateConfig()"
        />
        Expand/Collapse All
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableDragDrop" (ngModelChange)="updateConfig()" /> Drag
        & Drop
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableNested" (ngModelChange)="updateConfig()" /> Nested
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enablePersistence" (ngModelChange)="updateConfig()" />
        Persistence
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading
      </label>
    </div>

    <div class="control-group mt-16" [class.disabled-group]="!pgConfig.enablePersistence">
      <label>Persistence Key</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.persistenceKey"
        (ngModelChange)="updateConfig()"
        placeholder="accordion-state-v1"
      ></ui-input>
    </div>
  </div>

  <div slot="content-animation" class="control-grid p-16">
    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.animationDuration"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Timing Function</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animationTiming"
        (ngModelChange)="updateConfig()"
        [options]="timingOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.lazy" (ngModelChange)="updateConfig()" /> Lazy Load
      </label>
    </div>
  </div>

  <div slot="content-advanced" class="control-grid p-16">
    <div class="control-group">
      <label>Physics</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.physics"
        (ngModelChange)="updateConfig()"
        [options]="physicsOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Columns (1–4)</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.columns"
        (ngModelChange)="updateConfig()"
        [options]="columnsOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Arrow Icon Collapsed</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.arrowIconCollapsed"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. chevron-right"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Arrow Icon Expanded</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.arrowIconExpanded"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. chevron-down"
      ></ui-input>
    </div>

    <div class="checkbox-grid mt-16">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoScroll" (ngModelChange)="updateConfig()" /> Auto
        Scroll
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.stickyHeaders" (ngModelChange)="updateConfig()" /> Sticky
        Headers
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.printExpandAll" (ngModelChange)="updateConfig()" /> Print
        Expand All
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <ui-accordion
      #demoElement
      [items]="playgroundItems"
      [multiple]="pgConfig.multiple"
      [defaultOpen]="getParsedDefaultOpen()"
      [variant]="pgConfig.variant"
      [size]="pgConfig.size"
      [attr.icon-library]="pgConfig.iconLibrary || null"
      [attr.icon-position]="pgConfig.iconPosition"
      [attr.selected-header-color]="pgConfig.selectedHeaderColor"
      [attr.hide-arrow]="pgConfig.hideArrow ? '' : null"
      [attr.show-numbers]="pgConfig.showNumbers ? '' : null"
      [attr.rtl]="pgConfig.rtl ? '' : null"
      [attr.dense]="pgConfig.dense ? '' : null"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.enable-search]="pgConfig.enableSearch ? '' : null"
      [attr.search-placeholder]="pgConfig.enableSearch ? pgConfig.searchPlaceholder : null"
      [attr.enable-expand-collapse-all]="pgConfig.enableExpandCollapseAll ? '' : null"
      [attr.enable-drag-drop]="pgConfig.enableDragDrop ? '' : null"
      [attr.enable-nested]="pgConfig.enableNested ? '' : null"
      [attr.enable-persistence]="pgConfig.enablePersistence ? '' : null"
      [attr.persistence-key]="pgConfig.enablePersistence ? pgConfig.persistenceKey : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.animation-duration]="pgConfig.animationDuration"
      [attr.animation-timing]="pgConfig.animationTiming"
      [attr.lazy]="pgConfig.lazy ? '' : null"
      [attr.header-level]="pgConfig.headerLevel"
      [attr.auto-scroll]="pgConfig.autoScroll ? '' : null"
      [attr.sticky-headers]="pgConfig.stickyHeaders ? '' : null"
      [attr.physics]="pgConfig.physics !== 'stiff' ? pgConfig.physics : null"
      [attr.columns]="pgConfig.columns > 1 ? pgConfig.columns : null"
      [attr.theme]="pgConfig.theme !== 'default' ? pgConfig.theme : null"
      [attr.print-expand-all]="pgConfig.printExpandAll ? '' : null"
      [attr.arrow-icon-collapsed]="pgConfig.arrowIconCollapsed || null"
      [attr.arrow-icon-expanded]="pgConfig.arrowIconExpanded || null"
      class="w-full"
      (accordionChange)="onAccordionChange($event)"
    >
    </ui-accordion>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
