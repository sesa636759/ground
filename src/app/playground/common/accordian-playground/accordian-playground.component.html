<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-visual" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Icon Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.iconPosition"
        (ngModelChange)="updateConfig()"
        [options]="iconPositionOptions"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Selected Header Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.selectedHeaderColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Header Level (1-6)</label>
      <ui-input
        type="number"
        min="1"
        max="6"
        [(ngModel)]="pgConfig.headerLevel"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.hideArrow" (ngModelChange)="updateConfig()" /> Hide Arrow
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showNumbers" (ngModelChange)="updateConfig()" /> Show
        Numbers
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()" /> RTL
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.dense" (ngModelChange)="updateConfig()" /> Dense
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Expansion Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.multiple"
        (ngModelChange)="updateConfig()"
        [options]="expansionModeOptions"
      ></ui-dropdown>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableSearch" (ngModelChange)="updateConfig()" /> Search
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.enableExpandCollapseAll"
          (ngModelChange)="updateConfig()"
        />
        Expand/Collapse All
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableDragDrop" (ngModelChange)="updateConfig()" /> Drag
        & Drop
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableNested" (ngModelChange)="updateConfig()" /> Nested
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading
      </label>
    </div>
  </div>

  <div slot="content-animation" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.animationDuration"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Timing Function</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.animationTiming"
        (ngModelChange)="updateConfig()"
        [options]="timingOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.lazy" (ngModelChange)="updateConfig()" /> Lazy Load
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <ui-accordion
      #demoElement
      [items]="playgroundItems"
      [multiple]="pgConfig.multiple"
      [variant]="pgConfig.variant"
      [size]="pgConfig.size"
      [attr.icon-position]="pgConfig.iconPosition"
      [attr.selected-header-color]="pgConfig.selectedHeaderColor"
      [attr.hide-arrow]="pgConfig.hideArrow ? '' : null"
      [attr.show-numbers]="pgConfig.showNumbers ? '' : null"
      [attr.rtl]="pgConfig.rtl ? '' : null"
      [attr.dense]="pgConfig.dense ? '' : null"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.enable-search]="pgConfig.enableSearch ? '' : null"
      [attr.enable-expand-collapse-all]="pgConfig.enableExpandCollapseAll ? '' : null"
      [attr.enable-drag-drop]="pgConfig.enableDragDrop ? '' : null"
      [attr.enable-nested]="pgConfig.enableNested ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.animation-duration]="pgConfig.animationDuration"
      [attr.animation-timing]="pgConfig.animationTiming"
      [attr.lazy]="pgConfig.lazy ? '' : null"
      [attr.header-level]="pgConfig.headerLevel"
      style="width: 100%"
      (accordionChange)="onAccordionChange($event)"
    >
    </ui-accordion>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
