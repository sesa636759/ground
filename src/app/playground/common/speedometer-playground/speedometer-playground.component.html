<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-settings" class="control-grid p-16">
    <div class="control-group">
      <label>Current Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Secondary Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.secondaryValue"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Min Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.minValue"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxValue"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Label</label>
      <ui-input [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Unit</label>
      <ui-input [(ngModel)]="pgConfig.unit" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showPercentage"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Percentage
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.interactive"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Interactive
      </label>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid p-16">
    <div class="control-group">
      <label>Size (px)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Needle Shape</label>
      <ui-dropdown
        [options]="needleShapeOptions"
        [(ngModel)]="pgConfig.needleShape"
        (ngModelChange)="updateConfig()"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Needle Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.needleColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Start Angle</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.startAngle"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>End Angle</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.endAngle"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Animation (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.animationDuration"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-advanced" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showTicks"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Ticks
      </label>
    </div>
    <div class="control-group">
      <label>Tick Count</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.tickCount"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group full-width">
      <label>Ranges (JSON)</label>
      <ui-input
        [(ngModel)]="pgConfig.ranges"
        (ngModelChange)="updateConfig()"
        placeholder='[{"min":0,"max":30,"color":"#green"}]'
      ></ui-input>
    </div>
    <div class="control-group full-width">
      <label>Custom Labels (JSON)</label>
      <ui-input
        [(ngModel)]="pgConfig.customLabels"
        (ngModelChange)="updateConfig()"
        placeholder='{"0":"E","100":"F"}'
      ></ui-input>
    </div>
    <div class="control-group full-width">
      <label>Gradient Colors</label>
      <ui-input
        [(ngModel)]="pgConfig.gradientColors"
        (ngModelChange)="updateConfig()"
        placeholder="red, yellow, green"
      ></ui-input>
    </div>
  </div>

  <div preview>
    <div
      class="preview-stage p-40 display-flex items-center justify-center min-h-400 bg-white"
      
    >
      <ui-speedometer
        [attr.value]="pgConfig.value"
        [attr.secondary-value]="pgConfig.secondaryValue"
        [attr.min-value]="pgConfig.minValue"
        [attr.max-value]="pgConfig.maxValue"
        [attr.size]="pgConfig.size"
        [attr.label]="pgConfig.label"
        [attr.unit]="pgConfig.unit"
        [attr.show-percentage]="pgConfig.showPercentage ? '' : null"
        [attr.needle-color]="pgConfig.needleColor"
        [attr.show-ticks]="pgConfig.showTicks ? '' : null"
        [attr.tick-count]="pgConfig.tickCount"
        [attr.animation-duration]="pgConfig.animationDuration"
        [attr.start-angle]="pgConfig.startAngle"
        [attr.end-angle]="pgConfig.endAngle"
        [attr.needle-shape]="pgConfig.needleShape"
        [attr.interactive]="pgConfig.interactive ? '' : null"
        [attr.ranges]="pgConfig.ranges"
        [attr.custom-labels]="pgConfig.customLabels"
        [attr.gradient-colors]="pgConfig.gradientColors"
        (valueChange)="onValueChange($event)"
      ></ui-speedometer>
    </div>
  </div>
</pg-playground>
