<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-data" class="control-grid p-16">
    <div class="control-group">
      <label>Value</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.value"
        min="0"
        [max]="pgConfig.total"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Total</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.total"
        min="1"
        max="1000"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Title</label>
      <dui-input
        type="text"
        [(ngModel)]="pgConfig.chartTitle"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-colors" class="control-grid p-16">
    <div class="control-group">
      <label>Fill colour</label>
      <dui-input
        type="color"
        [(ngModel)]="pgConfig.fillColor"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Empty colour</label>
      <dui-input
        type="color"
        [(ngModel)]="pgConfig.emptyColor"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-grid" class="control-grid p-16">
    <div class="control-group">
      <label>Rows</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.rows"
        min="1"
        max="20"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label>Columns</label>
      <dui-input
        type="number"
        [(ngModel)]="pgConfig.columns"
        min="1"
        max="20"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label
        >Cell size <span class="range-val">{{ pgConfig.cellSize }}px</span></label
      >
      <dui-input
        type="range"
        [(ngModel)]="pgConfig.cellSize"
        min="8"
        max="48"
        step="2"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
    <div class="control-group">
      <label
        >Gap <span class="range-val">{{ pgConfig.gap }}px</span></label
      >
      <dui-input
        type="range"
        [(ngModel)]="pgConfig.gap"
        min="1"
        max="8"
        step="1"
        (ngModelChange)="updateConfig()"
      ></dui-input>
    </div>
  </div>

  <div slot="content-options" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <dui-checkbox
          [(ngModel)]="pgConfig.showPercentage"
          (ngModelChange)="updateConfig()"
        ></dui-checkbox>
        Show percentage
      </label>
    </div>
  </div>

  <div preview class="preview-stage w-full display-flex justify-center items-center p-40">
    <chart-waffle
      [attr.value]="pgConfig.value"
      [attr.total]="pgConfig.total"
      [attr.chart-title]="pgConfig.chartTitle"
      [attr.fill-color]="pgConfig.fillColor"
      [attr.empty-color]="pgConfig.emptyColor"
      [attr.rows]="pgConfig.rows"
      [attr.columns]="pgConfig.columns"
      [attr.cell-size]="pgConfig.cellSize"
      [attr.gap]="pgConfig.gap"
      [attr.show-percentage]="pgConfig.showPercentage ? 'true' : 'false'"
    ></chart-waffle>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
