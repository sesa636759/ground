<pg-playground [items]="pgAccordionItems" [code]="generatedCode()" (reset)="resetConfig()">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid p-16">
    <div class="control-group">
      <label>Minimum Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.min"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Maximum Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Step Increment</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.step"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Display Format</label>
      <ui-input
        [(ngModel)]="pgConfig.displayFormat"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. {value}%"
      ></ui-input>
    </div>
  </div>

  <!-- Visuals & Labels -->
  <div slot="content-visuals" class="control-grid p-16">
    <div class="control-group">
      <label>Size tier</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Active Track Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Base Track Color</label>
      <ui-input
        type="color"
        [(ngModel)]="pgConfig.trackColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Start Icon (Lucide)</label>
      <ui-input [(ngModel)]="pgConfig.startIcon" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>End Icon (Lucide)</label>
      <ui-input [(ngModel)]="pgConfig.endIcon" (ngModelChange)="updateConfig()"></ui-input>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" class="p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.range" (ngModelChange)="updateConfig()"></ui-checkbox>
        Dual Range Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.vertical" (ngModelChange)="updateConfig()"></ui-checkbox>
        Vertical Orient
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showTooltip"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Tooltip
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.tooltipAlwaysVisible"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Tooltip Static
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showMarks"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Step Marks
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showValue"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Value Label
      </label>
    </div>
  </div>

  <!-- Preview -->
  <div
    preview
    class="preview-stage w-full display-flex justify-center items-center p-40"
    
    [style.height]="pgConfig.vertical ? '400px' : 'auto'"
  >
    <div  class="w-full max-w-500">
      <ui-range-slider
        #demoElement
        [attr.min]="pgConfig.min"
        [attr.max]="pgConfig.max"
        [attr.step]="pgConfig.step"
        [attr.value]="pgConfig.range ? null : pgConfig.value"
        [attr.start-value]="pgConfig.range ? pgConfig.startValue : null"
        [attr.end-value]="pgConfig.range ? pgConfig.endValue : null"
        [attr.range]="pgConfig.range ? '' : null"
        [attr.vertical]="pgConfig.vertical ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.show-tooltip]="pgConfig.showTooltip ? '' : null"
        [attr.tooltip-always-visible]="pgConfig.tooltipAlwaysVisible ? '' : null"
        [attr.show-marks]="pgConfig.showMarks ? '' : null"
        [attr.show-value]="pgConfig.showValue ? '' : null"
        [attr.color]="pgConfig.color"
        [attr.track-color]="pgConfig.trackColor"
        [attr.size]="pgConfig.size"
        [attr.start-icon]="pgConfig.startIcon || null"
        [attr.end-icon]="pgConfig.endIcon || null"
        [attr.display-format]="pgConfig.displayFormat || null"
        (sliderChange)="onSliderChange($event)"
      ></ui-range-slider>

      <div
         class="mt-32 text-muted fs-14 text-center"
      >
        Computed Output:
        <span  class="font-semibold text-primary-color">
          {{ pgConfig.range ? pgConfig.startValue + ' to ' + pgConfig.endValue : pgConfig.value }}
        </span>
      </div>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
