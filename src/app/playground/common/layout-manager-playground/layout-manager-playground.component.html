<pg-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid p-16">
    <div class="control-group">
      <label>Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.mode"
        (ngModelChange)="updateConfig()"
        [options]="modeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-features" class="control-grid p-16">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.resizable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Resizable Panels
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.closable" (ngModelChange)="updateConfig()"></ui-checkbox>
        Closable Panels
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage h-scrollable"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div class="layout-wrapper" style="width: 100%">
      <ui-layout-manager
        #demoElement
        [attr.mode]="pgConfig.mode"
        [attr.resizable]="pgConfig.resizable ? '' : null"
        [attr.closable]="pgConfig.closable ? '' : null"
      >
        <div slot="panel-1" style="padding: 20px; background: #f0f9ff">
          <h3>Panel 1</h3>
          <p>Main content area</p>
        </div>
        <div slot="panel-2" style="padding: 20px; background: #fef3c7">
          <h3>Panel 2</h3>
          <p>Secondary content</p>
        </div>
        <div slot="panel-3" style="padding: 20px; background: #fce7f3">
          <h3>Panel 3</h3>
          <p>Sidebar content</p>
        </div>
      </ui-layout-manager>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</pg-playground>
