<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Size</label>
          <dui-input
            type="range"
            min="180"
            max="360"
            step="20"
            [(ngModel)]="cfg.size"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.size }}px</span>
        </div>
        <div class="control-group">
          <label>Track Width</label>
          <dui-input
            type="range"
            min="10"
            max="30"
            step="2"
            [(ngModel)]="cfg.trackWidth"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.trackWidth }}px</span>
        </div>
        <div class="control-group">
          <label>Gap</label>
          <dui-input
            type="range"
            min="4"
            max="16"
            step="2"
            [(ngModel)]="cfg.gap"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.gap }}px</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="showVal"
            [(ngModel)]="cfg.showValues"
            (ngModelChange)="update()"
            label="Show Values"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showLabels"
            [(ngModel)]="cfg.showLabels"
            (ngModelChange)="update()"
            label="Show Labels"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="rounded"
            [(ngModel)]="cfg.rounded"
            (ngModelChange)="update()"
            label="Rounded Caps"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper w-full display-flex justify-center">
    <div class="relative display-inline-block">
      <svg [attr.width]="cfg.size" [attr.height]="cfg.size" class="display-block">
        <g
          *ngFor="let bar of bars; let i = index"
          [attr.transform]="'translate(' + cfg.size / 2 + ',' + cfg.size / 2 + ')'"
        >
          <!-- Track -->
          <circle
            [attr.r]="getR(i)"
            fill="none"
            stroke="#f3f4f6"
            [attr.stroke-width]="cfg.trackWidth"
          />
          <!-- Arc -->
          <circle
            [attr.r]="getR(i)"
            fill="none"
            [attr.stroke]="bar.color"
            [attr.stroke-width]="cfg.trackWidth"
            [attr.stroke-dasharray]="getDash(bar.value, i)"
            stroke-dashoffset="0"
            [attr.stroke-linecap]="cfg.rounded ? 'round' : 'butt'"
            transform="rotate(-90)"
          />
          <!-- Label -->
          <text
            *ngIf="cfg.showLabels"
            [attr.x]="-(getR(i) + cfg.trackWidth / 2 + 4)"
            y="4"
            text-anchor="end"
            font-size="11"
            [attr.fill]="bar.color"
            font-weight="600"
          >
            {{ bar.label }}
          </text>
          <text
            *ngIf="cfg.showValues"
            [attr.x]="getR(i) + cfg.trackWidth / 2 + 4"
            y="4"
            text-anchor="start"
            font-size="11"
            fill="#374151"
            font-weight="700"
          >
            {{ bar.value }}%
          </text>
        </g>
      </svg>
    </div>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
