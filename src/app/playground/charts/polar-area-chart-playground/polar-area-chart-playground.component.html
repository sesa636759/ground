<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Dataset</label>
          <dui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Legend Position</label>
          <dui-dropdown
            [(ngModel)]="cfg.legendPos"
            (ngModelChange)="update()"
            [options]="legendOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Fill Opacity</label>
          <dui-input
            type="range"
            min="0.3"
            max="1"
            step="0.05"
            [(ngModel)]="cfg.opacity"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.opacity }}</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="legend"
            [(ngModel)]="cfg.showLegend"
            (ngModelChange)="update()"
            label="Show Legend"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="anim"
            [(ngModel)]="cfg.animate"
            (ngModelChange)="update()"
            label="Animate"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper w-full display-flex justify-center">
    <app-chart
      chartType="polarArea"
      [showLegend]="cfg.showLegend"
      [legendPosition]="cfg.legendPos"
      [responsive]="true"
      [data]="activeData"
      class="w-full max-w-480 h-360 m-0-auto display-block"
    ></app-chart>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
