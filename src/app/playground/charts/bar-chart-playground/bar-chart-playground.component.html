<pg-playground
  [items]="[{ id: 'config', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['config']"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <dui-dropdown
            [(ngModel)]="pgConfig.orientation"
            (ngModelChange)="updateConfig()"
            [options]="standardOrientationOptions"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Dataset Mode</label>
          <dui-dropdown
            [(ngModel)]="pgConfig.mode"
            (ngModelChange)="onModeChange()"
            [options]="modeOptions"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Bar Width %</label>
          <dui-input
            type="range"
            min="20"
            max="90"
            step="5"
            [(ngModel)]="pgConfig.barWidth"
            (ngModelChange)="updateConfig()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ pgConfig.barWidth }}%</span>
        </div>
        <div class="control-group">
          <label>Border Radius</label>
          <dui-input
            type="range"
            min="0"
            max="16"
            step="2"
            [(ngModel)]="pgConfig.borderRadius"
            (ngModelChange)="updateConfig()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ pgConfig.borderRadius }}px</span>
        </div>
      </div>

      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="showLegend"
            [(ngModel)]="pgConfig.showLegend"
            (ngModelChange)="updateConfig()"
            label="Show Legend"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showGrid"
            [(ngModel)]="pgConfig.showGrid"
            (ngModelChange)="updateConfig()"
            label="Show Grid"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showValues"
            [(ngModel)]="pgConfig.showValues"
            (ngModelChange)="updateConfig()"
            label="Show Values"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="stacked"
            [(ngModel)]="pgConfig.stacked"
            (ngModelChange)="updateConfig()"
            label="Stacked"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="enableAnimation"
            [(ngModel)]="pgConfig.enableAnimation"
            (ngModelChange)="updateConfig()"
            label="Animate on Load"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showTooltip"
            [(ngModel)]="pgConfig.showTooltip"
            (ngModelChange)="updateConfig()"
            label="Show Tooltip"
          ></dui-checkbox>
        </div>
      </div>
    </div>
  </div>
  <div preview class="w-full display-flex flex-col gap-16 justify-center items-center">
    <dui-bar-chart
      [attr.orientation]="pgConfig.orientation"
      [attr.bar-width]="pgConfig.barWidth"
      [attr.border-radius]="pgConfig.borderRadius"
      [attr.show-legend]="pgConfig.showLegend ? '' : null"
      [attr.show-grid]="pgConfig.showGrid ? '' : null"
      [attr.show-values]="pgConfig.showValues ? '' : null"
      [attr.stacked]="pgConfig.stacked ? '' : null"
      [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
      [attr.show-tooltip]="pgConfig.showTooltip ? '' : null"
      [labels]="labelsJson"
      [datasets]="datasetsJson"
      class="w-full h-380"
    ></dui-bar-chart>
  </div>
</pg-playground>
