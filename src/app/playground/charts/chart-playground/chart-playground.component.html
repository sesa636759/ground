<pg-playground
  [items]="[{ id: 'config', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['config']"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Chart Type</h3>
        <div class="control-group">
          <label>Type</label>
          <dui-dropdown
            name="type"
            [(ngModel)]="pgConfig.type"
            (ngModelChange)="updateConfig()"
            [options]="typeOptions"
          ></dui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="showLegend"
            name="showLegend"
            [(ngModel)]="pgConfig.showLegend"
            (ngModelChange)="updateConfig()"
            label="Show Legend"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="responsive"
            name="responsive"
            [(ngModel)]="pgConfig.responsive"
            (ngModelChange)="updateConfig()"
            label="Responsive"
          ></dui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div preview class="w-full display-flex justify-center items-center">
    <dui-chart
      #chart
      [attr.type]="pgConfig.type"
      [attr.show-legend]="pgConfig.showLegend ? '' : null"
      [attr.responsive]="pgConfig.responsive ? '' : null"
      [data]="chartDataJson"
      class="w-full h-350"
    >
    </dui-chart>
  </div>
</pg-playground>
