<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <dui-dropdown
            [(ngModel)]="cfg.orientation"
            (ngModelChange)="update()"
            [options]="orientOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Segment Gap</label>
          <dui-input
            type="range"
            min="0"
            max="12"
            step="2"
            [(ngModel)]="cfg.gap"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.gap }}px</span>
        </div>
        <div class="control-group">
          <label>Neck Width %</label>
          <dui-input
            type="range"
            min="10"
            max="50"
            step="5"
            [(ngModel)]="cfg.neckPct"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.neckPct }}%</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="showVals"
            [(ngModel)]="cfg.showValues"
            (ngModelChange)="update()"
            label="Show Values"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showPct"
            [(ngModel)]="cfg.showPct"
            (ngModelChange)="update()"
            label="Show %"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="curved"
            [(ngModel)]="cfg.curved"
            (ngModelChange)="update()"
            label="Curved Sides"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper w-full display-flex justify-center">
    <svg width="420" height="380" class="display-block font-inherit">
      <g *ngFor="let seg of segments; let i = index">
        <polygon
          [attr.points]="getPoints(i)"
          [attr.fill]="seg.color"
          [attr.opacity]="0.85 - i * 0.05"
        />
        <text
          [attr.x]="210"
          [attr.y]="segTop(i) + segH / 2 + 5"
          text-anchor="middle"
          font-size="13"
          fill="white"
          font-weight="700"
        >
          {{ seg.label }}
          <tspan *ngIf="cfg.showValues">— {{ seg.value }}</tspan>
          <tspan *ngIf="cfg.showPct">({{ pct(i) }}%)</tspan>
        </text>
      </g>
    </svg>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
