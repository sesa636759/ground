<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '\u2699\ufe0f' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Style</h3>
        <div class="control-group">
          <label>Stroke Width</label>
          <dui-input
            type="range"
            min="1"
            max="5"
            step="0.5"
            [(ngModel)]="cfg.strokeWidth"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="step-line-stroke-label">{{ cfg.strokeWidth }}px</span>
        </div>
        <div class="control-group">
          <label>Point Radius</label>
          <dui-input
            type="range"
            min="0"
            max="8"
            step="1"
            [(ngModel)]="cfg.pointR"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="step-line-point-label">{{ cfg.pointR }}px</span>
        </div>
        <div class="control-group">
          <label>Color</label>
          <dui-dropdown
            [(ngModel)]="cfg.color"
            (ngModelChange)="update()"
            [options]="colorOpts"
          ></dui-dropdown>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="fill"
            [(ngModel)]="cfg.fill"
            (ngModelChange)="update()"
            label="Fill Area"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showGrid"
            [(ngModel)]="cfg.showGrid"
            (ngModelChange)="update()"
            label="Show Grid"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="showAxes"
            [(ngModel)]="cfg.showAxes"
            (ngModelChange)="update()"
            label="Show Axes"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper step-line-preview">
    <div class="chart-preview-wrapper">
      <svg width="600" height="300" class="step-line-svg">
        <defs>
          <linearGradient id="slg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" [attr.stop-color]="cfg.color" stop-opacity="0.3" />
            <stop offset="100%" [attr.stop-color]="cfg.color" stop-opacity="0.02" />
          </linearGradient>
        </defs>
        <!-- Grid -->
        <g *ngIf="cfg.showGrid">
          <line
            *ngFor="let g of hGridLines"
            [attr.x1]="pad"
            [attr.y1]="g"
            x2="570"
            [attr.y2]="g"
            stroke="#f3f4f6"
            stroke-width="1"
          />
        </g>
        <!-- Axes -->
        <g *ngIf="cfg.showAxes">
          <line
            [attr.x1]="pad"
            [attr.y1]="pad"
            [attr.x2]="pad"
            y2="270"
            stroke="#d1d5db"
            stroke-width="1"
          />
          <line [attr.x1]="pad" y1="270" x2="570" y2="270" stroke="#d1d5db" stroke-width="1" />
          <text
            *ngFor="let lbl of xLabels"
            [attr.x]="lbl.x"
            y="288"
            text-anchor="middle"
            font-size="11"
            fill="#6b7280"
          >
            {{ lbl.label }}
          </text>
          <text
            *ngFor="let lbl of yLabels"
            [attr.x]="pad - 6"
            [attr.y]="lbl.y + 4"
            text-anchor="end"
            font-size="11"
            fill="#6b7280"
          >
            {{ lbl.label }}
          </text>
        </g>
        <!-- Fill area -->
        <path *ngIf="cfg.fill" [attr.d]="areaPath" [attr.fill]="'url(#slg)'" />
        <!-- Step line -->
        <polyline
          [attr.points]="stepPolyline"
          fill="none"
          [attr.stroke]="cfg.color"
          [attr.stroke-width]="cfg.strokeWidth"
          stroke-linejoin="miter"
        />
        <!-- Points -->
        <g *ngFor="let p of dataPoints">
          <circle
            *ngIf="cfg.pointR > 0"
            [attr.cx]="p.x"
            [attr.cy]="p.y"
            [attr.r]="cfg.pointR"
            [attr.fill]="cfg.color"
            stroke="white"
            [attr.stroke-width]="1.5"
          />
        </g>
      </svg>
    </div>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
