<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Style</h3>
        <div class="control-group">
          <label>Dataset</label>
          <dui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Stroke Width</label>
          <dui-input
            type="range"
            min="1"
            max="5"
            step="0.5"
            [(ngModel)]="cfg.strokeWidth"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.strokeWidth }}px</span>
        </div>
        <div class="control-group">
          <label>Opacity</label>
          <dui-input
            type="range"
            min="0.1"
            max="0.7"
            step="0.05"
            [(ngModel)]="cfg.fillOpacity"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="fs-08rem text-muted">{{ cfg.fillOpacity }}</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="smooth"
            [(ngModel)]="cfg.smooth"
            (ngModelChange)="update()"
            label="Smooth Curve"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="grid"
            [(ngModel)]="cfg.showGrid"
            (ngModelChange)="update()"
            label="Show Grid"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="dots"
            [(ngModel)]="cfg.showDots"
            (ngModelChange)="update()"
            label="Show Points"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="stacked"
            [(ngModel)]="cfg.stacked"
            (ngModelChange)="update()"
            label="Stacked"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper w-full display-flex justify-center">
    <chart-line
      [data]="activeData"
      chart-title=""
      show-legend
      show-grid
      enable-animation
      [attr.stroke-width]="cfg.strokeWidth"
      width="580"
      height="300"
    ></chart-line>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
