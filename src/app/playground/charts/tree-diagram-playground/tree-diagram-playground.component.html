<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <dui-dropdown
            [(ngModel)]="cfg.orientation"
            (ngModelChange)="update()"
            [options]="orientOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Dataset</label>
          <dui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></dui-dropdown>
        </div>
        <div class="control-group">
          <label>Node Radius</label>
          <dui-input
            type="range"
            min="16"
            max="36"
            step="2"
            [(ngModel)]="cfg.nodeR"
            (ngModelChange)="update()"
          ></dui-input>
          <span class="tree-diagram-node-label">{{ cfg.nodeR }}px</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <dui-checkbox
            id="showLines"
            [(ngModel)]="cfg.showLines"
            (ngModelChange)="update()"
            label="Show Lines"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="curved"
            [(ngModel)]="cfg.curved"
            (ngModelChange)="update()"
            label="Curved Lines"
          ></dui-checkbox>
        </div>
        <div class="checkbox-group">
          <dui-checkbox
            id="icons"
            [(ngModel)]="cfg.showIcons"
            (ngModelChange)="update()"
            label="Show Icons"
          ></dui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <dui-button variant="secondary" (click)="reset()" label="Reset"></dui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper tree-diagram-preview">
    <div class="chart-preview-wrapper">
      <div class="tree-diagram-svg-wrapper">
        <svg [attr.width]="svgW" [attr.height]="svgH" class="tree-diagram-svg">
          <!-- Lines -->
          <g *ngIf="cfg.showLines">
            <g *ngFor="let edge of edges">
              <path
                *ngIf="cfg.curved"
                [attr.d]="getCurvedPath(edge)"
                fill="none"
                stroke="#d1d5db"
                stroke-width="2"
              />
              <line
                *ngIf="!cfg.curved"
                [attr.x1]="edge.x1"
                [attr.y1]="edge.y1"
                [attr.x2]="edge.x2"
                [attr.y2]="edge.y2"
                stroke="#d1d5db"
                stroke-width="2"
              />
            </g>
          </g>
          <!-- Nodes -->
          <g *ngFor="let node of flatNodes">
            <circle
              [attr.cx]="$any(node).x"
              [attr.cy]="$any(node).y"
              [attr.r]="cfg.nodeR"
              [attr.fill]="node.color || '#6366f1'"
              opacity="0.9"
            />
            <text
              *ngIf="cfg.showIcons && node.icon"
              [attr.x]="$any(node).x"
              [attr.y]="$any(node).y + 5"
              text-anchor="middle"
              font-size="14"
            >
              {{ node.icon }}
            </text>
            <text
              [attr.x]="$any(node).x"
              [attr.y]="$any(node).y + cfg.nodeR + 14"
              text-anchor="middle"
              font-size="11"
              fill="#374151"
              font-weight="500"
            >
              {{ node.label }}
            </text>
          </g>
        </svg>
      </div>
    </div>
  </div>
  @if (showCode) {
    <dui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></dui-code-preview>
  }
</pg-playground>
