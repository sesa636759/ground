<pg-playground
  [items]="[{ id: 'cfg', title: 'Configuration', icon: '⚙️' }]"
  [defaultOpen]="['cfg']"
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Size</label>
          <ui-input
            type="range"
            min="200"
            max="380"
            step="20"
            [(ngModel)]="cfg.size"
            (ngModelChange)="update()"
          ></ui-input>
          <span class="fs-08rem text-muted">{{ cfg.size }}px</span>
        </div>
        <div class="control-group">
          <label>Inner Radius</label>
          <ui-input
            type="range"
            min="0"
            max="60"
            step="5"
            [(ngModel)]="cfg.innerR"
            (ngModelChange)="update()"
          ></ui-input>
          <span class="fs-08rem text-muted">{{ cfg.innerR }}px</span>
        </div>
        <div class="control-group">
          <label>Dataset</label>
          <ui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></ui-dropdown>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="showLabels"
            [(ngModel)]="cfg.showLabels"
            (ngModelChange)="update()"
            label="Show Labels"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showVals"
            [(ngModel)]="cfg.showValues"
            (ngModelChange)="update()"
            label="Show Values"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="legend"
            [(ngModel)]="cfg.showLegend"
            (ngModelChange)="update()"
            label="Show Legend"
          ></ui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div preview class="chart-preview-wrapper w-full display-flex justify-center">
    <div class="chart-preview-wrapper flex-col gap-16">
      <app-chart
        chartType="polarArea"
        [showLegend]="cfg.showLegend"
        legendPosition="right"
        [responsive]="true"
        [data]="activeData"
        class="w-full max-w-480 h-360 m-0-auto display-block"
      ></app-chart>
    </div>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</pg-playground>
