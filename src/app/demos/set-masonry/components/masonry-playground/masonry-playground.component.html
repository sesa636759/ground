<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.layoutType"
          (change)="updateConfig()"
          [options]="[
            { label: 'Masonry', value: 'masonry' },
            { label: 'Grid', value: 'grid' },
            { label: 'Columns', value: 'columns' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Columns</label>
        <app-input
          type="number"
          min="1"
          max="6"
          [(ngModel)]="pgConfig.columns"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Gap (px)</label>
        <app-input type="number" min="0" max="50" [(ngModel)]="pgConfig.gap" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Sort By</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.sortBy"
          (change)="updateConfig()"
          [options]="[
            { label: 'None', value: '' },
            { label: 'Title', value: 'title' },
            { label: 'Height', value: 'height' },
            { label: 'Category', value: 'category' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Sort Order</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.sortOrder"
          (change)="updateConfig()"
          [options]="[
            { label: 'Ascending', value: 'asc' },
            { label: 'Descending', value: 'desc' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Filter Category</label>
        <ui-dropdown
          [(ngModel)]="filterCategory"
          (change)="updateConfig()"
          [options]="[
            { label: 'All', value: '' },
            { label: 'Nature', value: 'nature' },
            { label: 'Architecture', value: 'architecture' },
            { label: 'Food', value: 'food' },
            { label: 'Technology', value: 'technology' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Breakpoints (JSON)</label>
        <app-input type="text" [value]="getBreakpointsJson()" (input)="updateBreakpoints($event)" />
      </div>

      <div class="control-group">
        <label>Min Width</label>
        <app-input type="number" [(ngModel)]="pgConfig.itemMinWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Max Width</label>
        <app-input type="number" [(ngModel)]="pgConfig.itemMaxWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showFilters" (change)="updateConfig()" /> Show Filters
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showBatchActions" (change)="updateConfig()" />
        Batch Actions
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.lazyLoad" (change)="updateConfig()" /> Lazy Load
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.infiniteScroll" (change)="updateConfig()" />
        Infinite Scroll
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.lightbox" (change)="updateConfig()" /> Lightbox
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.loadingState" (change)="updateConfig()" />
        Loading State
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="masonry-container">
        <app-masonry
          [items]="playgroundItems"
          [attr.layout-type]="pgConfig.layoutType"
          [attr.columns]="pgConfig.columns"
          [attr.gap]="pgConfig.gap"
          [attr.sort-by]="pgConfig.sortBy || undefined"
          [attr.sort-order]="pgConfig.sortOrder"
          [attr.filter-by]="pgConfig.filterBy || undefined"
          [attr.enable-animation]="pgConfig.enableAnimation"
          [attr.show-filters]="pgConfig.showFilters"
          [attr.selectable]="pgConfig.selectable"
          [attr.multi-select]="pgConfig.multiSelect"
          [attr.show-batch-actions]="pgConfig.showBatchActions"
          [attr.lazy-load]="pgConfig.lazyLoad"
          [attr.infinite-scroll]="pgConfig.infiniteScroll"
          [attr.lightbox]="pgConfig.lightbox"
          [attr.loading-state]="pgConfig.loadingState"
          [attr.item-min-width]="pgConfig.itemMinWidth"
          [attr.item-max-width]="pgConfig.itemMaxWidth"
          (itemClick)="onItemClick($event)"
          (itemSelectionChange)="onSelectionChange($event)"
        ></app-masonry>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
