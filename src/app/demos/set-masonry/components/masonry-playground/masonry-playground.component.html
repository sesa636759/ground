<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout Type</label>
        <select [(ngModel)]="pgConfig.layoutType" (change)="updateConfig()">
          <option value="masonry">Masonry</option>
          <option value="grid">Grid</option>
          <option value="columns">Columns</option>
        </select>
      </div>

      <div class="control-group">
        <label>Columns</label>
        <input
          type="number"
          min="1"
          max="6"
          [(ngModel)]="pgConfig.columns"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Gap (px)</label>
        <input type="number" min="0" max="50" [(ngModel)]="pgConfig.gap" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Sort By</label>
        <select [(ngModel)]="pgConfig.sortBy" (change)="updateConfig()">
          <option value="">None</option>
          <option value="title">Title</option>
          <option value="height">Height</option>
          <option value="category">Category</option>
        </select>
      </div>

      <div class="control-group">
        <label>Sort Order</label>
        <select [(ngModel)]="pgConfig.sortOrder" (change)="updateConfig()">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>

      <div class="control-group">
        <label>Filter Category</label>
        <select [(ngModel)]="filterCategory" (change)="updateConfig()">
          <option value="">All</option>
          <option value="nature">Nature</option>
          <option value="architecture">Architecture</option>
          <option value="food">Food</option>
          <option value="technology">Technology</option>
        </select>
      </div>

      <div class="control-group">
        <label>Breakpoints (JSON)</label>
        <input type="text" [value]="getBreakpointsJson()" (input)="updateBreakpoints($event)" />
      </div>

      <div class="control-group">
        <label>Min Width</label>
        <input type="number" [(ngModel)]="pgConfig.itemMinWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Max Width</label>
        <input type="number" [(ngModel)]="pgConfig.itemMaxWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showFilters" (change)="updateConfig()" /> Show
        Filters
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showBatchActions" (change)="updateConfig()" />
        Batch Actions
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.lazyLoad" (change)="updateConfig()" /> Lazy
        Load
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.infiniteScroll" (change)="updateConfig()" />
        Infinite Scroll
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.lightbox" (change)="updateConfig()" /> Lightbox
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.loadingState" (change)="updateConfig()" />
        Loading State
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="masonry-container">
        <app-masonry
          [items]="playgroundItems"
          [attr.layout-type]="pgConfig.layoutType"
          [attr.columns]="pgConfig.columns"
          [attr.gap]="pgConfig.gap"
          [attr.sort-by]="pgConfig.sortBy || undefined"
          [attr.sort-order]="pgConfig.sortOrder"
          [attr.filter-by]="pgConfig.filterBy || undefined"
          [attr.enable-animation]="pgConfig.enableAnimation"
          [attr.show-filters]="pgConfig.showFilters"
          [attr.selectable]="pgConfig.selectable"
          [attr.multi-select]="pgConfig.multiSelect"
          [attr.show-batch-actions]="pgConfig.showBatchActions"
          [attr.lazy-load]="pgConfig.lazyLoad"
          [attr.infinite-scroll]="pgConfig.infiniteScroll"
          [attr.lightbox]="pgConfig.lightbox"
          [attr.loading-state]="pgConfig.loadingState"
          [attr.item-min-width]="pgConfig.itemMinWidth"
          [attr.item-max-width]="pgConfig.itemMaxWidth"
          (itemClick)="onItemClick($event)"
          (itemSelectionChange)="onSelectionChange($event)"
        ></app-masonry>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
