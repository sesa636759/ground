<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Layout Section -->
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout Type</label>
        <ui-dropdown
          name="layoutType"
          [(ngModel)]="pgConfig.layoutType"
          (ngModelChange)="updateConfig()"
          [options]="layoutTypeOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Columns</label>
        <ui-input
          name="columns"
          type="number"
          min="1"
          max="6"
          [(ngModel)]="pgConfig.columns"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Gap (px)</label>
        <ui-input
          name="gap"
          type="number"
          min="0"
          max="50"
          [(ngModel)]="pgConfig.gap"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Min Width (px)</label>
        <ui-input
          name="itemMinWidth"
          type="number"
          min="100"
          max="500"
          [(ngModel)]="pgConfig.itemMinWidth"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Max Width (px)</label>
        <ui-input
          name="itemMaxWidth"
          type="number"
          min="200"
          max="800"
          [(ngModel)]="pgConfig.itemMaxWidth"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>
  </div>

  <!-- Filter Section -->
  <div slot="content-filter" class="control-grid" style="padding: 16px">
    <div class="control-grid">
      <div class="control-group">
        <label>Sort By</label>
        <ui-dropdown
          name="sortBy"
          [(ngModel)]="pgConfig.sortBy"
          (ngModelChange)="updateConfig()"
          [options]="sortByOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Sort Order</label>
        <ui-dropdown
          name="sortOrder"
          [(ngModel)]="pgConfig.sortOrder"
          (ngModelChange)="updateConfig()"
          [options]="sortOrderOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Filter Category</label>
        <ui-dropdown
          name="filterCategory"
          [(ngModel)]="filterCategory"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'All', value: '' },
            { label: 'Nature', value: 'nature' },
            { label: 'Architecture', value: 'architecture' },
            { label: 'Food', value: 'food' },
            { label: 'Technology', value: 'technology' },
          ]"
        ></ui-dropdown>
      </div>
    </div>
  </div>

  <!-- Features Section -->
  <div slot="content-features" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          name="enableAnimation"
          [(ngModel)]="pgConfig.enableAnimation"
          (ngModelChange)="updateConfig()"
        />
        Animations
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="showFilters"
          [(ngModel)]="pgConfig.showFilters"
          (ngModelChange)="updateConfig()"
        />
        Show Filters
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="selectable"
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        />
        Selectable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="multiSelect"
          [(ngModel)]="pgConfig.multiSelect"
          (ngModelChange)="updateConfig()"
        />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="showBatchActions"
          [(ngModel)]="pgConfig.showBatchActions"
          (ngModelChange)="updateConfig()"
        />
        Batch Actions
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="lazyLoad"
          [(ngModel)]="pgConfig.lazyLoad"
          (ngModelChange)="updateConfig()"
        />
        Lazy Load
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="infiniteScroll"
          [(ngModel)]="pgConfig.infiniteScroll"
          (ngModelChange)="updateConfig()"
        />
        Infinite Scroll
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="lightbox"
          [(ngModel)]="pgConfig.lightbox"
          (ngModelChange)="updateConfig()"
        />
        Lightbox
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          name="loadingState"
          [(ngModel)]="pgConfig.loadingState"
          (ngModelChange)="updateConfig()"
        />
        Loading State
      </label>
    </div>
  </div>

  <div preview style="width: 100%">
    <app-masonry
      #masonryLayout
      [attr.layout-type]="pgConfig.layoutType"
      [attr.columns]="pgConfig.columns"
      [attr.gap]="pgConfig.gap"
      [attr.sort-by]="pgConfig.sortBy || null"
      [attr.sort-order]="pgConfig.sortOrder"
      [attr.filter-by]="pgConfig.filterBy || null"
      [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
      [attr.show-filters]="pgConfig.showFilters ? '' : null"
      [attr.selectable]="pgConfig.selectable ? '' : null"
      [attr.multi-select]="pgConfig.multiSelect ? '' : null"
      [attr.show-batch-actions]="pgConfig.showBatchActions ? '' : null"
      [attr.lazy-load]="pgConfig.lazyLoad ? '' : null"
      [attr.infinite-scroll]="pgConfig.infiniteScroll ? '' : null"
      [attr.lightbox]="pgConfig.lightbox ? '' : null"
      [attr.loading-state]="pgConfig.loadingState ? '' : null"
      [attr.item-min-width]="pgConfig.itemMinWidth"
      [attr.item-max-width]="pgConfig.itemMaxWidth"
      [items]="playgroundItems"
      (item-click)="onItemClick($event)"
      (selection-change)="onSelectionChange($event)"
    ></app-masonry>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
