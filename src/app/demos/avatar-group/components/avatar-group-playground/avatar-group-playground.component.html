<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="fullSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Layout</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="layoutOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Display</label>
      <ui-input
        type="number"
        min="1"
        max="10"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    @if (pgConfig.layout === 'stack') {
      <div class="control-group">
        <label>Overlap (px)</label>
        <ui-input
          type="number"
          [(ngModel)]="pgConfig.overlap"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
    } @else {
      <div class="control-group">
        <label>Spacing (px)</label>
        <ui-input
          type="number"
          [(ngModel)]="pgConfig.spacing"
          (ngModelChange)="updateConfig()"
        ></ui-input>
      </div>
    }
  </div>

  <div slot="content-style" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Border Color</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.borderColor"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Border Width</label>
      <ui-input
        type="number"
        min="0"
        max="10"
        [(ngModel)]="pgConfig.borderWidth"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid" style="grid-column: 1 / -1; margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()"></ui-checkbox>
        Animated
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.enablePopover"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Enable Popover
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-avatar-group
      #avatarGroupElement
      [attr.size]="pgConfig.size"
      [attr.max]="pgConfig.max"
      [attr.shape]="pgConfig.shape"
      [attr.layout]="pgConfig.layout"
      [attr.overlap]="pgConfig.overlap"
      [attr.spacing]="pgConfig.spacing"
      [attr.animated]="pgConfig.animated ? '' : null"
      [attr.enable-popover]="pgConfig.enablePopover ? '' : null"
      [attr.border-color]="pgConfig.borderColor"
      [attr.border-width]="pgConfig.borderWidth"
    >
      <ui-avatar label="JD" src="https://i.pravatar.cc/150?u=1"></ui-avatar>
      <ui-avatar label="AB" src="https://i.pravatar.cc/150?u=2"></ui-avatar>
      <ui-avatar label="CD" src="https://i.pravatar.cc/150?u=3"></ui-avatar>
      <ui-avatar label="EF" src="https://i.pravatar.cc/150?u=4"></ui-avatar>
      <ui-avatar label="GH" src="https://i.pravatar.cc/150?u=5"></ui-avatar>
    </ui-avatar-group>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
