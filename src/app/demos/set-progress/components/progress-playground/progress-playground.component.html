<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.type"
          (change)="updateConfig()"
          [options]="[
            { label: 'Line', value: 'line' },
            { label: 'Circle', value: 'circle' },
            { label: 'Dashboard', value: 'dashboard' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Status</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.status"
          (change)="updateConfig()"
          [options]="[
            { label: 'Normal', value: 'normal' },
            { label: 'Active', value: 'active' },
            { label: 'Success', value: 'success' },
            { label: 'Exception', value: 'exception' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Percent</label>
        <app-input
          type="number"
          min="0"
          max="100"
          [(ngModel)]="pgConfig.percent"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Stroke Width</label>
        <app-input type="number" [(ngModel)]="pgConfig.strokeWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Width (Circle/Dash)</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.width"
          (input)="updateConfig()"
          [disabled]="pgConfig.type === 'line'"
        />
      </div>

      <div class="control-group">
        <label>Steps</label>
        <app-input type="number" [(ngModel)]="pgConfig.steps" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Linecap</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.strokeLinecap"
          (change)="updateConfig()"
          [options]="[
            { label: 'Round', value: 'round' },
            { label: 'Square', value: 'square' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Gap Degree (Dash)</label>
        <app-input
          type="number"
          min="0"
          max="360"
          [(ngModel)]="pgConfig.gapDegree"
          (input)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
        />
      </div>

      <div class="control-group">
        <label>Gap Pos (Dash)</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.gapPosition"
          (change)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Bottom', value: 'bottom' },
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Stroke Color</label>
        <app-input type="color" [(ngModel)]="pgConfig.strokeColor" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Trail Color</label>
        <app-input type="color" [(ngModel)]="pgConfig.trailColor" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showInfo" (change)="updateConfig()" /> Show Info
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.indeterminate" (change)="updateConfig()" />
        Indeterminate
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.liquid" (change)="updateConfig()" /> Liquid
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.glass" (change)="updateConfig()" /> Glass
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.glow" (change)="updateConfig()" /> Glow
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage h-scrollable">
      <div class="progress-container">
        <app-progress
          [percent]="pgConfig.percent"
          [attr.type]="pgConfig.type"
          [status]="pgConfig.status"
          [strokeWidth]="pgConfig.strokeWidth"
          [width]="pgConfig.width"
          [strokeLinecap]="pgConfig.strokeLinecap"
          [showInfo]="pgConfig.showInfo"
          [steps]="pgConfig.steps"
          [gapDegree]="pgConfig.gapDegree"
          [gapPosition]="pgConfig.gapPosition"
          [indeterminate]="pgConfig.indeterminate"
          [liquid]="pgConfig.liquid"
          [glass]="pgConfig.glass"
          [glow]="pgConfig.glow"
          [strokeColor]="pgConfig.strokeColor"
          [trailColor]="pgConfig.trailColor"
        ></app-progress>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
