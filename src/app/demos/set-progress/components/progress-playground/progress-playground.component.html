<div class="playground-layout">
  <div class="playground-controls">
    <ui-accordion [items]="[{id: 'config', title: 'Configuration', icon: '⚙️'}]" [defaultOpen]="['config']" [multiple]="true">
      <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.type"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Line', value: 'line' },
            { label: 'Circle', value: 'circle' },
            { label: 'Dashboard', value: 'dashboard' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Status</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.status"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Normal', value: 'normal' },
            { label: 'Active', value: 'active' },
            { label: 'Success', value: 'success' },
            { label: 'Exception', value: 'exception' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Percent</label>
        <app-input
          type="number"
          min="0"
          max="100"
          [(ngModel)]="pgConfig.percent"
          (ngModelChange)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Stroke Width</label>
        <app-input type="number" [(ngModel)]="pgConfig.strokeWidth" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Width (Circle/Dash)</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.width"
          (ngModelChange)="updateConfig()"
          [disabled]="pgConfig.type === 'line'"
        />
      </div>

      <div class="control-group">
        <label>Steps</label>
        <app-input type="number" [(ngModel)]="pgConfig.steps" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Linecap</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.strokeLinecap"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Round', value: 'round' },
            { label: 'Square', value: 'square' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Gap Degree (Dash)</label>
        <app-input
          type="number"
          min="0"
          max="360"
          [(ngModel)]="pgConfig.gapDegree"
          (ngModelChange)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
        />
      </div>

      <div class="control-group">
        <label>Gap Pos (Dash)</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.gapPosition"
          (ngModelChange)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Bottom', value: 'bottom' },
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Stroke Color</label>
        <app-input type="color" [(ngModel)]="pgConfig.strokeColor" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Trail Color</label>
        <app-input type="color" [(ngModel)]="pgConfig.trailColor" (ngModelChange)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showInfo" (ngModelChange)="updateConfig()" /> Show Info
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.indeterminate" (ngModelChange)="updateConfig()" />
        Indeterminate
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.liquid" (ngModelChange)="updateConfig()" /> Liquid
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.glass" (ngModelChange)="updateConfig()" /> Glass
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.glow" (ngModelChange)="updateConfig()" /> Glow
      </label>
    </div>
        </div>
    </ui-accordion>
  </div>

  <div class="playground-preview">
    <div class="preview-stage h-scrollable">
      <div class="progress-container">
        <app-progress
          [percent]="pgConfig.percent"
          [attr.type]="pgConfig.type"
          [status]="pgConfig.status"
          [strokeWidth]="pgConfig.strokeWidth"
          [width]="pgConfig.width"
          [strokeLinecap]="pgConfig.strokeLinecap"
          [showInfo]="pgConfig.showInfo"
          [steps]="pgConfig.steps"
          [gapDegree]="pgConfig.gapDegree"
          [gapPosition]="pgConfig.gapPosition"
          [indeterminate]="pgConfig.indeterminate"
          [liquid]="pgConfig.liquid"
          [glass]="pgConfig.glass"
          [glow]="pgConfig.glow"
          [strokeColor]="pgConfig.strokeColor"
          [trailColor]="pgConfig.trailColor"
        ></app-progress>
      </div>
    </div>

    
  
      <ui-code-preview
      *ngIf="showCode"
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
    </div>
</div>
