<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <select [(ngModel)]="pgConfig.type" (change)="updateConfig()">
          <option value="line">Line</option>
          <option value="circle">Circle</option>
          <option value="dashboard">Dashboard</option>
        </select>
      </div>

      <div class="control-group">
        <label>Status</label>
        <select [(ngModel)]="pgConfig.status" (change)="updateConfig()">
          <option value="normal">Normal</option>
          <option value="active">Active</option>
          <option value="success">Success</option>
          <option value="exception">Exception</option>
        </select>
      </div>

      <div class="control-group">
        <label>Percent</label>
        <input
          type="number"
          min="0"
          max="100"
          [(ngModel)]="pgConfig.percent"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Stroke Width</label>
        <input type="number" [(ngModel)]="pgConfig.strokeWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Width (Circle/Dash)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.width"
          (input)="updateConfig()"
          [disabled]="pgConfig.type === 'line'"
        />
      </div>

      <div class="control-group">
        <label>Steps</label>
        <input type="number" [(ngModel)]="pgConfig.steps" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Linecap</label>
        <select [(ngModel)]="pgConfig.strokeLinecap" (change)="updateConfig()">
          <option value="round">Round</option>
          <option value="square">Square</option>
        </select>
      </div>

      <div class="control-group">
        <label>Gap Degree (Dash)</label>
        <input
          type="number"
          min="0"
          max="360"
          [(ngModel)]="pgConfig.gapDegree"
          (input)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
        />
      </div>

      <div class="control-group">
        <label>Gap Pos (Dash)</label>
        <select
          [(ngModel)]="pgConfig.gapPosition"
          (change)="updateConfig()"
          [disabled]="pgConfig.type !== 'dashboard'"
        >
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>

      <div class="control-group">
        <label>Stroke Color</label>
        <input type="color" [(ngModel)]="pgConfig.strokeColor" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Trail Color</label>
        <input type="color" [(ngModel)]="pgConfig.trailColor" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showInfo" (change)="updateConfig()" /> Show
        Info
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.indeterminate" (change)="updateConfig()" />
        Indeterminate
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.liquid" (change)="updateConfig()" /> Liquid
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.glass" (change)="updateConfig()" /> Glass
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.glow" (change)="updateConfig()" /> Glow
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage h-scrollable">
      <div class="progress-container">
        <app-progress
          [percent]="pgConfig.percent"
          [attr.type]="pgConfig.type"
          [status]="pgConfig.status"
          [strokeWidth]="pgConfig.strokeWidth"
          [width]="pgConfig.width"
          [strokeLinecap]="pgConfig.strokeLinecap"
          [showInfo]="pgConfig.showInfo"
          [steps]="pgConfig.steps"
          [gapDegree]="pgConfig.gapDegree"
          [gapPosition]="pgConfig.gapPosition"
          [indeterminate]="pgConfig.indeterminate"
          [liquid]="pgConfig.liquid"
          [glass]="pgConfig.glass"
          [glow]="pgConfig.glow"
          [strokeColor]="pgConfig.strokeColor"
          [trailColor]="pgConfig.trailColor"
        ></app-progress>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
