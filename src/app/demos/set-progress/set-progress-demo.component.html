<div class="demo-container">
  <h1>Progress Component</h1>

  <demo-tabs [variants]="exampleVariants" (variantChange)="scrollToSection($event)">
    <!-- Playground Slot -->
    <div slot="playground">
      <app-progress-playground></app-progress-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples">
      <!-- Line Progress -->
      <app-example-section
        id="line"
        title="Line Progress"
        description="Standard progress bar with different percentages."
        [code]="lineCode"
      >
        <div class="demo-grid col-2">
          <app-progress percent="30"></app-progress>
          <app-progress percent="50"></app-progress>
          <app-progress percent="70"></app-progress>
          <app-progress percent="100"></app-progress>
        </div>
      </app-example-section>

      <!-- Circle Progress -->
      <app-example-section
        id="circle"
        title="Circle Progress"
        description="Circular progress indicators in different sizes."
        [code]="circleCode"
      >
        <div class="demo-grid col-3 center-content">
          <app-progress type="circle" percent="75"></app-progress>
          <app-progress type="circle" percent="100" status="success"></app-progress>
          <app-progress type="circle" percent="50" width="80"></app-progress>
        </div>
      </app-example-section>

      <!-- Dashboard Progress -->
      <app-example-section
        id="dashboard"
        title="Dashboard Progress"
        description="Configure gap size and position for dashboard types."
        [code]="dashboardCode"
      >
        <div class="demo-grid col-4 center-content">
          <app-progress type="dashboard" percent="75" gap-position="top"></app-progress>
          <app-progress type="dashboard" percent="75" gap-position="bottom"></app-progress>
          <app-progress type="dashboard" percent="75" gap-position="left"></app-progress>
          <app-progress type="dashboard" percent="50" gap-degree="120"></app-progress>
        </div>
      </app-example-section>

      <!-- Progress Status -->
      <app-example-section
        id="status"
        title="Progress Status"
        description="Different status types: normal, active, success, exception."
        [code]="statusCode"
      >
        <div class="demo-grid col-3">
          <app-progress percent="60" status="active"></app-progress>
          <app-progress percent="100" status="success"></app-progress>
          <app-progress percent="50" status="exception"></app-progress>
        </div>
      </app-example-section>

      <!-- Indeterminate State -->
      <app-example-section
        id="indeterminate"
        title="Indeterminate State"
        description="Used when the exact progress is unknown."
        [code]="indeterminateCode"
      >
        <div class="demo-grid col-3 center-content">
          <app-progress indeterminate="true"></app-progress>
          <app-progress type="circle" indeterminate="true"></app-progress>
          <app-progress type="dashboard" indeterminate="true"></app-progress>
        </div>
      </app-example-section>

      <!-- Custom Colors -->
      <app-example-section
        id="colors"
        title="Custom Colors"
        description="Customize progress bar colors."
        [code]="colorsCode"
      >
        <div class="demo-grid col-3">
          <app-progress percent="60" stroke-color="#9b59b6"></app-progress>
          <app-progress percent="75" stroke-color="#ff9800"></app-progress>
          <app-progress percent="85" stroke-color="#e91e63"></app-progress>
        </div>
      </app-example-section>

      <!-- Gradient Progress -->
      <app-example-section
        id="gradient"
        title="Gradient Progress"
        description="Progress bars with gradient colors."
        [code]="gradientCode"
      >
        <div class="demo-grid col-3">
          <app-progress
            percent="80"
            stroke-color="linear-gradient(to right, #667eea, #06b6d4)"
          ></app-progress>
          <app-progress
            percent="90"
            stroke-color="linear-gradient(to right, #a855f7, #ec4899)"
          ></app-progress>
          <app-progress
            percent="70"
            stroke-color="linear-gradient(to right, #f97316, #ef4444)"
          ></app-progress>
        </div>
      </app-example-section>

      <!-- Steps Progress -->
      <app-example-section
        id="steps"
        title="Steps Progress"
        description="Progress displayed as discrete steps."
        [code]="stepsCode"
      >
        <div class="demo-grid col-3">
          <app-progress percent="60" steps="5"></app-progress>
          <app-progress percent="80" steps="10"></app-progress>
          <app-progress percent="100" steps="8" status="success"></app-progress>
        </div>
      </app-example-section>

      <!-- Stroke Width -->
      <app-example-section
        id="stroke"
        title="Custom Stroke Width"
        description="Adjust the thickness of progress bars."
        [code]="strokeCode"
      >
        <div class="demo-grid col-3">
          <app-progress percent="60" stroke-width="4"></app-progress>
          <app-progress percent="60" stroke-width="10"></app-progress>
          <app-progress percent="60" stroke-width="20"></app-progress>
        </div>
      </app-example-section>

      <!-- Stroke Linecap -->
      <app-example-section
        id="linecap"
        title="Stroke Linecap"
        description="Round or square edges."
        [code]="linecapCode"
      >
        <div class="demo-grid col-2">
          <app-progress percent="75" stroke-linecap="round"></app-progress>
          <app-progress percent="75" stroke-linecap="square"></app-progress>
        </div>
      </app-example-section>

      <!-- Hide Info -->
      <app-example-section
        id="hide-info"
        title="Hide Info Text"
        description="Progress without percentage display."
        [code]="hideInfoCode"
      >
        <div class="demo-grid col-2 center-content">
          <app-progress percent="60" show-info="false"></app-progress>
          <app-progress type="circle" percent="75" show-info="false"></app-progress>
        </div>
      </app-example-section>

      <!-- Premium Styles -->
      <app-example-section
        id="premium"
        title="Premium Styles"
        description="Advanced visual effects including Liquid waves, Glassmorphism, and Glow."
        [code]="premiumCode"
      >
        <div class="demo-grid col-3 center-content">
          <app-progress percent="65" liquid="true" stroke-color="#3DCD58"></app-progress>
          <div
            style="
              background: linear-gradient(135deg, #1e293b, #334155);
              padding: 20px;
              border-radius: 12px;
            "
          >
            <app-progress
              percent="50"
              glass="true"
              stroke-color="#fff"
              trail-color="rgba(255,255,255,0.2)"
            ></app-progress>
          </div>
          <app-progress percent="80" glow="true" stroke-color="#ff4d4f"></app-progress>
        </div>
      </app-example-section>

      <!-- Interactive -->
      <app-example-section
        id="interactive"
        title="Interactive Demo"
        description="Control progress dynamically."
        [code]="interactiveCode"
      >
        <div class="interactive-controls">
          <label>Progress: {{ progressValue }}%</label>
          <ui-button
            (click)="decreaseProgress()"
            label="- Decrease"
            color="secondary"
            size="small"
          ></ui-button>
          <ui-button
            (click)="increaseProgress()"
            label="+ Increase"
            color="secondary"
            size="small"
          ></ui-button>
        </div>
        <div class="demo-grid col-3 center-content" style="margin-top: 24px">
          <app-progress [attr.percent]="progressValue"></app-progress>
          <app-progress type="circle" [attr.percent]="progressValue"></app-progress>
          <app-progress type="dashboard" [attr.percent]="progressValue"></app-progress>
        </div>
      </app-example-section>
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <app-component-documentation componentId="progress"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
