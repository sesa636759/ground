<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>📊 Data</h3>
        <div class="control-group">
          <label>Value</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.value"
            min="0"
            [max]="pgConfig.total"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label>Total</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.total"
            min="1"
            max="1000"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label>Title</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.chartTitle"
            (ngModelChange)="updateConfig()"
          />
        </div>
      </div>

      <div class="control-section">
        <h3>🎨 Colours</h3>
        <div class="control-group">
          <label>Fill colour</label>
          <ui-input
            type="color"
            [(ngModel)]="pgConfig.fillColor"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label>Empty colour</label>
          <ui-input
            type="color"
            [(ngModel)]="pgConfig.emptyColor"
            (ngModelChange)="updateConfig()"
          />
        </div>
      </div>

      <div class="control-section">
        <h3>📐 Grid</h3>
        <div class="control-group">
          <label>Rows</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.rows"
            min="1"
            max="20"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label>Columns</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.columns"
            min="1"
            max="20"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label
            >Cell size <span class="range-val">{{ pgConfig.cellSize }}px</span></label
          >
          <ui-input
            type="range"
            [(ngModel)]="pgConfig.cellSize"
            min="8"
            max="48"
            step="2"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label
            >Gap <span class="range-val">{{ pgConfig.gap }}px</span></label
          >
          <ui-input
            type="range"
            [(ngModel)]="pgConfig.gap"
            min="1"
            max="8"
            step="1"
            (ngModelChange)="updateConfig()"
          />
        </div>
      </div>

      <div class="control-section">
        <h3>⚙️ Options</h3>
        <div class="control-group">
          <label>Show percentage</label>
          <ui-input
            type="checkbox"
            [(ngModel)]="pgConfig.showPercentage"
            (ngModelChange)="updateConfig()"
          />
        </div>
      </div>
    </div>
  </div>

  <div preview class="preview-stage">
    <chart-waffle
      [attr.value]="pgConfig.value"
      [attr.total]="pgConfig.total"
      [attr.chart-title]="pgConfig.chartTitle"
      [attr.fill-color]="pgConfig.fillColor"
      [attr.empty-color]="pgConfig.emptyColor"
      [attr.rows]="pgConfig.rows"
      [attr.columns]="pgConfig.columns"
      [attr.cell-size]="pgConfig.cellSize"
      [attr.gap]="pgConfig.gap"
      [attr.show-percentage]="pgConfig.showPercentage ? 'true' : 'false'"
    ></chart-waffle>
  </div>
</app-playground>
