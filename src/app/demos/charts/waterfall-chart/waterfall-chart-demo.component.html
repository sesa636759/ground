<div class="demo-container">
  <pg-demo-header
    icon="💧"
    title="Waterfall Chart"
    description="Visualize cumulative effects of sequential positive and negative values. Perfect for financial analysis, cash flow statements, P&L breakdowns, and budget variance tracking."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-waterfall-chart-playground></app-waterfall-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <section class="demo-section" id="revenue" style="margin-top: 0">
            <div class="section-header">
              <h2>💰 Revenue Waterfall</h2>
              <p>Show how individual revenue contributions build up to a total figure.</p>
            </div>
            <div class="demo-card">
              <svg width="620" height="320" style="display: block; margin: 0 auto">
                <!-- X-axis -->
                <line x1="30" y1="270" x2="600" y2="270" stroke="#e5e7eb" />
                <!-- Y grid lines -->
                <line x1="30" y1="60" x2="600" y2="60" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <line x1="30" y1="120" x2="600" y2="120" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <line x1="30" y1="180" x2="600" y2="180" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <line x1="30" y1="230" x2="600" y2="230" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <!-- Y Labels -->
                <text x="26" y="63" text-anchor="end" font-size="10" fill="#9ca3af">$250k</text>
                <text x="26" y="123" text-anchor="end" font-size="10" fill="#9ca3af">$200k</text>
                <text x="26" y="183" text-anchor="end" font-size="10" fill="#9ca3af">$150k</text>
                <text x="26" y="233" text-anchor="end" font-size="10" fill="#9ca3af">$100k</text>
                <!-- Starting Total (blue) -->
                <rect x="40" y="130" width="60" height="140" rx="4" fill="#6366f1" />
                <text
                  x="70"
                  y="120"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#4338ca"
                >
                  $140k
                </text>
                <text x="70" y="285" text-anchor="middle" font-size="10" fill="#6b7280">Start</text>
                <!-- Connector -->
                <line x1="100" y1="130" x2="110" y2="130" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- Sales +120k (green, floating) -->
                <rect x="110" y="60" width="60" height="70" rx="4" fill="#10b981" />
                <text
                  x="140"
                  y="52"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#059669"
                >
                  +$70k
                </text>
                <text x="140" y="285" text-anchor="middle" font-size="10" fill="#6b7280">
                  Sales
                </text>
                <line x1="170" y1="60" x2="180" y2="60" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- Returns -30k (red) -->
                <rect x="180" y="60" width="60" height="40" rx="4" fill="#f43f5e" />
                <text
                  x="210"
                  y="52"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#dc2626"
                >
                  -$40k
                </text>
                <text x="210" y="285" text-anchor="middle" font-size="10" fill="#6b7280">
                  Returns
                </text>
                <line x1="240" y1="100" x2="250" y2="100" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- Services +50k (green) -->
                <rect x="250" y="50" width="60" height="50" rx="4" fill="#10b981" />
                <text
                  x="280"
                  y="42"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#059669"
                >
                  +$50k
                </text>
                <text x="280" y="285" text-anchor="middle" font-size="10" fill="#6b7280">
                  Services
                </text>
                <line x1="310" y1="50" x2="320" y2="50" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- COGS -60k (red) -->
                <rect x="320" y="50" width="60" height="80" rx="4" fill="#f43f5e" />
                <text
                  x="350"
                  y="42"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#dc2626"
                >
                  -$80k
                </text>
                <text x="350" y="285" text-anchor="middle" font-size="10" fill="#6b7280">COGS</text>
                <line x1="380" y1="130" x2="390" y2="130" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- OpEx -40k (red) -->
                <rect x="390" y="130" width="60" height="55" rx="4" fill="#f43f5e" />
                <text
                  x="420"
                  y="122"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#dc2626"
                >
                  -$55k
                </text>
                <text x="420" y="285" text-anchor="middle" font-size="10" fill="#6b7280">OpEx</text>
                <line x1="450" y1="185" x2="460" y2="185" stroke="#9ca3af" stroke-dasharray="3,2" />
                <!-- Total result (blue) -->
                <rect x="460" y="100" width="60" height="170" rx="4" fill="#6366f1" />
                <text
                  x="490"
                  y="92"
                  text-anchor="middle"
                  font-size="10"
                  font-weight="600"
                  fill="#4338ca"
                >
                  $85k
                </text>
                <text x="490" y="285" text-anchor="middle" font-size="10" fill="#6b7280">
                  Total
                </text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="revenueCode"
              label="Revenue Waterfall"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="pl">
            <div class="section-header">
              <h2>📊 P&amp;L Statement</h2>
              <p>Break down a profit &amp; loss statement from gross revenue to net profit.</p>
            </div>
            <div class="demo-card">
              <svg width="620" height="280" style="display: block; margin: 0 auto">
                <line x1="30" y1="250" x2="590" y2="250" stroke="#e5e7eb" />
                <rect x="40" y="100" width="56" height="150" rx="4" fill="#6366f1" />
                <text x="68" y="92" text-anchor="middle" font-size="10" fill="#4338ca">$200k</text>
                <text x="68" y="264" text-anchor="middle" font-size="10" fill="#6b7280">
                  Revenue
                </text>
                <rect x="106" y="150" width="56" height="50" rx="4" fill="#f43f5e" />
                <text x="134" y="142" text-anchor="middle" font-size="10" fill="#dc2626">
                  -$50k
                </text>
                <text x="134" y="264" text-anchor="middle" font-size="10" fill="#6b7280">COGS</text>
                <rect x="172" y="100" width="56" height="100" rx="4" fill="#10b981" />
                <text x="200" y="92" text-anchor="middle" font-size="10" fill="#059669">
                  =$100k
                </text>
                <text x="200" y="264" text-anchor="middle" font-size="10" fill="#6b7280">
                  Gross Profit
                </text>
                <rect x="238" y="130" width="56" height="70" rx="4" fill="#f43f5e" />
                <text x="266" y="122" text-anchor="middle" font-size="10" fill="#dc2626">
                  -$70k
                </text>
                <text x="266" y="264" text-anchor="middle" font-size="10" fill="#6b7280">OPEX</text>
                <rect x="304" y="100" width="56" height="100" rx="4" fill="#f59e0b" />
                <text x="332" y="92" text-anchor="middle" font-size="10" fill="#d97706">$30k</text>
                <text x="332" y="264" text-anchor="middle" font-size="10" fill="#6b7280">
                  EBITDA
                </text>
                <rect x="370" y="130" width="56" height="30" rx="4" fill="#f43f5e" />
                <text x="398" y="122" text-anchor="middle" font-size="10" fill="#dc2626">
                  -$10k
                </text>
                <text x="398" y="264" text-anchor="middle" font-size="10" fill="#6b7280">
                  D&amp;A
                </text>
                <rect x="436" y="100" width="56" height="120" rx="4" fill="#6366f1" />
                <text x="464" y="92" text-anchor="middle" font-size="10" fill="#4338ca">
                  Net Profit
                </text>
                <text x="464" y="264" text-anchor="middle" font-size="10" fill="#6b7280">
                  Net P&amp;L
                </text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="plCode"
              label="P&L Waterfall"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="waterfall-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
