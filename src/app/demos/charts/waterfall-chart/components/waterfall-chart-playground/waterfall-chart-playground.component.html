<app-playground
  accordionItems='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["cfg"]'
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>🎨 Colors</h3>
        <div class="control-group">
          <label>Positive Color</label>
          <ui-dropdown
            [(ngModel)]="cfg.posColor"
            (ngModelChange)="update()"
            [options]="colorOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Negative Color</label>
          <ui-dropdown
            [(ngModel)]="cfg.negColor"
            (ngModelChange)="update()"
            [options]="negColorOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Bar Gap</label>
          <ui-input
            type="range"
            min="4"
            max="20"
            step="2"
            [(ngModel)]="cfg.gap"
            (ngModelChange)="update()"
          />
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.gap }}px</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <app-checkbox
            id="showVals"
            [(ngModel)]="cfg.showValues"
            (ngModelChange)="update()"
            label="Show Values"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="showConn"
            [(ngModel)]="cfg.showConnectors"
            (ngModelChange)="update()"
            label="Connectors"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="rounded"
            [(ngModel)]="cfg.rounded"
            (ngModelChange)="update()"
            label="Rounded Tops"
          ></app-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div
    preview
    class="chart-preview-wrapper"
    style="width: 100%; display: flex; justify-content: center"
  >
    <div class="chart-preview-wrapper">
      <svg width="620" height="340" style="display: block; font-family: inherit">
        <!-- Y Axis -->
        <g *ngFor="let tick of yTicks">
          <line
            [attr.x1]="padL - 4"
            [attr.y1]="tick.y"
            [attr.x2]="620"
            [attr.y2]="tick.y"
            stroke="#f3f4f6"
            stroke-width="1"
          />
          <text
            [attr.x]="padL - 8"
            [attr.y]="tick.y + 4"
            text-anchor="end"
            font-size="11"
            fill="#6b7280"
          >
            {{ tick.label }}
          </text>
        </g>
        <!-- Baseline -->
        <line
          [attr.x1]="padL"
          [attr.y1]="baseY"
          x2="620"
          [attr.y2]="baseY"
          stroke="#d1d5db"
          stroke-width="1.5"
        />
        <!-- Bars -->
        <g *ngFor="let bar of computedBars; let i = index">
          <rect
            [attr.x]="barX(i)"
            [attr.y]="barY(bar)"
            [attr.width]="barW"
            [attr.height]="barH(bar)"
            [attr.rx]="cfg.rounded ? 4 : 0"
            [attr.fill]="barColor(bar)"
            opacity="0.9"
          />
          <text
            *ngIf="cfg.showValues"
            [attr.x]="barX(i) + barW / 2"
            [attr.y]="bar.type === 'neg' ? barY(bar) + barH(bar) + 14 : barY(bar) - 6"
            text-anchor="middle"
            font-size="11"
            font-weight="700"
            [attr.fill]="barColor(bar)"
          >
            {{ bar.value > 0 ? '+' : '' }}{{ bar.value }}
          </text>
          <!-- Connector -->
          <line
            *ngIf="cfg.showConnectors && i < computedBars.length - 1 && bar.type !== 'total'"
            [attr.x1]="barX(i) + barW"
            [attr.y1]="barY(bar)"
            [attr.x2]="barX(i + 1)"
            [attr.y2]="barY(bar)"
            stroke="#9ca3af"
            stroke-width="1"
            stroke-dasharray="3,3"
          />
          <!-- X label -->
          <text
            [attr.x]="barX(i) + barW / 2"
            y="325"
            text-anchor="middle"
            font-size="11"
            fill="#6b7280"
          >
            {{ bar.label }}
          </text>
        </g>
      </svg>
    </div>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
