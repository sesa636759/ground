<div class="demo-container">
  <pg-demo-header
    icon="🕯️"
    title="Candlestick Chart"
    description="Financial chart showing open, high, low, and close (OHLC) prices as candle bodies with wicks. The gold standard for stock, crypto, and commodity price visualization in trading and analysis."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-candlestick-chart-playground></dm-candlestick-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <section class="demo-section" id="daily" style="margin-top: 0">
            <div class="section-header">
              <h2>📈 Daily Candlesticks</h2>
              <p>
                Daily OHLC data showing price action with bullish (green) and bearish (red) candles.
              </p>
            </div>
            <div class="demo-card" style="overflow-x: auto">
              <svg
                width="620"
                height="320"
                style="display: block; min-width: 580px; margin: 0 auto"
              >
                <!-- Grid -->
                <line x1="50" y1="20" x2="50" y2="270" stroke="#e5e7eb" />
                <line x1="50" y1="270" x2="600" y2="270" stroke="#e5e7eb" />
                <line x1="50" y1="80" x2="600" y2="80" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <line x1="50" y1="140" x2="600" y2="140" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <line x1="50" y1="200" x2="600" y2="200" stroke="#f3f4f6" stroke-dasharray="4,3" />
                <!-- Y labels -->
                <text x="46" y="83" text-anchor="end" font-size="10" fill="#9ca3af">$175</text>
                <text x="46" y="143" text-anchor="end" font-size="10" fill="#9ca3af">$165</text>
                <text x="46" y="203" text-anchor="end" font-size="10" fill="#9ca3af">$155</text>
                <!-- Candle 1 - Bullish -->
                <line x1="82" y1="60" x2="82" y2="250" stroke="#374151" stroke-width="1.5" />
                <rect x="70" y="110" width="24" height="80" fill="#10b981" rx="2" />
                <text x="82" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 2</text>
                <!-- Candle 2 - Bearish -->
                <line x1="142" y1="70" x2="142" y2="210" stroke="#374151" stroke-width="1.5" />
                <rect x="130" y="100" width="24" height="70" fill="#f43f5e" rx="2" />
                <text x="142" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 3</text>
                <!-- Candle 3 - Bullish -->
                <line x1="202" y1="90" x2="202" y2="230" stroke="#374151" stroke-width="1.5" />
                <rect x="190" y="120" width="24" height="60" fill="#10b981" rx="2" />
                <text x="202" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 4</text>
                <!-- Candle 4 - Bullish large -->
                <line x1="262" y1="50" x2="262" y2="220" stroke="#374151" stroke-width="1.5" />
                <rect x="250" y="90" width="24" height="90" fill="#10b981" rx="2" />
                <text x="262" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 5</text>
                <!-- Candle 5 - Bearish small -->
                <line x1="322" y1="60" x2="322" y2="190" stroke="#374151" stroke-width="1.5" />
                <rect x="310" y="90" width="24" height="50" fill="#f43f5e" rx="2" />
                <text x="322" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 6</text>
                <!-- Candle 6 - Bullish -->
                <line x1="382" y1="70" x2="382" y2="200" stroke="#374151" stroke-width="1.5" />
                <rect x="370" y="95" width="24" height="65" fill="#10b981" rx="2" />
                <text x="382" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 7</text>
                <!-- Candle 7 - Bearish -->
                <line x1="442" y1="55" x2="442" y2="185" stroke="#374151" stroke-width="1.5" />
                <rect x="430" y="80" width="24" height="70" fill="#f43f5e" rx="2" />
                <text x="442" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 8</text>
                <!-- Candle 8 - Bullish -->
                <line x1="502" y1="40" x2="502" y2="170" stroke="#374151" stroke-width="1.5" />
                <rect x="490" y="65" width="24" height="80" fill="#10b981" rx="2" />
                <text x="502" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 9</text>
                <!-- Candle 9 - Doji -->
                <line x1="562" y1="50" x2="562" y2="170" stroke="#374151" stroke-width="1.5" />
                <rect x="550" y="105" width="24" height="4" fill="#374151" rx="1" />
                <text x="562" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">
                  Jan 10
                </text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="dailyCode"
              label="Daily Candlesticks"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="hollow">
            <div class="section-header">
              <h2>🕯️ Hollow Body</h2>
              <p>
                Hollow candlestick variant — bullish candles have outlined bodies while bearish ones
                are filled.
              </p>
            </div>
            <div class="demo-card" style="overflow-x: auto">
              <svg
                width="620"
                height="280"
                style="display: block; min-width: 580px; margin: 0 auto"
              >
                <line x1="50" y1="20" x2="50" y2="240" stroke="#e5e7eb" />
                <line x1="50" y1="240" x2="600" y2="240" stroke="#e5e7eb" />
                <!-- Hollow bullish candle -->
                <line x1="90" y1="50" x2="90" y2="200" stroke="#374151" stroke-width="1.5" />
                <rect
                  x="78"
                  y="90"
                  width="24"
                  height="80"
                  fill="none"
                  stroke="#10b981"
                  stroke-width="2"
                  rx="2"
                />
                <text x="90" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 2</text>
                <!-- Solid bearish candle -->
                <line x1="180" y1="60" x2="180" y2="210" stroke="#374151" stroke-width="1.5" />
                <rect x="168" y="95" width="24" height="80" fill="#f43f5e" rx="2" />
                <text x="180" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 3</text>
                <!-- Hollow bullish -->
                <line x1="270" y1="45" x2="270" y2="185" stroke="#374151" stroke-width="1.5" />
                <rect
                  x="258"
                  y="80"
                  width="24"
                  height="70"
                  fill="none"
                  stroke="#10b981"
                  stroke-width="2"
                  rx="2"
                />
                <text x="270" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 4</text>
                <!-- Solid bearish small -->
                <line x1="360" y1="55" x2="360" y2="170" stroke="#374151" stroke-width="1.5" />
                <rect x="348" y="85" width="24" height="50" fill="#f43f5e" rx="2" />
                <text x="360" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 5</text>
                <!-- Hollow bullish large -->
                <line x1="450" y1="40" x2="450" y2="180" stroke="#374151" stroke-width="1.5" />
                <rect
                  x="438"
                  y="65"
                  width="24"
                  height="90"
                  fill="none"
                  stroke="#10b981"
                  stroke-width="2"
                  rx="2"
                />
                <text x="450" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 6</text>
                <!-- Solid bearish -->
                <line x1="540" y1="50" x2="540" y2="190" stroke="#374151" stroke-width="1.5" />
                <rect x="528" y="80" width="24" height="75" fill="#f43f5e" rx="2" />
                <text x="540" y="255" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 7</text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="hollowCode"
              label="Hollow Candlesticks"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="candlestick-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
