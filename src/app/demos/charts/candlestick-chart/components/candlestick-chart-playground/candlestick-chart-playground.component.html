
    <app-playground
      accordionItems='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
      defaultOpen='["cfg"]'
    >
      <div slot="content-cfg">
        <div class="control-grid">
          <div class="control-section">
            <h3>📐 Style</h3>
            <div class="control-group">
              <label>Candle Width</label>
              <input
                type="range"
                min="8"
                max="28"
                step="2"
                [(ngModel)]="cfg.candleW"
                (ngModelChange)="update()"
              />
              <span style="font-size:0.8rem;color:var(--text-secondary)">{{ cfg.candleW }}px</span>
            </div>
            <div class="control-group">
              <label>Up Color</label>
              <ui-dropdown
                [(ngModel)]="cfg.upColor"
                (ngModelChange)="update()"
                [options]="upColorOpts"
              ></ui-dropdown>
            </div>
            <div class="control-group">
              <label>Down Color</label>
              <ui-dropdown
                [(ngModel)]="cfg.downColor"
                (ngModelChange)="update()"
                [options]="downColorOpts"
              ></ui-dropdown>
            </div>
          </div>
          <div class="control-section">
            <h3>✨ Features</h3>
            <div class="checkbox-group">
              <app-checkbox
                id="showGrid"
                [(ngModel)]="cfg.showGrid"
                (ngModelChange)="update()"
                label="Show Grid"
              ></app-checkbox>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="showDates"
                [(ngModel)]="cfg.showDates"
                (ngModelChange)="update()"
                label="Show Dates"
              ></app-checkbox>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="hollow"
                [(ngModel)]="cfg.hollow"
                (ngModelChange)="update()"
                label="Hollow Style"
              ></app-checkbox>
            </div>
          </div>
        </div>
        <div class="action-buttons">
        
          <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
        </div>
      </div>
      <div
        preview
        class="chart-preview-wrapper"
        style="width: 100%; display: flex; justify-content: center;"
      >
        <svg width="620" height="340" style="display:block;font-family:inherit;">
          <!-- Y Axis -->
          <g *ngFor="let t of yTicks">
            <line
              *ngIf="cfg.showGrid"
              [attr.x1]="padL"
              [attr.y1]="t.y"
              x2="605"
              [attr.y2]="t.y"
              stroke="#f3f4f6"
              stroke-width="1"
            />
            <text
              [attr.x]="padL - 6"
              [attr.y]="t.y + 4"
              text-anchor="end"
              font-size="10"
              fill="#9ca3af"
            >
              {{ t.val }}
            </text>
          </g>
          <!-- X Axis -->
          <line
            [attr.x1]="padL"
            [attr.y1]="padT + chartH"
            x2="605"
            [attr.y2]="padT + chartH"
            stroke="#e5e7eb"
            stroke-width="1"
          />
          <!-- Candles -->
          <g *ngFor="let c of candles; let i = index">
            <!-- Wick -->
            <line
              [attr.x1]="cx(i)"
              [attr.y1]="yScale(c.high)"
              [attr.x2]="cx(i)"
              [attr.y2]="yScale(c.low)"
              [attr.stroke]="c.close >= c.open ? cfg.upColor : cfg.downColor"
              stroke-width="1.5"
            />
            <!-- Body -->
            <rect
              [attr.x]="cx(i) - cfg.candleW / 2"
              [attr.y]="yScale(Math.max(c.open, c.close))"
              [attr.width]="cfg.candleW"
              [attr.height]="Math.max(2, Math.abs(yScale(c.open) - yScale(c.close)))"
              [attr.fill]="cfg.hollow ? 'none' : c.close >= c.open ? cfg.upColor : cfg.downColor"
              [attr.stroke]="c.close >= c.open ? cfg.upColor : cfg.downColor"
              stroke-width="1.5"
            />
            <!-- Date -->
            <text
              *ngIf="cfg.showDates && i % 2 === 0"
              [attr.x]="cx(i)"
              [attr.y]="padT + chartH + 16"
              text-anchor="middle"
              font-size="9"
              fill="#9ca3af"
            >
              {{ c.date }}
            </text>
          </g>
        </svg>
      </div>
       @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
    </app-playground>
