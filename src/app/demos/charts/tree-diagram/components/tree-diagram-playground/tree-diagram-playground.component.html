<app-playground
  items='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["cfg"]'
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <ui-dropdown
            [(ngModel)]="cfg.orientation"
            (ngModelChange)="update()"
            [options]="orientOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Dataset</label>
          <ui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Node Radius</label>
          <ui-input
            type="range"
            min="16"
            max="36"
            step="2"
            [(ngModel)]="cfg.nodeR"
            (ngModelChange)="update()"
          ></ui-input>
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.nodeR }}px</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="showLines"
            [(ngModel)]="cfg.showLines"
            (ngModelChange)="update()"
            label="Show Lines"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="curved"
            [(ngModel)]="cfg.curved"
            (ngModelChange)="update()"
            label="Curved Lines"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="icons"
            [(ngModel)]="cfg.showIcons"
            (ngModelChange)="update()"
            label="Show Icons"
          ></ui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div
    preview
    class="chart-preview-wrapper"
    style="width: 100%; display: flex; justify-content: center"
  >
    <div class="chart-preview-wrapper">
      <div style="width: 100%; overflow: auto">
        <svg
          [attr.width]="svgW"
          [attr.height]="svgH"
          style="display: block; margin: 0 auto; font-family: inherit"
        >
          <!-- Lines -->
          <g *ngIf="cfg.showLines">
            <g *ngFor="let edge of edges">
              <path
                *ngIf="cfg.curved"
                [attr.d]="getCurvedPath(edge)"
                fill="none"
                stroke="#d1d5db"
                stroke-width="2"
              />
              <line
                *ngIf="!cfg.curved"
                [attr.x1]="edge.x1"
                [attr.y1]="edge.y1"
                [attr.x2]="edge.x2"
                [attr.y2]="edge.y2"
                stroke="#d1d5db"
                stroke-width="2"
              />
            </g>
          </g>
          <!-- Nodes -->
          <g *ngFor="let node of flatNodes">
            <circle
              [attr.cx]="$any(node).x"
              [attr.cy]="$any(node).y"
              [attr.r]="cfg.nodeR"
              [attr.fill]="node.color || '#6366f1'"
              opacity="0.9"
            />
            <text
              *ngIf="cfg.showIcons && node.icon"
              [attr.x]="$any(node).x"
              [attr.y]="$any(node).y + 5"
              text-anchor="middle"
              font-size="14"
            >
              {{ node.icon }}
            </text>
            <text
              [attr.x]="$any(node).x"
              [attr.y]="$any(node).y + cfg.nodeR + 14"
              text-anchor="middle"
              font-size="11"
              fill="#374151"
              font-weight="500"
            >
              {{ node.label }}
            </text>
          </g>
        </svg>
      </div>
    </div>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
