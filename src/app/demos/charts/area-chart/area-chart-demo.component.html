<div class="demo-container">
  <pg-demo-header
    icon="area-chart"
  iconLibrary="lucide"
    title="Area Chart"
    description="Line chart variant with area fill below the line, emphasizing volume and magnitude over time. Supports basic, stacked, and gradient variants for rich data storytelling."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-area-chart-playground></dm-area-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <pg-example-section
            id="basic" title="Area Chart" description="Single series area chart showing revenue growth over time." [code]="basicCode"
          >
            <chart-line
              [data]="basicData"
              chart-title="Monthly Revenue"
              x-axis-label="Month"
              y-axis-label="Revenue ($k)"
              show-legend
              show-grid
              enable-animation
              width="580"
              height="300"
            ></chart-line>
          </pg-example-section>

          <pg-example-section
            id="stacked" title="Area Chart" description="Multiple series stacked to show composition and trend simultaneously." [code]="stackedCode"
          >
            <chart-line
              [data]="stackedData"
              chart-title="Traffic by Channel"
              show-legend
              show-grid
              enable-animation
              width="580"
              height="300"
            ></chart-line>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="area-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
