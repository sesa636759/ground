<div class="demo-container">
  <app-demo-header
    icon="🏔️"
    title="Area Chart"
    description="Line chart variant with area fill below the line, emphasizing volume and magnitude over time. Supports basic, stacked, and gradient variants for rich data storytelling."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-area-chart-playground></app-area-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>
        <div class="examples-content">

          <section class="demo-section" id="basic" style="margin-top: 0">
            <div class="section-header">
              <h2>🏔️ Basic Area Chart</h2>
              <p>Single series area chart showing revenue growth over time.</p>
            </div>
            <div class="demo-card">
              <chart-line
                [data]="basicData"
                chart-title="Monthly Revenue"
                x-axis-label="Month"
                y-axis-label="Revenue ($k)"
                show-legend
                show-grid
                enable-animation
                width="580"
                height="300"
              ></chart-line>
            </div>
            <ui-code-preview
              [htmlCode]="basicCode"
              label="Basic Area Chart"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="stacked">
            <div class="section-header">
              <h2>📚 Stacked Area Chart</h2>
              <p>Multiple series stacked to show composition and trend simultaneously.</p>
            </div>
            <div class="demo-card">
              <chart-line
                [data]="stackedData"
                chart-title="Traffic by Channel"
                show-legend
                show-grid
                enable-animation
                width="580"
                height="300"
              ></chart-line>
            </div>
            <ui-code-preview
              [htmlCode]="stackedCode"
              label="Stacked Area Chart"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

        </div>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="area-chart"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
