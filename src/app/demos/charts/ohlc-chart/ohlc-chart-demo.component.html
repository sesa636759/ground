<div class="demo-container">
  <app-demo-header
    icon="📊"
    title="OHLC Chart"
    description="Open-High-Low-Close chart using horizontal tick marks on a vertical price range bar. A classic alternative to candlesticks, preferred by technical traders for its clarity and space efficiency."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-ohlc-chart-playground></app-ohlc-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>
        <div class="examples-content">

          <section class="demo-section" id="basic" style="margin-top: 0">
            <div class="section-header">
              <h2>📊 Basic OHLC</h2>
              <p>Classic OHLC bars: open tick points left, close tick points right. Green = up day, Red = down day.</p>
            </div>
            <div class="demo-card" style="overflow-x:auto">
              <svg width="620" height="320" style="display:block;min-width:580px;margin:0 auto">
                <!-- Grid -->
                <line x1="50" y1="20" x2="50" y2="270" stroke="#e5e7eb"/>
                <line x1="50" y1="270" x2="600" y2="270" stroke="#e5e7eb"/>
                <line x1="50" y1="90"  x2="600" y2="90"  stroke="#f3f4f6" stroke-dasharray="4,3"/>
                <line x1="50" y1="150" x2="600" y2="150" stroke="#f3f4f6" stroke-dasharray="4,3"/>
                <line x1="50" y1="210" x2="600" y2="210" stroke="#f3f4f6" stroke-dasharray="4,3"/>
                <!-- Y labels -->
                <text x="46" y="93"  text-anchor="end" font-size="10" fill="#9ca3af">$175</text>
                <text x="46" y="153" text-anchor="end" font-size="10" fill="#9ca3af">$165</text>
                <text x="46" y="213" text-anchor="end" font-size="10" fill="#9ca3af">$155</text>
                <!-- OHLC bar 1 - UP (green) -->
                <line x1="80"  y1="70"  x2="80"  y2="230" stroke="#10b981" stroke-width="2"/>
                <line x1="68"  y1="180" x2="80"  y2="180" stroke="#10b981" stroke-width="2"/>
                <line x1="80"  y1="110" x2="92"  y2="110" stroke="#10b981" stroke-width="2"/>
                <text x="80"  y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 2</text>
                <!-- OHLC bar 2 - DOWN (red) -->
                <line x1="150" y1="80"  x2="150" y2="220" stroke="#f43f5e" stroke-width="2"/>
                <line x1="138" y1="100" x2="150" y2="100" stroke="#f43f5e" stroke-width="2"/>
                <line x1="150" y1="160" x2="162" y2="160" stroke="#f43f5e" stroke-width="2"/>
                <text x="150" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 3</text>
                <!-- OHLC bar 3 - UP -->
                <line x1="220" y1="100" x2="220" y2="240" stroke="#10b981" stroke-width="2"/>
                <line x1="208" y1="200" x2="220" y2="200" stroke="#10b981" stroke-width="2"/>
                <line x1="220" y1="130" x2="232" y2="130" stroke="#10b981" stroke-width="2"/>
                <text x="220" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 4</text>
                <!-- OHLC bar 4 - UP large -->
                <line x1="290" y1="55"  x2="290" y2="220" stroke="#10b981" stroke-width="2"/>
                <line x1="278" y1="180" x2="290" y2="180" stroke="#10b981" stroke-width="2"/>
                <line x1="290" y1="95"  x2="302" y2="95"  stroke="#10b981" stroke-width="2"/>
                <text x="290" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 5</text>
                <!-- OHLC bar 5 - DOWN -->
                <line x1="360" y1="60"  x2="360" y2="200" stroke="#f43f5e" stroke-width="2"/>
                <line x1="348" y1="80"  x2="360" y2="80"  stroke="#f43f5e" stroke-width="2"/>
                <line x1="360" y1="140" x2="372" y2="140" stroke="#f43f5e" stroke-width="2"/>
                <text x="360" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 6</text>
                <!-- OHLC bar 6 - UP -->
                <line x1="430" y1="75"  x2="430" y2="210" stroke="#10b981" stroke-width="2"/>
                <line x1="418" y1="170" x2="430" y2="170" stroke="#10b981" stroke-width="2"/>
                <line x1="430" y1="100" x2="442" y2="100" stroke="#10b981" stroke-width="2"/>
                <text x="430" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 7</text>
                <!-- OHLC bar 7 - DOWN -->
                <line x1="500" y1="65"  x2="500" y2="195" stroke="#f43f5e" stroke-width="2"/>
                <line x1="488" y1="85"  x2="500" y2="85"  stroke="#f43f5e" stroke-width="2"/>
                <line x1="500" y1="155" x2="512" y2="155" stroke="#f43f5e" stroke-width="2"/>
                <text x="500" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 8</text>
                <!-- OHLC bar 8 - UP -->
                <line x1="570" y1="50"  x2="570" y2="190" stroke="#10b981" stroke-width="2"/>
                <line x1="558" y1="165" x2="570" y2="165" stroke="#10b981" stroke-width="2"/>
                <line x1="570" y1="80"  x2="582" y2="80"  stroke="#10b981" stroke-width="2"/>
                <text x="570" y="286" text-anchor="middle" font-size="9" fill="#9ca3af">Jan 9</text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="basicCode"
              label="Basic OHLC"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="withma">
            <div class="section-header">
              <h2>📉 OHLC with Moving Average</h2>
              <p>OHLC bars with a 5-period simple moving average overlay line.</p>
            </div>
            <div class="demo-card" style="overflow-x:auto">
              <svg width="620" height="300" style="display:block;min-width:580px;margin:0 auto">
                <!-- Grid -->
                <line x1="50" y1="20" x2="50" y2="250" stroke="#e5e7eb"/>
                <line x1="50" y1="250" x2="600" y2="250" stroke="#e5e7eb"/>
                <!-- OHLC bars (simplified) -->
                <g>
                  <line x1="80"  y1="70" x2="80"  y2="210" stroke="#10b981" stroke-width="2"/>
                  <line x1="68"  y1="170" x2="80" y2="170" stroke="#10b981" stroke-width="2"/>
                  <line x1="80"  y1="110" x2="92" y2="110" stroke="#10b981" stroke-width="2"/>
                  <line x1="150" y1="65" x2="150" y2="200" stroke="#f43f5e" stroke-width="2"/>
                  <line x1="138" y1="90" x2="150" y2="90" stroke="#f43f5e" stroke-width="2"/>
                  <line x1="150" y1="150" x2="162" y2="150" stroke="#f43f5e" stroke-width="2"/>
                  <line x1="220" y1="80" x2="220" y2="220" stroke="#10b981" stroke-width="2"/>
                  <line x1="208" y1="190" x2="220" y2="190" stroke="#10b981" stroke-width="2"/>
                  <line x1="220" y1="120" x2="232" y2="120" stroke="#10b981" stroke-width="2"/>
                  <line x1="290" y1="55" x2="290" y2="195" stroke="#10b981" stroke-width="2"/>
                  <line x1="278" y1="165" x2="290" y2="165" stroke="#10b981" stroke-width="2"/>
                  <line x1="290" y1="95"  x2="302" y2="95"  stroke="#10b981" stroke-width="2"/>
                  <line x1="360" y1="50" x2="360" y2="185" stroke="#10b981" stroke-width="2"/>
                  <line x1="348" y1="145" x2="360" y2="145" stroke="#10b981" stroke-width="2"/>
                  <line x1="360" y1="75" x2="372" y2="75" stroke="#10b981" stroke-width="2"/>
                </g>
                <!-- MA line -->
                <polyline points="80,150 150,130 220,145 290,135 360,120 430,110 500,105 570,95"
                  fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>
                <text x="575" y="90" font-size="10" fill="#f59e0b" font-weight="600">MA(5)</text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="withMaCode"
              label="OHLC with MA"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

        </div>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="ohlc-chart"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
