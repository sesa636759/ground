<app-playground
  items='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["cfg"]'
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Style</h3>
        <div class="control-group">
          <label>Bar Width</label>
          <ui-input
            type="range"
            min="4"
            max="20"
            step="2"
            [(ngModel)]="cfg.barW"
            (ngModelChange)="update()"
          ></ui-input>
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.barW }}px</span>
        </div>
        <div class="control-group">
          <label>Up Color</label>
          <ui-dropdown
            [(ngModel)]="cfg.upColor"
            (ngModelChange)="update()"
            [options]="upColorOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Down Color</label>
          <ui-dropdown
            [(ngModel)]="cfg.downColor"
            (ngModelChange)="update()"
            [options]="downColorOpts"
          ></ui-dropdown>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="showGrid"
            [(ngModel)]="cfg.showGrid"
            (ngModelChange)="update()"
            label="Show Grid"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showDates"
            [(ngModel)]="cfg.showDates"
            (ngModelChange)="update()"
            label="Show Dates"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showMA"
            [(ngModel)]="cfg.showMA"
            (ngModelChange)="update()"
            label="Show MA Line"
          ></ui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div
    preview
    class="chart-preview-wrapper"
    style="width: 100%; display: flex; justify-content: center"
  >
    <svg width="620" height="340" style="display: block; font-family: inherit">
      <!-- Grid -->
      <g *ngFor="let t of yTicks">
        <line
          *ngIf="cfg.showGrid"
          [attr.x1]="padL"
          [attr.y1]="t.y"
          x2="605"
          [attr.y2]="t.y"
          stroke="#f3f4f6"
          stroke-width="1"
        />
        <text
          [attr.x]="padL - 6"
          [attr.y]="t.y + 4"
          text-anchor="end"
          font-size="10"
          fill="#9ca3af"
        >
          {{ t.val }}
        </text>
      </g>
      <line
        [attr.x1]="padL"
        [attr.y1]="padT + chartH"
        x2="605"
        [attr.y2]="padT + chartH"
        stroke="#e5e7eb"
        stroke-width="1"
      />
      <!-- MA Line -->
      <polyline
        *ngIf="cfg.showMA"
        [attr.points]="maPoints"
        fill="none"
        stroke="#f59e0b"
        stroke-width="1.5"
        stroke-dasharray="4,3"
      />
      <!-- OHLC Bars -->
      <g *ngFor="let bar of bars; let i = index">
        <!-- Vertical line (high-low) -->
        <line
          [attr.x1]="bx(i)"
          [attr.y1]="yScale(bar.high)"
          [attr.x2]="bx(i)"
          [attr.y2]="yScale(bar.low)"
          [attr.stroke]="bar.close >= bar.open ? cfg.upColor : cfg.downColor"
          stroke-width="2"
        />
        <!-- Open tick (left) -->
        <line
          [attr.x1]="bx(i) - cfg.barW / 2"
          [attr.y1]="yScale(bar.open)"
          [attr.x2]="bx(i)"
          [attr.y2]="yScale(bar.open)"
          [attr.stroke]="bar.close >= bar.open ? cfg.upColor : cfg.downColor"
          stroke-width="2"
        />
        <!-- Close tick (right) -->
        <line
          [attr.x1]="bx(i)"
          [attr.y1]="yScale(bar.close)"
          [attr.x2]="bx(i) + cfg.barW / 2"
          [attr.y2]="yScale(bar.close)"
          [attr.stroke]="bar.close >= bar.open ? cfg.upColor : cfg.downColor"
          stroke-width="2"
        />
        <!-- Date -->
        <text
          *ngIf="cfg.showDates && i % 3 === 0"
          [attr.x]="bx(i)"
          [attr.y]="padT + chartH + 16"
          text-anchor="middle"
          font-size="9"
          fill="#9ca3af"
        >
          {{ bar.date }}
        </text>
      </g>
    </svg>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
