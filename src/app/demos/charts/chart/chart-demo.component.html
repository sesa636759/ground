<div class="demo-container">
  <pg-demo-header
    icon="trending-up"
  iconLibrary="lucide"
    title="Chart"
    description="A flexible, multi-purpose chart component supporting various visualization types including line, bar, pie, and doughnut charts. Built for responsive layouts with customizable legends and styling."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-chart-playground></dm-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Chart Types -->
          <pg-example-section
            id="types" title="Types" description="Choose from multiple visualization types to best represent your data." [code]="typesCode"
          >
            <div class="h-300">
              <ui-chart-line [data]="chartData" show-legend responsive></ui-chart-line>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="app-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
