<div class="demo-container">
  <pg-demo-header
    icon="🌐"
    title="Polar Area Chart"
    description="A circular chart where each segment spans an equal angle but varies in radius based on value. Powered by Chart.js, it supports legend, animation, and rich color customization for multi-category comparison."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-polar-area-chart-playground></dm-polar-area-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <section class="demo-section mt-0" id="skills">
            <div class="section-header">
              <h2>🌐 Skills Assessment</h2>
              <p>Compare proficiency levels across technical skill categories.</p>
            </div>
            <div class="demo-card display-flex justify-center p-24">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="skillsData"
                class="w-520 h-380"
              ></app-chart>
            </div>
            <dui-code-preview
              [htmlCode]="skillsCode"
              label="Skills Polar Area"
              activeLang="html"
              expanded="true"
            ></dui-code-preview>
          </section>

          <section class="demo-section" id="sales">
            <div class="section-header">
              <h2>🗺️ Sales by Region</h2>
              <p>Visualize regional sales distribution in a polar area format.</p>
            </div>
            <div class="demo-card display-flex justify-center p-24">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="bottom"
                [responsive]="true"
                [data]="salesData"
                class="w-520 h-380"
              ></app-chart>
            </div>
            <dui-code-preview
              [htmlCode]="salesCode"
              label="Sales Polar Area"
              activeLang="html"
              expanded="true"
            ></dui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="polar-area-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
