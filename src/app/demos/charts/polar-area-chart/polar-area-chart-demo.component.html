<div class="demo-container">
  <pg-demo-header
    icon="radar"
  iconLibrary="lucide"
    title="Polar Area Chart"
    description="A circular chart where each segment spans an equal angle but varies in radius based on value. Powered by Chart.js, it supports legend, animation, and rich color customization for multi-category comparison."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-polar-area-chart-playground></dm-polar-area-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <pg-example-section
            id="skills" title="Assessment" description="Compare proficiency levels across technical skill categories." [code]="skillsCode"
          >
            <app-chart
              chartType="polarArea"
              [showLegend]="true"
              legendPosition="right"
              [responsive]="true"
              [data]="skillsData"
              class="w-520 h-380"
            ></app-chart>
          </pg-example-section>

          <pg-example-section
            id="sales" title="by Region" description="Visualize regional sales distribution in a polar area format." [code]="salesCode"
          >
            <app-chart
              chartType="polarArea"
              [showLegend]="true"
              legendPosition="bottom"
              [responsive]="true"
              [data]="salesData"
              class="w-520 h-380"
            ></app-chart>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="polar-area-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
