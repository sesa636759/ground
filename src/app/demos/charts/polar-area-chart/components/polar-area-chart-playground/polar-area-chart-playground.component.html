<app-playground
  [items]='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
  [defaultOpen]='["cfg"]'
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📐 Layout</h3>
        <div class="control-group">
          <label>Dataset</label>
          <ui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="onDataset()"
            [options]="datasetOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Legend Position</label>
          <ui-dropdown
            [(ngModel)]="cfg.legendPos"
            (ngModelChange)="update()"
            [options]="legendOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Fill Opacity</label>
          <ui-input
            type="range"
            min="0.3"
            max="1"
            step="0.05"
            [(ngModel)]="cfg.opacity"
            (ngModelChange)="update()"
          ></ui-input>
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.opacity }}</span>
        </div>
      </div>
      <div class="control-section">
        <h3>✨ Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="legend"
            [(ngModel)]="cfg.showLegend"
            (ngModelChange)="update()"
            label="Show Legend"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="anim"
            [(ngModel)]="cfg.animate"
            (ngModelChange)="update()"
            label="Animate"
          ></ui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div
    preview
    class="chart-preview-wrapper"
    style="width: 100%; display: flex; justify-content: center"
  >
    <app-chart
      chartType="polarArea"
      [showLegend]="cfg.showLegend"
      [legendPosition]="cfg.legendPos"
      [responsive]="true"
      [data]="activeData"
      style="width: 100%; max-width: 480px; height: 360px; margin: 0 auto; display: block"
    ></app-chart>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
