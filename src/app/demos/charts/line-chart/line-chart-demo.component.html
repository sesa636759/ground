<div class="demo-container">
  <pg-demo-header
    icon="chart-line"
  iconLibrary="lucide"
    title="Line Chart"
    description="An SVG-based line chart for visualising trends over time. Supports single and multi-series data, custom colours, grid, legend, markers, and animation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-line-chart-playground></dm-line-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Line Chart" description="A single-series line chart showing monthly revenue trends." [code]="basicCode"
          >
            <chart-line
              chart-title="Monthly Revenue"
              x-axis-label="Month"
              y-axis-label="Revenue ($k)"
              show-legend
              show-grid
              enable-animation
              width="600"
              height="300"
              [data]="basicData"
            ></chart-line>
          </pg-example-section>

          <!-- Multi Series -->
          <pg-example-section
            id="multi-series" title="Series" description="Compare multiple metrics on the same chart using different colours per series." [code]="multiSeriesCode"
          >
            <chart-line
              chart-title="Financial Overview"
              x-axis-label="Month"
              y-axis-label="Amount ($k)"
              show-legend
              show-grid
              enable-animation
              width="600"
              height="300"
              [data]="multiSeriesData"
            ></chart-line>
          </pg-example-section>

          <!-- Stepped -->
          <pg-example-section
            id="stepped" title="Line" description="Use closely-spaced points to represent discrete state changes over time." [code]="steppedCode"
          >
            <chart-line
              chart-title="Server Load (%)"
              x-axis-label="Hour"
              y-axis-label="Load (%)"
              show-markers
              show-grid
              stroke-width="2"
              width="600"
              height="300"
              [data]="steppedData"
            ></chart-line>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="line-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
