<div class="demo-container">
  <pg-demo-header
    icon="bar-chart-2"
  iconLibrary="lucide"
    title="Bar Chart"
    description="A versatile bar chart component for visualizing categorical data. Supports vertical and horizontal orientations, multiple datasets, stacking, animations, and customizable styling."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-bar-chart-playground></dm-bar-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Bar Chart" description="A single-series bar chart showing monthly revenue trends." [code]="basicCode"
          >
            <div class="h-320">
              <ui-bar-chart
                show-legend
                enable-animation
                show-tooltip
                show-grid
                [labels]="basicLabels"
                [datasets]="basicDatasets"
              ></ui-bar-chart>
            </div>
          </pg-example-section>

          <!-- Multi Dataset -->
          <pg-example-section
            id="multi-dataset" title="Dataset" description="Compare multiple data series side-by-side across the same categories." [code]="multiCode"
          >
            <div class="h-320">
              <ui-bar-chart
                show-legend
                enable-animation
                show-tooltip
                show-grid
                [labels]="multiLabels"
                [datasets]="multiDatasets"
              ></ui-bar-chart>
            </div>
          </pg-example-section>

          <!-- Stacked -->
          <pg-example-section
            id="stacked" title="Bars" description="Stack multiple datasets to show part-to-whole relationships clearly." [code]="stackedCode"
          >
            <div class="h-320">
              <ui-bar-chart
                stacked
                show-legend
                enable-animation
                show-tooltip
                show-grid
                [labels]="stackedLabels"
                [datasets]="stackedDatasets"
              ></ui-bar-chart>
            </div>
          </pg-example-section>

          <!-- Horizontal -->
          <pg-example-section
            id="horizontal" title="Bars" [code]="horizontalCode"
          >
            <div class="h-320">
              <ui-bar-chart
                orientation="horizontal"
                show-legend
                enable-animation
                show-tooltip
                show-grid
                [labels]="hLabels"
                [datasets]="hDatasets"
              ></ui-bar-chart>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="bar-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
