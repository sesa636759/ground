<div class="demo-container">
  <pg-demo-header
    icon="grid-2x2"
  iconLibrary="lucide"
    title="Waffle Chart"
    description="An SVG-based chart where a grid of cells visualises a value against a total. Supports custom grid dimensions, fill/empty colours, percentage display, and descriptive titles."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-waffle-chart-playground></dm-waffle-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Waffle" description="Show a single value-against-total metric with a fill colour and title." [code]="basicCode"
          >
            <chart-waffle
              value="72"
              total="100"
              chart-title="Task Completion"
              fill-color="#6366f1"
            ></chart-waffle>
          </pg-example-section>

          <!-- Colors -->
          <pg-example-section
            id="colors" title="Variants" description="Use fill-color to match your brand palette or semantic status colours." [code]="colorsCode"
          >
            <chart-waffle
              value="72"
              total="100"
              fill-color="#6366f1"
              chart-title="Engineering"
            ></chart-waffle>
            <chart-waffle
              value="55"
              total="100"
              fill-color="#f59e0b"
              chart-title="Marketing"
            ></chart-waffle>
            <chart-waffle
              value="88"
              total="100"
              fill-color="#10b981"
              chart-title="Operations"
            ></chart-waffle>
            <chart-waffle
              value="40"
              total="100"
              fill-color="#f43f5e"
              chart-title="HR"
            ></chart-waffle>
          </pg-example-section>

          <!-- Grid Sizes -->
          <pg-example-section
            id="grid-sizes" title="Sizes" description="Override rows and columns to create square, compact, or wide waffle layouts." [code]="gridCode"
          >
            <chart-waffle value="65" total="100" chart-title="Default (10×10)"></chart-waffle>
            <chart-waffle
              value="65"
              total="100"
              rows="5"
              columns="10"
              cell-size="22"
              chart-title="Compact (5×10)"
            ></chart-waffle>
            <chart-waffle
              value="65"
              total="100"
              rows="5"
              columns="20"
              cell-size="18"
              chart-title="Wide (5×20)"
            ></chart-waffle>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="waffle-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
