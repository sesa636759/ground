<div class="demo-container">
  <pg-demo-header
    icon="🌹"
    title="Rose Chart (Nightingale)"
    description="A polar area chart where each segment has equal angular width but varying radius. Named after Florence Nightingale, it excels at comparing cyclical categorical data like monthly or directional distributions."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-rose-chart-playground></dm-rose-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <section class="demo-section mt-0" id="monthly">
            <div class="section-header">
              <h2>🌹 Monthly Revenue</h2>
              <p>
                Display monthly revenue distribution in a Nightingale rose format for seasonal
                patterns.
              </p>
            </div>
            <div class="demo-card display-flex justify-center p-24">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="monthlyData"
                class="w-480 h-360"
              ></app-chart>
            </div>
            <ui-code-preview
              [htmlCode]="monthlyCode"
              label="Monthly Revenue Rose"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="performance">
            <div class="section-header">
              <h2>📊 Performance Radar</h2>
              <p>Compare performance metrics across multiple dimensions using a rose chart.</p>
            </div>
            <div class="demo-card display-flex justify-center p-24">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="bottom"
                [responsive]="true"
                [data]="perfData"
                class="w-480 h-360"
              ></app-chart>
            </div>
            <ui-code-preview
              [htmlCode]="monthlyCode"
              label="Performance Rose"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="wind">
            <div class="section-header">
              <h2>💨 Wind Direction</h2>
              <p>Classic meteorological wind rose showing frequency by compass direction.</p>
            </div>
            <div class="demo-card display-flex justify-center p-24">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="windData"
                class="w-480 h-360"
              ></app-chart>
            </div>
            <ui-code-preview
              [htmlCode]="'<!-- Wind Rose Chart -->'"
              label="Wind Direction"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="rose-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
