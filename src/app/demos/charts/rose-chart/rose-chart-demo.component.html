<div class="demo-container">
  <pg-demo-header
    icon="flower"
  iconLibrary="lucide"
    title="Rose Chart (Nightingale)"
    description="A polar area chart where each segment has equal angular width but varying radius. Named after Florence Nightingale, it excels at comparing cyclical categorical data like monthly or directional distributions."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-rose-chart-playground></dm-rose-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <pg-example-section
            id="monthly" title="Revenue" [code]="monthlyCode"
          >
            <app-chart
              chartType="polarArea"
              [showLegend]="true"
              legendPosition="right"
              [responsive]="true"
              [data]="monthlyData"
              class="w-480 h-360"
            ></app-chart>
          </pg-example-section>

          <pg-example-section
            id="performance" title="Radar" description="Compare performance metrics across multiple dimensions using a rose chart." [code]="monthlyCode"
          >
            <app-chart
              chartType="polarArea"
              [showLegend]="true"
              legendPosition="bottom"
              [responsive]="true"
              [data]="perfData"
              class="w-480 h-360"
            ></app-chart>
          </pg-example-section>

          <pg-example-section
            id="wind" title="Direction" description="Classic meteorological wind rose showing frequency by compass direction." [code]="'<!-- Wind Rose Chart -->'"
          >
            <app-chart
              chartType="polarArea"
              [showLegend]="true"
              legendPosition="right"
              [responsive]="true"
              [data]="windData"
              class="w-480 h-360"
            ></app-chart>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="rose-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
