<div class="demo-container">
  <pg-demo-header
    icon="pie-chart"
  iconLibrary="lucide"
    title="Pie Chart"
    description="Circular chart components for visualizing part-to-whole relationships. Supports pie, doughnut, polar area, and multi-ring variants with rich customization."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-pie-chart-playground></dm-pie-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Pie -->
          <pg-example-section
            id="pie" title="Chart" description="Classic pie chart showing proportional distribution of categorical values." [code]="pieCode"
          >
            <div class="h-340 display-flex justify-center">
              <app-chart
                chartType="pie"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="pieData"
                class="w-full max-w-520"
              ></app-chart>
            </div>
          </pg-example-section>

          <!-- Doughnut -->
          <pg-example-section
            id="doughnut" title="Chart" [code]="doughnutCode"
          >
            <div class="h-340 display-flex justify-center">
              <app-chart
                chartType="doughnut"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="doughnutData"
                [options]="doughnutOptions"
                class="w-full max-w-520"
              ></app-chart>
            </div>
          </pg-example-section>

          <!-- Polar Area -->
          <pg-example-section
            id="polar-area" title="Area Chart" [code]="polarCode"
          >
            <div class="h-340 display-flex justify-center">
              <app-chart
                chartType="polarArea"
                [showLegend]="true"
                legendPosition="right"
                [responsive]="true"
                [data]="polarData"
                class="w-full max-w-520"
              ></app-chart>
            </div>
          </pg-example-section>

          <!-- Multi Ring -->
          <pg-example-section
            id="multi-ring" title="Doughnut" [code]="multiRingCode"
          >
            <div class="h-340 display-flex justify-center">
              <app-chart
                chartType="doughnut"
                [showLegend]="true"
                legendPosition="bottom"
                [responsive]="true"
                [data]="multiRingData"
                [options]="multiRingOptions"
                class="w-full max-w-520"
              ></app-chart>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="pie-chart"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
