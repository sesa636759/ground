<div class="demo-container">
  <pg-demo-header
    icon="📅"
    title="Timeline Range Chart"
    description="Visualize task durations, schedules, and time-based ranges across multiple rows. Ideal for project timelines, team schedules, and sprint planning."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-timeline-range-playground></app-timeline-range-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>
        <div class="examples-content">
          <section class="demo-section" id="project" style="margin-top: 0">
            <div class="section-header">
              <h2>📅 Project Schedule</h2>
              <p>Show tasks and milestones over a project timeline with labeled rows.</p>
            </div>
            <div class="demo-card">
              <svg width="640" height="280" style="display: block; margin: 0 auto">
                <defs>
                  <linearGradient id="tr-g1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#6366f1" />
                    <stop offset="100%" stop-color="#8b5cf6" />
                  </linearGradient>
                </defs>
                <!-- Rows -->
                <text x="10" y="46" font-size="11" fill="#6b7280">Planning</text>
                <rect
                  x="120"
                  y="30"
                  width="140"
                  height="28"
                  rx="6"
                  fill="url(#tr-g1)"
                  opacity="0.85"
                />
                <text
                  x="190"
                  y="49"
                  text-anchor="middle"
                  font-size="10"
                  fill="white"
                  font-weight="600"
                >
                  Planning
                </text>

                <text x="10" y="102" font-size="11" fill="#6b7280">Design</text>
                <rect x="220" y="86" width="130" height="28" rx="6" fill="#0ea5e9" opacity="0.85" />
                <text
                  x="285"
                  y="105"
                  text-anchor="middle"
                  font-size="10"
                  fill="white"
                  font-weight="600"
                >
                  Design
                </text>

                <text x="10" y="158" font-size="11" fill="#6b7280">Dev</text>
                <rect
                  x="310"
                  y="142"
                  width="180"
                  height="28"
                  rx="6"
                  fill="#10b981"
                  opacity="0.85"
                />
                <text
                  x="400"
                  y="161"
                  text-anchor="middle"
                  font-size="10"
                  fill="white"
                  font-weight="600"
                >
                  Development
                </text>

                <text x="10" y="214" font-size="11" fill="#6b7280">Testing</text>
                <rect
                  x="460"
                  y="198"
                  width="100"
                  height="28"
                  rx="6"
                  fill="#f59e0b"
                  opacity="0.85"
                />
                <text
                  x="510"
                  y="217"
                  text-anchor="middle"
                  font-size="10"
                  fill="white"
                  font-weight="600"
                >
                  QA
                </text>

                <text x="10" y="270" font-size="11" fill="#6b7280">Launch</text>
                <rect x="540" y="254" width="60" height="28" rx="6" fill="#f43f5e" opacity="0.85" />
                <text
                  x="570"
                  y="273"
                  text-anchor="middle"
                  font-size="10"
                  fill="white"
                  font-weight="600"
                >
                  🚀
                </text>

                <!-- X-axis base line -->
                <line x1="120" y1="295" x2="620" y2="295" stroke="#e5e7eb" stroke-width="1" />
                <text x="120" y="308" font-size="10" fill="#9ca3af">Week 1</text>
                <text x="244" y="308" font-size="10" fill="#9ca3af">Week 3</text>
                <text x="368" y="308" font-size="10" fill="#9ca3af">Week 5</text>
                <text x="492" y="308" font-size="10" fill="#9ca3af">Week 7</text>
                <text x="590" y="308" font-size="10" fill="#9ca3af">Week 9</text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="'<!-- SVG Timeline Range Chart -->\n<svg width=\'640\' height=\'280\'>...'"
              label="Project Timeline"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <section class="demo-section" id="team">
            <div class="section-header">
              <h2>👥 Team Schedule</h2>
              <p>Visualize team member availability and assignments side-by-side.</p>
            </div>
            <div class="demo-card">
              <svg width="640" height="240" style="display: block; margin: 0 auto">
                <text x="10" y="36" font-size="11" fill="#6b7280">Alice</text>
                <rect x="120" y="20" width="200" height="26" rx="5" fill="#6366f1" opacity="0.8" />
                <text x="220" y="37" text-anchor="middle" font-size="10" fill="white">
                  Sprint 1
                </text>
                <rect x="330" y="20" width="160" height="26" rx="5" fill="#8b5cf6" opacity="0.8" />
                <text x="410" y="37" text-anchor="middle" font-size="10" fill="white">
                  Sprint 2
                </text>

                <text x="10" y="92" font-size="11" fill="#6b7280">Bob</text>
                <rect x="160" y="76" width="180" height="26" rx="5" fill="#0ea5e9" opacity="0.8" />
                <text x="250" y="93" text-anchor="middle" font-size="10" fill="white">
                  Feature A
                </text>

                <text x="10" y="148" font-size="11" fill="#6b7280">Carol</text>
                <rect x="120" y="132" width="100" height="26" rx="5" fill="#10b981" opacity="0.8" />
                <text x="170" y="149" text-anchor="middle" font-size="10" fill="white">Design</text>
                <rect x="230" y="132" width="220" height="26" rx="5" fill="#f59e0b" opacity="0.8" />
                <text x="340" y="149" text-anchor="middle" font-size="10" fill="white">
                  Development
                </text>

                <text x="10" y="204" font-size="11" fill="#6b7280">Dave</text>
                <rect x="380" y="188" width="180" height="26" rx="5" fill="#f43f5e" opacity="0.8" />
                <text x="470" y="205" text-anchor="middle" font-size="10" fill="white">
                  QA &amp; Release
                </text>
              </svg>
            </div>
            <ui-code-preview
              [htmlCode]="'<!-- Team Schedule Timeline -->'"
              label="Team Schedule"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="timeline-range"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
