<app-playground
  items='[{"id":"cfg","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["cfg"]'
>
  <div slot="content-cfg">
    <div class="control-grid">
      <div class="control-section">
        <h3>📋 Dataset</h3>
        <div class="control-group">
          <label>Category</label>
          <ui-dropdown
            [(ngModel)]="cfg.dataset"
            (ngModelChange)="update()"
            [options]="datasetOpts"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Row Height</label>
          <ui-input
            type="range"
            min="24"
            max="56"
            step="4"
            [(ngModel)]="cfg.rowHeight"
            (ngModelChange)="update()"
          ></ui-input>
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.rowHeight }}px</span>
        </div>
      </div>
      <div class="control-section">
        <h3>🎨 Style</h3>
        <div class="control-group">
          <label>Corner Radius</label>
          <ui-input
            type="range"
            min="0"
            max="12"
            step="2"
            [(ngModel)]="cfg.radius"
            (ngModelChange)="update()"
          ></ui-input>
          <span style="font-size: 0.8rem; color: var(--text-secondary)">{{ cfg.radius }}px</span>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showTooltip"
            [(ngModel)]="cfg.showTooltip"
            (ngModelChange)="update()"
            label="Show Tooltip"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showLabels"
            [(ngModel)]="cfg.showLabels"
            (ngModelChange)="update()"
            label="Show Labels"
          ></ui-checkbox>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <ui-button variant="secondary" (click)="reset()" label="Reset"></ui-button>
    </div>
  </div>
  <div
    preview
    class="chart-preview-wrapper"
    style="width: 100%; display: flex; justify-content: center"
  >
    <div class="chart-preview-wrapper">
      <div style="width: 100%; max-width: 700px; overflow-x: auto">
        <svg
          [attr.width]="svgWidth"
          [attr.height]="svgHeight"
          style="font-family: inherit; display: block; margin: 0 auto"
        >
          <!-- Grid lines -->
          <g *ngFor="let col of gridCols">
            <line
              [attr.x1]="labelW + col.x"
              [attr.y1]="headerH"
              [attr.x2]="labelW + col.x"
              [attr.y2]="svgHeight"
              stroke="#e5e7eb"
              stroke-width="1"
            />
            <text
              [attr.x]="labelW + col.x"
              [attr.y]="headerH - 6"
              text-anchor="middle"
              font-size="11"
              fill="#6b7280"
            >
              {{ col.label }}
            </text>
          </g>
          <!-- Rows -->
          <g *ngFor="let row of activeRows; let i = index">
            <rect
              [attr.x]="0"
              [attr.y]="headerH + i * (cfg.rowHeight + gap)"
              [attr.width]="labelW - 8"
              [attr.height]="cfg.rowHeight"
              fill="transparent"
            />
            <text
              [attr.x]="labelW - 12"
              [attr.y]="headerH + i * (cfg.rowHeight + gap) + cfg.rowHeight / 2 + 4"
              text-anchor="end"
              font-size="12"
              fill="#374151"
            >
              {{ row.label }}
            </text>
            <g *ngFor="let bar of row.bars">
              <rect
                [attr.x]="labelW + bar.x1"
                [attr.y]="headerH + i * (cfg.rowHeight + gap) + 3"
                [attr.width]="bar.x2 - bar.x1"
                [attr.height]="cfg.rowHeight - 6"
                [attr.rx]="cfg.radius"
                [attr.fill]="bar.color"
                opacity="0.85"
              />
              <text
                *ngIf="cfg.showLabels && bar.x2 - bar.x1 > 40"
                [attr.x]="labelW + bar.x1 + (bar.x2 - bar.x1) / 2"
                [attr.y]="headerH + i * (cfg.rowHeight + gap) + cfg.rowHeight / 2 + 4"
                text-anchor="middle"
                font-size="11"
                fill="white"
                font-weight="600"
              >
                {{ bar.label }}
              </text>
            </g>
          </g>
        </svg>
      </div>
    </div>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
