<app-demo-header
  icon="🎯"
  title="Accordion Component"
  description="Collapsible content panels for organizing and presenting information in a compact, scannable format."
>
</app-demo-header>

<demo-tabs>
  <!-- Playground Slot -->
  <div slot="playground">
    <app-accordion-playground></app-accordion-playground>
  </div>

  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Visual Variants -->
      <app-example-section
        id="variants"
        title="Visual Variants"
        description="Different styles like subtle, elevated, and glassmorphism."
        [code]="variantCode()"
        style="margin-top: 0"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <h3>Subtle Variant</h3>
            <ui-accordion variant="subtle">
              <ui-accordion-item label="Simple Info" icon="ℹ️"> Content here... </ui-accordion-item>
            </ui-accordion>
          </div>
          <div class="demo-card">
            <h3>Elevated Variant</h3>
            <ui-accordion variant="elevated">
              <ui-accordion-item label="Important Policy" icon="🛡️">
                Content here...
              </ui-accordion-item>
            </ui-accordion>
          </div>
        </div>
      </app-example-section>

      <!-- Color Variations -->
      <app-example-section
        id="colors"
        title="Color Schemes"
        description="Accent colors for active states and icons."
        [code]="colorCode()"
      >
        <div class="demo-grid col-2">
          <ui-accordion accent-color="#3b82f6" variant="elevated">
            <ui-accordion-item label="Blue Theme" icon="🔵"> Content... </ui-accordion-item>
          </ui-accordion>
          <ui-accordion accent-color="#10b981" variant="elevated">
            <ui-accordion-item label="Green Theme" icon="🟢"> Content... </ui-accordion-item>
          </ui-accordion>
        </div>
      </app-example-section>

      <!-- Dynamic Content -->
      <app-example-section
        id="dynamic"
        title="Dynamic & Advanced"
        description="Animated transitions, custom icons, and badges."
        [code]="dynamicCode()"
      >
        <div class="demo-card">
          <ui-accordion [animated]="true">
            <ui-accordion-item label="System Alerts" [badge]="'3'" badge-color="#ef4444">
              Check these alerts immediately.
            </ui-accordion-item>
          </ui-accordion>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="accordion"></app-component-documentation>
  </div>
</demo-tabs>
