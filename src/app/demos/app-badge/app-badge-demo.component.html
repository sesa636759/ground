<div class="demo-container">
  <h1>Badge Component</h1>
  <p class="intro-text">A small visual indicator for status, counts, or categories.</p>

  <demo-tabs >
    <div slot="playground">
      <app-badge-playground></app-badge-playground>
    </div>

    <div slot="examples">
      <app-example-section
        id="colors"
        title="Colors"
        description="Semantic colors for different states."
        [code]="colorsCode"
      >
        <div class="demo-grid col-3">
          <ui-badge value="1" color="primary">Primary</ui-badge>
          <ui-badge value="2" color="success">Success</ui-badge>
          <ui-badge value="3" color="warning">Warning</ui-badge>
          <ui-badge value="4" color="danger">Danger</ui-badge>
          <ui-badge value="5" color="info">Info</ui-badge>
        </div>
      </app-example-section>

      <app-example-section
        id="styles"
        title="Styles"
        description="Standard, soft, and outlined variants."
        [code]="stylesCode"
      >
        <div class="demo-grid col-2">
          <div class="demo-card">
            <h3>Standard (Filled)</h3>
            <ui-badge value="New" variant="standard"></ui-badge>
          </div>
          <div class="demo-card">
            <h3>Soft variant</h3>
            <ui-badge value="Hot" variant="soft" color="warning"></ui-badge>
          </div>
          <div class="demo-card">
            <h3>Outlined variant</h3>
            <ui-badge value="99" variant="outlined" color="primary"></ui-badge>
          </div>
          <div class="demo-card">
            <h3>Dot Style</h3>
            <ui-badge dot color="success">Online</ui-badge>
          </div>
        </div>
      </app-example-section>

      <app-example-section
        id="positions"
        title="Positions"
        description="Place badges in any corner of a target element."
        [code]="positionsCode"
      >
        <div class="demo-grid col-2">
          <div class="demo-card">
            <ui-badge value="5" position="top-right">
              <div class="demo-target">Top Right</div>
            </ui-badge>
          </div>
          <div class="demo-card">
            <ui-badge value="5" position="top-left">
              <div class="demo-target">Top Left</div>
            </ui-badge>
          </div>
          <div class="demo-card">
            <ui-badge value="5" position="bottom-right">
              <div class="demo-target">Bottom Right</div>
            </ui-badge>
          </div>
          <div class="demo-card">
            <ui-badge value="5" position="bottom-left">
              <div class="demo-target">Bottom Left</div>
            </ui-badge>
          </div>
        </div>
      </app-example-section>

      <app-example-section
        id="special"
        title="Special Features"
        description="Advanced features like max values, animations, and icons."
        [code]="specialCode"
      >
        <div class="demo-grid col-2">
          <div class="demo-card">
            <h3>Max Value (100 -> 99+)</h3>
            <ui-badge value="100" max="99" color="danger"></ui-badge>
          </div>
          <div class="demo-card">
            <h3>Glow & Pulse</h3>
            <ui-badge glow animation="pulse" value="!" color="success"></ui-badge>
          </div>
          <div class="demo-card">
            <h3>Icon Support</h3>
            <ui-badge icon="⭐" value="PRO" color="warning"></ui-badge>
          </div>
        </div>
      </app-example-section>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="badge"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
