<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Direction</label>
        <select [(ngModel)]="pgConfig.direction" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <select [(ngModel)]="pgConfig.theme" (change)="updateConfig()">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="control-group">
        <label>Handle Size (px)</label>
        <input type="number" [(ngModel)]="pgConfig.handleSize" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Snap Threshold (px)</label>
        <input type="number" [(ngModel)]="pgConfig.snapThreshold" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showHandleIcon" (change)="updateConfig()" />
        Show Icon
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.snapToEdge" (change)="updateConfig()" /> Snap
        to Edge
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.collapsible1" (change)="updateConfig()" /> P1
        Collapsible
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.collapsible3" (change)="updateConfig()" /> P3
        Collapsible
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-resizable-panel
        [attr.direction]="pgConfig.direction"
        [attr.theme]="pgConfig.theme"
        [handleSize]="pgConfig.handleSize"
        [showHandleIcon]="pgConfig.showHandleIcon"
        [snapToEdge]="pgConfig.snapToEdge"
        [snapThreshold]="pgConfig.snapThreshold"
        [animated]="pgConfig.animated"
        [panels]="panelsData"
        (panelResize)="onPanelResize($event)"
        (panelCollapse)="onPanelCollapse($event)"
        style="height: 100%; width: 100%"
      >
        <div slot="panel-1" class="panel-content highlight">
          <h3>Left Panel</h3>
          <p>Drag the handle to resize me.</p>
        </div>
        <div slot="panel-2" class="panel-content">
          <h3>Middle Panel</h3>
          <p>This is the flexible center area.</p>
        </div>
        <div slot="panel-3" class="panel-content highlight">
          <h3>Right Panel</h3>
          <p>I also respond to resizing.</p>
        </div>
      </app-resizable-panel>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
