<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Direction</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.direction"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Handle Size (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.handleSize" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Snap Threshold (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.snapThreshold" (ngModelChange)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animated" (ngModelChange)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showHandleIcon" (ngModelChange)="updateConfig()" />
        Show Icon
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.snapToEdge" (ngModelChange)="updateConfig()" /> Snap to Edge
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.collapsible1" (ngModelChange)="updateConfig()" /> P1
        Collapsible
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.collapsible3" (ngModelChange)="updateConfig()" /> P3
        Collapsible
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <app-resizable-panel
      [attr.direction]="pgConfig.direction"
      [attr.theme]="pgConfig.theme"
      [handleSize]="pgConfig.handleSize"
      [showHandleIcon]="pgConfig.showHandleIcon"
      [snapToEdge]="pgConfig.snapToEdge"
      [snapThreshold]="pgConfig.snapThreshold"
      [animated]="pgConfig.animated"
      [panels]="panelsData"
      (panelResize)="onPanelResize($event)"
      (panelCollapse)="onPanelCollapse($event)"
      style="height: 100%; width: 100%"
    >
      <div slot="panel-1" class="panel-content highlight">
        <h3>Left Panel</h3>
        <p>Drag the handle to resize me.</p>
      </div>
      <div slot="panel-2" class="panel-content">
        <h3>Middle Panel</h3>
        <p>This is the flexible center area.</p>
      </div>
      <div slot="panel-3" class="panel-content highlight">
        <h3>Right Panel</h3>
        <p>I also respond to resizing.</p>
      </div>
    </app-resizable-panel>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
