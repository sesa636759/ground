<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Mode</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.mode"
          (change)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Active Step</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.activeStep"
          (input)="updateConfig()"
          min="0"
          max="4"
        />
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Snack', value: 'snack' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color Scheme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.colorScheme"
          (change)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Danger', value: 'danger' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group" *ngIf="pgConfig.mode === 'horizontal'">
        <label>Label Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Bottom', value: 'bottom' },
            { label: 'Top', value: 'top' },
            { label: 'Alternate', value: 'alternate' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group" *ngIf="pgConfig.mode === 'vertical'">
        <label>Description Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.descriptionPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Right', value: 'right' },
            { label: 'Left', value: 'left' },
            { label: 'Alternate', value: 'alternate' },
          ]"
        ></ui-dropdown>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showContentArea" (change)="updateConfig()" />
        Content Area
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showNavigation" (change)="updateConfig()" />
        Navigation buttons
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.clickable" (change)="updateConfig()" />
        Clickable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showProgress" (change)="updateConfig()" />
        Progress
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="stepper-container" [class.vertical-stage]="pgConfig.mode === 'vertical'">
        <app-stepper-container
          [attr.mode]="pgConfig.mode"
          [attr.active-step]="pgConfig.activeStep"
          [attr.variant]="pgConfig.variant === 'default' ? null : pgConfig.variant"
          [attr.color-scheme]="pgConfig.colorScheme === 'primary' ? null : pgConfig.colorScheme"
          [attr.label-position]="pgConfig.mode === 'horizontal' ? pgConfig.labelPosition : null"
          [attr.description-position]="
            pgConfig.mode === 'vertical' ? pgConfig.descriptionPosition : null
          "
          [attr.theme]="pgConfig.theme === 'light' ? null : pgConfig.theme"
          [attr.show-content-area]="pgConfig.showContentArea ? 'true' : null"
          [attr.show-navigation]="pgConfig.showNavigation ? 'true' : null"
          [attr.animated]="pgConfig.animated"
          [attr.clickable]="pgConfig.clickable"
          [attr.show-progress]="pgConfig.showProgress"
          [attr.compact]="pgConfig.compact"
          [attr.steps]="stepsJson"
          (stepChange)="onStepChange($event)"
        >
          <div *ngIf="pgConfig.showContentArea">
            <div
              *ngFor="let step of stepsData; let i = index"
              [attr.slot]="'step-' + i"
              class="step-content"
            >
              <h3>{{ step.label }}</h3>
              <p>{{ step.description }}</p>
              <div class="dummy-form">
                <div class="form-row"></div>
                <div class="form-row half"></div>
                <div class="form-row half"></div>
              </div>
            </div>
          </div>
        </app-stepper-container>
      </div>
    </div>

    <ui-code-preview [htmlCode]="generatedCode()" [label]="'Generated Code'" activeLang="html" expanded="true"></ui-code-preview>
  </div>
</div>
