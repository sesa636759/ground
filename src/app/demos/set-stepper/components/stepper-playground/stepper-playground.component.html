<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Mode</label>
        <select [(ngModel)]="pgConfig.mode" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>

      <div class="control-group">
        <label>Active Step</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.activeStep"
          (input)="updateConfig()"
          min="0"
          max="4"
        />
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="outlined">Outlined</option>
          <option value="filled">Filled</option>
          <option value="minimal">Minimal</option>
          <option value="snack">Snack</option>
        </select>
      </div>

      <div class="control-group">
        <label>Color Scheme</label>
        <select [(ngModel)]="pgConfig.colorScheme" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="danger">Danger</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group" *ngIf="pgConfig.mode === 'horizontal'">
        <label>Label Position</label>
        <select [(ngModel)]="pgConfig.labelPosition" (change)="updateConfig()">
          <option value="bottom">Bottom</option>
          <option value="top">Top</option>
          <option value="alternate">Alternate</option>
        </select>
      </div>

      <div class="control-group" *ngIf="pgConfig.mode === 'vertical'">
        <label>Description Position</label>
        <select [(ngModel)]="pgConfig.descriptionPosition" (change)="updateConfig()">
          <option value="right">Right</option>
          <option value="left">Left</option>
          <option value="alternate">Alternate</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showContentArea" (change)="updateConfig()" />
        Content Area
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showNavigation" (change)="updateConfig()" />
        Navigation buttons
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.clickable" (change)="updateConfig()" />
        Clickable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showProgress" (change)="updateConfig()" />
        Progress
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="stepper-container" [class.vertical-stage]="pgConfig.mode === 'vertical'">
        <app-stepper-container
          [attr.mode]="pgConfig.mode"
          [attr.active-step]="pgConfig.activeStep"
          [attr.variant]="pgConfig.variant === 'default' ? null : pgConfig.variant"
          [attr.color-scheme]="pgConfig.colorScheme === 'primary' ? null : pgConfig.colorScheme"
          [attr.label-position]="pgConfig.mode === 'horizontal' ? pgConfig.labelPosition : null"
          [attr.description-position]="
            pgConfig.mode === 'vertical' ? pgConfig.descriptionPosition : null
          "
          [attr.theme]="pgConfig.theme === 'light' ? null : pgConfig.theme"
          [attr.show-content-area]="pgConfig.showContentArea ? 'true' : null"
          [attr.show-navigation]="pgConfig.showNavigation ? 'true' : null"
          [attr.animated]="pgConfig.animated"
          [attr.clickable]="pgConfig.clickable"
          [attr.show-progress]="pgConfig.showProgress"
          [attr.compact]="pgConfig.compact"
          [attr.steps]="stepsJson"
          (stepChange)="onStepChange($event)"
        >
          <div *ngIf="pgConfig.showContentArea">
            <div
              *ngFor="let step of stepsData; let i = index"
              [attr.slot]="'step-' + i"
              class="step-content"
            >
              <h3>{{ step.label }}</h3>
              <p>{{ step.description }}</p>
              <div class="dummy-form">
                <div class="form-row"></div>
                <div class="form-row half"></div>
                <div class="form-row half"></div>
              </div>
            </div>
          </div>
        </app-stepper-container>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
