<div class="demo-container">
  <h1>⚓ Dock Component</h1>
  <p class="intro-text">
    A navigation component that typically sits at the edge of the screen, providing quick access to
    frequently used applications or actions with a magnification effect.
  </p>

  <demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <app-dock-playground></app-dock-playground>
      <section class="demo-section">
        <ui-code-preview
          [htmlCode]="playgroundCode"
          [label]="'Dock Usage'"
          activeLang="html"
          expanded="true"
        ></ui-code-preview>
      </section>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <aside class="examples-sidebar">
        <div class="sidebar-title">Sections</div>
        <div class="sidebar-nav">
          <ui-anchor
            [links]="anchorLinks"
            scroll-container=".pane-examples"
            type="line"
            show-progress
          ></ui-anchor>
        </div>
      </aside>

      <!-- Main Content Area -->
      <div class="examples-content pane-examples" id="examples-scroll-area">
        <!-- Positions -->
        <app-example-section
          id="positions"
          title="Positions"
          description="Dock can be placed on any side of its container."
          [code]="positionsCode"
          style="margin-top: 0"
        >
          <div
            class="demo-card"
            style="
              min-height: 410px;
              display: flex;
              flex-direction: row;
              justify-content: space-around;
              align-items: center;
            "
          >
            <div
              style="
                border: 1px solid var(--border-color);
                padding: 20px;
                border-radius: 12px;
                position: relative;
                width: 300px;
                height: 300px;
                display: flex;
                align-items: flex-start;
                justify-content: center;
              "
            >
              <span style="font-size: 0.8rem; color: var(--text-secondary)">Top Positioned</span>
              <ui-dock [model]="dockItems" position="top"></ui-dock>
            </div>

            <div
              style="
                border: 1px solid var(--border-color);
                padding: 20px;
                border-radius: 12px;
                position: relative;
                width: 300px;
                height: 300px;
                display: flex;
                align-items: center;
                justify-content: flex-start;
              "
            >
              <span
                style="font-size: 0.8rem; color: var(--text-secondary); writing-mode: vertical-rl"
                >Left Positioned</span
              >
              <ui-dock [model]="dockItems" position="left"></ui-dock>
            </div>
          </div>
        </app-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
    <div slot="docs">
      <app-component-documentation componentId="dock"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
