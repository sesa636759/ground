<app-playground
  [items]='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  [defaultOpen]='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Layout</h3>
        <div class="control-group">
          <label>Position</label>
          <ui-dropdown
            name="position"
            [(ngModel)]="pgConfig.position"
            (ngModelChange)="updateConfig()"
            [options]="positionOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Breakpoint</label>
          <ui-input
            name="breakpoint"
            type="text"
            [(ngModel)]="pgConfig.breakpoint"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
      </div>

      <div class="control-section">
        <h3>Behavior</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="autoZIndex"
            name="autoZIndex"
            [(ngModel)]="pgConfig.autoZIndex"
            (ngModelChange)="updateConfig()"
            label="Auto Z-Index"
          ></ui-checkbox>
          <ui-checkbox
            id="magnify"
            name="magnify"
            [(ngModel)]="pgConfig.magnify"
            (ngModelChange)="updateConfig()"
            label="Magnify"
          ></ui-checkbox>
          <ui-checkbox
            id="blurEffect"
            name="blurEffect"
            [(ngModel)]="pgConfig.blurEffect"
            (ngModelChange)="updateConfig()"
            label="Blur Effect"
          ></ui-checkbox>
          <ui-checkbox
            id="showLabels"
            name="showLabels"
            [(ngModel)]="pgConfig.showLabels"
            (ngModelChange)="updateConfig()"
            label="Show Labels"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      height: 100%;
    "
  >
    <ui-dock
      #dock
      [attr.position]="pgConfig.position"
      [attr.breakpoint]="pgConfig.breakpoint"
      [attr.auto-z-index]="pgConfig.autoZIndex ? '' : null"
      [attr.magnify]="pgConfig.magnify ? true : false"
      [attr.blur-effect]="pgConfig.blurEffect ? true : false"
      [attr.show-labels]="pgConfig.showLabels ? true : false"
      icon-library="lucide"
      [items]="modelJson"
    ></ui-dock>

    <div
      *ngIf="lastAction"
      style="position: absolute; top: 20px; font-size: 0.85rem; color: var(--text-secondary)"
    >
      Last Action: <strong>{{ lastAction }}</strong>
    </div>
  </div>
</app-playground>
