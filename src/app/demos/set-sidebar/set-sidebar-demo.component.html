<app-demo-header
  icon="📋"
  title="Sidebar Component"
  description="A versatile navigation sidebar with support for various positions, visual variants, and collapsible states."
>
</app-demo-header>

<demo-tabs>
  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Positions -->
      <app-example-section
        id="positions"
        title="Position Variants"
        description="Different sidebar positions."
        [code]="playgroundCode"
        style="margin-top: 0"
      >
        <div class="demo-grid col-2">
          <div class="demo-card">
            <h3>Left Sidebar</h3>
            <div class="preview-box sidebar-demo">
              <app-sidebar position="left" [items]="menuItems"></app-sidebar>
              <div class="content-area">Main Content</div>
            </div>
          </div>

          <div class="demo-card">
            <h3>Right Sidebar</h3>
            <div class="preview-box sidebar-demo">
              <div class="content-area">Main Content</div>
              <app-sidebar position="right" [items]="menuItems"></app-sidebar>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Variants -->
      <app-example-section
        id="variants"
        title="Visual Variants"
        description="Different styles for sidebars."
        [code]="playgroundCode"
      >
        <div class="demo-grid col-3">
          <div class="demo-card">
            <h3>Default</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar variant="default" [items]="menuItems"></app-sidebar>
            </div>
          </div>

          <div class="demo-card">
            <h3>Floating</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar variant="floating" [items]="menuItems"></app-sidebar>
            </div>
          </div>

          <div class="demo-card">
            <h3>Minimal</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar variant="minimal" [items]="menuItems"></app-sidebar>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Collapsible -->
      <app-example-section
        id="collapsible"
        title="Collapsible States"
        description="Expandable and collapsible sidebars."
        [code]="playgroundCode"
      >
        <div class="demo-grid col-2">
          <div class="demo-card">
            <h3>Expanded</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar collapsible="true" collapsed="false" [items]="menuItems"></app-sidebar>
            </div>
          </div>

          <div class="demo-card">
            <h3>Collapsed</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar collapsible="true" collapsed="true" [items]="menuItems"></app-sidebar>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Premium Features -->
      <app-example-section
        id="premium"
        title="Premium Features"
        description="Advanced styling and functionality."
        [code]="playgroundCode"
      >
        <div class="demo-grid col-2">
          <div
            class="demo-card"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
          >
            <h3 style="color: white">Glassmorphism</h3>
            <div
              class="preview-box sidebar-demo-compact"
              style="background: rgba(255, 255, 255, 0.1); border: none"
            >
              <app-sidebar variant="glass" [items]="menuItems"></app-sidebar>
            </div>
          </div>

          <div class="demo-card">
            <h3>With Backdrop</h3>
            <div class="preview-box sidebar-demo-compact">
              <app-sidebar show-backdrop="true" [items]="menuItems"></app-sidebar>
            </div>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Playground Slot -->
  <div slot="playground">
    <app-sidebar-playground></app-sidebar-playground>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="sidebar"></app-component-documentation>
  </div>
</demo-tabs>
