<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Position</label>
        <select [(ngModel)]="pgConfig.position" (change)="updateConfig()">
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="floating">Floating</option>
          <option value="minimal">Minimal</option>
          <option value="glass">Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Width</label>
        <input type="text" [(ngModel)]="pgConfig.width" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.collapsible" (change)="updateConfig()" />
        Collapsible
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.collapsed" (change)="updateConfig()" />
        Collapsed
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showBackdrop" (change)="updateConfig()" /> Show
        Backdrop
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.overlay" (change)="updateConfig()" /> Overlay
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage sidebar-preview">
      <app-sidebar
        [attr.position]="pgConfig.position"
        [attr.variant]="pgConfig.variant"
        [attr.width]="pgConfig.width"
        [attr.collapsible]="pgConfig.collapsible"
        [attr.collapsed]="pgConfig.collapsed"
        [attr.show-backdrop]="pgConfig.showBackdrop"
        [attr.overlay]="pgConfig.overlay"
        [items]="menuItems"
        (sidebarToggle)="onSidebarToggle($event)"
      ></app-sidebar>
      <div class="content-placeholder">Main Content Area</div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
