<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Floating', value: 'floating' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Width</label>
        <ui-input type="text" [(ngModel)]="pgConfig.width" (ngModelChange)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.collapsible" (ngModelChange)="updateConfig()" />
        Collapsible
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.collapsed" (ngModelChange)="updateConfig()" />
        Collapsed
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showBackdrop" (ngModelChange)="updateConfig()" />
        Show Backdrop
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.overlay" (ngModelChange)="updateConfig()" /> Overlay
      </label>
    </div>
  </div>

  <div preview class="preview-stage sidebar-preview">
    <app-sidebar
      [attr.position]="pgConfig.position"
      [attr.variant]="pgConfig.variant"
      [attr.width]="pgConfig.width"
      [attr.collapsible]="pgConfig.collapsible"
      [attr.collapsed]="pgConfig.collapsed"
      [attr.show-backdrop]="pgConfig.showBackdrop"
      [attr.overlay]="pgConfig.overlay"
      [items]="menuItems"
      (sidebarToggle)="onSidebarToggle($event)"
    ></app-sidebar>
    <div class="content-placeholder">Main Content Area</div>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
