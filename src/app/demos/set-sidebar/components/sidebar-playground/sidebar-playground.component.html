<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Floating', value: 'floating' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Width</label>
        <app-input type="text" [(ngModel)]="pgConfig.width" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.collapsible" (change)="updateConfig()" />
        Collapsible
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.collapsed" (change)="updateConfig()" />
        Collapsed
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showBackdrop" (change)="updateConfig()" /> Show Backdrop
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.overlay" (change)="updateConfig()" /> Overlay
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage sidebar-preview">
      <app-sidebar
        [attr.position]="pgConfig.position"
        [attr.variant]="pgConfig.variant"
        [attr.width]="pgConfig.width"
        [attr.collapsible]="pgConfig.collapsible"
        [attr.collapsed]="pgConfig.collapsed"
        [attr.show-backdrop]="pgConfig.showBackdrop"
        [attr.overlay]="pgConfig.overlay"
        [items]="menuItems"
        (sidebarToggle)="onSidebarToggle($event)"
      ></app-sidebar>
      <div class="content-placeholder">Main Content Area</div>
    </div>

    <app-code-block
      [code]="generatedCode()"
      title="Generated Code"
      language="html"
    ></app-code-block>
  </div>
</div>
