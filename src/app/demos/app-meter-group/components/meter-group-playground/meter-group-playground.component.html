
    <div class="playground-layout">
      <div class="playground-controls">
        <ui-accordion
          items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
          defaultOpen='["config"]'
          multiple
        >
          <div slot="content-config">
            <div class="control-grid">
              <div class="control-section">
                <h3>Layout</h3>
                <div class="control-group">
                  <label>Orientation</label>
                  <ui-dropdown
                    [(ngModel)]="pgConfig.orientation"
                    (ngModelChange)="updateConfig()"
                    [options]="orientationOptions"
                  ></ui-dropdown>
                </div>
                <div class="control-group">
                  <label>Label Orientation</label>
                  <ui-dropdown
                    [(ngModel)]="pgConfig.labelOrientation"
                    (ngModelChange)="updateConfig()"
                    [options]="labelOrientationOptions"
                  ></ui-dropdown>
                </div>
                <div class="control-group">
                  <label>Label Position</label>
                  <ui-dropdown
                    [(ngModel)]="pgConfig.labelPosition"
                    (ngModelChange)="updateConfig()"
                    [options]="labelPositionOptions"
                  ></ui-dropdown>
                </div>
              </div>

              <div class="control-section">
                <h3>Visuals</h3>
                <div class="control-group">
                  <label>Min Height (H) / Width (V)</label>
                  <app-input
                    type="text"
                    [(ngModel)]="pgConfig.meterHeight"
                    (ngModelChange)="updateConfig()"
                  ></app-input>
                </div>
                <div class="checkbox-group">
                  <app-checkbox
                    id="showLabels"
                    [(ngModel)]="pgConfig.showLabels"
                    (ngModelChange)="updateConfig()"
                    label="Show Labels"
                  ></app-checkbox>
                </div>
                <div class="checkbox-group">
                  <app-checkbox
                    id="showMarkers"
                    [(ngModel)]="pgConfig.showMarkers"
                    (ngModelChange)="updateConfig()"
                    label="Show Markers"
                  ></app-checkbox>
                </div>
              </div>
            </div>

            <div class="action-buttons">
              <ui-button
                class="btn-secondary"
                variant="secondary"
                (click)="resetConfig()"
                label="Reset"
              ></ui-button>
            </div>
      </div>
      <div preview style="width: 100%; display: flex; justify-content: center; align-items: center;">
        <div
          class="meter-wrapper"
          [style.height]="pgConfig.orientation === 'vertical' ? '300px' : 'auto'"
        >
          <ui-meter-group
            [attr.orientation]="pgConfig.orientation"
            [attr.label-orientation]="pgConfig.labelOrientation"
            [attr.label-position]="pgConfig.labelPosition"
            [attr.meter-height]="pgConfig.meterHeight"
            [attr.show-labels]="pgConfig.showLabels ? '' : null"
            [attr.show-markers]="pgConfig.showMarkers ? '' : null"
            [values]="valuesJson"
          ></ui-meter-group>
        </div>

        <ui-code-preview
            *ngIf="showCode"
            [htmlCode]="generatedCode()"
            label="Generated Code"
            activeLang="html"
            expanded="true"
          ></ui-code-preview>
    </app-playground>
