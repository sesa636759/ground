<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="standardOrientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Label Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.labelOrientation"
        (ngModelChange)="updateConfig()"
        [options]="labelOrientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Label Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="labelPositionOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-visuals" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Min Height (H) / Width (V)</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.meterHeight"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showLabels"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Labels
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showMarkers"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Markers
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div
      class="meter-wrapper"
      [style.height]="pgConfig.orientation === 'vertical' ? '300px' : 'auto'"
      style="width: 100%; display: flex; justify-content: center"
    >
      <ui-meter-group
        #meterElement
        [attr.orientation]="pgConfig.orientation"
        [attr.label-orientation]="pgConfig.labelOrientation"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.meter-height]="pgConfig.meterHeight"
        [attr.show-labels]="pgConfig.showLabels ? '' : null"
        [attr.show-markers]="pgConfig.showMarkers ? '' : null"
        [values]="valuesJson"
      ></ui-meter-group>
    </div>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
