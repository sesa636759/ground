<app-playground [accordionItems]="pgAccordionItems" [defaultOpen]="defaultOpen">
  <!-- Accordion Slots -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Text', value: 'text' },
          { label: 'Password', value: 'password' },
          { label: 'Email', value: 'email' },
          { label: 'Number', value: 'number' },
          { label: 'Tel', value: 'tel' },
          { label: 'URL', value: 'url' },
          { label: 'Search', value: 'search' },
          { label: 'Date', value: 'date' }
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Outlined', value: 'outlined' },
          { label: 'Filled', value: 'filled' },
          { label: 'Underlined', value: 'underlined' },
          { label: 'Soft', value: 'soft' },
          { label: 'Ghost', value: 'ghost' }
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Small', value: 'small' },
          { label: 'Medium', value: 'medium' },
          { label: 'Large', value: 'large' }
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Validation State</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.validationState"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'None', value: 'none' },
          { label: 'Success', value: 'success' },
          { label: 'Warning', value: 'warning' },
          { label: 'Error', value: 'error' }
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Label</label>
      <app-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Placeholder</label>
      <app-input type="text" [(ngModel)]="pgConfig.placeholder" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Prefix Text</label>
      <app-input type="text" [(ngModel)]="pgConfig.prefixText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Suffix Text</label>
      <app-input type="text" [(ngModel)]="pgConfig.suffixText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Helper Text</label>
      <app-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Max Length</label>
      <app-input type="number" [(ngModel)]="pgConfig.maxLength" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.fullWidth" (ngModelChange)="updateConfig()" />
        Full Width
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" />
        Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" />
        Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" />
        Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showClear" (ngModelChange)="updateConfig()" />
        Clear Btn
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showPasswordToggle" (ngModelChange)="updateConfig()" />
        Pwd Toggle
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" />
        Loading
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.floatingLabel" (ngModelChange)="updateConfig()" />
        Floating Label
      </label>
    </div>
  </div>

  <!-- Preview Area -->
  <div preview>
    <app-input
      [attr.type]="pgConfig.type"
      [attr.label]="pgConfig.label"
      [attr.placeholder]="pgConfig.placeholder"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.validation-state]="pgConfig.validationState"
      [attr.full-width]="pgConfig.fullWidth ? '' : null"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.readonly]="pgConfig.readonly ? '' : null"
      [attr.required]="pgConfig.required ? '' : null"
      [attr.show-clear]="pgConfig.showClear ? '' : null"
      [attr.show-password-toggle]="pgConfig.showPasswordToggle ? '' : null"
      [attr.prefix-text]="pgConfig.prefixText"
      [attr.suffix-text]="pgConfig.suffixText"
      [attr.helper-text]="pgConfig.helperText"
      [attr.floating-label]="pgConfig.floatingLabel ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      (input)="onInputChange($event)"
      (focus)="onInputFocus()"
      (blur)="onInputBlur()"
      (clear)="onInputClear()"
    >
    </app-input>

    <div style="margin-top: 16px; font-size: 0.85rem; color: var(--text-secondary); font-family: var(--font-mono);">
      <strong>Event Out:</strong> {{ eventMessage() }}
    </div>
  </div>

  <!-- Code -->
    @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
