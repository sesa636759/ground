<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.type"
          (change)="updateConfig()"
          [options]="[
            { label: 'Text', value: 'text' },
            { label: 'Password', value: 'password' },
            { label: 'Email', value: 'email' },
            { label: 'Number', value: 'number' },
            { label: 'Tel', value: 'tel' },
            { label: 'URL', value: 'url' },
            { label: 'Search', value: 'search' },
            { label: 'Date', value: 'date' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Underlined', value: 'underlined' },
            { label: 'Soft', value: 'soft' },
            { label: 'Ghost', value: 'ghost' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Validation State</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.validationState"
          (change)="updateConfig()"
          [options]="[
            { label: 'None', value: 'none' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Error', value: 'error' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label</label>
        <input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Placeholder</label>
        <input type="text" [(ngModel)]="pgConfig.placeholder" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Prefix Text</label>
        <input type="text" [(ngModel)]="pgConfig.prefixText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Suffix Text</label>
        <input type="text" [(ngModel)]="pgConfig.suffixText" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.fullWidth" (change)="updateConfig()" /> Full Width
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showClear" (change)="updateConfig()" /> Clear Btn
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showPasswordToggle" (change)="updateConfig()" />
        Pwd Toggle
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showSteppers" (change)="updateConfig()" />
        Steppers
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.multiline" (change)="updateConfig()" />
        Multiline
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoResize" (change)="updateConfig()" />
        Auto-Resize
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage">
      <app-input
        [attr.type]="pgConfig.type"
        [attr.label]="pgConfig.label"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.validation-state]="pgConfig.validationState"
        [attr.full-width]="pgConfig.fullWidth ? '' : null"
        [disabled]="pgConfig.disabled"
        [readonly]="pgConfig.readonly"
        [required]="pgConfig.required"
        [attr.show-clear]="pgConfig.showClear ? '' : null"
        [attr.show-password-toggle]="pgConfig.showPasswordToggle ? '' : null"
        [attr.show-steppers]="pgConfig.showSteppers ? '' : null"
        [attr.auto-select]="pgConfig.autoSelect ? '' : null"
        [attr.auto-trim]="pgConfig.autoTrim ? '' : null"
        [attr.multiline]="pgConfig.multiline ? '' : null"
        [attr.auto-resize]="pgConfig.autoResize ? '' : null"
        [attr.max-rows]="pgConfig.maxRows"
        [skeleton]="pgConfig.skeleton"
        [attr.prefix-text]="pgConfig.prefixText"
        [attr.suffix-text]="pgConfig.suffixText"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-text]="pgConfig.validationState === 'error' ? pgConfig.errorText : null"
        [attr.success-text]="pgConfig.validationState === 'success' ? pgConfig.successText : null"
        [attr.warning-text]="pgConfig.validationState === 'warning' ? pgConfig.warningText : null"
        (input)="onInputChange($event)"
        (focus)="onInputFocus()"
        (blur)="onInputBlur()"
        (clear)="onInputClear()"
      >
      </app-input>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
