<app-playground
  items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Content -->
      <div class="control-section">
        <h3>Content</h3>
        <div class="control-group">
          <label>Heading</label>
          <ui-input
            name="heading"
            type="text"
            [(ngModel)]="pgConfig.heading"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Body Content (HTML)</label>
          <textarea
            name="content"
            [(ngModel)]="pgConfig.content"
            (ngModelChange)="updateConfig()"
          ></textarea>
        </div>
      </div>

      <!-- Behavior -->
      <div class="control-section">
        <h3>Behavior</h3>
        <div class="control-group">
          <label>Trigger</label>
          <ui-dropdown
            name="trigger"
            [(ngModel)]="pgConfig.trigger"
            (ngModelChange)="updateConfig()"
            [options]="triggerOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Placement</label>
          <ui-dropdown
            name="placement"
            [(ngModel)]="pgConfig.placement"
            (ngModelChange)="updateConfig()"
            [options]="placementOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Appearance -->
      <div class="control-section">
        <h3>Appearance</h3>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            name="variant"
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Width</label>
          <ui-input
            name="width"
            type="text"
            [(ngModel)]="pgConfig.width"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="showArrow"
            name="showArrow"
            [(ngModel)]="pgConfig.showArrow"
            (ngModelChange)="updateConfig()"
            label="Show Arrow"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="closeButton"
            name="closeButton"
            [(ngModel)]="pgConfig.showCloseButton"
            (ngModelChange)="updateConfig()"
            label="Close Button"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="backdrop"
            name="backdrop"
            [(ngModel)]="pgConfig.backdrop"
            (ngModelChange)="updateConfig()"
            label="Backdrop"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-popover
      #popover
      [attr.heading]="pgConfig.heading"
      [attr.content]="pgConfig.content"
      [attr.trigger]="pgConfig.trigger"
      [attr.placement]="pgConfig.placement"
      [attr.variant]="pgConfig.variant"
      [attr.width]="pgConfig.width"
      [attr.show-arrow]="pgConfig.showArrow ? '' : null"
      [attr.show-close-button]="pgConfig.showCloseButton ? '' : null"
      [attr.backdrop]="pgConfig.backdrop ? '' : null"
    >
      <ui-button slot="target" class="btn-primary" label="Target Element"></ui-button>
    </ui-popover>
  </div>
</app-playground>
