<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <select [(ngModel)]="pgConfig.layout" (change)="updateConfig()">
          <option value="tree">Standard Tree</option>
          <option value="org-chart">Org Chart</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="bordered">Bordered</option>
          <option value="rounded">Rounded</option>
          <option value="minimal">Minimal</option>
          <option value="glass">Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <select [(ngModel)]="pgConfig.theme" (change)="updateConfig()">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="control-group">
        <label>Indent (px)</label>
        <input type="number" [(ngModel)]="pgConfig.indent" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Connector Width</label>
        <input type="number" [(ngModel)]="pgConfig.connectorWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showLines" (change)="updateConfig()" /> Lines
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Icons
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.expandable" (change)="updateConfig()" />
        Expandable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.checkboxes" (change)="updateConfig()" />
        Checkboxes
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.searchable" (change)="updateConfig()" /> Search
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showGlow" (change)="updateConfig()" /> Glow
      </label>
    </div>

    <div class="action-buttons">
      <ui-button class="btn-action" variant="secondary" (click)="expandAll()" label="Expand All"></ui-button>
      <ui-button class="btn-action" variant="secondary" (click)="collapseAll()" label="Collapse All"></ui-button>
    </div>
  </div>

  <div class="playground-preview" [style.background]="pgConfig.theme === 'dark' ? '#0f172a' : ''">
    <div class="event-log-box">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-tree
        #treeElement
        [attr.layout]="pgConfig.layout"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.theme]="pgConfig.theme"
        [attr.orientation]="pgConfig.orientation"
        [indent]="pgConfig.indent"
        [attr.connector-width]="pgConfig.connectorWidth"
        [attr.connector-color]="pgConfig.connectorColor"
        [attr.connector-opacity]="pgConfig.connectorOpacity"
        [showLines]="pgConfig.showLines"
        [showIcons]="pgConfig.showIcons"
        [expandable]="pgConfig.expandable"
        [selectable]="pgConfig.selectable"
        [multiSelect]="pgConfig.multiSelect"
        [checkboxes]="pgConfig.checkboxes"
        [searchable]="pgConfig.searchable"
        [animated]="pgConfig.animated"
        [showGlow]="pgConfig.showGlow"
        [enableDrag]="pgConfig.enableDrag"
        [data]="demoData"
        (nodeToggle)="onNodeToggle($event)"
        (nodeSelect)="onNodeSelect($event)"
        (checkChange)="onCheckChange($event)"
      >
      </app-tree>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
