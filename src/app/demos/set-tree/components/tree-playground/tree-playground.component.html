<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.layout"
          (change)="updateConfig()"
          [options]="[
            { label: 'Standard Tree', value: 'tree' },
            { label: 'Org Chart', value: 'org-chart' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Bordered', value: 'bordered' },
            { label: 'Rounded', value: 'rounded' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (change)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Indent (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.indent" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Connector Width</label>
        <app-input type="number" [(ngModel)]="pgConfig.connectorWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showLines" (change)="updateConfig()" /> Lines
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Icons
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.expandable" (change)="updateConfig()" />
        Expandable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.checkboxes" (change)="updateConfig()" />
        Checkboxes
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.searchable" (change)="updateConfig()" /> Search
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showGlow" (change)="updateConfig()" /> Glow
      </label>
    </div>

    <div class="action-buttons">
      <ui-button
        class="btn-action"
        variant="secondary"
        (click)="expandAll()"
        label="Expand All"
      ></ui-button>
      <ui-button
        class="btn-action"
        variant="secondary"
        (click)="collapseAll()"
        label="Collapse All"
      ></ui-button>
    </div>
  </div>

  <div class="playground-preview" [style.background]="pgConfig.theme === 'dark' ? '#0f172a' : ''">
    <div class="event-log-box">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-tree
        #treeElement
        [attr.layout]="pgConfig.layout"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.theme]="pgConfig.theme"
        [attr.orientation]="pgConfig.orientation"
        [indent]="pgConfig.indent"
        [attr.connector-width]="pgConfig.connectorWidth"
        [attr.connector-color]="pgConfig.connectorColor"
        [attr.connector-opacity]="pgConfig.connectorOpacity"
        [showLines]="pgConfig.showLines"
        [showIcons]="pgConfig.showIcons"
        [expandable]="pgConfig.expandable"
        [selectable]="pgConfig.selectable"
        [multiSelect]="pgConfig.multiSelect"
        [checkboxes]="pgConfig.checkboxes"
        [searchable]="pgConfig.searchable"
        [animated]="pgConfig.animated"
        [showGlow]="pgConfig.showGlow"
        [enableDrag]="pgConfig.enableDrag"
        [data]="demoData"
        (nodeToggle)="onNodeToggle($event)"
        (nodeSelect)="onNodeSelect($event)"
        (checkChange)="onCheckChange($event)"
      >
      </app-tree>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
