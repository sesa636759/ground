<div class="demo-container">
  <app-demo-header
    icon="📋"
    title="Smart Menu"
    description="A context-aware menu component supporting nested sub-menus, icons, dividers, and disabled items."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-smart-menu-playground></app-smart-menu-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <aside class="examples-sidebar">
        <div class="sidebar-title">Sections</div>
        <div class="sidebar-nav">
          <ui-anchor
            [links]="anchorLinks"
            scroll-container=".pane-examples"
            type="line"
            show-progress
          ></ui-anchor>
        </div>
      </aside>

      <div class="examples-content">
        <!-- Nested Menus -->
        <app-example-section
          id="nested"
          title="Nested Menus"
          description="Multi-level menus for hierarchical navigation"
          [code]="nestedCode"
          language="javascript"
        >
          <ui-smart-menu [model]="nestedItems"></ui-smart-menu>
        </app-example-section>

        <!-- With Icons -->
        <app-example-section
          id="icons"
          title="With Icons"
          description="Add Font Awesome icons to menu items for visual context"
          [code]="iconsCode"
          language="javascript"
        >
          <ui-smart-menu [model]="iconItems"></ui-smart-menu>
        </app-example-section>

        <!-- Separators -->
        <app-example-section
          id="separators"
          title="Separators"
          description="Use separator items to group related actions"
          [code]="separatorsCode"
          language="javascript"
        >
          <ui-smart-menu [model]="separatorItems"></ui-smart-menu>
        </app-example-section>

        <!-- Disabled Items -->
        <app-example-section
          id="disabled"
          title="Disabled Items"
          description="Mark specific items as non-interactive"
          [code]="disabledCode"
          language="javascript"
        >
          <ui-smart-menu [model]="disabledItems"></ui-smart-menu>
        </app-example-section>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="smart-menu"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
