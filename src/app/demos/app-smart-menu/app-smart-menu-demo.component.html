<div class="demo-container">
  <pg-demo-header
    icon="📋"
    title="Smart Menu"
    description="A context-aware right-click menu with nested sub-menus, icons, dividers, and disabled items. Right-click any trigger area below to open the menu."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-smart-menu-playground></app-smart-menu-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Nested Menus -->
        <pg-example-section
          id="nested"
          title="Nested Menus"
          description="Multi-level context menus — right-click the area below to open. Hover over items with arrows to reveal sub-menus."
          [code]="nestedCode"
          language="html"
        >
          <div
            id="nested-target"
            class="right-click-zone"
            style="
              padding: 48px 24px;
              border: 2px dashed var(--color-border);
              border-radius: 10px;
              text-align: center;
              cursor: context-menu;
              user-select: none;
              color: var(--color-text-secondary);
            "
          >
            🖱️ <strong>Right-click here</strong> to open the nested File / Edit / View menu
          </div>
          <ui-smart-context-menu
            target="#nested-target"
            icon-library="lucide"
            [items]="nestedItems"
          ></ui-smart-context-menu>
        </pg-example-section>

        <!-- With Icons -->
        <pg-example-section
          id="icons"
          title="With Icons"
          description="Lucide icons next to each menu item for quick visual scanning"
          [code]="iconsCode"
          language="html"
        >
          <div
            id="icons-target"
            class="right-click-zone"
            style="
              padding: 48px 24px;
              border: 2px dashed var(--color-border);
              border-radius: 10px;
              text-align: center;
              cursor: context-menu;
              user-select: none;
              color: var(--color-text-secondary);
            "
          >
            🖱️ <strong>Right-click here</strong> to open the icon menu
          </div>
          <ui-smart-context-menu
            target="#icons-target"
            icon-library="lucide"
            [items]="iconItems"
          ></ui-smart-context-menu>
        </pg-example-section>

        <!-- Separators -->
        <pg-example-section
          id="separators"
          title="Separators"
          description="Use divider items to group related actions into visual sections"
          [code]="separatorsCode"
          language="html"
        >
          <div
            id="sep-target"
            class="right-click-zone"
            style="
              padding: 48px 24px;
              border: 2px dashed var(--color-border);
              border-radius: 10px;
              text-align: center;
              cursor: context-menu;
              user-select: none;
              color: var(--color-text-secondary);
            "
          >
            🖱️ <strong>Right-click here</strong> to open the Cut / Copy / Paste menu with dividers
          </div>
          <ui-smart-context-menu
            target="#sep-target"
            icon-library="lucide"
            [items]="separatorItems"
          ></ui-smart-context-menu>
        </pg-example-section>

        <!-- Disabled Items -->
        <pg-example-section
          id="disabled"
          title="Disabled Items"
          description="Mark specific items as non-interactive — they appear faded and cannot be clicked"
          [code]="disabledCode"
          language="html"
        >
          <div
            id="disabled-target"
            class="right-click-zone"
            style="
              padding: 48px 24px;
              border: 2px dashed var(--color-border);
              border-radius: 10px;
              text-align: center;
              cursor: context-menu;
              user-select: none;
              color: var(--color-text-secondary);
            "
          >
            🖱️ <strong>Right-click here</strong> — one action is disabled
          </div>
          <ui-smart-context-menu
            target="#disabled-target"
            icon-library="lucide"
            [items]="disabledItems"
          ></ui-smart-context-menu>
        </pg-example-section>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="smart-menu"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
