<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="orientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-options" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showNumbers"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Numbers
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showDescriptions"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Descriptions
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.progressDot"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Progress Dot
      </label>
    </div>
    <div class="control-group" style="margin-top: 16px">
      <label>Active Step (0-3)</label>
      <ui-input
        type="number"
        min="0"
        max="3"
        [(ngModel)]="pgConfig.activeStep"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 40px;
    "
  >
    <ui-stepper
      [attr.orientation]="pgConfig.orientation"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.active-step]="pgConfig.activeStep"
      [attr.show-numbers]="pgConfig.showNumbers ? '' : null"
      [attr.show-descriptions]="pgConfig.showDescriptions ? '' : null"
      [attr.progress-dot]="pgConfig.progressDot ? '' : null"
      [steps]="stepsJson"
      (stepperChange)="onStepChange($event)"
    ></ui-stepper>

    <div
      class="step-content-preview"
      style="
        margin-top: 32px;
        padding: 24px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        width: 100%;
        max-width: 500px;
        text-align: center;
        background: var(--surface-1);
      "
    >
      <h3 style="margin-top: 0; margin-bottom: 8px">{{ steps[pgConfig.activeStep]?.label }}</h3>
      <p style="margin: 0; color: var(--text-secondary)">
        {{ steps[pgConfig.activeStep]?.description }}
      </p>
    </div>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
