<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.orientation"
            (ngModelChange)="updateConfig()"
            [options]="orientationOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Options</h3>
        <div class="checkbox-group">
          <app-checkbox
            id="showNumbers"
            [(ngModel)]="pgConfig.showNumbers"
            (ngModelChange)="updateConfig()"
            label="Show Numbers"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="showDesc"
            [(ngModel)]="pgConfig.showDescriptions"
            (ngModelChange)="updateConfig()"
            label="Show Descriptions"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="dot"
            [(ngModel)]="pgConfig.progressDot"
            (ngModelChange)="updateConfig()"
            label="Progress Dot"
          ></app-checkbox>
        </div>
        <div class="control-group">
          <label>Active Step</label>
          <input
            type="number"
            min="0"
            max="3"
            [(ngModel)]="pgConfig.activeStep"
            (ngModelChange)="updateConfig()"
          />
        </div>
      </div>
    </div>

    <div class="code-output">
      <pre>{{ generatedCode() }}</pre>
    </div>

    <div class="action-buttons">
      <ui-button
        class="btn-secondary"
        variant="secondary"
        (click)="resetConfig()"
        label="Reset"
      ></ui-button>
    </div>
  </div>
  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    "
  >
    <ui-stepper
      [attr.orientation]="pgConfig.orientation"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.active-step]="pgConfig.activeStep"
      [attr.show-numbers]="pgConfig.showNumbers ? '' : null"
      [attr.show-descriptions]="pgConfig.showDescriptions ? '' : null"
      [attr.progress-dot]="pgConfig.progressDot ? '' : null"
      [steps]="stepsJson"
      (stepperChange)="onStepChange($event)"
    ></ui-stepper>

    <div class="step-content-preview">
      <h3>{{ steps[pgConfig.activeStep].label }}</h3>
      <p>{{ steps[pgConfig.activeStep].description }}</p>
    </div>
  </div>

  <ui-code-preview
    code
    *ngIf="showCode"
    [htmlCode]="generatedCode()"
    label="Generated Code"
    activeLang="html"
    expanded="true"
  ></ui-code-preview>
</app-playground>
