<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Direction</label>
        <select [(ngModel)]="pgConfig.direction" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <select [(ngModel)]="pgConfig.theme" (change)="updateConfig()">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="auto">Auto</option>
        </select>
      </div>

      <div class="control-group">
        <label>Gutter Size (px)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.gutterSize"
          min="4"
          max="20"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Snap Threshold (%)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.snapThreshold"
          min="0"
          max="50"
          (input)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.rounded" (change)="updateConfig()" /> Rounded
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.elevated" (change)="updateConfig()" /> Elevated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showGutterIcon" (change)="updateConfig()" />
        Show Icon
      </label>
      <label class="checkbox-item">
        <input
          type="checkbox"
          [(ngModel)]="pgConfig.doubleClickCollapse"
          (change)="updateConfig()"
        />
        DB Click Collapse
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-splitter
        [attr.direction]="pgConfig.direction"
        [attr.theme]="pgConfig.theme"
        [gutterSize]="pgConfig.gutterSize"
        [snapThreshold]="pgConfig.snapThreshold"
        [animated]="pgConfig.animated"
        [rounded]="pgConfig.rounded"
        [elevated]="pgConfig.elevated"
        [showGutterIcon]="pgConfig.showGutterIcon"
        [doubleClickCollapse]="pgConfig.doubleClickCollapse"
        (sizeChange)="onSizeChange($event)"
        (panelCollapse)="onPanelCollapse($event)"
        (splitterDragStart)="onDragStart($event)"
        (splitterDragEnd)="onDragEnd($event)"
        style="height: 100%; width: 100%"
      >
        <div slot="panel-0" class="panel-content highlight">
          <h3>Left Panel</h3>
          <p>Drag the gutter to resize.</p>
        </div>
        <div slot="panel-1" class="panel-content">
          <h3>Right Panel</h3>
          <p>Resizable content area.</p>
        </div>
      </app-splitter>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
