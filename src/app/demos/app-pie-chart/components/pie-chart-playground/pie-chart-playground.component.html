
    <app-playground
      accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
      defaultOpen='["config"]'
    >
      <div slot="content-config">
        <div class="control-grid">
          <div class="control-section">
            <h3>📐 Type</h3>
            <div class="control-group">
              <label>Chart Type</label>
              <ui-dropdown
                [(ngModel)]="pgConfig.chartType"
                (ngModelChange)="updateConfig()"
                [options]="typeOptions"
              ></ui-dropdown>
            </div>
            <div class="control-group">
              <label>Dataset</label>
              <ui-dropdown
                [(ngModel)]="pgConfig.dataset"
                (ngModelChange)="onDatasetChange()"
                [options]="datasetOptions"
              ></ui-dropdown>
            </div>
            <div class="control-group" *ngIf="pgConfig.chartType === 'doughnut'">
              <label>Cutout %</label>
              <input
                type="range"
                min="30"
                max="80"
                step="5"
                [(ngModel)]="pgConfig.cutout"
                (ngModelChange)="updateConfig()"
              />
              <span style="font-size:0.8rem;color:var(--text-secondary)"
                >{{ pgConfig.cutout }}%</span
              >
            </div>
          </div>

          <div class="control-section">
            <h3>🎨 Appearance</h3>
            <div class="control-group">
              <label>Legend Position</label>
              <ui-dropdown
                [(ngModel)]="pgConfig.legendPosition"
                (ngModelChange)="updateConfig()"
                [options]="legendPositionOptions"
              ></ui-dropdown>
            </div>
            <div class="control-group">
              <label>Border Width</label>
              <input
                type="range"
                min="0"
                max="6"
                step="1"
                [(ngModel)]="pgConfig.borderWidth"
                (ngModelChange)="updateConfig()"
              />
              <span style="font-size:0.8rem;color:var(--text-secondary)"
                >{{ pgConfig.borderWidth }}px</span
              >
            </div>
          </div>

          <div class="control-section">
            <h3>✨ Features</h3>
            <div class="checkbox-group">
              <app-checkbox
                id="showLegend"
                [(ngModel)]="pgConfig.showLegend"
                (ngModelChange)="updateConfig()"
                label="Show Legend"
              ></app-checkbox>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="responsive"
                [(ngModel)]="pgConfig.responsive"
                (ngModelChange)="updateConfig()"
                label="Responsive"
              ></app-checkbox>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="enableAnimation"
                [(ngModel)]="pgConfig.enableAnimation"
                (ngModelChange)="updateConfig()"
                label="Animate on Load"
              ></app-checkbox>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="showTooltip"
                [(ngModel)]="pgConfig.showTooltip"
                (ngModelChange)="updateConfig()"
                label="Show Tooltip"
              ></app-checkbox>
            </div>
          </div>
        </div>
        <div class="action-buttons">
          <ui-button (click)="copyCode()" label="Copy Code"></ui-button>
          <ui-button variant="secondary" (click)="resetConfig()" label="Reset"></ui-button>
        </div>
      </div>
      <div
        preview
        class="chart-preview-wrapper"
        style="width: 100%; display: flex; justify-content: center;"
      >
        <div class="pie-preview-wrapper">
          <app-chart
            [chartType]="pgConfig.chartType"
            [showLegend]="pgConfig.showLegend"
            [legendPosition]="pgConfig.legendPosition"
            [responsive]="pgConfig.responsive"
            [data]="activeChartData"
            [options]="activeOptions"
            style="width: 100%; max-width: 480px; height: 360px; margin: 0 auto; display: block;"
          ></app-chart>
        </div>
      </div>

      <ui-code-preview
        code
        *ngIf="showCode"
        [htmlCode]="generatedCode()"
        label="Generated Code"
        activeLang="html"
        expanded="true"
      ></ui-code-preview>
    </app-playground>
