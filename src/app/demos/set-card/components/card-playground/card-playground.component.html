<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Title</label>
        <app-input type="text" [(ngModel)]="pgConfig.title" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Extra (Header)</label>
        <app-input type="text" [(ngModel)]="pgConfig.extra" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Layout</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.layout"
          (change)="updateConfig()"
          [options]="[
            { label: 'Vertical', value: 'vertical' },
            { label: 'Horizontal', value: 'horizontal' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Small', value: 'small' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Primary', value: 'primary' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Danger', value: 'danger' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.type"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Inner', value: 'inner' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Ribbon Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.ribbon" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Ribbon Pos</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.ribbonPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Top Right', value: 'top-right' },
            { label: 'Top Left', value: 'top-left' },
          ]"
        ></ui-dropdown>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.hoverable" (change)="updateConfig()" />
        Hoverable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.bordered" (change)="updateConfig()" /> Bordered
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.loading" (change)="updateConfig()" /> Loading
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.flippable" (change)="updateConfig()" />
        Flippable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.closable" (change)="updateConfig()" /> Closable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.glass" (change)="updateConfig()" /> Glass
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.collapsible" (change)="updateConfig()" />
        Collapsible
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
    </div>
  </div>

  <div class="playground-preview" [class.glass-bg]="pgConfig.glass">
    <div class="preview-stage">
      <app-card
        [attr.card-title]="pgConfig.title"
        [attr.extra]="pgConfig.extra"
        [attr.cover]="pgConfig.cover"
        [attr.actions]="pgConfig.actions"
        [hoverable]="pgConfig.hoverable"
        [attr.size]="pgConfig.size"
        [attr.bordered]="pgConfig.bordered ? 'true' : 'false'"
        [attr.type]="pgConfig.type"
        [loading]="pgConfig.loading"
        [flippable]="pgConfig.flippable"
        [attr.flip-trigger]="pgConfig.flipTrigger"
        [closable]="pgConfig.closable"
        [attr.menu-actions]="pgConfig.menuActions"
        [attr.layout]="pgConfig.layout"
        [glass]="pgConfig.glass"
        [attr.variant]="pgConfig.variant"
        [attr.ribbon]="pgConfig.ribbon"
        [attr.ribbon-position]="pgConfig.ribbonPosition"
        [attr.ribbon-color]="pgConfig.ribbonColor"
        [collapsible]="pgConfig.collapsible"
        [collapsed]="pgConfig.collapsed"
        [selectable]="pgConfig.selectable"
        [selected]="pgConfig.selected"
        [attr.avatar]="pgConfig.avatar"
        [attr.avatar-icon]="pgConfig.avatarIcon"
        (cardAction)="onCardAction($event)"
        (cardClose)="onCardClose()"
        (cardCollapse)="onCardCollapse($event)"
        (cardSelect)="onCardSelect($event)"
        style="width: 100%; max-width: 400px"
      >
        <p>This is dynamic content from the playground. You can change properties on the left.</p>
        <div slot="back">
          <div style="padding: 24px; text-align: center">
            <h3>Flipped Content</h3>
            <p>This is what you see on the back!</p>
          </div>
        </div>
      </app-card>
    </div>

    <ui-code-preview
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
  </div>
</div>
