<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="pgConfig.title" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Extra (Header)</label>
        <input type="text" [(ngModel)]="pgConfig.extra" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Layout</label>
        <select [(ngModel)]="pgConfig.layout" (change)="updateConfig()">
          <option value="vertical">Vertical</option>
          <option value="horizontal">Horizontal</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="small">Small</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="primary">Primary</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="danger">Danger</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group">
        <label>Type</label>
        <select [(ngModel)]="pgConfig.type" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="inner">Inner</option>
        </select>
      </div>

      <div class="control-group">
        <label>Ribbon Text</label>
        <input type="text" [(ngModel)]="pgConfig.ribbon" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Ribbon Pos</label>
        <select [(ngModel)]="pgConfig.ribbonPosition" (change)="updateConfig()">
          <option value="top-right">Top Right</option>
          <option value="top-left">Top Left</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.hoverable" (change)="updateConfig()" />
        Hoverable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.bordered" (change)="updateConfig()" /> Bordered
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.loading" (change)="updateConfig()" /> Loading
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.flippable" (change)="updateConfig()" />
        Flippable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.closable" (change)="updateConfig()" /> Closable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.glass" (change)="updateConfig()" /> Glass
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.collapsible" (change)="updateConfig()" />
        Collapsible
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
    </div>
  </div>

  <div class="playground-preview" [class.glass-bg]="pgConfig.glass">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage">
      <app-card
        [attr.card-title]="pgConfig.title"
        [attr.extra]="pgConfig.extra"
        [attr.cover]="pgConfig.cover"
        [attr.actions]="pgConfig.actions"
        [hoverable]="pgConfig.hoverable"
        [attr.size]="pgConfig.size"
        [attr.bordered]="pgConfig.bordered ? 'true' : 'false'"
        [attr.type]="pgConfig.type"
        [loading]="pgConfig.loading"
        [flippable]="pgConfig.flippable"
        [attr.flip-trigger]="pgConfig.flipTrigger"
        [closable]="pgConfig.closable"
        [attr.menu-actions]="pgConfig.menuActions"
        [attr.layout]="pgConfig.layout"
        [glass]="pgConfig.glass"
        [attr.variant]="pgConfig.variant"
        [attr.ribbon]="pgConfig.ribbon"
        [attr.ribbon-position]="pgConfig.ribbonPosition"
        [attr.ribbon-color]="pgConfig.ribbonColor"
        [collapsible]="pgConfig.collapsible"
        [collapsed]="pgConfig.collapsed"
        [selectable]="pgConfig.selectable"
        [selected]="pgConfig.selected"
        [attr.avatar]="pgConfig.avatar"
        [attr.avatar-icon]="pgConfig.avatarIcon"
        (cardAction)="onCardAction($event)"
        (cardClose)="onCardClose()"
        (cardCollapse)="onCardCollapse($event)"
        (cardSelect)="onCardSelect($event)"
        style="width: 100%; max-width: 400px"
      >
        <p>This is dynamic content from the playground. You can change properties on the left.</p>
        <div slot="back">
          <div style="padding: 24px; text-align: center">
            <h3>Flipped Content</h3>
            <p>This is what you see on the back!</p>
          </div>
        </div>
      </app-card>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
