<div class="demo-container">
  <app-demo-header
    icon="🃏"
    title="Card Component"
    description="Cards contain content and actions about a single subject. They are versatile containers that can handle images, headers, content, and footers."
  >
  </app-demo-header>

  <demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples">
      <app-set-card-examples></app-set-card-examples>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <section class="demo-section">
        <div class="section-header">
          <app-demo-header
            icon="🎮"
            title="Interactive Playground"
            description="Configure and test card properties in real-time"
          >
          </app-demo-header>
        </div>
        <app-card-playground></app-card-playground>
        <ui-code-preview
          [htmlCode]="playgroundCode"
          label="Card Usage"
          activeLang="html"
          expanded="true"
        ></ui-code-preview>
      </section>
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <app-component-documentation componentId="card"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
