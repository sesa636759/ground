<div class="demo-container">
  <pg-demo-header
    icon="📋"
    title="Picklist"
    description="Move items between two lists with ease. Features multi-selection, drag-and-drop support, reordering within lists, and dedicated filtering for both source and target."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-picklist-playground></app-picklist-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- UI Controls -->
          <section class="demo-section" id="features" style="margin-top: 0">
            <div class="section-header">
              <h2>⚙️ UI Controls</h2>
              <p>Configure visibility of reordering buttons and filtering capabilities.</p>
            </div>
            <div class="demo-card">
              <ui-picklist
                [source]="sourceItems"
                [target]="targetItems"
                [show-source-controls]="false"
                [show-target-controls]="false"
                source-header="Minimal Source"
                target-header="Minimal Target"
              >
                <ng-template let-item>{{ item.name }}</ng-template>
              </ui-picklist>
            </div>
            <ui-code-preview
              [htmlCode]="featuresCode"
              [label]="'Configuration Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="picklist"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
