<div class="demo-container">
  <h1>💧 Dropdown Component</h1>
  <p class="intro-text">
    A robust and interactive selection component. Supports single/multi-selection, search filtering,
    hierarchical cascading data, and screen-reader optimizations.
  </p>

  <demo-tabs >
    <div slot="playground">
      <app-dropdown-playground></app-dropdown-playground>
    </div>

    <div slot="examples">
      <!-- Basic -->
      <app-example-section
        id="basic"
        title="Basic Dropdown"
        description="Standard single-selection dropdown"
        [code]="basicCode"
      >
        <div class="preview-box">
          <ui-dropdown [options]="basicOptions" placeholder="Select an option"></ui-dropdown>
        </div>
      </app-example-section>

      <!-- Multi Selection -->
      <app-example-section
        id="multi-select"
        title="Multi-Select Mode"
        description="Allow users to select multiple options with an intuitive interface"
        [code]="multiSelectCode"
      >
        <div class="preview-box">
          <ui-dropdown
            multi-select
            [options]="basicOptions"
            placeholder="Select multiple items"
          ></ui-dropdown>
        </div>
      </app-example-section>

      <!-- Cascading -->
      <app-example-section
        id="cascading"
        title="Hierarchical / Cascading"
        description="Organize complex data structures into expandable parent-child groups"
        [code]="cascadingCode"
      >
        <div class="preview-box">
          <ui-dropdown
            cascading
            [options]="cascadingOptions"
            placeholder="Explore categories"
          ></ui-dropdown>
        </div>
      </app-example-section>

      <!-- Sizes -->
      <app-example-section
        id="sizes"
        title="Size Scaling"
        description="Adapt the dropdown footprint to your UI density requirements"
        [code]="sizesCode"
      >
        <div class="demo-grid col-3">
          <div class="preview-box">
            <ui-dropdown size="sm" [options]="basicOptions" placeholder="Small"></ui-dropdown>
          </div>
          <div class="preview-box">
            <ui-dropdown size="md" [options]="basicOptions" placeholder="Medium"></ui-dropdown>
          </div>
          <div class="preview-box">
            <ui-dropdown size="lg" [options]="basicOptions" placeholder="Large"></ui-dropdown>
          </div>
        </div>
      </app-example-section>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="dropdown"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
