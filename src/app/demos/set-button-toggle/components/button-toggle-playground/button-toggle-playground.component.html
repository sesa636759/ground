<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Mode</label>
        <select [(ngModel)]="pgConfig.mode" (change)="updateConfig()">
          <option value="segmented">Segmented</option>
          <option value="dropdown">Dropdown</option>
        </select>
      </div>
      <div class="control-group">
        <label>Orientation</label>
        <select [(ngModel)]="pgConfig.orientation" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>
      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>
      <div class="control-group">
        <label>Color</label>
        <select [(ngModel)]="pgConfig.color" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="success">Success</option>
          <option value="danger">Danger</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>
      </div>
      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="filled">Filled</option>
          <option value="outlined">Outlined</option>
          <option value="text">Text</option>
          <option value="soft">Soft</option>
          <option value="classic">Classic</option>
          <option value="solid">Solid</option>
          <option value="surface">Surface</option>
        </select>
      </div>
      <div class="control-group">
        <label>Icon Position</label>
        <select [(ngModel)]="pgConfig.iconPosition" (change)="updateConfig()">
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="top">Top</option>
        </select>
      </div>
      <div class="control-group">
        <label>Display Mode</label>
        <select [(ngModel)]="pgConfig.displayMode" (change)="updateConfig()">
          <option value="icon-label">Icon + Label</option>
          <option value="label-only">Label Only</option>
          <option value="icon-only">Icon Only</option>
          <option value="both-sides">Both Sides</option>
        </select>
      </div>
      <div class="control-group">
        <label>Group Label</label>
        <input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>
      <div class="control-group" style="grid-column: span 2">
        <label>Helper Text</label>
        <input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.fullWidth" (change)="updateConfig()" /> Full
        Width</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.keepButtonLabel" (change)="updateConfig()" />
        Keep Label</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.customContent" (change)="updateConfig()" />
        Custom Content</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" />
        Disabled</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" />
        Readonly</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.loading" (change)="updateConfig()" />
        Loading</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.required" (change)="updateConfig()" />
        Required</label
      >
      <label class="checkbox-item"
        ><input type="checkbox" [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" />
        Invalid</label
      >
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log">
      <strong>Event Log:</strong>
      <span [style.color]="eventColor()">{{ eventMessage() }}</span>
    </div>
    <div class="preview-stage">
      <app-button-toggle-group
        #pgGroup
        [attr.mode]="pgConfig.mode"
        [attr.orientation]="pgConfig.orientation"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.icon-position]="pgConfig.iconPosition"
        [attr.display-mode]="pgConfig.displayMode"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.full-width]="pgConfig.fullWidth"
        [attr.keep-button-label]="pgConfig.keepButtonLabel"
        [attr.custom-content]="pgConfig.customContent"
        [disabled]="pgConfig.disabled"
        [readonly]="pgConfig.readonly"
        [loading]="pgConfig.loading"
        [required]="pgConfig.required"
        [invalid]="pgConfig.invalid"
        [attr.error-message]="pgConfig.invalid ? 'Please select a view mode' : ''"
        [attr.options]="jsonOptions(playgroundOptions)"
        (buttonToggleGroupChange)="onPlaygroundChange($event)"
        (buttonToggleGroupAction)="onPlaygroundAction($event)"
      >
        <div *ngIf="pgConfig.customContent" slot="dropdown-content" class="custom-slot-content">
          <p>Custom Playground Content</p>
          <input type="text" placeholder="Enter something..." />
          <div class="slot-actions">
            <ui-button class="btn-confirm" label="Confirm"></ui-button>
            <ui-button class="btn-cancel" label="Cancel"></ui-button>
          </div>
        </div>
      </app-button-toggle-group>
    </div>
    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
