<div class="playground-layout">
  <div class="playground-controls">
    <ui-accordion [items]="[{id: 'config', title: 'Configuration', icon: '⚙️'}]" [defaultOpen]="['config']" [multiple]="true">
      <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Mode</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.mode"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Segmented', value: 'segmented' },
            { label: 'Dropdown', value: 'dropdown' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Filled', value: 'filled' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Text', value: 'text' },
            { label: 'Soft', value: 'soft' },
            { label: 'Classic', value: 'classic' },
            { label: 'Solid', value: 'solid' },
            { label: 'Surface', value: 'surface' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Icon Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.iconPosition"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
            { label: 'Top', value: 'top' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Display Mode</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.displayMode"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Icon + Label', value: 'icon-label' },
            { label: 'Label Only', value: 'label-only' },
            { label: 'Icon Only', value: 'icon-only' },
            { label: 'Both Sides', value: 'both-sides' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Group Label</label>
        <app-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
      </div>
      <div class="control-group" style="grid-column: span 2">
        <label>Helper Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.fullWidth" (ngModelChange)="updateConfig()" /> Full
        Width</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.keepButtonLabel" (ngModelChange)="updateConfig()" /> Keep
        Label</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.customContent" (ngModelChange)="updateConfig()" /> Custom
        Content</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Readonly</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" /> Required</label
      >
      <label class="checkbox-item"
        ><app-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()" /> Invalid</label
      >
    </div>
        </div>
    </ui-accordion>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <app-button-toggle-group
        #pgGroup
        [attr.mode]="pgConfig.mode"
        [attr.orientation]="pgConfig.orientation"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.icon-position]="pgConfig.iconPosition"
        [attr.display-mode]="pgConfig.displayMode"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.full-width]="pgConfig.fullWidth"
        [attr.keep-button-label]="pgConfig.keepButtonLabel"
        [attr.custom-content]="pgConfig.customContent"
        [disabled]="pgConfig.disabled"
        [readonly]="pgConfig.readonly"
        [loading]="pgConfig.loading"
        [required]="pgConfig.required"
        [invalid]="pgConfig.invalid"
        [attr.error-message]="pgConfig.invalid ? 'Please select a view mode' : ''"
        [attr.options]="jsonOptions(playgroundOptions)"
        (buttonToggleGroupChange)="onPlaygroundChange($event)"
        (buttonToggleGroupAction)="onPlaygroundAction($event)"
      >
        <div *ngIf="pgConfig.customContent" slot="dropdown-content" class="custom-slot-content">
          <p>Custom Playground Content</p>
          <app-input type="text" placeholder="Enter something..." />
          <div class="slot-actions">
            <ui-button class="btn-confirm" label="Confirm"></ui-button>
            <ui-button class="btn-cancel" label="Cancel"></ui-button>
          </div>
        </div>
      </app-button-toggle-group>
    </div>
    
    <div class="event-log">
      <strong>Event Log:</strong>
      <span [style.color]="eventColor()">{{ eventMessage() }}</span>
    </div>
  
      <ui-code-preview
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
    </div>
</div>
