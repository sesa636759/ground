<app-playground
  accordionItems='[{"id": "config", "title": "Configuration", "icon": "⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Basic Settings -->
      <div class="control-section">
        <h3>Basic Settings</h3>
        <div class="control-group">
          <label>Total Items</label>
          <ui-input
            name="totalItems"
            type="number"
            [(ngModel)]="pgConfig.totalItems"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>
        <div class="control-group">
          <label>Items Per Page</label>
          <ui-input
            name="itemsPerPage"
            type="number"
            [(ngModel)]="pgConfig.itemsPerPage"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>
        <div class="control-group">
          <label>Max Visible Pages</label>
          <ui-input
            name="maxVisiblePages"
            type="number"
            [(ngModel)]="pgConfig.maxVisiblePages"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>
      </div>

      <!-- Appearance -->
      <div class="control-section">
        <h3>Appearance</h3>
        <div class="control-group">
          <label>Type</label>
          <ui-dropdown
            name="type"
            [(ngModel)]="pgConfig.type"
            (ngModelChange)="updateConfig()"
            [options]="typeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            name="size"
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            name="variant"
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Theme</label>
          <ui-dropdown
            name="theme"
            [(ngModel)]="pgConfig.theme"
            (ngModelChange)="updateConfig()"
            [options]="themeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Shape</label>
          <ui-dropdown
            name="shape"
            [(ngModel)]="pgConfig.shape"
            (ngModelChange)="updateConfig()"
            [options]="shapeOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Features -->
      <div class="control-section">
        <h3>Features</h3>
        <div class="checkbox-group">
          <app-checkbox
            name="keyboardNav"
            [(ngModel)]="pgConfig.keyboardNav"
            (ngModelChange)="updateConfig()"
            label="Keyboard Nav"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="responsiveMode"
            [(ngModel)]="pgConfig.responsiveMode"
            (ngModelChange)="updateConfig()"
            label="Responsive"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="rtl"
            [(ngModel)]="pgConfig.rtl"
            (ngModelChange)="updateConfig()"
            label="RTL Mode"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="showFirstLast"
            [(ngModel)]="pgConfig.showFirstLast"
            (ngModelChange)="updateConfig()"
            label="Show First/Last"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="showPageSize"
            [(ngModel)]="pgConfig.showPageSize"
            (ngModelChange)="updateConfig()"
            label="Show Page Size"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="showTotal"
            [(ngModel)]="pgConfig.showTotal"
            (ngModelChange)="updateConfig()"
            label="Show Total"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="showJumpTo"
            [(ngModel)]="pgConfig.showJumpTo"
            (ngModelChange)="updateConfig()"
            label="Show Jump To"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            name="iconOnly"
            [(ngModel)]="pgConfig.iconOnly"
            (ngModelChange)="updateConfig()"
            label="Icon Only"
          ></app-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div class="preview-stage">
      <ui-pagination
        #pagination
        [attr.total-items]="pgConfig.totalItems"
        [attr.items-per-page]="pgConfig.itemsPerPage"
        [attr.max-visible-pages]="pgConfig.maxVisiblePages"
        [attr.type]="pgConfig.type"
        [attr.size]="pgConfig.size"
        [attr.variant]="pgConfig.variant"
        [attr.theme]="pgConfig.theme"
        [attr.shape]="pgConfig.shape"
        [attr.keyboard-nav]="pgConfig.keyboardNav ? 'true' : 'false'"
        [attr.responsive-mode]="pgConfig.responsiveMode ? 'true' : 'false'"
        [attr.rtl]="pgConfig.rtl ? 'true' : null"
        [attr.show-first-last]="pgConfig.showFirstLast ? 'true' : 'false'"
        [attr.show-page-size]="pgConfig.showPageSize ? 'true' : null"
        [attr.show-total]="pgConfig.showTotal ? 'true' : null"
        [attr.show-jump-to]="pgConfig.showJumpTo ? 'true' : null"
        [attr.icon-only]="pgConfig.iconOnly ? 'true' : null"
        [attr.current-page]="pgConfig.currentPage"
        (pageChange)="onPageChange($event)"
      ></ui-pagination>
    </div>
  </div>

  <div events class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
</app-playground>
