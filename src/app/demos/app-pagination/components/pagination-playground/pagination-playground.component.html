<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-settings" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Total Items</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.totalItems"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Items Per Page</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.itemsPerPage"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max Visible Pages</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxVisiblePages"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-features" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.keyboardNav"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Keyboard Nav
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.responsiveMode"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Responsive
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.rtl" (ngModelChange)="updateConfig()"></ui-checkbox>
        RTL Mode
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showFirstLast"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show First/Last
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showPageSize"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Page Size
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showTotal"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Total
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showJumpTo"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Jump To
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.iconOnly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Icon Only
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-pagination
      #pagination
      [attr.total-items]="pgConfig.totalItems"
      [attr.items-per-page]="pgConfig.itemsPerPage"
      [attr.max-visible-pages]="pgConfig.maxVisiblePages"
      [attr.type]="pgConfig.type"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.theme]="pgConfig.theme"
      [attr.shape]="pgConfig.shape"
      [attr.keyboard-nav]="pgConfig.keyboardNav ? 'true' : 'false'"
      [attr.responsive-mode]="pgConfig.responsiveMode ? 'true' : 'false'"
      [attr.rtl]="pgConfig.rtl ? 'true' : null"
      [attr.show-first-last]="pgConfig.showFirstLast ? 'true' : 'false'"
      [attr.show-page-size]="pgConfig.showPageSize ? 'true' : null"
      [attr.show-total]="pgConfig.showTotal ? 'true' : null"
      [attr.show-jump-to]="pgConfig.showJumpTo ? 'true' : null"
      [attr.icon-only]="pgConfig.iconOnly ? 'true' : null"
      [attr.current-page]="pgConfig.currentPage"
      (pageChange)="onPageChange($event)"
    ></ui-pagination>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
