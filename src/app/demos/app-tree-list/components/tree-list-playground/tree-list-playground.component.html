<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-features" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.selectable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Selectable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Icons
      </label>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.expandAll"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Expand All
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    "
  >
    <div
      style="
        width: 100%;
        max-width: 400px;
        background: var(--surface-1);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 16px;
      "
    >
      <ui-tree-list
        #treeElement
        [attr.selectable]="pgConfig.selectable ? '' : null"
        [model]="modelJson"
      >
      </ui-tree-list>
    </div>
  </div>
</app-playground>
