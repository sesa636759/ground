<div class="demo-container">
  <app-demo-header
    icon="🌳"
    title="Tree List"
    description="A hierarchical tree view component for displaying nested data structures. Perfect for file systems, organizational charts, category navigation, and any hierarchical data representation."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-tree-list-playground></app-tree-list-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Examples -->
          <section class="demo-section" id="examples" style="margin-top: 0">
            <div class="section-header">
              <h2>📂 Examples</h2>
              <p>Common use cases for hierarchical data display.</p>
            </div>
            <div class="demo-card">
              <div style="max-width: 500px">
                <ui-tree-list [model]="treeData" selectable></ui-tree-list>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="examplesCode"
              label="File System Example"
              activeLang="ts"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

        <div slot="docs">
      <app-component-documentation componentId="tree-list"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
