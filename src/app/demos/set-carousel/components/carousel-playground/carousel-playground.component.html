<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Slides To Show</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.slidesToShow"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: '1', value: 1 },
            { label: '2', value: 2 },
            { label: '3', value: 3 },
            { label: '4', value: 4 },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Slides To Scroll</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.slidesToScroll"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: '1', value: 1 },
            { label: '2', value: 2 },
            { label: '3', value: 3 },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.vertical"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: false },
            { label: 'Vertical', value: true },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Effect</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.effect"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Slide', value: 'slide' },
            { label: 'Fade', value: 'fade' },
            { label: 'Cube', value: 'cube' },
            { label: 'Flip', value: 'flip' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.animationDuration"
          (ngModelChange)="updateConfig()"
          step="100"
        />
      </div>

      <div class="control-group">
        <label>Autoplay Interval (ms)</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.autoplayInterval"
          (ngModelChange)="updateConfig()"
          step="500"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoplay" (ngModelChange)="updateConfig()" /> Autoplay
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.arrows" (ngModelChange)="updateConfig()" /> Arrows
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.indicators" (ngModelChange)="updateConfig()" />
        Indicators
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.infinite" (ngModelChange)="updateConfig()" /> Infinite
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.swipe" (ngModelChange)="updateConfig()" /> Swipe
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.keyboard" (ngModelChange)="updateConfig()" /> Keyboard
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.pauseOnHover" (ngModelChange)="updateConfig()" />
        Pause On Hover
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.centerMode" (ngModelChange)="updateConfig()" /> Center
        Mode
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showProgress" (ngModelChange)="updateConfig()" />
        Progress Bar
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.draggable" (ngModelChange)="updateConfig()" />
        Draggable
      </label>
    </div>
  </div>
  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <div class="preview-stage">
      <div class="carousel-container" [class.vertical-mode]="pgConfig.vertical">
        <app-carousel
          [attr.slides-to-show]="pgConfig.slidesToShow"
          [attr.slides-to-scroll]="pgConfig.slidesToScroll"
          [attr.vertical]="pgConfig.vertical"
          [attr.animation-duration]="pgConfig.animationDuration"
          [attr.animation-easing]="pgConfig.animationEasing"
          [attr.autoplay-interval]="pgConfig.autoplayInterval"
          [attr.autoplay]="pgConfig.autoplay"
          [attr.arrows]="pgConfig.arrows"
          [attr.indicators]="pgConfig.indicators"
          [attr.infinite]="pgConfig.infinite"
          [attr.swipe]="pgConfig.swipe"
          [attr.keyboard]="pgConfig.keyboard"
          [attr.pause-on-hover]="pgConfig.pauseOnHover"
          [attr.effect]="pgConfig.effect"
          [attr.center-mode]="pgConfig.centerMode"
          [attr.center-padding]="pgConfig.centerMode ? '50px' : null"
          [attr.show-progress]="pgConfig.showProgress"
          [attr.draggable]="pgConfig.draggable"
        >
          <div *ngFor="let slide of dummySlides" class="slide" [style.background]="slide.color">
            <div class="slide-content">
              <h3>{{ slide.title }}</h3>
              <p>{{ slide.desc }}</p>
            </div>
          </div>
        </app-carousel>
      </div>
    </div>

    <ui-code-preview
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  </div>
</app-playground>
