<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Layout Section -->
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Slides To Show</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.slidesToShow"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: '1', value: 1 },
          { label: '2', value: 2 },
          { label: '3', value: 3 },
          { label: '4', value: 4 },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Slides To Scroll</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.slidesToScroll"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: '1', value: 1 },
          { label: '2', value: 2 },
          { label: '3', value: 3 },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.vertical"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Horizontal', value: false },
          { label: 'Vertical', value: true },
        ]"
      ></ui-dropdown>
    </div>

    <div class="checkbox-group" style="padding-top: 24px">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.centerMode" (ngModelChange)="updateConfig()" />
        Center Mode
      </label>
    </div>
  </div>

  <!-- Animation Section -->
  <div slot="content-animation" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Animation Effect</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.effect"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Slide', value: 'slide' },
          { label: 'Fade', value: 'fade' },
          { label: 'Cube', value: 'cube' },
          { label: 'Flip', value: 'flip' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.animationDuration"
        (ngModelChange)="updateConfig()"
        step="100"
      />
    </div>

    <div class="control-group">
      <label>Autoplay Interval (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.autoplayInterval"
        (ngModelChange)="updateConfig()"
        step="500"
      />
    </div>

    <div class="checkbox-group" style="padding-top: 24px">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoplay" (ngModelChange)="updateConfig()" />
        Autoplay
      </label>
    </div>
  </div>

  <!-- Controls Section -->
  <div slot="content-controls" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.arrows" (ngModelChange)="updateConfig()" />
        Show Arrows
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.indicators" (ngModelChange)="updateConfig()" />
        Show Indicators
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showProgress" (ngModelChange)="updateConfig()" />
        Progress Bar
      </label>
    </div>
  </div>

  <!-- Behavior Section -->
  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.infinite" (ngModelChange)="updateConfig()" />
        Infinite Loop
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.swipe" (ngModelChange)="updateConfig()" />
        Touch Swipe
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.draggable" (ngModelChange)="updateConfig()" />
        Mouse Draggable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.keyboard" (ngModelChange)="updateConfig()" />
        Keyboard Navigation
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.pauseOnHover" (ngModelChange)="updateConfig()" />
        Pause On Hover
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    "
  >
    <div
      class="carousel-container"
      [class.vertical-mode]="pgConfig.vertical"
      style="
        width: 100%;
        max-width: 800px;
        height: 400px;
        background: var(--surface-1);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-color);
      "
    >
      <app-carousel
        #carouselElement
        [attr.slides-to-show]="pgConfig.slidesToShow"
        [attr.slides-to-scroll]="pgConfig.slidesToScroll"
        [attr.vertical]="pgConfig.vertical ? '' : null"
        [attr.animation-duration]="pgConfig.animationDuration"
        [attr.animation-easing]="pgConfig.animationEasing"
        [attr.autoplay-interval]="pgConfig.autoplayInterval"
        [attr.autoplay]="pgConfig.autoplay ? '' : null"
        [attr.arrows]="pgConfig.arrows ? '' : null"
        [attr.indicators]="pgConfig.indicators ? '' : null"
        [attr.infinite]="pgConfig.infinite ? '' : null"
        [attr.swipe]="pgConfig.swipe ? '' : null"
        [attr.keyboard]="pgConfig.keyboard ? '' : null"
        [attr.pause-on-hover]="pgConfig.pauseOnHover ? '' : null"
        [attr.effect]="pgConfig.effect"
        [attr.center-mode]="pgConfig.centerMode ? '' : null"
        [attr.center-padding]="pgConfig.centerMode ? '50px' : null"
        [attr.show-progress]="pgConfig.showProgress ? '' : null"
        [attr.draggable]="pgConfig.draggable ? '' : null"
      >
        <div
          *ngFor="let slide of dummySlides"
          class="slide"
          [style.background]="slide.color"
          style="
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
          "
        >
          <div class="slide-content" style="text-align: center">
            <h3 style="font-size: 2rem; margin: 0">{{ slide.title }}</h3>
            <p style="opacity: 0.8">{{ slide.desc }}</p>
          </div>
        </div>
      </app-carousel>
    </div>
  </div>
</app-playground>
