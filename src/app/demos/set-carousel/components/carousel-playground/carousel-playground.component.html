<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Slides To Show</label>
        <select [(ngModel)]="pgConfig.slidesToShow" (change)="updateConfig()">
          <option [ngValue]="1">1</option>
          <option [ngValue]="2">2</option>
          <option [ngValue]="3">3</option>
          <option [ngValue]="4">4</option>
        </select>
      </div>

      <div class="control-group">
        <label>Slides To Scroll</label>
        <select [(ngModel)]="pgConfig.slidesToScroll" (change)="updateConfig()">
          <option [ngValue]="1">1</option>
          <option [ngValue]="2">2</option>
          <option [ngValue]="3">3</option>
        </select>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <select [(ngModel)]="pgConfig.vertical" (change)="updateConfig()">
          <option [ngValue]="false">Horizontal</option>
          <option [ngValue]="true">Vertical</option>
        </select>
      </div>

      <div class="control-group">
        <label>Effect</label>
        <select [(ngModel)]="pgConfig.effect" (change)="updateConfig()">
          <option value="slide">Slide</option>
          <option value="fade">Fade</option>
          <option value="cube">Cube</option>
          <option value="flip">Flip</option>
        </select>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.animationDuration"
          (input)="updateConfig()"
          step="100"
        />
      </div>

      <div class="control-group">
        <label>Autoplay Interval (ms)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.autoplayInterval"
          (input)="updateConfig()"
          step="500"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.autoplay" (change)="updateConfig()" /> Autoplay
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.arrows" (change)="updateConfig()" /> Arrows
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.indicators" (change)="updateConfig()" />
        Indicators
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.infinite" (change)="updateConfig()" /> Infinite
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.swipe" (change)="updateConfig()" /> Swipe
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.keyboard" (change)="updateConfig()" /> Keyboard
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.pauseOnHover" (change)="updateConfig()" />
        Pause On Hover
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.centerMode" (change)="updateConfig()" /> Center
        Mode
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showProgress" (change)="updateConfig()" />
        Progress Bar
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.draggable" (change)="updateConfig()" />
        Draggable
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <div class="carousel-container" [class.vertical-mode]="pgConfig.vertical">
        <app-carousel
          [attr.slides-to-show]="pgConfig.slidesToShow"
          [attr.slides-to-scroll]="pgConfig.slidesToScroll"
          [attr.vertical]="pgConfig.vertical"
          [attr.animation-duration]="pgConfig.animationDuration"
          [attr.animation-easing]="pgConfig.animationEasing"
          [attr.autoplay-interval]="pgConfig.autoplayInterval"
          [attr.autoplay]="pgConfig.autoplay"
          [attr.arrows]="pgConfig.arrows"
          [attr.indicators]="pgConfig.indicators"
          [attr.infinite]="pgConfig.infinite"
          [attr.swipe]="pgConfig.swipe"
          [attr.keyboard]="pgConfig.keyboard"
          [attr.pause-on-hover]="pgConfig.pauseOnHover"
          [attr.effect]="pgConfig.effect"
          [attr.center-mode]="pgConfig.centerMode"
          [attr.center-padding]="pgConfig.centerMode ? '50px' : null"
          [attr.show-progress]="pgConfig.showProgress"
          [attr.draggable]="pgConfig.draggable"
        >
          <div *ngFor="let slide of dummySlides" class="slide" [style.background]="slide.color">
            <div class="slide-content">
              <h3>{{ slide.title }}</h3>
              <p>{{ slide.desc }}</p>
            </div>
          </div>
        </app-carousel>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
