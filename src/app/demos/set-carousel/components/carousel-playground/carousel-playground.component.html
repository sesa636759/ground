<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Slides To Show</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.slidesToShow"
          (change)="updateConfig()"
          [options]="[
            { label: '1', value: 1 },
            { label: '2', value: 2 },
            { label: '3', value: 3 },
            { label: '4', value: 4 },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Slides To Scroll</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.slidesToScroll"
          (change)="updateConfig()"
          [options]="[
            { label: '1', value: 1 },
            { label: '2', value: 2 },
            { label: '3', value: 3 },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.vertical"
          (change)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: false },
            { label: 'Vertical', value: true },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Effect</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.effect"
          (change)="updateConfig()"
          [options]="[
            { label: 'Slide', value: 'slide' },
            { label: 'Fade', value: 'fade' },
            { label: 'Cube', value: 'cube' },
            { label: 'Flip', value: 'flip' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.animationDuration"
          (input)="updateConfig()"
          step="100"
        />
      </div>

      <div class="control-group">
        <label>Autoplay Interval (ms)</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.autoplayInterval"
          (input)="updateConfig()"
          step="500"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoplay" (change)="updateConfig()" /> Autoplay
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.arrows" (change)="updateConfig()" /> Arrows
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.indicators" (change)="updateConfig()" />
        Indicators
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.infinite" (change)="updateConfig()" /> Infinite
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.swipe" (change)="updateConfig()" /> Swipe
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.keyboard" (change)="updateConfig()" /> Keyboard
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.pauseOnHover" (change)="updateConfig()" />
        Pause On Hover
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.centerMode" (change)="updateConfig()" /> Center Mode
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showProgress" (change)="updateConfig()" />
        Progress Bar
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.draggable" (change)="updateConfig()" />
        Draggable
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <div class="carousel-container" [class.vertical-mode]="pgConfig.vertical">
        <app-carousel
          [attr.slides-to-show]="pgConfig.slidesToShow"
          [attr.slides-to-scroll]="pgConfig.slidesToScroll"
          [attr.vertical]="pgConfig.vertical"
          [attr.animation-duration]="pgConfig.animationDuration"
          [attr.animation-easing]="pgConfig.animationEasing"
          [attr.autoplay-interval]="pgConfig.autoplayInterval"
          [attr.autoplay]="pgConfig.autoplay"
          [attr.arrows]="pgConfig.arrows"
          [attr.indicators]="pgConfig.indicators"
          [attr.infinite]="pgConfig.infinite"
          [attr.swipe]="pgConfig.swipe"
          [attr.keyboard]="pgConfig.keyboard"
          [attr.pause-on-hover]="pgConfig.pauseOnHover"
          [attr.effect]="pgConfig.effect"
          [attr.center-mode]="pgConfig.centerMode"
          [attr.center-padding]="pgConfig.centerMode ? '50px' : null"
          [attr.show-progress]="pgConfig.showProgress"
          [attr.draggable]="pgConfig.draggable"
        >
          <div *ngFor="let slide of dummySlides" class="slide" [style.background]="slide.color">
            <div class="slide-content">
              <h3>{{ slide.title }}</h3>
              <p>{{ slide.desc }}</p>
            </div>
          </div>
        </app-carousel>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
