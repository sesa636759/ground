<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Identity -->
      <div class="control-section">
        <h3>Identity</h3>
        <div class="control-group">
          <label>Name (Initials)</label>
          <input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Image Source</label>
          <input
            type="text"
            [(ngModel)]="pgConfig.src"
            (ngModelChange)="updateConfig()"
            placeholder="URL"
          />
        </div>
        <div class="control-group">
          <label>Icon</label>
          <input
            type="text"
            [(ngModel)]="pgConfig.icon"
            (ngModelChange)="updateConfig()"
            placeholder="emoji or icon"
          />
        </div>
      </div>

      <!-- Appearance -->
      <div class="control-section">
        <h3>Appearance</h3>
        <div class="control-group">
          <label>Shape</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.shape"
            (ngModelChange)="updateConfig()"
            [options]="shapeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size (e.g. 64px)</label>
          <input type="text" [(ngModel)]="pgConfig.size" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Status</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.status"
            (ngModelChange)="updateConfig()"
            [options]="statusOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Decorations -->
      <div class="control-section">
        <h3>Decorations</h3>
        <div class="control-group">
          <label>Badge</label>
          <input
            type="text"
            [(ngModel)]="pgConfig.badge"
            (ngModelChange)="updateConfig()"
            placeholder="'dot' or text"
          />
        </div>
        <div class="control-group">
          <label>Badge Color</label>
          <input
            type="text"
            [(ngModel)]="pgConfig.badgeColor"
            (ngModelChange)="updateConfig()"
            placeholder="hex or color name"
          />
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ui-button
        actions
        variant="secondary"
        (click)="resetConfig()"
        label="Reset Configuration"
      ></ui-button>
    </div>
  </div>
  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <ui-avatar
      [attr.name]="pgConfig.name"
      [attr.src]="pgConfig.src"
      [attr.icon]="pgConfig.icon"
      [attr.shape]="pgConfig.shape"
      [attr.size]="pgConfig.size"
      [attr.status]="pgConfig.status"
      [attr.badge]="pgConfig.badge"
      [attr.badge-color]="pgConfig.badgeColor"
    ></ui-avatar>

    <ui-code-preview
      [htmlCode]="generatedCode()"
      label="Generated Code"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  </div>
</app-playground>
