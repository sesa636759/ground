<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Label</label>
        <app-input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Placeholder</label>
        <app-input type="text" [(ngModel)]="pgConfig.placeholder" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (change)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Tags</label>
        <app-input
          type="number"
          min="1"
          max="20"
          [(ngModel)]="pgConfig.maxTags"
          (input)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAutocomplete" (change)="updateConfig()" />
        Autocomplete
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.allowDuplicates" (change)="updateConfig()" />
        Allow Duplicates
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.caseSensitive" (change)="updateConfig()" />
        Case Sensitive
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-tags-input
        [attr.label]="pgConfig.label"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.max-tags]="pgConfig.maxTags"
        [attr.disabled]="pgConfig.disabled"
        [attr.readonly]="pgConfig.readonly"
        [attr.required]="pgConfig.required"
        [attr.invalid]="pgConfig.invalid"
        [attr.enable-autocomplete]="pgConfig.enableAutocomplete"
        [attr.allow-duplicates]="pgConfig.allowDuplicates"
        [attr.case-sensitive]="pgConfig.caseSensitive"
        [suggestions]="suggestions"
        (tagsChange)="onTagsChange($event)"
      ></app-tags-input>
    </div>

    <app-code-block
      [code]="generatedCode()"
      title="Generated Code"
      language="html"
    ></app-code-block>
  </div>
</div>
