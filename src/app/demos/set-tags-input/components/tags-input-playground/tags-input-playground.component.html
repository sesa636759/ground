<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-grid">
      <div class="control-group">
        <label>Label</label>
        <ui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Placeholder</label>
        <ui-input type="text" [(ngModel)]="pgConfig.placeholder" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Tags</label>
        <ui-input
          type="number"
          min="1"
          max="20"
          [(ngModel)]="pgConfig.maxTags"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableAutocomplete" (ngModelChange)="updateConfig()" />
        Autocomplete
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.allowDuplicates" (ngModelChange)="updateConfig()" />
        Allow Duplicates
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.caseSensitive" (ngModelChange)="updateConfig()" />
        Case Sensitive
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()" /> Invalid
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <app-tags-input
      [attr.label]="pgConfig.label"
      [attr.placeholder]="pgConfig.placeholder"
      [attr.size]="pgConfig.size"
      [attr.color]="pgConfig.color"
      [attr.variant]="pgConfig.variant"
      [attr.max-tags]="pgConfig.maxTags"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.readonly]="pgConfig.readonly ? '' : null"
      [attr.required]="pgConfig.required ? '' : null"
      [attr.invalid]="pgConfig.invalid ? '' : null"
      [attr.enable-autocomplete]="pgConfig.enableAutocomplete ? '' : null"
      [attr.allow-duplicates]="pgConfig.allowDuplicates ? '' : null"
      [attr.case-sensitive]="pgConfig.caseSensitive ? '' : null"
      [suggestions]="suggestions"
      (tagsChange)="onTagsChange($event)"
    ></app-tags-input>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
