<div class="playground-layout">
  <div class="playground-controls">
    <ui-accordion items='[{"id":"config","title":"Configuration","icon":"⚙️"}]' defaultOpen='["config"]' multiple>
      <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Label</label>
        <app-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Placeholder</label>
        <app-input type="text" [(ngModel)]="pgConfig.placeholder" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Tags</label>
        <app-input
          type="number"
          min="1"
          max="20"
          [(ngModel)]="pgConfig.maxTags"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAutocomplete" (ngModelChange)="updateConfig()" />
        Autocomplete
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.allowDuplicates" (ngModelChange)="updateConfig()" />
        Allow Duplicates
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.caseSensitive" (ngModelChange)="updateConfig()" />
        Case Sensitive
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()" /> Invalid
      </label>
    </div>
        </div>
    </ui-accordion>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-tags-input
        [attr.label]="pgConfig.label"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.max-tags]="pgConfig.maxTags"
        [attr.disabled]="pgConfig.disabled"
        [attr.readonly]="pgConfig.readonly"
        [attr.required]="pgConfig.required"
        [attr.invalid]="pgConfig.invalid"
        [attr.enable-autocomplete]="pgConfig.enableAutocomplete"
        [attr.allow-duplicates]="pgConfig.allowDuplicates"
        [attr.case-sensitive]="pgConfig.caseSensitive"
        [suggestions]="suggestions"
        (tagsChange)="onTagsChange($event)"
      ></app-tags-input>
    </div>

    
  
      <ui-code-preview [htmlCode]="generatedCode()" [label]="'Generated Code'" activeLang="html" expanded="true"></ui-code-preview>
    </div>
</div>
