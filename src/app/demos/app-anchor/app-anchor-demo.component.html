<app-demo-header
  icon="⚓"
  title="Anchor Navigation"
  description="A streamlined navigation component that tracks the current scroll position within a container or the entire page. Perfect for long-form content, documentation, or landing pages."
>
</app-demo-header>

<demo-tabs>
  <!-- Playground Slot -->
  <div slot="playground">
    <app-anchor-playground></app-anchor-playground>
  </div>

  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Style Types -->
      <app-example-section
        id="types"
        title="Marker Styles"
        description="Choose between traditional text links or minimalistic dots."
        [code]="typesCode"
        style="margin-top: 0"
      >
        <div class="demo-card">
          <div class="preview-box">
            <div
              class="content-body"
              id="types-scroll"
              style="height: 200px; overflow-y: auto; flex: 1; padding: 1rem"
            >
              <div class="section-block" id="line-sec" style="margin-bottom: 300px">
                <h3>Line Marker</h3>
                <p>Traditional sidebar navigation style.</p>
              </div>
              <div class="section-block" id="dot-sec" style="margin-bottom: 300px">
                <h3>Dot Marker</h3>
                <p>Minimalistic representation often used for scroll progress.</p>
              </div>
            </div>
            <div
              class="anchor-sidebar"
              style="width: 150px; border-left: 1px solid var(--color-border)"
            >
              <ui-anchor
                type="dot"
                [links]="[
                  { id: 'l1', label: 'Line', target: 'line-sec' },
                  { id: 'l2', label: 'Dot', target: 'dot-sec' },
                ]"
                scroll-container="#types-scroll"
              ></ui-anchor>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Orientation -->
      <app-example-section
        id="orientation"
        title="Orientation"
        description="Deploy anchor navigation horizontally for header-based sub-menus."
        [code]="orientationCode"
      >
        <div class="demo-card">
          <div
            style="
              padding: 16px;
              border-bottom: 1px solid var(--color-border);
              background: var(--color-bg-secondary);
            "
          >
            <ui-anchor
              orientation="horizontal"
              [links]="[
                { id: 'h1', label: 'Features', target: 'playground' },
                { id: 'h2', label: 'Theming', target: 'types' },
                { id: 'h3', label: 'API', target: 'orientation' },
              ]"
            ></ui-anchor>
          </div>
          <div
            class="preview-box"
            style="justify-content: center; padding: 40px; color: var(--color-text-secondary)"
          >
            Horizontal anchor is perfect for top navigation bars or sub-task headers.
          </div>
        </div>
      </app-example-section>

      <!-- Auto Generation -->
      <app-example-section
        id="auto-gen"
        title="Headings Auto-Detection"
        description="Simplify your workflow by letting the component scan a container for headers."
        [code]="autoGenCode"
      >
        <div class="demo-card">
          <div class="preview-box">
            <div
              class="content-body"
              id="auto-gen-box"
              style="height: 200px; overflow-y: auto; flex: 1; padding: 1rem"
            >
              <h2 id="auto1">Introduction</h2>
              <div
                style="
                  height: 150px;
                  background: var(--color-bg-tertiary);
                  margin: 10px 0;
                  border-radius: 4px;
                "
              ></div>
              <h2 id="auto2">Installation</h2>
              <div
                style="
                  height: 150px;
                  background: var(--color-bg-tertiary);
                  margin: 10px 0;
                  border-radius: 4px;
                "
              ></div>
              <h3 id="auto3">Configuration</h3>
              <div
                style="
                  height: 150px;
                  background: var(--color-bg-tertiary);
                  margin: 10px 0;
                  border-radius: 4px;
                "
              ></div>
            </div>
            <div
              class="anchor-sidebar"
              style="width: 150px; border-left: 1px solid var(--color-border)"
            >
              <ui-anchor
                auto-gen-container="#auto-gen-box"
                scroll-container="#auto-gen-box"
                show-progress
              ></ui-anchor>
            </div>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="anchor"></app-component-documentation>
  </div>
</demo-tabs>
