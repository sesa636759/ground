<app-playground [accordionItems]="pgAccordionItems" [defaultOpen]="accordionDefaultOpen">
  <div slot="content-metric" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Value</label>
      <input type="number" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Min</label>
      <input type="number" [(ngModel)]="pgConfig.min" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Max</label>
      <input type="number" [(ngModel)]="pgConfig.max" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Label</label>
      <input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <input type="number" [(ngModel)]="pgConfig.size" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Arc Width</label>
      <input type="number" [(ngModel)]="pgConfig.arcWidth" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Color Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.colorMode"
        (ngModelChange)="updateConfig()"
        [options]="colorModeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <ui-button actions variant="secondary" (click)="resetConfig()" label="Reset"></ui-button>

  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <ui-speedometer
      #speedometerElement
      [attr.value]="pgConfig.value"
      [attr.min]="pgConfig.min"
      [attr.max]="pgConfig.max"
      [attr.label]="pgConfig.label"
      [attr.size]="pgConfig.size"
      [attr.arc-width]="pgConfig.arcWidth"
      [attr.color-mode]="pgConfig.colorMode"
    ></ui-speedometer>

    @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
  </div>

</app-playground>
