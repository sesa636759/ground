<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-metric" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Min</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.min"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Arc Width</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.arcWidth"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Color Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.colorMode"
        (ngModelChange)="updateConfig()"
        [options]="colorModeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-speedometer
      #speedometerElement
      [attr.value]="pgConfig.value"
      [attr.min]="pgConfig.min"
      [attr.max]="pgConfig.max"
      [attr.label]="pgConfig.label"
      [attr.size]="pgConfig.size"
      [attr.arc-width]="pgConfig.arcWidth"
      [attr.color-mode]="pgConfig.colorMode"
    ></ui-speedometer>
  </div>
</app-playground>
