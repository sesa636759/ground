<div class="demo-page">
  <!-- Header Section -->
  <div class="demo-header">
    <div class="header-content">
      <div class="title-section">
        <div class="icon">🃏</div>
        <div>
          <h1>{{ componentName }} Component</h1>
          <p class="description">{{ componentDescription }}</p>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn primary" (click)="openPlayground()">▶ Open Playground</button>
        <button class="action-btn secondary" (click)="openDocumentation()">📖 Documentation</button>
      </div>
    </div>
  </div>

  <!-- Quick Navigation -->
  <div class="quick-nav">
    <h3>Quick Navigation</h3>
    <div class="nav-buttons">
      <button *ngFor="let demo of demos" class="nav-btn" (click)="scrollToDemo(demo.id)">
        {{ demo.title }}
      </button>
    </div>
  </div>

  <!-- Demo Sections -->
  <div class="demos-container">
    <div *ngFor="let demo of demos" [id]="demo.id" class="demo-section">
      <div class="demo-header-section">
        <h2>{{ demo.title }}</h2>
        <p class="demo-description">{{ demo.description }}</p>
      </div>

      <!-- Live Preview -->
      <div *ngIf="demo.preview" class="demo-preview">
        <div class="preview-label">Preview</div>
        <div class="preview-content" [innerHTML]="demo.code"></div>
      </div>

      <!-- Code -->
      <app-code-viewer
        [code]="demo.code"
        [title]="'Code Example'"
        language="html"
      ></app-code-viewer>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="demo-footer">
    <div class="footer-content">
      <h3>Ready to customize?</h3>
      <p>Try the interactive playground to experiment with all component properties.</p>
      <button class="action-btn primary large" (click)="openPlayground()">
        ▶ Open Interactive Playground
      </button>
    </div>
  </div>
</div>
