<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Menu Configuration Slot -->
  <div slot="content-settings" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Base Z-Index</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.baseZIndex"
        (ngModelChange)="updateConfig()"
        style="
          width: 100%;
          height: 36px;
          border-radius: 8px;
          border: 1px solid var(--border-color);
          background: var(--surface-1);
          color: var(--text-primary);
          padding: 0 12px;
        "
      />
    </div>
    <div class="control-group">
      <label>Breakpoint</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.breakpoint"
        (ngModelChange)="updateConfig()"
        style="
          width: 100%;
          height: 36px;
          border-radius: 8px;
          border: 1px solid var(--border-color);
          background: var(--surface-1);
          color: var(--text-primary);
          padding: 0 12px;
        "
      />
    </div>
    <div class="checkbox-group" style="margin-top: 12px">
      <app-checkbox
        id="autoZIndex"
        [(ngModel)]="pgConfig.autoZIndex"
        (ngModelChange)="updateConfig()"
        label="Auto Z-Index"
      ></app-checkbox>
    </div>
  </div>

  <!-- Visual Styles Slot -->
  <div slot="content-visuals" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--bg-secondary);
      border-radius: 12px;
      position: relative;
    "
  >
    <div
      class="context-target"
      #targetElement
      style="
        padding: 40px 60px;
        border: 2px dashed var(--border-color);
        border-radius: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        cursor: context-menu;
        user-select: none;
        transition: all 0.3s ease;
      "
    >
      Right click me to see the menu
    </div>

    <ui-context-menu
      #contextMenuElement
      [attr.theme]="pgConfig.theme"
      [attr.breakpoint]="pgConfig.breakpoint"
      [attr.auto-z-index]="pgConfig.autoZIndex"
      [attr.base-z-index]="pgConfig.baseZIndex"
      [items]="modelJson"
      [target]="targetElement"
    ></ui-context-menu>

    <div
      *ngIf="lastAction"
      style="
        margin-top: 24px;
        padding: 8px 16px;
        background: var(--surface-2);
        border-radius: 20px;
        font-size: 0.85rem;
        color: var(--primary-color);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      "
    >
      Last Action: <strong>{{ lastAction }}</strong>
    </div>
  </div>
</app-playground>
