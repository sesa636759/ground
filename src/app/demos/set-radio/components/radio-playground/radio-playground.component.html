<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.layout"
          (change)="updateConfig()"
          [options]="[
            { label: 'Vertical', value: 'vertical' },
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Grid', value: 'grid' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group" *ngIf="pgConfig.layout === 'grid'">
        <label>Columns</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.columns"
          (input)="updateConfig()"
          min="1"
          max="4"
        />
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (change)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Bordered', value: 'bordered' },
            { label: 'Underlined', value: 'underlined' },
            { label: 'Card', value: 'card' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Group Label</label>
        <app-input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Helper Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.rippleEffect" (change)="updateConfig()" />
        Ripple
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.buttonGroup" (change)="updateConfig()" />
        Button Grp
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.allowEmpty" (change)="updateConfig()" /> Allow Empty
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage">
      <app-radio-group
        name="playground-radio"
        [options]="radioOptions"
        [value]="pgConfig.value"
        [attr.layout]="pgConfig.layout"
        [attr.columns]="pgConfig.columns"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [disabled]="pgConfig.disabled"
        [readonly]="pgConfig.readonly"
        [required]="pgConfig.required"
        [invalid]="pgConfig.invalid"
        [attr.enable-animation]="pgConfig.enableAnimation.toString()"
        [attr.ripple-effect]="pgConfig.rippleEffect.toString()"
        [attr.variant]="pgConfig.variant"
        [attr.button-group]="pgConfig.buttonGroup.toString()"
        [attr.skeleton]="pgConfig.skeleton.toString()"
        [attr.allow-empty]="pgConfig.allowEmpty.toString()"
        [attr.error-message]="pgConfig.invalid ? 'Please select an option' : null"
        (radioGroupChange)="onRadioGroupChange($event)"
      >
      </app-radio-group>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
