<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <!-- Group Config Slot -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Group Label</label>
      <ui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Group Name</label>
      <ui-input type="text" [(ngModel)]="pgConfig.name" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Layout</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.layout"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Vertical', value: 'vertical' },
          { label: 'Horizontal', value: 'horizontal' },
          { label: 'Columns', value: 'columns' },
        ]"
      ></ui-dropdown>
    </div>
    <div class="control-group" *ngIf="pgConfig.layout === 'columns'">
      <label>Columns Count</label>
      <ui-input type="number" [(ngModel)]="pgConfig.columns" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Button', value: 'button' },
          { label: 'Card', value: 'card' },
        ]"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Small', value: 'small' },
          { label: 'Medium', value: 'medium' },
          { label: 'Large', value: 'large' },
        ]"
      ></ui-dropdown>
    </div>
  </div>

  <!-- States Slot -->
  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></ui-checkbox>
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></ui-checkbox>
        Invalid
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></ui-checkbox>
        Skeleton
      </label>
    </div>
  </div>

  <!-- Items Slot -->
  <div slot="content-items" style="padding: 16px">
    <div
      *ngFor="let opt of radioOptions; let i = index"
      class="option-editor-item"
      style="margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px"
    >
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px">
        <ui-input
          style="flex: 1"
          [label]="'Label ' + (i + 1)"
          [(ngModel)]="opt.label"
          (ngModelChange)="updateConfig()"
        ></ui-input>
        <ui-input
          style="flex: 1"
          [label]="'Value ' + (i + 1)"
          [(ngModel)]="opt.value"
          (ngModelChange)="updateConfig()"
        ></ui-input>
        <ui-button
          variant="ghost"
          (click)="removeOption(i)"
          icon="fas fa-trash"
          color="danger"
        ></ui-button>
      </div>
    </div>
    <ui-button
      variant="outline"
      (click)="addOption()"
      label="Add Radio Option"
      icon="fas fa-plus"
    ></ui-button>
  </div>

  <!-- Validation Slot -->
  <div slot="content-validation" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Helper Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group" *ngIf="pgConfig.invalid">
      <label>Error Message</label>
      <ui-input type="text" [(ngModel)]="pgConfig.errorMessage" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Preview Area -->
  <div preview>
    <div class="radio-demo-container" [style.width]="pgConfig.fullWidth ? '100%' : 'auto'">
      <app-radio-group
        #radioGroup
        [attr.name]="pgConfig.name"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.error-message]="pgConfig.invalid ? pgConfig.errorMessage : null"
        [attr.layout]="pgConfig.layout"
        [attr.columns]="pgConfig.columns"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.loading]="pgConfig.loading ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [(ngModel)]="pgConfig.value"
        (appChange)="onRadioGroupChange($any($event).target.value)"
      >
        <app-radio
          *ngFor="let opt of radioOptions; trackBy: trackByOption"
          [attr.value]="opt.value"
          [attr.label]="opt.label"
          [attr.description]="opt.description"
          [attr.badge]="opt.badge"
          [attr.icon]="opt.icon"
          [attr.disabled]="opt.disabled ? 'true' : null"
        ></app-radio>
      </app-radio-group>
    </div>

    <div
      style="
        margin-top: 24px;
        font-size: 0.9rem;
        color: var(--text-secondary);
        background: var(--surface-2);
        padding: 12px;
        border-radius: 8px;
      "
    >
      <strong>Selected Value:</strong> {{ pgConfig.value || 'None' }}
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
