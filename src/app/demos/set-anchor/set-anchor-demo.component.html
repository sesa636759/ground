<app-demo-header
  icon="⚓"
  title="Anchor Navigation"
  description="Smooth scrolling navigation with automatic section detection, scroll spy, sticky positioning, and advanced features like keyboard navigation and hash synchronization."
>
</app-demo-header>

<demo-tabs>
  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Vertical Left -->
      <app-example-section
        id="vertical-left"
        title="Vertical Navigation (Left)"
        description="Anchor links positioned on the left side."
        [code]="verticalLeftCode()"
        style="margin-top: 0"
      >
        <div class="demo-grid col-1">
          <div
            class="demo-card"
            id="v-left-scroll"
            style="height: 300px; overflow-y: auto; position: relative"
          >
            <app-anchor
              mode="vertical"
              position="left"
              [items]="verticalLeftItems"
              scroll-container="#v-left-scroll"
            ></app-anchor>
            <div style="height: 1000px; padding: 20px">
              <section id="intro">
                <h3>Introduction</h3>
                <p>Scroll down to see more...</p>
              </section>
              <section id="features" style="margin-top: 400px"><h3>Features</h3></section>
              <section id="api" style="margin-top: 400px"><h3>API Reference</h3></section>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Vertical Right -->
      <app-example-section
        id="vertical-right"
        title="Vertical Navigation (Right)"
        description="Anchor links positioned on the right side."
        [code]="verticalRightCode()"
      >
        <div class="demo-grid col-1">
          <div
            class="demo-card"
            id="v-right-scroll"
            style="height: 300px; overflow-y: auto; position: relative"
          >
            <app-anchor
              mode="vertical"
              position="right"
              [items]="verticalRightItems"
              scroll-container="#v-right-scroll"
            ></app-anchor>
            <div style="height: 1000px; padding: 20px">
              <section id="r-intro"><h3>Introduction</h3></section>
              <section id="r-features" style="margin-top: 400px"><h3>Features</h3></section>
              <section id="r-api" style="margin-top: 400px"><h3>API Reference</h3></section>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Horizontal Top -->
      <app-example-section
        id="horizontal-top"
        title="Horizontal Navigation (Top)"
        description="Anchor links displayed horizontally at the top."
        [code]="horizontalTopCode()"
      >
        <div class="demo-grid col-1">
          <div
            class="demo-card"
            id="h-top-scroll"
            style="height: 300px; overflow-y: auto; position: relative"
          >
            <app-anchor
              mode="horizontal"
              position="top"
              [items]="horizontalTopItems"
              scroll-container="#h-top-scroll"
            ></app-anchor>
            <div style="height: 1000px; padding: 20px">
              <section id="t-home"><h3>Home</h3></section>
              <section id="t-about" style="margin-top: 400px"><h3>About</h3></section>
              <section id="t-contact" style="margin-top: 400px"><h3>Contact</h3></section>
            </div>
          </div>
        </div>
      </app-example-section>

      <!-- Badges -->
      <app-example-section
        id="with-badges"
        title="Anchor with Badges"
        description="Display notification counts or status markers."
        [code]="badgeCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <app-anchor mode="vertical" [items]="badgeItems" show-badge="true"></app-anchor>
          </div>
        </div>
      </app-example-section>

      <!-- Advanced UX -->
      <app-example-section
        id="nested-items"
        title="Nested & Collapsible Items"
        description="Support for hierarchical navigation structures."
        [code]="nestedCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <app-anchor mode="vertical" [items]="nestedItems" collapsible="true"></app-anchor>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Playground Slot -->
  <div slot="playground">
    <app-anchor-playground></app-anchor-playground>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="anchor"></app-component-documentation>
  </div>
</demo-tabs>
