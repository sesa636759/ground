<div class="demo-container">
  <app-demo-header
    icon="🪜"
    title="Smart Stepper"
    description="A guided workflow component that breaks down complex processes into manageable steps. Supports custom icons, themes, and dynamic content injection per step."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-smart-stepper-playground></app-smart-stepper-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Themes & Orientations -->
          <section class="demo-section" id="themes" style="margin-top: 0">
            <div class="section-header">
              <h2>🎨 Themes & Orientations</h2>
              <p>Choose between standard and compact themes or change the layout flow.</p>
            </div>
            <div class="demo-card">
              <div style="width: 100%">
                <span>Compact Theme:</span>
                <ui-smart-stepper theme="compact" value="1">
                  <ui-smart-step label="Billing" value="1"></ui-smart-step>
                  <ui-smart-step label="Shipping" value="2"></ui-smart-step>
                  <ui-smart-step label="Confirm" value="3"></ui-smart-step>
                </ui-smart-stepper>
              </div>

              <div style="width: 100%; display: flex; flex-direction: column; gap: 12px">
                <span>Vertical Orientation:</span>
                <ui-smart-stepper orientation="vertical" value="2" style="height: 300px">
                  <ui-smart-step label="Account" value="1"></ui-smart-step>
                  <ui-smart-step label="Preferences" value="2">
                    <div style="padding: 12px">Customize your notifications here.</div>
                  </ui-smart-step>
                  <ui-smart-step label="Finalize" value="3"></ui-smart-step>
                </ui-smart-stepper>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="themesCode"
              [label]="'Design Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

        <div slot="docs">
      <app-component-documentation componentId="smart-stepper"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
