<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="orientationOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-features" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.showIcons"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Show Icons
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.allowBranching"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Allow Branching
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    "
  >
    <div
      class="stepper-container"
      style="
        width: 100%;
        max-width: 800px;
        background: var(--surface-1);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        padding: 20px;
      "
    >
      <ui-smart-stepper
        #stepperElement
        [attr.orientation]="pgConfig.orientation"
        [attr.theme]="pgConfig.theme"
        [attr.show-icons]="pgConfig.showIcons ? '' : null"
        [value]="currentStep"
        (valueChange)="onStepChange($event)"
      >
        <ui-smart-step label="Profile" icon="👤" value="1">
          <div style="padding: 24px">
            <h4 style="margin-top: 0">Profile Setup</h4>
            <p style="color: var(--text-secondary)">
              Enter your basic account information to get started.
            </p>
            <ui-button (click)="currentStep = '2'; updateConfig()" label="Next Step"></ui-button>
          </div>
        </ui-smart-step>
        <ui-smart-step label="Verify" icon="🛡️" value="2">
          <div style="padding: 24px">
            <h4 style="margin-top: 0">Identity Verification</h4>
            <p style="color: var(--text-secondary)">
              Protect your account with multi-factor authentication.
            </p>
            <div style="display: flex; gap: 12px">
              <ui-button
                variant="secondary"
                (click)="currentStep = '1'; updateConfig()"
                label="Back"
              ></ui-button>
              <ui-button (click)="currentStep = '3'; updateConfig()" label="Next Step"></ui-button>
            </div>
          </div>
        </ui-smart-step>
        <ui-smart-step label="Finish" icon="✅" value="3">
          <div style="padding: 24px">
            <h4 style="margin-top: 0">All Done!</h4>
            <p style="color: var(--text-secondary)">
              Your account is ready to use. You have completed the setup.
            </p>
            <ui-button
              variant="secondary"
              (click)="currentStep = '2'; updateConfig()"
              label="Back to Verify"
            ></ui-button>
          </div>
        </ui-smart-step>
      </ui-smart-stepper>
    </div>
  </div>
</app-playground>
