<app-playground
  [items]='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  [defaultOpen]='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Basic Config</h3>
        <div class="control-group">
          <label>Placeholder</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.placeholder"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Expand Trigger</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.expandTrigger"
            (ngModelChange)="updateConfig()"
            [options]="triggerOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Path Settings</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="fullpath"
            [(ngModel)]="pgConfig.showFullPath"
            (ngModelChange)="updateConfig()"
            label="Show Full Path"
          ></ui-checkbox>
        </div>
        <div class="control-group">
          <label>Separator</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.separator"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="changeonselect"
            [(ngModel)]="pgConfig.changeOnSelect"
            (ngModelChange)="updateConfig()"
            label="Change On Select (Any Level)"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>
  <div
    preview
    style="
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    "
  >
    <ui-cascade-select
      [attr.placeholder]="pgConfig.placeholder"
      [attr.size]="pgConfig.size"
      [attr.expand-trigger]="pgConfig.expandTrigger"
      [attr.show-full-path]="pgConfig.showFullPath ? '' : null"
      [attr.separator]="pgConfig.separator"
      [attr.change-on-select]="pgConfig.changeOnSelect ? '' : null"
      [options]="options"
      (cascadeChange)="onValueChange($event)"
    ></ui-cascade-select>

    @if (currentValue) {
      <div
        style="
          margin-top: 40px;
          padding: 12px;
          background: #f8fafc;
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          font-family: monospace;
          font-size: 0.8rem;
        "
      >
        Selection Value: {{ currentValue | json }}
      </div>
    }
  </div>
</app-playground>
