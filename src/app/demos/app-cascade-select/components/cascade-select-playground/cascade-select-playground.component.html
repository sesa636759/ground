<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.placeholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Expand Trigger</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.expandTrigger"
        (ngModelChange)="updateConfig()"
        [options]="triggerOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Separator</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.separator"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-states" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showFullPath"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Full Path
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.changeOnSelect"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Change On Select
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center">
      <ui-cascade-select
        #demoElement
        [attr.placeholder]="pgConfig.placeholder"
        [attr.size]="pgConfig.size"
        [attr.expand-trigger]="pgConfig.expandTrigger"
        [attr.show-full-path]="pgConfig.showFullPath ? 'true' : 'false'"
        [attr.separator]="pgConfig.separator"
        [attr.change-on-select]="pgConfig.changeOnSelect ? '' : null"
        [options]="optionsJson"
        (cascadeChange)="onValueChange($event)"
      ></ui-cascade-select>

      @if (currentValue) {
        <div
          style="
            margin-top: 40px;
            padding: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
          "
        >
          Selection Value: {{ currentValue | json }}
        </div>
      }
    </div>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
