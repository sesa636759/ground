<div class="demo-container">
  <app-demo-header
    icon="🌲"
    title="Cascade Select"
    description="A hierarchical selector for nested data structures. Perfect for locations, categories, and file systems where users need to navigate through multiple levels of options."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-cascade-select-playground></app-cascade-select-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Triggers & Display -->
          <section class="demo-section" id="triggers" style="margin-top: 0">
            <div class="section-header">
              <h2>⚡ Triggers & Display</h2>
              <p>Control how columns expand and how the selected path is rendered.</p>
            </div>
            <div class="demo-card">
              <div style="width: 300px">
                <span>Expand on Click:</span>
                <ui-cascade-select
                  expand-trigger="click"
                  [options]="fileSystemOptions"
                  placeholder="Click to expand"
                ></ui-cascade-select>
              </div>
              <div style="width: 300px">
                <span>Leaf Only Display:</span>
                <ui-cascade-select
                  [show-full-path]="false"
                  [options]="fileSystemOptions"
                  placeholder="Documents / Work / ..."
                ></ui-cascade-select>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="triggersCode"
              [label]="'Configuration Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- Selection Logic -->
          <section class="demo-section" id="selection">
            <div class="section-header">
              <h2>🎯 Selection Logic</h2>
              <p>Choose whether to allow selecting intermediate nodes or only leaf nodes.</p>
            </div>
            <div class="demo-card">
              <div style="width: 300px">
                <span>Change on Select (Any level):</span>
                <ui-cascade-select
                  change-on-select
                  [options]="fileSystemOptions"
                  placeholder="Select any folder or file"
                ></ui-cascade-select>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="selectionCode"
              [label]="'Selection Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

        <div slot="docs">
      <app-component-documentation componentId="cascade-select"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
