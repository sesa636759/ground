<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Content</label>
        <input type="text" [(ngModel)]="pgConfig.content" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Position</label>
        <select [(ngModel)]="pgConfig.position" (change)="updateConfig()">
          <option value="top">Top</option>
          <option value="top-left">Top Left</option>
          <option value="top-right">Top Right</option>
          <option value="bottom">Bottom</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="auto">Auto</option>
        </select>
      </div>

      <div class="control-group">
        <label>Trigger</label>
        <select [(ngModel)]="pgConfig.trigger" (change)="updateConfig()">
          <option value="hover">Hover</option>
          <option value="click">Click</option>
          <option value="focus">Focus</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="primary">Primary</option>
          <option value="info">Info</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="error">Error</option>
          <option value="glass">Glass</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="control-group">
        <label>Shape</label>
        <select [(ngModel)]="pgConfig.shape" (change)="updateConfig()">
          <option value="rounded">Rounded</option>
          <option value="square">Square</option>
          <option value="pill">Pill</option>
        </select>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <select [(ngModel)]="pgConfig.animation" (change)="updateConfig()">
          <option value="fade">Fade</option>
          <option value="slide">Slide</option>
          <option value="scale">Scale</option>
          <option value="bounce">Bounce</option>
          <option value="none">None</option>
        </select>
      </div>

      <div class="control-group">
        <label>Max Width (px)</label>
        <input type="number" [(ngModel)]="pgConfig.maxWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.arrow" (change)="updateConfig()" /> Show Arrow
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.interactive" (change)="updateConfig()" />
        Interactive
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.followCursor" (change)="updateConfig()" />
        Follow Cursor
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.html" (change)="updateConfig()" /> HTML Content
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showGlow" (change)="updateConfig()" /> Glow
        Effect
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <div class="tooltip-target-wrapper">
        <app-tooltip
          [content]="pgConfig.content"
          [position]="pgConfig.position"
          [trigger]="pgConfig.trigger"
          [variant]="pgConfig.variant"
          [shape]="pgConfig.shape"
          [animation]="pgConfig.animation"
          [arrow]="pgConfig.arrow"
          [maxWidth]="pgConfig.maxWidth"
          [showDelay]="pgConfig.showDelay"
          [hideDelay]="pgConfig.hideDelay"
          [interactive]="pgConfig.interactive"
          [followCursor]="pgConfig.followCursor"
          [html]="pgConfig.html"
          [showGlow]="pgConfig.showGlow"
          [customColor]="pgConfig.customColor"
          [textColor]="pgConfig.textColor"
        >
          <button slot="target" class="playground-target-btn">
            <i class="fas fa-info-circle"></i>
            Hover Me
          </button>
        </app-tooltip>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
