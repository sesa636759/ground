<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Content</label>
        <app-input type="text" [(ngModel)]="pgConfig.content" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (change)="updateConfig()"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Top Left', value: 'top-left' },
            { label: 'Top Right', value: 'top-right' },
            { label: 'Bottom', value: 'bottom' },
            { label: 'Bottom Left', value: 'bottom-left' },
            { label: 'Bottom Right', value: 'bottom-right' },
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
            { label: 'Auto', value: 'auto' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Trigger</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.trigger"
          (change)="updateConfig()"
          [options]="[
            { label: 'Hover', value: 'hover' },
            { label: 'Click', value: 'click' },
            { label: 'Focus', value: 'focus' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Dark', value: 'dark' },
            { label: 'Light', value: 'light' },
            { label: 'Primary', value: 'primary' },
            { label: 'Info', value: 'info' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Error', value: 'error' },
            { label: 'Glass', value: 'glass' },
            { label: 'Custom', value: 'custom' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Shape</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.shape"
          (change)="updateConfig()"
          [options]="[
            { label: 'Rounded', value: 'rounded' },
            { label: 'Square', value: 'square' },
            { label: 'Pill', value: 'pill' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animation"
          (change)="updateConfig()"
          [options]="[
            { label: 'Fade', value: 'fade' },
            { label: 'Slide', value: 'slide' },
            { label: 'Scale', value: 'scale' },
            { label: 'Bounce', value: 'bounce' },
            { label: 'None', value: 'none' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Width (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.maxWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.arrow" (change)="updateConfig()" /> Show Arrow
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.interactive" (change)="updateConfig()" />
        Interactive
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.followCursor" (change)="updateConfig()" />
        Follow Cursor
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.html" (change)="updateConfig()" /> HTML Content
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showGlow" (change)="updateConfig()" /> Glow Effect
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <div class="tooltip-target-wrapper">
        <app-tooltip
          [content]="pgConfig.content"
          [position]="pgConfig.position"
          [trigger]="pgConfig.trigger"
          [variant]="pgConfig.variant"
          [shape]="pgConfig.shape"
          [animation]="pgConfig.animation"
          [arrow]="pgConfig.arrow"
          [maxWidth]="pgConfig.maxWidth"
          [showDelay]="pgConfig.showDelay"
          [hideDelay]="pgConfig.hideDelay"
          [interactive]="pgConfig.interactive"
          [followCursor]="pgConfig.followCursor"
          [html]="pgConfig.html"
          [showGlow]="pgConfig.showGlow"
          [customColor]="pgConfig.customColor"
          [textColor]="pgConfig.textColor"
        >
          <ui-button slot="target" class="playground-target-btn">
            <i class="fas fa-info-circle"></i>
            Hover Me
          </ui-button>
        </app-tooltip>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
