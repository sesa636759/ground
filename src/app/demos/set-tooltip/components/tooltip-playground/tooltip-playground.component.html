<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Content</label>
        <app-input type="text" [(ngModel)]="pgConfig.content" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (change)="updateConfig()"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Top Left', value: 'top-left' },
            { label: 'Top Right', value: 'top-right' },
            { label: 'Bottom', value: 'bottom' },
            { label: 'Bottom Left', value: 'bottom-left' },
            { label: 'Bottom Right', value: 'bottom-right' },
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
            { label: 'Auto', value: 'auto' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Trigger</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.trigger"
          (change)="updateConfig()"
          [options]="[
            { label: 'Hover', value: 'hover' },
            { label: 'Click', value: 'click' },
            { label: 'Focus', value: 'focus' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Dark', value: 'dark' },
            { label: 'Light', value: 'light' },
            { label: 'Primary', value: 'primary' },
            { label: 'Info', value: 'info' },
            { label: 'Success', value: 'success' },
            { label: 'Warning', value: 'warning' },
            { label: 'Error', value: 'error' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Shape</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.shape"
          (change)="updateConfig()"
          [options]="[
            { label: 'Rounded', value: 'rounded' },
            { label: 'Square', value: 'square' },
            { label: 'Pill', value: 'pill' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animation"
          (change)="updateConfig()"
          [options]="[
            { label: 'Fade', value: 'fade' },
            { label: 'Slide', value: 'slide' },
            { label: 'Scale', value: 'scale' },
            { label: 'Bounce', value: 'bounce' },
            { label: 'None', value: 'none' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Max Width (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.maxWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Offset (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.offset" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Elevation (0-5)</label>
        <app-input type="number" [(ngModel)]="pgConfig.elevation" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Arrow Size (px)</label>
        <app-input type="number" [(ngModel)]="pgConfig.arrowSize" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Show Delay (ms)</label>
        <app-input type="number" [(ngModel)]="pgConfig.showDelay" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Hide Delay (ms)</label>
        <app-input type="number" [(ngModel)]="pgConfig.hideDelay" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Transition Duration (ms)</label>
        <app-input
          type="number"
          [(ngModel)]="pgConfig.transitionDuration"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Transition Timing</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.transitionTiming"
          (change)="updateConfig()"
          [options]="[
            { label: 'Ease', value: 'ease' },
            { label: 'Linear', value: 'linear' },
            { label: 'Ease In', value: 'ease-in' },
            { label: 'Ease Out', value: 'ease-out' },
            { label: 'Ease In Out', value: 'ease-in-out' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Target Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.targetText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Target Icon Class</label>
        <app-input type="text" [(ngModel)]="pgConfig.targetIcon" (input)="updateConfig()" />
      </div>

      <div class="control-group" *ngIf="pgConfig.useCustomColor">
        <label>Custom BG Color</label>
        <input
          type="color"
          [(ngModel)]="pgConfig.customColor"
          (input)="updateConfig()"
          style="height: 40px; width: 100%; cursor: pointer"
        />
      </div>

      <div class="control-group" *ngIf="pgConfig.useCustomColor">
        <label>Custom Text Color</label>
        <input
          type="color"
          [(ngModel)]="pgConfig.textColor"
          (input)="updateConfig()"
          style="height: 40px; width: 100%; cursor: pointer"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.arrow" (change)="updateConfig()" /> Show Arrow
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.interactive" (change)="updateConfig()" />
        Interactive
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.followCursor" (change)="updateConfig()" />
        Follow Cursor
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.html" (change)="updateConfig()" /> HTML Content
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showGlow" (change)="updateConfig()" /> Glow Effect
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.trackMouse" (change)="updateConfig()" /> Track Mouse
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.openAtMousePosition" (change)="updateConfig()" /> Open
        at Mouse
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoShift" (change)="updateConfig()" /> Auto Shift
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.portal" (change)="updateConfig()" /> Portal
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.useCustomColor" (change)="updateConfig()" /> Use Custom
        Colors
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="preview-stage">
      <div class="tooltip-target-wrapper">
        <app-tooltip
          [content]="pgConfig.content"
          [position]="pgConfig.position"
          [trigger]="pgConfig.trigger"
          [variant]="pgConfig.variant"
          [shape]="pgConfig.shape"
          [animation]="pgConfig.animation"
          [arrow]="pgConfig.arrow"
          [maxWidth]="pgConfig.maxWidth"
          [showDelay]="pgConfig.showDelay"
          [hideDelay]="pgConfig.hideDelay"
          [interactive]="pgConfig.interactive"
          [followCursor]="pgConfig.followCursor"
          [html]="pgConfig.html"
          [showGlow]="pgConfig.showGlow"
          [customColor]="pgConfig.useCustomColor ? pgConfig.customColor : ''"
          [textColor]="pgConfig.useCustomColor ? pgConfig.textColor : ''"
          [elevation]="pgConfig.elevation"
          [offset]="pgConfig.offset"
          [transitionDuration]="pgConfig.transitionDuration"
          [transitionTiming]="pgConfig.transitionTiming"
          [arrowSize]="pgConfig.arrowSize"
          [trackMouse]="pgConfig.trackMouse"
          [openAtMousePosition]="pgConfig.openAtMousePosition"
          [autoShift]="pgConfig.autoShift"
          [portal]="pgConfig.portal"
        >
          <ui-button slot="target" class="playground-target-btn">
            <i [class]="pgConfig.targetIcon"></i>
            {{ pgConfig.targetText }}
          </ui-button>
        </app-tooltip>
      </div>
    </div>

    <ui-code-preview
      *ngIf="showCode"
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  </div>
</div>
