<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-layout" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="fullSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Display</label>
      <ui-input
        type="number"
        min="1"
        max="10"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-style" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-avatar-group
      #avatarGroupElement
      [attr.size]="pgConfig.size"
      [attr.max]="pgConfig.max"
      [attr.shape]="pgConfig.shape"
    >
      <ui-avatar label="JD" [attr.size]="pgConfig.size" [attr.shape]="pgConfig.shape"></ui-avatar>
      <ui-avatar label="AB" [attr.size]="pgConfig.size" [attr.shape]="pgConfig.shape"></ui-avatar>
      <ui-avatar label="CD" [attr.size]="pgConfig.size" [attr.shape]="pgConfig.shape"></ui-avatar>
      <ui-avatar label="EF" [attr.size]="pgConfig.size" [attr.shape]="pgConfig.shape"></ui-avatar>
      <ui-avatar label="GH" [attr.size]="pgConfig.size" [attr.shape]="pgConfig.shape"></ui-avatar>
    </ui-avatar-group>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
