<div class="demo-container">
  <app-demo-header
    icon="👥"
    title="Avatar Group"
    description="Display multiple avatars in a compact, overlapping layout. Perfect for showing team members, collaborators, or participants with automatic overflow handling."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-avatar-group-playground></app-avatar-group-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Sizes -->
          <section class="demo-section" id="sizes" style="margin-top: 0">
            <div class="section-header">
              <h2>📏 Sizes</h2>
              <p>Choose from small, medium, or large avatar groups.</p>
            </div>
            <div class="demo-card">
              <div style="display: flex; flex-direction: column; gap: 32px">
                <div>
                  <span style="display: block; margin-bottom: 12px; font-weight: 600">Small</span>
                  <ui-avatar-group size="small">
                    <ui-avatar label="JD" size="small"></ui-avatar>
                    <ui-avatar label="AB" size="small"></ui-avatar>
                    <ui-avatar label="CD" size="small"></ui-avatar>
                  </ui-avatar-group>
                </div>
                <div>
                  <span style="display: block; margin-bottom: 12px; font-weight: 600">Medium</span>
                  <ui-avatar-group size="medium">
                    <ui-avatar label="JD" size="medium"></ui-avatar>
                    <ui-avatar label="AB" size="medium"></ui-avatar>
                    <ui-avatar label="CD" size="medium"></ui-avatar>
                  </ui-avatar-group>
                </div>
                <div>
                  <span style="display: block; margin-bottom: 12px; font-weight: 600">Large</span>
                  <ui-avatar-group size="large">
                    <ui-avatar label="JD" size="large"></ui-avatar>
                    <ui-avatar label="AB" size="large"></ui-avatar>
                    <ui-avatar label="CD" size="large"></ui-avatar>
                  </ui-avatar-group>
                </div>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="sizesCode"
              [label]="'Size Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="avatar-group"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
