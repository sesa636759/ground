<div class="playground-layout">
  <div class="playground-controls">
    <ui-accordion items='[{"id":"config","title":"Configuration","icon":"⚙️"}]' defaultOpen='["config"]' multiple>
      <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Name</label>
        <app-input
          type="text"
          [(ngModel)]="pgConfig.name"
          (ngModelChange)="updateConfig()"
          placeholder="Name"
        />
      </div>

      <div class="control-group">
        <label>Image Source (URL)</label>
        <app-input
          type="text"
          [(ngModel)]="pgConfig.src"
          (ngModelChange)="updateConfig()"
          placeholder="https://..."
        />
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'XS (24px)', value: 'xs' },
            { label: 'Small (32px)', value: 's' },
            { label: 'Medium (40px)', value: 'medium' },
            { label: 'Large (48px)', value: 'l' },
            { label: 'XL (64px)', value: 'xl' },
            { label: 'Custom (80px)', value: '80' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Shape</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.shape"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Circle', value: 'circle' },
            { label: 'Square', value: 'square' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Icon Class</label>
        <app-input
          type="text"
          [(ngModel)]="pgConfig.icon"
          (ngModelChange)="updateConfig()"
          placeholder="fa-solid fa-user"
        />
      </div>

      <div class="control-group">
        <label>Tooltip Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.tooltipText" (ngModelChange)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Background Color</label>
        <app-input
          type="color"
          [(ngModel)]="pgConfig.bgColor"
          (ngModelChange)="updateConfig()"
          style="height: 40px; padding: 0"
        />
      </div>

      <div class="control-group">
        <label>Text Color</label>
        <app-input
          type="color"
          [(ngModel)]="pgConfig.textColor"
          (ngModelChange)="updateConfig()"
          style="height: 40px; padding: 0"
        />
      </div>

      <div class="control-group">
        <label>Status</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.status"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Online', value: 'online' },
            { label: 'Offline', value: 'offline' },
            { label: 'Away', value: 'away' },
            { label: 'Busy', value: 'busy' },
            { label: 'Do Not Disturb', value: 'dnd' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Status Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.statusPosition"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Top Left', value: 'top-left' },
            { label: 'Top Right', value: 'top-right' },
            { label: 'Bottom Left', value: 'bottom-left' },
            { label: 'Bottom Right', value: 'bottom-right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animation"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'None', value: 'none' },
            { label: 'Pulse', value: 'pulse' },
            { label: 'Bounce', value: 'bounce' },
            { label: 'Shake', value: 'shake' },
          ]"
        ></ui-dropdown>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showStatus" (ngModelChange)="updateConfig()" /> Show Status
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.verified" (ngModelChange)="updateConfig()" /> Verified
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()" /> Loading
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.editable" (ngModelChange)="updateConfig()" /> Editable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.autoColor" (ngModelChange)="updateConfig()" /> Auto Color
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.gradient" (ngModelChange)="updateConfig()" /> Gradient
      </label>
    </div>
        </div>
    </ui-accordion>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="avatar-container">
        <app-avatar
          [attr.name]="pgConfig.name"
          [attr.src]="pgConfig.src"
          [attr.size]="pgConfig.size === 'medium' ? null : pgConfig.size"
          [attr.shape]="pgConfig.shape === 'circle' ? null : pgConfig.shape"
          [attr.bg-color]="pgConfig.bgColor"
          [attr.color]="pgConfig.textColor"
          [attr.icon]="pgConfig.icon"
          [attr.tooltip-text]="pgConfig.tooltipText"
          [attr.show-status]="pgConfig.showStatus"
          [attr.status]="pgConfig.status"
          [attr.status-position]="pgConfig.statusPosition"
          [attr.verified]="pgConfig.verified"
          [attr.loading]="pgConfig.loading"
          [attr.editable]="pgConfig.editable"
          [attr.auto-color]="pgConfig.autoColor"
          [attr.gradient]="pgConfig.gradient"
          [attr.animation]="pgConfig.animation === 'none' ? null : pgConfig.animation"
          (click)="onAction($event)"
          (upload)="onUpload($event)"
        ></app-avatar>
      </div>
    </div>

    
  
      <ui-code-preview [htmlCode]="generatedCode()" [label]="'Generated Code'" activeLang="html" expanded="true"></ui-code-preview>
    </div>
</div>
