<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="pgConfig.name"
          (input)="updateConfig()"
          placeholder="Name"
        />
      </div>

      <div class="control-group">
        <label>Image Source (URL)</label>
        <input
          type="text"
          [(ngModel)]="pgConfig.src"
          (input)="updateConfig()"
          placeholder="https://..."
        />
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="xs">XS (24px)</option>
          <option value="s">Small (32px)</option>
          <option value="medium">Medium (40px)</option>
          <option value="l">Large (48px)</option>
          <option value="xl">XL (64px)</option>
          <option value="80">Custom (80px)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Shape</label>
        <select [(ngModel)]="pgConfig.shape" (change)="updateConfig()">
          <option value="circle">Circle</option>
          <option value="square">Square</option>
        </select>
      </div>

      <div class="control-group">
        <label>Icon Class</label>
        <input
          type="text"
          [(ngModel)]="pgConfig.icon"
          (input)="updateConfig()"
          placeholder="fa-solid fa-user"
        />
      </div>

      <div class="control-group">
        <label>Tooltip Text</label>
        <input type="text" [(ngModel)]="pgConfig.tooltipText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Background Color</label>
        <input
          type="color"
          [(ngModel)]="pgConfig.bgColor"
          (input)="updateConfig()"
          style="height: 40px; padding: 0"
        />
      </div>

      <div class="control-group">
        <label>Text Color</label>
        <input
          type="color"
          [(ngModel)]="pgConfig.textColor"
          (input)="updateConfig()"
          style="height: 40px; padding: 0"
        />
      </div>

      <div class="control-group">
        <label>Status</label>
        <select [(ngModel)]="pgConfig.status" (change)="updateConfig()">
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="away">Away</option>
          <option value="busy">Busy</option>
          <option value="dnd">Do Not Disturb</option>
        </select>
      </div>

      <div class="control-group">
        <label>Status Position</label>
        <select [(ngModel)]="pgConfig.statusPosition" (change)="updateConfig()">
          <option value="top-left">Top Left</option>
          <option value="top-right">Top Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="bottom-right">Bottom Right</option>
        </select>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <select [(ngModel)]="pgConfig.animation" (change)="updateConfig()">
          <option value="none">None</option>
          <option value="pulse">Pulse</option>
          <option value="bounce">Bounce</option>
          <option value="shake">Shake</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showStatus" (change)="updateConfig()" /> Show
        Status
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.verified" (change)="updateConfig()" /> Verified
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.loading" (change)="updateConfig()" /> Loading
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.editable" (change)="updateConfig()" /> Editable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.autoColor" (change)="updateConfig()" /> Auto
        Color
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.gradient" (change)="updateConfig()" /> Gradient
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="avatar-container">
        <app-avatar
          [attr.name]="pgConfig.name"
          [attr.src]="pgConfig.src"
          [attr.size]="pgConfig.size === 'medium' ? null : pgConfig.size"
          [attr.shape]="pgConfig.shape === 'circle' ? null : pgConfig.shape"
          [attr.bg-color]="pgConfig.bgColor"
          [attr.color]="pgConfig.textColor"
          [attr.icon]="pgConfig.icon"
          [attr.tooltip-text]="pgConfig.tooltipText"
          [attr.show-status]="pgConfig.showStatus"
          [attr.status]="pgConfig.status"
          [attr.status-position]="pgConfig.statusPosition"
          [attr.verified]="pgConfig.verified"
          [attr.loading]="pgConfig.loading"
          [attr.editable]="pgConfig.editable"
          [attr.auto-color]="pgConfig.autoColor"
          [attr.gradient]="pgConfig.gradient"
          [attr.animation]="pgConfig.animation === 'none' ? null : pgConfig.animation"
          (click)="onAction($event)"
          (upload)="onUpload($event)"
        ></app-avatar>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
