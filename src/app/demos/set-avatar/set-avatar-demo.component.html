<div class="demo-container">
  <h1>👤 Avatar Component Demo</h1>

  <demo-tabs [variants]="exampleVariants" (variantChange)="scrollToSection($event)">
    <!-- Playground Slot -->
    <div slot="playground">
      <app-avatar-playground></app-avatar-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples">
      <!-- Basic Shapes & Sizes -->
      <app-example-section
        id="basic"
        title="Basic Shapes & Sizes"
        description="Three sizes and two shapes are available"
        [code]="basicCode"
      >
        <div class="demo-grid col-3">
          <app-avatar name="LC" size="large" shape="circle"></app-avatar>
          <app-avatar name="DC" size="default" shape="circle"></app-avatar>
          <app-avatar name="SC" size="small" shape="circle"></app-avatar>
          <app-avatar name="LS" size="large" shape="square"></app-avatar>
          <app-avatar name="DS" size="default" shape="square"></app-avatar>
          <app-avatar name="SS" size="small" shape="square"></app-avatar>
        </div>
      </app-example-section>

      <!-- Avatar Types -->
      <app-example-section
        id="types"
        title="Avatar Types"
        description="Image, Icon and letter are supported"
        [code]="typesCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar icon="fa fa-user" name="Icon with Tooltip" size="64px"></app-avatar>
          <app-avatar name="John Doe" size="64px"></app-avatar>
          <app-avatar name="Christopher Alexander" size="64px"></app-avatar>
          <app-avatar
            src="https://api.dicebear.com/7.x/miniavs/svg?seed=1"
            name="Image"
            size="64px"
          ></app-avatar>
        </div>
      </app-example-section>

      <!-- Sizes -->
      <app-example-section
        id="sizes"
        title="Sizes"
        description="Standard t-shirt sizes and custom numeric values"
        [code]="sizesCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="XS" size="xs"></app-avatar>
          <app-avatar name="S" size="s"></app-avatar>
          <app-avatar name="M" size="m"></app-avatar>
          <app-avatar name="L" size="l"></app-avatar>
          <app-avatar name="XL" size="xl"></app-avatar>
          <app-avatar name="C" size="80px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Auto-scale Font Size -->
      <app-example-section
        id="auto-scale"
        title="Auto-scale Font Size"
        description="Automatically adjust font size for long text"
        [code]="autoScaleCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="A" size="64px"></app-avatar>
          <app-avatar name="AB" size="64px"></app-avatar>
          <app-avatar name="ABC" size="64px"></app-avatar>
          <app-avatar name="ABCD" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- With Badge -->
      <app-example-section
        id="badge"
        title="With Badge"
        description="Usually used for reminders and notifications"
        [code]="badgeCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" badge="1" size="64px"></app-avatar>
          <app-avatar name="User" badge="99+" size="64px" badge-color="#ef4444"></app-avatar>
          <app-avatar name="User" badge="dot" size="64px" badge-color="#10b981"></app-avatar>
        </div>
      </app-example-section>

      <!-- Avatar Groups -->
      <app-example-section
        id="avatar-group"
        title="Avatar Groups"
        description="Avatar group display with overlap effect"
        [code]="avatarGroupCode"
      >
        <app-avatar-group max="3">
          <app-avatar src="https://i.pravatar.cc/150?u=user1" name="User 1"></app-avatar>
          <app-avatar src="https://i.pravatar.cc/150?u=user2" name="User 2"></app-avatar>
          <app-avatar src="https://i.pravatar.cc/150?u=user3" name="User 3"></app-avatar>
          <app-avatar src="https://i.pravatar.cc/150?u=user4" name="User 4"></app-avatar>
          <app-avatar src="https://i.pravatar.cc/150?u=user5" name="User 5"></app-avatar>
          <app-avatar src="https://i.pravatar.cc/150?u=user6" name="User 6"></app-avatar>
        </app-avatar-group>
      </app-example-section>

      <!-- Custom Colors -->
      <app-example-section
        id="custom-colors"
        title="Custom Colors"
        description="Avatars with different background and text colors"
        [code]="customColorsCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="Red" bg-color="#ef4444" text-color="white" size="64px"></app-avatar>
          <app-avatar name="Blue" bg-color="#3b82f6" text-color="white" size="64px"></app-avatar>
          <app-avatar name="Green" bg-color="#10b981" text-color="white" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Responsive Size -->
      <app-example-section
        id="responsive"
        title="Responsive Size"
        description="Avatar size based on screen size"
        [code]="responsiveCode"
      >
        <app-avatar name="Responsive" size="responsive"></app-avatar>
      </app-example-section>

      <!-- User Status Indicators -->
      <app-example-section
        id="status"
        title="Status Indicators"
        description="Avatars with online status indicators"
        [code]="statusCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="Online" status="online" size="64px"></app-avatar>
          <app-avatar name="Offline" status="offline" size="64px"></app-avatar>
          <app-avatar name="Away" status="away" size="64px"></app-avatar>
          <app-avatar name="Busy" status="busy" size="64px"></app-avatar>
          <app-avatar name="DND" status="dnd" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Custom Borders -->
      <app-example-section
        id="borders"
        title="Custom Borders"
        description="Avatars with custom borders"
        [code]="bordersCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" border="2px solid #3b82f6" size="64px"></app-avatar>
          <app-avatar name="User" border="3px dashed #ef4444" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Tooltips and Popovers -->
      <app-example-section
        id="tooltips"
        title="Tooltips and Popovers"
        description="Hover over individual avatars to see tooltips"
        [code]="tooltipsCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="John Doe" tooltip="Software Engineer" size="64px"></app-avatar>
          <app-avatar name="Jane Smith" tooltip="Product Manager" size="64px"></app-avatar>
          <app-avatar name="Bob Johnson" tooltip="Designer" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Different Icons -->
      <app-example-section
        id="icons"
        title="Different Icons"
        description="Various icons in avatars"
        [code]="iconsCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar icon="fa fa-user" size="64px"></app-avatar>
          <app-avatar icon="fa fa-star" size="64px"></app-avatar>
          <app-avatar icon="fa fa-heart" size="64px"></app-avatar>
          <app-avatar icon="👤" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Badge Overlay -->
      <app-example-section
        id="badge-overlay"
        title="Badge Overlay"
        description="Custom-positioned badges"
        [code]="badgeOverlayCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" badge="3" badge-position="top-right" size="64px"></app-avatar>
          <app-avatar
            name="User"
            badge="99+"
            badge-position="bottom-right"
            badge-color="#ef4444"
            size="64px"
          ></app-avatar>
          <app-avatar
            name="User"
            badge="NEW"
            badge-position="top-left"
            badge-color="#10b981"
            size="64px"
          ></app-avatar>
          <app-avatar
            name="User"
            badge="!"
            badge-position="bottom-left"
            badge-color="#ef4444"
            size="64px"
          ></app-avatar>
        </div>
      </app-example-section>

      <!-- Verified Badge -->
      <app-example-section
        id="verified"
        title="Verified Badge"
        description="Show verification status"
        [code]="verifiedCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="Verified User" verified size="64px"></app-avatar>
          <app-avatar
            src="https://i.pravatar.cc/150?u=verified"
            name="Verified"
            verified
            size="64px"
          ></app-avatar>
        </div>
      </app-example-section>

      <!-- Editable/Upload -->
      <app-example-section
        id="editable"
        title="Editable/Upload"
        description="Allow users to upload images"
        [code]="editableCode"
      >
        <app-avatar name="User" editable size="80px"></app-avatar>
      </app-example-section>

      <!-- Loading State -->
      <app-example-section
        id="loading"
        title="Loading State"
        description="Show loading spinner"
        [code]="loadingCode"
      >
        <app-avatar name="Loading" loading size="64px"></app-avatar>
      </app-example-section>

      <!-- Image Fit Options -->
      <app-example-section
        id="image-fit"
        title="Image Fit Options"
        description="Control how images fit"
        [code]="imageFitCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar src="https://i.pravatar.cc/150?u=cover" fit="cover" size="64px"></app-avatar>
          <app-avatar
            src="https://i.pravatar.cc/150?u=contain"
            fit="contain"
            size="64px"
          ></app-avatar>
        </div>
      </app-example-section>

      <!-- Auto Color from Name -->
      <app-example-section
        id="auto-color"
        title="Auto Color from Name"
        description="Generate color from user name"
        [code]="autoColorCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="Alice Anderson" auto-color size="64px"></app-avatar>
          <app-avatar name="Bob Baker" auto-color size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Gradient Backgrounds -->
      <app-example-section
        id="gradients"
        title="Gradient Backgrounds"
        description="Use gradient colors"
        [code]="gradientsCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" gradient="default" size="64px"></app-avatar>
          <app-avatar
            name="User"
            gradient="custom"
            gradient-colors="#667eea,#764ba2"
            size="64px"
          ></app-avatar>
          <app-avatar
            name="User"
            gradient="blue"
            gradient-colors="#4facfe,#00f2fe"
            size="64px"
          ></app-avatar>
        </div>
      </app-example-section>

      <!-- Animations -->
      <app-example-section
        id="animations"
        title="Animations"
        description="Add visual animations"
        [code]="animationsCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="Pulse" animation="pulse" size="64px"></app-avatar>
          <app-avatar name="Ring" animation="ring" size="64px"></app-avatar>
          <app-avatar name="Glow" animation="glow" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Clickable Avatars -->
      <app-example-section
        id="clickable"
        title="Clickable Avatars"
        description="Interactive avatars"
        [code]="clickableCode"
      >
        <app-avatar name="Click Me" clickable size="64px" (click)="handleClick()"></app-avatar>
      </app-example-section>

      <!-- Ring Color -->
      <app-example-section
        id="ring-color"
        title="Ring Color"
        description="Custom colored rings"
        [code]="ringColorCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" ring-color="#3b82f6" size="64px"></app-avatar>
          <app-avatar name="User" ring-color="#ef4444" size="64px"></app-avatar>
          <app-avatar name="User" ring-color="#10b981" size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Lazy Loading -->
      <app-example-section
        id="lazy-loading"
        title="Lazy Loading"
        description="Load only when visible"
        [code]="lazyLoadingCode"
      >
        <app-avatar src="https://i.pravatar.cc/150?u=lazy" lazy-load size="64px"></app-avatar>
      </app-example-section>

      <!-- Premium Features -->
      <app-example-section
        id="premium"
        title="Premium Features"
        description="High-end UX enhancements"
        [code]="premiumCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" story-ring size="64px"></app-avatar>
          <app-avatar name="User" story-seen size="64px"></app-avatar>
          <app-avatar name="User" active-speaker size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Premium Showcase -->
      <app-example-section
        id="premium-showcase"
        title="Premium Showcase"
        description="Advanced effects"
        [code]="premiumShowcaseCode"
      >
        <div class="demo-flex-wrap">
          <app-avatar name="User" skeleton shimmer size="64px"></app-avatar>
          <app-avatar name="User" glassmorphism size="64px"></app-avatar>
        </div>
      </app-example-section>

      <!-- Animated Groups -->
      <app-example-section
        id="animated-groups"
        title="Animated Groups"
        description="Smooth shifting hover effect"
        [code]="animatedGroupsCode"
      >
        <app-avatar-group animated max="5">
          <app-avatar name="User 1" size="56px"></app-avatar>
          <app-avatar name="User 2" size="56px"></app-avatar>
          <app-avatar name="User 3" size="56px"></app-avatar>
          <app-avatar name="User 4" size="56px"></app-avatar>
          <app-avatar name="User 5" size="56px"></app-avatar>
          <app-avatar name="User 6" size="56px"></app-avatar>
        </app-avatar-group>
      </app-example-section>
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <app-component-documentation componentId="avatar"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
