<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.type"
          (change)="updateConfig()"
          [options]="[
            { label: 'No Data', value: 'no-data' },
            { label: 'No Results', value: 'no-results' },
            { label: 'Error', value: 'error' },
            { label: '404 Not Found', value: '404' },
            { label: 'Empty', value: 'empty' },
            { label: 'Coming Soon', value: 'coming-soon' },
            { label: 'Maintenance', value: 'maintenance' },
            { label: 'Custom', value: 'custom' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Premium Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Alignment</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.align"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Center', value: 'center' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group full-width">
        <label>Heading</label>
        <app-input
          type="text"
          [(ngModel)]="pgConfig.heading"
          (input)="updateConfig()"
          placeholder="Default"
        />
      </div>

      <div class="control-group full-width">
        <label>Message</label>
        <textarea
          [(ngModel)]="pgConfig.message"
          (input)="updateConfig()"
          placeholder="Default"
          rows="3"
        ></textarea>
      </div>

      <div class="control-group full-width">
        <label>Primary Action</label>
        <app-input type="text" [(ngModel)]="pgConfig.primaryAction" (input)="updateConfig()" />
      </div>

      <div class="control-group full-width">
        <label>Secondary Action</label>
        <app-input type="text" [(ngModel)]="pgConfig.secondaryAction" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.rounded" (change)="updateConfig()" /> Rounded
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.elevated" (change)="updateConfig()" /> Elevated
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showBackButton" (change)="updateConfig()" />
        Show Back Button
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.loadingAction" (change)="updateConfig()" />
        Loading State
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="empty-state-container">
        <app-empty-state
          [attr.type]="pgConfig.type"
          [attr.variant]="pgConfig.variant"
          [attr.size]="pgConfig.size"
          [attr.align]="pgConfig.align"
          [attr.heading]="pgConfig.heading || null"
          [attr.message]="pgConfig.message || null"
          [attr.illustration]="pgConfig.illustration || null"
          [attr.rounded]="pgConfig.rounded"
          [attr.elevated]="pgConfig.elevated"
          [attr.compact]="pgConfig.compact"
          [attr.animated]="pgConfig.animated"
          [attr.show-back-button]="pgConfig.showBackButton"
          [attr.primary-action]="pgConfig.primaryAction || null"
          [attr.primary-action-icon]="pgConfig.primaryActionIcon"
          [attr.secondary-action]="pgConfig.secondaryAction || null"
          [attr.secondary-action-icon]="pgConfig.secondaryActionIcon"
          [attr.loading-action]="pgConfig.loadingAction ? 'primary' : null"
          (actionClick)="onActionClick($event)"
          (backClick)="onBackClick($event)"
        ></app-empty-state>
      </div>
    </div>

    <ui-code-preview [htmlCode]="generatedCode()" [label]="'Generated Code'" activeLang="html" expanded="true"></ui-code-preview>
  </div>
</div>
