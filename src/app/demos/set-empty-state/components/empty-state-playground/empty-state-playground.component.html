<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Type</label>
        <select [(ngModel)]="pgConfig.type" (change)="updateConfig()">
          <option value="no-data">No Data</option>
          <option value="no-results">No Results</option>
          <option value="error">Error</option>
          <option value="404">404 Not Found</option>
          <option value="empty">Empty</option>
          <option value="coming-soon">Coming Soon</option>
          <option value="maintenance">Maintenance</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="outlined">Outlined</option>
          <option value="filled">Filled</option>
          <option value="minimal">Minimal</option>
          <option value="glass">Premium Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Alignment</label>
        <select [(ngModel)]="pgConfig.align" (change)="updateConfig()">
          <option value="left">Left</option>
          <option value="center">Center</option>
          <option value="right">Right</option>
        </select>
      </div>

      <div class="control-group full-width">
        <label>Heading</label>
        <input
          type="text"
          [(ngModel)]="pgConfig.heading"
          (input)="updateConfig()"
          placeholder="Default"
        />
      </div>

      <div class="control-group full-width">
        <label>Message</label>
        <textarea
          [(ngModel)]="pgConfig.message"
          (input)="updateConfig()"
          placeholder="Default"
          rows="3"
        ></textarea>
      </div>

      <div class="control-group full-width">
        <label>Primary Action</label>
        <input type="text" [(ngModel)]="pgConfig.primaryAction" (input)="updateConfig()" />
      </div>

      <div class="control-group full-width">
        <label>Secondary Action</label>
        <input type="text" [(ngModel)]="pgConfig.secondaryAction" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.rounded" (change)="updateConfig()" /> Rounded
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.elevated" (change)="updateConfig()" /> Elevated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showBackButton" (change)="updateConfig()" />
        Show Back Button
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.loadingAction" (change)="updateConfig()" />
        Loading State
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="empty-state-container">
        <app-empty-state
          [attr.type]="pgConfig.type"
          [attr.variant]="pgConfig.variant"
          [attr.size]="pgConfig.size"
          [attr.align]="pgConfig.align"
          [attr.heading]="pgConfig.heading || null"
          [attr.message]="pgConfig.message || null"
          [attr.illustration]="pgConfig.illustration || null"
          [attr.rounded]="pgConfig.rounded"
          [attr.elevated]="pgConfig.elevated"
          [attr.compact]="pgConfig.compact"
          [attr.animated]="pgConfig.animated"
          [attr.show-back-button]="pgConfig.showBackButton"
          [attr.primary-action]="pgConfig.primaryAction || null"
          [attr.primary-action-icon]="pgConfig.primaryActionIcon"
          [attr.secondary-action]="pgConfig.secondaryAction || null"
          [attr.secondary-action-icon]="pgConfig.secondaryActionIcon"
          [attr.loading-action]="pgConfig.loadingAction ? 'primary' : null"
          (actionClick)="onActionClick($event)"
          (backClick)="onBackClick($event)"
        ></app-empty-state>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
