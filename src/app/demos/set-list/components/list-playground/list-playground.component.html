<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="text">Text</option>
          <option value="filled">Filled</option>
          <option value="outlined">Outlined</option>
          <option value="soft">Soft</option>
        </select>
      </div>

      <div class="control-group">
        <label>Color</label>
        <select [(ngModel)]="pgConfig.color" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="success">Success</option>
          <option value="danger">Danger</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Item Label</label>
        <input type="text" [(ngModel)]="pgConfig.itemLabel" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Sublabel</label>
        <input type="text" [(ngModel)]="pgConfig.itemSublabel" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Icon (FA Class)</label>
        <input type="text" [(ngModel)]="pgConfig.itemIcon" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Action Icon</label>
        <input type="text" [(ngModel)]="pgConfig.itemActionIcon" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Badge Text</label>
        <input type="text" [(ngModel)]="pgConfig.itemBadge" (input)="updateConfig()" />
      </div>
      <div class="control-group">
        <label>Counter Value</label>
        <input type="number" [(ngModel)]="pgConfig.itemCounter" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.dense" (change)="updateConfig()" /> Dense
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.dividers" (change)="updateConfig()" /> Dividers
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.flush" (change)="updateConfig()" /> Flush
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.horizontal" (change)="updateConfig()" />
        Horizontal
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.numbered" (change)="updateConfig()" /> Numbered
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.grouped" (change)="updateConfig()" /> Grouped
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.selectable" (change)="updateConfig()" />
        Selectable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.rounded" (change)="updateConfig()" /> Rounded
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.elevated" (change)="updateConfig()" /> Elevated
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="list-container">
        <app-list
          [attr.variant]="pgConfig.variant"
          [attr.color]="pgConfig.color"
          [attr.size]="pgConfig.size"
          [attr.dense]="pgConfig.dense"
          [attr.dividers]="pgConfig.dividers"
          [attr.flush]="pgConfig.flush"
          [attr.horizontal]="pgConfig.horizontal"
          [attr.numbered]="pgConfig.numbered"
          [attr.grouped]="pgConfig.grouped"
          [attr.selectable]="pgConfig.selectable"
          [attr.rounded]="pgConfig.rounded"
          [attr.elevated]="pgConfig.elevated"
          (onItemClick)="onItemClick($event)"
        >
          <!-- Hardcoding items for preview, using config values -->
          <app-list-item
            [attr.label]="pgConfig.itemLabel + ' 1'"
            [attr.sublabel]="pgConfig.itemSublabel"
            [attr.icon]="pgConfig.itemIcon"
            [attr.action-icon]="pgConfig.itemActionIcon"
            [attr.badge]="pgConfig.itemBadge"
            [attr.badge-color]="pgConfig.itemBadgeColor"
          ></app-list-item>

          <app-list-item
            [attr.label]="pgConfig.itemLabel + ' 2'"
            [attr.sublabel]="pgConfig.itemSublabel"
            [attr.icon]="pgConfig.itemIcon"
            [attr.action-icon]="pgConfig.itemActionIcon"
            [attr.counter]="pgConfig.itemCounter"
          ></app-list-item>

          <app-list-item
            [attr.label]="pgConfig.itemLabel + ' 3'"
            [attr.sublabel]="pgConfig.itemSublabel"
            [attr.icon]="pgConfig.itemIcon"
            [attr.action-icon]="pgConfig.itemActionIcon"
            [attr.disabled]="pgConfig.itemDisabled"
          ></app-list-item>
        </app-list>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
