<div class="demo-container">
  <app-demo-header
    icon="🔢"
    title="OTP Input Component"
    description="Flexible one-time password input component with support for various lengths, styles, validation, masking, and advanced features like grouping and auto-submission."
  >
  </app-demo-header>
  <demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <aside class="examples-sidebar">
        <div class="sidebar-title">Sections</div>
        <div class="sidebar-nav">
          <ui-anchor
            [links]="anchorLinks"
            scroll-container=".pane-examples"
            type="line"
            show-progress
          ></ui-anchor>
        </div>
      </aside>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Default OTP -->
        <app-example-section
          id="default"
          title="Default OTP - 6 Digits"
          description="Basic 6-digit OTP input with autofocus"
          [code]="defaultCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [autofocus]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- 4-Digit PIN -->
        <app-example-section
          id="four-digit"
          title="4-Digit PIN Code"
          description="PIN input with numeric type"
          [code]="fourDigitCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="4" type="numeric" label="Enter PIN"></app-otp-input>
          </div>
        </app-example-section>

        <!-- 6-Digit Verification -->
        <app-example-section
          id="six-digit"
          title="6-Digit Verification Code"
          description="Standard verification code input"
          [code]="sixDigitCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" type="numeric" label="Verification Code"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Custom Length -->
        <app-example-section
          id="custom-length"
          title="8-Character Custom Length"
          description="Custom length with alphanumeric support"
          [code]="customLengthCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="8" type="alphanumeric" label="Long Code"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Default Variant -->
        <app-example-section
          id="default-variant"
          title="Default Style"
          description="Standard appearance variant"
          [code]="defaultVariantCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input variant="default" length="6" label="Default"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Underlined -->
        <app-example-section
          id="underlined"
          title="Underlined Style"
          description="Minimal design with bottom border"
          [code]="underlinedCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input variant="underlined" length="6" label="Underlined"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Flushed -->
        <app-example-section
          id="flushed"
          title="Flushed Style"
          description="Clean appearance without background"
          [code]="flushedCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input variant="flushed" length="6" label="Flushed"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Separated -->
        <app-example-section
          id="separated"
          title="Separated Variant"
          description="Individual boxes with spacing"
          [code]="separatedCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input
              variant="separated"
              length="6"
              label="Separated"
              [spacing]="8"
            ></app-otp-input>
          </div>
        </app-example-section>

        <!-- Success Color -->
        <app-example-section
          id="success-color"
          title="Success State"
          description="Visual feedback for valid input"
          [code]="successColorCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" color="success" helper-text="Code accepted"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Error Color -->
        <app-example-section
          id="error-color"
          title="Error State"
          description="Visual feedback for invalid input"
          [code]="errorColorCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input
              length="6"
              color="error"
              invalid="true"
              error-text="Invalid code"
            ></app-otp-input>
          </div>
        </app-example-section>

        <!-- Warning Color -->
        <app-example-section
          id="warning-color"
          title="Warning State"
          description="Visual feedback for cautionary state"
          [code]="warningColorCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" color="warning" label="Warning"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Info Color -->
        <app-example-section
          id="info-color"
          title="Info State"
          description="Visual feedback for informational state"
          [code]="infoColorCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" color="info" helper-text="Check email"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Grouping 3-3 -->
        <app-example-section
          id="grouping-3"
          title="Grouped 3-3"
          description="Grouping input into 3-3 format with divider"
          [code]="grouping3Code()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" group-size="3" [show-group-divider]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Grouping 2-2-2 -->
        <app-example-section
          id="grouping-222"
          title="Grouped 2-2-2"
          description="Grouping input into 2-2-2 format with dash"
          [code]="grouping222Code()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" group-divider="-"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Grouping 4-4 -->
        <app-example-section
          id="grouping-44"
          title="Grouped 4-4"
          description="Grouping input into 4-4 format with divider"
          [code]="grouping44Code()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="8" group-size="4" [show-group-divider]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Masking -->
        <app-example-section
          id="masking"
          title="Masked Input"
          description="Hide characters with custom mask symbol"
          [code]="maskedCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [mask]="true" mask-char="*"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Small Size -->
        <app-example-section
          id="small-size"
          title="Small Size"
          description="Compact input size variant"
          [code]="smallCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input size="small" length="4"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Medium Size -->
        <app-example-section
          id="medium-size"
          title="Medium Size"
          description="Standard input size variant"
          [code]="mediumCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input size="medium" length="4"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Large Size -->
        <app-example-section
          id="large-size"
          title="Large Size"
          description="Expanded input size variant"
          [code]="largeCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input size="large" length="4"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Secure PIN -->
        <app-example-section
          id="secure-pin"
          title="Secure PIN"
          description="Masked input for sensitive data"
          [code]="secureCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="4" [secure]="true" label="Secure PIN"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Readonly -->
        <app-example-section
          id="readonly"
          title="Read-only State"
          description="Input cannot be modified by user"
          [code]="readonlyCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [readonly]="true" value="123456"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Disabled -->
        <app-example-section
          id="disabled"
          title="Disabled State"
          description="Input is disabled and non-interactive"
          [code]="disabledCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [disabled]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Validation -->
        <app-example-section
          id="validation"
          title="With Validation"
          description="Custom validation with required fields"
          [code]="validationCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [required]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Auto Focus -->
        <app-example-section
          id="autofocus"
          title="Auto Focus"
          description="Automatically focus with auto-submit on complete"
          [code]="autoFocusCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [autofocus]="true" auto-submit="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Paste Support -->
        <app-example-section
          id="pasteable"
          title="Paste Support"
          description="Allow pasting codes with automatic parsing"
          [code]="pasteableCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" [allow-paste]="true" [paste-separator]="true"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Numeric Only -->
        <app-example-section
          id="numeric-only"
          title="Numeric Only"
          description="Accept only numeric input"
          [code]="numericOnlyCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="6" type="numeric" placeholder="0"></app-otp-input>
          </div>
        </app-example-section>

        <!-- Alphanumeric -->
        <app-example-section
          id="alphanumeric"
          title="Alphanumeric"
          description="Accept letters and numbers"
          [code]="alphanumericCode()"
        >
          <div class="otp-wrapper centered">
            <app-otp-input length="8" type="alphanumeric" placeholder="A"></app-otp-input>
          </div>
        </app-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground" class="pane-playground">
      <app-otp-input-playground></app-otp-input-playground>
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <app-component-documentation componentId="otp-input"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
