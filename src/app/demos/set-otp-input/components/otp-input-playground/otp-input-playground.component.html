<app-playground [items]="pgAccordionItems" [defaultOpen]="defaultOpen">
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Label</label>
      <ui-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Helper Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.helperText" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Length</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.length"
        (ngModelChange)="updateConfig()"
        min="1"
        max="10"
      />
    </div>

    <div class="control-group">
      <label>Value</label>
      <ui-input type="text" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
    </div>

    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Small', value: 'small' },
          { label: 'Medium', value: 'medium' },
          { label: 'Large', value: 'large' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Text', value: 'text' },
          { label: 'Number', value: 'number' },
          { label: 'Password', value: 'password' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Default', value: 'default' },
          { label: 'Underlined', value: 'underlined' },
          { label: 'Flushed', value: 'flushed' },
          { label: 'Separated', value: 'separated' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="[
          { label: 'Primary', value: 'primary' },
          { label: 'Secondary', value: 'secondary' },
          { label: 'Success', value: 'success' },
          { label: 'Warning', value: 'warning' },
          { label: 'Danger', value: 'danger' },
          { label: 'Info', value: 'info' },
        ]"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Group Size</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.groupSize"
        (ngModelChange)="updateConfig()"
        min="0"
        max="5"
      />
    </div>

    @if (pgConfig.invalid) {
      <div class="control-group">
        <label>Error Text</label>
        <ui-input type="text" [(ngModel)]="pgConfig.errorText" (ngModelChange)="updateConfig()" />
      </div>
    }
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.secure" (ngModelChange)="updateConfig()" /> Secure
        (Password)
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()" />
        Skeleton
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()" /> Invalid
        State
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()" />
        Disabled
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" />
        Readonly
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()" />
        Required
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoFocus" (ngModelChange)="updateConfig()" />
        Auto Focus
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.autoSubmit" (ngModelChange)="updateConfig()" />
        Auto Submit
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <div class="otp-container">
      <ui-otp-input
        #demoElement
        [attr.length]="pgConfig.length"
        [attr.value]="pgConfig.value"
        [attr.type]="pgConfig.type"
        [attr.size]="pgConfig.size === 'medium' ? null : pgConfig.size"
        [attr.color]="pgConfig.color === 'primary' ? null : pgConfig.color"
        [attr.variant]="pgConfig.variant === 'default' ? null : pgConfig.variant"
        [attr.group-size]="pgConfig.groupSize > 0 ? pgConfig.groupSize : null"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [attr.secure]="pgConfig.secure ? '' : null"
        [attr.skeleton]="pgConfig.skeleton ? '' : null"
        [attr.invalid]="pgConfig.invalid ? '' : null"
        [attr.error-text]="pgConfig.invalid ? pgConfig.errorText : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.required]="pgConfig.required ? '' : null"
        [attr.autofocus]="pgConfig.autoFocus ? '' : null"
        [attr.auto-submit]="pgConfig.autoSubmit ? '' : null"
        (otpChange)="onOtpChange($event)"
        (otpComplete)="onOtpComplete($event)"
      ></ui-otp-input>
    </div>
  </div>
  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
