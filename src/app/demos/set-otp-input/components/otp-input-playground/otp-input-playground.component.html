<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Label</label>
        <input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Helper Text</label>
        <input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Length</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.length"
          (input)="updateConfig()"
          min="1"
          max="10"
        />
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="underlined">Underlined</option>
          <option value="flushed">Flushed</option>
          <option value="separated">Separated</option>
        </select>
      </div>

      <div class="control-group">
        <label>Color</label>
        <select [(ngModel)]="pgConfig.color" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="danger">Danger</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group">
        <label>Group Size</label>
        <input
          type="number"
          [(ngModel)]="pgConfig.groupSize"
          (input)="updateConfig()"
          min="0"
          max="5"
        />
      </div>

      <div class="control-group" *ngIf="pgConfig.invalid">
        <label>Error Text</label>
        <input type="text" [(ngModel)]="pgConfig.errorText" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.secure" (change)="updateConfig()" /> Secure
        (Password)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
        State
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="otp-container">
        <app-otp-input
          [attr.length]="pgConfig.length"
          [attr.size]="pgConfig.size === 'medium' ? null : pgConfig.size"
          [attr.color]="pgConfig.color === 'primary' ? null : pgConfig.color"
          [attr.variant]="pgConfig.variant === 'default' ? null : pgConfig.variant"
          [attr.group-size]="pgConfig.groupSize > 0 ? pgConfig.groupSize : null"
          [attr.label]="pgConfig.label"
          [attr.helper-text]="pgConfig.helperText"
          [attr.secure]="pgConfig.secure"
          [attr.skeleton]="pgConfig.skeleton"
          [attr.invalid]="pgConfig.invalid"
          [attr.error-text]="pgConfig.invalid ? pgConfig.errorText : null"
          (otpChange)="onOtpChange($event)"
          (otpComplete)="onOtpComplete($event)"
        ></app-otp-input>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
