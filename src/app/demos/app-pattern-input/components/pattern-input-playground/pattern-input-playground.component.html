<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Mask Pattern</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Placeholder</label>
      <app-input type="text" [(ngModel)]="pgConfig.placeholder" (ngModelChange)="updateConfig()" ></app-input>
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          id="disabled"
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox
          id="readonly"
          [(ngModel)]="pgConfig.readonly"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Readonly
      </label>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div class="preview-stage">
      <ui-pattern-input
        #demoElement
        [attr.mask]="pgConfig.pattern"
        [attr.placeholder]="pgConfig.placeholder"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.readonly]="pgConfig.readonly ? '' : null"
      ></ui-pattern-input>
    </div>
  </div>
</app-playground>
