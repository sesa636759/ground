<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Animation</label>
        <select [(ngModel)]="pgConfig.animation" (change)="updateConfig()">
          <option value="fade-in">Fade In</option>
          <option value="fade-out">Fade Out</option>
          <option value="slide-up">Slide Up</option>
          <option value="slide-down">Slide Down</option>
          <option value="slide-left">Slide Left</option>
          <option value="slide-right">Slide Right</option>
          <option value="zoom-in">Zoom In</option>
          <option value="zoom-out">Zoom Out</option>
          <option value="bounce">Bounce</option>
          <option value="flip">Flip</option>
        </select>
      </div>

      <div class="control-group">
        <label>Direction</label>
        <select [(ngModel)]="pgConfig.direction" (change)="updateConfig()">
          <option value="up">Up</option>
          <option value="down">Down</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <input
          type="number"
          min="100"
          max="3000"
          step="100"
          [(ngModel)]="pgConfig.duration"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Delay (ms)</label>
        <input
          type="number"
          min="0"
          max="2000"
          step="100"
          [(ngModel)]="pgConfig.delay"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Offset (px)</label>
        <input
          type="number"
          min="0"
          max="500"
          step="10"
          [(ngModel)]="pgConfig.offset"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Easing</label>
        <select [(ngModel)]="pgConfig.easing" (change)="updateConfig()">
          <option value="ease">Ease</option>
          <option value="ease-in">Ease In</option>
          <option value="ease-out">Ease Out</option>
          <option value="ease-in-out">Ease In Out</option>
          <option value="linear">Linear</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.repeat" (change)="updateConfig()" /> Repeat
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.once" (change)="updateConfig()" /> Once
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage scrollable-stage">
      <div class="spacer"></div>
      <app-animate-on-scroll
        [attr.animation]="pgConfig.animation"
        [attr.direction]="pgConfig.direction"
        [attr.duration]="pgConfig.duration"
        [attr.delay]="pgConfig.delay"
        [attr.offset]="pgConfig.offset"
        [attr.easing]="pgConfig.easing"
        [attr.repeat]="pgConfig.repeat"
        [attr.once]="pgConfig.once"
        (animate)="onAnimate($event)"
      >
        <div class="animated-content">
          <h3>Scroll to Animate</h3>
          <p>This content will animate when scrolled into view</p>
        </div>
      </app-animate-on-scroll>
      <div class="spacer"></div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
