<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Animation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animation"
          (change)="updateConfig()"
          [options]="animationOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Direction</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.direction"
          (change)="updateConfig()"
          [options]="directionOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <input
          type="number"
          min="100"
          max="3000"
          step="100"
          [(ngModel)]="pgConfig.duration"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Delay (ms)</label>
        <input
          type="number"
          min="0"
          max="2000"
          step="100"
          [(ngModel)]="pgConfig.delay"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Offset (px)</label>
        <input
          type="number"
          min="0"
          max="500"
          step="10"
          [(ngModel)]="pgConfig.offset"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Easing</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.easing"
          (change)="updateConfig()"
          [options]="easingOptions"
        ></ui-dropdown>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.repeat"
          (change)="updateConfig()"
          label="Repeat"
        ></app-checkbox>
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.once"
          (change)="updateConfig()"
          label="Once"
        ></app-checkbox>
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage scrollable-stage">
      <div class="spacer"></div>
      <app-animate-on-scroll
        [attr.animation]="pgConfig.animation"
        [attr.direction]="pgConfig.direction"
        [attr.duration]="pgConfig.duration"
        [attr.delay]="pgConfig.delay"
        [attr.offset]="pgConfig.offset"
        [attr.easing]="pgConfig.easing"
        [attr.repeat]="pgConfig.repeat"
        [attr.once]="pgConfig.once"
        (animate)="onAnimate($event)"
      >
        <div class="animated-content">
          <h3>Scroll to Animate</h3>
          <p>This content will animate when scrolled into view</p>
        </div>
      </app-animate-on-scroll>
      <div class="spacer"></div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
