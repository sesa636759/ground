<div class="playground-layout">
  <div class="playground-controls">
    <h4 class="section-title">Basic Animation</h4>
    <div class="control-grid">
      <div class="control-group">
        <label>Animation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animation"
          (change)="updateConfig()"
          [options]="animationOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Direction</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.direction"
          (change)="updateConfig()"
          [options]="directionOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Duration (ms)</label>
        <app-input
          type="number"
          min="100"
          max="3000"
          step="100"
          [(ngModel)]="pgConfig.duration"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Delay (ms)</label>
        <app-input
          type="number"
          min="0"
          max="2000"
          step="100"
          [(ngModel)]="pgConfig.delay"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Offset (px)</label>
        <app-input
          type="number"
          min="0"
          max="500"
          step="10"
          [(ngModel)]="pgConfig.offset"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Easing</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.easing"
          (change)="updateConfig()"
          [options]="easingOptions"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Threshold</label>
        <app-input
          type="number"
          min="0"
          max="1"
          step="0.1"
          [(ngModel)]="pgConfig.threshold"
          (input)="updateConfig()"
        />
      </div>
    </div>

    <h4 class="section-title">3D & Effects</h4>
    <div class="control-grid">
      <div class="control-group">
        <label>Blur Amount</label>
        <app-input
          type="number"
          min="0"
          max="50"
          step="1"
          [(ngModel)]="pgConfig.blurAmount"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Perspective</label>
        <app-input
          type="number"
          min="500"
          max="2000"
          step="100"
          [(ngModel)]="pgConfig.perspective"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Rotate X (deg)</label>
        <app-input
          type="number"
          min="-180"
          max="180"
          step="15"
          [(ngModel)]="pgConfig.rotateX"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Rotate Y (deg)</label>
        <app-input
          type="number"
          min="-180"
          max="180"
          step="15"
          [(ngModel)]="pgConfig.rotateY"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Rotate Z (deg)</label>
        <app-input
          type="number"
          min="-360"
          max="360"
          step="15"
          [(ngModel)]="pgConfig.rotateZ"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Scale</label>
        <app-input
          type="number"
          min="0.1"
          max="3"
          step="0.1"
          [(ngModel)]="pgConfig.scale"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Stagger (ms)</label>
        <app-input
          type="number"
          min="0"
          max="500"
          step="50"
          [(ngModel)]="pgConfig.stagger"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Text Mode</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.textMode"
          (change)="updateConfig()"
          [options]="textModeOptions"
        ></ui-dropdown>
      </div>
    </div>

    <h4 class="section-title">Options</h4>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.repeat"
          (change)="updateConfig()"
          label="Repeat"
        ></app-checkbox>
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.once"
          (change)="updateConfig()"
          label="Once"
        ></app-checkbox>
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.mirror"
          (change)="updateConfig()"
          label="Mirror"
        ></app-checkbox>
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.scrub"
          (change)="updateConfig()"
          label="Scrub"
        ></app-checkbox>
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage scrollable-stage">
      <div class="spacer"></div>
      <app-animate-on-scroll
        [attr.animation]="pgConfig.animation"
        [attr.direction]="pgConfig.direction"
        [attr.duration]="pgConfig.duration"
        [attr.delay]="pgConfig.delay"
        [attr.offset]="pgConfig.offset"
        [attr.easing]="pgConfig.easing"
        [attr.threshold]="pgConfig.threshold"
        [attr.blur-amount]="pgConfig.blurAmount > 0 ? pgConfig.blurAmount : null"
        [attr.perspective]="pgConfig.perspective !== 1000 ? pgConfig.perspective : null"
        [attr.rotate-x]="pgConfig.rotateX !== 0 ? pgConfig.rotateX : null"
        [attr.rotate-y]="pgConfig.rotateY !== 0 ? pgConfig.rotateY : null"
        [attr.rotate-z]="pgConfig.rotateZ !== 0 ? pgConfig.rotateZ : null"
        [attr.scale]="pgConfig.scale !== 1 ? pgConfig.scale : null"
        [attr.stagger]="pgConfig.stagger > 0 ? pgConfig.stagger : null"
        [attr.text-mode]="pgConfig.textMode !== 'none' ? pgConfig.textMode : null"
        [attr.repeat]="pgConfig.repeat"
        [attr.once]="pgConfig.once"
        [attr.mirror]="pgConfig.mirror"
        [attr.scrub]="pgConfig.scrub"
        (animate)="onAnimate($event)"
      >
        <div class="animated-content">
          <h3>Scroll to Animate</h3>
          <p>This content will animate when scrolled into view</p>
        </div>
      </app-animate-on-scroll>
      <div class="spacer"></div>
    </div>

    <ui-code-preview [htmlCode]="generatedCode()" [label]="'Generated Code'" activeLang="html" expanded="true"></ui-code-preview>
  </div>
</div>
