<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Visuals</h3>
        <div class="control-group">
          <label>Label</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.label"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Color</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.color"
            (ngModelChange)="updateConfig()"
            [options]="colorOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="removable"
            [(ngModel)]="pgConfig.removable"
            (ngModelChange)="updateConfig()"
            label="Removable"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="clickable"
            [(ngModel)]="pgConfig.clickable"
            (ngModelChange)="updateConfig()"
            label="Clickable"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="loading"
            [(ngModel)]="pgConfig.loading"
            (ngModelChange)="updateConfig()"
            label="Loading"
          ></ui-checkbox>
        </div>
        <div class="control-group">
          <label>Counter</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.counter"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-pill
      [attr.label]="pgConfig.label"
      [attr.variant]="pgConfig.variant"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.removable]="pgConfig.removable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.counter]="pgConfig.counter"
      icon="🏷️"
    ></ui-pill>
  </div>
</app-playground>
