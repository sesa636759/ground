<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Value</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Max (Stars/Smiley)</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="standardColorOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.allowHalf"
          (ngModelChange)="updateConfig()"
          [disabled]="pgConfig.type !== 'star'"
        ></ui-checkbox>
        Allow Half
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showValue"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Text
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></ui-checkbox>
        Read-Only
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center">
      <ui-rating
        #ratingElement
        [attr.type]="pgConfig.type"
        [attr.value]="pgConfig.value"
        [attr.max]="pgConfig.max"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.readonly]="pgConfig.readonly ? '' : null"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.allow-half]="pgConfig.allowHalf ? '' : null"
        [attr.show-value]="pgConfig.showValue ? '' : null"
        (ratingChange)="onRatingChange($event)"
      ></ui-rating>
      <div
        class="rating-display"
        style="margin-top: 24px; font-weight: 600; color: var(--text-primary)"
      >
        Current Value: {{ pgConfig.value }}
      </div>
    </div>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
