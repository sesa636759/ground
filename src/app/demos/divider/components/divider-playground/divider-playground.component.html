<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Text</label>
      <ui-input type="text" [(ngModel)]="pgConfig.text" (ngModelChange)="updateConfig()"></ui-input>
    </div>
    <div class="control-group">
      <label>Icon</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ⭐"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-style" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="standardSizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="standardOrientationOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-special" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Pattern</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.pattern"
        (ngModelChange)="updateConfig()"
        [options]="patternOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    [class.vertical-container]="pgConfig.orientation === 'vertical'"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div *ngIf="pgConfig.orientation === 'vertical'">Panel Start</div>
    <ui-divider
      #demoElement
      [attr.text]="pgConfig.text"
      [attr.icon]="pgConfig.icon"
      [attr.badge]="pgConfig.badge"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.orientation]="pgConfig.orientation"
      [attr.pattern]="pgConfig.pattern"
      [attr.shape]="pgConfig.shape"
      [attr.loading]="pgConfig.loading ? '' : null"
    ></ui-divider>
    <div *ngIf="pgConfig.orientation === 'vertical'">Panel End</div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
