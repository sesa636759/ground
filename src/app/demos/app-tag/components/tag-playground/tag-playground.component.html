<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Visuals</h3>
        <div class="control-group">
          <label>Value / Text</label>
          <input type="text" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Icon</label>
          <input type="text" [(ngModel)]="pgConfig.icon" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Severity</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.severity"
            (ngModelChange)="updateConfig()"
            [options]="severityOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Styling</h3>
        <div class="checkpoint-group">
          <app-checkbox
            id="rounded"
            [(ngModel)]="pgConfig.rounded"
            (ngModelChange)="updateConfig()"
            label="Rounded Corners"
          ></app-checkbox>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ui-button
        actions
        variant="secondary"
        (click)="resetConfig()"
        label="Reset Configuration"
      ></ui-button>
    </div>
  </div>
  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <ui-tag
      [attr.value]="pgConfig.value"
      [attr.icon]="pgConfig.icon"
      [attr.severity]="pgConfig.severity"
      [attr.rounded]="pgConfig.rounded ? '' : null"
      [attr.size]="pgConfig.size"
    ></ui-tag>
  </div>
  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
