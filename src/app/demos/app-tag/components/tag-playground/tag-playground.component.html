<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Visuals</h3>
        <div class="control-group">
          <label>Value / Text</label>
          <app-input type="text" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" ></app-input>
        </div>
        <div class="control-group">
          <label>Icon</label>
          <app-input type="text" [(ngModel)]="pgConfig.icon" (ngModelChange)="updateConfig()" ></app-input>
        </div>
        <div class="control-group">
          <label>Severity</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.severity"
            (ngModelChange)="updateConfig()"
            [options]="severityOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Styling</h3>
        <div class="checkpoint-group">
          <app-checkbox
            id="rounded"
            [(ngModel)]="pgConfig.rounded"
            (ngModelChange)="updateConfig()"
            label="Rounded Corners"
          ></app-checkbox>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <ui-tag
      [attr.value]="pgConfig.value"
      [attr.icon]="pgConfig.icon"
      [attr.severity]="pgConfig.severity"
      [attr.rounded]="pgConfig.rounded ? '' : null"
      [attr.size]="pgConfig.size"
    ></ui-tag>
  </div>
</app-playground>
