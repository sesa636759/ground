<div class="demo-container">
  <app-demo-header
    icon="🏷️"
    title="Tag Component"
    description="A small component used to categorize or label content, with support for icons, counters, and various severity levels."
  ></app-demo-header>

  <demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <app-tag-playground></app-tag-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Severities -->
        <app-example-section
          id="severities"
          title="Severities"
          description="Different color schemes based on importance or status."
          [code]="severitiesCode"
          style="margin-top: 0"
        >
          <div class="demo-flex-wrap">
            <ui-tag severity="primary" value="Primary"></ui-tag>
            <ui-tag severity="success" value="Success"></ui-tag>
            <ui-tag severity="info" value="Info"></ui-tag>
            <ui-tag severity="warning" value="Warning"></ui-tag>
            <ui-tag severity="danger" value="Danger"></ui-tag>
          </div>
        </app-example-section>

        <!-- Styles & Sizes -->
        <app-example-section
          id="styles"
          title="Styles & Sizes"
          description="Configurations for shape and scale."
          [code]="stylesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Shapes</h3>
              <div class="demo-flex">
                <ui-tag value="Square" [rounded]="false"></ui-tag>
                <ui-tag value="Rounded" rounded></ui-tag>
              </div>
            </div>
            <div class="demo-card">
              <h3>Sizes</h3>
              <div class="demo-flex">
                <ui-tag value="Small" size="small" severity="info"></ui-tag>
                <ui-tag value="Medium" severity="info"></ui-tag>
                <ui-tag value="Large" size="large" severity="info"></ui-tag>
              </div>
            </div>
          </div>
        </app-example-section>

        <!-- Visual Enhancements -->
        <app-example-section
          id="visuals"
          title="Visual Enhancements"
          description="Add context with icons, counters, and interative elements."
          [code]="visualsCode"
        >
          <div class="demo-grid col-3">
            <div class="demo-card">
              <h3>Icons</h3>
              <ui-tag icon="⭐" value="Starred" severity="warning"></ui-tag>
            </div>
            <div class="demo-card">
              <h3>Counters</h3>
              <ui-tag value="Messages" counter="5" severity="danger"></ui-tag>
            </div>
            <div class="demo-card">
              <h3>Removable</h3>
              <ui-tag value="Javascript" removable severity="primary"></ui-tag>
            </div>
          </div>
        </app-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
    <div slot="docs">
      <app-component-documentation componentId="tag"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
