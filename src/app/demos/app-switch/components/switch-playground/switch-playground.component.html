<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Global Visuals -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Label</label>
      <input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Label Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.labelPosition"
        (ngModelChange)="updateConfig()"
        [options]="labelPositionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Icon On</label>
      <input type="text" [(ngModel)]="pgConfig.iconOn" (ngModelChange)="updateConfig()" />
    </div>
    <div class="control-group">
      <label>Icon Off</label>
      <input type="text" [(ngModel)]="pgConfig.iconOff" (ngModelChange)="updateConfig()" />
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          id="checked"
          [(ngModel)]="pgConfig.checked"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Checked
      </label>
      <label class="checkbox-item">
        <app-checkbox
          id="disabled"
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox
          id="loading"
          [(ngModel)]="pgConfig.loading"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Loading
      </label>
      <label class="checkbox-item">
        <app-checkbox
          id="showIcons"
          [(ngModel)]="pgConfig.showDefaultIcons"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Default Icons
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="padding: 40px; display: flex; justify-content: center; align-items: center"
  >
    <ui-switch
      #demoElement
      [attr.label]="pgConfig.label"
      [attr.checked]="pgConfig.checked ? '' : null"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.shape]="pgConfig.shape"
      [attr.label-position]="pgConfig.labelPosition"
      [attr.icon-on]="pgConfig.iconOn || null"
      [attr.icon-off]="pgConfig.iconOff || null"
      [attr.show-default-icons]="pgConfig.showDefaultIcons ? '' : null"
      (switchChange)="onSwitchChange($event)"
    ></ui-switch>
  </div>

  <div events>
    <app-playground-event-log [logs]="eventLog" (clear)="eventLog = []"></app-playground-event-log>
  </div>
</app-playground>
