<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="segmented">Segmented</option>
          <option value="dropdown">Dropdown</option>
          <option value="glass">Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Position</label>
        <select [(ngModel)]="pgConfig.position" (change)="updateConfig()">
          <option value="inline">Inline</option>
          <option value="fixed-top">Fixed Top</option>
          <option value="fixed-bottom">Fixed Bottom</option>
        </select>
      </div>

      <div class="control-group">
        <label>Animation Duration (ms)</label>
        <input
          type="number"
          min="0"
          max="1000"
          step="50"
          [(ngModel)]="pgConfig.animationDuration"
          (input)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Show
        Icons
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showLabels" (change)="updateConfig()" /> Show
        Labels
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Enable Animation
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-theme-switcher
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.position]="pgConfig.position"
        [attr.show-icons]="pgConfig.showIcons"
        [attr.show-labels]="pgConfig.showLabels"
        [attr.enable-animation]="pgConfig.enableAnimation"
        [attr.animation-duration]="pgConfig.animationDuration"
        (themeChange)="onThemeChange($event)"
      ></app-theme-switcher>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
