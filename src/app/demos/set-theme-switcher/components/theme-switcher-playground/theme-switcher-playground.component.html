<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-grid">
      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Segmented', value: 'segmented' },
            { label: 'Dropdown', value: 'dropdown' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Inline', value: 'inline' },
            { label: 'Fixed Top', value: 'fixed-top' },
            { label: 'Fixed Bottom', value: 'fixed-bottom' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation Duration (ms)</label>
        <ui-input
          type="number"
          min="0"
          max="1000"
          step="50"
          [(ngModel)]="pgConfig.animationDuration"
          (ngModelChange)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showIcons" (ngModelChange)="updateConfig()" /> Show Icons
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.showLabels" (ngModelChange)="updateConfig()" /> Show
        Labels
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.enableAnimation" (ngModelChange)="updateConfig()" />
        Enable Animation
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <app-theme-switcher
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.position]="pgConfig.position"
      [attr.show-icons]="pgConfig.showIcons ? '' : null"
      [attr.show-labels]="pgConfig.showLabels ? '' : null"
      [attr.enable-animation]="pgConfig.enableAnimation ? '' : null"
      [attr.animation-duration]="pgConfig.animationDuration"
      (themeChange)="onThemeChange($event)"
    ></app-theme-switcher>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
