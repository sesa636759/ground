<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Segmented', value: 'segmented' },
            { label: 'Dropdown', value: 'dropdown' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.position"
          (change)="updateConfig()"
          [options]="[
            { label: 'Inline', value: 'inline' },
            { label: 'Fixed Top', value: 'fixed-top' },
            { label: 'Fixed Bottom', value: 'fixed-bottom' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation Duration (ms)</label>
        <input
          type="number"
          min="0"
          max="1000"
          step="50"
          [(ngModel)]="pgConfig.animationDuration"
          (input)="updateConfig()"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Show Icons
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showLabels" (change)="updateConfig()" /> Show Labels
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Enable Animation
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <app-theme-switcher
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.position]="pgConfig.position"
        [attr.show-icons]="pgConfig.showIcons"
        [attr.show-labels]="pgConfig.showLabels"
        [attr.enable-animation]="pgConfig.enableAnimation"
        [attr.animation-duration]="pgConfig.animationDuration"
        (themeChange)="onThemeChange($event)"
      ></app-theme-switcher>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
