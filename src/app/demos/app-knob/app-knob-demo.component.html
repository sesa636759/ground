<div class="demo-container">
  <pg-demo-header
    icon="🎛️"
    title="Knob / Rotary Selector"
    description="An intuitive circular input for selecting values within a range. Perfect for audio controls, temperature settings, and dashboard metrics."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-knob-playground></app-knob-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Visual Styles -->
          <section class="demo-section" id="styles" style="margin-top: 0">
            <div class="section-header">
              <h2>🎨 Visual Styles</h2>
              <p>Customize the look and feel of the rotary control.</p>
            </div>
            <div class="demo-card">
              <div style="text-align: center">
                <ui-knob
                  [value]="30"
                  value-color="#10b981"
                  [size]="120"
                  [stroke-width]="15"
                ></ui-knob>
                <p>Eco Green</p>
              </div>
              <div style="text-align: center">
                <ui-knob
                  [value]="85"
                  value-color="#ef4444"
                  [size]="120"
                  [stroke-width]="25"
                ></ui-knob>
                <p>High Performance</p>
              </div>
              <div style="text-align: center">
                <ui-knob
                  [value]="45"
                  value-color="#f59e0b"
                  [size]="80"
                  [show-value]="false"
                ></ui-knob>
                <p>Compact</p>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="stylesCode"
              [label]="'Design Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- States -->
          <section class="demo-section" id="readonly">
            <div class="section-header">
              <h2>🔒 States</h2>
              <p>Use readonly mode to display metrics without allowing user interaction.</p>
            </div>
            <div class="demo-card">
              <ui-knob [value]="75" readonly [size]="150" value-color="#8b5cf6"></ui-knob>
            </div>
            <ui-code-preview
              [htmlCode]="readonlyCode"
              [label]="'Readonly Usage'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="knob"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
