<app-playground [accordionItems]="pgAccordionItems" [defaultOpen]="defaultOpen">
  <div slot="content-value" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Current Value</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.value"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Min</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.min"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Max</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Step</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.step"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
  </div>

  <div slot="content-visuals" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Stroke Width</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.strokeWidth"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Color</label>
      <app-input
        type="color"
        [(ngModel)]="pgConfig.valueColor"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.readonly"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.showValue"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Show Value
      </label>
    </div>
  </div>

  <ui-button
    icon=""
    iconPosition="left"
    [iconLibrary]="'se'"
    actions
    variant="secondary"
    (click)="resetConfig()"
    label="Reset Configuration"
  ></ui-button>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    "
  >
    <ui-knob
      #knobElement
      [attr.value]="pgConfig.value"
      [attr.min]="pgConfig.min"
      [attr.max]="pgConfig.max"
      [attr.step]="pgConfig.step"
      [attr.size]="pgConfig.size"
      [attr.stroke-width]="pgConfig.strokeWidth"
      [attr.value-color]="pgConfig.valueColor"
      [attr.readonly]="pgConfig.readonly ? '' : null"
      [attr.show-value]="pgConfig.showValue ? '' : null"
      (knobChange)="onValueChange($event)"
    ></ui-knob>

    <div style="margin-top: 16px; font-weight: 600; color: var(--text-primary)">
      Value: {{ pgConfig.value }}
    </div>
  </div>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
