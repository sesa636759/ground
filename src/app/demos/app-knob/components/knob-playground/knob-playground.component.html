<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Value Control</h3>
        <div class="control-group">
          <label>Current Value</label>
          <input type="number" [(ngModel)]="pgConfig.value" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Min</label>
          <input type="number" [(ngModel)]="pgConfig.min" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Max</label>
          <input type="number" [(ngModel)]="pgConfig.max" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Step</label>
          <input type="number" [(ngModel)]="pgConfig.step" (ngModelChange)="updateConfig()" />
        </div>
      </div>

      <div class="control-section">
        <h3>Visuals</h3>
        <div class="control-group">
          <label>Size</label>
          <input type="number" [(ngModel)]="pgConfig.size" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Stroke Width</label>
          <input
            type="number"
            [(ngModel)]="pgConfig.strokeWidth"
            (ngModelChange)="updateConfig()"
          />
        </div>
        <div class="control-group">
          <label>Color</label>
          <input type="color" [(ngModel)]="pgConfig.valueColor" (ngModelChange)="updateConfig()" />
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="readonly"
            [(ngModel)]="pgConfig.readonly"
            (ngModelChange)="updateConfig()"
            label="Readonly"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="showValue"
            [(ngModel)]="pgConfig.showValue"
            (ngModelChange)="updateConfig()"
            label="Show Value"
          ></app-checkbox>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ui-button
        class="btn-secondary"
        variant="secondary"
        (click)="resetConfig()"
        label="Reset"
      ></ui-button>
    </div>
  </div>
  <div
    preview
    style="
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    "
  >
    <ui-knob
      [attr.value]="pgConfig.value"
      [attr.min]="pgConfig.min"
      [attr.max]="pgConfig.max"
      [attr.step]="pgConfig.step"
      [attr.size]="pgConfig.size"
      [attr.stroke-width]="pgConfig.strokeWidth"
      [attr.value-color]="pgConfig.valueColor"
      [attr.readonly]="pgConfig.readonly ? '' : null"
      [attr.show-value]="pgConfig.showValue ? '' : null"
      (knobChange)="onValueChange($event)"
    ></ui-knob>

    <div style="margin-top: 16px; font-weight: 600; color: var(--text-primary)">
      Value: {{ pgConfig.value }}
    </div>
  </div>

    @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
