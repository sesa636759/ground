<div class="demo-container">
  <pg-demo-header
    icon="🔢"
    title="OTP Input Component"
    description="A specialized input component for One-Time Passwords, PINs, and verification codes with automatic focus management and grouping support."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Usage -->
        <pg-example-section
          id="basic"
          title="Basic Usage"
          description="Default OTP input with configurable length and optional labels."
          [code]="basicCode()"
        >
          <div class="demo-flex-wrap">
            <ui-otp-input label="Enter 4-digit PIN" length="4"></ui-otp-input>
            <ui-otp-input label="Enter 6-digit Code" length="6" placeholder="0"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Visual Variants -->
        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Different architectural styles for the input boxes."
          [code]="variantsCode()"
        >
          <div class="demo-grid col-2">
            <ui-otp-input variant="default" label="Default (Boxed)"></ui-otp-input>
            <ui-otp-input variant="underlined" label="Underlined"></ui-otp-input>
            <ui-otp-input variant="flushed" label="Flushed (No Border)"></ui-otp-input>
            <ui-otp-input variant="separated" label="Separated"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Grouping & Layout -->
        <pg-example-section
          id="grouping"
          title="Grouping & Layout"
          description="Improve readability for longer codes by adding visual groups."
          [code]="groupingCode()"
        >
          <div class="demo-grid col-1">
            <ui-otp-input length="6" group-size="3" label="Grouped (3-3)"></ui-otp-input>
            <ui-otp-input length="8" group-size="4" label="Grouped (4-4)"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Feedback & States -->
        <pg-example-section
          id="validation"
          title="Feedback & States"
          description="Communicate success, errors, and helpful hints."
          [code]="validationCode()"
        >
          <div class="demo-grid col-1">
            <ui-otp-input invalid error-text="Verification code is incorrect" label="Error Feedback"></ui-otp-input>
            <ui-otp-input color="success" helper-text="Check your SMS for the code" label="Success Context"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Input Types -->
        <pg-example-section
          id="types"
          title="Input Types"
          description="Restrict input to numbers, alphanumeric, or mask as passwords."
          [code]="typesCode()"
        >
          <div class="demo-grid col-2">
            <ui-otp-input type="number" label="Numeric Only"></ui-otp-input>
            <ui-otp-input type="alphanumeric" label="Alphanumeric"></ui-otp-input>
            <ui-otp-input secure label="Secure PIN (Masked)"></ui-otp-input>
            <ui-otp-input type="numeric" label="Mobile numeric"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Sizes & Colors -->
        <pg-example-section
          id="sizes"
          title="Sizes & Colors"
          description="Scalable dimensions and semantic color themes."
          [code]="sizesCode()"
        >
          <div class="demo-flex-wrap" style="align-items: flex-end;">
            <ui-otp-input size="small" label="Compact Size"></ui-otp-input>
            <ui-otp-input size="large" label="Prominent Size"></ui-otp-input>
            <ui-otp-input color="secondary" label="Secondary Color"></ui-otp-input>
            <ui-otp-input color="warning" label="Warning Color"></ui-otp-input>
          </div>
        </pg-example-section>

        <!-- Advanced States -->
        <pg-example-section
          id="advanced"
          title="Advanced States"
          description="Interactive and non-interactive component states."
          [code]="advancedCode()"
        >
          <div class="demo-grid col-2">
            <ui-otp-input disabled value="1234" label="Disabled State"></ui-otp-input>
            <ui-otp-input readonly value="5678" label="Readonly State"></ui-otp-input>
            <ui-otp-input skeleton label="Skeleton Loader"></ui-otp-input>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <dm-otp-input-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="otp-input"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
