<div class="demo-container">
  <pg-demo-header
    icon="💻"
    title="Code Editor Component"
    description="A powered code editor with syntax highlighting, multiple language support, and rich features."
  ></pg-demo-header>

  <pg-demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <ds-code-editor-playground></ds-code-editor-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Language Support -->
        <pg-example-section
          id="language-support"
          title="Language Support"
          description="Supports various languages with syntax highlighting"
          class="mt-0"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <div class="card-header">
                <h3><i class="fab fa-js js-color"></i> JavaScript</h3>
                <span class="badge">VS Dark</span>
              </div>
              <dui-code-editor
                theme="vs-dark"
                language="javascript"
                height="250px"
                value="console.log('Hello from JS!');"
              ></dui-code-editor>
            </div>

            <div class="demo-card">
              <div class="card-header">
                <h3><i class="fab fa-python py-color"></i> Python</h3>
                <span class="badge">VS Light</span>
              </div>
              <dui-code-editor
                theme="vs-light"
                language="python"
                height="250px"
                value="print('Hello from Python!')"
              ></dui-code-editor>
            </div>

            <div class="demo-card">
              <div class="card-header">
                <h3><i class="fab fa-html5 html-color"></i> HTML</h3>
                <span class="badge">VS Dark</span>
              </div>
              <dui-code-editor
                theme="vs-dark"
                activeLang="html"
                height="250px"
                value="<h1>Hello HTML</h1>"
              ></dui-code-editor>
            </div>

            <div class="demo-card">
              <div class="card-header">
                <h3><i class="fab fa-java java-color"></i> Java</h3>
                <span class="badge">High Contrast</span>
              </div>
              <dui-code-editor
                theme="hc-black"
                language="java"
                height="250px"
                value='public class Main {\n  public static void main(String[] args) {\n    System.out.println("Hello Java");\n  }\n}'
              ></dui-code-editor>
            </div>
          </div>
        </pg-example-section>

        <!-- Features -->
        <pg-example-section
          id="features"
          title="Features"
          description="Advanced features like read-only mode and toolbar controls"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Read Only Mode</h3>
              <p class="desc">Prevents editing of the code content</p>
              <dui-code-editor
                theme="vs-dark"
                language="javascript"
                height="150px"
                readonly="true"
                value="// You cannot edit this code\nconst PI = 3.14159;"
              ></dui-code-editor>
            </div>

            <div class="demo-card">
              <h3>Toolbar Hidden</h3>
              <p class="desc">Minimalist view without the toolbar actions</p>
              <dui-code-editor
                theme="vs-light"
                language="css"
                height="150px"
                toolbar="false"
                value="body { background: #f0f0f0; }"
              ></dui-code-editor>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="code-editor"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
