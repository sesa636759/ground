<div class="demo-container">
  <pg-demo-header
    icon="sun-moon"
    iconLibrary="lucide"
    title="Theme Switcher"
    description="A component used to switch themes, including light and dark mode toggling."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-theme-switcher-playground></ds-theme-switcher-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Different styles for theme switching — default, segmented, and dropdown."
          [code]="playgroundCode"
          class="mt-0"
        >
          <div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Default</p>
              <app-theme-switcher variant="default"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Segmented</p>
              <app-theme-switcher variant="segmented"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Dropdown</p>
              <app-theme-switcher variant="dropdown"></app-theme-switcher>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="sizes"
          title="Size Variants"
          description="Small, medium, and large sizes for different contexts."
          [code]="playgroundCode"
        >
          <div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Small</p>
              <app-theme-switcher size="small"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Medium</p>
              <app-theme-switcher size="medium"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Large</p>
              <app-theme-switcher size="large"></app-theme-switcher>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="icons"
          title="Icon Options"
          description="Theme switchers with icons, labels, or both."
          [code]="playgroundCode"
        >
          <div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">With Icons & Labels</p>
              <app-theme-switcher show-icons="true" show-labels="true"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Icons Only</p>
              <app-theme-switcher show-icons="true" show-labels="false"></app-theme-switcher>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="premium"
          title="Premium Features"
          description="Advanced styling options including glassmorphism and smooth animations."
          [code]="playgroundCode"
        >
          <div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
            <div style="padding: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px;">
              <p style="margin-bottom: 8px; font-size: 12px; color: rgba(255,255,255,0.7);">Glassmorphism</p>
              <app-theme-switcher variant="glass"></app-theme-switcher>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">With Animation</p>
              <app-theme-switcher enable-animation="true" animation-duration="300"></app-theme-switcher>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="theme-switcher"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
