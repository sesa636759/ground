<div class="demo-container">
  <pg-demo-header
    icon="⌨️"
    title="Input Component"
    description="A high-performance, feature-rich input system with specialized types, masking, validation, and premium aesthetics."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- All Input Types -->
        <pg-example-section
          id="all-types"
          title="All Input Types"
          description="Every HTML5 input type supported by ui-input with premium styling and automatic icons."
          [code]="allTypesCode"
        >
          <h4 style="margin-top: 0">Standard Text</h4>
          <div class="demo-grid col-2">
            <ui-input type="text" label="Text" placeholder="Basic text input" full-width></ui-input>
            <ui-input type="password" label="Password" show-password-toggle full-width></ui-input>
            <ui-input
              type="email"
              label="Email"
              placeholder="user@example.com"
              full-width
            ></ui-input>
            <ui-input type="tel" label="Tel" placeholder="(555) 555-5555" full-width></ui-input>
            <ui-input
              type="url"
              label="URL"
              placeholder="https://example.com"
              full-width
            ></ui-input>
            <ui-input type="search" label="Search" show-clear full-width></ui-input>
          </div>
          <h4>Numbers &amp; Range</h4>
          <div class="demo-grid col-2">
            <ui-input type="number" label="Number" full-width></ui-input>
            <ui-input
              type="number"
              label="Number + Steppers"
              show-steppers
              value="10"
              full-width
            ></ui-input>
            <ui-input type="range" label="Range" min="0" max="100" value="45" full-width></ui-input>
          </div>
          <h4>Date &amp; Time</h4>
          <div class="demo-grid col-2">
            <ui-input type="date" label="Date" full-width></ui-input>
            <ui-input type="time" label="Time" full-width></ui-input>
            <ui-input type="datetime-local" label="DateTime Local" full-width></ui-input>
            <ui-input type="month" label="Month" full-width></ui-input>
            <ui-input type="week" label="Week" full-width></ui-input>
          </div>
          <h4>Specialized</h4>
          <div class="demo-grid col-2">
            <ui-input type="color" label="Color Picker" value="#3b82f6" full-width></ui-input>
            <ui-input type="file" label="File Upload" full-width></ui-input>
            <ui-input
              type="otp"
              otp-length="6"
              label="OTP Code"
              helper-text="6-digit verification"
              full-width
            ></ui-input>
            <ui-input
              type="pin"
              otp-length="4"
              label="PIN Code"
              helper-text="4-digit secure PIN"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Basic Types -->
        <pg-example-section
          id="basic"
          title="Basic Types"
          description="Support for standard native input types with enhanced UI."
          [code]="basicCode"
        >
          <div class="demo-grid col-2">
            <ui-input label="Full Name" placeholder="John Doe" full-width></ui-input>
            <ui-input
              type="email"
              label="Email Address"
              placeholder="john@example.com"
              full-width
            ></ui-input>
            <ui-input
              type="search"
              label="Search"
              placeholder="Search product..."
              full-width
            ></ui-input>
            <ui-input type="tel" label="Telephone" placeholder="+1 (234) 567" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Password Features -->
        <pg-example-section
          id="passwords"
          title="Password Features"
          description="Advanced password handling with strength meters and visibility toggles."
          [code]="passwordsCode"
        >
          <div class="demo-grid col-2">
            <ui-input type="password" label="Basic Password" full-width></ui-input>
            <ui-input
              type="password"
              label="Secured Entry"
              show-password-toggle
              value="Secret123!"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Numbers & Steppers -->
        <pg-example-section
          id="numbers"
          title="Numbers & Steppers"
          description="Numeric inputs with convenient increment/decrement buttons."
          [code]="numbersCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              type="number"
              label="Quantity Selection"
              show-steppers
              value="10"
              full-width
            ></ui-input>
            <ui-input
              type="number"
              label="Percentage Range"
              min="0"
              max="100"
              placeholder="0-100"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Visual Variants -->
        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Multiple style architectures to integrate seamlessly into any theme."
          [code]="variantsCode"
        >
          <div class="demo-grid col-2">
            <ui-input variant="outlined" label="Outlined (Default)" full-width></ui-input>
            <ui-input variant="filled" label="Filled" full-width></ui-input>
            <ui-input variant="soft" label="Soft / Secondary" full-width></ui-input>
            <ui-input variant="underlined" label="Underlined" full-width></ui-input>
            <ui-input variant="ghost" label="Ghost / Minimal" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Input Sizes -->
        <pg-example-section
          id="sizes"
          title="Input Sizes"
          description="Support for three distinct size tiers: small, medium, and large."
          [code]="sizesCode"
        >
          <div class="demo-flex-wrap flex-items-end">
            <ui-input size="small" label="Compact" full-width></ui-input>
            <ui-input size="medium" label="Standard" full-width></ui-input>
            <ui-input size="large" label="Prominent" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Color Variants -->
        <pg-example-section
          id="color-variants"
          title="Color Variants"
          description="Semantic color contexts using the color prop across outlined and soft variants."
          [code]="colorVariantsCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              color="primary"
              variant="outlined"
              label="Primary"
              prefix-icon="zap"
              full-width
            ></ui-input>
            <ui-input
              color="primary"
              variant="soft"
              label="Primary Soft"
              prefix-icon="zap"
              full-width
            ></ui-input>
            <ui-input
              color="success"
              variant="outlined"
              label="Success"
              prefix-icon="check-circle"
              full-width
            ></ui-input>
            <ui-input
              color="success"
              variant="soft"
              label="Success Soft"
              prefix-icon="check-circle"
              full-width
            ></ui-input>
            <ui-input
              color="danger"
              variant="outlined"
              label="Danger"
              prefix-icon="alert-circle"
              full-width
            ></ui-input>
            <ui-input
              color="danger"
              variant="soft"
              label="Danger Soft"
              prefix-icon="alert-circle"
              full-width
            ></ui-input>
            <ui-input
              color="warning"
              variant="outlined"
              label="Warning"
              prefix-icon="alert-triangle"
              full-width
            ></ui-input>
            <ui-input
              color="info"
              variant="outlined"
              label="Info"
              prefix-icon="info"
              full-width
            ></ui-input>
            <ui-input
              color="secondary"
              variant="outlined"
              label="Secondary"
              prefix-icon="box"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Floating Labels -->
        <pg-example-section
          id="floating"
          title="Floating Labels"
          description="Premium animation where the label floats above the field on interaction."
          [code]="floatingCode"
        >
          <div class="demo-grid col-2">
            <ui-input floating-label label="Quick Search" variant="outlined" full-width></ui-input>
            <ui-input
              floating-label
              label="Email Address"
              variant="filled"
              prefix-icon="mail"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Prefix & Suffix -->
        <pg-example-section
          id="decorators"
          title="Prefix & Suffix"
          description="Contextual decorators for URLs, currency, search, and more."
          [code]="decoratorsCode"
        >
          <div class="demo-grid col-2">
            <ui-input prefix-text="https://" label="Website URL" full-width></ui-input>
            <ui-input suffix-text=".com" label="Domain Name" full-width></ui-input>
            <ui-input
              prefix-icon="search"
              suffix-icon="mic"
              placeholder="Speak to search"
              full-width
            ></ui-input>
            <ui-input badge="99+" label="Inbound Tasks" suffix-icon="bell" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Chromatic Decorators -->
        <pg-example-section
          id="color-decorators"
          title="Chromatic Decorators"
          description="Professional colored prefix/suffix blocks with semantic coloring for high-impact context."
          [code]="colorDecoratorsCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              label="Secure Domain"
              prefix-text="https://"
              prefix-color="success"
              placeholder="example.com"
              full-width
            ></ui-input>
            <ui-input
              label="Access Token"
              prefix-icon="shield-check"
              prefix-color="primary"
              placeholder="Enter secure token..."
              full-width
            ></ui-input>
            <ui-input
              label="Global Search"
              suffix-icon="search"
              suffix-color="primary"
              suffix-clickable
              placeholder="Search cloud..."
              full-width
            ></ui-input>
            <ui-input
              label="System Clear"
              suffix-text="RESET"
              suffix-color="danger"
              suffix-clickable
              placeholder="Irreversible action"
              full-width
            ></ui-input>
            <ui-input
              label="Subdomain"
              suffix-text=".dream.io"
              suffix-color="secondary"
              placeholder="myspace"
              full-width
            ></ui-input>
            <ui-input
              label="Currency"
              prefix-text="USD"
              prefix-color="info"
              type="number"
              placeholder="0.00"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Multiline -->
        <pg-example-section
          id="multiline"
          title="Multiline & Auto-resize"
          description="Textareas that can automatically expand based on content volume."
          [code]="multilineCode"
        >
          <div class="demo-grid col-1">
            <ui-input multiline rows="3" label="Fixed Text Area" full-width></ui-input>
            <ui-input
              multiline
              auto-resize
              label="Auto-expanding thoughts"
              placeholder="Type a long story..."
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Validation -->
        <pg-example-section
          id="validation"
          title="Rich Feedback"
          description="Communicate validation results using semantic colors."
          [code]="validationCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              validation-state="error"
              error-text="Username already taken"
              label="Username"
              full-width
            ></ui-input>
            <ui-input
              validation-state="success"
              success-text="Strong password"
              type="password"
              label="Password"
              full-width
            ></ui-input>
            <ui-input
              validation-state="warning"
              warning-text="Database connection is slow"
              label="Search"
              full-width
            ></ui-input>
            <ui-input
              validation-state="info"
              info-text="Last synced 5m ago"
              label="Status"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Constraints -->
        <pg-example-section
          id="constraints"
          title="Length Constraints"
          description="Manage input length with visual counters and minimum markers."
          [code]="constraintsCode"
        >
          <div class="demo-grid col-2">
            <ui-input max-length="20" show-counter label="Bio (Max 20 chars)" full-width></ui-input>
            <ui-input
              min-length-indicator="10"
              label="Comment (Min 10 chars)"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- masking -->
        <pg-example-section
          id="masking"
          title="Input Masking"
          description="Data formatted automatically for phone, cards, currency and more."
          [code]="maskingCode"
        >
          <div class="demo-grid col-2">
            <ui-input mask="phone" label="Phone" placeholder="(000) 000-0000" full-width></ui-input>
            <ui-input
              mask="credit-card"
              label="Credit Card"
              prefix-icon="credit-card"
              full-width
            ></ui-input>
            <ui-input mask="currency" label="Monthly Budget" value="5000" full-width></ui-input>
            <ui-input mask="date" label="Birth Date" placeholder="MM/DD/YYYY" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Range Sliders -->
        <pg-example-section
          id="range"
          title="Range Sliders"
          description="Premium range slider styling with dynamic track filling, variants, and sizes."
          [code]="rangeCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              type="range"
              label="Volume Control"
              min="0"
              max="100"
              value="65"
              full-width
            ></ui-input>
            <ui-input
              type="range"
              label="Brightness"
              variant="soft"
              min="0"
              max="100"
              value="40"
              prefix-icon="sun"
              full-width
            ></ui-input>
            <ui-input
              type="range"
              label="Opacity"
              size="xl"
              min="0"
              max="1"
              step="0.01"
              value="0.85"
              full-width
            ></ui-input>
            <ui-input type="range" label="Locked Setting" disabled value="50" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Multimedia -->
        <pg-example-section
          id="multimedia"
          title="Pickers & Sliders"
          description="Advanced inputs for colors, dates, and ranges."
          [code]="multimediaCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              type="color"
              value="#4f46e5"
              label="Primary Theme Color"
              full-width
            ></ui-input>
            <ui-input
              type="range"
              label="Master Volume"
              min="0"
              max="100"
              value="75"
              full-width
            ></ui-input>
            <ui-input type="date" label="Project Deadline" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Files -->
        <pg-example-section
          id="files"
          title="File Uploads"
          description="Robust file selection system with support for multiples and type filters."
          [code]="filesCode"
        >
          <div class="demo-grid col-2">
            <ui-input type="file" label="Standard Document" full-width></ui-input>
            <ui-input
              type="file"
              multiple
              label="Batch Gallery"
              accept="image/*"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Interaction -->
        <pg-example-section
          id="interaction"
          title="Interaction Kits"
          description="Premium helpers for clear, copy, loading, and skeleton states."
          [code]="interactionCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              show-clear
              placeholder="Type to clear"
              label="Clearable Entry"
              value="Initial text"
              full-width
            ></ui-input>
            <ui-input
              show-copy
              value="API_KEY_SECURE_123"
              label="Access Token"
              full-width
            ></ui-input>
            <ui-input
              loading
              label="Data Pipeline"
              placeholder="Processing records..."
              full-width
            ></ui-input>
            <ui-input skeleton label="Loading Component" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- OTP & PIN -->
        <pg-example-section
          id="otp-pin"
          title="OTP & PIN"
          description="Segmented verification fields with elite focus transitions for secure code entry."
          [code]="otpPinCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              type="otp"
              otp-length="6"
              label="Verification Code"
              helper-text="Check your email for the 6-digit code"
              full-width
            ></ui-input>
            <ui-input
              type="pin"
              otp-length="4"
              label="Security PIN"
              helper-text="Enter your 4-digit PIN"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Voice & Status -->
        <pg-example-section
          id="voice-status"
          title="Voice & Status"
          description="Integrated AI voice dictation and real-time connectivity status indicators."
          [code]="voiceStatusCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              label="Voice Messenger"
              voice-enabled
              placeholder="Click the mic to speak..."
              status-indicator="online"
              full-width
            ></ui-input>
            <ui-input
              label="Dynamic State"
              status-indicator="typing"
              placeholder="Someone is typing..."
              full-width
            ></ui-input>
            <ui-input
              label="Online User"
              status-indicator="online"
              placeholder="Available"
              full-width
            ></ui-input>
            <ui-input
              label="Away User"
              status-indicator="away"
              placeholder="Be right back"
              full-width
            ></ui-input>
            <ui-input
              label="Offline User"
              status-indicator="offline"
              placeholder="Currently unavailable"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Master Tier -->
        <pg-example-section
          id="master-tier"
          title="Master Tier"
          description="Next-generation cinematic effects: gradient borders, backdrop sheen, progress rings, dirty tracking, and AI ghost text."
          [code]="masterTierCode"
        >
          <div class="demo-grid col-2">
            <ui-input
              label="Gradient Horizon"
              gradient-border
              variant="outlined"
              placeholder="Animated focus boundary"
              full-width
            ></ui-input>
            <ui-input
              label="Deep Sheen"
              backdrop-sheen
              variant="glass"
              placeholder="Interactive depth field"
              full-width
            ></ui-input>
            <ui-input
              label="Animated Line"
              animated-line
              variant="underlined"
              placeholder="Animated line on focus"
              full-width
            ></ui-input>
            <ui-input
              label="Content Velocity"
              show-progress-circle
              max-length="50"
              value="Tracking character density..."
              full-width
            ></ui-input>
            <ui-input
              label="Dirty Tracking"
              dirty-tracking
              default-value="Original State"
              value="Modified state"
              helper-text="Amber dot = unsaved changes"
              full-width
            ></ui-input>
            <ui-input
              label="AI Smart Search"
              value="how to "
              suggested-value="how to build elite stencil components"
              prefix-icon="sparkles"
              variant="glass"
              helper-text="Ghost text shows AI completion"
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- Suggestions -->
        <pg-example-section
          id="suggestions"
          title="Autocomplete"
          description="Fuzzy matching suggestions for faster input entry."
          [code]="suggestionsCode"
        >
          <div class="max-w-400">
            <ui-input
              label="Framework"
              [attr.suggestions]="'Angular,React,Vue,Svelte,Solid,Stencil'"
              placeholder="Search library..."
              full-width
            ></ui-input>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Inert states like disabled, readonly, and RTL support."
          [code]="statesCode"
        >
          <div class="demo-grid col-2">
            <ui-input disabled value="Not editable" label="Disabled State" full-width></ui-input>
            <ui-input readonly value="View only data" label="Readonly State" full-width></ui-input>
            <ui-input rtl value="امتحان نص مكتوب للعرب" label="RTL Mode" full-width></ui-input>
          </div>
        </pg-example-section>

        <!-- Input Pair -->
        <pg-example-section
          id="input-pair"
          title="Input Pair"
          description="Seamlessly connected dual inputs for range selection, name fields, and multi-part data entry."
          [code]="inputPairCode"
        >
          <div class="demo-grid col-1">
            <ui-input-pair
              type="currency"
              label-left="Minimum Price"
              label-right="Maximum Price"
              placeholder-left="0.00"
              placeholder-right="No limit"
              gap="0"
              full-width
            ></ui-input-pair>
            <ui-input-pair
              label-left="First Name"
              label-right="Last Name"
              placeholder-left="John"
              placeholder-right="Doe"
              gap="12px"
              full-width
            ></ui-input-pair>
            <ui-input-pair
              type="number"
              label-left="From"
              label-right="To"
              gap="0"
              variant="soft"
              full-width
            ></ui-input-pair>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <ds-input-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="input"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
