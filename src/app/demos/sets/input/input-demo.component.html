<div class="demo-container">
  <pg-demo-header
    icon="⌨️"
    title="Input Component"
    description="A high-performance, feature-rich input system with specialized types, masking, validation, and premium aesthetics."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Types -->
        <pg-example-section
          id="basic"
          title="Basic Types"
          description="Support for standard native input types with enhanced UI."
          [code]="basicCode"
        >
          <div class="demo-grid col-2">
            <dui-input label="Full Name" placeholder="John Doe" full-width></dui-input>
            <dui-input
              type="email"
              label="Email Address"
              placeholder="john@example.com"
              full-width
            ></dui-input>
            <dui-input
              type="search"
              label="Search"
              placeholder="Search product..."
              full-width
            ></dui-input>
            <dui-input
              type="tel"
              label="Telephone"
              placeholder="+1 (234) 567"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Password Features -->
        <pg-example-section
          id="passwords"
          title="Password Features"
          description="Advanced password handling with strength meters and visibility toggles."
          [code]="passwordsCode"
        >
          <div class="demo-grid col-2">
            <dui-input type="password" label="Basic Password" full-width></dui-input>
            <dui-input
              type="password"
              label="Secured Entry"
              show-password-toggle
              value="Secret123!"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Numbers & Steppers -->
        <pg-example-section
          id="numbers"
          title="Numbers & Steppers"
          description="Numeric inputs with convenient increment/decrement buttons."
          [code]="numbersCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              type="number"
              label="Quantity Selection"
              show-steppers
              value="10"
              full-width
            ></dui-input>
            <dui-input
              type="number"
              label="Percentage Range"
              min="0"
              max="100"
              placeholder="0-100"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Visual Variants -->
        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Multiple style architectures to integrate seamlessly into any theme."
          [code]="variantsCode"
        >
          <div class="demo-grid col-2">
            <dui-input variant="outlined" label="Outlined (Default)" full-width></dui-input>
            <dui-input variant="filled" label="Filled" full-width></dui-input>
            <dui-input variant="soft" label="Soft / Secondary" full-width></dui-input>
            <dui-input variant="underlined" label="Underlined" full-width></dui-input>
            <dui-input variant="ghost" label="Ghost / Minimal" full-width></dui-input>
          </div>
        </pg-example-section>

        <!-- Input Sizes -->
        <pg-example-section
          id="sizes"
          title="Input Sizes"
          description="Support for three distinct size tiers: small, medium, and large."
          [code]="sizesCode"
        >
          <div class="demo-flex-wrap flex-items-end">
            <dui-input size="small" label="Compact" full-width></dui-input>
            <dui-input size="medium" label="Standard" full-width></dui-input>
            <dui-input size="large" label="Prominent" full-width></dui-input>
          </div>
        </pg-example-section>

        <!-- Floating Labels -->
        <pg-example-section
          id="floating"
          title="Floating Labels"
          description="Premium animation where the label floats above the field on interaction."
          [code]="floatingCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              floating-label
              label="Quick Search"
              variant="outlined"
              full-width
            ></dui-input>
            <dui-input
              floating-label
              label="Email Address"
              variant="filled"
              prefix-icon="mail"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Prefix & Suffix -->
        <pg-example-section
          id="decorators"
          title="Prefix & Suffix"
          description="Contextual decorators for URLs, currency, search, and more."
          [code]="decoratorsCode"
        >
          <div class="demo-grid col-2">
            <dui-input prefix-text="https://" label="Website URL" full-width></dui-input>
            <dui-input suffix-text=".com" label="Domain Name" full-width></dui-input>
            <dui-input
              prefix-icon="search"
              suffix-icon="mic"
              placeholder="Speak to search"
              full-width
            ></dui-input>
            <dui-input badge="99+" label="Inbound Tasks" suffix-icon="bell" full-width></dui-input>
          </div>
        </pg-example-section>

        <!-- Multiline -->
        <pg-example-section
          id="multiline"
          title="Multiline & Auto-resize"
          description="Textareas that can automatically expand based on content volume."
          [code]="multilineCode"
        >
          <div class="demo-grid col-1">
            <dui-input multiline rows="3" label="Fixed Text Area" full-width></dui-input>
            <dui-input
              multiline
              auto-resize
              label="Auto-expanding thoughts"
              placeholder="Type a long story..."
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Validation -->
        <pg-example-section
          id="validation"
          title="Rich Feedback"
          description="Communicate validation results using semantic colors."
          [code]="validationCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              validation-state="error"
              error-text="Username already taken"
              label="Username"
              full-width
            ></dui-input>
            <dui-input
              validation-state="success"
              success-text="Strong password"
              type="password"
              label="Password"
              full-width
            ></dui-input>
            <dui-input
              validation-state="warning"
              warning-text="Database connection is slow"
              label="Search"
              full-width
            ></dui-input>
            <dui-input
              validation-state="info"
              info-text="Last synced 5m ago"
              label="Status"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Constraints -->
        <pg-example-section
          id="constraints"
          title="Length Constraints"
          description="Manage input length with visual counters and minimum markers."
          [code]="constraintsCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              max-length="20"
              show-counter
              label="Bio (Max 20 chars)"
              full-width
            ></dui-input>
            <dui-input
              min-length-indicator="10"
              label="Comment (Min 10 chars)"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- masking -->
        <pg-example-section
          id="masking"
          title="Input Masking"
          description="Data formatted automatically for phone, cards, currency and more."
          [code]="maskingCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              mask="phone"
              label="Phone"
              placeholder="(000) 000-0000"
              full-width
            ></dui-input>
            <dui-input
              mask="credit-card"
              label="Credit Card"
              prefix-icon="credit-card"
              full-width
            ></dui-input>
            <dui-input mask="currency" label="Monthly Budget" value="5000" full-width></dui-input>
            <dui-input
              mask="date"
              label="Birth Date"
              placeholder="MM/DD/YYYY"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Multimedia -->
        <pg-example-section
          id="multimedia"
          title="Pickers & Sliders"
          description="Advanced inputs for colors, dates, and ranges."
          [code]="multimediaCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              type="color"
              value="#4f46e5"
              label="Primary Theme Color"
              full-width
            ></dui-input>
            <dui-input
              type="range"
              label="Master Volume"
              min="0"
              max="100"
              value="75"
              full-width
            ></dui-input>
            <dui-input type="date" label="Project Deadline" full-width></dui-input>
          </div>
        </pg-example-section>

        <!-- Files -->
        <pg-example-section
          id="files"
          title="File Uploads"
          description="Robust file selection system with support for multiples and type filters."
          [code]="filesCode"
        >
          <div class="demo-grid col-2">
            <dui-input type="file" label="Standard Document" full-width></dui-input>
            <dui-input
              type="file"
              multiple
              label="Batch Gallery"
              accept="image/*"
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- Interaction -->
        <pg-example-section
          id="interaction"
          title="Interaction Kits"
          description="Premium helpers for clear, copy, loading, and skeleton states."
          [code]="interactionCode"
        >
          <div class="demo-grid col-2">
            <dui-input
              show-clear
              placeholder="Type to clear"
              label="Clearable Entry"
              value="Initial text"
              full-width
            ></dui-input>
            <dui-input
              show-copy
              value="API_KEY_SECURE_123"
              label="Access Token"
              full-width
            ></dui-input>
            <dui-input
              loading
              label="Data Pipeline"
              placeholder="Processing records..."
              full-width
            ></dui-input>
            <dui-input skeleton label="Loading Component" full-width></dui-input>
          </div>
        </pg-example-section>

        <!-- Suggestions -->
        <pg-example-section
          id="suggestions"
          title="Autocomplete"
          description="Fuzzy matching suggestions for faster input entry."
          [code]="suggestionsCode"
        >
          <div class="max-w-400">
            <dui-input
              label="Framework"
              [attr.suggestions]="'Angular,React,Vue,Svelte,Solid,Stencil'"
              placeholder="Search library..."
              full-width
            ></dui-input>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Inert states like disabled, readonly, and RTL support."
          [code]="statesCode"
        >
          <div class="demo-grid col-2">
            <dui-input disabled value="Not editable" label="Disabled State" full-width></dui-input>
            <dui-input
              readonly
              value="View only data"
              label="Readonly State"
              full-width
            ></dui-input>
            <dui-input rtl value="امتحان نص مكتوب للعرب" label="RTL Mode" full-width></dui-input>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <ds-input-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="input"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
