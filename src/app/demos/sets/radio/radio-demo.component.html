<div class="demo-container">
  <pg-demo-header
    icon="🔘"
    title="Radio Group"
    description="A component that allows users to select a single option from a set of mutually exclusive choices."
  >
  </pg-demo-header>

  <pg-demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Usage -->
        <pg-example-section
          id="basic"
          title="Basic Usage"
          description="A standard vertical radio group for simple selection."
          [code]="basicCode()"
        >
          <div class="demo-box">
            <ui-radio-group label="Subscription Plan" value="pro">
              <ui-radio value="free" label="Free Tier"></ui-radio>
              <ui-radio value="pro" label="Pro Monthly"></ui-radio>
              <ui-radio value="ent" label="Enterprise"></ui-radio>
            </ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Layout Options -->
        <pg-example-section
          id="layouts"
          title="Layout Options"
          description="Radio groups support vertical, horizontal, and multi-column grid layouts."
          [code]="layoutsCode()"
        >
          <div class="demo-grid col-1 gap-32">
            <div>
              <p class="mb-8 font-semibold">Horizontal Layout</p>
              <ui-radio-group layout="horizontal" value="m">
                <ui-radio value="m" label="Male"></ui-radio>
                <ui-radio value="f" label="Female"></ui-radio>
                <ui-radio value="o" label="Other"></ui-radio>
              </ui-radio-group>
            </div>
            <div>
              <p class="mb-8 font-semibold">Grid Layout (2 Columns)</p>
              <ui-radio-group layout="grid" columns="2" value="mon">
                <ui-radio value="mon" label="Monday"></ui-radio>
                <ui-radio value="tue" label="Tuesday"></ui-radio>
                <ui-radio value="wed" label="Wednesday"></ui-radio>
                <ui-radio value="thu" label="Thursday"></ui-radio>
              </ui-radio-group>
            </div>
          </div>
        </pg-example-section>

        <!-- Visual Variants -->
        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Different visual styles for various UI contexts."
          [code]="variantsCode()"
        >
          <div class="demo-grid col-2">
            <ui-radio-group variant="bordered" label="Bordered Style" value="a">
              <ui-radio value="a" label="Standard"></ui-radio>
              <ui-radio value="b" label="Premium"></ui-radio>
            </ui-radio-group>
            <ui-radio-group variant="underlined" label="Underlined Style" value="1">
              <ui-radio value="1" label="Lightweight"></ui-radio>
              <ui-radio value="2" label="Modern"></ui-radio>
            </ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Rich Content -->
        <pg-example-section
          id="rich"
          title="Rich Content"
          description="Radios can include descriptions, badges, and custom icons."
          [code]="richCode()"
        >
          <div class="demo-box">
            <ui-radio-group label="Shipping Logistics" value="express">
              <ui-radio 
                value="standard" 
                label="Standard Delivery" 
                description="Estimated 3-5 days delivery time"
                badge="Free"
              ></ui-radio>
              <ui-radio 
                value="express" 
                label="Express Overnight" 
                description="Next day morning guaranteed"
                badge="$19.99"
                custom-icon="zap"
              ></ui-radio>
              <ui-radio 
                value="pickup" 
                label="Store Pickup" 
                description="Available at your local branch"
                custom-icon="store"
              ></ui-radio>
            </ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Button Group -->
        <pg-example-section
          id="buttons"
          title="Button Groups"
          description="Use the button-group prop to transform radios into a cohesive tab-like interface."
          [code]="buttonsCode()"
        >
          <div class="demo-grid col-1">
             <ui-radio-group button-group label="Workspace Permissions" value="view" color="secondary">
              <ui-radio value="view" label="View Content"></ui-radio>
              <ui-radio value="edit" label="Modify Content"></ui-radio>
              <ui-radio value="admin" label="Full Control"></ui-radio>
            </ui-radio-group>
            
            <ui-radio-group button-group variant="card" label="Card Variant Mode" value="light" class="mt-24">
              <ui-radio value="light" label="Light Theme" description="Optimized for day time"></ui-radio>
              <ui-radio value="dark" label="Dark Theme" description="Easy on the eyes"></ui-radio>
            </ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Validation -->
        <pg-example-section
          id="validation"
          title="Validation & Feedback"
          description="Error handling and contextual help text."
          [code]="validationCode()"
        >
          <div class="demo-grid col-1">
            <ui-radio-group 
              required 
              invalid 
              label="Legal Agreement"
              error-message="You must select a choice to continue."
              helper-text="Read the terms carefully before selecting."
            >
              <ui-radio value="1" label="I Accept the Privacy Policy"></ui-radio>
              <ui-radio value="0" label="I Decline"></ui-radio>
            </ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Options Prop -->
        <pg-example-section
          id="options-prop"
          title="Data-Driven Options"
          description="Pass an array of objects to the options prop as an alternative to using child components."
          [code]="optionsPropCode()"
        >
          <div class="demo-box max-w-400">
            <ui-radio-group 
              label="Priority Selection" 
              [attr.options]="'[{&quot;value&quot;: &quot;low&quot;, &quot;label&quot;: &quot;Low Priority&quot;}, {&quot;value&quot;: &quot;med&quot;, &quot;label&quot;: &quot;Medium Priority&quot;}, {&quot;value&quot;: &quot;high&quot;, &quot;label&quot;: &quot;High Priority&quot;}]'"
            ></ui-radio-group>
          </div>
        </pg-example-section>

        <!-- Special Features -->
        <pg-example-section
          id="misc"
          title="Special Features"
          description="Advanced behaviors like deselecting, loading states, and custom indicator positioning."
          [code]="miscCode()"
        >
          <div class="demo-grid col-1 gap-40">
            <div>
              <p class="mb-8 font-semibold">Allow Empty (Deselectable)</p>
              <ui-radio-group [attr.allow-empty]="''" value="X">
                <ui-radio value="X" label="Selection (Click again to clear)"></ui-radio>
              </ui-radio-group>
            </div>

            <div>
              <p class="mb-8 font-semibold">No Dot Indicator (Custom Button Look)</p>
              <ui-radio-group [attr.show-dot]="'false'" layout="horizontal" value="A">
                <ui-radio value="A" label="Choice A"></ui-radio>
                <ui-radio value="B" label="Choice B"></ui-radio>
              </ui-radio-group>
            </div>

            <div>
              <p class="mb-8 font-semibold">Label Position (Left)</p>
              <ui-radio-group label-position="left" value="1">
                <ui-radio value="1" label="Option with Left Label"></ui-radio>
              </ui-radio-group>
            </div>

            <div>
              <p class="mb-8 font-semibold">Skeleton (Loading State)</p>
              <ui-radio-group [attr.skeleton]="''">
                <ui-radio label="Hidden"></ui-radio>
                <ui-radio label="Hidden"></ui-radio>
              </ui-radio-group>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="playground">
      <ds-radio-playground />
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="radio"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
