<div class="demo-container">
  <pg-demo-header
    icon="↔️"
    title="Splitter"
    description="A multi-pane layout component that allows users to resize adjacent panels. Supports nesting, min/max constraints, state persistence, and keyboard navigation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-splitter-playground></ds-splitter-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic Layouts -->
          <section class="demo-section" id="horizontal-basic">
            <div class="section-header"><h2>Horizontal Basic</h2></div>
            <div class="demo-card splitter-wrapper">
              <dui-splitter direction="horizontal">
                <div slot="panel-0" class="panel-box">Left</div>
                <div slot="panel-1" class="panel-box">Right</div>
              </dui-splitter>
            </div>
            <dui-code-preview [htmlCode]="horizontalBasicCode" activeLang="html"></dui-code-preview>
          </section>

          <section class="demo-section" id="vertical-basic">
            <div class="section-header"><h2>Vertical Basic</h2></div>
            <div class="demo-card splitter-wrapper">
              <dui-splitter direction="vertical">
                <div slot="panel-0" class="panel-box">Top</div>
                <div slot="panel-1" class="panel-box">Bottom</div>
              </dui-splitter>
            </div>
            <dui-code-preview [htmlCode]="verticalBasicCode" activeLang="html"></dui-code-preview>
          </section>

          <section class="demo-section" id="two-panels">
            <div class="section-header"><h2>Two Panels</h2></div>
            <div class="demo-card splitter-wrapper">
              <dui-splitter [attr.panels]="basicPanels | json">
                <div slot="panel-0" class="panel-box">Panel 1</div>
                <div slot="panel-1" class="panel-box">Panel 2</div>
              </dui-splitter>
            </div>
            <dui-code-preview [htmlCode]="panelsCode" activeLang="html"></dui-code-preview>
          </section>

          <!-- Interaction Examples Simplified for clean output -->
          <section class="demo-section" id="snap-threshold">
            <div class="section-header"><h2>Snap to Threshold</h2></div>
            <div class="demo-card splitter-wrapper">
              <dui-splitter snap-threshold="30">
                <div slot="panel-0" class="panel-box">Snap Zone</div>
                <div slot="panel-1" class="panel-box">Content</div>
              </dui-splitter>
            </div>
          </section>

          <!-- Complex Nested -->
          <section class="demo-section" id="nested-ide-layout">
            <div class="section-header"><h2>IDE-Style Layout</h2></div>
            <div class="demo-card h-400 border-subtle rounded-8 overflow-hidden">
              <dui-splitter direction="horizontal">
                <div slot="panel-0" class="panel-box fixed-150">Files</div>
                <div slot="panel-1">
                  <dui-splitter direction="vertical" class="h-full">
                    <div slot="panel-0" class="panel-box">Editor.ts</div>
                    <div slot="panel-1" class="panel-box">Terminal</div>
                  </dui-splitter>
                </div>
              </dui-splitter>
            </div>
          </section>

          <section class="demo-section" id="header-body-footer">
            <div class="section-header"><h2>Header-Body-Footer</h2></div>
            <div class="demo-card h-300 border-subtle rounded-8 overflow-hidden">
              <dui-splitter direction="vertical">
                <div slot="panel-0" class="panel-box fixed-50">HEADER</div>
                <div slot="panel-1" class="panel-box">BODY CONTENT</div>
                <div slot="panel-2" class="panel-box fixed-40">FOOTER</div>
              </dui-splitter>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="splitter"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
