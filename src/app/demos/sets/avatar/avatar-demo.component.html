<div class="demo-container">
  <pg-demo-header
    icon="user-circle"
    iconLibrary="lucide"
    title="Avatar"
    description="Flexible avatar component supporting images, initials, icons, groups, badges, status indicators, animations, and premium effects."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-avatar-playground></ds-avatar-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">
        <pg-example-section
          id="basic"
          title="Basic Shapes & Sizes"
          description="Circle and square shapes across small, default, and large sizes."
          [code]="basicCode"
          class="mt-0"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar name="LC" size="large" shape="circle"></app-avatar>
            <app-avatar name="DC" size="default" shape="circle"></app-avatar>
            <app-avatar name="SC" size="small" shape="circle"></app-avatar>
            <app-avatar name="LS" size="large" shape="square"></app-avatar>
            <app-avatar name="DS" size="default" shape="square"></app-avatar>
            <app-avatar name="SS" size="small" shape="square"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="types"
          title="Avatar Types"
          description="Image, icon, and initials-based avatars."
          [code]="typesCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar icon="fa fa-user" name="Icon Avatar"></app-avatar>
            <app-avatar name="John Doe"></app-avatar>
            <app-avatar name="Christopher Alexander"></app-avatar>
            <app-avatar
              src="https://api.dicebear.com/7.x/miniavs/svg?seed=1"
              name="Image"
            ></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="sizes"
          title="Sizes"
          description="Extra small, small, medium, large, extra large, and custom pixel sizes."
          [code]="sizesCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end">
            <app-avatar name="XS" size="xs"></app-avatar>
            <app-avatar name="S" size="s"></app-avatar>
            <app-avatar name="M" size="m"></app-avatar>
            <app-avatar name="L" size="l"></app-avatar>
            <app-avatar name="XL" size="xl"></app-avatar>
            <app-avatar name="C" size="80px"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="auto-scale"
          title="Auto-scale Font"
          description="Initials auto-scale with text length to fit within the avatar circle."
          [code]="autoScaleCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar name="A"></app-avatar>
            <app-avatar name="AB"></app-avatar>
            <app-avatar name="ABC"></app-avatar>
            <app-avatar name="ABCD"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="badge"
          title="With Badge"
          description="Notification count, dot, and colored badge overlays."
          [code]="badgeCode"
        >
          <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center">
            <app-avatar name="User" badge="1"></app-avatar>
            <app-avatar name="User" badge="99+"></app-avatar>
            <app-avatar name="User" badge="dot" badge-color="green"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="avatar-group"
          title="Avatar Groups"
          description="Stack multiple avatars with a +N overflow indicator."
          [code]="avatarGroupCode"
        >
          <app-avatar-group max="3">
            <app-avatar src="https://i.pravatar.cc/150?u=a" name="Member A"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=b" name="Member B"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=c" name="Member C"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=d" name="Member D"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=e" name="Member E"></app-avatar>
          </app-avatar-group>
        </pg-example-section>

        <pg-example-section
          id="custom-colors"
          title="Custom Colors"
          description="Override background and text colors for branded avatars."
          [code]="customColorsCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar name="Red" bg-color="#ef4444" text-color="white"></app-avatar>
            <app-avatar name="Blue" bg-color="#3b82f6" text-color="white"></app-avatar>
            <app-avatar name="Green" bg-color="#10b981" text-color="white"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="responsive"
          title="Responsive Size"
          description="Avatar that adapts its size based on the viewport."
          [code]="responsiveCode"
        >
          <app-avatar name="Responsive" size="responsive"></app-avatar>
        </pg-example-section>

        <pg-example-section
          id="status"
          title="Status Indicators"
          description="Visual presence indicators — online, offline, away, busy, and DND."
          [code]="statusCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <div style="text-align: center">
              <app-avatar name="Online" status="online"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                online
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="Offline" status="offline"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                offline
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="Away" status="away"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">away</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="Busy" status="busy"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">busy</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="DND" status="dnd"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">dnd</p>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="borders"
          title="Custom Borders"
          description="Apply solid, dashed, or dotted borders with custom colors."
          [code]="bordersCode"
        >
          <div style="display: flex; gap: 16px; align-items: center">
            <app-avatar name="User" border="2px solid #3b82f6"></app-avatar>
            <app-avatar name="User" border="3px dashed #ef4444"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="tooltips"
          title="Tooltips & Popovers"
          description="Hover tooltips on individual avatars and group popovers."
          [code]="tooltipsCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px">
            <app-avatar name="John Doe" tooltip="Software Engineer"></app-avatar>
            <app-avatar-group max="3" show-popover>
              <app-avatar name="User 1"></app-avatar>
              <app-avatar name="User 2"></app-avatar>
              <app-avatar name="User 3"></app-avatar>
              <app-avatar name="User 4"></app-avatar>
            </app-avatar-group>
          </div>
        </pg-example-section>

        <pg-example-section
          id="icons"
          title="Different Icons"
          description="Use FontAwesome or other icon libraries inside avatars."
          [code]="iconsCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar icon="fa fa-user" iconLibrary="fa"></app-avatar>
            <app-avatar icon="fa fa-star" iconLibrary="fa"></app-avatar>
            <app-avatar icon="fa fa-heart" iconLibrary="fa"></app-avatar>
            <app-avatar icon="fa fa-cog" iconLibrary="fa"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="badge-overlay"
          title="Badge Overlay"
          description="Positional badges at any corner of the avatar."
          [code]="badgeOverlayCode"
        >
          <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center">
            <app-avatar name="User" badge="3" badge-position="top-right"></app-avatar>
            <app-avatar name="User" badge="99+" badge-position="bottom-right"></app-avatar>
            <app-avatar
              name="User"
              badge="NEW"
              badge-position="top-left"
              badge-color="#10b981"
            ></app-avatar>
            <app-avatar
              name="User"
              badge="!"
              badge-position="bottom-left"
              badge-color="#ef4444"
            ></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="verified"
          title="Verified Badge"
          description="Blue verification checkmark for verified users."
          [code]="verifiedCode"
        >
          <div style="display: flex; gap: 16px; align-items: center">
            <app-avatar name="Verified User" verified></app-avatar>
            <app-avatar
              src="https://i.pravatar.cc/150?u=verified"
              name="Verified"
              verified
            ></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="editable"
          title="Editable/Upload"
          description="Clickable avatar with camera overlay for photo upload."
          [code]="editableCode"
        >
          <app-avatar name="User" editable></app-avatar>
        </pg-example-section>

        <pg-example-section
          id="loading"
          title="Loading State"
          description="Skeleton shimmer while the avatar image loads."
          [code]="loadingCode"
        >
          <app-avatar name="Loading" loading></app-avatar>
        </pg-example-section>

        <pg-example-section
          id="image-fit"
          title="Image Fit Options"
          description="Control how the image fills the avatar frame."
          [code]="imageFitCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <div style="text-align: center">
              <app-avatar src="https://i.pravatar.cc/150?u=fit1" fit="cover"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">cover</p>
            </div>
            <div style="text-align: center">
              <app-avatar src="https://i.pravatar.cc/150?u=fit2" fit="contain"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                contain
              </p>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="auto-color"
          title="Auto Color from Name"
          description="Automatically generates a consistent background color based on the name."
          [code]="autoColorCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center">
            <app-avatar name="Alice Anderson" auto-color></app-avatar>
            <app-avatar name="Bob Baker" auto-color></app-avatar>
            <app-avatar name="Charlie Clark" auto-color></app-avatar>
            <app-avatar name="Diana Davis" auto-color></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="gradients"
          title="Gradient Backgrounds"
          description="Apply gradient backgrounds with built-in or custom color stops."
          [code]="gradientsCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <app-avatar name="User" gradient="default"></app-avatar>
            <app-avatar
              name="User"
              gradient="custom"
              gradient-colors="#667eea,#764ba2"
            ></app-avatar>
            <app-avatar name="User" gradient="blue" gradient-colors="#4facfe,#00f2fe"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="animations"
          title="Animations"
          description="Pulse, ring, and glow animations for drawing user attention."
          [code]="animationsCode"
        >
          <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center">
            <div style="text-align: center">
              <app-avatar name="Pulse" animation="pulse"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">pulse</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="Ring" animation="ring"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">ring</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="Glow" animation="glow"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">glow</p>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="clickable"
          title="Clickable Avatars"
          description="Interactive avatars with pointer cursor and click events."
          [code]="clickableCode"
        >
          <app-avatar name="Click Me" clickable></app-avatar>
        </pg-example-section>

        <pg-example-section
          id="ring-color"
          title="Ring Color"
          description="Colored ring borders around the avatar frame."
          [code]="ringColorCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <app-avatar name="User" ring-color="#3b82f6"></app-avatar>
            <app-avatar name="User" ring-color="#ef4444"></app-avatar>
            <app-avatar name="User" ring-color="#10b981"></app-avatar>
          </div>
        </pg-example-section>

        <pg-example-section
          id="lazy-loading"
          title="Lazy Loading"
          description="Deferred image loading using IntersectionObserver."
          [code]="lazyLoadingCode"
        >
          <app-avatar src="https://i.pravatar.cc/150?u=lazy" lazy-load></app-avatar>
        </pg-example-section>

        <pg-example-section
          id="premium"
          title="Premium Features"
          description="Story rings, active speaker indicator, status pulse, and smart initials."
          [code]="premiumCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <div style="text-align: center">
              <app-avatar name="User" story-ring></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                story ring
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" story-seen></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                story seen
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" active-speaker></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                speaker
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" status="online" status-pulse></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                pulsing
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="John Doe" smart-initials></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                smart initials
              </p>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="premium-showcase"
          title="Premium Showcase"
          description="Skeleton shimmer, glassmorphism, 3D effect, and story segments."
          [code]="premiumShowcaseCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center">
            <div style="text-align: center">
              <app-avatar name="User" skeleton shimmer></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                shimmer
              </p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" glassmorphism></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">glass</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" effect-3d></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">3D</p>
            </div>
            <div style="text-align: center">
              <app-avatar name="User" story-segments="4"></app-avatar>
              <p style="font-size: 11px; margin-top: 4px; color: var(--ui-text-secondary)">
                segments
              </p>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="animated-groups"
          title="Animated Groups"
          description="Avatar groups with enter/leave animations."
          [code]="animatedGroupsCode"
        >
          <app-avatar-group animated>
            <app-avatar src="https://i.pravatar.cc/150?u=ag1" name="User 1"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=ag2" name="User 2"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=ag3" name="User 3"></app-avatar>
            <app-avatar src="https://i.pravatar.cc/150?u=ag4" name="User 4"></app-avatar>
          </app-avatar-group>
        </pg-example-section>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="avatar"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
