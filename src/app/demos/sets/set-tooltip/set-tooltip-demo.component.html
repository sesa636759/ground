<!-- Auto-wrapped by scripts/wrap-demos.js -->
<div class="demo-container">
  <pg-demo-header
    icon="💬"
    title="Tooltip"
    description="A rich, customizable tooltip with multiple triggers, positions, animations, and premium styling."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-tooltip-playground></dm-tooltip-playground>
    </div>

    <div slot="examples">
      <div class="demo-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants"></pg-demo-sidebar>

        <div class="examples-content scroll-spy-container">
          <!-- Triggers -->
          <pg-example-section
            id="triggers"
            title="Triggers"
            description="Different ways to trigger the tooltip"
            [code]="hoverCode"
          >
            <div class="demo-grid col-3">
              <div class="preview-box">
                <ui-tooltip content="I appear on hover" position="top">
                  <ui-button slot="target" label="Hover Me"></ui-button>
                </ui-tooltip>
              </div>
              <div class="preview-box">
                <ui-tooltip content="I appear on click" position="top" trigger="click">
                  <ui-button slot="target" label="Click Me"></ui-button>
                </ui-tooltip>
              </div>
              <div class="preview-box">
                <ui-tooltip content="I appear on focus" position="top" trigger="focus">
                  <ui-input
                    type="text"
                    placeholder="Focus me"
                    slot="target"
                    style="padding: 8px; border: 1px solid var(--border-color); border-radius: 6px"
                  ></ui-input>
                </ui-tooltip>
              </div>
            </div>
          </pg-example-section>

          <!-- Positioning -->
          <pg-example-section
            id="positioning"
            title="Positioning"
            description="Tooltips can be positioned in 8 different directions"
            [code]="positionCode"
          >
            <div class="position-grid">
              <div class="pos-cell top-left">
                <ui-tooltip content="Top Left" position="top-left">
                  <ui-button slot="target" label="Top Left"></ui-button>
                </ui-tooltip>
              </div>
              <div class="pos-cell top">
                <ui-tooltip content="Top Center" position="top">
                  <ui-button slot="target" label="Top"></ui-button>
                </ui-tooltip>
              </div>
              <div class="pos-cell top-right">
                <ui-tooltip content="Top Right" position="top-right">
                  <ui-button slot="target" label="Top Right"></ui-button>
                </ui-tooltip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="variants"
            title="Variants & Themes"
            description="Built-in color schemes for different contexts"
            [code]="darkVariantCode"
          >
            <div class="demo-grid col-3">
              <div class="preview-box">
                <ui-tooltip content="Dark Theme" variant="dark">
                  <ui-button
                    slot="target"
                    class="demo-btn dark"
                    variant="dark"
                    label="Dark"
                  ></ui-button>
                </ui-tooltip>
              </div>
              <div class="preview-box">
                <ui-tooltip content="Light Theme" variant="light">
                  <ui-button
                    slot="target"
                    class="demo-btn light"
                    variant="light"
                    label="Light"
                  ></ui-button>
                </ui-tooltip>
              </div>
              <div
                class="preview-box glass-bg"
                style="background: linear-gradient(135deg, #667eea, #764ba2)"
              >
                <ui-tooltip content="Glass Effect" variant="glass">
                  <ui-button
                    slot="target"
                    class="demo-btn glass"
                    variant="ghost"
                    label="Glass"
                  ></ui-button>
                </ui-tooltip>
              </div>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>
    <div slot="docs">
      <pg-component-documentation componentId="tooltip"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
