<div class="demo-container">
  <pg-demo-header
    icon="check-square"
  iconLibrary="lucide"
    title="Checkbox Component"
    description="Versatile checkbox component with support for multiple visual variants, states, groups, and seamless form integration."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Color Variants -->
        <pg-example-section
          id="color-variants"
          title="Color Variants"
          description="A wide range of built-in colors to match your application's brand"
          [code]="colorVariantsCode"
        >
          <div class="demo-flex-wrap">
            <ui-checkbox label="Primary" color="primary" checked></ui-checkbox>
            <ui-checkbox label="Secondary" color="secondary" checked></ui-checkbox>
            <ui-checkbox label="Success" color="success" checked></ui-checkbox>
            <ui-checkbox label="Danger" color="danger" checked></ui-checkbox>
            <ui-checkbox label="Warning" color="warning" checked></ui-checkbox>
            <ui-checkbox label="Info" color="info" checked></ui-checkbox>
            <ui-checkbox label="Indigo" color="indigo" checked></ui-checkbox>
            <ui-checkbox label="Purple" color="purple" checked></ui-checkbox>
            <ui-checkbox label="Pink" color="pink" checked></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- Premium Styles -->
        <pg-example-section
          id="premium-styles"
          title="Premium Styles"
          description="Enhanced visual variants including filled, soft, button, and chip styles"
          [code]="premiumStylesCode"
        >
          <div class="demo-flex-wrap">
            <ui-checkbox
              label="Filled Variant"
              variant="filled"
              color="primary"
              checked
            ></ui-checkbox>
            <ui-checkbox label="Tick Only" variant="tick" color="success" checked></ui-checkbox>
            <ui-checkbox label="Soft Variant" variant="soft" color="info" checked></ui-checkbox>
            <ui-checkbox label="Button Style" variant="button" color="danger" checked></ui-checkbox>
            <ui-checkbox label="Chip Style" variant="chip" color="warning" checked></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- Shapes & Sizes -->
        <pg-example-section
          id="shapes-sizes"
          title="Shapes & Sizes"
          description="Multiple sizes from XXXS to XXXL and various geometric shapes"
          [code]="shapesSizesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Shapes</h4>
              <div class="demo-flex-wrap">
                <ui-checkbox label="Rounded" variant="rounded" checked></ui-checkbox>
                <ui-checkbox label="Square" variant="square" checked></ui-checkbox>
                <ui-checkbox label="Round Color" variant="round-color" checked></ui-checkbox>
              </div>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Sizes</h4>
              <div class="demo-flex-wrap">
                <ui-checkbox label="Small" size="small" checked></ui-checkbox>
                <ui-checkbox label="Medium" size="medium" checked></ui-checkbox>
                <ui-checkbox label="Large" size="large" checked></ui-checkbox>
              </div>
            </div>
          </div>
        </pg-example-section>

        <!-- Label Positions -->
        <pg-example-section
          id="label-positions"
          title="Label Positions"
          description="Position the label on any side of the checkbox"
          [code]="labelPositionsCode"
        >
          <div class="demo-grid col-2">
            <ui-checkbox label="Right (Default)" label-position="right"></ui-checkbox>
            <ui-checkbox label="Left Position" label-position="left"></ui-checkbox>
            <ui-checkbox label="Top Position" label-position="top"></ui-checkbox>
            <ui-checkbox label="Bottom Position" label-position="bottom"></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- Custom Icons -->
        <pg-example-section
          id="custom-icons"
          title="Custom Icons"
          description="Replace the default checkmark with any icon from the library"
          [code]="customIconsCode"
        >
          <div class="demo-flex-wrap">
            <ui-checkbox label="Star Icon" custom-check-icon="star" checked></ui-checkbox>
            <ui-checkbox
              label="Heart Icon"
              custom-check-icon="heart"
              color="danger"
              checked
            ></ui-checkbox>
            <ui-checkbox
              label="Smile Icon"
              custom-check-icon="smile"
              color="success"
              checked
            ></ui-checkbox>
            <ui-checkbox
              label="Custom Indeterminate"
              custom-indeterminate-icon="help-circle"
              indeterminate
            ></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- Badges & Tooltips -->
        <pg-example-section
          id="badges-tooltips"
          title="Badges & Tooltips"
          description="Premium interaction features for providing more context"
          [code]="badgesTooltipsCode"
        >
          <div class="demo-flex-wrap">
            <ui-checkbox label="Notifications" badge="99+" color="primary" checked></ui-checkbox>
            <ui-checkbox label="Beta Feature" badge="New" color="success"></ui-checkbox>
            <ui-checkbox
              label="With Tooltip"
              tooltip="This setting cannot be changed"
              tooltip-position="top"
              disabled
              checked
            ></ui-checkbox>
            <ui-checkbox
              label="More Info"
              tooltip="Click to learn more about this setting"
              tooltip-position="right"
            ></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Interactive and informative states like indeterminate and readonly"
          [code]="statesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Basic States</h4>
              <div class="demo-flex-wrap">
                <ui-checkbox label="Checked" checked></ui-checkbox>
                <ui-checkbox label="Indeterminate" indeterminate></ui-checkbox>
                <ui-checkbox label="Disabled" disabled></ui-checkbox>
                <ui-checkbox label="Readonly" readonly checked></ui-checkbox>
              </div>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Validation</h4>
              <div class="demo-flex-wrap column">
                <ui-checkbox
                  label="With Helper"
                  helper-text="This is a helper message"
                ></ui-checkbox>
                <ui-checkbox
                  label="Error State"
                  invalid
                  error-message="Please accept terms"
                ></ui-checkbox>
              </div>
            </div>
          </div>
          <div class="demo-card mt-16">
            <h4 class="demo-sub-title">Skeleton Loading</h4>
            <div class="demo-flex-wrap">
              <ui-checkbox skeleton size="small"></ui-checkbox>
              <ui-checkbox skeleton size="medium"></ui-checkbox>
              <ui-checkbox skeleton size="large"></ui-checkbox>
            </div>
          </div>
        </pg-example-section>

        <!-- Checkbox Groups -->
        <pg-example-section
          id="groups"
          title="Checkbox Groups"
          description="Selection logic with a master checkbox and indeterminate state"
          [code]="groupExampleCode"
        >
          <div class="demo-card">
            <ui-checkbox
              label="Select All Categories"
              [checked]="masterChecked"
              [indeterminate]="masterIndeterminate"
              (checkboxChange)="onMasterChange($event)"
            >
            </ui-checkbox>
            <div class="sub-items">
              <ui-checkbox
                *ngFor="let item of groupItems"
                [label]="item.label"
                [(ngModel)]="item.checked"
                (change)="onItemChange()"
              >
              </ui-checkbox>
            </div>
          </div>
        </pg-example-section>

        <!-- Form Integration -->
        <pg-example-section
          id="form"
          title="Form Integration"
          description="Real-world account creation form with validation logic"
          [code]="formExampleCode"
        >
          <div class="demo-card">
            <div class="display-grid gap-16">
              <ui-checkbox
                [(ngModel)]="formTerms"
                label="I accept the Terms and Conditions"
                required
                [invalid]="termsInvalid"
                error-message="Required field"
              >
              </ui-checkbox>
              <ui-checkbox
                [(ngModel)]="formPrivacy"
                label="I agree to the Privacy Policy"
                required
                [invalid]="privacyInvalid"
                error-message="Required field"
              >
              </ui-checkbox>
              <ui-checkbox
                [(ngModel)]="formNewsletter"
                label="Subscribe to monthly newsletter"
                color="success"
              ></ui-checkbox>
            </div>
            <div class="mt-24">
              <ui-button (click)="onSubmit()" color="primary">Create Account</ui-button>
              <p class="mt-12 fw-600" [style.color]="formMessageColor">
                {{ formMessage }}
              </p>
            </div>
          </div>
        </pg-example-section>

        <!-- Elite Effects -->
        <pg-example-section
          id="elite-effects"
          title="Elite Effects"
          description="Glassmorphism, raised relief, confetti bursts, glow halos, and haptic feedback."
          [code]="eliteEffectsCode"
        >
          <div class="demo-grid col-2">
            <ui-checkbox
              label="Frosted Glass"
              description="Refractive backdrop"
              variant="glass"
              color="info"
              glow
              checked
            ></ui-checkbox>
            <ui-checkbox
              label="Raised Relief"
              description="Skeletal depth shadows"
              variant="raised"
              color="primary"
              glow
              checked
            ></ui-checkbox>
            <ui-checkbox
              label="Confetti Burst"
              description="Click to celebrate!"
              confetti
              haptic
              color="success"
            ></ui-checkbox>
            <ui-checkbox label="Primary Glow" color="primary" glow checked></ui-checkbox>
            <ui-checkbox label="Danger Glow" color="danger" glow checked></ui-checkbox>
            <ui-checkbox
              label="Custom Star Icon"
              custom-check-icon="star"
              color="warning"
              checked
              variant="round-color"
            ></ui-checkbox>
          </div>
        </pg-example-section>

        <!-- Reveal Animations -->
        <pg-example-section
          id="reveal-animations"
          title="Reveal & Stagger"
          description="Orchestrated entrance animations using reveal and reveal-stagger on checkbox groups."
          [code]="revealAnimationsCode"
        >
          <div class="demo-grid col-2">
            <ui-checkbox-group
              orientation="vertical"
              reveal="slide-up"
              reveal-stagger="80"
              label="Slide-Up Stagger"
            >
              <ui-checkbox value="read" label="Read Access" description="View only"></ui-checkbox>
              <ui-checkbox
                value="write"
                label="Write Access"
                description="Modify records"
              ></ui-checkbox>
              <ui-checkbox value="admin" label="Admin" description="Full control"></ui-checkbox>
            </ui-checkbox-group>
            <ui-checkbox-group
              layout="grid"
              columns="2"
              reveal="zoom"
              reveal-stagger="50"
              label="Zoom-In Grid"
            >
              <ui-checkbox value="a" variant="button" label="Analytics"></ui-checkbox>
              <ui-checkbox value="b" variant="button" label="Security"></ui-checkbox>
              <ui-checkbox value="c" variant="button" label="Caching"></ui-checkbox>
              <ui-checkbox value="d" variant="button" label="Logs"></ui-checkbox>
            </ui-checkbox-group>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <ds-checkbox-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="checkbox"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
