<div class="demo-container">
  <pg-demo-header
    icon="✅"
    title="Checkbox Component"
    description="Versatile checkbox component with support for multiple visual variants, states, groups, and seamless form integration."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Color Variants -->
        <pg-example-section
          id="color-variants"
          title="Color Variants"
          description="A wide range of built-in colors to match your application's brand"
          [code]="colorVariantsCode"
        >
          <div class="demo-flex-wrap">
            <dui-checkbox label="Primary" color="primary" checked></dui-checkbox>
            <dui-checkbox label="Secondary" color="secondary" checked></dui-checkbox>
            <dui-checkbox label="Success" color="success" checked></dui-checkbox>
            <dui-checkbox label="Danger" color="danger" checked></dui-checkbox>
            <dui-checkbox label="Warning" color="warning" checked></dui-checkbox>
            <dui-checkbox label="Info" color="info" checked></dui-checkbox>
            <dui-checkbox label="Indigo" color="indigo" checked></dui-checkbox>
            <dui-checkbox label="Purple" color="purple" checked></dui-checkbox>
            <dui-checkbox label="Pink" color="pink" checked></dui-checkbox>
          </div>
        </pg-example-section>

        <!-- Premium Styles -->
        <pg-example-section
          id="premium-styles"
          title="Premium Styles"
          description="Enhanced visual variants including filled, soft, button, and chip styles"
          [code]="premiumStylesCode"
        >
          <div class="demo-flex-wrap">
            <dui-checkbox
              label="Filled Variant"
              variant="filled"
              color="primary"
              checked
            ></dui-checkbox>
            <dui-checkbox label="Tick Only" variant="tick" color="success" checked></dui-checkbox>
            <dui-checkbox label="Soft Variant" variant="soft" color="info" checked></dui-checkbox>
            <dui-checkbox
              label="Button Style"
              variant="button"
              color="danger"
              checked
            ></dui-checkbox>
            <dui-checkbox label="Chip Style" variant="chip" color="warning" checked></dui-checkbox>
          </div>
        </pg-example-section>

        <!-- Shapes & Sizes -->
        <pg-example-section
          id="shapes-sizes"
          title="Shapes & Sizes"
          description="Multiple sizes from XXXS to XXXL and various geometric shapes"
          [code]="shapesSizesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Shapes</h4>
              <div class="demo-flex-wrap">
                <dui-checkbox label="Rounded" variant="rounded" checked></dui-checkbox>
                <dui-checkbox label="Square" variant="square" checked></dui-checkbox>
                <dui-checkbox label="Round Color" variant="round-color" checked></dui-checkbox>
              </div>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Sizes</h4>
              <div class="demo-flex-wrap">
                <dui-checkbox label="Small" size="small" checked></dui-checkbox>
                <dui-checkbox label="Medium" size="medium" checked></dui-checkbox>
                <dui-checkbox label="Large" size="large" checked></dui-checkbox>
              </div>
            </div>
          </div>
        </pg-example-section>

        <!-- Label Positions -->
        <pg-example-section
          id="label-positions"
          title="Label Positions"
          description="Position the label on any side of the checkbox"
          [code]="labelPositionsCode"
        >
          <div class="demo-grid col-2">
            <dui-checkbox label="Right (Default)" label-position="right"></dui-checkbox>
            <dui-checkbox label="Left Position" label-position="left"></dui-checkbox>
            <dui-checkbox label="Top Position" label-position="top"></dui-checkbox>
            <dui-checkbox label="Bottom Position" label-position="bottom"></dui-checkbox>
          </div>
        </pg-example-section>

        <!-- Custom Icons -->
        <pg-example-section
          id="custom-icons"
          title="Custom Icons"
          description="Replace the default checkmark with any icon from the library"
          [code]="customIconsCode"
        >
          <div class="demo-flex-wrap">
            <dui-checkbox label="Star Icon" custom-check-icon="star" checked></dui-checkbox>
            <dui-checkbox
              label="Heart Icon"
              custom-check-icon="heart"
              color="danger"
              checked
            ></dui-checkbox>
            <dui-checkbox
              label="Smile Icon"
              custom-check-icon="smile"
              color="success"
              checked
            ></dui-checkbox>
            <dui-checkbox
              label="Custom Indeterminate"
              custom-indeterminate-icon="help-circle"
              indeterminate
            ></dui-checkbox>
          </div>
        </pg-example-section>

        <!-- Badges & Tooltips -->
        <pg-example-section
          id="badges-tooltips"
          title="Badges & Tooltips"
          description="Premium interaction features for providing more context"
          [code]="badgesTooltipsCode"
        >
          <div class="demo-flex-wrap">
            <dui-checkbox label="Notifications" badge="99+" color="primary" checked></dui-checkbox>
            <dui-checkbox label="Beta Feature" badge="New" color="success"></dui-checkbox>
            <dui-checkbox
              label="With Tooltip"
              tooltip="This setting cannot be changed"
              tooltip-position="top"
              disabled
              checked
            ></dui-checkbox>
            <dui-checkbox
              label="More Info"
              tooltip="Click to learn more about this setting"
              tooltip-position="right"
            ></dui-checkbox>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Interactive and informative states like indeterminate and readonly"
          [code]="statesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Basic States</h4>
              <div class="demo-flex-wrap">
                <dui-checkbox label="Checked" checked></dui-checkbox>
                <dui-checkbox label="Indeterminate" indeterminate></dui-checkbox>
                <dui-checkbox label="Disabled" disabled></dui-checkbox>
                <dui-checkbox label="Readonly" readonly checked></dui-checkbox>
              </div>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Validation</h4>
              <div class="demo-flex-wrap column">
                <dui-checkbox
                  label="With Helper"
                  helper-text="This is a helper message"
                ></dui-checkbox>
                <dui-checkbox
                  label="Error State"
                  invalid
                  error-message="Please accept terms"
                ></dui-checkbox>
              </div>
            </div>
          </div>
          <div class="demo-card mt-16">
            <h4 class="demo-sub-title">Skeleton Loading</h4>
            <div class="demo-flex-wrap">
              <dui-checkbox skeleton size="small"></dui-checkbox>
              <dui-checkbox skeleton size="medium"></dui-checkbox>
              <dui-checkbox skeleton size="large"></dui-checkbox>
            </div>
          </div>
        </pg-example-section>

        <!-- Checkbox Groups -->
        <pg-example-section
          id="groups"
          title="Checkbox Groups"
          description="Selection logic with a master checkbox and indeterminate state"
          [code]="groupExampleCode"
        >
          <div class="demo-card">
            <dui-checkbox
              label="Select All Categories"
              [checked]="masterChecked"
              [indeterminate]="masterIndeterminate"
              (checkboxChange)="onMasterChange($event)"
            >
            </dui-checkbox>
            <div class="sub-items">
              <dui-checkbox
                *ngFor="let item of groupItems"
                [label]="item.label"
                [(ngModel)]="item.checked"
                (change)="onItemChange()"
              >
              </dui-checkbox>
            </div>
          </div>
        </pg-example-section>

        <!-- Form Integration -->
        <pg-example-section
          id="form"
          title="Form Integration"
          description="Real-world account creation form with validation logic"
          [code]="formExampleCode"
        >
          <div class="demo-card">
            <div class="display-grid gap-16">
              <dui-checkbox
                [(ngModel)]="formTerms"
                label="I accept the Terms and Conditions"
                required
                [invalid]="termsInvalid"
                error-message="Required field"
              >
              </dui-checkbox>
              <dui-checkbox
                [(ngModel)]="formPrivacy"
                label="I agree to the Privacy Policy"
                required
                [invalid]="privacyInvalid"
                error-message="Required field"
              >
              </dui-checkbox>
              <dui-checkbox
                [(ngModel)]="formNewsletter"
                label="Subscribe to monthly newsletter"
                color="success"
              ></dui-checkbox>
            </div>
            <div class="mt-24">
              <dui-button (click)="onSubmit()" color="primary">Create Account</dui-button>
              <p class="mt-12 fw-600" [style.color]="formMessageColor">
                {{ formMessage }}
              </p>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <ds-checkbox-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="checkbox"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
