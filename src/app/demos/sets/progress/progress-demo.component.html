<div class="demo-container">
  <pg-demo-header
    icon="bar-chart-2"
    iconLibrary="lucide"
    title="Progress"
    description="Dynamic progress indicators with line, circle, dashboard, multi-segment, and premium visual effects."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-progress-playground></ds-progress-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="line"
          title="Line Progress"
          description="Standard linear progress indicators with various stroke and step configurations."
          [code]="lineCode"
          class="mt-0"
        >
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Default</p>
              <ui-progress [percent]="progressValue"></ui-progress>
            </div>
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Thick Stroke</p>
              <ui-progress [percent]="75" stroke-width="20"></ui-progress>
            </div>
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Steps Layout</p>
              <ui-progress [percent]="60" steps="5"></ui-progress>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="circle"
          title="Circle Progress"
          description="Circular indicators suitable for compact areas and dashboard widgets."
          [code]="circleCode"
        >
          <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap;">
            <ui-progress type="circle" [percent]="progressValue"></ui-progress>
            <ui-progress type="circle" [percent]="100" status="success"></ui-progress>
            <ui-progress type="circle" [percent]="50" size="small"></ui-progress>
          </div>
        </pg-example-section>

        <pg-example-section
          id="dashboard"
          title="Dashboard Style"
          description="Segmented arcs perfect for performance gauges and limits."
          [code]="dashboardCode"
        >
          <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap;">
            <ui-progress type="dashboard" [percent]="progressValue"></ui-progress>
            <ui-progress type="dashboard" [percent]="75" gap-degree="90" gap-position="bottom"></ui-progress>
            <ui-progress type="dashboard" [percent]="60" gap-degree="120" gap-position="top"></ui-progress>
          </div>
        </pg-example-section>

        <pg-example-section
          id="status"
          title="State & Status"
          description="Visual hints representing different progress states — success, exception, active, and normal."
          [code]="statusCode"
        >
          <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
            <ui-progress percent="100" status="success"></ui-progress>
            <ui-progress percent="50" status="exception"></ui-progress>
            <ui-progress percent="70" status="active"></ui-progress>
            <ui-progress percent="30" status="normal"></ui-progress>
          </div>
        </pg-example-section>

        <pg-example-section
          id="buffer"
          title="Buffer & Indeterminate"
          description="Indicators for streaming data or unknown durations."
          [code]="bufferCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Buffer State</p>
              <ui-progress [percent]="40" show-buffer buffer="65"></ui-progress>
            </div>
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Indeterminate Line</p>
              <ui-progress indeterminate></ui-progress>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
              <p style="margin: 0; font-size: 12px; color: var(--ui-text-secondary);">Indeterminate Circle</p>
              <ui-progress type="circle" indeterminate></ui-progress>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="multi"
          title="Multi-Segment Progress"
          description="Stack multiple progress values in a single bar for data breakdown."
          [code]="lineCode"
        >
          <ui-progress
            [attr.multi-progress]="'[{&quot;percent&quot;:30,&quot;color&quot;:&quot;#3b82f6&quot;,&quot;label&quot;:&quot;Apps&quot;},{&quot;percent&quot;:20,&quot;color&quot;:&quot;#ef4444&quot;,&quot;label&quot;:&quot;System&quot;},{&quot;percent&quot;:15,&quot;color&quot;:&quot;#10b981&quot;,&quot;label&quot;:&quot;Media&quot;}]'"
          ></ui-progress>
        </pg-example-section>

        <pg-example-section
          id="premium"
          title="Premium Effects"
          description="Liquid wave, glassmorphism, and glow effects for high-end interfaces."
          [code]="lineCode"
        >
          <div style="background: #1e293b; padding: 24px; border-radius: 8px; display: flex; flex-direction: column; gap: 16px; width: 100%; box-sizing: border-box;">
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: rgba(255,255,255,0.6);">Liquid Wave Effect</p>
              <ui-progress [percent]="65" liquid stroke-color="#00f2fe"></ui-progress>
            </div>
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: rgba(255,255,255,0.6);">Glassmorphism & Glow</p>
              <ui-progress [percent]="80" glass glow stroke-color="#fff" trail-color="rgba(255,255,255,0.1)"></ui-progress>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="controls"
          title="Interactive Controls"
          description="Pause buttons and time estimation features."
          [code]="lineCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <ui-progress [percent]="progressValue" show-pause-button show-time-estimate estimated-time="150"></ui-progress>
            <div style="display: flex; gap: 8px;">
              <ui-button (click)="increaseProgress()">+10%</ui-button>
              <ui-button (click)="decreaseProgress()">-10%</ui-button>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="labels"
          title="Layout & Labels"
          description="Positioning and customizing label appearance."
          [code]="labelsCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Top Label Position</p>
              <ui-progress [percent]="85" label-position="top"></ui-progress>
            </div>
            <div>
              <p style="margin-bottom: 4px; font-size: 12px; color: var(--ui-text-secondary);">Custom Color Percentage</p>
              <ui-progress [percent]="60" percentage-color="#8b5cf6" decimal-precision="1"></ui-progress>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="progress"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
