<div class="demo-container">
  <pg-demo-header
    icon="🎠"
    title="Carousel Component"
    description="A versatile carousel component with support for multiple slides, vertical mode, center mode, autoplay, and responsive breakpoints."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-carousel-playground></ds-carousel-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content" id="examples-scroll-area">
          <pg-example-section
            id="basic"
            title="Basic Usage"
            description="A simple carousel with indicators and navigation arrows."
            [code]="basicCode"
          >
            <ui-carousel autoplay="true" autoplay-interval="3000" indicators="true" arrows="true">
              <div class="slide bg-primary">Slide 1</div>
              <div class="slide bg-secondary">Slide 2</div>
              <div class="slide bg-success">Slide 3</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="vertical"
            title="Vertical Mode"
            description="Carousel slides move vertically instead of horizontally."
            [code]="verticalCode"
          >
            <ui-carousel vertical="true" height="300px" autoplay="true">
              <div class="slide bg-info">Vertical 1</div>
              <div class="slide bg-warning">Vertical 2</div>
              <div class="slide bg-danger">Vertical 3</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="multi-slide"
            title="Multiple Slides"
            description="Show multiple slides at once and scroll by a specific number."
            [code]="multiSlideCode"
          >
            <ui-carousel slides-to-show="3" slides-to-scroll="1" infinite="true" arrows="true">
              <div class="slide border">Item 1</div>
              <div class="slide border">Item 2</div>
              <div class="slide border">Item 3</div>
              <div class="slide border">Item 4</div>
              <div class="slide border">Item 5</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="center-mode"
            title="Center Mode"
            description="Highlights the center slide with padding on the sides."
            [code]="centerModeCode"
          >
            <ui-carousel center-mode="true" center-padding="60px" slides-to-show="1" arrows="true">
              <div class="slide bg-soft-primary">Center 1</div>
              <div class="slide bg-soft-success">Center 2</div>
              <div class="slide bg-soft-warning">Center 3</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="autoplay"
            title="Autoplay & Progress"
            description="Automatically cycle through slides with a progress indicator."
            [code]="autoplayCode"
          >
            <ui-carousel autoplay="true" autoplay-interval="2000" show-progress="true" pause-on-hover="true">
              <div class="slide">Auto 1</div>
              <div class="slide">Auto 2</div>
              <div class="slide">Auto 3</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="interaction"
            title="Gestures & Keyboard"
            description="Interaction support for touch, mouse dragging, and keyboard navigation."
            [code]="interactionCode"
          >
            <ui-carousel swipe="true" enable-drag="true" keyboard="true">
              <div class="slide">Touch/Mouse/Keyboard Support</div>
              <div class="slide">Try dragging!</div>
              <div class="slide">Use arrow keys!</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="custom-controls"
            title="Custom Arrows"
            description="Modify navigation arrow text or HTML."
            [code]="customControlsCode"
          >
            <ui-carousel prev-arrow="← Previous" next-arrow="Next →">
              <div class="slide">Custom navigation labels</div>
              <div class="slide">Second slide</div>
            </ui-carousel>
          </pg-example-section>

          <pg-example-section
            id="responsive"
            title="Responsive"
            description="Configure carousel settings for different screen widths."
            [code]="responsiveCode"
          >
            <ui-carousel slides-to-show="3" [responsive]="responsiveData">
              <div class="slide border">1</div>
              <div class="slide border">2</div>
              <div class="slide border">3</div>
              <div class="slide border">4</div>
            </ui-carousel>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="carousel"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>

<style>
  .slide {
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: bold;
    color: white;
    border-radius: 12px;
  }
  .bg-primary { background: var(--primary); }
  .bg-secondary { background: var(--secondary); }
  .bg-success { background: var(--success); }
  .bg-info { background: var(--info); }
  .bg-warning { background: var(--warning); color: black; }
  .bg-danger { background: var(--danger); }
  .bg-soft-primary { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
  .bg-soft-success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
  .bg-soft-warning { background: rgba(234, 179, 8, 0.1); color: var(--warning); }
  .border { border: 2px solid var(--border-color); color: var(--text-color); }
</style>
