<div class="demo-container">
  <pg-demo-header
    icon="layout-grid"
  iconLibrary="lucide"
    title="Masonry"
    description="A powerful grid layout component supporting masonry (waterfall), fixed grid, and flex column layouts with built-in filtering, sorting, and image lightbox."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-masonry-playground></ds-masonry-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Masonry Layout -->
          <pg-example-section
            id="masonry" title="Masonry" [code]="masonryCode"
          >
            <ui-masonry [attr.items]="sampleItems | json" [columns]="3" [gap]="16"></ui-masonry>
          </pg-example-section>

          <!-- Fixed Grid -->
          <pg-example-section
            id="grid" title="Grid" [code]="gridCode"
          >
            <ui-masonry
              [attr.items]="sampleItems | json"
              layout-type="grid"
              [columns]="4"
              [gap]="12"
            ></ui-masonry>
          </pg-example-section>

          <!-- Columns Layout -->
          <pg-example-section
            id="columns" title="Columns" description="Traditional flex-based columns. Useful for newspaper-style layouts." [code]="columnsCode"
          >
            <ui-masonry
              [attr.items]="sampleItems | json"
              layout-type="columns"
              [columns]="3"
              [gap]="24"
            ></ui-masonry>
          </pg-example-section>

          <!-- Responsive Design -->
          <pg-example-section
            id="responsive" title="Design" [code]="responsiveCode"
          >
            <ui-masonry
              [attr.items]="sampleItems | json"
              [attr.breakpoints]="{ '640': 2, '768': 3, '1024': 4 }"
              [gap]="16"
            ></ui-masonry>
          </pg-example-section>

          <!-- Filtering -->
          <pg-example-section id="filtering" title="Filtering & Sorting" description="Built-in UI for filtering by categories and sorting by title or date." [code]="filteringCode"
          >
            <ui-masonry
              [attr.items]="sampleItems | json"
              show-filters
              [attr.filter-options]="filterOptions"
              [columns]="3"
            ></ui-masonry>
          </pg-example-section>

          <!-- Selection -->
          <pg-example-section id="selection" title="Selection & Batch Actions" description="Enable checkboxes and batch actions for managing collections." [code]="selectionCode"
          >
            <ui-masonry
              [attr.items]="sampleItems | json"
              selectable
              multi-select
              show-batch-actions
              [columns]="3"
            ></ui-masonry>
          </pg-example-section>

          <!-- Gallery Lightbox -->
          <pg-example-section
            id="lightbox" title="Lightbox" description="Click any item to view it in a full-screen optimized browser gallery." [code]="lightboxCode"
          >
            <ui-masonry [attr.items]="sampleItems | json" lightbox [columns]="4"></ui-masonry>
          </pg-example-section>

          <!-- Skeleton Loading -->
          <pg-example-section
            id="skeleton" title="States" description="Use skeleton screens to improve perceived performance while loading data." [code]="skeletonCode"
          >
            <ui-masonry loading-state [columns]="3" [gap]="16"></ui-masonry>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="masonry"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
