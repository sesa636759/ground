<div class="demo-container">
  <pg-demo-header
    icon="layout-panel-top"
    iconLibrary="lucide"
    title="Tab Stack"
    description="Flexible tab system supporting horizontal/vertical orientations, closable tabs, drag-and-drop reordering, and various visual styles."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <ds-tab-stack-playground></ds-tab-stack-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="orientations"
          title="Orientation Options"
          description="Horizontal and vertical tab stack layouts."
          [code]="playgroundCode"
          class="mt-0"
        >
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Horizontal</p>
              <app-tab-stack orientation="horizontal" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Vertical</p>
              <app-tab-stack orientation="vertical" [tabs]="tabs"></app-tab-stack>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Different visual styles — default, pills, and underline."
          [code]="playgroundCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Default</p>
              <app-tab-stack variant="default" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Pills</p>
              <app-tab-stack variant="pills" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Underline</p>
              <app-tab-stack variant="underline" [tabs]="tabs"></app-tab-stack>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="features"
          title="Advanced Features"
          description="Closable, draggable, and scrollable tab behaviors."
          [code]="playgroundCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Closable Tabs</p>
              <app-tab-stack closable="true" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Draggable</p>
              <app-tab-stack draggable="true" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Scrollable</p>
              <app-tab-stack scrollable="true" [tabs]="tabs"></app-tab-stack>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="sizes"
          title="Size Variants"
          description="Small, medium, and large sizes."
          [code]="playgroundCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Small</p>
              <app-tab-stack size="small" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Medium</p>
              <app-tab-stack size="medium" [tabs]="tabs"></app-tab-stack>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Large</p>
              <app-tab-stack size="large" [tabs]="tabs"></app-tab-stack>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="premium"
          title="Premium Features"
          description="Grouped tabs and glassmorphism variant."
          [code]="playgroundCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Grouped Tabs</p>
              <app-tab-stack grouped="true" [tabs]="tabs"></app-tab-stack>
            </div>
            <div style="padding: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px;">
              <p style="margin-bottom: 8px; font-size: 12px; color: rgba(255,255,255,0.7);">Glass Variant</p>
              <app-tab-stack variant="glass" [tabs]="tabs"></app-tab-stack>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="tabs"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
