<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-visuals" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Theme</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.theme"
        (ngModelChange)="updateConfig()"
        [options]="themeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 16px">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.collapsed"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Collapsed
      </label>
    </div>
  </div>

  <div slot="content-structure" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showFooter"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Footer
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      padding: 0;
    "
  >
    <div
      class="nav-container"
      [style.width]="pgConfig.collapsed ? '80px' : '280px'"
      style="height: 100%; border-right: 1px solid var(--border-color)"
    >
      <ui-nav-bar
        #demoElement
        [attr.theme]="pgConfig.theme"
        [attr.collapsed]="pgConfig.collapsed ? '' : null"
        [model]="modelJson"
      >
        <div
          slot="header"
          style="
            padding: 20px;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
          "
        >
          <div
            style="
              width: 32px;
              height: 32px;
              border-radius: 8px;
              background: var(--primary-color);
              flex-shrink: 0;
            "
          ></div>
          <span *ngIf="!pgConfig.collapsed">APPLOGO</span>
        </div>

        <div
          *ngIf="pgConfig.showFooter"
          slot="footer"
          style="
            padding: 20px;
            border-top: 1px solid var(--border-color);
            height: 80px;
            display: flex;
            align-items: center;
          "
        >
          <div style="display: flex; align-items: center; gap: 12px">
            <div
              style="
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--surface-3);
                flex-shrink: 0;
              "
            ></div>
            <div *ngIf="!pgConfig.collapsed" style="font-weight: 500">User Name</div>
          </div>
        </div>
      </ui-nav-bar>
    </div>
    <div class="content-area" style="flex: 1; padding: 40px; background: var(--bg-secondary)">
      <h1 style="margin: 0 0 16px 0; color: var(--text-color)">Page Content</h1>
      <p style="color: var(--text-secondary); margin: 0">
        The navigation bar is pinned to the side.
      </p>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
