<div class="demo-container">
  <app-demo-header
    icon="📊"
    title="Bar Chart"
    description="A versatile bar chart component for visualizing categorical data. Supports both vertical and horizontal orientations, multiple datasets, animations, and customizable styling."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-bar-chart-playground></app-bar-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Orientations -->
          <section class="demo-section" id="orientations" style="margin-top: 0">
            <div class="section-header">
              <h2>↔️ Orientations</h2>
              <p>Display data vertically or horizontally based on your layout needs.</p>
            </div>
            <div class="demo-card">
              <div style="height: 300px">
                <ui-bar-chart [data]="chartData" show-legend animated></ui-bar-chart>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="orientationsCode"
              [label]="'Orientation Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

        <div slot="docs">
      <app-component-documentation componentId="bar-chart"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
