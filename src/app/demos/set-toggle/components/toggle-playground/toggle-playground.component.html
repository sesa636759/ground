<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <select [(ngModel)]="pgConfig.layout" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="grid">Grid</option>
        </select>
      </div>

      <div class="control-group">
        <label>Grid Columns</label>
        <input
          type="number"
          min="1"
          max="4"
          [(ngModel)]="pgConfig.columns"
          (input)="updateConfig()"
          [disabled]="pgConfig.layout !== 'grid'"
        />
      </div>

      <div class="control-group">
        <label>Selection Mode</label>
        <select [(ngModel)]="pgConfig.selectionMode" (change)="updateConfig()">
          <option value="single">Single</option>
          <option value="multiple">Multiple</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Color</label>
        <select [(ngModel)]="pgConfig.color" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="success">Success</option>
          <option value="danger">Danger</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="rounded">Rounded</option>
          <option value="outlined">Outlined</option>
          <option value="glass">Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Elevation (0-5)</label>
        <input
          type="number"
          min="0"
          max="5"
          [(ngModel)]="pgConfig.elevation"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Thumb Shape</label>
        <select [(ngModel)]="pgConfig.thumbShape" (change)="updateConfig()">
          <option value="circle">Circle</option>
          <option value="square">Square</option>
        </select>
      </div>

      <div class="control-group">
        <label>Label</label>
        <input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Helper Text</label>
        <input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Label Position</label>
        <select [(ngModel)]="pgConfig.labelPosition" (change)="updateConfig()">
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <select [(ngModel)]="pgConfig.orientation" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Show
        Icons
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="toggle-container">
        <app-toggle-group
          [options]="playgroundOptions"
          [attr.layout]="pgConfig.layout"
          [attr.columns]="pgConfig.columns"
          [attr.selection-mode]="pgConfig.selectionMode"
          [attr.size]="pgConfig.size"
          [attr.color]="pgConfig.color"
          [attr.variant]="pgConfig.variant"
          [attr.elevation]="pgConfig.elevation"
          [attr.thumb-shape]="pgConfig.thumbShape"
          [attr.label]="pgConfig.label"
          [attr.helper-text]="pgConfig.helperText"
          [attr.label-position]="pgConfig.labelPosition"
          [attr.show-icons]="pgConfig.showIcons"
          [attr.disabled]="pgConfig.disabled"
          [attr.readonly]="pgConfig.readonly"
          [attr.required]="pgConfig.required"
          [attr.invalid]="pgConfig.invalid"
          [attr.enable-animation]="pgConfig.animation"
          [attr.show-skeleton]="pgConfig.skeleton"
          [attr.orientation]="pgConfig.orientation"
          (toggleGroupChange)="onToggleChange($event)"
        ></app-toggle-group>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
