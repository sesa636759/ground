<div class="playground-layout">
  <div class="playground-controls">
    <ui-accordion [items]="[{id: 'config', title: 'Configuration', icon: '⚙️'}]" [defaultOpen]="['config']" [multiple]="true">
      <div slot="content-config">
    <ui-accordion [items]="pgAccordionItems" [defaultOpen]="defaultOpen" multiple>
      <!-- Global Configuration -->
      <div slot="content-global" class="control-grid" style="padding: 16px">
        <div class="control-group">
          <label>Layout</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.layout"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Horizontal', value: 'horizontal' },
              { label: 'Vertical', value: 'vertical' },
              { label: 'Grid', value: 'grid' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Grid Columns</label>
          <app-input
            type="number"
            min="1"
            max="4"
            [(ngModel)]="pgConfig.columns"
            (ngModelChange)="updateConfig()"
            [disabled]="pgConfig.layout !== 'grid'"
          ></app-input>
        </div>

        <div class="control-group">
          <label>Selection Mode</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.selectionMode"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Single', value: 'single' },
              { label: 'Multiple', value: 'multiple' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Small', value: 'small' },
              { label: 'Medium', value: 'medium' },
              { label: 'Large', value: 'large' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Color</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.color"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Primary', value: 'primary' },
              { label: 'Secondary', value: 'secondary' },
              { label: 'Success', value: 'success' },
              { label: 'Danger', value: 'danger' },
              { label: 'Warning', value: 'warning' },
              { label: 'Info', value: 'info' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Default', value: 'default' },
              { label: 'Rounded', value: 'rounded' },
              { label: 'Outlined', value: 'outlined' },
              { label: 'Glass', value: 'glass' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Elevation (0-5)</label>
          <app-input
            type="number"
            min="0"
            max="5"
            [(ngModel)]="pgConfig.elevation"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>

        <div class="control-group">
          <label>Thumb Shape</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.thumbShape"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Circle', value: 'circle' },
              { label: 'Square', value: 'square' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Label</label>
          <app-input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()"></app-input>
        </div>

        <div class="control-group">
          <label>Helper Text</label>
          <app-input
            type="text"
            [(ngModel)]="pgConfig.helperText"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>

        <div class="control-group">
          <label>Label Position</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.labelPosition"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Left', value: 'left' },
              { label: 'Right', value: 'right' },
            ]"
          ></ui-dropdown>
        </div>

        <div class="control-group">
          <label>Orientation</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.orientation"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Horizontal', value: 'horizontal' },
              { label: 'Vertical', value: 'vertical' },
            ]"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Behavioral States -->
      <div slot="content-states" style="padding: 16px">
        <div class="checkbox-grid">
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.showIcons" (ngModelChange)="updateConfig()"></app-checkbox>
            Show Icons
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></app-checkbox>
            Disabled
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()"></app-checkbox>
            Readonly
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.required" (ngModelChange)="updateConfig()"></app-checkbox>
            Required
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.invalid" (ngModelChange)="updateConfig()"></app-checkbox>
            Invalid
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.animation" (ngModelChange)="updateConfig()"></app-checkbox>
            Animation
          </label>
          <label class="checkbox-item">
            <app-checkbox [(ngModel)]="pgConfig.skeleton" (ngModelChange)="updateConfig()"></app-checkbox>
            Skeleton
          </label>
        </div>
      </div>
    </ui-accordion>
        </div>
    </ui-accordion>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="toggle-container">
        <app-toggle-group
          [options]="playgroundOptions"
          [attr.layout]="pgConfig.layout"
          [attr.columns]="pgConfig.columns"
          [attr.selection-mode]="pgConfig.selectionMode"
          [attr.size]="pgConfig.size"
          [attr.color]="pgConfig.color"
          [attr.variant]="pgConfig.variant"
          [attr.elevation]="pgConfig.elevation"
          [attr.thumb-shape]="pgConfig.thumbShape"
          [attr.label]="pgConfig.label"
          [attr.helper-text]="pgConfig.helperText"
          [attr.label-position]="pgConfig.labelPosition"
          [attr.show-icons]="pgConfig.showIcons ? '' : null"
          [attr.disabled]="pgConfig.disabled ? '' : null"
          [attr.readonly]="pgConfig.readonly ? '' : null"
          [attr.required]="pgConfig.required ? '' : null"
          [attr.invalid]="pgConfig.invalid ? '' : null"
          [attr.enable-animation]="pgConfig.animation ? '' : null"
          [attr.show-skeleton]="pgConfig.skeleton ? '' : null"
          [attr.orientation]="pgConfig.orientation"
          (toggleGroupChange)="onToggleChange($event)"
        ></app-toggle-group>
      </div>
    </div>

    
  
      <ui-code-preview
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
    </div>
</div>
