<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Layout</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.layout"
          (change)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
            { label: 'Grid', value: 'grid' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Grid Columns</label>
        <app-input
          type="number"
          min="1"
          max="4"
          [(ngModel)]="pgConfig.columns"
          (input)="updateConfig()"
          [disabled]="pgConfig.layout !== 'grid'"
        />
      </div>

      <div class="control-group">
        <label>Selection Mode</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.selectionMode"
          (change)="updateConfig()"
          [options]="[
            { label: 'Single', value: 'single' },
            { label: 'Multiple', value: 'multiple' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">

        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (change)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Rounded', value: 'rounded' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Elevation (0-5)</label>
        <app-input
          type="number"
          min="0"
          max="5"
          [(ngModel)]="pgConfig.elevation"
          (input)="updateConfig()"
        />
      </div>

      <div class="control-group">
        <label>Thumb Shape</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.thumbShape"
          (change)="updateConfig()"
          [options]="[
            { label: 'Circle', value: 'circle' },
            { label: 'Square', value: 'square' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label</label>
        <app-input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Helper Text</label>
        <app-input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Label Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (change)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showIcons" (change)="updateConfig()" /> Show Icons
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="toggle-container">
        <app-toggle-group
          [options]="playgroundOptions"
          [attr.layout]="pgConfig.layout"
          [attr.columns]="pgConfig.columns"
          [attr.selection-mode]="pgConfig.selectionMode"
          [attr.size]="pgConfig.size"
          [attr.color]="pgConfig.color"
          [attr.variant]="pgConfig.variant"
          [attr.elevation]="pgConfig.elevation"
          [attr.thumb-shape]="pgConfig.thumbShape"
          [attr.label]="pgConfig.label"
          [attr.helper-text]="pgConfig.helperText"
          [attr.label-position]="pgConfig.labelPosition"
          [attr.show-icons]="pgConfig.showIcons"
          [attr.disabled]="pgConfig.disabled"
          [attr.readonly]="pgConfig.readonly"
          [attr.required]="pgConfig.required"
          [attr.invalid]="pgConfig.invalid"
          [attr.enable-animation]="pgConfig.animation"
          [attr.show-skeleton]="pgConfig.skeleton"
          [attr.orientation]="pgConfig.orientation"
          (toggleGroupChange)="onToggleChange($event)"
        ></app-toggle-group>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
