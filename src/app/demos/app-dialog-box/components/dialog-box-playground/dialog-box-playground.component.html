<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Appearance Slot -->
  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Status</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.status"
        (ngModelChange)="updateConfig()"
        [options]="statusOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>OK Button Text</label>
      <ui-input
        [(ngModel)]="pgConfig.okText"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Save"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Cancel Button Text</label>
      <ui-input
        [(ngModel)]="pgConfig.cancelText"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Cancel"
      ></ui-input>
    </div>
  </div>

  <!-- Behavior Slot -->
  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Backdrop</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.backdrop"
        (ngModelChange)="updateConfig()"
        [options]="backdropOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-group" style="margin-top: 12px">
      <ui-checkbox
        id="draggable"
        [(ngModel)]="pgConfig.draggable"
        (ngModelChange)="updateConfig()"
        label="Draggable"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="resizable"
        [(ngModel)]="pgConfig.resizable"
        (ngModelChange)="updateConfig()"
        label="Resizable"
      ></ui-checkbox>
    </div>
  </div>

  <!-- Visibility Slot -->
  <div slot="content-visibility" class="control-grid" style="padding: 16px">
    <div class="checkbox-group">
      <ui-checkbox
        id="showHeader"
        [(ngModel)]="pgConfig.showHeader"
        (ngModelChange)="updateConfig()"
        label="Show Header"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showFooter"
        [(ngModel)]="pgConfig.showFooter"
        (ngModelChange)="updateConfig()"
        label="Show Footer"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showMenu"
        [(ngModel)]="pgConfig.showMenu"
        (ngModelChange)="updateConfig()"
        label="Show Menu"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showMin"
        [(ngModel)]="pgConfig.showMin"
        (ngModelChange)="updateConfig()"
        label="Show Minimize"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showMax"
        [(ngModel)]="pgConfig.showMax"
        (ngModelChange)="updateConfig()"
        label="Show Maximize"
      ></ui-checkbox>
    </div>
    <div class="checkbox-group">
      <ui-checkbox
        id="showClose"
        [(ngModel)]="pgConfig.showClose"
        (ngModelChange)="updateConfig()"
        label="Show Close"
      ></ui-checkbox>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--bg-secondary);
      border-radius: 12px;
    "
  >
    <ui-button (click)="openDialog()" label="Test Dialog Display"></ui-button>

    <ui-dialog-box
      #dialogBoxElement
      dialog-title="Playground Dialog"
      icon-library="lucide"
      [attr.size]="pgConfig.size"
      [attr.variant]="pgConfig.variant"
      [attr.status]="pgConfig.status"
      [attr.backdrop]="pgConfig.backdrop"
      [attr.position]="pgConfig.position"
      [attr.ok-text]="pgConfig.okText || null"
      [attr.cancel-text]="pgConfig.cancelText || null"
      [attr.is-draggable]="pgConfig.draggable"
      [attr.resizable]="pgConfig.resizable"
      [attr.show-header]="pgConfig.showHeader"
      [attr.show-footer]="pgConfig.showFooter"
      [attr.show-menu]="pgConfig.showMenu"
      [attr.show-minimize]="pgConfig.showMin"
      [attr.show-maximize]="pgConfig.showMax"
      [attr.show-close]="pgConfig.showClose"
      [attr.menu-items]="pgConfig.showMenu ? menuItems : null"
      [attr.open]="visible ? '' : null"
      (dialogClosed)="visible = false"
    >
      <div style="padding: 20px">
        <p>
          This is the content of the dialog. Interact with the controls on the left to see changes
          in real-time.
        </p>
      </div>
      <div slot="footer" *ngIf="!pgConfig.okText && !pgConfig.cancelText">
        <ui-button
          label="Close (Slot Fallback)"
          variant="secondary"
          (click)="visible = false"
        ></ui-button>
      </div>
    </ui-dialog-box>
  </div>
</app-playground>
