<app-playground
  [items]='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  [defaultOpen]='["config"]'
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Appearance</h3>
        <div class="control-group">
          <label>Theme</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.theme"
            (ngModelChange)="updateConfig()"
            [options]="themeOptions"
          ></ui-dropdown>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="sticky"
            [(ngModel)]="pgConfig.sticky"
            (ngModelChange)="updateConfig()"
            label="Sticky Position"
          ></ui-checkbox>
        </div>
      </div>

      <div class="control-section">
        <h3>Layout</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="showIcons"
            [(ngModel)]="pgConfig.showIcons"
            (ngModelChange)="updateConfig()"
            label="Show Icons"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <div class="nav-wrapper" style="width: 100%">
      <ui-horizontal-nav
        [attr.theme]="pgConfig.theme"
        [attr.sticky]="pgConfig.sticky ? '' : null"
        [model]="modelJson"
      >
      </ui-horizontal-nav>
    </div>
  </div>
</app-playground>
