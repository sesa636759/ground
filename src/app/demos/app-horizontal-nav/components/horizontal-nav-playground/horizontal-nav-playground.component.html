
    <div class="playground-layout">
      <div class="playground-controls">
        <ui-accordion
          items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
          defaultOpen='["config"]'
          multiple
        >
          <div slot="content-config">
            <div class="control-grid">
              <div class="control-section">
                <h3>Appearance</h3>
                <div class="control-group">
                  <label>Theme</label>
                  <ui-dropdown
                    [(ngModel)]="pgConfig.theme"
                    (ngModelChange)="updateConfig()"
                    [options]="themeOptions"
                  ></ui-dropdown>
                </div>
                <div class="checkbox-group">
                  <app-checkbox
                    id="sticky"
                    [(ngModel)]="pgConfig.sticky"
                    (ngModelChange)="updateConfig()"
                    label="Sticky Position"
                  ></app-checkbox>
                </div>
              </div>

              <div class="control-section">
                <h3>Layout</h3>
                <div class="checkbox-group">
                  <app-checkbox
                    id="showIcons"
                    [(ngModel)]="pgConfig.showIcons"
                    (ngModelChange)="updateConfig()"
                    label="Show Icons"
                  ></app-checkbox>
                </div>
              </div>
            </div>

            <div class="code-output">
              <pre>{{ generatedCode() }}</pre>
            </div>

            <div class="action-buttons">
              <ui-button
                class="btn-secondary"
                variant="secondary"
                (click)="resetConfig()"
                label="Reset"
              ></ui-button>
            </div>
      </div>
      <div preview style="width: 100%; display: flex; justify-content: center; align-items: center;">
        <div class="nav-wrapper">
          <ui-horizontal-nav
            [attr.theme]="pgConfig.theme"
            [attr.sticky]="pgConfig.sticky ? '' : null"
            [model]="modelJson"
          >
          </ui-horizontal-nav>
        </div>
        <div class="content-area">
          <h2>Main Content Area</h2>
          <p>The horizontal navigation bar is positioned at the top.</p>
        </div>
    </app-playground>
