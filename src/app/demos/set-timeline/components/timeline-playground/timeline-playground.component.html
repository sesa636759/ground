<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Orientation</label>
        <select [(ngModel)]="pgConfig.orientation" (change)="updateConfig()">
          <option value="vertical">Vertical</option>
          <option value="horizontal">Horizontal</option>
        </select>
      </div>

      <div class="control-group">
        <label>Align</label>
        <select [(ngModel)]="pgConfig.align" (change)="updateConfig()">
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="center">Center</option>
          <option value="alternate">Alternate</option>
        </select>
      </div>

      <div class="control-group">
        <label>Icon Position</label>
        <select [(ngModel)]="pgConfig.iconPosition" (change)="updateConfig()">
          <option value="top">Top</option>
          <option value="center">Center</option>
          <option value="bottom">Bottom</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="outlined">Outlined</option>
          <option value="filled">Filled</option>
          <option value="minimal">Minimal</option>
          <option value="dots-only">Dots Only</option>
        </select>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <select [(ngModel)]="pgConfig.theme" (change)="updateConfig()">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="control-group">
        <label>Line Color</label>
        <input type="color" [(ngModel)]="pgConfig.lineColor" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animateOnScroll" (change)="updateConfig()" />
        Animate on Scroll
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.clickable" (change)="updateConfig()" />
        Clickable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showLine" (change)="updateConfig()" /> Show
        Line
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.wrap" (change)="updateConfig()" /> Wrap (Snake
        Layout)
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="timeline-container">
        <app-timeline
          [items]="timelineItems"
          [attr.orientation]="pgConfig.orientation"
          [attr.align]="pgConfig.align"
          [attr.icon-position]="pgConfig.iconPosition"
          [attr.variant]="pgConfig.variant"
          [attr.line-color]="pgConfig.lineColor"
          [attr.animate-on-scroll]="pgConfig.animateOnScroll"
          [attr.compact]="pgConfig.compact"
          [attr.clickable]="pgConfig.clickable"
          [attr.show-line]="pgConfig.showLine"
          [attr.wrap]="pgConfig.wrap"
          [attr.theme]="pgConfig.theme"
          (itemClick)="onItemClick($event)"
        ></app-timeline>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <button class="copy-btn" (click)="copyCode()">Copy</button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
