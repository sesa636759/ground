<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (change)="updateConfig()"
          [options]="[
            { label: 'Vertical', value: 'vertical' },
            { label: 'Horizontal', value: 'horizontal' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Align</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.align"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
            { label: 'Center', value: 'center' },
            { label: 'Alternate', value: 'alternate' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Icon Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.iconPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Top', value: 'top' },
            { label: 'Center', value: 'center' },
            { label: 'Bottom', value: 'bottom' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Outlined', value: 'outlined' },
            { label: 'Filled', value: 'filled' },
            { label: 'Minimal', value: 'minimal' },
            { label: 'Dots Only', value: 'dots-only' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (change)="updateConfig()"
          [options]="[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Line Color</label>
        <app-input type="color" [(ngModel)]="pgConfig.lineColor" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animateOnScroll" (change)="updateConfig()" />
        Animate on Scroll
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.compact" (change)="updateConfig()" /> Compact
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.clickable" (change)="updateConfig()" />
        Clickable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showLine" (change)="updateConfig()" /> Show Line
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.wrap" (change)="updateConfig()" /> Wrap (Snake Layout)
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage h-scrollable">
      <div class="timeline-container">
        <app-timeline
          [items]="timelineItems"
          [attr.orientation]="pgConfig.orientation"
          [attr.align]="pgConfig.align"
          [attr.icon-position]="pgConfig.iconPosition"
          [attr.variant]="pgConfig.variant"
          [attr.line-color]="pgConfig.lineColor"
          [attr.animate-on-scroll]="pgConfig.animateOnScroll"
          [attr.compact]="pgConfig.compact"
          [attr.clickable]="pgConfig.clickable"
          [attr.show-line]="pgConfig.showLine"
          [attr.wrap]="pgConfig.wrap"
          [attr.theme]="pgConfig.theme"
          (itemClick)="onItemClick($event)"
        ></app-timeline>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
