<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Basic Config</h3>
        <div class="control-group">
          <label>Label</label>
          <input type="text" [(ngModel)]="pgConfig.label" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Icon (Home/Save/etc)</label>
          <input type="text" [(ngModel)]="pgConfig.icon" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Behavior</h3>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="disabled"
            [(ngModel)]="pgConfig.disabled"
            (ngModelChange)="updateConfig()"
            label="Disabled"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="loading"
            [(ngModel)]="pgConfig.loading"
            (ngModelChange)="updateConfig()"
            label="Loading"
          ></app-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    "
  >
    <ui-split-button
      [attr.label]="pgConfig.label"
      [attr.icon]="pgConfig.icon"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.disabled]="pgConfig.disabled ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      [model]="modelJson"
      (uiClick)="onPrimaryClick()"
    ></ui-split-button>

    <div
      *ngIf="lastAction"
      style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem"
    >
      Last Action: <strong>{{ lastAction }}</strong>
    </div>
  </div>
</app-playground>
