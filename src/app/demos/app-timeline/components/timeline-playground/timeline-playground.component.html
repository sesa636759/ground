<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Layout</h3>
        <div class="control-group">
          <label>Orientation</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.orientation"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Horizontal', value: 'horizontal' },
              { label: 'Vertical', value: 'vertical' },
            ]"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Alignment</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.align"
            (ngModelChange)="updateConfig()"
            [options]="[
              { label: 'Left', value: 'left' },
              { label: 'Right', value: 'right' },
              { label: 'Alternate', value: 'alternate' },
            ]"
          ></ui-dropdown>
        </div>
      </div>

      <div class="control-section">
        <h3>Content</h3>
        <div class="checkbox-group">
          <app-checkbox
            id="opposite"
            [(ngModel)]="pgConfig.showOpposite"
            (ngModelChange)="updateConfig()"
          ></app-checkbox>
          <label for="opposite">Show Opposite Side</label>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="customMarker"
            [(ngModel)]="pgConfig.customMarker"
            (ngModelChange)="updateConfig()"
          ></app-checkbox>
          <label for="customMarker">Custom Markers</label>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ui-button
        actions
        variant="secondary"
        (click)="resetConfig()"
        label="Reset Configuration"
      ></ui-button>
    </div>
  </div>

  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <div class="timeline-container">
      <ui-timeline
        [attr.orientation]="pgConfig.orientation"
        [attr.align]="pgConfig.align"
        [value]="valueJson"
      >
        <ng-template let-item>
          <div style="font-weight: 600">{{ item.status }}</div>
          <div style="font-size: 0.85rem; color: #64748b">{{ item.date }}</div>
          <div *ngIf="pgConfig.showOpposite" slot="opposite">{{ item.description }}</div>
          <div
            *ngIf="pgConfig.customMarker"
            slot="marker"
            [style.background]="item.color"
            style="width: 12px; height: 12px; border-radius: 50%"
          ></div>
        </ng-template>
      </ui-timeline>
    </div>
  </div>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
