<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (change)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Color</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.color"
          (change)="updateConfig()"
          [options]="[
            { label: 'Primary', value: 'primary' },
            { label: 'Secondary', value: 'secondary' },
            { label: 'Success', value: 'success' },
            { label: 'Danger', value: 'danger' },
            { label: 'Warning', value: 'warning' },
            { label: 'Info', value: 'info' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Rounded', value: 'rounded' },
            { label: 'Square', value: 'square' },
            { label: 'Button', value: 'button' },
            { label: 'Chip', value: 'chip' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Position</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelPosition"
          (change)="updateConfig()"
          [options]="[
            { label: 'Left', value: 'left' },
            { label: 'Right', value: 'right' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Text</label>
        <input type="text" [(ngModel)]="pgConfig.label" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Helper Text</label>
        <input type="text" [(ngModel)]="pgConfig.helperText" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.checked" (change)="updateConfig()" /> Checked
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.indeterminate"
          (change)="pgConfig.checked = false; updateConfig()"
        />
        Indeterminate
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.disabled" (change)="updateConfig()" /> Disabled
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Readonly
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.required" (change)="updateConfig()" /> Required
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.invalid" (change)="updateConfig()" /> Invalid
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.enableAnimation" (change)="updateConfig()" />
        Animation
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.rippleEffect" (change)="updateConfig()" />
        Ripple
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.skeleton" (change)="updateConfig()" /> Skeleton
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage">
      <app-checkbox
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.variant]="pgConfig.variant"
        [attr.label-position]="pgConfig.labelPosition"
        [attr.label]="pgConfig.label"
        [attr.helper-text]="pgConfig.helperText"
        [checked]="pgConfig.checked"
        [indeterminate]="pgConfig.indeterminate"
        [disabled]="pgConfig.disabled"
        [readonly]="pgConfig.readonly"
        [required]="pgConfig.required"
        [invalid]="pgConfig.invalid"
        [skeleton]="pgConfig.skeleton"
        [attr.enable-animation]="pgConfig.enableAnimation.toString()"
        [attr.ripple-effect]="pgConfig.rippleEffect.toString()"
        [attr.error-message]="pgConfig.invalid ? 'This field has an error' : null"
        (checkboxChange)="onCheckboxChange($event)"
        (checkboxFocus)="onCheckboxFocus()"
        (checkboxBlur)="onCheckboxBlur()"
      >
      </app-checkbox>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
