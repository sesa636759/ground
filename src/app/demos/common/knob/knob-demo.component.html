<div class="demo-container">
  <pg-demo-header
    icon="🎛️"
    title="Knob"
    description="A versatile circular control for numeric input, supporting snapping, custom track styles, and gauge-style arc rotation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-knob-playground></dm-knob-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Size -->
          <section class="demo-section" id="size">
            <div class="section-header"><h2>Size Variants</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob size="60" value="30"></dui-knob>
              <dui-knob size="100" value="50"></dui-knob>
              <dui-knob size="150" value="70"></dui-knob>
            </div>
          </section>

          <!-- Colors -->
          <section class="demo-section" id="colors">
            <div class="section-header"><h2>Custom Colors</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob
                color="#ef4444"
                track-color="#fee2e2"
                thumb-color="#b91c1c"
                value="60"
              ></dui-knob>
              <dui-knob color="#22c55e" track-color="#dcfce7" value="80"></dui-knob>
              <dui-knob color="#3b82f6" track-color="#dbeafe" value="40"></dui-knob>
            </div>
          </section>

          <!-- Arc -->
          <section class="demo-section" id="arc">
            <div class="section-header"><h2>Arc & Gauge Styles</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob type="gauge" start-angle="135" end-angle="45" value="50"></dui-knob>
              <dui-knob type="gauge" start-angle="180" end-angle="0" value="30"></dui-knob>
            </div>
          </section>

          <!-- Ticks -->
          <section class="demo-section" id="ticks">
            <div class="section-header"><h2>Ticks & Subticks</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob show-ticks tick-count="12" sub-ticks="4" value="25"></dui-knob>
              <dui-knob show-ticks tick-count="5" labels="LO,MED,HI,EXTREME" value="2"></dui-knob>
            </div>
          </section>

          <!-- Snap -->
          <section class="demo-section" id="snap">
            <div class="section-header"><h2>Snapping & Steps</h2></div>
            <div class="demo-card knob-grid">
              <div>
                <p>Snap to 10</p>
                <dui-knob snap [snap-step]="10" value="50"></dui-knob>
              </div>
              <div>
                <p>Step 0.1</p>
                <dui-knob [step]="0.1" value="0.5" min="0" max="1"></dui-knob>
              </div>
            </div>
          </section>

          <!-- Interaction -->
          <section class="demo-section" id="interaction">
            <div class="section-header"><h2>Mouse Wheel & Multi-Touch</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob enable-wheel keyboard-step="5" value="45"></dui-knob>
            </div>
          </section>

          <!-- States -->
          <section class="demo-section" id="states">
            <div class="section-header"><h2>Disabled & Readonly</h2></div>
            <div class="demo-card knob-grid">
              <dui-knob disabled value="40"></dui-knob>
              <dui-knob readonly value="80"></dui-knob>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="knob"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
