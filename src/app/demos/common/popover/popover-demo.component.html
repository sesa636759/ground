<div class="demo-container">
  <pg-demo-header
    icon="💬"
    title="Popover"
    description="A floating content container triggered by click, hover, or focus — supports rich HTML, multiple placements, and interactive content."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-popover-playground></dm-popover-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Triggers -->
        <pg-example-section
          id="triggers"
          title="Triggers"
          description="Click, hover, or focus — different ways to open the popover"
          [code]="triggersCode"
        >
          <div class="demo-flex-wrap">
            <dui-popover
              trigger="click"
              heading="Click Trigger"
              content="Stays open until clicked outside."
            >
              <dui-button label="Click Me" variant="primary"></dui-button>
            </dui-popover>
            <dui-popover trigger="hover" heading="Hover Trigger" content="Visible while hovering.">
              <dui-button label="Hover Me" variant="secondary"></dui-button>
            </dui-popover>
            <dui-popover
              trigger="focus"
              heading="Focus Trigger"
              content="Visible while this input is focused."
            >
              <dui-input
                type="text"
                placeholder="Focus Me"
                class="p-8 border-color-border rounded-6"
              ></dui-input>
            </dui-popover>
          </div>
        </pg-example-section>

        <!-- Placements -->
        <pg-example-section
          id="placements"
          title="Placements"
          description="Position the popover on any of the four sides"
          [code]="placementsCode"
        >
          <div class="demo-flex-wrap">
            <dui-popover placement="top" content="Top Popover">
              <dui-button label="Top" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover placement="bottom" content="Bottom Popover">
              <dui-button label="Bottom" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover placement="left" content="Left Popover">
              <dui-button label="Left" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover placement="right" content="Right Popover">
              <dui-button label="Right" variant="secondary"></dui-button
            ></dui-popover>
          </div>
        </pg-example-section>

        <!-- Styles -->
        <pg-example-section
          id="styles"
          title="Styles & Themes"
          description="Light, dark, with backdrop, or with a close button"
          [code]="stylesCode"
        >
          <div class="demo-flex-wrap">
            <dui-popover variant="light" heading="Light" content="Clean light style.">
              <dui-button label="Light" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover variant="dark" heading="Dark" content="Rich dark style.">
              <dui-button label="Dark" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover backdrop heading="Backdrop" content="Dims background.">
              <dui-button label="Backdrop" variant="secondary"></dui-button
            ></dui-popover>
            <dui-popover show-close-button heading="Close Button" content="Has dismiss X.">
              <dui-button label="Close Btn" variant="secondary"></dui-button
            ></dui-popover>
          </div>
        </pg-example-section>

        <!-- Rich Content -->
        <pg-example-section
          id="rich-content"
          title="Rich Content"
          description="Use the default slot to project any HTML into the popover body"
          [code]="richContentCode"
        >
          <dui-popover heading="User Profile" interactive>
            <dui-button label="View Profile" variant="primary"></dui-button>
            <div slot="content" class="display-flex gap-12 items-center p-4">
              <img
                src="https://ui-avatars.com/api/?name=PK&background=6366f1&color=fff"
                class="w-40 h-40 rounded-50"
                alt="Avatar"
              />
              <div>
                <strong class="display-block">Praveen Kumar</strong>
                <span class="fs-12 text-gray-500">Lead Architect</span>
              </div>
            </div>
          </dui-popover>
        </pg-example-section>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="popover"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
