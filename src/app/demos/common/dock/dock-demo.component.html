<div class="demo-container">
  <pg-demo-header
    icon="anchor"
  iconLibrary="lucide"
    title="Dock"
    description="Interactive application launcher with magnification effects, drag-and-drop reordering, and glassmorphism styles."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-dock-playground></dm-dock-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Basic Layout" [code]="basicCode"
          >
            <ui-dock [attr.items]="basicItems | json"></ui-dock>
          </pg-example-section>

          <!-- Positions -->
          <pg-example-section
            id="positions" title="Dock Positions" description="Position the dock on any edge of a container." [code]="positionsCode"
          >
            <div class="demo-grid col-2">
              <div class="demo-card dock-position-card">
                <ui-dock position="left" [attr.items]="basicItems | json"></ui-dock>
                <div class="dock-label">Left Position</div>
              </div>
              <div class="demo-card dock-position-card">
                <ui-dock position="right" [attr.items]="basicItems | json"></ui-dock>
                <div class="dock-label">Right Position</div>
              </div>
            </div>

            <div class="demo-card dock-top-position-card">
              <ui-dock position="top" [attr.items]="basicItems | json"></ui-dock>
              <div class="dock-label top-label">Top Position</div>
            </div>
          </pg-example-section>

          <!-- Magnify -->
          <pg-example-section
            id="magnify" title="Magnification Effect" description="Items scale up smoothly as the mouse nears them." [code]="magnifyCode"
          >
            <ui-dock [attr.items]="basicItems | json" magnify></ui-dock>
          </pg-example-section>

          <!-- Blur -->
          <pg-example-section
            id="blur" title="Glassmorphism (Blur)" description="Adds a semi-transparent, blurred background to the dock." [code]="blurCode"
          >
            <ui-dock [attr.items]="basicItems | json" blur-effect></ui-dock>
          </pg-example-section>

          <!-- Badges -->
          <pg-example-section
            id="badges" title="Badges & Indicators"
          >
            <ui-dock [attr.items]="badgeItems | json"></ui-dock>
          </pg-example-section>

          <!-- OS Experience -->
          <pg-example-section
            id="os" title="Desktop Experience" description="A full-featured dock with separators, active indicators, and bounce effects." [code]="osCode"
          >
            <ui-dock
              [attr.items]="osItems | json"
              position="bottom"
              size="md"
              magnify
              blur-effect
            ></ui-dock>
          </pg-example-section>

          <!-- Interactive -->
          <pg-example-section
            id="interactive" title="Interactive Events" description="Drag to reorder items or click to trigger actions."
          >
            <ui-dock
              [attr.items]="basicItems | json"
              (dockItemClick)="handleItemClick($event)"
            ></ui-dock>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="dock"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
