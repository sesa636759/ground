<div class="demo-container">
  <pg-demo-header
    icon="gauge"
  iconLibrary="lucide"
    title="Speedometer"
    description="Highly customizable gauge component with support for threshold ranges, custom angles, multiple needle shapes, and interactive dragging."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-speedometer-playground></dm-speedometer-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic Gauges -->
          <pg-example-section
            id="basic" title="Gauges" description="Simple numeric displays for speed or capacity." [code]="basicCode"
          >
            <ui-speedometer [value]="65" label="Speed" unit="km/h"></ui-speedometer>
            <ui-speedometer
              [value]="85"
              label="Performance"
              unit="%"
              show-percentage
            ></ui-speedometer>
          </pg-example-section>

          <!-- Color Thresholds -->
          <pg-example-section
            id="ranges" title="Ranges" description="Dynamic arc coloring based on value ranges (e.g., Warning/Critical zones)." [code]="rangesCode"
          >
            <div class="gauge-item">
              <p>Fuel Gauge (E/F)</p>
              <ui-speedometer [value]="15" [attr.ranges]="fuelRanges"></ui-speedometer>
            </div>
            <div class="gauge-item">
              <p>Credit Score (Red-Yellow-Green)</p>
              <ui-speedometer
                [value]="75"
                [attr.ranges]="scoreRanges"
                [size]="200"
              ></ui-speedometer>
            </div>
          </pg-example-section>

          <!-- Custom Arcs -->
          <pg-example-section
            id="angles" title="Arc Angles" description="Adjust the start and end angles to create semi-circles or full circles." [code]="anglesCode"
          >
            <ui-speedometer
              [start-angle]="-90"
              [end-angle]="90"
              [value]="45"
              label="180° Half"
              [size]="200"
            ></ui-speedometer>
            <ui-speedometer
              [start-angle]="0"
              [end-angle]="360"
              [value]="270"
              label="360° Full"
              [size]="200"
            ></ui-speedometer>
            <ui-speedometer
              [start-angle]="-45"
              [end-angle]="45"
              [value]="10"
              label="90° Small"
              [size]="150"
            ></ui-speedometer>
          </pg-example-section>

          <!-- Needle Shapes -->
          <pg-example-section
            id="shapes" title="Customization" description="Various needle shapes and colors to match your UI design." [code]="shapesCode"
          >
            <ui-speedometer
              needle-shape="arrow"
              [value]="80"
              needle-color="#3b82f6"
              label="Arrow"
            ></ui-speedometer>
            <ui-speedometer
              needle-shape="line"
              [value]="40"
              needle-color="#ff4d4f"
              label="Line"
            ></ui-speedometer>
            <ui-speedometer
              needle-shape="triangle"
              [value]="60"
              label="Triangle"
            ></ui-speedometer>
          </pg-example-section>

          <!-- Interactive Mode -->
          <pg-example-section
            id="interactive" title="Mode" description="Enable users to change the value by dragging the needle directly." [code]="interactiveCode"
          >
            <ui-speedometer interactive [value]="30" label="Drag Me"></ui-speedometer>
          </pg-example-section>

          <!-- Custom Labels -->
          <pg-example-section
            id="labels" title="Tick Labels" description="Map specific values to text labels for non-numeric gauges." [code]="labelsCode"
          >
            <ui-speedometer
              [attr.custom-labels]="customMap"
              [value]="50"
              label="Tank Capacity"
            ></ui-speedometer>
            <ui-speedometer
              [attr.custom-labels]="'{&quot;0&quot;:&quot;Low&quot;,&quot;50&quot;:&quot;Med&quot;,&quot;100&quot;:&quot;High&quot;}'"
              [value]="0"
            ></ui-speedometer>
          </pg-example-section>

          <!-- Secondary & Export -->
          <pg-example-section
            id="advanced" title="Features" description="Ghost needles for comparison and gradient arcs." [code]="advancedCode"
          >
            <div class="gauge-item">
              <p>Comparison (Secondary Value)</p>
              <ui-speedometer
                [value]="80"
                [secondary-value]="45"
                label="Actual vs Target"
              ></ui-speedometer>
            </div>
            <div class="gauge-item">
              <p>Gradient Arc</p>
              <ui-speedometer [value]="90" gradient-colors="red, yellow, green"></ui-speedometer>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="speedometer"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
