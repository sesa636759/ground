<div class="demo-container">
  <pg-demo-header
    icon="📱"
    title="Aside Panel"
    description="A versatile slide-out container that anchors to any edge of the screen. Perfect for settings, navigation menus, detail views, or task-based workflows."
  ></pg-demo-header>

  <pg-demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <dm-aside-playground></dm-aside-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content">
        <!-- Directions -->
        <pg-example-section
          id="directions"
          title="Directions"
          description="Anchor the panel to any of the four screen edges: left, right, top, or bottom"
          [code]="directionsCode"
        >
          <div class="demo-flex-wrap">
            <dui-button
              variant="secondary"
              label="Left Panel"
              (buttonClick)="togglePanel('left')"
            ></dui-button>
            <dui-button
              variant="secondary"
              label="Right Panel"
              (buttonClick)="togglePanel('right')"
            ></dui-button>
            <dui-button
              variant="secondary"
              label="Top Panel"
              (buttonClick)="togglePanel('top')"
            ></dui-button>
            <dui-button
              variant="secondary"
              label="Bottom Panel"
              (buttonClick)="togglePanel('bottom')"
            ></dui-button>
          </div>
        </pg-example-section>

        <!-- Visual Styles -->
        <pg-example-section
          id="visual-styles"
          title="Visual Styles"
          description="Choose between a clean solid panel or a glassmorphism effect for premium depth"
          [code]="visualStylesCode"
        >
          <div class="demo-flex-wrap">
            <dui-button
              variant="primary"
              label="Default Panel"
              (buttonClick)="togglePanel('default')"
            ></dui-button>
            <dui-button
              variant="secondary"
              label="Glass Panel"
              (buttonClick)="togglePanel('glass')"
            ></dui-button>
          </div>
        </pg-example-section>

        <!-- Resizable -->
        <pg-example-section
          id="resizable"
          title="Resizable"
          description="Let users drag the panel edge to their preferred width or height"
          [code]="resizableCode"
        >
          <dui-button
            variant="secondary"
            label="Open Resizable Panel"
            (buttonClick)="togglePanel('resizable')"
          ></dui-button>
        </pg-example-section>

        <!-- Close Behavior -->
        <pg-example-section
          id="close-behavior"
          title="Close Behavior"
          description="Control how the panel is dismissed — via the X button, Escape key, or overlay click"
          [code]="closeBehaviorCode"
        >
          <div class="demo-flex-wrap">
            <dui-button
              variant="secondary"
              label="Close on Escape"
              (buttonClick)="togglePanel('escClose')"
            ></dui-button>
            <dui-button
              variant="secondary"
              label="Close on Overlay"
              (buttonClick)="togglePanel('overlayClose')"
            ></dui-button>
          </div>
        </pg-example-section>
      </div>
      <!-- /examples-content -->
    </div>
    <!-- /examples-split-layout -->

    <!-- Docs Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="aside-panel"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
