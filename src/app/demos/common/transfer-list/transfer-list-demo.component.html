<div class="demo-container">
  <pg-demo-header
    icon="📑"
    title="Transfer List"
    description="A complex selector that allows users to move items between two lists. Ideal for managing permissions, roles, or complex selections."
  >
  </pg-demo-header>

  <pg-demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Usage -->
        <pg-example-section
          id="basic"
          title="Basic Selection"
          description="Standard list-based transfer with search and select-all capabilities."
          [code]="basicCode()"
        >
          <div class="demo-box max-w-800">
            <dui-transfer-list
              [attr.source-items]="sourceData | json"
              [attr.target-items]="targetData | json"
              [attr.titles]="'[&quot;Available Features&quot;, &quot;Assigned Features&quot;]'"
              searchable
              (transferChange)="onTransferChange($event)"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Display Modes -->
        <pg-example-section
          id="modes"
          title="Alternative Display Modes"
          description="Switch between List, Table (for multi-column data), and Tree (for hierarchical data)."
          [code]="modesCode()"
        >
          <div class="demo-grid col-1 gap-48">
            <div>
              <p class="demo-label">Table Mode (with Columns)</p>
              <dui-transfer-list
                mode="table"
                [attr.columns]="tableColumns | json"
                [attr.source-items]="sourceData | json"
                height="300px"
              ></dui-transfer-list>
            </div>
            <div>
              <p class="demo-label">Tree Mode (Hierarchical Selection)</p>
              <dui-transfer-list
                mode="tree"
                [attr.source-items]="treeData | json"
                height="300px"
              ></dui-transfer-list>
            </div>
          </div>
        </pg-example-section>

        <!-- Reorder & Drag -->
        <pg-example-section
          id="reorder"
          title="Drag & Reorder"
          description="Enable item dragging between lists and reordering within the target list."
          [code]="reorderCode()"
        >
          <div class="demo-box">
            <dui-transfer-list
              enable-drag
              allow-reorder
              [attr.source-items]="sourceData | json"
              [attr.titles]="'[&quot;Bank&quot;, &quot;Priority Queue&quot;]'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- One Way -->
        <pg-example-section
          id="oneway"
          title="One-Way Copy"
          description="Allows items to be copied to the target list while remaining in the source."
          [code]="onewayCode()"
        >
          <div class="demo-box">
            <dui-transfer-list
              one-way
              [attr.source-items]="sourceData | json"
              [attr.titles]="'[&quot;Selectable Template&quot;, &quot;Instance Config&quot;]'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Pagination -->
        <pg-example-section
          id="pagination"
          title="Pagination for Large Datasets"
          description="Efficiently manage large lists by breaking them into navigable pages."
          [code]="paginationCode()"
        >
          <div class="demo-box">
            <dui-transfer-list
              pagination
              [attr.page-size]="3"
              [attr.source-items]="sourceData | json"
              [attr.titles]="'[&quot;Total Inventory&quot;, &quot;Order Batch&quot;]'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Custom Rendering -->
        <pg-example-section
          id="custom"
          title="Custom Item Rendering"
          description="Use the item-renderer function to present complex data structures or add custom styling to list items."
          [code]="customRenderCode()"
        >
          <div class="demo-box">
            <p class="fs-13 text-muted mb-16">
              This example demonstrates items with badges and rich metadata via custom HTML
              injection.
            </p>
            <dui-transfer-list
              [attr.source-items]="'[{&quot;key&quot;:&quot;1&quot;,&quot;label&quot;:&quot;Urgent Fix&quot;,&quot;priority&quot;:&quot;High&quot;},{&quot;key&quot;:&quot;2&quot;,&quot;label&quot;:&quot;UI Polish&quot;,&quot;priority&quot;:&quot;Low&quot;}]'"
              [attr.item-renderer]="'(item) => \`<div><div>\${item.label}</div><small style=&quot;color:var(--text-tertiary)&quot;>\${item.priority} Priority</small></div>\`'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Localization -->
        <pg-example-section
          id="i18n"
          title="Internationalization (i18n)"
          description="Customize all user-facing strings and labels using the locale object."
          [code]="localeCode()"
        >
          <div class="demo-box">
            <dui-transfer-list
              [attr.source-items]="sourceData | json"
              [attr.locale]="'{&quot;itemUnit&quot;:&quot;member&quot;,&quot;itemsUnit&quot;:&quot;members&quot;,&quot;searchPlaceholder&quot;:&quot;Rechercher des membres...&quot;,&quot;notFoundContent&quot;:&quot;Aucun résultat&quot;}'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Custom Filtering -->
        <pg-example-section
          id="filter"
          title="Custom Filtering Logic"
          description="Override the default search behavior with a custom filtering function (e.g., searching by tags or hidden metadata)."
          [code]="filterCode()"
        >
          <div class="demo-box">
            <p class="fs-13 text-muted mb-16">
              This component is configured to match against both label and description
              simultaneously.
            </p>
            <dui-transfer-list
              [attr.source-items]="sourceData | json"
              [attr.filter-option]="'(input, item) => item.label.toLowerCase().includes(input) || (item.description && item.description.toLowerCase().includes(input))'"
            ></dui-transfer-list>
          </div>
        </pg-example-section>

        <!-- Skeleton -->
        <pg-example-section
          id="skeleton"
          title="Loading Skeleton State"
          description="Visual indicator for asynchronous data fetching."
          [code]="skeletonCode()"
        >
          <div class="demo-box">
            <dui-transfer-list loading></dui-transfer-list>
          </div>
        </pg-example-section>
      </div>
    </div>

    <div slot="playground">
      <dm-transfer-list-playground />
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="transfer-list"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
