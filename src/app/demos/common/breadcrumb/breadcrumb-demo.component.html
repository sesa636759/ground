<div class="demo-container">
  <pg-demo-header
    icon="chevron-right"
    iconLibrary="lucide"
    title="Breadcrumb"
    description="A navigation element that helps users understand their location within a website or application's hierarchy."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-breadcrumb-playground></dm-breadcrumb-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="basic"
          title="Basic Usage"
          description="A simple breadcrumb trail with default string separator."
          [code]="basicCode"
          class="mt-0"
        >
          <ui-breadcrumb
            [attr.items]="basicItems"
            (breadcrumbClick)="handleBreadcrumbClick($event)"
          ></ui-breadcrumb>
        </pg-example-section>

        <pg-example-section
          id="separators"
          title="Custom Separators"
          description="Use custom string separators or SVG icon separators."
          [code]="separatorsCode"
        >
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <ui-breadcrumb [attr.items]="basicItems" separator=">"></ui-breadcrumb>
            <ui-breadcrumb
              [attr.items]="basicItems"
              separator-icon="chevron-right"
              separator-icon-library="lucide"
            ></ui-breadcrumb>
          </div>
        </pg-example-section>

        <pg-example-section
          id="icons"
          title="Icons & Badges"
          description="Include item icons, a home icon, and notification badges."
          [code]="iconsCode"
        >
          <ui-breadcrumb
            [attr.items]="iconItems"
            show-home
            home-icon="home"
            home-icon-library="lucide"
            separator-icon="chevron-right"
            separator-icon-library="lucide"
          ></ui-breadcrumb>
        </pg-example-section>

        <pg-example-section
          id="collapsing"
          title="Smart Collapsing"
          description="Automatically collapse long breadcrumb trails into a dropdown menu using max-items."
          [code]="collapsingCode"
        >
          <ui-breadcrumb
            [attr.items]="collapsibleItems"
            max-items="3"
            show-home
            home-icon="layout-dashboard"
            home-icon-library="lucide"
            separator-icon="chevron-right"
            separator-icon-library="lucide"
          ></ui-breadcrumb>
        </pg-example-section>

        <pg-example-section
          id="sizes"
          title="Sizes"
          description="Small, medium, and large sizing variations."
          [code]="sizesCode"
        >
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <ui-breadcrumb [attr.items]="basicItems" size="sm"></ui-breadcrumb>
            <ui-breadcrumb [attr.items]="basicItems" size="md"></ui-breadcrumb>
            <ui-breadcrumb [attr.items]="basicItems" size="lg"></ui-breadcrumb>
          </div>
        </pg-example-section>

        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Different structural appearances — default, pills, and glassmorphism."
          [code]="variantsCode"
        >
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <ui-breadcrumb
              [attr.items]="basicItems"
              variant="default"
              separator-icon="chevron-right"
              separator-icon-library="lucide"
            ></ui-breadcrumb>
            <ui-breadcrumb
              [attr.items]="basicItems"
              variant="pills"
              separator-icon="chevron-right"
              separator-icon-library="lucide"
            ></ui-breadcrumb>
            <div style="background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 1.5rem; border-radius: 8px;">
              <ui-breadcrumb
                [attr.items]="basicItems"
                variant="glass"
                separator-icon="chevron-right"
                separator-icon-library="lucide"
              ></ui-breadcrumb>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="breadcrumb"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
