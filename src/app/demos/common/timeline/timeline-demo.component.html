<div class="demo-container">
  <pg-demo-header
    icon="milestone"
  iconLibrary="lucide"
    title="Timeline"
    description="Visualize a series of events chronologically. Supports vertical/horizontal orientations, alternating alignments, status indicators, custom markers, and panel variants."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-timeline-playground></dm-timeline-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="alignments"
          title="Alignments"
          description="Position markers and content on different sides of the axis."
          [code]="alignmentsCode"
          class="mt-0"
        >
          <ui-timeline align="alternate" [events]="events"></ui-timeline>
        </pg-example-section>

        <pg-example-section
          id="orientations"
          title="Orientations"
          description="Switch between vertical (default) and horizontal flow."
          [code]="orientationsCode"
        >
          <ui-timeline orientation="horizontal" [events]="events"></ui-timeline>
        </pg-example-section>

        <pg-example-section
          id="statuses"
          title="Statuses & Colors"
          description="Use status prop to apply semantic coloring: success, active, wait, pending."
          [code]="statusesCode"
        >
          <ui-timeline align="left" [events]="statusEvents"></ui-timeline>
        </pg-example-section>

        <pg-example-section
          id="markers"
          title="Markers & Icons"
          description="Auto-number, emoji icon, or user avatar markers for rich visual context."
          [code]="markersCode"
        >
          <ui-timeline align="left" marker="number" [events]="markerEvents"></ui-timeline>
        </pg-example-section>

        <pg-example-section
          id="panel"
          title="Panel Variant"
          description="Card-like styling with elevated shadows on each timeline item."
          [code]="panelCode"
        >
          <ui-timeline align="alternate" variant="panel" [events]="panelEvents"></ui-timeline>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="timeline"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
