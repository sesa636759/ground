<div class="demo-container">
  <pg-demo-header
    icon="🔔"
    title="Snackbar"
    description="Lightweight toast notifications that slide in from any corner of the screen with built-in types, stacking, and auto-dismiss."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-snackbar-playground></dm-snackbar-playground>
    </div>

    <div slot="examples">
      <div class="demo-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants"></pg-demo-sidebar>

        <div class="examples-content scroll-spy-container">
          <!-- Types -->
          <pg-example-section
            id="types"
            title="Types"
            description="Built-in notification types: success, error, warning, and info"
            [code]="typesCode"
            language="javascript"
          >
            <div class="demo-flex-wrap">
              <dui-button
                variant="success"
                label="Success"
                (click)="notify('success')"
              ></dui-button>
              <dui-button variant="danger" label="Error" (click)="notify('error')"></dui-button>
              <dui-button
                variant="warning"
                label="Warning"
                (click)="notify('warning')"
              ></dui-button>
              <dui-button variant="secondary" label="Info" (click)="notify('info')"></dui-button>
            </div>
          </pg-example-section>

          <!-- Positions -->
          <pg-example-section
            id="positions"
            title="Positions"
            description="Six positions — top/bottom × left/center/right. Each button fires a notification at its labelled position."
            [code]="positionsCode"
          >
            <div class="demo-grid col-3 gap-12">
              <dui-button
                variant="secondary"
                label="Top Left"
                (click)="notifyAt('info', 'top-left')"
              ></dui-button>
              <dui-button
                variant="secondary"
                label="Top Center"
                (click)="notifyAt('success', 'top-center')"
              ></dui-button>
              <dui-button
                variant="secondary"
                label="Top Right"
                (click)="notifyAt('success', 'top-right')"
              ></dui-button>
              <dui-button
                variant="secondary"
                label="Bottom Left"
                (click)="notifyAt('warning', 'bottom-left')"
              ></dui-button>
              <dui-button
                variant="secondary"
                label="Bottom Center"
                (click)="notifyAt('error', 'bottom-center')"
              ></dui-button>
              <dui-button
                variant="secondary"
                label="Bottom Right"
                (click)="notifyAt('info', 'bottom-right')"
              ></dui-button>
            </div>
          </pg-example-section>

          <!-- Card Stack -->
          <pg-example-section
            id="card-stack"
            title="Card Stacking"
            description="Stack multiple notifications visually to reduce screen clutter"
            [code]="cardStackCode"
          >
            <div class="demo-flex-wrap">
              <dui-button
                variant="primary"
                label="Stack Notifications"
                (click)="notify('success')"
              ></dui-button>
              <dui-button
                variant="primary"
                label="Add Another"
                (click)="notify('info')"
              ></dui-button>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="snackbar"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>

<!-- Per-position snackbar containers -->
<dui-snackbar
  #snackbarGlobal
  position="top-right"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
<dui-snackbar
  #snackbarTopLeft
  position="top-left"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
<dui-snackbar
  #snackbarTopCenter
  position="top-center"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
<dui-snackbar
  #snackbarBottomLeft
  position="bottom-left"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
<dui-snackbar
  #snackbarBottomCenter
  position="bottom-center"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
<dui-snackbar
  #snackbarBottomRight
  position="bottom-right"
  max-visible="3"
  icon-library="lucide"
></dui-snackbar>
