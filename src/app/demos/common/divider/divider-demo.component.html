<div class="demo-container">
  <pg-demo-header
    icon="minus"
  iconLibrary="lucide"
    title="Divider"
    description="Versatile separator component with support for text, icons, multiple line styles, vertical orientation, and decorative SVG shapes."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-divider-playground></dm-divider-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Line Variants -->
          <pg-example-section
            id="variants" title="Variants" description="Different visual styles for the separator line." [code]="variantsCode"
          >
            <div class="demo-row">
              <p>Solid (Default)</p>
              <ui-divider></ui-divider>
            </div>
            <div class="demo-row">
              <p>Dashed & Large</p>
              <ui-divider variant="dashed" size="lg"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Double Solid</p>
              <ui-divider variant="double-solid" size="lg"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Gradient Color</p>
              <ui-divider
                variant="solid"
                color="linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899)"
                thickness="4px"
              ></ui-divider>
            </div>
          </pg-example-section>

          <!-- Text & Icons -->
          <pg-example-section id="content" title="Content & Icons" description="Add labels, icons, or badges to provide context between sections." [code]="contentCode"
          >
            <div class="demo-row">
              <p>Centered Text</p>
              <ui-divider text="OR"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Left Aligned label</p>
              <ui-divider text="SECTION 1" text-align="left" variant="dashed"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Icon Placement</p>
              <ui-divider icon="â­" thickness="2px"></ui-divider>
            </div>
            <div class="demo-row">
              <p>With Badge & Theme Color</p>
              <ui-divider text="Comments" badge="24" color="primary"></ui-divider>
            </div>
          </pg-example-section>

          <!-- Vertical Dividers -->
          <pg-example-section
            id="vertical" title="Dividers" description="Useful for separating items in toolbars or flex containers." [code]="verticalCode"
          >
            <span>Item 1</span>
            <ui-divider orientation="vertical"></ui-divider>
            <span>Item 2</span>
            <ui-divider orientation="vertical" variant="dashed" height="40px"></ui-divider>
            <span>Item 3</span>
            <ui-divider orientation="vertical" thickness="4px" color="success"></ui-divider>
            <span>Item 4</span>
          </pg-example-section>

          <!-- Patterns -->
          <pg-example-section
            id="patterns" title="Patterns" description="Apply repeating backgrounds to the separator for a unique look." [code]="patternsCode"
          >
            <div class="demo-row">
              <p>Dots Pattern</p>
              <ui-divider pattern="dots" color="#94a3b8" thickness="12px"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Stripes Pattern</p>
              <ui-divider pattern="stripes" size="lg" color="primary"></ui-divider>
            </div>
            <div class="demo-row">
              <p>Zigzag Pattern</p>
              <ui-divider pattern="zigzag" size="lg" color="danger"></ui-divider>
            </div>
          </pg-example-section>

          <!-- Shape Dividers -->
          <pg-example-section
            id="shapes" title="Dividers" description="Full-width SVG shapes commonly used for section transitions." [code]="shapesCode"
          >
            <div class="shape-block bg-blue">
              <ui-divider shape="wave" shape-color="#fff"></ui-divider>
            </div>
            <div class="shape-block bg-green mt-40">
              <ui-divider shape="tilt" shape-color="#fff"></ui-divider>
            </div>
            <div class="shape-block bg-orange mt-40">
              <ui-divider shape="triangle" shape-color="#fff"></ui-divider>
            </div>
          </pg-example-section>

          <!-- Premium Effects -->
          <pg-example-section
            id="effects" title="Visual Effects" description="Animations and interactivity for premium user experiences." [code]="effectsCode"
          >
            <div class="demo-row">
              <p>Loading State</p>
              <ui-divider loading></ui-divider>
            </div>
            <div class="demo-row">
              <p>Clickable with Glow</p>
              <ui-divider
                text="ACTION LINK"
                clickable
                glow
                color="primary"
                thickness="2px"
              ></ui-divider>
            </div>
            <div class="demo-row">
              <p>Shadow Effect</p>
              <ui-divider shadow variant="double-solid" size="lg" color="white"></ui-divider>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="divider"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
