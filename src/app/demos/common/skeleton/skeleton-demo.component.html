<div class="demo-container">
  <pg-demo-header
    icon="💀"
    title="Skeleton Loader"
    description="Animated placeholder loaders that mimic content layout while data is being fetched — reducing perceived load time."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-skeleton-playground></dm-skeleton-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Shapes & Animations -->
        <pg-example-section
          id="shapes"
          title="Shapes & Animations"
          description="All shape variants — circle, text, rectangle, avatar, card, list-item, button, image — with pulse and wave animations"
          [code]="shapesCode"
        >
          <div  class="display-flex flex-col gap-20 w-full">
            <!-- Avatar + text row -->
            <div  class="display-flex items-center gap-12">
              <skeleton-loader shape="avatar" size="lg"></skeleton-loader>
              <div  class="flex-1 display-flex flex-col gap-8">
                <skeleton-loader shape="text" width="60%" animation-type="pulse"></skeleton-loader>
                <skeleton-loader shape="text" width="40%" animation-type="pulse"></skeleton-loader>
              </div>
            </div>
            <!-- Rectangle wave -->
            <skeleton-loader
              shape="rectangle"
              width="100%"
              height="120px"
              animation-type="wave"
            ></skeleton-loader>
            <!-- Button, circle, square row -->
            <div  class="display-flex gap-12 items-center wrap">
              <skeleton-loader shape="circle" width="48px" height="48px"></skeleton-loader>
              <skeleton-loader shape="square" width="48px" height="48px"></skeleton-loader>
              <skeleton-loader shape="button" width="100px" size="md"></skeleton-loader>
              <skeleton-loader shape="rounded" width="120px" height="20px"></skeleton-loader>
            </div>
            <!-- Card shape -->
            <skeleton-loader shape="card" width="100%"></skeleton-loader>
            <!-- List-item shape x3 -->
            @for (i of [1, 2, 3]; track i) {
              <skeleton-loader shape="list-item" width="100%"></skeleton-loader>
            }
          </div>
        </pg-example-section>

        <!-- Card Layout -->
        <pg-example-section
          id="card-layout"
          title="Card Layout"
          description="Skeleton placeholder composing a media card with thumbnail and text lines"
          [code]="cardLayoutCode"
        >
          <div
             class="display-flex gap-12 p-16 border-color-border rounded-8 w-full box-border"
          >
            <skeleton-loader
              shape="rectangle"
              width="80px"
              height="80px"
               class="flex-shrink-0"
            ></skeleton-loader>
            <div  class="flex-1 display-flex flex-col gap-8">
              <skeleton-loader shape="text" width="70%" height="18px"></skeleton-loader>
              <skeleton-loader shape="text" width="40%" height="14px"></skeleton-loader>
              <skeleton-loader shape="text" width="55%" height="14px"></skeleton-loader>
            </div>
          </div>
        </pg-example-section>

        <!-- List Layout -->
        <pg-example-section
          id="list-layout"
          title="List Layout"
          description="Row-by-row skeleton for list or feed views using the built-in list-item shape"
          [code]="listLayoutCode"
        >
          <div  class="display-flex flex-col gap-10 w-full">
            @for (item of [1, 2, 3, 4]; track item) {
              <skeleton-loader shape="list-item" width="100%"></skeleton-loader>
            }
          </div>
        </pg-example-section>

        <!-- Profile Layout -->
        <pg-example-section
          id="profile-layout"
          title="Profile Layout"
          description="Centered skeleton for user profile pages"
          [code]="profileLayoutCode"
        >
          <div  class="text-center p-24 w-full">
            <skeleton-loader
              shape="avatar"
              size="2xl"
               class="m-0-auto display-block"
            ></skeleton-loader>
            <skeleton-loader
              shape="text"
              width="120px"
              height="20px"
               class="mt-12 m-0-auto display-block"
            ></skeleton-loader>
            <skeleton-loader
              shape="text"
              width="80px"
              height="14px"
               class="mt-8 m-0-auto display-block"
            ></skeleton-loader>
            <skeleton-loader
              shape="button"
              width="160px"
              size="lg"
               class="mt-16 m-0-auto display-block"
            ></skeleton-loader>
          </div>
        </pg-example-section>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="skeleton"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
