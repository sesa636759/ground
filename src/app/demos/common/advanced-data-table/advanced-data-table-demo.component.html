<div class="demo-container">
  <pg-demo-header
    icon="table-2"
    iconLibrary="lucide"
    title="Advanced Data Table"
    description="A high-performance grid component designed for rendering large datasets. It includes out-of-the-box support for pagination, sorting, global/individual column filtering, cell selection, and custom row templates."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-advanced-data-table-playground></dm-advanced-data-table-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic"
            title="Basic Usage"
            description="Standard data table with sorting, searching, and pagination."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [sortable]="true"
              [searchable]="true"
              [pagination]="true"
              [pageSize]="5"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Selection -->
          <pg-example-section
            id="selection"
            title="Row Selection"
            description="Enable single or multiple row selection with checkboxes."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [selectable]="true"
              [multiSelect]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Row Actions -->
          <pg-example-section
            id="actions"
            title="Row Actions"
            description="Built-in actions menu for each row with edit and delete events."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [showActions]="true"
              (rowAction)="onRowAction($event)"
              (rowEdit)="onRowAction($event)"
              (rowDelete)="onRowAction($event)"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Editable -->
          <pg-example-section
            id="editable"
            title="Editable Mode"
            description="Double-click cells to edit data directly in the table."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="editableColumns"
              [editable]="true"
              (cellEdit)="onCellEdit($event)"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Skeleton -->
          <pg-example-section
            id="skeleton"
            title="Skeleton Loading"
            description="Visual feedback during data fetch operations."
          >
            <ui-advanced-data-table
              [data]="[]"
              [columns]="columns"
              [loading]="true"
              [showSkeleton]="true"
              [skeletonRows]="5"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Input Types -->
          <pg-example-section
            id="input-types"
            title="Cell Input Types"
            description="Rich editing experience with diverse input types (double-click to edit)."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="inputTypesColumns"
              [editable]="true"
              (cellEdit)="onCellEdit($event)"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- col-grouping -->
          <pg-example-section
            id="col-grouping"
            title="Column Grouping"
            description="Organize related columns under common parent headers."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="groupedColumns"
              [columnGrouping]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- row-grouping -->
          <pg-example-section
            id="row-grouping"
            title="Row Grouping"
            description="Group rows by specific field values with expand/collapse support."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [grouping]="true"
              group-by="department"
              [showGroupCount]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Pinning -->
          <pg-example-section
            id="pinning"
            title="Column & Row Pinning"
            description="Fix important columns or rows to stay visible during scrolling."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [columnPinning]="true"
              [rowPinning]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Reorder -->
          <pg-example-section
            id="reorder"
            title="Row Reordering"
            description="Drag and drop rows to change their order."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [rowReorder]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Filters -->
          <pg-example-section
            id="filters"
            title="Advanced Filters"
            description="Multi-column filtering with complex operators."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [multiFilter]="true"
              [showFilterPanel]="false"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Panels -->
          <pg-example-section
            id="panels"
            title="Visibility & Filter Panels"
            description="Side panels for advanced column management and filtering."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [showColumnPanel]="false"
              [showFilterPanel]="false"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Search -->
          <pg-example-section
            id="search"
            title="External Search"
            description="Connect external search inputs to the table's search capability."
          >
            <div class="control-box p-16 border rounded bg-muted display-flex items-center gap-12">
              <input
                #tableSearch
                type="text"
                placeholder="Search table..."
                class="p-8 border rounded w-240"
              />
              <span class="text-xs text-muted">Binding to [search] prop</span>
            </div>
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [search]="tableSearch.value"
              [searchable]="true"
              class="mt-16"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Tree -->
          <pg-example-section
            id="tree"
            title="Tree Data"
            description="Display hierarchical data structures with nested rows."
          >
            <ui-advanced-data-table
              [data]="treeData"
              [columns]="columns"
              [treeData]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Sparklines -->
          <pg-example-section
            id="sparklines"
            title="Sparklines"
            description="Micro-charts embedded in cells to show data trends."
          >
            <ui-advanced-data-table
              [data]="sparklineData"
              [columns]="sparklineColumns"
              [enableSparklines]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Lazy Load -->
          <pg-example-section
            id="lazy-load"
            title="Lazy Loading"
            description="High performance rendering for massive datasets using virtual scroll."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [virtualScroll]="true"
              [virtualRowHeight]="48"
              [lazyLoad]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Export -->
          <pg-example-section
            id="export"
            title="Data Export"
            description="Export table data to PDF, Excel, and CSV formats."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [exportable]="true"
              [excelExport]="true"
              [pdfExport]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Mobile -->
          <pg-example-section
            id="mobile"
            title="Mobile & Context"
            description="Responsive card view for mobile devices and right-click context menus."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [mobileCardView]="true"
              [contextMenu]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Undo/Redo -->
          <pg-example-section
            id="undo-redo"
            title="Undo / Redo"
            description="Track history of sorting, filtering, and selection changes."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [undoRedo]="true"
              [sortable]="true"
              [filterable]="true"
              [selectable]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Range -->
          <pg-example-section
            id="range"
            title="Range Selection"
            description="Excel-like cell range selection and copy-paste support."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [rangeSelection]="true"
              [copyPaste]="true"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Conditional -->
          <pg-example-section
            id="conditional"
            title="Conditional Formatting"
            description="Dynamic cell styling based on data-driven rules."
          >
            <ui-advanced-data-table
              [data]="sampleData"
              [columns]="columns"
              [conditionalFormatting]="true"
              [formattingRules]="formattingRules"
            ></ui-advanced-data-table>
          </pg-example-section>

          <!-- Aggregation -->
          <pg-example-section
            id="aggregation"
            title="Data Aggregation"
            description="Calculate and display column summaries like Sum, Avg, and Count."
          >
            <ui-advanced-data-table
              [data]="salesData"
              [columns]="salesColumns"
              [columnAggregation]="true"
            ></ui-advanced-data-table>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="advanced-data-table"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
