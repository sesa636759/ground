<div class="demo-container">
  <pg-demo-header
    icon="📋"
    title="Picklist (Dropdown Select)"
    description="A highly customizable dropdown picker with support for single/multi selection, searching, grouping, rich indicators, and premium behavioral extensions."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Picklist -->
        <pg-example-section
          id="basic"
          title="Basic Picklist"
          description="Default single-selection dropdown with options."
          [code]="basicCode()"
        >
          <div class="demo-grid col-2">
            <dui-picklist
              [options]="fruitOptions"
              placeholder="Pick a fruit"
              (picklistChange)="onChange($event)"
            ></dui-picklist>
            <dui-picklist
              [options]="fruitOptions"
              value="cherry"
              label="Pre-selected"
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Visual Variants -->
        <pg-example-section
          id="variants"
          title="Visual Variants"
          description="Choose from default (box), bordered, or ghost architectural styles."
          [code]="variantsCode()"
        >
          <div class="demo-grid col-3">
            <dui-picklist
              variant="default"
              [options]="fruitOptions"
              placeholder="Default"
            ></dui-picklist>
            <dui-picklist
              variant="bordered"
              [options]="fruitOptions"
              placeholder="Bordered"
            ></dui-picklist>
            <dui-picklist
              variant="ghost"
              [options]="fruitOptions"
              placeholder="Ghost"
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Sizes -->
        <pg-example-section
          id="sizes"
          title="Sizes"
          description="Direct comparison between small, medium, and large scaling tiers."
          [code]="sizesCode()"
        >
          <div class="demo-flex-wrap items-end">
            <dui-picklist size="sm" [options]="fruitOptions" placeholder="Small"></dui-picklist>
            <dui-picklist size="md" [options]="fruitOptions" placeholder="Medium"></dui-picklist>
            <dui-picklist size="lg" [options]="fruitOptions" placeholder="Large"></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Multi-Select -->
        <pg-example-section
          id="multi"
          title="Multi-Select"
          description="Enable multiple selection with tag-based visualization and Select All capabilities."
          [code]="multiCode()"
        >
          <div class="demo-grid col-2">
            <dui-picklist
              mode="multi"
              [options]="fruitOptions"
              placeholder="Multiple Selection"
              full-width
            ></dui-picklist>
            <dui-picklist
              mode="multi"
              show-select-all
              [options]="fruitOptions"
              placeholder="With Select All"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Searchable -->
        <pg-example-section
          id="search"
          title="Searchable"
          description="Support for filtering large option sets via search input."
          [code]="searchCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist
              searchable
              search-placeholder="Filter fruits..."
              [options]="fruitOptions"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Grouped Options -->
        <pg-example-section
          id="grouped"
          title="Grouped Options"
          description="Organize options into logical categories."
          [code]="groupedCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist
              grouped
              [options]="groupedData"
              placeholder="Categorized Systems"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Icons & Libraries -->
        <pg-example-section
          id="icons"
          title="Icons & Libraries"
          description="Rich option rendering with custom labels, icons, and support for multiple libraries."
          [code]="iconsCode()"
        >
          <div class="demo-grid col-2">
            <dui-picklist
              [options]="richOptions"
              icon-library="ionicons"
              placeholder="Ionicons Support"
              full-width
            ></dui-picklist>
            <dui-picklist
              [options]="fruitOptions"
              icon-library="lucide"
              placeholder="Lucide Icons"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Custom Trigger -->
        <pg-example-section
          id="trigger"
          title="Custom Trigger"
          description="Override the default dropdown button with any custom UI element using slots."
          [code]="triggerCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist custom-trigger [options]="fruitOptions">
              <dui-button slot="trigger" variant="outline" color="secondary" size="md">
                <dui-icon name="plus" library="lucide"></dui-icon>
                Custom Trigger Button
              </dui-button>
            </dui-picklist>
          </div>
        </pg-example-section>

        <!-- Clearable -->
        <pg-example-section
          id="clearable"
          title="Clearable"
          description="Allow users to reset selection with a single click."
          [code]="clearableCode()"
        >
          <div class="demo-grid col-2">
            <dui-picklist clearable [options]="fruitOptions" value="apple"></dui-picklist>
            <dui-picklist
              clearable
              mode="multi"
              [options]="fruitOptions"
              [value]="['banana', 'cherry']"
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="loading"
          title="Functional States"
          description="Visual indicators for data fetching or disabled interactions."
          [code]="loadingCode()"
        >
          <div class="demo-grid col-2">
            <dui-picklist loading placeholder="Fetching data..."></dui-picklist>
            <dui-picklist disabled value="banana" [options]="fruitOptions"></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Premium Suite -->
        <pg-example-section
          id="premium"
          title="Premium Features"
          description="Advanced interactive extensions for professional product configurations."
          [code]="premiumCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist
              mode="multi"
              reorderable
              creatable
              show-select-all
              searchable
              [options]="fruitOptions"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Reorderable Tags -->
        <pg-example-section
          id="reorder"
          title="Reorderable Selection"
          description="Drag and drop selected tags to define custom order in multi-mode."
          [code]="reorderCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist
              mode="multi"
              reorderable
              [options]="fruitOptions"
              [value]="['apple', 'banana', 'cherry']"
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>

        <!-- Creatable Options -->
        <pg-example-section
          id="creatable"
          title="Creatable Options"
          description="Enable users to add custom entries dynamically into the list."
          [code]="creatableCode()"
        >
          <div class="demo-grid col-1">
            <dui-picklist
              creatable
              searchable
              placeholder="Search or type new option..."
              full-width
            ></dui-picklist>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <dm-picklist-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="picklist"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
