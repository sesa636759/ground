<div class="demo-container">
  <pg-demo-header
    icon="🏷️"
    title="Tag Component"
    description="A small component used to categorize or label content, with support for icons, counters, and various severity levels."
  ></pg-demo-header>

  <pg-demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <dm-tag-playground></dm-tag-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Severities -->
        <pg-example-section
          id="severities"
          title="Severities"
          description="Different color schemes based on importance or status."
          [code]="severitiesCode"
          class="mt-0"
        >
          <div class="demo-flex-wrap">
            <dui-tag severity="primary" value="Primary"></dui-tag>
            <dui-tag severity="success" value="Success"></dui-tag>
            <dui-tag severity="info" value="Info"></dui-tag>
            <dui-tag severity="warning" value="Warning"></dui-tag>
            <dui-tag severity="danger" value="Danger"></dui-tag>
          </div>
        </pg-example-section>

        <!-- Styles & Sizes -->
        <pg-example-section
          id="styles"
          title="Styles & Sizes"
          description="Configurations for shape and scale."
          [code]="stylesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Shapes</h3>
              <div class="demo-flex">
                <dui-tag value="Square" [rounded]="false"></dui-tag>
                <dui-tag value="Rounded" rounded></dui-tag>
              </div>
            </div>
            <div class="demo-card">
              <h3>Sizes</h3>
              <div class="demo-flex">
                <dui-tag value="Small" size="small" severity="info"></dui-tag>
                <dui-tag value="Medium" severity="info"></dui-tag>
                <dui-tag value="Large" size="large" severity="info"></dui-tag>
              </div>
            </div>
          </div>
        </pg-example-section>

        <!-- Visual Enhancements -->
        <pg-example-section
          id="visuals"
          title="Visual Enhancements"
          description="Add context with icons, counters, and interative elements."
          [code]="visualsCode"
        >
          <div class="demo-grid col-3">
            <div class="demo-card">
              <h3>Icons</h3>
              <dui-tag icon="⭐" value="Starred" severity="warning"></dui-tag>
            </div>
            <div class="demo-card">
              <h3>Counters</h3>
              <dui-tag value="Messages" counter="5" severity="danger"></dui-tag>
            </div>
            <div class="demo-card">
              <h3>Removable</h3>
              <dui-tag value="Javascript" removable severity="primary"></dui-tag>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="tag"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
