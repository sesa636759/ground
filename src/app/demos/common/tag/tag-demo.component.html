<div class="demo-container">
  <pg-demo-header
    icon="tag"
  iconLibrary="lucide"
    title="Tag Component"
    description="A small component used to categorize or label content, with support for icons, avatars, counters, and various style variants."
  ></pg-demo-header>

  <pg-demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <dm-tag-playground></dm-tag-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Variants -->
        <pg-example-section
          id="variants"
          title="Variants"
          description="Style options: default, light, outlined, filled, and dot indicator."
          [code]="variantsCode"
          class="mt-0"
        >
          <div class="demo-flex-wrap">
            <ui-tag label="Default"></ui-tag>
            <ui-tag label="Success" color="success" variant="light"></ui-tag>
            <ui-tag label="Error" color="danger" variant="outlined"></ui-tag>
            <ui-tag label="Active" color="primary" variant="filled" rounded></ui-tag>
            <ui-tag label="New" variant="dot" color="primary"></ui-tag>
          </div>
        </pg-example-section>

        <!-- Sizes & Shapes -->
        <pg-example-section
          id="sizes"
          title="Sizes & Shapes"
          description="Control scale and border radius."
          [code]="sizesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Sizes</h3>
              <div class="demo-flex">
                <ui-tag label="Small" color="primary" size="sm"></ui-tag>
                <ui-tag label="Medium" color="primary" size="md"></ui-tag>
                <ui-tag label="Large" color="primary" size="lg"></ui-tag>
              </div>
            </div>
            <div class="demo-card">
              <h3>Shapes</h3>
              <div class="demo-flex">
                <ui-tag label="Square" color="info" variant="filled"></ui-tag>
                <ui-tag label="Rounded" color="info" variant="filled" rounded></ui-tag>
              </div>
            </div>
          </div>
        </pg-example-section>

        <!-- Media & Icons -->
        <pg-example-section
          id="media"
          title="Media & Icons"
          description="Add context with icons, image logos, and user avatars."
          [code]="mediaCode"
        >
          <div class="demo-flex-wrap">
            <ui-tag label="Premium" icon="star" color="warning" variant="light"></ui-tag>
            <ui-tag
              label="Verified"
              icon="check-circle"
              color="success"
              variant="light"
              rounded
            ></ui-tag>
            <ui-tag label="Alert" icon="alert-triangle" color="danger" variant="filled"></ui-tag>
            <ui-tag label="Next Page" icon="arrow-right" icon-pos="end" color="primary"></ui-tag>
            <ui-tag
              label="John Doe"
              user-avatar="https://i.pravatar.cc/150?u=1"
              variant="light"
              rounded
            ></ui-tag>
            <ui-tag
              label="Alice Smith"
              user-avatar="https://i.pravatar.cc/150?u=2"
              color="info"
              variant="outlined"
              rounded
            ></ui-tag>
          </div>
        </pg-example-section>

        <!-- Interactive -->
        <pg-example-section
          id="interactive"
          title="Interactive"
          description="Checkable tags act as toggles — select and deselect inline."
          [code]="interactiveCode"
        >
          <div class="demo-flex-wrap">
            <ui-tag label="Selectable 1" checkable color="primary"></ui-tag>
            <ui-tag label="Selectable 2" checkable color="success"></ui-tag>
            <ui-tag label="Pre-checked" checkable checked color="warning" variant="filled"></ui-tag>
          </div>
        </pg-example-section>

        <!-- Removable -->
        <pg-example-section
          id="removable"
          title="Removable"
          description="Tags with a remove button for dynamic list management."
          [code]="removableCode"
        >
          <div class="demo-flex-wrap">
            <ui-tag label="JavaScript" removable color="primary" variant="light"></ui-tag>
            <ui-tag label="TypeScript" removable color="info" variant="light" rounded></ui-tag>
            <ui-tag label="Angular" removable color="danger" variant="outlined"></ui-tag>
          </div>
        </pg-example-section>

        <!-- Visual Enhancements -->
        <pg-example-section
          id="visuals"
          title="Visual Enhancements"
          description="Add context with counters and combined feature sets."
          [code]="visualsCode"
        >
          <div class="demo-grid col-3">
            <div class="demo-card">
              <h3>Counter</h3>
              <ui-tag label="Messages" counter="5" color="danger" variant="light"></ui-tag>
            </div>
            <div class="demo-card">
              <h3>Notifications</h3>
              <ui-tag label="Alerts" counter="12" color="warning" variant="filled"></ui-tag>
            </div>
            <div class="demo-card">
              <h3>Combined</h3>
              <ui-tag
                label="Featured"
                icon="star"
                color="primary"
                variant="filled"
                rounded
                counter="3"
                removable
              ></ui-tag>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="tag"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
