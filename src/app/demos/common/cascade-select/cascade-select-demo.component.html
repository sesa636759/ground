<div class="demo-container">
  <pg-demo-header
    icon="git-branch"
    iconLibrary="lucide"
    title="Cascade Select"
    description="A hierarchical selector for nested data structures. Perfect for locations, categories, and file systems where users need to navigate through multiple levels of options."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-cascade-select-playground></dm-cascade-select-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="triggers"
          title="Triggers & Display"
          description="Control how columns expand and how the selected path is rendered."
          [code]="triggersCode"
          class="mt-0"
        >
          <div style="display: flex; gap: 24px; flex-wrap: wrap;">
            <div style="width: 260px;">
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Expand on Click</p>
              <ui-cascade-select
                expand-trigger="click"
                [options]="fileSystemOptions"
                placeholder="Click to expand"
              ></ui-cascade-select>
            </div>
            <div style="width: 260px;">
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Leaf Only Display</p>
              <ui-cascade-select
                [show-full-path]="false"
                [options]="fileSystemOptions"
                placeholder="Documents / Work / ..."
              ></ui-cascade-select>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="selection"
          title="Selection Logic"
          description="Choose whether to allow selecting intermediate nodes or only leaf nodes."
          [code]="selectionCode"
        >
          <div style="width: 260px;">
            <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Change on Select (Any level)</p>
            <ui-cascade-select
              change-on-select
              [options]="fileSystemOptions"
              placeholder="Select any folder or file"
            ></ui-cascade-select>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="cascade-select"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
