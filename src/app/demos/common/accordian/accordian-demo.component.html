<div class="demo-container">
  <pg-demo-header
    icon="🎯"
    title="Accordion Component"
    description="Collapsible content panels for organizing and presenting information in a compact, scannable format."
  >
  </pg-demo-header>

  <pg-demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic -->
        <pg-example-section
          id="basic"
          title="Basic"
          description="Simple expandable content panels"
          [code]="basicAccordionCode"
        >
          <dui-accordion [items]="basicAccordionItems"></dui-accordion>
        </pg-example-section>

        <!-- Form Inside Accordion -->
        <pg-example-section
          id="forms"
          title="Forms in Accordions"
          description="Accordions can contain complex arbitrary content such as forms with various field types."
          [code]="formAccordionCode"
        >
          <dui-accordion [items]="formAccordionItems"></dui-accordion>
        </pg-example-section>

        <!-- Subtitles -->
        <pg-example-section
          id="subtitles"
          title="Subtitles"
          description="Items with additional descriptive text"
          [code]="subtitlesCode"
        >
          <dui-accordion [items]="subtitlesItems"></dui-accordion>
        </pg-example-section>

        <!-- Search -->
        <pg-example-section
          id="search"
          title="Search"
          description="Filter items with built-in search functionality"
          [code]="searchCode"
        >
          <dui-accordion
            [items]="searchItems"
            enable-search
            search-placeholder="Search frameworks..."
          ></dui-accordion>
        </pg-example-section>

        <!-- Actions -->
        <pg-example-section
          id="actions"
          title="Actions"
          description="Action buttons within the accordion header"
          [code]="actionsCode"
        >
          <dui-accordion
            [items]="actionsItems"
            (accordionAction)="handleAction($event)"
          ></dui-accordion>
        </pg-example-section>

        <!-- Nested -->
        <pg-example-section
          id="nested"
          title="Nested"
          description="Recursive accordion structure for hierarchical data"
          [code]="nestedCode"
        >
          <dui-accordion [items]="nestedItems" enable-nested></dui-accordion>
        </pg-example-section>

        <!-- Drag & Drop -->
        <pg-example-section
          id="drag-drop"
          title="Drag & Drop"
          description="Reorder items using drag and drop"
          [code]="dragDropCode"
        >
          <dui-accordion
            [items]="dragDropItems"
            enable-drag-drop
            (accordionReorder)="handleReorder($event)"
          ></dui-accordion>
        </pg-example-section>

        <!-- Persistence -->
        <pg-example-section
          id="persistence"
          title="Persistence"
          description="State is preserved in localStorage (refresh page to test)"
          [code]="persistenceCode"
        >
          <dui-accordion
            [items]="persistenceItems"
            enable-persistence
            persistence-key="demo-persist-v1"
          ></dui-accordion>
        </pg-example-section>

        <!-- Loading -->
        <pg-example-section
          id="loading"
          title="Loading"
          description="Skeleton loading state"
          [code]="loadingCode"
        >
          <dui-accordion loading></dui-accordion>
        </pg-example-section>

        <!-- RTL -->
        <pg-example-section
          id="rtl"
          title="RTL"
          description="Right-to-Left layout support"
          [code]="rtlCode"
        >
          <dui-accordion [items]="rtlItems" rtl></dui-accordion>
        </pg-example-section>

        <!-- Dense -->
        <pg-example-section
          id="dense"
          title="Dense"
          description="Payload is concentrated for high-density information"
          [code]="denseCode"
        >
          <dui-accordion [items]="denseItems" dense></dui-accordion>
        </pg-example-section>

        <!-- Card Variant -->
        <pg-example-section
          id="card"
          title="Card Variant"
          description="A separated card layout with icon pills and a right-chevron."
          [code]="cardAccordionCode"
        >
          <dui-accordion [items]="cardAccordionItems" variant="card"></dui-accordion>
        </pg-example-section>

        <!-- Card List Variant -->
        <pg-example-section
          id="card-list"
          title="Card List Variant"
          description="A more compact separated card list layout."
          [code]="cardListAccordionCode"
        >
          <dui-accordion [items]="cardAccordionItems" variant="card-list"></dui-accordion>
        </pg-example-section>

        <!-- Events -->
        <pg-example-section
          id="events"
          title="Events"
          description="Lifecycle events and interaction logging"
          [code]="eventsCode"
        >
          <dui-accordion
            [items]="eventsItems"
            (beforeOpen)="logEvent('Before Open', $event)"
            (afterOpen)="logEvent('After Open', $event)"
            (beforeClose)="logEvent('Before Close', $event)"
            (afterClose)="logEvent('After Close', $event)"
          ></dui-accordion>
          <pg-playground-event-log
            [logs]="eventsLog"
            (clear)="eventsLog = []"
          ></pg-playground-event-log>
        </pg-example-section>

        <!-- Controlled -->
        <pg-example-section
          id="controlled"
          title="Controlled"
          description="Control expansion state programmatically"
          [code]="controlledCode"
        >
          <div class="mb-16 display-flex gap-8">
            <dui-button
              (click)="setControlledExpanded(['c1'])"
              label="Open 1"
              variant="secondary"
              size="small"
            ></dui-button>
            <dui-button
              (click)="setControlledExpanded(['c2'])"
              label="Open 2"
              variant="secondary"
              size="small"
            ></dui-button>
            <dui-button
              (click)="setControlledExpanded(['c1', 'c2', 'c3'])"
              label="Open All"
              variant="secondary"
              size="small"
            ></dui-button>
            <dui-button
              (click)="setControlledExpanded([])"
              label="Close All"
              variant="secondary"
              size="small"
            ></dui-button>
          </div>
          <dui-accordion
            [items]="controlledItems"
            [expandedItems]="controlledExpanded"
            multiple
          ></dui-accordion>
        </pg-example-section>

        <!-- Async & Lazy -->
        <pg-example-section
          id="async-lazy"
          title="Async & Lazy"
          description="Lazy loading content (content is not in DOM until opened)"
          [code]="asyncLazyCode"
        >
          <dui-accordion [items]="asyncLazyItems" lazy></dui-accordion>
        </pg-example-section>
      </div>
      <!-- /examples-content -->
    </div>
    <!-- /examples-split-layout -->
    <div slot="playground">
      <dm-accordion-playground></dm-accordion-playground>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="accordion"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
