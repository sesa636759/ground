<div class="demo-container">
  <pg-demo-header
    icon="⏍"
    title="Split Button"
    description='Combines a default action button with a dropdown menu for related auxiliary actions. Ideal for "Save" operations or multi-state actions.'
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-split-button-playground></dm-split-button-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Color Themes -->
          <section class="demo-section mt-0" id="colors" >
            <div class="section-header">
              <h2>🎨 Color Themes</h2>
              <p>Apply different visual weights using standard color variants.</p>
            </div>
            <div class="demo-card">
              <ui-split-button
                label="Delete All"
                variant="danger"
                [model]="menuItems"
              ></ui-split-button>
              <ui-split-button
                label="Publish"
                variant="success"
                [model]="menuItems"
              ></ui-split-button>
              <ui-split-button
                label="Secondary"
                variant="secondary"
                [model]="menuItems"
              ></ui-split-button>
              <ui-split-button
                label="Outline Only"
                variant="outline"
                [model]="menuItems"
              ></ui-split-button>
            </div>
            <ui-code-preview
              [htmlCode]="colorsCode"
              [label]="'Theme Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- Visual States -->
          <section class="demo-section" id="states">
            <div class="section-header">
              <h2>⚡ Visual States</h2>
              <p>Communicate ongoing processes or restricted access.</p>
            </div>
            <div class="demo-card">
              <ui-split-button loading label="Processing..." [model]="menuItems"></ui-split-button>
              <ui-split-button disabled label="Locked" [model]="menuItems"></ui-split-button>
            </div>
            <ui-code-preview
              [htmlCode]="statesCode"
              [label]="'State Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="split-button"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
