<div class="demo-container">
  <pg-demo-header
    icon="chevrons-up-down"
  iconLibrary="lucide"
    title="Split Button"
    description='Combines a default action button with a dropdown menu for related auxiliary actions. Ideal for "Save" operations or multi-state actions.'
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-split-button-playground></dm-split-button-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Color Themes -->
          <pg-example-section
            id="colors" title="Themes" description="Apply different visual weights using standard color variants." [code]="colorsCode"
          >
            <ui-split-button
              label="Delete All"
              variant="danger"
              [model]="menuItems"
            ></ui-split-button>
            <ui-split-button
              label="Publish"
              variant="success"
              [model]="menuItems"
            ></ui-split-button>
            <ui-split-button
              label="Secondary"
              variant="secondary"
              [model]="menuItems"
            ></ui-split-button>
            <ui-split-button
              label="Outline Only"
              variant="outline"
              [model]="menuItems"
            ></ui-split-button>
          </pg-example-section>

          <!-- Visual States -->
          <pg-example-section
            id="states" title="States" description="Communicate ongoing processes or restricted access." [code]="statesCode"
          >
            <ui-split-button loading label="Processing..." [model]="menuItems"></ui-split-button>
            <ui-split-button disabled label="Locked" [model]="menuItems"></ui-split-button>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="split-button"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
