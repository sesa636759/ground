<div class="demo-container">
  <pg-demo-header
    icon="â­"
    title="Rating Component"
    description="An intuitive component for collecting user feedback or displaying evaluations. Supports multiple visual metaphors from classic stars to sentiment-based smileys."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-rating-playground></dm-rating-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Rating Types -->
          <section class="demo-section" id="types" style="margin-top: 0">
            <div class="section-header">
              <h2>âœ¨ Rating Models</h2>
              <p>Choose the visual style that best fits your context</p>
            </div>
            <div class="demo-card">
              <div class="preview-box">
                <div class="demo-row">
                  <span>Star:</span>
                  <ui-rating type="star" [value]="4"></ui-rating>
                </div>
                <div class="demo-row">
                  <span>Smiley:</span>
                  <ui-rating type="smiley" [value]="4"></ui-rating>
                </div>
                <div class="demo-row">
                  <span>Thumb:</span>
                  <ui-rating type="thumb" [value]="1"></ui-rating>
                </div>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="typesCode"
              [label]="'Types Example'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- Colors & Sizes -->
          <section class="demo-section" id="colors">
            <div class="section-header">
              <h2>ðŸŒˆ Colors & Sizes</h2>
              <p>Visual scales to match your design system</p>
            </div>
            <div class="demo-card">
              <div class="preview-box">
                <ui-rating size="sm" color="success" [value]="4"></ui-rating>
                <ui-rating size="md" color="warning" [value]="4"></ui-rating>
                <ui-rating size="lg" color="danger" [value]="4"></ui-rating>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="colorsSizesCode"
              [label]="'Colors and Sizes'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- Custom Labels -->
          <section class="demo-section" id="custom">
            <div class="section-header">
              <h2>ðŸ“ Descriptive Labels</h2>
              <p>Add semantic meaning to numeric values with custom tooltip-like labels</p>
            </div>
            <div class="demo-card">
              <div class="preview-box">
                <ui-rating
                  type="smiley"
                  [value]="3"
                  labels='["Slightly Happy", "Happy", "Very Happy", "Ecstatic", "Over Joyed"]'
                  show-value
                  size="lg"
                ></ui-rating>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="customCode"
              [label]="'Custom Labels'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="rating"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
