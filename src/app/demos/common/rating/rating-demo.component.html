<div class="demo-container">
  <pg-demo-header
    icon="⭐"
    title="Rating"
    description="A component that provides a visual way for users to provide feedback or rank items using stars, smileys, or thumbs."
  >
  </pg-demo-header>

  <pg-demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Usage -->
        <pg-example-section
          id="basic"
          title="Star Rating"
          description="Standard star-based rating system."
          [code]="basicCode()"
        >
          <div class="demo-grid col-1" style="gap: 32px">
            <div>
              <p class="demo-label">Standard (5 Stars)</p>
              <ui-rating value="3"></ui-rating>
            </div>
            <div>
              <p class="demo-label">Extended (10 Stars, Primary Color)</p>
               <ui-rating max="10" value="7" color="primary"></ui-rating>
            </div>
          </div>
        </pg-example-section>

        <!-- Half Ratings -->
        <pg-example-section
          id="half"
          title="Precision Half-Ratings"
          description="Allows users to select ratings in 0.5 increments."
          [code]="halfCode()"
        >
          <div class="demo-grid col-1" style="gap: 32px">
            <ui-rating allow-half value="3.5" show-value></ui-rating>
            <ui-rating allow-half value="4.5" color="success" size="lg" show-value></ui-rating>
          </div>
        </pg-example-section>

        <!-- Smiley Feedback -->
        <pg-example-section
          id="smileys"
          title="Smiley Feedback"
          description="A more emotive way to capture user satisfaction."
          [code]="smileysCode()"
        >
          <div class="demo-grid col-1" style="gap: 32px">
            <div>
              <p class="demo-label">Standard Smileys</p>
              <ui-rating type="smiley" max="5" value="4"></ui-rating>
            </div>
            <div>
              <p class="demo-label">With Descriptive Labels</p>
              <ui-rating 
                type="smiley" 
                [attr.labels]="'[&quot;Very Poor&quot;, &quot;Poor&quot;, &quot;Neutral&quot;, &quot;Good&quot;, &quot;Excellent&quot;]'" 
                value="5"
                show-value
              ></ui-rating>
            </div>
          </div>
        </pg-example-section>

        <!-- Thumbs -->
        <pg-example-section
          id="thumbs"
          title="Binary Thumb Feedback"
          description="Simple upvote or downvote selection."
          [code]="thumbsCode()"
        >
          <div class="demo-grid col-1" style="gap: 32px">
            <div>
               <p class="demo-label">Positive Feedback</p>
               <ui-rating type="thumb" value="1"></ui-rating>
            </div>
            <div>
               <p class="demo-label">Negative Feedback with Label</p>
               <ui-rating type="thumb" value="-1" show-value></ui-rating>
            </div>
          </div>
        </pg-example-section>

        <!-- Visual Styles -->
        <pg-example-section
          id="visuals"
          title="Custom Visual Contexts"
          description="Adjust size and colors to match your brand."
          [code]="visualsCode()"
        >
          <div class="demo-grid col-2">
            <div>
              <p class="demo-label">Small Tier</p>
              <ui-rating size="sm" value="4"></ui-rating>
            </div>
            <div>
              <p class="demo-label">Large & Critical</p>
              <ui-rating size="lg" color="danger" value="2"></ui-rating>
            </div>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Interaction States"
          description="Control whether users can interact with the rating component."
          [code]="statesCode()"
        >
          <div class="demo-grid col-2">
            <div>
               <p class="demo-label">Read-only (Display Only)</p>
               <ui-rating readonly value="4" show-value></ui-rating>
            </div>
            <div>
               <p class="demo-label">Disabled State</p>
               <ui-rating disabled value="3"></ui-rating>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <div slot="playground">
      <dm-rating-playground />
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="rating"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
