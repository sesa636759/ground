<div class="demo-container">
  <pg-demo-header
    icon="layout-template"
  iconLibrary="lucide"
    title="Layout Manager"
    description="A powerful layout management system for creating complex, resizable panel layouts. Supports docking, grid, and flex modes with drag-and-drop panel rearrangement, resizing, and state persistence."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-layout-manager-playground></dm-layout-manager-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Modes -->
          <pg-example-section
            id="modes" title="Modes" [code]="modesCode"
          >
            <p>
              The layout manager provides flexible panel management for complex application
              interfaces. Panels can be resized, closed, and rearranged based on the selected
              mode.
            </p>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="layout-manager"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
