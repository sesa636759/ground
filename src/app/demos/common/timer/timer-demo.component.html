<div class="demo-container">
  <pg-demo-header
    icon="timer"
    iconLibrary="lucide"
    title="Timer"
    description="A versatile timing utility supporting countdowns, stopwatches, multi-step workflows (Pomodoro), persistence, and browser notifications."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-timer-playground></dm-timer-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="basic"
          title="Basic Timers"
          description="Standard countdown and stopwatch functionality."
          [code]="basicCode"
          class="mt-0"
        >
          <div style="display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Simple 1min Countdown</p>
              <ui-timer [duration]="60"></ui-timer>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Standard Stopwatch</p>
              <ui-timer mode="stopwatch"></ui-timer>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="modes"
          title="Modes & Precision"
          description="Switch between formats and precision levels (seconds/milliseconds)."
          [code]="modesCode"
        >
          <div style="display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">High Precision (MS)</p>
              <ui-timer mode="stopwatch" precision="milliseconds"></ui-timer>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Human Readable</p>
              <ui-timer mode="countdown" format="human" [duration]="3665"></ui-timer>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="steps"
          title="Multi-Step Flow"
          description="Perfect for interval training, Pomodoro sessions, or multi-phase workflows."
          [code]="stepsCode"
        >
          <div>
            <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Pomodoro Flow (Work / Break / Repeat)</p>
            <ui-timer [attr.steps]="pomodoroSteps" loop></ui-timer>
          </div>
        </pg-example-section>

        <pg-example-section
          id="display"
          title="Visualization"
          description="Different UI presets for compact or full-screen usage."
          [code]="displayCode"
        >
          <div style="display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Compact Variant</p>
              <ui-timer variant="compact" [duration]="300"></ui-timer>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Linear Progress Type</p>
              <ui-timer progress-type="linear" [duration]="120"></ui-timer>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="alerts"
          title="Alerts & Sounds"
          description="Audio-visual cues when thresholds are met or timer completes."
          [code]="alertsCode"
        >
          <div style="display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Alert at 20% Remaining</p>
              <ui-timer [alert-threshold]="20" [duration]="30" auto-start></ui-timer>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">With Sound & Notifications</p>
              <ui-timer enable-sound enable-notifications [duration]="10"></ui-timer>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="behavior"
          title="Persistence & Behavior"
          description="Keep state across page refreshes or target specific dates."
          [code]="behaviorCode"
        >
          <div style="display: flex; flex-direction: column; gap: 24px;">
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">Persistent Timer (Retains state after refresh)</p>
              <ui-timer persist="demo-timer" [duration]="1000"></ui-timer>
            </div>
            <div>
              <p style="margin-bottom: 8px; font-size: 12px; color: var(--ui-text-secondary);">New Year Countdown (Dynamic Target)</p>
              <ui-timer target-date="2027-01-01T00:00:00"></ui-timer>
            </div>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="timer"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
