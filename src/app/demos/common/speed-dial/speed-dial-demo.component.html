<div class="demo-container">
  <pg-demo-header
    icon="zap"
  iconLibrary="lucide"
    title="Speed Dial"
    description="A floating action button that expands into a menu of related actions, used for primary actions in a clean interface."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-speed-dial-playground></dm-speed-dial-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Basic Usage" description="Default fixed speed dial. Click to open." [code]="basicCode"
          >
            <ui-speed-dial
              strategy="absolute"
              position="center"
              [attr.actions]="lucideActions"
              icon="plus"
              icon-library="lucide"
              action-library="lucide"
              (actionClick)="handleActionClick($event)"
            ></ui-speed-dial>
          </pg-example-section>

          <!-- Positions -->
          <pg-example-section
            id="positions" title="Positions & Direction" description="Place the dial anywhere and control its expanding direction." [code]="positionsCode"
          >
            <ui-speed-dial
              strategy="absolute"
              position="top-left"
              direction="right"
              [attr.actions]="lucideActions"
              icon="arrow-right"
              icon-library="lucide"
              action-library="lucide"
              tooltip-position="bottom"
            ></ui-speed-dial>
            <ui-speed-dial
              strategy="absolute"
              position="top-right"
              direction="down"
              [attr.actions]="lucideActions"
              icon="arrow-down"
              icon-library="lucide"
              action-library="lucide"
              tooltip-position="left"
            ></ui-speed-dial>
            <ui-speed-dial
              strategy="absolute"
              position="bottom-left"
              direction="up"
              [attr.actions]="lucideActions"
              icon="arrow-up"
              icon-library="lucide"
              action-library="lucide"
              tooltip-position="right"
            ></ui-speed-dial>
            <ui-speed-dial
              strategy="absolute"
              position="bottom-right"
              direction="left"
              [attr.actions]="lucideActions"
              icon="arrow-left"
              icon-library="lucide"
              action-library="lucide"
              tooltip-position="top"
            ></ui-speed-dial>
            <ui-speed-dial
              strategy="absolute"
              position="center"
              direction="up"
              [attr.actions]="lucideActions"
              icon="target"
              icon-library="lucide"
              action-library="lucide"
            ></ui-speed-dial>
          </pg-example-section>

          <!-- Trigger -->
          <pg-example-section
            id="trigger" title="Hover Trigger & Tooltips" description="Open on hover instead of click. Explicit tooltip positioning." [code]="triggerCode"
          >
            <ui-speed-dial
              strategy="absolute"
              position="center"
              trigger="hover"
              tooltip-position="bottom"
              [attr.actions]="lucideActions"
              icon="mouse-pointer-2"
              icon-library="lucide"
              action-library="lucide"
            ></ui-speed-dial>
          </pg-example-section>

          <!-- Styles -->
          <pg-example-section
            id="styles" title="Sizes & Colors" description="Customize the primary button's visual weight." [code]="stylesCode"
          >
            <ui-speed-dial
              strategy="absolute"
              position="top-left"
              size="sm"
              color="success"
              [attr.actions]="lucideActions"
              icon="check"
              icon-library="lucide"
              action-library="lucide"
              direction="right"
            ></ui-speed-dial>
            <ui-speed-dial
              strategy="absolute"
              position="bottom-right"
              size="lg"
              color="danger"
              [attr.actions]="lucideActions"
              icon="alert-circle"
              icon-library="lucide"
              action-library="lucide"
              direction="up"
            ></ui-speed-dial>
          </pg-example-section>

          <!-- Custom Icons -->
          <pg-example-section
            id="custom-icons" title="Custom Icons & Themes" [code]="customIconsCode"
          >
            <ui-speed-dial
              strategy="absolute"
              position="center"
              icon="menu"
              icon-library="lucide"
              [attr.actions]="lucideActions"
              action-library="lucide"
            ></ui-speed-dial>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="speed-dial"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
