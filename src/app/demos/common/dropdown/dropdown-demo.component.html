<div class="demo-container">
  <pg-demo-header
    icon="🔽"
    title="Dropdown Component"
    description="A highly customizable dropdown system supporting multi-select, hierarchical lists, fuzzy search, and rich option rendering."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Dropdown -->
        <pg-example-section
          id="basic"
          title="Basic Dropdown"
          description="Standard single selection dropdown with customizable placeholder"
          [code]="basicCode"
        >
          <div class="max-w-320">
            <dui-dropdown
              [options]="jsonOptions(basicOptions)"
              placeholder="Select one..."
            ></dui-dropdown>
          </div>
        </pg-example-section>

        <!-- Premium Options -->
        <pg-example-section
          id="premium-options"
          title="Premium Rich Options"
          description="Options with icons, subtitles, metadata tags, and right-hand decorators"
          [code]="premiumCode"
        >
          <div class="max-w-320">
            <dui-dropdown
              [options]="jsonOptions(premiumOptions)"
              placeholder="Infrastructure types"
            ></dui-dropdown>
          </div>
        </pg-example-section>

        <!-- Selection Modes -->
        <pg-example-section
          id="selection-modes"
          title="Selection Modes"
          description="Support for multi-select with checkmarks and nested hierarchical structures"
          [code]="selectionCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Multi-Select</h4>
              <dui-dropdown
                multi-select
                [options]="jsonOptions(basicOptions)"
                placeholder="Pick multiple"
              ></dui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Hierarchical (Cascading)</h4>
              <dui-dropdown
                cascading
                [options]="jsonOptions(cascadingOptions)"
                placeholder="Drill down categories"
              ></dui-dropdown>
            </div>
          </div>
        </pg-example-section>

        <!-- Search & Filter -->
        <pg-example-section
          id="search-filter"
          title="Search & Filtering"
          description="Integrated search bar with fuzzy filtering for large lists"
          [code]="searchCode"
        >
          <div class="max-w-320">
            <dui-dropdown
              searchable
              [options]="jsonOptions(premiumOptions)"
              placeholder="Start typing..."
            ></dui-dropdown>
          </div>
        </pg-example-section>

        <!-- Appearance -->
        <pg-example-section
          id="appearance"
          title="Appearance Styles"
          description="Choose between a traditional dropdown and a sleek button-style trigger"
          [code]="appearanceCode"
        >
          <div class="demo-flex-wrap">
            <dui-dropdown
              appearance="dropdown"
              [options]="jsonOptions(basicOptions)"
              placeholder="Standard Mode"
            ></dui-dropdown>

            <dui-dropdown
              appearance="button"
              [options]="jsonOptions(basicOptions)"
              placeholder="Action Overflow"
            ></dui-dropdown>
          </div>
        </pg-example-section>

        <!-- Sizes -->
        <pg-example-section
          id="sizes"
          title="Size Variants"
          description="Three standard sizes to fit any UI density"
          [code]="sizesCode"
        >
          <div class="demo-flex-wrap items-end">
            <dui-dropdown
              size="sm"
              [options]="jsonOptions(basicOptions)"
              placeholder="Small"
            ></dui-dropdown>
            <dui-dropdown
              size="md"
              [options]="jsonOptions(basicOptions)"
              placeholder="Medium"
            ></dui-dropdown>
            <dui-dropdown
              size="lg"
              [options]="jsonOptions(basicOptions)"
              placeholder="Large"
            ></dui-dropdown>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Interactive states including disabled, full-width, and pre-selected values"
          [code]="statesCode"
        >
          <div class="demo-grid col-1">
            <div class="demo-card">
              <h4 class="demo-sub-title">Pre-selected Value</h4>
              <dui-dropdown value="2" [options]="jsonOptions(basicOptions)"></dui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Disabled State</h4>
              <dui-dropdown
                disabled
                [options]="jsonOptions(basicOptions)"
                placeholder="Offline"
              ></dui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Full Width</h4>
              <dui-dropdown
                full-width
                [options]="jsonOptions(basicOptions)"
                placeholder="Expanding to container"
              ></dui-dropdown>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <dm-dropdown-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="dropdown"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
