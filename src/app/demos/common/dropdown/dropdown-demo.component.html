<div class="demo-container">
  <pg-demo-header
    icon="🔽"
    title="Dropdown Component"
    description="A highly customizable dropdown system supporting multi-select, hierarchical lists, fuzzy search, and rich option rendering."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Dropdown -->
        <pg-example-section
          id="basic"
          title="Basic Dropdown"
          description="Standard single selection dropdown with customizable placeholder"
          [code]="basicCode"
        >
          <div  class="max-w-320">
            <ui-dropdown [options]="jsonOptions(basicOptions)" placeholder="Select one..."></ui-dropdown>
          </div>
        </pg-example-section>

        <!-- Premium Options -->
        <pg-example-section
          id="premium-options"
          title="Premium Rich Options"
          description="Options with icons, subtitles, metadata tags, and right-hand decorators"
          [code]="premiumCode"
        >
          <div  class="max-w-320">
            <ui-dropdown 
              [options]="jsonOptions(premiumOptions)" 
              placeholder="Infrastructure types"
            ></ui-dropdown>
          </div>
        </pg-example-section>

        <!-- Selection Modes -->
        <pg-example-section
          id="selection-modes"
          title="Selection Modes"
          description="Support for multi-select with checkmarks and nested hierarchical structures"
          [code]="selectionCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h4 class="demo-sub-title">Multi-Select</h4>
              <ui-dropdown 
                multi-select 
                [options]="jsonOptions(basicOptions)" 
                placeholder="Pick multiple"
              ></ui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Hierarchical (Cascading)</h4>
              <ui-dropdown 
                cascading 
                [options]="jsonOptions(cascadingOptions)" 
                placeholder="Drill down categories"
              ></ui-dropdown>
            </div>
          </div>
        </pg-example-section>

        <!-- Search & Filter -->
        <pg-example-section
          id="search-filter"
          title="Search & Filtering"
          description="Integrated search bar with fuzzy filtering for large lists"
          [code]="searchCode"
        >
          <div  class="max-w-320">
            <ui-dropdown 
              searchable 
              [options]="jsonOptions(premiumOptions)" 
              placeholder="Start typing..."
            ></ui-dropdown>
          </div>
        </pg-example-section>

        <!-- Appearance -->
        <pg-example-section
          id="appearance"
          title="Appearance Styles"
          description="Choose between a traditional dropdown and a sleek button-style trigger"
          [code]="appearanceCode"
        >
          <div class="demo-flex-wrap">
            <ui-dropdown 
              appearance="dropdown" 
              [options]="jsonOptions(basicOptions)" 
              placeholder="Standard Mode"
            ></ui-dropdown>

            <ui-dropdown 
              appearance="button" 
              [options]="jsonOptions(basicOptions)" 
              placeholder="Action Overflow"
            ></ui-dropdown>
          </div>
        </pg-example-section>

        <!-- Sizes -->
        <pg-example-section
          id="sizes"
          title="Size Variants"
          description="Three standard sizes to fit any UI density"
          [code]="sizesCode"
        >
          <div class="demo-flex-wrap items-end" >
            <ui-dropdown size="sm" [options]="jsonOptions(basicOptions)" placeholder="Small"></ui-dropdown>
            <ui-dropdown size="md" [options]="jsonOptions(basicOptions)" placeholder="Medium"></ui-dropdown>
            <ui-dropdown size="lg" [options]="jsonOptions(basicOptions)" placeholder="Large"></ui-dropdown>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Component States"
          description="Interactive states including disabled, full-width, and pre-selected values"
          [code]="statesCode"
        >
          <div class="demo-grid col-1">
            <div class="demo-card">
              <h4 class="demo-sub-title">Pre-selected Value</h4>
              <ui-dropdown value="2" [options]="jsonOptions(basicOptions)"></ui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Disabled State</h4>
              <ui-dropdown disabled [options]="jsonOptions(basicOptions)" placeholder="Offline"></ui-dropdown>
            </div>
            <div class="demo-card">
              <h4 class="demo-sub-title">Full Width</h4>
              <ui-dropdown full-width [options]="jsonOptions(basicOptions)" placeholder="Expanding to container"></ui-dropdown>
            </div>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <dm-dropdown-playground />
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <pg-component-documentation componentId="dropdown"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
