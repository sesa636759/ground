<div class="demo-container">
  <pg-demo-header
    icon="pill"
  iconLibrary="lucide"
    title="Pill / Tag"
    description="Compact elements used for attributes, status indicators, and category tagging. Highly customizable with icons, avatars, and interactive states."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-pill-playground></dm-pill-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Variants -->
          <pg-example-section
            id="variants" title="Variants" description="Structural styles including soft, outlined, and gradient backgrounds." [code]="variantsCode"
          >
            <div class="demo-flex">
              <ui-pill label="Filled" variant="filled" color="primary"></ui-pill>
              <ui-pill label="Outlined" variant="outlined" color="primary"></ui-pill>
              <ui-pill label="Soft" variant="soft" color="success"></ui-pill>
              <ui-pill label="Bordered" variant="bordered" color="danger"></ui-pill>
              <ui-pill label="Gradient" variant="gradient" gradient="blue-purple"></ui-pill>
            </div>
          </pg-example-section>

          <!-- Colors -->
          <pg-example-section id="colors" title="Colors & Sizes" description="Standard color palettes, custom colors, and various scale options." [code]="colorsCode"
          >
            <div class="demo-flex">
              <ui-pill label="Primary" color="primary"></ui-pill>
              <ui-pill label="Secondary" color="secondary"></ui-pill>
              <ui-pill label="Success" color="success"></ui-pill>
              <ui-pill label="Warning" color="warning"></ui-pill>
              <ui-pill label="Danger" color="danger"></ui-pill>
              <ui-pill label="Info" color="info"></ui-pill>
            </div>
            <div class="demo-flex mt-24">
              <ui-pill
                label="Custom"
                custom-color="#6366f1"
                custom-text-color="#ffffff"
              ></ui-pill>
              <ui-pill label="Neon" custom-color="#00ff00" custom-text-color="#000000"></ui-pill>
            </div>
            <div class="demo-flex mt-24">
              <ui-pill label="Small" size="sm" color="default"></ui-pill>
              <ui-pill label="Medium" size="md" color="default"></ui-pill>
              <ui-pill label="Large" size="lg" color="default"></ui-pill>
            </div>
          </pg-example-section>

          <!-- Media -->
          <pg-example-section id="media" title="Media & Avatars" description="Enhance information density with visual cues and media." [code]="mediaCode"
          >
            <div class="demo-flex">
              <ui-pill label="Start Icon" icon="star" icon-library="lucide"></ui-pill>
              <ui-pill
                label="End Icon"
                icon="chevron-right"
                icon-library="lucide"
                icon-position="end"
              ></ui-pill>
              <ui-pill label="John Doe" avatar="https://i.pravatar.cc/150?u=1"></ui-pill>
              <ui-pill
                label="Messages"
                icon="mail"
                icon-library="lucide"
                counter="12"
                color="warning"
              ></ui-pill>
            </div>
          </pg-example-section>

          <!-- Orientations -->
          <pg-example-section
            id="orientations" title="Layouts" description="Alternate layouts for specific UI patterns like pipelines or sidebars." [code]="orientationsCode"
          >
            <div class="demo-flex h-120 flex-items-center">
              <ui-pill label="Horizontal" orientation="horizontal"></ui-pill>
              <ui-pill
                label="Vertical"
                orientation="vertical"
                icon="move-vertical"
                icon-library="lucide"
              ></ui-pill>
              <ui-pill label="Vertical Text" orientation="vertical-text"></ui-pill>
              <ui-pill label="Vertical Rotated" orientation="vertical-rotated"></ui-pill>
            </div>
          </pg-example-section>

          <!-- Actions -->
          <pg-example-section id="actions" title="Actions & States" description="Interactive behaviors for selection, removal, or loading." [code]="actionsCode"
          >
            <div class="demo-flex">
              <ui-pill label="Clickable" clickable (pillClick)="onPillClick()"></ui-pill>
              <ui-pill
                label="Toggleable"
                clickable
                selected
                (pillSelect)="onPillSelect($event)"
              ></ui-pill>
              <ui-pill
                label="Removable"
                removable
                color="danger"
                (pillRemove)="onPillRemove()"
              ></ui-pill>
            </div>
            <div class="demo-flex mt-24">
              <ui-pill label="Loading" loading color="info"></ui-pill>
              <ui-pill label="Disabled" disabled></ui-pill>
              <ui-pill label="Hover me" color="success" tooltip="Click to explore!"></ui-pill>
            </div>
          </pg-example-section>

          <!-- Animations -->
          <pg-example-section
            id="animations" title="Animations" description="Entrance and exit animation styles." [code]="animationsCode"
          >
            <div class="demo-flex">
              <ui-pill label="Scale" animation="scale" color="primary"></ui-pill>
              <ui-pill label="Fade" animation="fade" color="success"></ui-pill>
              <ui-pill label="Slide" animation="slide" color="warning"></ui-pill>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="pill"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
