<div class="demo-container">
  <pg-demo-header
    icon="gauge"
  iconLibrary="lucide"
    title="Meter Group"
    description="Display multi-segmented status bars or circles to visualize resource allocation, storage usage, or task distribution."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-meter-group-playground></dm-meter-group-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic -->
          <pg-example-section
            id="basic" title="Basic Layouts" [code]="basicCode"
          >
            <ui-meter-group [attr.values]="diskValues"></ui-meter-group>
          </pg-example-section>

          <!-- Shapes -->
          <pg-example-section
            id="shapes" title="Line vs Circle" description="Switch between a linear bar and a radial gauge."
          >
            <div>
              <p>Linear Bar</p>
              <ui-meter-group [attr.values]="diskValues"></ui-meter-group>
            </div>
            <div>
              <p>Radial Circle</p>
              <ui-meter-group shape="circle" [attr.values]="diskValues"></ui-meter-group>
            </div>
          </pg-example-section>

          <!-- Vertical -->
          <pg-example-section
            id="vertical" title="Vertical Orientation" [code]="verticalCode"
          >
            <ui-meter-group orientation="vertical" [attr.values]="diskValues"></ui-meter-group>
          </pg-example-section>

          <!-- Sizing -->
          <pg-example-section
            id="sizing" title="Sizes & Thickness" description="Small (SM)"
          >
            <div>
              <p>Small (SM)</p>
              <ui-meter-group size="sm" [attr.values]="diskValues"></ui-meter-group>
            </div>
            <div>
              <p>Medium (MD)</p>
              <ui-meter-group size="md" [attr.values]="diskValues"></ui-meter-group>
            </div>
            <div>
              <p>Large (LG)</p>
              <ui-meter-group size="lg" [attr.values]="diskValues"></ui-meter-group>
            </div>
          </pg-example-section>

          <!-- Legend -->
          <pg-example-section
            id="legend" title="Legends & Labels"
          >
            <ui-meter-group show-legend [attr.values]="diskValues"></ui-meter-group>
          </pg-example-section>

          <!-- Icons -->
          <pg-example-section
            id="icons" title="Icons & Libraries"
          >
            <ui-meter-group
              icon-library="lucide"
              show-legend
              [attr.values]="diskValues"
            ></ui-meter-group>
          </pg-example-section>

          <!-- Interactive -->
          <pg-example-section
            id="interactive" title="Interactive Mode" description="Segments and legend items respond to hover and click events."
          >
            <ui-meter-group
              interactive
              [attr.values]="diskValues"
              (meterClick)="handleMeterClick($event)"
            ></ui-meter-group>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="meter-group"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
