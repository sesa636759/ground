<div class="demo-container">
  <pg-demo-header
    icon="arrow-left-right"
  iconLibrary="lucide"
    title="Pagination"
    description="Comprehensive navigation controls with support for 8+ display modes, infinite scroll styles, and deep behavioral customization."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-pagination-playground></dm-pagination-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Basic & Variants -->
          <pg-example-section id="basic" title="Basic & Variants" description="The core numeric layout used for general navigation." [code]="basicCode()"
          >
            <div class="demo-row">
              <p>Filled Theme</p>
              <ui-pagination
                variant="filled"
                theme="primary"
                [attr.total-items]="100"
                [attr.items-per-page]="10"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Soft Theme</p>
              <ui-pagination variant="soft" theme="info" [attr.total-items]="100"></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Outlined Style</p>
              <ui-pagination
                variant="outlined"
                theme="success"
                [attr.total-items]="80"
              ></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Detailed Controls -->
          <pg-example-section
            id="detailed" title="Controls" description="Combines total counts, page sizing, and direct &quot;jump to&quot; input." [code]="detailedCode()"
          >
            <ui-pagination
              type="detailed"
              [attr.total-items]="1000"
              show-page-size
              show-total
              show-jump-to
              theme="primary"
            ></ui-pagination>
          </pg-example-section>

          <!-- Minimalist Styles -->
          <pg-example-section
            id="minimal" title="Styles" description="Minimal Type (Arrow only)"
          >
            <div class="demo-row">
              <p>Minimal Type (Arrow only)</p>
              <ui-pagination type="minimal" [attr.total-items]="100" size="sm"></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Compact Basic</p>
              <ui-pagination type="compact" [attr.total-items]="50"></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Streaming (Infinite) -->
          <pg-example-section
            id="infinite" title="(Infinite)" description="Replaces discrete pages with a &quot;Load More&quot; button or auto-fetching state." [code]="infiniteCode()"
          >
            <div class="demo-row">
              <p>Infinite Style (Load More)</p>
              <ui-pagination
                infinite
                [attr.total-items]="1000"
                [attr.items-per-page]="50"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Infinite Loading State</p>
              <ui-pagination infinite loading [attr.total-items]="1000"></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Selector Modes -->
          <pg-example-section
            id="modes" title="Modes" description="Dropdown Selector" [code]="dropdownCode()"
          >
            <div class="demo-row">
              <p>Dropdown Selector</p>
              <ui-pagination type="dropdown" [attr.total-items]="500"></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Manual Number Input</p>
              <ui-pagination type="input" [attr.total-items]="300" theme="info"></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Visual Progress -->
          <pg-example-section
            id="visuals" title="Progress" description="Dot indicators for carousels and progress bars."
          >
            <div class="demo-row">
              <p>Dot Indicators</p>
              <ui-pagination
                type="indicator"
                theme="primary"
                [attr.total-items]="50"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Progress Bar Mode</p>
              <ui-pagination
                show-progress
                theme="success"
                [attr.total-items]="100"
                [attr.current-page]="6"
              ></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Shapes & Borders -->
          <pg-example-section id="shapes" title="Shapes & Borders" description="Pill Shape"
          >
            <div class="demo-row">
              <p>Pill Shape</p>
              <ui-pagination
                shape="pill"
                variant="filled"
                [attr.total-items]="100"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Rounded Square</p>
              <ui-pagination
                shape="rounded"
                variant="outlined"
                [attr.total-items]="100"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Sharp Square</p>
              <ui-pagination
                shape="square"
                variant="soft"
                [attr.total-items]="100"
              ></ui-pagination>
            </div>
          </pg-example-section>

          <!-- Color Themes -->
          <pg-example-section
            id="themes" title="Themes"
          >
            <ui-pagination theme="warning" [attr.total-items]="100"></ui-pagination>
            <ui-pagination theme="error" [attr.total-items]="100"></ui-pagination>
            <ui-pagination theme="secondary" [attr.total-items]="100"></ui-pagination>
          </pg-example-section>

          <!-- Behavioral Logic -->
          <pg-example-section
            id="logic" title="Logic" description="Quick Jump Step (+10)" [code]="logicCode()"
          >
            <div class="demo-row">
              <p>Quick Jump Step (+10)</p>
              <ui-pagination
                quick-jump
                [attr.quick-jump-step]="10"
                [attr.total-items]="1000"
                [attr.current-page]="50"
              ></ui-pagination>
            </div>
            <div class="demo-row">
              <p>Smart Compact Mode</p>
              <ui-pagination
                smart-compact
                [attr.smart-compact-threshold]="5"
                [attr.total-items]="500"
                theme="warning"
              ></ui-pagination>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="pagination"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
