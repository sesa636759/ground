<div class="demo-container">
  <pg-demo-header
    icon="layers"
  iconLibrary="lucide"
    title="Stack"
    description="A layout utility for lining up elements horizontally or vertically with consistent spacing, dividers, and automatic overflow management."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-stack-playground></dm-stack-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content">
          <!-- Horizontal -->
          <pg-example-section
            id="horizontal" title="Horizontal Flow" description="Default row-based layout." [code]="directionCode"
          >
            <ui-stack direction="horizontal" spacing="12px">
              <div class="box">A</div>
              <div class="box">B</div>
              <div class="box">C</div>
            </ui-stack>
          </pg-example-section>

          <!-- Vertical -->
          <pg-example-section
            id="vertical" title="Vertical Stack" description="Column-based layout."
          >
            <ui-stack direction="vertical" spacing="8px" align="start">
              <div class="box">Item 1</div>
              <div class="box">Item 2</div>
              <div class="box">Item 3</div>
            </ui-stack>
          </pg-example-section>

          <!-- Wrap -->
          <pg-example-section
            id="wrap" title="Flow Wrapping" description="Automatically move items to a new line when space is limited." [code]="wrapCode"
          >
            <ui-stack wrap="wrap" spacing="10px">
              <div class="box-sm" *ngFor="let b of [1, 2, 3, 4, 5, 6, 7, 8]">#{{ b }}</div>
            </ui-stack>
          </pg-example-section>

          <!-- Spacing -->
          <pg-example-section
            id="spacing" title="Variable Spacing" description="Compact vs Spacious layouts."
          >
            <div class="demo-card stack-stack">
              <div>
                <p>Spacious (32px)</p>
                <ui-stack spacing="32px"
                  ><div class="box-sm"></div>
                  <div class="box-sm"></div>
                  <div class="box-sm"></div
                ></ui-stack>
              </div>
              <div>
                <p>Compact (4px)</p>
                <ui-stack spacing="4px"
                  ><div class="box-sm"></div>
                  <div class="box-sm"></div>
                  <div class="box-sm"></div
                ></ui-stack>
              </div>
            </div>
          </pg-example-section>

          <!-- Dividers -->
          <pg-example-section
            id="dividers" title="Dividers & Borders" [code]="dividersCode"
          >
            <ui-stack show-dividers spacing="24px">
              <span>Profile</span><span>Settings</span><span>Account</span>
            </ui-stack>
            <ui-stack show-dividers divider-type="dashed" spacing="24px">
              <div class="box-sm"></div>
              <div class="box-sm"></div>
              <div class="box-sm"></div>
            </ui-stack>
          </pg-example-section>

          <!-- Avatars -->
          <pg-example-section
            id="avatars" title="Avatar Facepile (Overlap)" description="Classic overlapping circles common in group chats." [code]="overlapCode"
          >
            <ui-stack overlap spacing="-15px">
              <div class="avatar bg-blue">JD</div>
              <div class="avatar bg-soft-red">AS</div>
              <div class="avatar bg-green">MK</div>
              <div class="avatar bg-orange">TH</div>
            </ui-stack>
          </pg-example-section>

          <!-- Max -->
          <pg-example-section
            id="max" title="Overflow Management" description="Limit visibility and show a '+N' indicator." [code]="maxCode"
          >
            <ui-stack overlap spacing="-12px" [max]="3">
              <div class="avatar bg-indigo" *ngFor="let a of avatars">{{ a }}</div>
            </ui-stack>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="stack"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
