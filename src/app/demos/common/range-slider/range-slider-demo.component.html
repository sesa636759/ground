<div class="demo-container">
  <pg-demo-header
    icon="🎚️"
    title="Range Slider"
    description="A component that allows users to select a value or a range of values by moving a thumb along a track."
  >
  </pg-demo-header>

  <pg-demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">
        <!-- Basic Usage -->
        <pg-example-section
          id="basic"
          title="Single Slider"
          description="Standard slider for selecting a single numeric value."
          [code]="basicCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <dui-range-slider value="30" label="Select Intensity"></dui-range-slider>
            <dui-range-slider
              step="10"
              show-marks
              value="50"
              label="Stepped Input (Increments of 10)"
            ></dui-range-slider>
          </div>
        </pg-example-section>

        <!-- Dual Range -->
        <pg-example-section
          id="range"
          title="Dual Range Mode"
          description="Enables two thumbs for selecting a range of values (min and max)."
          [code]="rangeCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <dui-range-slider
              range
              start-value="20"
              end-value="80"
              label="Price Range"
            ></dui-range-slider>
            <dui-range-slider
              range
              start-value="40"
              end-value="60"
              color="#10b981"
              label="Operating Window"
            ></dui-range-slider>
          </div>
        </pg-example-section>

        <!-- Visual Styles -->
        <pg-example-section
          id="visuals"
          title="Visual Styles"
          description="Customize size, color, and tooltip behavior."
          [code]="visualsCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <dui-range-slider size="sm" label="Small Tier Slider"></dui-range-slider>
            <dui-range-slider
              size="lg"
              color="#8b5cf6"
              value="70"
              label="Large Tier with Custom Purple"
            ></dui-range-slider>
            <dui-range-slider
              tooltip-always-visible
              value="45"
              label="Tooltip Stays Visible"
            ></dui-range-slider>
          </div>
        </pg-example-section>

        <!-- Step Marks -->
        <pg-example-section
          id="marks"
          title="Step Marks & Scale"
          description="Display visual indicators for steps or specific values across the track."
          [code]="marksCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <dui-range-slider show-marks step="25" label="Quarterly Benchmarks"></dui-range-slider>
            <dui-range-slider
              show-marks
              [attr.marks]="'[{&quot;value&quot;: 0, &quot;label&quot;: &quot;Low&quot;}, {&quot;value&quot;: 50, &quot;label&quot;: &quot;Medium&quot;}, {&quot;value&quot;: 100, &quot;label&quot;: &quot;High&quot;}]'"
              label="Named Marks"
            ></dui-range-slider>
          </div>
        </pg-example-section>

        <!-- Advanced Scaling -->
        <pg-example-section
          id="advanced"
          title="Advanced Scaling"
          description="Control value snapping and use non-linear coordinate mapping."
          [code]="advancedCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <div>
              <p class="mb-8 font-medium">Restricted Values (Only specific points allowed)</p>
              <dui-range-slider
                [attr.restricted-values]="'[0, 25, 50, 75, 100]'"
                show-marks
                value="25"
              ></dui-range-slider>
            </div>
            <div>
              <p class="mb-8 font-medium">Custom Steps (Non-linear distribution)</p>
              <dui-range-slider
                [attr.custom-steps]="'[0, 10, 20, 50, 100, 200, 500]'"
                [attr.max]="500"
                show-marks
                value="50"
              ></dui-range-slider>
            </div>
          </div>
        </pg-example-section>

        <!-- Vertical Mode -->
        <pg-example-section
          id="vertical"
          title="Vertical Orientation"
          description="Sliders can be oriented vertically for UI layouts like audio mixers."
          [code]="verticalCode()"
        >
          <div class="demo-flex h-300 gap-60 justify-center p-20">
            <dui-range-slider vertical value="60"></dui-range-slider>
            <dui-range-slider
              vertical
              range
              start-value="30"
              end-value="70"
              color="#ef4444"
            ></dui-range-slider>
            <dui-range-slider
              vertical
              show-marks
              step="20"
              value="40"
              color="#f59e0b"
            ></dui-range-slider>
          </div>
        </pg-example-section>

        <!-- Icons -->
        <pg-example-section
          id="icons"
          title="Functional Icons"
          description="Add context by placing icons at the start and end of the track."
          [code]="iconsCode()"
        >
          <div class="demo-grid col-1 max-w-500 gap-40">
            <dui-range-slider
              start-icon="volume-X"
              end-icon="volume-2"
              value="60"
              label="Audio Control"
            ></dui-range-slider>
            <dui-range-slider
              start-icon="sun"
              end-icon="moon"
              value="30"
              color="#f59e0b"
              label="Brightness/Gamma"
            ></dui-range-slider>
          </div>
        </pg-example-section>
      </div>
    </div>

    <div slot="playground">
      <dm-range-slider-playground />
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="range-slider"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
