<div class="demo-container">
  <pg-demo-header
    icon="🎭"
    title="Pattern Input"
    description="An input field with built-in masking capabilities for structured data entry. Automatically formats user input according to predefined patterns like phone numbers, dates, credit cards, and more."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-pattern-input-playground></dm-pattern-input-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Common Patterns -->
          <section class="demo-section" id="patterns" style="margin-top: 0">
            <div class="section-header">
              <h2>🎭 Common Patterns</h2>
              <p>Pre-configured masks for typical use cases.</p>
            </div>
            <div class="demo-card">
              <div style="display: flex; flex-direction: column; gap: 24px">
                <div>
                  <label style="display: block; margin-bottom: 8px; font-weight: 600"
                    >Phone Number</label
                  >
                  <ui-pattern-input
                    mask="(999) 999-9999"
                    placeholder="(555) 123-4567"
                  ></ui-pattern-input>
                </div>
                <div>
                  <label style="display: block; margin-bottom: 8px; font-weight: 600"
                    >Credit Card</label
                  >
                  <ui-pattern-input
                    mask="9999-9999-9999-9999"
                    placeholder="1234-5678-9012-3456"
                  ></ui-pattern-input>
                </div>
                <div>
                  <label style="display: block; margin-bottom: 8px; font-weight: 600"
                    >Date (MM/DD/YYYY)</label
                  >
                  <ui-pattern-input mask="99/99/9999" placeholder="12/31/2024"></ui-pattern-input>
                </div>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="patternsCode"
              [label]="'Pattern Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="pattern-input"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
