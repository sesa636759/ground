<div class="demo-container">
  <pg-demo-header
    icon="🍿"
    title="Chip Component"
    description="Compact elements that represent an input, attribute, or action. Perfect for tags, filters, or entity representation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-chip-playground></dm-chip-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content" id="examples-scroll-area">
          <pg-example-section
            id="variants"
            title="Visual Variants"
            description="Different visual styles for various contexts."
            [code]="variantsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <ui-chip label="Filled" variant="filled" color="primary"></ui-chip>
                <ui-chip label="Outlined" variant="outlined" color="primary"></ui-chip>
                <ui-chip label="Soft" variant="soft" color="success"></ui-chip>
                <ui-chip label="Gradient" variant="gradient" color="warning"></ui-chip>
                <ui-chip label="Text Only" variant="text" color="danger"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="shapes-sizes"
            title="Shapes & Sizes"
            description="Control the geometry and scale of the chip."
            [code]="shapesSizesCode"
          >
            <div class="demo-card chip-stack">
              <div class="demo-flex">
                <ui-chip label="Pill" shape="pill" color="info"></ui-chip>
                <ui-chip label="Rounded" shape="rounded" color="info"></ui-chip>
                <ui-chip label="Square" shape="square" color="info"></ui-chip>
                <ui-chip label="Circle" shape="circle" icon="star" icon-library="lucide" color="info"></ui-chip>
              </div>
              <div class="demo-flex mt-24">
                <ui-chip label="Small" size="sm" color="secondary"></ui-chip>
                <ui-chip label="Medium" size="md" color="secondary"></ui-chip>
                <ui-chip label="Large" size="lg" color="secondary"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="media"
            title="Icons, Avatars & Media"
            description="Embed rich media like icons, images, or user avatars."
            [code]="mediaCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <ui-chip label="Github" icon="github" icon-library="lucide"></ui-chip>
                <ui-chip label="John Doe" user-avatar="https://i.pravatar.cc/150?u=1"></ui-chip>
                <ui-chip label="Scenic View" image="https://picsum.photos/20/20"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="indicators"
            title="Badges & Counters"
            description="Display numeric or text status indicators within the chip."
            [code]="indicatorsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <ui-chip label="Notifications" badge="99" color="danger"></ui-chip>
                <ui-chip label="Files" counter="12" color="warning"></ui-chip>
                <ui-chip label="Status" counter="Critical" color="danger" variant="soft"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="orientations"
            title="Vertical & Rotated"
            description="Unique layouts for vertical pipelines or rotated sidebar navigation."
            [code]="orientationsCode"
          >
            <div class="demo-card">
              <div class="demo-flex h-120 flex-items-center">
                <ui-chip label="Horizontal" orientation="horizontal"></ui-chip>
                <ui-chip label="Vertical" orientation="vertical" icon="move-vertical" icon-library="lucide"></ui-chip>
                <ui-chip label="Vertical Text" orientation="vertical-text"></ui-chip>
                <ui-chip label="Vertical Rotated" orientation="vertical-rotated"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="actions"
            title="Actions & States"
            description="Interactive behaviors and states for selection or processing."
            [code]="actionsCode"
          >
            <div class="demo-card chip-stack">
              <div class="demo-flex">
                <ui-chip label="Clickable" clickable color="info" (chipClick)="onChipClick()"></ui-chip>
                <ui-chip label="Removable" removable variant="soft" color="danger" (chipRemove)="onChipRemove()"></ui-chip>
                <ui-chip label="Selectable" clickable selected color="primary" (chipSelect)="onChipSelect($event)"></ui-chip>
              </div>
              <div class="demo-flex mt-24">
                <ui-chip label="Loading" loading color="secondary"></ui-chip>
                <ui-chip label="Disabled" disabled color="secondary"></ui-chip>
                <ui-chip label="Hover me" color="success" tooltip="Hello world!"></ui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="animations"
            title="Animations"
            description="Control how the chip appears or disappears."
            [code]="animationsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <ui-chip label="Scale" animation="scale" color="primary"></ui-chip>
                <ui-chip label="Fade" animation="fade" color="success"></ui-chip>
                <ui-chip label="Slide" animation="slide" color="warning"></ui-chip>
                <ui-chip label="Bounce" animation="bounce" color="danger"></ui-chip>
              </div>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="chip"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
