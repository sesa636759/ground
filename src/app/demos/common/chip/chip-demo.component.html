<div class="demo-container">
  <pg-demo-header
    icon="🍿"
    title="Chip Component"
    description="Compact elements that represent an input, attribute, or action. Perfect for tags, filters, or entity representation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-chip-playground></dm-chip-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <div class="examples-content" id="examples-scroll-area">
          <pg-example-section
            id="variants"
            title="Visual Variants"
            description="Different visual styles for various contexts."
            [code]="variantsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <dui-chip label="Filled" variant="filled" color="primary"></dui-chip>
                <dui-chip label="Outlined" variant="outlined" color="primary"></dui-chip>
                <dui-chip label="Soft" variant="soft" color="success"></dui-chip>
                <dui-chip label="Gradient" variant="gradient" color="warning"></dui-chip>
                <dui-chip label="Text Only" variant="text" color="danger"></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="shapes-sizes"
            title="Shapes & Sizes"
            description="Control the geometry and scale of the chip."
            [code]="shapesSizesCode"
          >
            <div class="demo-card chip-stack">
              <div class="demo-flex">
                <dui-chip label="Pill" shape="pill" color="info"></dui-chip>
                <dui-chip label="Rounded" shape="rounded" color="info"></dui-chip>
                <dui-chip label="Square" shape="square" color="info"></dui-chip>
                <dui-chip
                  label="Circle"
                  shape="circle"
                  icon="star"
                  icon-library="lucide"
                  color="info"
                ></dui-chip>
              </div>
              <div class="demo-flex mt-24">
                <dui-chip label="Small" size="sm" color="secondary"></dui-chip>
                <dui-chip label="Medium" size="md" color="secondary"></dui-chip>
                <dui-chip label="Large" size="lg" color="secondary"></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="media"
            title="Icons, Avatars & Media"
            description="Embed rich media like icons, images, or user avatars."
            [code]="mediaCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <dui-chip label="Github" icon="github" icon-library="lucide"></dui-chip>
                <dui-chip label="John Doe" user-avatar="https://i.pravatar.cc/150?u=1"></dui-chip>
                <dui-chip label="Scenic View" image="https://picsum.photos/20/20"></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="indicators"
            title="Badges & Counters"
            description="Display numeric or text status indicators within the chip."
            [code]="indicatorsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <dui-chip label="Notifications" badge="99" color="danger"></dui-chip>
                <dui-chip label="Files" counter="12" color="warning"></dui-chip>
                <dui-chip
                  label="Status"
                  counter="Critical"
                  color="danger"
                  variant="soft"
                ></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="orientations"
            title="Vertical & Rotated"
            description="Unique layouts for vertical pipelines or rotated sidebar navigation."
            [code]="orientationsCode"
          >
            <div class="demo-card">
              <div class="demo-flex h-120 flex-items-center">
                <dui-chip label="Horizontal" orientation="horizontal"></dui-chip>
                <dui-chip
                  label="Vertical"
                  orientation="vertical"
                  icon="move-vertical"
                  icon-library="lucide"
                ></dui-chip>
                <dui-chip label="Vertical Text" orientation="vertical-text"></dui-chip>
                <dui-chip label="Vertical Rotated" orientation="vertical-rotated"></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="actions"
            title="Actions & States"
            description="Interactive behaviors and states for selection or processing."
            [code]="actionsCode"
          >
            <div class="demo-card chip-stack">
              <div class="demo-flex">
                <dui-chip
                  label="Clickable"
                  clickable
                  color="info"
                  (chipClick)="onChipClick()"
                ></dui-chip>
                <dui-chip
                  label="Removable"
                  removable
                  variant="soft"
                  color="danger"
                  (chipRemove)="onChipRemove()"
                ></dui-chip>
                <dui-chip
                  label="Selectable"
                  clickable
                  selected
                  color="primary"
                  (chipSelect)="onChipSelect($event)"
                ></dui-chip>
              </div>
              <div class="demo-flex mt-24">
                <dui-chip label="Loading" loading color="secondary"></dui-chip>
                <dui-chip label="Disabled" disabled color="secondary"></dui-chip>
                <dui-chip label="Hover me" color="success" tooltip="Hello world!"></dui-chip>
              </div>
            </div>
          </pg-example-section>

          <pg-example-section
            id="animations"
            title="Animations"
            description="Control how the chip appears or disappears."
            [code]="animationsCode"
          >
            <div class="demo-card">
              <div class="demo-flex">
                <dui-chip label="Scale" animation="scale" color="primary"></dui-chip>
                <dui-chip label="Fade" animation="fade" color="success"></dui-chip>
                <dui-chip label="Slide" animation="slide" color="warning"></dui-chip>
                <dui-chip label="Bounce" animation="bounce" color="danger"></dui-chip>
              </div>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="chip"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
