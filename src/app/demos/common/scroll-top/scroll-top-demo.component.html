<div class="demo-container">
  <pg-demo-header
    icon="🚀"
    title="Scroll Top"
    description="A helpful utility component that allows users to quickly return to the top of a page or a scrollable container. It appears automatically after a specified scroll threshold."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-scroll-top-playground></dm-scroll-top-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Shapes & Icons -->
          <section class="demo-section" id="shapes" style="margin-top: 0">
            <div class="section-header">
              <h2>💎 Shapes & Icons</h2>
              <p>Choose between circular and square designs to match your UI style.</p>
            </div>
            <div class="demo-card" style="display: flex; flex-direction: row; gap: 40px">
              <div class="scroll-preview-box" id="box1-id">
                <div class="long-content">
                  <p>Scroll me (Square + Text)</p>
                  <ui-scroll-top
                    target="#box1-id"
                    threshold="100"
                    shape="square"
                    icon="TOP"
                    speed="100"
                  ></ui-scroll-top>
                </div>
              </div>
              <div class="scroll-preview-box" id="box2-id">
                <div class="long-content">
                  <p>Scroll me (Circle + Icon)</p>
                  <ui-scroll-top
                    target="#box2-id"
                    threshold="100"
                    shape="circle"
                    icon="🚀"
                    speed="100"
                  ></ui-scroll-top>
                </div>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="shapesCode"
              [label]="'Styling Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="scroll-top"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
