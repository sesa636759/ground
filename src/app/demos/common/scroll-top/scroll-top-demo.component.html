<div class="demo-container">
  <pg-demo-header
    icon="arrow-up-to-line"
  iconLibrary="lucide"
    title="Scroll Top"
    description="A helpful utility component that allows users to quickly return to the top of a page or a scrollable container. It appears automatically after a specified scroll threshold."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-scroll-top-playground></dm-scroll-top-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Shapes & Icons -->
          <pg-example-section id="shapes" title="Shapes & Icons" description="Choose between circular and square designs to match your UI style." [code]="shapesCode"
          >
            <div class="scroll-preview-box" id="box1-id">
              <div class="long-content">
                <p>Scroll me (Square + Text)</p>
                <ui-scroll-top
                  target="#box1-id"
                  threshold="100"
                  shape="square"
                  icon="TOP"
                  speed="100"
                ></ui-scroll-top>
              </div>
            </div>
            <div class="scroll-preview-box" id="box2-id">
              <div class="long-content">
                <p>Scroll me (Circle + Icon)</p>
                <ui-scroll-top
                  target="#box2-id"
                  threshold="100"
                  shape="circle"
                  icon="🚀"
                  speed="100"
                ></ui-scroll-top>
              </div>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="scroll-top"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
