<div class="demo-container">
  <pg-demo-header
    icon="🔘"
    title="Button Component"
    description="An interactive component used to trigger actions or navigate through the application, featuring multiple styles, sizes, and states."
  >
  </pg-demo-header>
  <pg-demo-tabs>
    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Visual Variants -->
        <pg-example-section
          id="visual-variants"
          title="Visual Variants"
          description="Different styles for different visual hierarchies"
          [code]="variantsCode"
        >
          <div class="demo-flex-wrap">
            <dui-button label="Primary" variant="primary"></dui-button>
            <dui-button label="Secondary" variant="secondary"></dui-button>
            <dui-button label="Outline" variant="outline"></dui-button>
            <dui-button label="Ghost" variant="ghost"></dui-button>
            <dui-button label="Success" variant="success"></dui-button>
            <dui-button label="Danger" variant="danger"></dui-button>
            <dui-button label="Warning" variant="warning"></dui-button>
            <dui-button label="Info" variant="info"></dui-button>
          </div>
        </pg-example-section>

        <!-- Sizes -->
        <pg-example-section
          id="sizes"
          title="Sizes"
          description="Scalable sizes from extra small to extra large"
          [code]="sizesCode"
        >
          <div class="demo-flex-wrap items-center">
            <dui-button label="Extra Small" size="xs"></dui-button>
            <dui-button label="Small" size="sm"></dui-button>
            <dui-button label="Medium" size="md"></dui-button>
            <dui-button label="Large" size="lg"></dui-button>
            <dui-button label="Extra Large" size="xl"></dui-button>
          </div>
        </pg-example-section>

        <!-- Icons & Badges -->
        <pg-example-section
          id="icons-badges"
          title="Icons & Badges"
          description="Enhance buttons with visual cues and status indicators"
          [code]="iconsBadgesCode"
        >
          <div class="demo-flex-wrap">
            <dui-button label="Settings" icon="⚙️"></dui-button>
            <dui-button label="Checkout" icon="🛒" variant="success"></dui-button>
            <dui-button label="Trash" icon="🗑️" variant="danger" icon-position="right"></dui-button>
            <dui-button label="Notifications" icon="🔔" badge="9" variant="warning"></dui-button>
            <dui-button icon="🔍" icon-only pill variant="primary"></dui-button>
            <dui-button icon="➕" icon-only rounded variant="outline"></dui-button>
          </div>
        </pg-example-section>

        <!-- Badge Positions -->
        <pg-example-section
          id="badge-positions"
          title="Badge Positions"
          description="Control where badges appear on the button"
          [code]="badgePositionsCode"
        >
          <div class="demo-flex-wrap">
            <dui-button
              label="Notifications"
              icon="🔔"
              badge="9"
              badge-position="top-right"
              variant="primary"
            ></dui-button>
            <dui-button
              label="Messages"
              icon="✉️"
              badge="5"
              badge-position="top-left"
              variant="secondary"
            ></dui-button>
            <dui-button
              label="Alerts"
              icon="⚠️"
              badge="!"
              badge-position="bottom-right"
              variant="danger"
            ></dui-button>
            <dui-button
              label="Inbox"
              badge="12"
              badge-position="inline-right"
              variant="outline"
            ></dui-button>
            <dui-button
              label="Tasks"
              badge="4"
              badge-position="inline-left"
              variant="outline"
            ></dui-button>
          </div>
        </pg-example-section>

        <!-- Icon Libraries -->
        <pg-example-section
          id="icon-libraries"
          title="Icon Libraries"
          description="Support for various popular icon libraries and custom SVGs"
          [code]="iconLibrariesCode"
        >
          <div class="demo-flex-wrap">
            <dui-button
              label="SVG Path"
              icon="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              variant="primary"
            ></dui-button>
            <dui-button label="Material" icon="face"></dui-button>
            <dui-button
              label="Lucide"
              icon="search"
              icon-library="lucide"
              variant="success"
            ></dui-button>
            <dui-button
              label="Ionicons"
              icon="heart"
              icon-library="ionicons"
              variant="danger"
            ></dui-button>
            <dui-button
              label="Bootstrap SVG"
              icon="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z M14 14.5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V12c0-1.1.9-2 2-2h8a2 2 0 0 1 2 2v2.5z"
              variant="warning"
            ></dui-button>
            <dui-button label="Emoji" icon="🚀" variant="info"></dui-button>
            <dui-button
              label="Custom Size"
              icon="🎨"
              icon-size="28"
              variant="secondary"
            ></dui-button>
          </div>
        </pg-example-section>

        <!-- States -->
        <pg-example-section
          id="states"
          title="Functional States"
          description="Communicate interaction availability and background processes"
          [code]="statesCode"
        >
          <div class="demo-flex-wrap">
            <dui-button label="Normal" variant="primary"></dui-button>
            <dui-button label="Disabled" disabled variant="primary"></dui-button>
            <dui-button label="Loading" loading variant="primary"></dui-button>
            <dui-button label="Pill Style" pill variant="outline"></dui-button>
            <dui-button label="Full Width Action" full-width variant="secondary"></dui-button>
          </div>
        </pg-example-section>

        <!-- Elevations -->
        <pg-example-section
          id="elevations"
          title="Elevations"
          description="Visual depth using shadow effects"
          [code]="elevationsCode"
        >
          <div class="demo-flex-wrap py-20">
            <dui-button label="Elevation 1" elevation="1"></dui-button>
            <dui-button label="Elevation 2" elevation="2"></dui-button>
            <dui-button label="Elevation 3" elevation="3"></dui-button>
            <dui-button label="Elevation 4" elevation="4"></dui-button>
            <dui-button label="Elevation 5" elevation="5"></dui-button>
          </div>
        </pg-example-section>

        <!-- Link & Extra -->
        <pg-example-section
          id="link-extra"
          title="Link & Extra Features"
          description="Specialized behaviors like RTL and link rendering"
          [code]="linkExtraCode"
        >
          <div class="demo-flex-wrap">
            <dui-button label="Go to Google" href="https://google.com" target="_blank"></dui-button>
            <dui-button label="RTL Button" icon="🚀" rtl variant="success"></dui-button>
            <dui-button
              label="Loading Top"
              loading
              loading-position="top"
              variant="info"
            ></dui-button>
            <dui-button
              label="Loading Right"
              loading
              loading-position="right"
              variant="warning"
            ></dui-button>
          </div>
        </pg-example-section>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <dm-button-playground></dm-button-playground>
    </div>

    <!-- Documentation Slot — demo-tabs provides the sidebar via [docLinks] -->
    <div slot="docs">
      <pg-component-documentation componentId="button"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
