<div class="demo-container">
  <pg-demo-header
    icon="list-tree"
  iconLibrary="lucide"
    title="Tree List"
    description="A hierarchical tree view component for displaying nested data structures. Perfect for file systems, organizational charts, category navigation, and any hierarchical data representation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-tree-list-playground></dm-tree-list-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Examples -->
          <pg-example-section
            id="examples" title="Examples" description="Common use cases for hierarchical data display." [code]="examplesCode"
          >
            <div class="max-w-500">
              <ui-tree-list [model]="treeData" selectable></ui-tree-list>
            </div>
          </pg-example-section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="tree-list"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
