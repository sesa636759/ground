<div class="demo-container">
  <pg-demo-header
    icon="🌳"
    title="Tree List"
    description="A hierarchical tree view component for displaying nested data structures. Perfect for file systems, organizational charts, category navigation, and any hierarchical data representation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-tree-list-playground></dm-tree-list-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Examples -->
          <section class="demo-section mt-0" id="examples">
            <div class="section-header">
              <h2>📁 Examples</h2>
              <p>Common use cases for hierarchical data display.</p>
            </div>
            <div class="demo-card">
              <div class="max-w-500">
                <dui-tree-list [model]="treeData" selectable></dui-tree-list>
              </div>
            </div>
            <dui-code-preview
              [htmlCode]="examplesCode"
              label="File System Example"
              activeLang="ts"
            ></dui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="tree-list"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
