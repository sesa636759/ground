<div class="demo-container">
  <pg-demo-header
    icon="tag"
    iconLibrary="lucide"
    title="Badge"
    description="A small component typically used to indicate status, categories, or numerical counts on top of other elements."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <dm-badge-playground></dm-badge-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

      <div class="examples-content" id="examples-scroll-area">

        <pg-example-section
          id="basic"
          title="Basic Usage"
          description="Positioned on an element to display numeric counts, unread status, or dots."
          [code]="basicCode"
          class="mt-0"
        >
          <div class="badge-grid" style="display: flex; gap: 24px; align-items: center;">
            <ui-badge value="4">
              <ui-icon name="bell" library="lucide" size="2em" class="icon-wrapper"></ui-icon>
            </ui-badge>
            <ui-badge [attr.value]="120" [attr.max]="99">
              <ui-icon name="mail" library="lucide" size="2em" class="icon-wrapper"></ui-icon>
            </ui-badge>
            <ui-badge dot>
              <ui-icon name="message-square" library="lucide" size="2em" class="icon-wrapper"></ui-icon>
            </ui-badge>
          </div>
        </pg-example-section>

        <pg-example-section
          id="colors"
          title="Colors & Gradients"
          description="Predefined colors, stunning gradients, and fully custom color support."
          [code]="colorsCode"
        >
          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <ui-badge color="primary" value="New"></ui-badge>
            <ui-badge color="success" value="Success"></ui-badge>
            <ui-badge color="warning" value="Warn"></ui-badge>
            <ui-badge color="danger" value="Error"></ui-badge>
            <ui-badge gradient="blue-purple" value="Pro"></ui-badge>
            <ui-badge custom-color="#ff00ff" custom-text-color="#ffffff" value="Custom"></ui-badge>
          </div>
        </pg-example-section>

        <pg-example-section
          id="variants"
          title="Style Variants"
          description="Soft, outlined, and bordered configurations for varying emphasis."
          [code]="variantsCode"
        >
          <div class="bg-surface-muted" style="display: flex; gap: 12px; flex-wrap: wrap; padding: 16px; border-radius: 8px; align-items: center;">
            <ui-badge variant="standard" value="Standard"></ui-badge>
            <ui-badge variant="soft" color="success" value="Soft"></ui-badge>
            <ui-badge variant="outlined" color="primary" value="Outlined"></ui-badge>
            <ui-badge variant="bordered" color="danger" value="Bordered"></ui-badge>
          </div>
        </pg-example-section>

        <pg-example-section
          id="shapes"
          title="Size & Shapes"
          description="Different physical sizes and shapes — pill, circle, and square."
          [code]="shapesCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
              <ui-badge size="sm" value="Small"></ui-badge>
              <ui-badge size="md" value="Medium"></ui-badge>
              <ui-badge size="lg" value="Large"></ui-badge>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
              <ui-badge shape="square" value="Square"></ui-badge>
              <ui-badge shape="circle" value="9"></ui-badge>
              <ui-badge shape="default" value="Pill Default"></ui-badge>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="positioning"
          title="Position & Offset"
          description="Place the badge on any corner, and precisely adjust via X/Y offsets."
          [code]="positioningCode"
        >
          <div style="display: flex; gap: 32px; align-items: center;">
            <ui-badge value="1" position="top-right">
              <div class="box" style="width: 40px; height: 40px; background: var(--ui-surface-secondary); border-radius: 4px;"></div>
            </ui-badge>
            <ui-badge value="2" position="top-right" [attr.offset-x]="-10" [attr.offset-y]="10">
              <div class="box" style="width: 40px; height: 40px; background: var(--ui-surface-secondary); border-radius: 4px;"></div>
            </ui-badge>
            <ui-badge value="3" position="bottom-left">
              <div class="box" style="width: 40px; height: 40px; background: var(--ui-surface-secondary); border-radius: 4px;"></div>
            </ui-badge>
          </div>
        </pg-example-section>

        <pg-example-section
          id="animations"
          title="Animations & Glow"
          description="Catch the user's attention with CSS animations and dropshadow/glow effects."
          [code]="animationsCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
            <ui-badge value="Alert" animation="pulse" color="danger"></ui-badge>
            <ui-badge value="New" animation="bounce" color="primary"></ui-badge>
            <ui-badge value="Error" animation="shake" color="warning"></ui-badge>
            <div style="padding: 16px; background: #1e293b; border-radius: 8px;">
              <ui-badge value="Glowing" glow color="success"></ui-badge>
            </div>
          </div>
        </pg-example-section>

        <pg-example-section
          id="interactive"
          title="Interactive & Icons"
          description="Make them clickable, removable, or embed icons."
          [code]="interactiveCode"
        >
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
            <ui-badge value="Click Me" interactive (badgeClick)="handleBadgeClick()"></ui-badge>
            <ui-badge value="Removable" closeable (badgeClose)="handleBadgeClose()"></ui-badge>
            <ui-badge value="Approved" icon="check" icon-library="lucide" color="success"></ui-badge>
          </div>
        </pg-example-section>

      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="badge"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
