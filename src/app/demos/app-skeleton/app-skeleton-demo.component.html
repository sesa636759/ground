<div class="demo-container">
  <app-demo-header
    icon="💀"
    title="Skeleton"
    description="Animated placeholder loaders that mimic content layout while data is being fetched — reducing perceived load time."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-skeleton-playground></app-skeleton-playground>
    </div>

    <div slot="examples" class="examples-split-layout">
      <aside class="examples-sidebar">
        <div class="sidebar-title">Sections</div>
        <div class="sidebar-nav">
          <ui-anchor
            [links]="anchorLinks"
            scroll-container=".pane-examples"
            type="line"
            show-progress
          ></ui-anchor>
        </div>
      </aside>

      <div class="examples-content">
        <!-- Shapes & Animations -->
        <app-example-section
          id="shapes"
          title="Shapes & Animations"
          description="Circle, text, and rectangle shapes with wave and pulse animations"
          [code]="shapesCode"
        >
          <div style="display: flex; flex-direction: column; gap: 16px; width: 100%">
            <div style="display: flex; align-items: center; gap: 12px">
              <ui-skeleton shape="circle" width="48px" height="48px"></ui-skeleton>
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
                <ui-skeleton shape="text" width="60%"></ui-skeleton>
                <ui-skeleton shape="text" width="40%"></ui-skeleton>
              </div>
            </div>
            <ui-skeleton
              shape="rectangle"
              width="100%"
              height="100px"
              animation="wave"
            ></ui-skeleton>
            <ui-skeleton
              shape="rectangle"
              width="100%"
              height="16px"
              animation="pulse"
            ></ui-skeleton>
          </div>
        </app-example-section>

        <!-- Card Layout -->
        <app-example-section
          id="card-layout"
          title="Card Layout"
          description="Skeleton placeholder for a media card with thumbnail and text"
          [code]="cardLayoutCode"
        >
          <div
            style="
              display: flex;
              gap: 12px;
              padding: 16px;
              border: 1px solid var(--color-border);
              border-radius: 8px;
              width: 100%;
            "
          >
            <ui-skeleton shape="rectangle" width="80px" height="80px"></ui-skeleton>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
              <ui-skeleton shape="text" width="70%" height="18px"></ui-skeleton>
              <ui-skeleton shape="text" width="40%" height="14px"></ui-skeleton>
              <ui-skeleton shape="text" width="55%" height="14px"></ui-skeleton>
            </div>
          </div>
        </app-example-section>

        <!-- List Layout -->
        <app-example-section
          id="list-layout"
          title="List Layout"
          description="Row-by-row skeleton for list or feed views"
          [code]="listLayoutCode"
        >
          <div style="display: flex; flex-direction: column; gap: 12px; width: 100%">
            @for (item of [1, 2, 3]; track item) {
              <div style="display: flex; align-items: center; gap: 12px">
                <ui-skeleton shape="circle" width="40px" height="40px"></ui-skeleton>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 6px">
                  <ui-skeleton shape="text" width="50%" height="14px"></ui-skeleton>
                  <ui-skeleton shape="text" width="30%" height="12px"></ui-skeleton>
                </div>
              </div>
            }
          </div>
        </app-example-section>

        <!-- Profile Layout -->
        <app-example-section
          id="profile-layout"
          title="Profile Layout"
          description="Centered skeleton for user profiles and account pages"
          [code]="profileLayoutCode"
        >
          <div style="text-align: center; padding: 24px; width: 100%">
            <ui-skeleton
              shape="circle"
              width="80px"
              height="80px"
              style="margin: 0 auto"
            ></ui-skeleton>
            <ui-skeleton
              shape="text"
              width="120px"
              height="20px"
              style="margin: 12px auto 0"
            ></ui-skeleton>
            <ui-skeleton
              shape="text"
              width="80px"
              height="14px"
              style="margin: 8px auto 0"
            ></ui-skeleton>
            <ui-skeleton
              shape="rectangle"
              width="100%"
              height="48px"
              style="margin-top: 16px; border-radius: 8px"
            ></ui-skeleton>
          </div>
        </app-example-section>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="skeleton"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
