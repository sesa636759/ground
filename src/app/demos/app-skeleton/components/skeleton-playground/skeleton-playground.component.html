<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-appearance" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="cfg.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOpts"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Animation Type</label>
      <ui-dropdown
        [(ngModel)]="cfg.animationType"
        (ngModelChange)="updateConfig()"
        [options]="animTypeOpts"
      ></ui-dropdown>
    </div>

    <div class="control-group">
      <label>Animated</label>
      <ui-dropdown
        [(ngModel)]="cfg.animated"
        (ngModelChange)="updateConfig()"
        [options]="boolOpts"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-sizing" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Size (Predefined)</label>
      <ui-dropdown
        [(ngModel)]="cfg.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOpts"
      ></ui-dropdown>
      <span class="control-hint">Overrides width/height for most shapes</span>
    </div>

    <div class="control-group">
      <label>Width</label>
      <ui-input
        type="text"
        [(ngModel)]="cfg.width"
        (ngModelChange)="updateConfig()"
        placeholder="100%"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Height</label>
      <ui-input
        type="text"
        [(ngModel)]="cfg.height"
        (ngModelChange)="updateConfig()"
        placeholder="20px"
      ></ui-input>
    </div>

    <div class="control-group">
      <label>Border Radius</label>
      <ui-input
        type="text"
        [(ngModel)]="cfg.borderRadius"
        (ngModelChange)="updateConfig()"
        placeholder="4px"
      ></ui-input>
    </div>
  </div>

  <div
    preview
    class="preview-stage h-scrollable"
    style="padding: 40px; display: flex; justify-content: center; align-items: center"
  >
    <div style="width: 100%; display: flex; justify-content: center">
      @if (recreate) {
        <skeleton-loader
          [attr.shape]="cfg.shape"
          [attr.animation-type]="cfg.animationType"
          [attr.animated]="cfg.animated"
          [attr.size]="cfg.size !== 'custom' ? cfg.size : null"
          [attr.width]="cfg.size === 'custom' ? cfg.width : null"
          [attr.height]="cfg.size === 'custom' ? cfg.height : null"
          [attr.border-radius]="cfg.borderRadius || null"
        ></skeleton-loader>
      } @else {
        <skeleton-loader
          [attr.shape]="cfg.shape"
          [attr.animation-type]="cfg.animationType"
          [attr.animated]="cfg.animated"
          [attr.size]="cfg.size !== 'custom' ? cfg.size : null"
          [attr.width]="cfg.size === 'custom' ? cfg.width : null"
          [attr.height]="cfg.size === 'custom' ? cfg.height : null"
          [attr.border-radius]="cfg.borderRadius || null"
        ></skeleton-loader>
      }
    </div>
  </div>
</app-playground>
