<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Orientation</label>
        <select [(ngModel)]="pgConfig.orientation" (change)="updateConfig()">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="pills">Pills</option>
          <option value="underline">Underline</option>
          <option value="enclosed">Enclosed</option>
          <option value="buttons">Buttons</option>
        </select>
      </div>

      <div class="control-group">
        <label>Size</label>
        <select [(ngModel)]="pgConfig.size" (change)="updateConfig()">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>

      <div class="control-group">
        <label>Color</label>
        <select [(ngModel)]="pgConfig.color" (change)="updateConfig()">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="success">Success</option>
          <option value="danger">Danger</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>
      </div>

      <div class="control-group">
        <label>Align</label>
        <select [(ngModel)]="pgConfig.align" (change)="updateConfig()">
          <option value="start">Start</option>
          <option value="center">Center</option>
          <option value="end">End</option>
          <option value="stretch">Stretch</option>
        </select>
      </div>

      <div class="control-group">
        <label>Indicator Pos</label>
        <select [(ngModel)]="pgConfig.indicatorPosition" (change)="updateConfig()">
          <option value="bottom">Bottom</option>
          <option value="top">Top</option>
        </select>
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.fullWidth" (change)="updateConfig()" /> Full
        Width
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.scrollable" (change)="updateConfig()" />
        Scrollable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showAddButton" (change)="updateConfig()" /> Add
        Btn
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.closable" (change)="updateConfig()" /> Closable
      </label>
      <label class="checkbox-item">
        <input
          type="checkbox"
          [(ngModel)]="pgConfig.showCloseAllButton"
          (change)="updateConfig()"
        />
        Close All
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.editableLabels" (change)="updateConfig()" />
        Editable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.dragEnabled" (change)="updateConfig()" /> Drag
      </label>
      <label class="checkbox-item">
        <input
          type="checkbox"
          [(ngModel)]="pgConfig.showOverflowButton"
          (change)="updateConfig()"
        />
        Overflow
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage" [style.height]="pgConfig.orientation === 'vertical' ? '400px' : ''">
      <app-tab-stack
        [attr.orientation]="pgConfig.orientation"
        [attr.variant]="pgConfig.variant"
        [attr.size]="pgConfig.size"
        [attr.color]="pgConfig.color"
        [attr.align]="pgConfig.align"
        [attr.indicator-position]="pgConfig.indicatorPosition"
        [fullWidth]="pgConfig.fullWidth"
        [scrollable]="pgConfig.scrollable"
        [showAddButton]="pgConfig.showAddButton"
        [animated]="pgConfig.animated"
        [closable]="pgConfig.closable"
        [showCloseAllButton]="pgConfig.showCloseAllButton"
        [editableLabels]="pgConfig.editableLabels"
        [dragEnabled]="pgConfig.dragEnabled"
        [showOverflowButton]="pgConfig.showOverflowButton"
        active-tab="tab1"
        (tabChange)="onTabChange($event)"
        (tabAdd)="onTabAdd()"
        (tabRemove)="onTabRemove($event)"
        style="width: 100%"
      >
        <app-tab
          *ngFor="let tab of tabs"
          [attr.label]="tab.label"
          [attr.value]="tab.value"
          [attr.icon]="tab.icon"
          [attr.badge]="tab.badge"
          [attr.badge-color]="tab.badgeColor"
          [closable]="pgConfig.closable"
        >
          <div style="padding: 40px; text-align: center">
            <i [class]="tab.icon" style="font-size: 3rem; color: var(--primary); opacity: 0.2"></i>
            <h3 style="margin-top: 20px">{{ tab.label }} Content</h3>
            <p style="color: var(--text-tertiary)">
              This is the view for <strong>{{ tab.value }}</strong
              >. You can drag tabs to reorder them if enabled.
            </p>
          </div>
        </app-tab>
      </app-tab-stack>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
