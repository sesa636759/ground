<app-demo-header
  icon="🗂️"
  title="Tab Stack Component"
  description="A flexible tabbed navigation component supporting multiple orientations, variants, and interactive features."
>
</app-demo-header>

<demo-tabs>
  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Horizontal Basic -->
      <app-example-section
        id="horizontal-basic"
        title="Horizontal Basic"
        description="A standard horizontal tab layout."
        [code]="horizontalBasicCode"
        style="margin-top: 0"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <app-tab-stack orientation="horizontal" active-tab="t1">
              <app-tab label="Overview" value="t1">Overview Content</app-tab>
              <app-tab label="Documents" value="t2">Documents Content</app-tab>
              <app-tab label="Settings" value="t3">Settings Content</app-tab>
            </app-tab-stack>
          </div>
        </div>
      </app-example-section>

      <!-- Vertical Basic -->
      <app-example-section
        id="vertical-basic"
        title="Vertical Basic"
        description="A standard vertical tab layout."
        [code]="verticalBasicCode"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <app-tab-stack orientation="vertical" active-tab="t1">
              <app-tab label="Configuration" value="t1">Config Content</app-tab>
              <app-tab label="Security" value="t2">Security Content</app-tab>
              <app-tab label="Cloud" value="t3">Cloud Content</app-tab>
            </app-tab-stack>
          </div>
        </div>
      </app-example-section>

      <!-- Visual Variants -->
      <app-example-section
        id="variants"
        title="Visual Variants"
        description="Different tab styles including underline and pills."
        [code]="variantCode"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <h3>Default</h3>
            <app-tab-stack variant="default" active-tab="t1">
              <app-tab label="Tab 1" value="t1">Content 1</app-tab>
              <app-tab label="Tab 2" value="t2">Content 2</app-tab>
            </app-tab-stack>
          </div>
          <div class="demo-card">
            <h3>Underline</h3>
            <app-tab-stack variant="underline" active-tab="t1">
              <app-tab label="Tab 1" value="t1">Content 1</app-tab>
              <app-tab label="Tab 2" value="t2">Content 2</app-tab>
            </app-tab-stack>
          </div>
          <div class="demo-card">
            <h3>Pills</h3>
            <app-tab-stack variant="pills" active-tab="t1" color="success">
              <app-tab label="Active" value="t1">Active Content</app-tab>
              <app-tab label="Completed" value="t2">Completed Content</app-tab>
            </app-tab-stack>
          </div>
        </div>
      </app-example-section>

      <!-- Layout Features -->
      <app-example-section
        id="layout-features"
        title="Layout & Features"
        description="Full width, scrollable, and icons."
        [code]="layoutCode"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <h3>Icons & Badges</h3>
            <app-tab-stack active-tab="t1">
              <app-tab label="Home" value="t1" icon="fas fa-home">Home</app-tab>
              <app-tab label="Messages" value="t3" badge="5" badge-color="danger">Messages</app-tab>
            </app-tab-stack>
          </div>
        </div>
      </app-example-section>

      <!-- Advanced UX -->
      <app-example-section
        id="advanced-ux"
        title="Advanced UX"
        description="Closable, animated, and more."
        [code]="advancedCode"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <app-tab-stack closable animated show-add-button active-tab="t1">
              <app-tab label="Tab 1" value="t1">C1</app-tab>
              <app-tab label="Tab 2" value="t2">C2</app-tab>
            </app-tab-stack>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Playground Slot -->
  <div slot="playground">
    <app-tabs-playground></app-tabs-playground>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="tabs"></app-component-documentation>
  </div>
</demo-tabs>
