<div class="demo-container">
  <app-demo-header
    icon="🃏"
    title="Card Component"
    description="Cards contain content and actions about a single subject. They are versatile containers that can handle images, headers, content, and footers."
  >
  </app-demo-header>

  <demo-tabs>
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <app-card-examples></app-card-examples>
      </div>
    </div>

    <!-- Playground Slot -->
    <div slot="playground">
      <app-card-playground></app-card-playground>
    </div>

    <!-- Documentation Slot -->
    <div slot="docs">
      <app-component-documentation></app-component-documentation>
    </div>
  </demo-tabs>
</div>
