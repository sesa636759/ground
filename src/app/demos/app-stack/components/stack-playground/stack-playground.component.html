<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Layout -->
      <div class="control-section">
        <h3>Layout</h3>
        <div class="control-group">
          <label>Direction</label>
          <ui-dropdown
            name="direction"
            [(ngModel)]="pgConfig.direction"
            (ngModelChange)="updateConfig()"
            [options]="directionOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Spacing</label>
          <app-input
            name="spacing"
            type="text"
            [(ngModel)]="pgConfig.spacing"
            (ngModelChange)="updateConfig()"
            placeholder="e.g. 16px, -10px"
          ></app-input>
        </div>
        <div class="control-group">
          <label>Align</label>
          <ui-dropdown
            name="align"
            [(ngModel)]="pgConfig.align"
            (ngModelChange)="updateConfig()"
            [options]="alignOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Justify</label>
          <ui-dropdown
            name="justify"
            [(ngModel)]="pgConfig.justify"
            (ngModelChange)="updateConfig()"
            [options]="justifyOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Behavior -->
      <div class="control-section">
        <h3>Behavior</h3>
        <div class="control-group">
          <label>Max Items (0 = all)</label>
          <app-input
            name="max"
            type="number"
            [(ngModel)]="pgConfig.max"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="overlap"
            name="overlap"
            [(ngModel)]="pgConfig.overlap"
            (ngModelChange)="updateConfig()"
            label="Overlap"
          ></app-checkbox>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="showDividers"
            name="showDividers"
            [(ngModel)]="pgConfig.showDividers"
            (ngModelChange)="updateConfig()"
            label="Show Dividers"
          ></app-checkbox>
        </div>
      </div>

      <div class="control-section">
        <h3>Content</h3>
        <div class="control-group">
          <label>Num Boxes</label>
          <app-input
            name="numBoxes"
            type="number"
            min="1"
            max="10"
            [(ngModel)]="numBoxes"
            (ngModelChange)="updateConfig()"
          ></app-input>
        </div>
      </div>
    </div>
  </div>

  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <ui-stack
      #stack
      [attr.direction]="pgConfig.direction"
      [attr.spacing]="pgConfig.spacing"
      [attr.align]="pgConfig.align"
      [attr.justify]="pgConfig.justify"
      [attr.max]="pgConfig.max"
      [attr.overlap]="pgConfig.overlap ? '' : null"
      [attr.show-dividers]="pgConfig.showDividers ? '' : null"
      style="width: 100%"
    >
      <div *ngFor="let i of boxes" class="box box-{{ i }}">{{ i }}</div>
    </ui-stack>
  </div>
</app-playground>
