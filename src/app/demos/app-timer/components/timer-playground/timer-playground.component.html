
    <app-playground accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]' defaultOpen='["config"]'>
      <div slot="content-config">
        <div class="control-grid">
          <div class="control-section">
            <h3 class="section-title">
              <ui-icon name="cog" library="fontawesome"></ui-icon>
              Configuration
            </h3>
            <div class="control-group">
              <label>Initial Duration (s)</label>
              <app-input
                type="number"
                [(ngModel)]="pgConfig.duration"
                (ngModelChange)="updateConfig()"
              ></app-input>
            </div>
            <div class="control-group">
              <label>Mode</label>
              <ui-dropdown
                [(ngModel)]="pgConfig.mode"
                (ngModelChange)="updateConfig()"
                [options]="modeOptions"
              ></ui-dropdown>
            </div>
          </div>

          <div class="control-section">
            <h3 class="section-title">
              <ui-icon name="palette" library="fontawesome"></ui-icon>
              Visuals
            </h3>
            <div class="control-group">
              <label>Format</label>
              <ui-dropdown
                [(ngModel)]="pgConfig.format"
                (ngModelChange)="updateConfig()"
                [options]="formatOptions"
              ></ui-dropdown>
            </div>
            <div class="checkbox-group">
              <app-checkbox
                id="autoStart"
                [(ngModel)]="pgConfig.autoStart"
                (ngModelChange)="updateConfig()"
                label="Auto Start"
              ></app-checkbox>
            </div>
          </div>
        </div>

        

        <div class="action-buttons">
          <ui-button (click)="copyCode()" variant="primary" label="Copy Implementation"></ui-button>
          <ui-button
            variant="ghost"
            (click)="resetConfig()"
            label="Reset Configuration"
          ></ui-button>
        </div>
      </div>
      <div preview style="width: 100%; display: flex; justify-content: center; align-items: center;">
        <div class="timer-preview-card">
          <ui-timer
            #timerEl
            [duration]="pgConfig.duration"
            [mode]="pgConfig.mode"
            [format]="pgConfig.format"
            [autoStart]="pgConfig.autoStart"
          ></ui-timer>

          <div class="timer-actions">
            <ui-button
              class="action-btn"
              variant="primary"
              (click)="timerStart(timerEl)"
              label="Start"
            ></ui-button>
            <ui-button
              class="action-btn"
              variant="secondary"
              (click)="timerPause(timerEl)"
              label="Pause"
            ></ui-button>
            <ui-button
              class="action-btn"
              variant="ghost"
              (click)="timerReset(timerEl)"
              label="Reset Timer"
            ></ui-button>
          </div>
        </div>
      
      <ui-code-preview
            *ngIf="showCode"
            [htmlCode]="generatedCode()"
            label="Generated Code"
            activeLang="html"
            expanded="true"
          ></ui-code-preview>
    </app-playground>
