<div class="demo-container">
  <app-demo-header
    icon="📈"
    title="Chart"
    description="A flexible, multi-purpose chart component supporting various visualization types including line, bar, pie, and doughnut charts. Built for responsive layouts with customizable legends and styling."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-chart-playground></app-chart-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Chart Types -->
          <section class="demo-section" id="types" style="margin-top: 0">
            <div class="section-header">
              <h2>📈 Chart Types</h2>
              <p>Choose from multiple visualization types to best represent your data.</p>
            </div>
            <div class="demo-card">
              <div style="height: 300px">
                <ui-chart type="line" [data]="chartData" show-legend responsive></ui-chart>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="typesCode"
              [label]="'Type Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

        <div slot="docs">
      <app-component-documentation componentId="app-chart"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
