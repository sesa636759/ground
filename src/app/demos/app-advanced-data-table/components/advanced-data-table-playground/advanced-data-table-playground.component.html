<app-playground
  items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-section">
        <h3>Features</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="paginator"
            [(ngModel)]="pgConfig.paginator"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          <label for="paginator">Enable Paginator</label>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="sorting"
            [(ngModel)]="pgConfig.sorting"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          <label for="sorting">Enable Sorting</label>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="filtering"
            [(ngModel)]="pgConfig.filtering"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          <label for="filtering">Global Filtering</label>
        </div>
      </div>

      <div class="control-section">
        <h3>Layout</h3>
        <div class="control-group">
          <label>Rows per page</label>
          <ui-input
            type="number"
            [(ngModel)]="pgConfig.rows"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="responsive"
            [(ngModel)]="pgConfig.responsive"
            (ngModelChange)="updateConfig()"
          ></ui-checkbox>
          <label for="responsive">Responsive Layout</label>
        </div>
      </div>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <div class="table-container" style="width: 100%">
      <ui-advanced-data-table
        [attr.paginator]="pgConfig.paginator ? '' : null"
        [attr.rows]="pgConfig.rows"
        [attr.responsive]="pgConfig.responsive ? '' : null"
        [value]="dataJson"
        [columns]="columnsJson"
      >
      </ui-advanced-data-table>
    </div>
  </div>
</app-playground>
