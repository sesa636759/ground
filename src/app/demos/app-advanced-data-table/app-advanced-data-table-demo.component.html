<div class="demo-container">
  <app-demo-header
    icon="📊"
    title="Advanced Data Table"
    description="A high-performance grid component designed for rendering large datasets. It includes out-of-the-box support for pagination, sorting, global/individual column filtering, cell selection, and custom row templates."
  ></app-demo-header>

  <demo-tabs>
    <div slot="playground">
      <app-advanced-data-table-playground></app-advanced-data-table-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Key Features -->
          <section class="demo-section" id="features" style="margin-top: 0">
            <div class="section-header">
              <h2>💎 Key Features</h2>
              <p>Data Table provides rich API for managing complex data interactions.</p>
            </div>
            <div class="demo-card">
              <ui-advanced-data-table
                [value]="sampleData"
                [columns]="sampleCols"
                [paginator]="false"
              >
              </ui-advanced-data-table>
            </div>
            <ui-code-preview
              [htmlCode]="featuresCode"
              [label]="'Configuration Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="advanced-data-table"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
