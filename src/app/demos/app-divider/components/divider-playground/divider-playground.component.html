<app-playground
  items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Content -->
      <div class="control-section">
        <h3>Content</h3>
        <div class="control-group">
          <label>Text</label>
          <ui-input
            name="text"
            type="text"
            [(ngModel)]="pgConfig.text"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Icon</label>
          <ui-input
            name="icon"
            type="text"
            [(ngModel)]="pgConfig.icon"
            (ngModelChange)="updateConfig()"
            placeholder="e.g. ⭐"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Badge</label>
          <ui-input
            name="badge"
            type="text"
            [(ngModel)]="pgConfig.badge"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
      </div>

      <!-- Line Style -->
      <div class="control-section">
        <h3>Line Style</h3>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            name="variant"
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            name="size"
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Orientation</label>
          <ui-dropdown
            name="orientation"
            [(ngModel)]="pgConfig.orientation"
            (ngModelChange)="updateConfig()"
            [options]="orientationOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Special -->
      <div class="control-section">
        <h3>Special</h3>
        <div class="control-group">
          <label>Pattern</label>
          <ui-dropdown
            name="pattern"
            [(ngModel)]="pgConfig.pattern"
            (ngModelChange)="updateConfig()"
            [options]="patternOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Shape</label>
          <ui-dropdown
            name="shape"
            [(ngModel)]="pgConfig.shape"
            (ngModelChange)="updateConfig()"
            [options]="shapeOptions"
          ></ui-dropdown>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="loading"
            name="loading"
            [(ngModel)]="pgConfig.loading"
            (ngModelChange)="updateConfig()"
            label="Loading"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    [class.vertical-container]="pgConfig.orientation === 'vertical'"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div *ngIf="pgConfig.orientation === 'vertical'">Panel Start</div>
    <ui-divider
      #divider
      [attr.text]="pgConfig.text"
      [attr.icon]="pgConfig.icon"
      [attr.badge]="pgConfig.badge"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.orientation]="pgConfig.orientation"
      [attr.pattern]="pgConfig.pattern"
      [attr.shape]="pgConfig.shape"
      [attr.loading]="pgConfig.loading ? '' : null"
    ></ui-divider>
    <div *ngIf="pgConfig.orientation === 'vertical'">Panel End</div>
  </div>
</app-playground>
