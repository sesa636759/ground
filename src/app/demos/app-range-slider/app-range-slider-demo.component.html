<div class="demo-container">
  <pg-demo-header
    icon="↔️"
    title="Range Slider"
    description="An interactive control for selecting a single value or a range between two bounds. Supports custom steps, tooltips, and vertical orientation."
  ></pg-demo-header>

  <pg-demo-tabs>
    <div slot="playground">
      <app-range-slider-playground></app-range-slider-playground>
    </div>

    <div slot="examples">
      <div class="examples-split-layout">
        <!-- Sidebar Navigation -->
        <pg-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></pg-demo-sidebar>

        <!-- Main Content Area -->
        <div class="examples-content">
          <!-- Slider Modes -->
          <section class="demo-section" id="modes" style="margin-top: 0">
            <div class="section-header">
              <h2>↔️ Slider Modes</h2>
              <p>Switch between single point selection and range selection.</p>
            </div>
            <div class="demo-card">
              <div class="slider-preview">
                <span>Single Selection:</span>
                <ui-range-slider [value]="45" [min]="0" [max]="100" show-value></ui-range-slider>
              </div>
              <div class="slider-preview">
                <span>Range Selection:</span>
                <ui-range-slider
                  range
                  [value]="[25, 75]"
                  [min]="0"
                  [max]="100"
                  show-value
                ></ui-range-slider>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="modesCode"
              [label]="'Mode Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>

          <!-- Layouts & Constraints -->
          <section class="demo-section" id="layouts">
            <div class="section-header">
              <h2>📐 Layouts & Constraints</h2>
              <p>Adjust orientation and stepping behavior.</p>
            </div>
            <div class="demo-card" style="flex-direction: row; justify-content: space-around">
              <div style="display: flex; flex-direction: column; align-items: center; gap: 20px">
                <span>Vertical:</span>
                <div style="height: 200px">
                  <ui-range-slider orientation="vertical" [value]="60" show-value></ui-range-slider>
                </div>
              </div>
              <div class="slider-preview" style="justify-content: center">
                <span>Discrete Steps (10 units):</span>
                <ui-range-slider
                  [step]="10"
                  [min]="0"
                  [max]="100"
                  [value]="30"
                  show-value
                ></ui-range-slider>
              </div>
            </div>
            <ui-code-preview
              [htmlCode]="layoutsCode"
              [label]="'Layout Examples'"
              activeLang="html"
              expanded="true"
            ></ui-code-preview>
          </section>
        </div>
      </div>
    </div>

    <div slot="docs">
      <pg-component-documentation componentId="range-slider"></pg-component-documentation>
    </div>
  </pg-demo-tabs>
</div>
