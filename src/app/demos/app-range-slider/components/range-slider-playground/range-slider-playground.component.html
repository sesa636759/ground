<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Min</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.min"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Max</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.max"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Step</label>
      <app-input
        type="number"
        [(ngModel)]="pgConfig.step"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Orientation</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.orientation"
        (ngModelChange)="updateConfig()"
        [options]="orientationOptions"
      ></ui-dropdown>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.range" (ngModelChange)="updateConfig()"></app-checkbox>
        Range Mode (Dual)
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.showValue"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Show Tooltip
      </label>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    "
  >
    <div
      class="slider-container"
      [style.height]="pgConfig.orientation === 'vertical' ? '250px' : 'auto'"
      [style.width]="'100%'"
    >
      <ui-range-slider
        [attr.min]="pgConfig.min"
        [attr.max]="pgConfig.max"
        [attr.step]="pgConfig.step"
        [attr.orientation]="pgConfig.orientation"
        [attr.range]="pgConfig.range ? '' : null"
        [attr.show-value]="pgConfig.showValue ? '' : null"
        [value]="currentValue"
        (rangeChange)="onValueChange($event)"
      ></ui-range-slider>
    </div>
    <div style="margin-top: 24px; font-weight: 600; color: var(--text-primary)">
      Current Value: {{ currentValue | json }}
    </div>
  </div>
</app-playground>
