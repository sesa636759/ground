<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (change)="updateConfig()"
          [options]="[
            { label: 'Dark (VS Code)', value: 'vs-dark' },
            { label: 'Light (VS Code)', value: 'vs-light' },
            { label: 'High Contrast', value: 'hc-black' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Language</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.language"
          (change)="onLanguageChange()"
          [options]="[
            { label: 'JavaScript', value: 'javascript' },
            { label: 'HTML', value: 'html' },
            { label: 'CSS', value: 'css' },
            { label: 'JSON', value: 'json' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Display</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelDisplay"
          (change)="updateConfig()"
          [options]="[
            { label: 'Always', value: 'always' },
            { label: 'Hover', value: 'hover' },
            { label: 'Hidden', value: 'hidden' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Height</label>
        <app-input
          type="text"
          [(ngModel)]="pgConfig.height"
          (change)="updateConfig()"
          placeholder="400px"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.toolbar" (change)="updateConfig()" /> Show Toolbar
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.lineNumbers" (change)="updateConfig()" /> Line Numbers
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Read Only
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="editor-container">
        <app-code-editor
          [attr.theme]="pgConfig.theme"
          [attr.language]="pgConfig.language"
          [attr.height]="pgConfig.height"
          [attr.line-numbers]="pgConfig.lineNumbers"
          [attr.toolbar]="pgConfig.toolbar"
          [attr.readonly]="pgConfig.readonly"
          [attr.toolbar-label-display]="pgConfig.labelDisplay"
          [value]="currentCode"
          (valueChange)="onValueChange($event)"
          (runCode)="onRunCode($event)"
        ></app-code-editor>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button
          class="copy-btn"
          variant="secondary"
          size="sm"
          (click)="copyCode()"
          label="Copy"
        ></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
