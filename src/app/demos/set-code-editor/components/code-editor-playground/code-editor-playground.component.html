<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Theme</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.theme"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Dark (VS Code)', value: 'vs-dark' },
            { label: 'Light (VS Code)', value: 'vs-light' },
            { label: 'High Contrast', value: 'hc-black' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Language</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.language"
          (change)="onLanguageChange()"
          [options]="[
            { label: 'JavaScript', value: 'javascript' },
            { label: 'HTML', value: 'html' },
            { label: 'CSS', value: 'css' },
            { label: 'JSON', value: 'json' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Label Display</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.labelDisplay"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Always', value: 'always' },
            { label: 'Hover', value: 'hover' },
            { label: 'Hidden', value: 'hidden' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Height</label>
        <ui-input
          type="text"
          [(ngModel)]="pgConfig.height"
          (ngModelChange)="updateConfig()"
          placeholder="400px"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.toolbar" (ngModelChange)="updateConfig()" /> Show Toolbar
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.lineNumbers" (ngModelChange)="updateConfig()" /> Line
        Numbers
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.readonly" (ngModelChange)="updateConfig()" /> Read Only
      </label>
    </div>
  </div>

  <div preview class="preview-stage h-scrollable">
    <div class="editor-container" style="width: 100%">
      <app-code-editor
        [attr.theme]="pgConfig.theme"
        [attr.language]="pgConfig.language"
        [attr.height]="pgConfig.height"
        [attr.line-numbers]="pgConfig.lineNumbers"
        [attr.toolbar]="pgConfig.toolbar"
        [attr.readonly]="pgConfig.readonly"
        [attr.toolbar-label-display]="pgConfig.labelDisplay"
        [value]="currentCode"
        (valueChange)="onValueChange($event)"
        (runCode)="onRunCode($event)"
      ></app-code-editor>
    </div>
  </div>

  <app-playground-event-log
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>

  <ui-code-preview
    code
    [htmlCode]="generatedCode()"
    [label]="'Generated Code'"
    activeLang="html"
    expanded="true"
  ></ui-code-preview>
</app-playground>
