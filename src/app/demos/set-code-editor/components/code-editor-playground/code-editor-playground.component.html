<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Theme</label>
        <select [(ngModel)]="pgConfig.theme" (change)="updateConfig()">
          <option value="vs-dark">Dark (VS Code)</option>
          <option value="vs-light">Light (VS Code)</option>
          <option value="hc-black">High Contrast</option>
        </select>
      </div>

      <div class="control-group">
        <label>Language</label>
        <select [(ngModel)]="pgConfig.language" (change)="onLanguageChange()">
          <option value="javascript">JavaScript</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="json">JSON</option>
        </select>
      </div>

      <div class="control-group">
        <label>Label Display</label>
        <select [(ngModel)]="pgConfig.labelDisplay" (change)="updateConfig()">
          <option value="always">Always</option>
          <option value="hover">Hover</option>
          <option value="hidden">Hidden</option>
        </select>
      </div>

      <div class="control-group">
        <label>Height</label>
        <input
          type="text"
          [(ngModel)]="pgConfig.height"
          (change)="updateConfig()"
          placeholder="400px"
        />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.toolbar" (change)="updateConfig()" /> Show
        Toolbar
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.lineNumbers" (change)="updateConfig()" /> Line
        Numbers
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.readonly" (change)="updateConfig()" /> Read
        Only
      </label>
    </div>
  </div>

  <div class="playground-preview">
    <div class="event-log-container">
      <strong>Event Log</strong>
      <div class="log-items">
        <div *ngFor="let log of eventLog()" class="log-item">{{ log }}</div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="editor-container">
        <app-code-editor
          [attr.theme]="pgConfig.theme"
          [attr.language]="pgConfig.language"
          [attr.height]="pgConfig.height"
          [attr.line-numbers]="pgConfig.lineNumbers"
          [attr.toolbar]="pgConfig.toolbar"
          [attr.readonly]="pgConfig.readonly"
          [attr.toolbar-label-display]="pgConfig.labelDisplay"
          [value]="currentCode"
          (valueChange)="onValueChange($event)"
          (runCode)="onRunCode($event)"
        ></app-code-editor>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
