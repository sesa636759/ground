<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Trigger</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.trigger"
          (change)="updateConfig()"
          [options]="[
            { label: 'Right Click', value: 'rightClick' },
            { label: 'Click', value: 'click' },
            { label: 'Hover', value: 'hover' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Animation Type</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.animationType"
          (change)="updateConfig()"
          [options]="[
            { label: 'Slide', value: 'slide' },
            { label: 'Zoom', value: 'zoom' },
            { label: 'Fade', value: 'fade' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (change)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>

      <div class="control-group">
        <label>Min Width</label>
        <app-input type="text" [(ngModel)]="pgConfig.minWidth" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Max Height</label>
        <app-input type="text" [(ngModel)]="pgConfig.maxHeight" (input)="updateConfig()" />
      </div>

      <div class="control-group">
        <label>Backdrop Blur</label>
        <app-input type="text" [(ngModel)]="pgConfig.backdropBlur" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.searchable" (change)="updateConfig()" />
        Searchable
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.staggered" (change)="updateConfig()" />
        Staggered
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.backdrop" (change)="updateConfig()" /> Backdrop
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.commandPalette" (change)="updateConfig()" />
        Palette Mode
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.showGroups" (change)="updateConfig()" /> Groups
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.closeOnSelect" (change)="updateConfig()" />
        Close On Select
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.reflection" (change)="updateConfig()" />
        Reflection
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.highlightSearch" (change)="updateConfig()" />
        Highlight Search
      </label>
      <label class="checkbox-item">
        <app-checkbox [(ngModel)]="pgConfig.keyboardNavigation" (change)="updateConfig()" />
        Keyboard Navigation
      </label>
    </div>
  </div>

  <div class="playground-preview" [class.glass-bg]="pgConfig.variant === 'glass'">
    <div class="preview-stage">
      <div
        class="trigger-area"
        id="playgroundTrigger"
        [style.cursor]="pgConfig.trigger === 'hover' ? 'pointer' : 'default'"
      >
        <ui-button
          class="btn-demo"
          *ngIf="pgConfig.trigger === 'click'"
          label="Open Menu"
        ></ui-button>
        <span *ngIf="pgConfig.trigger === 'rightClick'">Right-click anywhere here</span>
        <span *ngIf="pgConfig.trigger === 'hover'">Hover here</span>
      </div>

      <app-context-menu
        [attr.trigger]="pgConfig.trigger"
        [searchable]="pgConfig.searchable"
        [animated]="pgConfig.animated"
        [attr.animation-type]="pgConfig.animationType"
        [attr.variant]="pgConfig.variant"
        [staggered]="pgConfig.staggered"
        [backdrop]="pgConfig.backdrop"
        [commandPalette]="pgConfig.commandPalette"
        [multiSelect]="pgConfig.multiSelect"
        [closeOnSelect]="pgConfig.closeOnSelect"
        [showGroups]="pgConfig.showGroups"
        [highlightSearch]="pgConfig.highlightSearch"
        [reflection]="pgConfig.reflection"
        [keyboardNavigation]="pgConfig.keyboardNavigation"
        [attr.max-height]="pgConfig.maxHeight"
        [attr.min-width]="pgConfig.minWidth"
        [attr.backdrop-blur]="pgConfig.backdropBlur"
        [items]="demoItems"
        (menuSelect)="onMenuSelect($event)"
        (menuOpen)="onMenuOpen()"
        (menuClose)="onMenuClose()"
      >
      </app-context-menu>
    </div>

    <ui-code-preview
      *ngIf="showCode"
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
  </div>
</div>
