<div class="playground-layout">
  <div class="playground-controls">
    <div class="control-grid">
      <div class="control-group">
        <label>Trigger</label>
        <select [(ngModel)]="pgConfig.trigger" (change)="updateConfig()">
          <option value="rightClick">Right Click</option>
          <option value="click">Click</option>
          <option value="hover">Hover</option>
        </select>
      </div>

      <div class="control-group">
        <label>Animation Type</label>
        <select [(ngModel)]="pgConfig.animationType" (change)="updateConfig()">
          <option value="slide">Slide</option>
          <option value="zoom">Zoom</option>
          <option value="fade">Fade</option>
        </select>
      </div>

      <div class="control-group">
        <label>Variant</label>
        <select [(ngModel)]="pgConfig.variant" (change)="updateConfig()">
          <option value="default">Default</option>
          <option value="glass">Glass</option>
        </select>
      </div>

      <div class="control-group">
        <label>Min Width</label>
        <input type="text" [(ngModel)]="pgConfig.minWidth" (input)="updateConfig()" />
      </div>
    </div>

    <div class="checkbox-grid">
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.searchable" (change)="updateConfig()" />
        Searchable
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.animated" (change)="updateConfig()" /> Animated
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.staggered" (change)="updateConfig()" />
        Staggered
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.backdrop" (change)="updateConfig()" /> Backdrop
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.commandPalette" (change)="updateConfig()" />
        Palette Mode
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.multiSelect" (change)="updateConfig()" />
        Multi-Select
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.showGroups" (change)="updateConfig()" /> Groups
      </label>
      <label class="checkbox-item">
        <input type="checkbox" [(ngModel)]="pgConfig.closeOnSelect" (change)="updateConfig()" />
        Close On Select
      </label>
    </div>
  </div>

  <div class="playground-preview" [class.glass-bg]="pgConfig.variant === 'glass'">
    <div class="event-log"><strong>Event Log:</strong> {{ eventMessage() }}</div>
    <div class="preview-stage">
      <div
        class="trigger-area"
        id="playgroundTrigger"
        [style.cursor]="pgConfig.trigger === 'hover' ? 'pointer' : 'default'"
      >
        <ui-button class="btn-demo" *ngIf="pgConfig.trigger === 'click'" label="Open Menu"></ui-button>
        <span *ngIf="pgConfig.trigger === 'rightClick'">Right-click anywhere here</span>
        <span *ngIf="pgConfig.trigger === 'hover'">Hover here</span>
      </div>

      <app-context-menu
        [attr.trigger]="pgConfig.trigger"
        [searchable]="pgConfig.searchable"
        [animated]="pgConfig.animated"
        [attr.animation-type]="pgConfig.animationType"
        [attr.variant]="pgConfig.variant"
        [staggered]="pgConfig.staggered"
        [backdrop]="pgConfig.backdrop"
        [commandPalette]="pgConfig.commandPalette"
        [multiSelect]="pgConfig.multiSelect"
        [closeOnSelect]="pgConfig.closeOnSelect"
        [showGroups]="pgConfig.showGroups"
        [highlightSearch]="pgConfig.highlightSearch"
        [items]="demoItems"
        (menuSelect)="onMenuSelect($event)"
        (menuOpen)="onMenuOpen()"
        (menuClose)="onMenuClose()"
      >
      </app-context-menu>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span>Generated Code</span>
        <ui-button class="copy-btn" variant="secondary" size="sm" (click)="copyCode()" label="Copy"></ui-button>
      </div>
      <pre><code>{{ generatedCode() }}</code></pre>
    </div>
  </div>
</div>
