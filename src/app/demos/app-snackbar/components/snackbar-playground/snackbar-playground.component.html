<app-playground
  [accordionItems]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Global Configuration Slot -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Visible</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxVisible"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Stack Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.stackMode"
        (ngModelChange)="updateConfig()"
        [options]="stackModeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Open Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.openMode"
        (ngModelChange)="updateConfig()"
        [options]="openModeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-group" style="margin-top: 12px">
      <app-checkbox
        id="cardStack"
        [(ngModel)]="pgConfig.cardStack"
        (ngModelChange)="updateConfig()"
        label="Card Stacking"
      ></app-checkbox>
    </div>
  </div>

  <!-- Notification Settings Slot -->
  <div slot="content-notification" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="notiConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Title</label>
      <ui-input
        [(ngModel)]="notiConfig.title"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Success!"
      ></app-input>
    </div>
    <div class="control-group">
      <label>Message</label>
      <ui-input
        [(ngModel)]="notiConfig.message"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Action completed."
      ></app-input>
    </div>
    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="notiConfig.duration"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5000"
      ></app-input>
    </div>
  </div>

  <div
    preview
    style="
      width: 100%;
      height: 300px;
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--bg-secondary);
      border-radius: 12px;
    "
  >
    <ui-snackbar
      #snackbarElement
      icon-library="lucide"
      [attr.position]="pgConfig.position"
      [attr.max-visible]="pgConfig.maxVisible"
      [attr.stack-mode]="pgConfig.stackMode"
      [attr.open-mode]="pgConfig.openMode"
      [attr.card-stack]="pgConfig.cardStack ? '' : null"
    ></ui-snackbar>

    <ui-button
      class="btn-primary"
      variant="primary"
      (click)="showSnackbar()"
      label="Show Snackbar"
    ></ui-button>
    <ui-button
      class="btn-secondary"
      variant="secondary"
      (click)="clearAll()"
      label="Clear All"
    ></ui-button>
  </div>
</app-playground>
