<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="accordionDefaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Position</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.position"
        (ngModelChange)="updateConfig()"
        [options]="positionOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Max Visible</label>
      <ui-input
        type="number"
        [(ngModel)]="pgConfig.maxVisible"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Stack Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.stackMode"
        (ngModelChange)="updateConfig()"
        [options]="stackModeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Open Mode</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.openMode"
        (ngModelChange)="updateConfig()"
        [options]="openModeOptions"
      ></ui-dropdown>
    </div>
    <div class="checkbox-grid" style="margin-top: 12px">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.cardStack"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Card Stacking
      </label>
    </div>
  </div>

  <div slot="content-notification" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Type</label>
      <ui-dropdown
        [(ngModel)]="notiConfig.type"
        (ngModelChange)="updateConfig()"
        [options]="typeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Title</label>
      <ui-input
        type="text"
        [(ngModel)]="notiConfig.title"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Success!"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Message</label>
      <ui-input
        type="text"
        [(ngModel)]="notiConfig.message"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. Action completed."
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Duration (ms)</label>
      <ui-input
        type="number"
        [(ngModel)]="notiConfig.duration"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. 5000"
      ></ui-input>
    </div>
  </div>

  <div preview class="preview-stage">
    <div
      style="
        width: 100%;
        height: 300px;
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: center;
        padding: 40px;
        background: var(--surface-2);
        border-radius: var(--radius-lg);
        position: relative;
      "
    >
      <ui-snackbar
        #snackbarElement
        icon-library="lucide"
        [attr.position]="pgConfig.position"
        [attr.max-visible]="pgConfig.maxVisible"
        [attr.stack-mode]="pgConfig.stackMode"
        [attr.open-mode]="pgConfig.openMode"
        [attr.card-stack]="pgConfig.cardStack ? '' : null"
      ></ui-snackbar>

      <ui-button variant="primary" (click)="showSnackbar()" label="Show Snackbar"></ui-button>
      <ui-button variant="secondary" (click)="clearAll()" label="Clear All"></ui-button>
    </div>
  </div>

  <pg-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></pg-playground-event-log>
</app-playground>
