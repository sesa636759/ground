<app-playground
  accordionItems='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
  multiple
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Global Config -->
      <div class="control-section">
        <h3>Global Configuration</h3>
        <div class="control-group">
          <label>Position</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.position"
            (ngModelChange)="updateConfig()"
            [options]="positionOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Max Visible</label>
          <input type="number" [(ngModel)]="pgConfig.maxVisible" (ngModelChange)="updateConfig()" />
        </div>
        <div class="control-group">
          <label>Stack Mode</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.stackMode"
            (ngModelChange)="updateConfig()"
            [options]="stackModeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Open Mode</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.openMode"
            (ngModelChange)="updateConfig()"
            [options]="openModeOptions"
          ></ui-dropdown>
        </div>
        <div class="checkbox-group">
          <app-checkbox
            id="cardStack"
            [(ngModel)]="pgConfig.cardStack"
            (ngModelChange)="updateConfig()"
            label="Card Stacking"
          ></app-checkbox>
        </div>
      </div>

      <!-- Notification settings -->
      <div class="control-section">
        <h3>Notification Settings</h3>
        <div class="control-group">
          <label>Type</label>
          <ui-dropdown [(ngModel)]="notiConfig.type" [options]="typeOptions"></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Title</label>
          <input type="text" [(ngModel)]="notiConfig.title" />
        </div>
        <div class="control-group">
          <label>Message</label>
          <input type="text" [(ngModel)]="notiConfig.message" />
        </div>
        <div class="control-group">
          <label>Duration (ms)</label>
          <input type="number" [(ngModel)]="notiConfig.duration" />
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <ui-button
        class="btn-secondary"
        variant="secondary"
        (click)="resetConfig()"
        label="Reset"
      ></ui-button>
    </div>
  </div>
  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <ui-snackbar
      #snackbar
      icon-library="lucide"
      [attr.position]="pgConfig.position"
      [attr.max-visible]="pgConfig.maxVisible"
      [attr.stack-mode]="pgConfig.stackMode"
      [attr.open-mode]="pgConfig.openMode"
      [attr.card-stack]="pgConfig.cardStack ? '' : null"
    ></ui-snackbar>

    <ui-button
      class="btn-primary"
      variant="primary"
      (click)="showSnackbar()"
      label="Show Snackbar"
    ></ui-button>
    <ui-button
      class="btn-secondary"
      variant="secondary"
      (click)="clearAll()"
      label="Clear All"
    ></ui-button>

  @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
  </div>
</app-playground>
