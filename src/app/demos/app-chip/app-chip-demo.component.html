<div class="demo-container">
  <app-demo-header
    icon="🍿"
    title="Chip Component"
    description="Compact elements that represent an input, attribute, or action. Perfect for tags, filters, or entity representation."
  ></app-demo-header>

  <demo-tabs>
    <!-- Playground Slot -->
    <div slot="playground">
      <app-chip-playground></app-chip-playground>
    </div>

    <!-- Examples Slot -->
    <div slot="examples" class="examples-split-layout">
      <!-- Sidebar Navigation -->
      <app-demo-sidebar [variants]="exampleVariants" [useAnchor]="true"></app-demo-sidebar>

      <!-- Main Content Area -->
      <div class="examples-content" id="examples-scroll-area">
        <!-- Variants -->
        <app-example-section
          id="variants"
          title="Variants"
          description="Different visual styles for various contexts."
          [code]="variantsCode"
          style="margin-top: 0"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Filled & Outlined</h3>
              <div class="demo-flex">
                <ui-chip label="Filled" variant="filled"></ui-chip>
                <ui-chip label="Outlined" variant="outlined"></ui-chip>
              </div>
            </div>
            <div class="demo-card">
              <h3>Soft & Gradient</h3>
              <div class="demo-flex">
                <ui-chip label="Soft" variant="soft" color="success"></ui-chip>
                <ui-chip label="Gradient" variant="gradient" color="primary"></ui-chip>
              </div>
            </div>
          </div>
        </app-example-section>

        <!-- Shapes & Sizes -->
        <app-example-section
          id="shapes-sizes"
          title="Shapes & Sizes"
          description="Control the appearance and scale of chips."
          [code]="shapesSizesCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Shapes</h3>
              <div class="demo-flex">
                <ui-chip label="Pill" shape="pill"></ui-chip>
                <ui-chip label="Rounded" shape="rounded"></ui-chip>
                <ui-chip label="Square" shape="square"></ui-chip>
              </div>
            </div>
            <div class="demo-card">
              <h3>Sizes</h3>
              <div class="demo-flex">
                <ui-chip label="Small" size="sm" color="info"></ui-chip>
                <ui-chip label="Medium" size="md" color="info"></ui-chip>
                <ui-chip label="Large" size="lg" color="info"></ui-chip>
              </div>
            </div>
          </div>
        </app-example-section>

        <!-- Avatars & Icons -->
        <app-example-section
          id="avatars-icons"
          title="Avatars & Icons"
          description="Enhance chips with media and interactive elements."
          [code]="avatarsIconsCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Icons & Avatars</h3>
              <div class="demo-flex">
                <ui-chip label="Search" icon="🔍"></ui-chip>
                <ui-chip label="John Doe" user-avatar="https://i.pravatar.cc/150?u=john"></ui-chip>
              </div>
            </div>
            <div class="demo-card">
              <h3>Badges & Counters</h3>
              <div class="demo-flex">
                <ui-chip label="Updates" badge="99" color="danger"></ui-chip>
                <ui-chip label="Tasks" counter="5" color="warning"></ui-chip>
              </div>
            </div>
          </div>
        </app-example-section>

        <!-- Actions -->
        <app-example-section
          id="actions"
          title="Actions"
          description="Interactive behaviors for chips."
          [code]="actionsCode"
        >
          <div class="demo-grid col-2">
            <div class="demo-card">
              <h3>Clickable & Removable</h3>
              <div class="demo-flex">
                <ui-chip label="Click me" clickable color="info"></ui-chip>
                <ui-chip label="Remove me" removable variant="soft" color="danger"></ui-chip>
              </div>
            </div>
            <div class="demo-card">
              <h3>States</h3>
              <div class="demo-flex">
                <ui-chip label="Selected" selected color="primary"></ui-chip>
                <ui-chip label="Loading" loading></ui-chip>
                <ui-chip label="Disabled" disabled></ui-chip>
              </div>
            </div>
          </div>
        </app-example-section>
      </div>
    </div>

    <!-- Docs Slot -->
        <div slot="docs">
      <app-component-documentation componentId="chip"></app-component-documentation>
    </div>

  </demo-tabs>
</div>
