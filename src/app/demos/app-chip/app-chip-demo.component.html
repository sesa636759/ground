<div class="demo-container">
  <h1>Chip Component</h1>
  <p class="intro-text">Compact elements that represent an input, attribute, or action.</p>

  <demo-tabs>
    <div slot="playground">
      <app-chip-playground></app-chip-playground>
    </div>

    <div slot="examples">
      <app-example-section
        id="variants"
        title="Visual Variants"
        description="Different styling options like Filled, Outlined, and Soft."
        [code]="variantsCode"
      >
        <div class="demo-grid col-3">
          <ui-chip label="Filled (Default)" variant="filled"></ui-chip>
          <ui-chip label="Outlined" variant="outlined"></ui-chip>
          <ui-chip label="Soft variant" variant="soft" color="success"></ui-chip>
          <ui-chip label="Gradient Style" variant="gradient"></ui-chip>
          <ui-chip label="Text Only" variant="text"></ui-chip>
        </div>
      </app-example-section>

      <app-example-section
        id="shapes-sizes"
        title="Shapes & Sizes"
        description="Configure the border radius and scaling."
        [code]="shapesSizesCode"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <h3>Shapes</h3>
            <div class="demo-flex-wrap">
              <ui-chip label="Pill" shape="pill"></ui-chip>
              <ui-chip label="Rounded" shape="rounded"></ui-chip>
              <ui-chip label="Square" shape="square"></ui-chip>
              <ui-chip label="Circle" shape="circle" icon="🚀"></ui-chip>
            </div>
          </div>
          <div class="demo-card">
            <h3>Sizes</h3>
            <div class="demo-flex-wrap">
              <ui-chip label="Small" size="sm"></ui-chip>
              <ui-chip label="Medium" size="md"></ui-chip>
              <ui-chip label="Large" size="lg"></ui-chip>
            </div>
          </div>
        </div>
      </app-example-section>

      <app-example-section
        id="avatars-icons"
        title="Avatars & Icons"
        description="Enhance chips with visual indicators."
        [code]="avatarsIconsCode"
      >
        <div class="demo-grid col-2">
          <ui-chip label="React JS" icon="⚛️"></ui-chip>
          <ui-chip label="John Doe" user-avatar="https://i.pravatar.cc/150?u=john"></ui-chip>
          <ui-chip label="Notifications" badge="99" color="danger"></ui-chip>
          <ui-chip label="Pending Tasks" counter="5" color="warning"></ui-chip>
        </div>
      </app-example-section>

      <app-example-section
        id="actions"
        title="Actions & States"
        description="Interactive features like removing and loading."
        [code]="actionsCode"
      >
        <div class="demo-grid col-3">
          <ui-chip label="Clickable" clickable color="info"></ui-chip>
          <ui-chip label="Removable" removable variant="soft"></ui-chip>
          <ui-chip label="Selected State" selected color="primary"></ui-chip>
          <ui-chip label="Loading..." loading></ui-chip>
          <ui-chip label="Disabled" disabled></ui-chip>
        </div>
      </app-example-section>
    </div>

    <div slot="docs">
      <app-component-documentation componentId="chip"></app-component-documentation>
    </div>
  </demo-tabs>
</div>
