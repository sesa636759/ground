<app-playground
  [items]='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  [defaultOpen]='["config"]'
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <div slot="content-config">
    <div class="control-grid">
      <!-- Content -->
      <div class="control-section">
        <h3>Content</h3>
        <div class="control-group">
          <label>Label</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.label"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Icon</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.icon"
            (ngModelChange)="updateConfig()"
            placeholder="e.g. ⭐"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Avatar URL</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.userAvatar"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Counter</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.counter"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
        <div class="control-group">
          <label>Badge</label>
          <ui-input
            type="text"
            [(ngModel)]="pgConfig.badge"
            (ngModelChange)="updateConfig()"
          ></ui-input>
        </div>
      </div>

      <!-- Style -->
      <div class="control-section">
        <h3>Style</h3>
        <div class="control-group">
          <label>Variant</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.variant"
            (ngModelChange)="updateConfig()"
            [options]="variantOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Color</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.color"
            (ngModelChange)="updateConfig()"
            [options]="colorOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Size</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.size"
            (ngModelChange)="updateConfig()"
            [options]="sizeOptions"
          ></ui-dropdown>
        </div>
        <div class="control-group">
          <label>Shape</label>
          <ui-dropdown
            [(ngModel)]="pgConfig.shape"
            (ngModelChange)="updateConfig()"
            [options]="shapeOptions"
          ></ui-dropdown>
        </div>
      </div>

      <!-- Configuration -->
      <div class="control-section">
        <h3>Behavior</h3>
        <div class="checkbox-group">
          <ui-checkbox
            id="removable"
            [(ngModel)]="pgConfig.removable"
            (ngModelChange)="updateConfig()"
            label="Removable"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="clickable"
            [(ngModel)]="pgConfig.clickable"
            (ngModelChange)="updateConfig()"
            label="Clickable"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="selected"
            [(ngModel)]="pgConfig.selected"
            (ngModelChange)="updateConfig()"
            label="Selected"
          ></ui-checkbox>
        </div>
        <div class="checkbox-group">
          <ui-checkbox
            id="loading"
            [(ngModel)]="pgConfig.loading"
            (ngModelChange)="updateConfig()"
            label="Loading"
          ></ui-checkbox>
        </div>
      </div>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 32px"
  >
    <ui-chip
      [attr.label]="pgConfig.label"
      [attr.icon]="pgConfig.icon"
      [attr.user-avatar]="pgConfig.userAvatar"
      [attr.counter]="pgConfig.counter"
      [attr.badge]="pgConfig.badge"
      [attr.variant]="pgConfig.variant"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.shape]="pgConfig.shape"
      [attr.removable]="pgConfig.removable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.selected]="pgConfig.selected ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      (chipClick)="onEvent('Chip Clicked')"
      (chipRemove)="onEvent('Chip Removed')"
    ></ui-chip>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog"
    (clear)="eventLog = []"
  ></app-playground-event-log>
</app-playground>
