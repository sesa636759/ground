<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCode()"
  (reset)="resetConfig()"
>
  <div slot="content-content" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Label</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.label"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Icon</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.icon"
        (ngModelChange)="updateConfig()"
        placeholder="e.g. ⭐"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Avatar URL</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.userAvatar"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Counter</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.counter"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
    <div class="control-group">
      <label>Badge</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.badge"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <div slot="content-style" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Variant</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.variant"
        (ngModelChange)="updateConfig()"
        [options]="variantOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Color</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.color"
        (ngModelChange)="updateConfig()"
        [options]="colorOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Size</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.size"
        (ngModelChange)="updateConfig()"
        [options]="sizeOptions"
      ></ui-dropdown>
    </div>
    <div class="control-group">
      <label>Shape</label>
      <ui-dropdown
        [(ngModel)]="pgConfig.shape"
        (ngModelChange)="updateConfig()"
        [options]="shapeOptions"
      ></ui-dropdown>
    </div>
  </div>

  <div slot="content-behavior" class="control-grid" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.removable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Removable
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.clickable"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Clickable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.selected" (ngModelChange)="updateConfig()"></ui-checkbox>
        Selected
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.loading" (ngModelChange)="updateConfig()"></ui-checkbox>
        Loading
      </label>
    </div>
  </div>

  <div
    preview
    class="preview-stage"
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 32px"
  >
    <ui-chip
      #demoElement
      [attr.label]="pgConfig.label"
      [attr.icon]="pgConfig.icon"
      [attr.user-avatar]="pgConfig.userAvatar"
      [attr.counter]="pgConfig.counter"
      [attr.badge]="pgConfig.badge"
      [attr.variant]="pgConfig.variant"
      [attr.color]="pgConfig.color"
      [attr.size]="pgConfig.size"
      [attr.shape]="pgConfig.shape"
      [attr.removable]="pgConfig.removable ? '' : null"
      [attr.clickable]="pgConfig.clickable ? '' : null"
      [attr.selected]="pgConfig.selected ? '' : null"
      [attr.loading]="pgConfig.loading ? '' : null"
      (chipClick)="logEvent('Chip Clicked')"
      (chipRemove)="logEvent('Chip Removed')"
    ></ui-chip>
  </div>

  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
</app-playground>
