<app-playground
  items='[{"id":"config","title":"Configuration","icon":"⚙️"}]'
  defaultOpen='["config"]'
>
  <div slot="content-config">
    <div class="control-grid">
      <div class="control-group">
        <label>Orientation</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.orientation"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Horizontal', value: 'horizontal' },
            { label: 'Vertical', value: 'vertical' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Variant</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.variant"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Default', value: 'default' },
            { label: 'Pills', value: 'pills' },
            { label: 'Underline', value: 'underline' },
            { label: 'Glass', value: 'glass' },
          ]"
        ></ui-dropdown>
      </div>
      <div class="control-group">
        <label>Size</label>
        <ui-dropdown
          [(ngModel)]="pgConfig.size"
          (ngModelChange)="updateConfig()"
          [options]="[
            { label: 'Small', value: 'small' },
            { label: 'Medium', value: 'medium' },
            { label: 'Large', value: 'large' },
          ]"
        ></ui-dropdown>
      </div>
    </div>
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.closable" (ngModelChange)="updateConfig()" />
        Closable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.draggable" (ngModelChange)="updateConfig()" />
        Draggable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.scrollable" (ngModelChange)="updateConfig()" />
        Scrollable
      </label>
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.grouped" (ngModelChange)="updateConfig()" />
        Grouped
      </label>
    </div>
  </div>

  <div preview class="preview-stage">
    <app-tab-stack
      [attr.orientation]="pgConfig.orientation"
      [attr.variant]="pgConfig.variant"
      [attr.size]="pgConfig.size"
      [attr.closable]="pgConfig.closable"
      [attr.draggable]="pgConfig.draggable"
      [attr.scrollable]="pgConfig.scrollable"
      [attr.grouped]="pgConfig.grouped"
      [tabs]="tabs"
    ></app-tab-stack>
  </div>
  <app-playground-event-log
    events
    [logs]="eventLog()"
    (clear)="eventLog.set([])"
  ></app-playground-event-log>
  <ui-code-preview
    code
    [htmlCode]="generatedCode()"
    [label]="'Generated Code'"
    activeLang="html"
    expanded="true"
  ></ui-code-preview>
</app-playground>
