<app-demo-header
  icon="📱"
  title="Modern Sidebar Component"
  description="A sleek, professional navigation sidebar with collapsible design, nested navigation, badge support, user profiles, and smooth animations."
>
</app-demo-header>

<demo-tabs>
  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Basic Default -->
      <app-example-section
        id="basic-default"
        title="Basic Default"
        description="Standard sidebar with brand name and basic navigation items."
        [code]="basicDefaultCode()"
        style="margin-top: 0"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="My App"
              selected-id="dashboard"
              accent-color="#6366f1"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'analytics', label: 'Analytics', icon: 'fas fa-chart-bar' },
                { id: 'settings', label: 'Settings', icon: 'fas fa-cog' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Minimal Items -->
      <app-example-section
        id="minimal-items"
        title="Minimal Items"
        description="Clean sidebar with just essential navigation items."
        [code]="minimalItemsCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Simple App"
              selected-id="home"
              [items]="[
                { id: 'home', label: 'Home', icon: 'fas fa-home' },
                { id: 'about', label: 'About', icon: 'fas fa-info-circle' },
                { id: 'contact', label: 'Contact', icon: 'fas fa-envelope' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Collapsed/Compact -->
      <app-example-section
        id="collapsed-compact"
        title="Collapsed/Compact"
        description="Icon-only compact mode for maximum space efficiency."
        [code]="collapsedCompactCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Compact"
              selected-id="dashboard"
              collapsed="true"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'projects', label: 'Projects', icon: 'fas fa-folder' },
                { id: 'settings', label: 'Settings', icon: 'fas fa-cog' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Expanded Full -->
      <app-example-section
        id="expanded-full"
        title="Expanded Full"
        description="Full-width sidebar with complete labels and icons."
        [code]="expandedFullCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Full Width"
              selected-id="dashboard"
              collapsed="false"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'analytics', label: 'Analytics', icon: 'fas fa-chart-line' },
                { id: 'projects', label: 'Projects', icon: 'fas fa-folder' },
                { id: 'team', label: 'Team', icon: 'fas fa-users' },
                { id: 'settings', label: 'Settings', icon: 'fas fa-cog' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Nested Navigation -->
      <app-example-section
        id="nested-navigation"
        title="Nested Navigation"
        description="Menu items with expandable children for organized navigation."
        [code]="nestedNavigationCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Project Hub"
              selected-id="active"
              accent-color="#10b981"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                {
                  id: 'projects',
                  label: 'Projects',
                  icon: 'fas fa-folder',
                  children: [
                    { id: 'active', label: 'Active Projects', icon: 'fas fa-circle' },
                    { id: 'archived', label: 'Archived', icon: 'fas fa-archive' },
                  ],
                },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Nested Deep -->
      <app-example-section
        id="nested-deep"
        title="Deep Nesting (3 Levels)"
        description="Three-level deep menu hierarchy for complex navigation."
        [code]="nestedDeepCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Deep Nesting"
              selected-id="notifications"
              accent-color="#ec4899"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                {
                  id: 'settings',
                  label: 'Settings',
                  icon: 'fas fa-cog',
                  children: [
                    { id: 'account', label: 'Account', icon: 'fas fa-user' },
                    { id: 'security', label: 'Security', icon: 'fas fa-lock' },
                    {
                      id: 'preferences',
                      label: 'Preferences',
                      icon: 'fas fa-sliders-h',
                      children: [
                        { id: 'notifications', label: 'Notifications', icon: 'fas fa-bell' },
                        { id: 'privacy', label: 'Privacy', icon: 'fas fa-shield-alt' },
                      ],
                    },
                  ],
                },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- With Badges -->
      <app-example-section
        id="with-badges"
        title="With Badges"
        description="Notification badges showing counts on menu items."
        [code]="withBadgesCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Notification Hub"
              selected-id="messages"
              accent-color="#f59e0b"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'messages', label: 'Messages', icon: 'fas fa-envelope', badge: 12 },
                { id: 'notifications', label: 'Notifications', icon: 'fas fa-bell', badge: 5 },
                { id: 'tasks', label: 'Tasks', icon: 'fas fa-tasks', badge: 8 },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- User Profile -->
      <app-example-section
        id="user-profile"
        title="User Profile"
        description="Sidebar with user profile information displayed."
        [code]="userProfileCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Enterprise App"
              selected-id="dashboard"
              accent-color="#8b5cf6"
              user-name="Sarah Johnson"
              user-role="Product Manager"
              user-avatar="https://i.pravatar.cc/100?img=44"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'projects', label: 'Projects', icon: 'fas fa-folder' },
                { id: 'team', label: 'Team', icon: 'fas fa-users' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Theme Dark -->
      <app-example-section
        id="theme-dark"
        title="Dark Theme"
        description="Dark theme with inverted colors for night mode."
        [code]="themeDarkCode()"
      >
        <div class="demo-card">
          <div class="preview-box sidebar-preview">
            <app-modern-sidebar
              brand-name="Dark Mode App"
              selected-id="dashboard"
              accent-color="#3b82f6"
              theme="dark"
              user-name="Alex Smith"
              user-role="Developer"
              user-avatar="https://i.pravatar.cc/100?img=33"
              [items]="[
                { id: 'dashboard', label: 'Dashboard', icon: 'fas fa-home' },
                { id: 'projects', label: 'Projects', icon: 'fas fa-folder', badge: 8 },
                { id: 'terminal', label: 'Terminal', icon: 'fas fa-terminal' },
              ]"
            >
            </app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Layout Options -->
      <app-example-section
        id="layouts"
        title="Layout Options"
        description="Flexible layout combinations for different application needs."
        [code]="dashboardLayoutCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card">
            <h3>Dashboard Layout</h3>
            <div class="preview-box sidebar-preview">
              <app-modern-sidebar
                brand-name="Dashboard Pro"
                selected-id="overview"
                accent-color="#3b82f6"
                user-name="Admin User"
                user-role="Administrator"
                user-avatar="https://i.pravatar.cc/100?img=12"
                [items]="[
                  { id: 'overview', label: 'Overview', icon: 'fas fa-chart-pie' },
                  { id: 'metrics', label: 'Metrics', icon: 'fas fa-tachometer-alt' },
                  { id: 'reports', label: 'Reports', icon: 'fas fa-file-alt' },
                  { id: 'settings', label: 'Settings', icon: 'fas fa-cog' },
                ]"
              >
              </app-modern-sidebar>
            </div>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Playground Slot -->
  <div slot="playground">
    <app-modern-sidebar-playground></app-modern-sidebar-playground>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="modern-sidebar"></app-component-documentation>
  </div>
</demo-tabs>
