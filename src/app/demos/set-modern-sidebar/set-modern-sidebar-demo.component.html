<app-demo-header
  icon="📱"
  title="Modern Sidebar Component"
  description="A sleek, professional navigation sidebar with collapsible design, nested navigation, badge support, user profiles, and smooth animations."
>
</app-demo-header>

<demo-tabs>
  <!-- Examples Slot -->
  <div slot="examples" class="examples-split-layout">
    <!-- Sidebar Navigation -->
    <aside class="examples-sidebar">
      <div class="sidebar-title">Sections</div>
      <div class="sidebar-nav">
        <ui-anchor
          [links]="anchorLinks"
          scroll-container=".pane-examples"
          type="line"
          show-progress
        ></ui-anchor>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="examples-content pane-examples">
      <!-- Basic Default -->
      <app-example-section
        id="basic-default"
        title="Basic Default"
        description="Standard sidebar with brand name and basic navigation items."
        [code]="basicDefaultCode()"
        style="margin-top: 0"
      >
        <div class="demo-grid col-1">
          <div class="demo-card sidebar-card">
            <app-modern-sidebar
              brand-name="Enterprise"
              [items]="basicItems"
              selected-id="dashboard"
            ></app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Profile Showcase -->
      <app-example-section
        id="profile-showcase"
        title="Profile Showcase"
        description="Sidebar featuring user profile with name, role, and avatar."
        [code]="profileShowcaseCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card sidebar-card">
            <app-modern-sidebar
              brand-name="Admin Portal"
              user-name="John Doe"
              user-role="Super Admin"
              user-avatar="https://ui-avatars.com/api/?name=John+Doe&background=6366f1&color=fff"
              [items]="basicItems"
            ></app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Nested Navigation -->
      <app-example-section
        id="nested-nav"
        title="Nested Navigation"
        description="Hierarchical navigation items with expand/collapse capability."
        [code]="nestedNavCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card sidebar-card">
            <app-modern-sidebar brand-name="E-Commerce" [items]="nestedItems"></app-modern-sidebar>
          </div>
        </div>
      </app-example-section>

      <!-- Theme Showcase -->
      <app-example-section
        id="theme-showcase"
        title="Theme Showcase"
        description="Dark mode support and custom accent colors."
        [code]="themeShowcaseCode()"
      >
        <div class="demo-grid col-1">
          <div class="demo-card sidebar-card dark">
            <app-modern-sidebar
              brand-name="Ghost UI"
              theme="dark"
              accent-color="#10b981"
              [items]="basicItems"
            ></app-modern-sidebar>
          </div>
        </div>
      </app-example-section>
    </div>
  </div>

  <!-- Playground Slot -->
  <div slot="playground">
    <app-modern-sidebar-playground></app-modern-sidebar-playground>
  </div>

  <!-- Docs Slot -->
  <div slot="docs">
    <app-component-documentation componentId="modern-sidebar"></app-component-documentation>
  </div>
</demo-tabs>
