<app-playground
  [items]="pgAccordionItems"
  [defaultOpen]="defaultOpen"
  [code]="generatedCodeSignal()"
  (reset)="resetConfig()"
>
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Search Placeholder</label>
      <ui-input
        type="text"
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
      ></ui-input>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <ui-checkbox [(ngModel)]="pgConfig.disabled" (ngModelChange)="updateConfig()"></ui-checkbox>
        Disabled State
      </label>
      <label class="checkbox-item">
        <ui-checkbox
          [(ngModel)]="pgConfig.showSearch"
          (ngModelChange)="updateConfig()"
        ></ui-checkbox>
        Show Search Bar
      </label>
    </div>
  </div>

  <div
    preview
    style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px"
  >
    <div class="transfer-container">
      <ui-transfer-list
        [attr.search-placeholder]="pgConfig.searchPlaceholder"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.show-search]="pgConfig.showSearch ? '' : null"
        [source]="sourceJson"
        [target]="targetJson"
      >
      </ui-transfer-list>
    </div>
  </div>
</app-playground>
