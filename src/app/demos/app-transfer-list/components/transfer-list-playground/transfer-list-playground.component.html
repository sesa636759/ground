<app-playground [accordionItems]="pgAccordionItems" [defaultOpen]="defaultOpen">
  <!-- Global Configuration -->
  <div slot="content-global" class="control-grid" style="padding: 16px">
    <div class="control-group">
      <label>Search Placeholder</label>
      <app-input
        type="text"
        [(ngModel)]="pgConfig.searchPlaceholder"
        (ngModelChange)="updateConfig()"
      ></app-input>
    </div>
  </div>

  <!-- Behavioral States -->
  <div slot="content-states" style="padding: 16px">
    <div class="checkbox-grid">
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.disabled"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Disabled State
      </label>
      <label class="checkbox-item">
        <app-checkbox
          [(ngModel)]="pgConfig.showSearch"
          (ngModelChange)="updateConfig()"
        ></app-checkbox>
        Show Search Bar
      </label>
    </div>
  </div>

  <div preview style="width: 100%; display: flex; justify-content: center; align-items: center">
    <div class="transfer-container">
      <ui-transfer-list
        [attr.search-placeholder]="pgConfig.searchPlaceholder"
        [attr.disabled]="pgConfig.disabled ? '' : null"
        [attr.show-search]="pgConfig.showSearch ? '' : null"
        [source]="sourceJson"
        [target]="targetJson"
      >
      </ui-transfer-list>
    </div>
  </div>

    @if (showCode) {
    <ui-code-preview
      code
      [htmlCode]="generatedCode()"
      [label]="'Generated Code'"
      activeLang="html"
      expanded="true"
    ></ui-code-preview>
  }
</app-playground>
