<div class="docs-page">
  <header class="page-header">
    <div class="header-content">
      <h1>Skeleton</h1>
      <p class="description">
        Loading placeholders with various shapes and animations for better perceived performance.
      </p>
    </div>
  </header>

  <div class="gallery-container">
    <section class="gallery-section">
      <h2 class="section-title">Playground</h2>
      <app-playground-editor [config]="skeletonConfig"></app-playground-editor>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Common Layouts</h2>
      <div class="demo-grid">
        <!-- Card Skeleton -->
        <div class="demo-card">
          <div class="card-title">Card Layout</div>
          <div class="skeleton-layout card">
            <skeleton-loader
              shape="rectangle"
              width="100%"
              height="160px"
              border-radius="8px"
            ></skeleton-loader>
            <skeleton-loader width="60%" height="24px" style="margin-top: 12px"></skeleton-loader>
            <skeleton-loader width="100%" height="16px" style="margin-top: 8px"></skeleton-loader>
            <skeleton-loader width="80%" height="16px" style="margin-top: 4px"></skeleton-loader>
          </div>
        </div>

        <!-- Profile Skeleton -->
        <div class="demo-card">
          <div class="card-title">Profile Layout</div>
          <div class="skeleton-layout profile">
            <div style="display: flex; gap: 12px; align-items: center">
              <skeleton-loader shape="circle" width="60px" height="60px"></skeleton-loader>
              <div style="flex: 1">
                <skeleton-loader width="120px" height="20px"></skeleton-loader>
                <skeleton-loader
                  width="160px"
                  height="16px"
                  style="margin-top: 8px"
                ></skeleton-loader>
              </div>
            </div>
          </div>
        </div>

        <!-- List Skeleton -->
        <div class="demo-card">
          <div class="card-title">List Layout</div>
          <div class="skeleton-layout list">
            <div *ngFor="let i of [1, 2, 3]" style="display: flex; gap: 12px; margin-bottom: 12px">
              <skeleton-loader shape="circle" width="40px" height="40px"></skeleton-loader>
              <div style="flex: 1">
                <skeleton-loader width="80%" height="16px"></skeleton-loader>
                <skeleton-loader
                  width="60%"
                  height="12px"
                  style="margin-top: 4px"
                ></skeleton-loader>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Shapes & Animations</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <div class="card-title">Shapes</div>
          <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center">
            <skeleton-loader shape="circle" width="50px" height="50px"></skeleton-loader>
            <skeleton-loader shape="square" width="50px" height="50px"></skeleton-loader>
            <skeleton-loader
              shape="rounded-rectangle"
              width="100px"
              height="50px"
              border-radius="12px"
            ></skeleton-loader>
          </div>
        </div>
        <div class="demo-card">
          <div class="card-title">Animations</div>
          <div style="display: flex; flex-direction: column; gap: 10px">
            <span>Pulse (Default)</span>
            <skeleton-loader animation-type="pulse" width="100%" height="20px"></skeleton-loader>
            <span>Wave</span>
            <skeleton-loader animation-type="wave" width="100%" height="20px"></skeleton-loader>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
