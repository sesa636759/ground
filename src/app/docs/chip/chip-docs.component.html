<div class="docs-page">
  <header class="page-header">
    <div class="header-content">
      <h1>Chip</h1>
      <p class="description">
        Interactive tags with support for icons, avatars, and custom exit animations.
      </p>
    </div>
  </header>

  <div class="gallery-container">
    <section class="gallery-section">
      <h2 class="section-title">Playground</h2>
      <app-playground-editor [config]="chipConfig"></app-playground-editor>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Visual Styles</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <div class="card-title">Color Palette</div>
          <div class="chip-rack">
            <ui-chip label="Primary" color="primary"></ui-chip>
            <ui-chip label="Success" color="success"></ui-chip>
            <ui-chip label="Danger" color="danger"></ui-chip>
            <ui-chip label="Warning" color="warning"></ui-chip>
            <ui-chip label="Info" color="info"></ui-chip>
          </div>
        </div>
        <div class="demo-card">
          <div class="card-title">Variants</div>
          <div class="chip-rack">
            <ui-chip label="Solid (Default)" variant="default" color="primary"></ui-chip>
            <ui-chip label="Outlined" variant="outlined" color="primary"></ui-chip>
            <ui-chip
              label="Glassmorphism"
              variant="glass"
              color="primary"
              style="background: rgba(59, 130, 246, 0.1); backdrop-filter: blur(4px)"
            ></ui-chip>
          </div>
        </div>
      </div>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Media & Avatars</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <div class="card-title">User Avatars</div>
          <div class="chip-rack">
            <ui-chip
              label="John Doe"
              user-avatar="https://i.pravatar.cc/150?img=12"
              color="primary"
            ></ui-chip>
            <ui-chip
              label="Jane Smith"
              user-avatar="https://i.pravatar.cc/150?img=5"
              color="success"
            ></ui-chip>
          </div>
        </div>
        <div class="demo-card">
          <div class="card-title">Icons & Images</div>
          <div class="chip-rack">
            <ui-chip
              label="JavaScript"
              image="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
              color="warning"
            ></ui-chip>
            <ui-chip label="Settings" icon="⚙️" color="secondary"></ui-chip>
          </div>
        </div>
      </div>
    </section>

    <section class="gallery-section">
      <h2 class="section-title">Interactions</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <div class="card-title">Removable Chips</div>
          <div class="chip-rack">
            <ui-chip label="Scale Out" removable="true" animation="scale" color="primary"></ui-chip>
            <ui-chip label="Fade Out" removable="true" animation="fade" color="success"></ui-chip>
            <ui-chip label="Slide Out" removable="true" animation="slide" color="danger"></ui-chip>
            <ui-chip
              label="Bounce Out"
              removable="true"
              animation="bounce"
              color="warning"
            ></ui-chip>
          </div>
          <p class="card-desc">Try clicking the close button to see different exit animations.</p>
        </div>
        <div class="demo-card">
          <div class="card-title">Selection State</div>
          <div class="chip-rack">
            <ui-chip label="Selected" clickable="true" selected="true" color="primary"></ui-chip>
            <ui-chip label="Not Selected" clickable="true" color="secondary"></ui-chip>
            <ui-chip label="Disabled" disabled="true" color="primary"></ui-chip>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
