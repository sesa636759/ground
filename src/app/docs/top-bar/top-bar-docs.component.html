<div class="docs-page">
  <header class="page-header">
    <div class="header-content">
      <div class="header-actions">
        <a routerLink="/docs" class="back-link">← Components</a>
      </div>
      <h1>Top Bar</h1>
      <p class="description">Global application header for branding and key actions.</p>
    </div>
  </header>

  <nav class="docs-tabs">
    <ui-button
      [label]="'Examples Demos'"
      [variant]="activeTab === 'examples' ? 'primary' : 'outline'"
      size="md"
      (click)="setTab('examples')"
    ></ui-button>
    <ui-button
      [label]="'Interactive Playground'"
      [variant]="activeTab === 'playground' ? 'primary' : 'outline'"
      size="md"
      (click)="setTab('playground')"
    ></ui-button>
    <ui-button
      [label]="'API Documentation'"
      [variant]="activeTab === 'documentation' ? 'primary' : 'outline'"
      size="md"
      (click)="setTab('documentation')"
    ></ui-button>
  </nav>

  <div class="tab-content" [ngClass]="activeTab">
    <div *ngIf="activeTab === 'examples'" class="examples-container">
      <div class="examples-main">
        <section class="feature-showcase">
          <div class="showcase-card">
            <div class="showcase-header">
              <h3>Application Header</h3>
            </div>
            <p class="showcase-desc">Standard top bar layout.</p>

            <div class="showcase-preview" style="height: 150px; background: #eee; padding: 0">
              <ui-top-bar title="Dashboard" style="width: 100%">
                <div slot="actions" style="display: flex; gap: 8px">
                  <ui-button icon="🔔" variant="ghost" size="sm"></ui-button>
                  <ui-button icon="👤" variant="ghost" size="sm"></ui-button>
                </div>
              </ui-top-bar>
            </div>

            <div class="showcase-footer">
              <div class="action-buttons">
                <ui-button
                  [label]="isCodeVisible ? 'Hide Source Code' : 'Show Source Code'"
                  variant="secondary"
                  size="md"
                  (click)="toggleCode()"
                  icon="code"
                ></ui-button>
                <ui-button
                  label="Copy Snippet"
                  variant="primary"
                  size="md"
                  (click)="copyCode(exampleCodes['basic'])"
                  icon="copy"
                ></ui-button>
              </div>
            </div>

            <div *ngIf="isCodeVisible" class="code-section">
              <app-code-viewer
                [code]="exampleCodes['basic']"
                title="Top Bar Usage"
              ></app-code-viewer>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div *ngIf="activeTab === 'playground'" class="playground-tab">
      <app-playground-editor [config]="componentConfig"></app-playground-editor>
    </div>

    <div *ngIf="activeTab === 'documentation'" class="documentation-tab">
      <div class="doc-section">
        <h3>Properties API</h3>
        <div class="table-container">
          <table class="doc-table">
            <thead>
              <tr>
                <th>Property</th>
                <th>Type</th>
                <th>Default</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let prop of componentConfig.props">
                <td>
                  <code>{{ prop.name }}</code>
                </td>
                <td>
                  <span class="type-badge">{{ prop.type }}</span>
                </td>
                <td>
                  <code>{{ prop.defaultValue }}</code>
                </td>
                <td>{{ prop.description || 'Property specification.' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
