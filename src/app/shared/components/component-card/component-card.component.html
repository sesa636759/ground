<div class="component-card glass-panel" [class.list-card]="viewMode === 'list'" (click)="onClick()">
  <div class="card-glow"></div>

  <div class="card-header">
    <div class="comp-avatar">
      @if (icon) {
        <ui-icon [name]="icon" [library]="iconLibrary" size="22" color="white"></ui-icon>
      }
      @if (!icon) {
        <span>{{ label.charAt(0) }}</span>
      }
    </div>
    <div class="comp-title-area">
      <h3 class="comp-name">{{ label }}</h3>
      @if (category) {
        <span class="comp-meta">{{ category }}</span>
      }
    </div>
    @if (badge) {
      <span class="status-badge">{{ badge }}</span>
    }
  </div>

  @if (viewMode !== 'list') {
    <div class="card-preview-container">
      @if (!imageUrl) {
        <div class="card-preview" [innerHTML]="previewSvg"></div>
      }
      @if (imageUrl) {
        <img [src]="imageUrl" [alt]="label" class="card-image" />
      }
      <div class="preview-overlay">
        <button class="explore-btn">
          <span>Explore Demo</span>
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>
  }

  @if (description) {
    <div class="card-footer">
      <p class="card-description">{{ description }}</p>
    </div>
  }
</div>
