<div class="playground-layout">
  <!-- Controls Side -->
  <div class="playground-controls">
    <ui-accordion [items]="stringifiedItems" [defaultOpen]="stringifiedDefaultOpen" multiple>
      <ng-content></ng-content>
    </ui-accordion>

    <div class="playground-controls-actions">
      <ui-button
        class="reset-btn"
        icon="rotate-ccw"
        iconPosition="left"
        [iconLibrary]="'lucide'"
        variant="secondary"
        (click)="reset.emit()"
        label="Reset Configuration"
        style="width: 100%"
      ></ui-button>
    </div>
  </div>

  <!-- Preview Side -->
  <div class="playground-preview">
    <div class="preview-stage">
      <ng-content select="[preview]"></ng-content>
    </div>

    <!-- Actions/Reset area -->
    <div class="preview-actions">
      <ng-content select="[actions]"></ng-content>
    </div>

    <!-- Event Log Slot -->
    <div class="playground-events-area">
      <ng-content select="[events]"></ng-content>
    </div>

    <!-- Code Preview -->
    <div class="code-preview-area">
      <ng-content select="[code]"></ng-content>
      @if (code) {
        <ui-code-preview
          [htmlCode]="code"
          label="Generated Code"
          activeLang="html"
          expanded="true"
        ></ui-code-preview>
      }
    </div>
  </div>
</div>
