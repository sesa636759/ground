<div class="demo-page-container">
  <div class="demo-master-container">
    <dui-tabs
      [items]="tabItems"
      [defaultActive]="active()"
      (tabChange)="onTabChange($event)"
      (tabEdit)="handleTabEdit($event)"
      (tabOpenPanel)="handleTabOpenPanel($event)"
      (tabDelete)="handleTabDelete($event)"
      variant="line"
      orientation="horizontal"
      icon-library="lucide"
      show-tab-list="true"
    >
      <div slot="playground" class="pane-playground">
        <ng-content select="[slot=playground]"></ng-content>
      </div>
      <div slot="examples" class="pane-examples">
        <ng-content select="[slot=examples]"></ng-content>
      </div>
      <div slot="docs" class="pane-docs">
        <ng-content select="[slot=docs]"></ng-content>
      </div>
    </dui-tabs>
  </div>
</div>
