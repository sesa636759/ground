<div class="playground-layout">
  <!-- Controls Side -->
  <div class="playground-controls">
    <div class="controls-header">
      <h3>{{ config.title }}</h3>
      <p class="description">{{ config.description }}</p>
    </div>

    <div class="controls-grid">
      <div *ngFor="let control of config.controls" class="control-item">
        <!-- Boolean Control -->
        @if (control.type === 'boolean') {
          <label class="checkbox-control">
            <dui-checkbox
              [(ngModel)]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
              [label]="control.label"
            ></dui-checkbox>
          </label>
        }

        <!-- Text Control -->
        @if (control.type === 'text') {
          <label class="text-control">
            <span class="control-label">{{ control.label }}</span>
            <dui-input
              type="text"
              [ngModel]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
            ></dui-input>
          </label>
        }

        <!-- Number Control -->
        @if (control.type === 'number') {
          <label class="number-control">
            <span class="control-label">{{ control.label }}</span>
            <dui-input
              type="number"
              [ngModel]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
              [min]="control.min ?? null"
              [max]="control.max ?? null"
              [step]="control.step ?? null"
            ></dui-input>
          </label>
        }

        <!-- Select Control -->
        @if (control.type === 'select') {
          <label class="select-control">
            <span class="control-label">{{ control.label }}</span>
            <dui-dropdown
              [(ngModel)]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
              [options]="control.options"
            ></dui-dropdown>
          </label>
        }

        <!-- Color Control -->
        @if (control.type === 'color') {
          <label class="color-control">
            <span class="control-label">{{ control.label }}</span>
            <dui-input
              type="color"
              [ngModel]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
            ></dui-input>
          </label>
        }

        <!-- Range Control -->
        @if (control.type === 'range') {
          <label class="range-control">
            <span class="control-label">{{ control.label }}: {{ values[control.name] }}</span>
            <dui-input
              type="range"
              [ngModel]="values[control.name]"
              (ngModelChange)="onValueChange(control.name, $event)"
              [min]="control.min"
              [max]="control.max"
              [step]="control.step"
            ></dui-input>
          </label>
        }
      </div>
    </div>

    <div class="controls-footer Playground-controls-actions">
      <dui-button
        class="reset-btn"
        icon="rotate-ccw"
        icon-position="left"
        icon-library="lucide"
        variant="secondary"
        (click)="resetValues()"
        label="Reset Configuration"
      ></dui-button>
    </div>
  </div>

  <!-- Preview Side -->
  <div class="playground-preview">
    <ng-content select="[preview]"></ng-content>

    <div class="preview-actions">
      <ng-content select="[actions]"></ng-content>
    </div>

    <!-- Code Preview -->
    <div class="code-preview-area">
      <ng-content select="[code]"></ng-content>
    </div>

    <!-- Event Log -->
    <div class="playground-events-area">
      <ng-content select="[events]"></ng-content>
    </div>
  </div>
</div>
