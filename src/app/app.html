<div class="app-container" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Sidebar Navigation -->

  <ui-navigation
    class="sidebar-nav"
    [categories]="topItems"
    [items]="categoryItems"
    [bottomItems]="bottomItems"
    [theme]="themeService.resolvedTheme()"
    [selected-item]="currentRoute()"
    [show-search]="true"
    max-items="10"
    (navItemClick)="onNavItemClick($event)"
  >
    <!-- User Profile in Footer Slot -->
    <div
      slot="footer"
      class="sidebar-user-profile"
      (mouseenter)="userMenuOpen.set(true)"
      (mouseleave)="userMenuOpen.set(false)"
    >
      <div class="user-profile-container" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <img [src]="currentUser().avatar" [alt]="currentUser().name" />
          <span class="user-status" [class.online]="currentUser().isOnline"></span>
        </div>
        <div class="user-info" *ngIf="!sidebarCollapsed()">
          <div class="user-name">{{ currentUser().name }}</div>
          <div class="user-role">{{ currentUser().role }}</div>
        </div>
        <ui-button
          class="user-menu-toggle"
          *ngIf="!sidebarCollapsed()"
          variant="ghost"
          icon-only
          [icon]="userMenuOpen() ? '▲' : '▼'"
          label="Toggle Menu"
          (click)="toggleUserMenu()"
        >
        </ui-button>
      </div>

      <!-- User Dropdown Menu -->
      <div class="user-menu" *ngIf="userMenuOpen()">
        <ui-button
          *ngFor="let item of userProfileItems"
          class="menu-item"
          [class.logout]="item.id === 'logout'"
          variant="ghost"
          full-width
          (click)="onNavItemClick({ detail: item })"
          [icon]="item.icon"
          [label]="item.label"
          [badge]="item.badge"
        ></ui-button>
      </div>
    </div>
  </ui-navigation>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <!-- Router Outlet for Page Content -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
