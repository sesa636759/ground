<!-- App Container with conditional layout classes  -->
<div
  class="app-container"
  [class.layout-sidebar]="themeService.navigationLayout() === 'sidebar'"
  [class.layout-topbar]="themeService.navigationLayout() === 'topbar'"
  [class.sidebar-collapsed]="sidebarCollapsed()"
>
  <!-- Navigation -->
  <ui-navigation
    class="main-nav"
    [orientation]="themeService.navigationLayout() === 'topbar' ? 'horizontal' : 'vertical'"
    [categories]="topItems"
    [items]="categoryItems"
    [bottomItems]="bottomItems"
    [bottomItemsSecondary]="userProfileItems"
    [theme]="themeService.resolvedTheme()"
    [selected-item]="currentRoute()"
    [show-search]="true"
    max-items="7"
    (navItemClick)="onNavItemClick($event)"
    (navToggle)="onNavToggle($event)"
  >
    <div slot="header" class="nav-brand-header">
      <img src="assets/images/components.png" alt="Component Hub" class="nav-brand-logo" />
      <span class="nav-brand-name">Component Hub</span>
    </div>
  </ui-navigation>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
