<!-- App Container with conditional layout classes  -->
<div
  class="app-container"
  [class.layout-sidebar]="themeService.navigationLayout() === 'sidebar'"
  [class.layout-topbar]="themeService.navigationLayout() === 'topbar'"
  [class.sidebar-collapsed]="sidebarCollapsed()"
>
  <!-- Navigation: Only show if authenticated and not on login/register -->
  <ng-container
    *ngIf="isAuthenticated() && currentRoute() !== 'login' && currentRoute() !== 'register'"
  >
    <ui-navigation
      class="main-nav"
      [orientation]="themeService.navigationLayout() === 'topbar' ? 'horizontal' : 'vertical'"
      [categories]="topItems"
      [items]="categoryItems"
      [bottomItems]="bottomItems"
      [bottomItemsSecondary]="userProfileItems"
      [theme]="themeService.resolvedTheme()"
      [selectedItem]="currentRoute()"
      [showSearch]="true"
      [maxItems]="8"
      (navItemClick)="onNavItemClick($event)"
      (navToggle)="onNavToggle($event)"
    >
      <div slot="header" class="nav-brand-header">
        <img src="assets/images/components.png" alt="Component Hub" class="nav-brand-logo" />
        <span class="nav-brand-name">Component Hub</span>
      </div>
    </ui-navigation>
  </ng-container>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- 🎨 Floating Theme Switcher -->
  <div class="theme-fab-container" [class.open]="themeMenuOpen()">
    <!-- Theme Option Buttons (fan out above FAB) -->
    @for (t of themeOptions; track t.id; let i = $index) {
      <div
        class="theme-fab-option"
        [class.active]="currentTheme() === t.id"
        [style.--delay]="i"
        (click)="selectTheme(t.id)"
        [title]="t.label"
      >
        <span class="theme-fab-option__swatch" [style.background]="t.gradient"></span>
        <span class="theme-fab-option__label">{{ t.label }}</span>
        @if (currentTheme() === t.id) {
          <span class="theme-fab-option__check">
            <svg
              width="10"
              height="10"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        }
      </div>
    }

    <!-- Main FAB Trigger -->
    <button
      class="theme-fab"
      (click)="toggleThemeMenu()"
      [title]="themeMenuOpen() ? 'Close theme picker' : 'Change theme'"
      [attr.aria-expanded]="themeMenuOpen()"
    >
      <span class="theme-fab__icon" [class.spinning]="themeMenuOpen()">
        {{ themeMenuOpen() ? '✕' : currentThemeIcon() }}
      </span>
      <span class="theme-fab__ripple"></span>
    </button>
  </div>
</div>
