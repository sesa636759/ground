<div class="app-container" [class.sidebar-collapsed]="sidebarCollapsed()" [class.layout-topbar]="themeService.navigationLayout() === 'topbar'" [class.layout-sidebar]="themeService.navigationLayout() === 'sidebar'">
  <!-- Sidebar Navigation - Only show when layout is sidebar -->
  <ui-navigation
    *ngIf="themeService.navigationLayout() === 'sidebar'"
    class="sidebar-nav"
    [categories]="topItems"
    [items]="categoryItems"
    [bottomItems]="bottomItems"
    [theme]="themeService.resolvedTheme()"
    [selected-item]="currentRoute()"
    [show-search]="true"
    max-items="10"
    (navItemClick)="onNavItemClick($event)"
  >
    <!-- User Profile in Footer Slot -->
    <div
      slot="footer"
      class="sidebar-user-profile"
      (mouseenter)="userMenuOpen.set(true)"
      (mouseleave)="userMenuOpen.set(false)"
    >
      <div class="user-profile-container" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <img [src]="currentUser().avatar" [alt]="currentUser().name" />
          <span class="user-status" [class.online]="currentUser().isOnline"></span>
        </div>
        <div class="user-info" *ngIf="!sidebarCollapsed()">
          <div class="user-name">{{ currentUser().name }}</div>
          <div class="user-role">{{ currentUser().role }}</div>
        </div>
        <ui-button
          class="user-menu-toggle"
          *ngIf="!sidebarCollapsed()"
          variant="ghost"
          icon-only
          [icon]="userMenuOpen() ? '▲' : '▼'"
          label="Toggle Menu"
          (click)="toggleUserMenu()"
        >
        </ui-button>
      </div>

      <!-- User Dropdown Menu -->
      <div class="user-menu" *ngIf="userMenuOpen()">
        <ui-button
          *ngFor="let item of userProfileItems"
          class="menu-item"
          [class.logout]="item.id === 'logout'"
          variant="ghost"
          full-width
          (click)="onNavItemClick({ detail: item })"
          [icon]="item.icon"
          [label]="item.label"
          [badge]="item.badge"
        ></ui-button>
      </div>
    </div>
  </ui-navigation>

  <!-- Top Bar Navigation - Only show when layout is topbar -->
  <div *ngIf="themeService.navigationLayout() === 'topbar'" class="topbar-nav">
    <div class="topbar-content">
      <div class="topbar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">UI Library</span>
      </div>
      
      <nav class="topbar-menu">
        <a
          *ngFor="let item of topItems"
          [routerLink]="'/' + item.id"
          routerLinkActive="active"
          class="topbar-item"
          (click)="onNavItemClick({ detail: item })"
        >
          <span class="item-icon">{{ item.icon }}</span>
          <span class="item-label">{{ item.label }}</span>
        </a>
      </nav>

      <div class="topbar-actions">
        <div
          class="topbar-user"
          (mouseenter)="userMenuOpen.set(true)"
          (mouseleave)="userMenuOpen.set(false)"
        >
          <div class="user-avatar-small">
            <img [src]="currentUser().avatar" [alt]="currentUser().name" />
          </div>
          <span class="user-name-small">{{ currentUser().name }}</span>
          
          <!-- User Dropdown Menu for Topbar -->
          <div class="topbar-user-menu" *ngIf="userMenuOpen()">
            <div class="user-menu-header">
              <img [src]="currentUser().avatar" [alt]="currentUser().name" />
              <div class="user-details">
                <div class="user-name">{{ currentUser().name }}</div>
                <div class="user-role">{{ currentUser().role }}</div>
              </div>
            </div>
            <div class="menu-divider"></div>
            <ui-button
              *ngFor="let item of userProfileItems"
              class="menu-item"
              [class.logout]="item.id === 'logout'"
              variant="ghost"
              full-width
              (click)="onNavItemClick({ detail: item })"
              [icon]="item.icon"
              [label]="item.label"
              [badge]="item.badge"
            ></ui-button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <!-- Router Outlet for Page Content -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
