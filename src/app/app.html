<div class="app-container" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Sidebar Navigation -->

  <ui-navigation
    class="sidebar-nav"
    [categories]="topItems"
    [items]="categoryItems"
    [bottomItems]="bottomItems"
    [theme]="themeService.resolvedTheme()"
    [selected-item]="currentRoute()"
    [show-search]="true"
    width="15%"
    (navItemClick)="onNavItemClick($event)"
  ></ui-navigation>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <!-- Header -->
    <header class="content-header">
      <button class="toggle-btn-header" (click)="toggleSidebar()">
        {{ sidebarCollapsed() ? '☰' : '✕' }}
      </button>
      <h1>{{ title() }}</h1>
      <button class="theme-toggle-btn" (click)="themeService.toggleTheme()" title="Toggle theme">
        {{ themeService.getThemeIcon() }}
      </button>
    </header>

    <!-- Router Outlet for Page Content -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
