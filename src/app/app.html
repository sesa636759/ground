<div
  class="app-container"
  [class.sidebar-collapsed]="sidebarCollapsed()"
  [class.layout-topbar]="themeService.navigationLayout() === 'topbar'"
  [class.layout-sidebar]="themeService.navigationLayout() === 'sidebar'"
>
  <!-- Sidebar Navigation - Only show when layout is sidebar -->
  <ui-navigation
    *ngIf="themeService.navigationLayout() === 'sidebar'"
    class="sidebar-nav"
    [categories]="topItems"
    [items]="categoryItems"
    [bottomItems]="bottomItems"
    [bottomItemsSecondary]="userProfileItems"
    [theme]="themeService.resolvedTheme()"
    [selected-item]="currentRoute()"
    [show-search]="true"
    max-items="10"
    (navItemClick)="onNavItemClick($event)"
  >
    <!-- User Profile rendered as bottom item (consistent with other categories) -->
  </ui-navigation>

  <!-- Main Content with Router Outlet -->
  <main class="main-content">
    <!-- Router Outlet for Page Content -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
